r.arc_leader_5_accept=Достичь Терминала 1? Считайте, сделано\!
r.arc_mintut_1=Я хочу узнать о минералах, найденных в Часовом Механизме.
r.arc_mintut_2=Продолжить
r.arc_mintut_3=Продолжить
r.arc_mintut_4=Продолжить
r.arc_mintut_5=Продолжить
r.arc_mintut_6=Отлично\! Спасибо за информацию\!
r.atg_greeter_1a=Конечно, с чего начать?
