n.rfc_dungeon_1a=Я блуждаю по этим залам даже спустя столько веков, лишенный вечного покоя своим проклятым господином. Я чувствую, как его дух и сейчас цепляется за это разрушенное царство. Он отказывается уйти и тем самым обрекает нас всех на гибель.
n.rfc_dungeon_2a=Меня заключили сюда более тысячи лет назад за то, что я выступил против своего господина, и приговорили к пожизненному заключению в качестве наказания.  Когда огонь охватил цитадель, даже в смерти я не обрёл свободу.  Моя душа прикована к этим проклятым камням.
