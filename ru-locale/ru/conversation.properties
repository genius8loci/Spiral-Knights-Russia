m.almire_historian_1a=Нам удалось восстановить те немногие сведения о Королевстве Альмире, которые сохранились в крепости Оулайт. В сочетании с фрагментами информации, полученными от лесных духов в самой Цитадели Огненной Бури, мы начинаем складывать более четкое представление об истории Альмире.
m.almire_historian_2a=Из найденных нами фолиантов мы узнали, что тысячи лет назад Цитадель Огненного Шторма была частью гораздо более обширного королевства, известного как Альмире. Хотя оно граничило с другими агрессивными нациями, Альмире славилось боевым мастерством своих многочисленных легионов. Эти легионы обеспечивали безопасность королевства на протяжении многих лет. Увы, их оказалось недостаточно.
m.almire_historian_3a=Что ж, теперь мы знаем, что здесь были огромные цитадели, в которых размещались вооруженные силы Альмира, и величественные поместья для дворянских родов. Должно быть, это было впечатляющее зрелище. Мы предполагаем, что остальная часть королевства до сих пор лежит где-то в виде дымящихся руин. Возможно, что часть ее уцелела... хотя, учитывая имеющиеся свидетельства, мы считаем это в лучшем случае маловероятным.
m.arc_leader_1=Рад встрече, солдат, и поздравляю с тем, что ты добрался до нашего базового лагеря здесь, в Хейвене. Я — лейтенант Ферон. Капитан Озло поручил мне курировать наши горнодобывающие работы в «Часовых механизмах».\n\nПеред тобой — «Аркада», удивительный комплекс, который служит нашим мостом в самое сердце «Часовых механизмов». Поскольку ты здесь новичок, я кратко расскажу, чем нас здесь заставили заняться в штаб-квартире Спирали.
m.arc_leader_2=После того как «Скайларк» разбился, его основное ядро из тиариума взорвалось, уничтожив часть корабля и лишив его основного источника энергии. Поскольку до сих пор мы не нашли несколько сотен тонн тириума, просто валяющихся где-то, «Птица» фактически лишилась крыльев.\n\nС помощью «Странников» нам удалось развернуть небольшую оперативную базу здесь, в Хейвене. Как только наши системы заработали, мы обнаружили, что в самом сердце этой скалы резонирует энергетический след беспрецедентной мощности.
m.arc_leader_3=Совершенно верно! Ядро Часового механизма вполне может содержать источник энергии, необходимый нам для создания нового источника питания для «Скайларка» и восстановления его работоспособности. Есть только одна проблема — сам Часовой механизм, похоже, построен как какая-то безумная смертельная ловушка.\n\nДобраться до Ядра будет нелегко...
m.arc_leader_4=Вот такой настрой мне и нравится. Все работает так\: вы используете ворота впереди, чтобы исследовать Часовой механизм и добывать особые минералы. Затем вы помещаете эти минералы обратно в ворота, чтобы изменить Часовой механизм ниже, создавая новые, неизведанные уровни.\n\nМы верим, что минералы — это ключ к открытию пути к Ядру, нам просто нужно понять, как их использовать!
m.arc_leader_5=Вы доказали, что готовы к бою, и я верю, что вы будете мужественно служить Ордену Спирали. Врата в Часовые механизмы находятся прямо впереди. \n\nУдачи вам!
m.arc_mintut_1=Здравствуйте. Я Вегнер, главный Гео-рыцарь «Скайларка» и руководитель геологических исследований в Часовых механизмах.
m.arc_mintut_2=Во время путешествий по Часовому механизму вы встретите пять особых минералов\: кримзонит, лунный камень, валестоун, люминит и темную материю.
m.arc_mintut_3=Месторождения руды можно найти на всех уровнях Часового механизма, и вам нужно атаковать их, чтобы раздробить на куски, которые можно унести. Вы можете поднимать только один кусок за раз, но можете поменять их местами, подняв другой. Ищите самый большой и блестящий из тех, что найдете. Они самые ценные.
m.arc_mintut_4=Как только вы благополучно доберётесь до лифта, минерал, который вы несете, будет помещён в ваш арсенал для дальнейшего использования. Все члены вашей группы получают минералы друг друга, так что не нужно спорить о том, кому достанется лучший!
m.arc_mintut_5=Минералы используются для приготовления пищи для спрайтов в лаборатории. Пища для спрайтов очень важна для развития вашего спрайта, так что не упустите эти минералы, когда их увидите!
m.arc_mintut_6=Наши геологические исследования продолжаются, так что, возможно, у этих странных и мощных минералов найдутся и другие удивительные применения.
m.atg_greeter_1a=Добро пожаловать в наш зал продвинутого обучения. Здесь вы найдете полезные советы по выживанию, которые помогут вам в путешествии по Часовым механизмам. \n\nХотите получить указания?
m.atg_greeter_2a=На западе вы узнаете о полезных предметах, которые можно найти в Часовых механизмах. На севере вы узнаете о различных типах блоков и дверей. На востоке вы найдете множество ловушек и опасностей, а также боевую комнату, где можно попрактиковаться в защите от тренировочных кубов.  Не волнуйтесь, мы приняли меры, чтобы кубы были абсолютно безвредны!
m.atg_guard=Приветствую!  За этой дверью находится зал для продвинутых тренировок. Как Рыцарь Спирали, ты можешь свободно пользоваться им, чтобы оттачивать свои навыки и узнавать больше о Часовых механизмах.
m.barracks_booster_1=Хотите зарабатывать еще больше монет Крогмо в каждом матче?
m.barracks_booster_2=Купите бустер монет Крогмо у торговца улучшениями!
m.bazaar_tour_10a=Пойдемте к Бринксу.
m.bazaar_tour_11a=Бринкс — это Торговец жетонами, выдающий рыцарям определенные предметы в обмен на жетоны, которые можно собрать в Часовых механизмах.  Жетоны можно найти в блоках сокровищ, получить в качестве награды за выполнение миссий или найти при победе над особыми боссами.
m.bazaar_tour_12a=Осталось посетить всего один магазин, и мы закончим. Я приберег самое лучшее напоследок.
m.bazaar_tour_13a=Перед вами Бешамель, мастер по аксессуарам, который может добавить аксессуары к вашему снаряжению, если у вас есть билет.  С помощью аксессуаров вы сможете сделать свое снаряжение по-настоящему заметным в толпе, поэтому я настоятельно рекомендую вам попробовать.  Вы скоро станете предметом всеобщего восхищения\!
m.bazaar_tour_14a=Билеты на аксессуары можно найти в сундуках или на Аукционе, если какой-нибудь другой Рыцарь случайно их продает.
m.bazaar_tour_15a=Ну, это в общих чертах все, что нужно знать о Базаре.  Это действительно фантастическое место, где можно найти практически все, что вам нужно. \n\nХотите, я еще раз все повторю, или вы думаете, что уже все поняли?
m.bazaar_tour_16a=Еще один тур? Без проблем, следуй за мной!
m.bazaar_tour_16b=Замечательно!  Я рад, что смог помочь тебе сориентироваться. Удачи тебе, {0}!
m.bazaar_tour_1a=Добро пожаловать на Базар, {0}! Хочешь, я проведу тебе экскурсию по магазинам или услугам?
m.bazaar_tour_2a=Здесь такие незнакомцы, как Квиллион, продают оружие и доспехи. Каждый из них специализируется на определённом типе предметов, так что поговорите с ними и узнайте, что у них в ассортименте. Они не особо разговорчивы, но у них каждый день появляется свежий товар! \n\nПросто убедитесь, что вы достигли необходимого уровня, чтобы экипировать тот или иной предмет!
m.bazaar_tour_3a=Рад, что ты спросил, конечно же, да!  Пойдем к Вателю.
m.bazaar_tour_4a=Ватель продает тебе различные рецепты, а также средства для изменения цвета экипировки и другие предметы.
m.bazaar_tour_5a=Правильно, вы можете приобрести рецепты и материалы, чтобы создавать оружие и снаряжение на алхимических станциях.  Пойдем, я вам одну покажу.
m.bazaar_tour_6a=Здесь у нас есть алхимическая станция, с которой ты, без сомнения, хорошо познакомишься, когда будешь улучшать свой арсенал. \n\nНу, на этом с магазинами все. Хочешь еще одну экскурсию?
m.bazaar_tour_7a=Панч и Вайз — кузнецы-гремлины, которые могут изменять свойства твоего оружия и снаряжения.
m.bazaar_tour_8a=Не торопись, {0}, не все гремлины из одного теста.  Некоторые не согласны с методами короля Тинкинзара и Алого Ордена.  На самом деле, мне сказали, что где-то внизу, в Часовых механизмах, есть целый город, полный гремлинов, покинувших Великую Колонию.
m.bazaar_tour_9a=Ладно, вернёмся к делу. \n\nПанч может за определённую плату добавить к вашему оружию и снаряжению «уникальные варианты» — своего рода специальные бонусы. Но его методы, э-э... хаотичны.  Никогда не знаешь, что именно получишь. \n\nВайс действует чуть более аккуратно.  За определенную плату он может развязать ваше оружие и снаряжение, позволяя вам снова продать или подарить предмет!
m.biscotti_1=Привет, я Бискотти, шеф-повар «Скайларка»!  У нас тут небольшая проблема, которая может быть связана или нет с разумными, чудовищными тортами, которые, возможно, полностью захватили мою кухню и заразили Часовой механизм... \n\nВ любом случае, я договорился со «Странниками» о наградах за сдачу кусочков торта, доказывающих, что вы помогли истребить этих ужасных монстров, которые могут существовать или нет.
m.biscotti_2=Отлично\! Есть два способа помочь мне\: \n\nВы можете принять новую престижную миссию «Тотальная торт-катастрофа», доступную ежедневно. \n\nИли вы можете отправиться в Часовой механизм и избавляться от этих «жутких тортов» сколько угодно.  Просто ищите характерную глазурь!
m.biscotti_3=Спасибо, {0}, я это ценю.  И сделайте мне одолжение, пожалуйста, не упоминайте об этом маленьком «инциденте» в штаб-квартире Spiral...
m.casino_bouncer_a=Только члены клуба C.U.B.E. могут попасть в лаундж «High Wobbler».
m.casino_bouncer_b=Извините, только для VIP-гостей.
m.casino_bouncer_c=Добро пожаловать в лаундж «High Wobbler»!
m.casino_bouncer_d=Добро пожаловать, входите сюда.
m.casino_guard_a=Глорп! Здесь всё в порядке.
m.casino_guard_b=«Золотой слизь» приветствует вас. Глорп!
m.casino_guard_c=Глорп-глорп. Веселитесь.
m.casino_imposto_a=Ещё один «Гел-Коре», пожалуйста. Взболтайте.
m.casino_imposto_b=О, я вас здесь раньше не видел!
m.casino_imposto_c=Официант? Ой, простите, уважаемый господин.
m.casino_jelly_a=Глорп! Проглотил корону. Вкусно.
m.casino_jelly_b=Я только что вернулся от парикмахера, видно?
m.casino_jelly_c=Однажды я выиграю достаточно, чтобы построить свой собственный дворец! Глорп-глорп!
m.casino_jelly_d=Я всё проиграл!
m.casino_klepto_a=Я ничего не украду... обещаю!
m.casino_klepto_b=Эй, что это там?
m.casino_klepto_c=Я не тот Клептолиск, которого ты ищешь.
m.casino_monster_a=Эй, не жульничай!
m.casino_monster_b=Хватит заглядывать мне через плечо.
m.casino_monster_c=Не думаю, что кто-то заметит мое отсутствие.
m.casino_monster_d=Можно у тебя оружие одолжить?
m.casino_monster_e=Эй, не заслоняй вид!
m.casino_monster_f=Тсс, никому не говори, что я здесь.
m.casino_monster_g=Я здесь либо праздную, либо топлю печаль.
m.casino_monster_h=Удача бывает переменчива, иногда от плохой к еще худшей...
m.casino_monster_i=Я здесь, чтобы выслушать. Выговорись.
m.casino_pitboss_a=С тех пор, как я ввел обязательные сверхурочные, производительность выросла на два процента.
m.casino_pitboss_b=Я повысил себя до старшего менеджера по ужасающим орудиям уничтожения.
m.casino_pitboss_c=Я заставил своих сотрудников попотеть, чтобы достичь того, чего я добился сегодня.
m.casino_pitboss_d=Я только что сделал очередной оптовый заказ на канцелярские товары. Они у нас постоянно заканчиваются.
m.casino_pitboss_e=Парень из «Дьявольского ИТ» хотел перевести наш офис на полное использование глифов, но я люблю тратить бумагу, когда могу.
m.casino_royaljelly_a=Я только что прилетел из Муркрофта, и, черт возьми, мои королевские ядра полностью истощены.
m.casino_royaljelly_b=Вот тебе жемчужина из желе...
m.casino_royaljelly_c=Три лишайника скользят в комнату...
m.casino_royaljelly_d=Не забудь оставить чаевые официантам.
m.casino_skelly_a=Так... ярко...
m.casino_skelly_b=Попробуй ещё раз...
m.casino_skelly_c=Я никогда не уходил...
m.casino_yesman_a=Наслаждайся!
m.casino_yesman_b=Каждый желе приветствуется в «Золотом слизи»!
m.casino_yesman_c=Извините, вы опоздали на «Счастливый час» всего на минуту. В следующий раз.
m.casino_yesman_d=Каждый желе-человек — победитель в «Золотом слизе»!
m.casino_yesman_e=Сотрудники Undercorp получают бесплатную кружку при каждом посещении.
m.casino_yesman_f=Добро пожаловать в High Wobbler Lounge!
m.core_busy_1=Извини. Сейчас не могу разговаривать.
m.core_guard_1=Тебе лучше поговорить с Ваелин.
m.core_guard_2=Ты принес нам припасы?
m.core_lead_1=Здравствуйте. Я лейтенант Ваэлин, командующий исследованиями «Ядра» на месте. Вы, несомненно, входите в число самых сильных Рыцарей Спирали, сумевших проникнуть в эти адские глубины, но одной лишь силы вам будет недостаточно, чтобы продвинуться дальше.
m.core_lead_2=Мы пытаемся найти способ активировать Ядро с помощью силы минералов, обнаруженных внутри Часовых механизмов.  Эти минералы способны трансформировать Часовые механизмы — мы видели это в Аркаде Хейвена.  Мы верим, что сможем использовать эту силу, чтобы активировать Ядро и... каким-то образом открыть его.
m.core_lead_3=Да, сам капитан Озло приказал нам продержаться как можно дольше и узнать всё, что можно.  Если мы когда-нибудь покинем эту планету, то только благодаря этому Ядру.  \n\nЯ уверен, что помимо потенциального источника энергии, Ядро является своего рода нервным центром всего, что вы видите внутри Часового механизма.  Вы можете почувствовать это в том немногом воздухе, что здесь внизу; дикое, зловещее ощущение, что это не просто машина.
m.core_lead_4=Я говорю, что мы знаем: весь этот мир не естественен, и я, во всяком случае, не верю, что те полчища жалких гремлинов, какими бы трудолюбивыми они ни были, могли построить целый мир.  Им, должно быть, помогало нечто, далеко превосходящее их возможности, и, возможно, что бы это ни было, оно находится внутри Ядра. \n\nТо же самое касается отряда Альфа.  Они не могли просто исчезнуть, даже в самых глубинах Часового механизма.  Они были нашими лучшими.  Именно это Ядро поглотило их.
m.core_lead_5=Не знаю, как, но они бы нашли способ.  Они наверняка... а теперь их нет.
m.core_resting_1=Не волнуйся. Он выкарабкается.
m.core_resting_2=Не терпится вернуться в Хэйвен...
m.core_resting_3=Надеюсь, припасы скоро прибудут.
m.core_tech_1=Добро пожаловать в исследовательский лагерь «Ядро».  Есть какие-нибудь новости с поверхности?
m.core_tech_2=Все просто: продолжайте добывать минералы в Часовых механизмах и питать ворота в аркаде.  Нам нужно проанализировать, как энергия минералов влияет на Ядро.  Проблема в том, что на эти глубины доходит очень мало энергии.  Мы можем собрать только ограниченный объем данных с каждого ворот при их запуске.
m.core_tech_3=Свежий воздух?  Тепло?  Эти глубины — не та среда, в которой многие из нас смогут продержаться еще долго, но лейтенант настаивает, чтобы мы продолжали, что, возможно, всплеск энергии от следующих ворот даст нам нужный ответ. \n\nНельзя не признать, что наш лейтенант предан делу.  Не думаю, что я когда-либо видел, чтобы она закрывала глаза, не говоря уже о сне.
m.core_unconcious_1=. . .
m.dark_harvest_exp=Добро пожаловать на фестиваль «Тёмный урожай»!  Этот ежегодный праздник посвящён нежити и сопровождается праздничными масками, вкусными угощениями и опасными розыгрышами!\n\nЧтобы принять участие, исследуйте Часовой механизм и попытайтесь найти легендарного «Тыквенного короля».  Эта жутковатая тыква раздает посетителям конфеты.  Вы можете обменять конфеты у торговцев на площади Хавен-Тауна на маски монстров!\n\nЕсли вы предпочитаете прямой подход или просто хотите еще несколько, наш продавец также продаст вам конфеты.
m.deskclerk_1a=Добро пожаловать в поместье Муркрофт, где уставшие духи приходят отдохнуть (если применимо). Если вы планируете остаться на ночь, пожалуйста, помните, что мы будем проводить легкую уборку в вашей комнате каждые девяносто девять лет, континентальный завтрак подается за счет заведения каждую полную луну, и вы никогда не сможете покинуть это место навеки. Приятного пребывания!
m.em_greeter_1a=Добро пожаловать в Эмберлайт, убежище изгнанных гремлинов.
m.emberlight_visitor_1a=Гремлины Эмберлайта благодарны вам за то, что вы остановили эту угрозу.
m.emberlight_visitor_2a=Но я пришел предупредить вас!  Кровавый Орден не остановится на проекте «Роармулус».  Кровавый Орден отчаянно стремится уничтожить всех врагов. Высоких, маленьких и изгоев.  Всех врагов Кровавого Ордена!
m.emberlight_visitor_3a=В чем-нибудь помочь?
m.emberlight_visitor_4a=Эмберлайт основан изгнанными гремлинами из Великой Колонии. Гремлины Эмберлайта не подчиняются Железному Закону, поэтому им приходится бежать или погибнуть. Мы начинаем все с нуля в Эмберлайте. Новая колония стала домом лишь для немногих из нас\: в основном бывшие интриганы, несколько торговцев, несколько бойцов — все они предатели в глазах гремлинов Великой Колонии.
m.emberlight_visitor_4b=Никто не знает наверняка. Тинкинзара не видели уже много-много лет. Багровый Орден осуществляет планы Тинкинзара для Колыбели. Эмберлайт был пятном на генеральном плане, потому что построен изгнанниками. Хейвен, вероятно, то же самое, основан не-гремлинами. Не входит в план!
m.energy_info_1a=Знаешь ли ты, что является самым важным ресурсом на Колыбели? ЭНЕРГИЯ! Правильно, мой друг, это нечто настолько особенное, что об этом стоит кричать! Хочешь узнать об этой суперважной штуке? Я как раз эксперт в этом вопросе!
m.energy_info_2a=Круто! Я разложу это для тебя по полочкам в трех простых уроках\: что это такое, как это используется и как ты можешь получить больше.
m.energy_info_3a=Энергия — это особая сила, которая постоянно исходит из самого сердца этого мира. Она абсолютно стабильна и никогда не теряется, если только её не обменять или не потратить. (Ты можешь увидеть, сколько у тебя энергии, в модуле «Энергия» в твоём арсенале.)
m.energy_info_3b=Энергия используется для самых разных целей! Это основная валюта для покупки товаров в Складе снабжения, она позволяет приобретать улучшения для себя, воскрешаться в Часовых механизмах, когда у вас заканчиваются Искры жизни, а также необходима для создания гильдии. \n\nКроме того, в мире вы найдете множество устройств, которые работают от энергии. Просто ищите на устройстве синий символ энергии.
m.energy_info_3c=Энергию можно получить только путем покупки за реальные деньги или обмена через биржу. Чтобы купить или обменять энергию, просто откройте Склад снабжения и нажмите кнопку «Получить энергию».
m.fc_bridge_1=Немногие добираются до другого берега, путешественник. Возможно, у вас есть шанс выжить, а может быть... нет, даже добрые эльфы внизу будут поглощены пламенем Ванадука. Это безнадежно.
m.fc_bridge_2=Лорд Ванадук — повелитель этого разрушенного царства. Некогда король Альмира, Ванадук теперь командует ужасным легионом на пепле своего бывшего королевства. Тебе лучше никогда не пересекаться с ним.
m.fc_bridge_3=Выбор не за тобой.
m.fc_court_1=Ты... ты не из числа заблудших. Ты, должно быть, силен, раз добрался до этого двора. Прошу, ты должен мне помочь!
m.fc_court_2=Я — дух природы, сила стихии, призванная в это царство, чтобы погасить неестественный огонь, пожирающий его. Но Ванадук обнаружил нас и заключил в тюрьму. Мне удалось сбежать, но остальные духи по-прежнему находятся в его плену.\n\nТеперь никто не может пройти дальше двора, так как столбы теневого огня блокируют все выходы. Теневой огонь можно потушить только водой, которая течет из этих духовных колодцев. Эта вода — самая чистая во всей природе, она течет прямо из источников в царстве самой Матери Духов.
m.fc_court_3=Без силы остальных эльфов вода никогда не потечет по этому царству. Чтобы принести даже самую маленькую каплю воды в такой угнетающий мир, требуется сосредоточенная связь с Матерью Духов. Владыка этого царства позаботился о том, чтобы окружающие его пламени всегда горели.
m.fc_court_4=Тогда ты тоже храбрый, путешественник. Ты можешь найти моих соплеменников по всему этому двору. Будьте, однако, очень осторожны, ибо их охраняют ужасные приспешники Ванадука. Многие из них патрулируют главную улицу, так что следите за спиной, когда будете передвигаться.\n\nКак только найдете духа, отнесите его обратно к священному кругу, который вы видите перед собой. Они, без сомнения, ослаблены проклятием Ванадука и нуждаются в восстановлении сил. Когда шестеро других воссоединятся, мы установим связь с Матерью Духов и принесем воду к колодцам.
m.fc_court_5=Да направит тебя Мать Духов.
m.fc_court_complete_1=Благодаря тебе наша связь с Матерью Духов теперь очень сильна! Используй воду, текущую из духовных колодцев, чтобы погасить теневой огонь. Впереди тебя ждут теневой огонь и приспешники Ванадука, и хотя мы, духи, мало чем можем помочь тебе в бою, мы по крайней мере можем создавать духовные колодцы в определенных местах.
m.fc_court_reminder_1=Как только найдешь духа, отнеси его обратно к священному кругу, который видишь перед собой. Они, без сомнения, ослаблены проклятием Ванадука и нуждаются в восстановлении сил. Как только мы все воссоединимся, мы создадим связь с Матерью-Духом и наполним колодцы водой.\n\nПожалуйста, поторопись!
m.fc_greeter_1=Прислушайся к моему предупреждению, путешественник; это опасное и ужасное царство. Ты стоишь перед воротами Цитадели Огненной Бури, бывшего сердца великого королевства Альмире, а ныне владения, извращенного огнем и злобой.\n\nПокинь это место, если хочешь остаться в живых.
m.fc_greeter_2=Пусть твой конец будет милосердно быстрым.
m.final_test_knight_1a=Потрясающе!  Я бы никогда не ожидал, что новобранец выберется живым из тех огненных обломков!  Ты, должно быть, действительно нечто особенное... \n\nМеня зовут Ферон, лейтенант Ордена Спирали.  Мы считали весь этот комплекс заброшенным, пока лифт, ведущий к нему, внезапно не ожил.  Как только мы начали осматривать место, оно вскоре охватило пламя! \n\nКак ты здесь оказался?
m.final_test_knight_2a=Понятно.  Это будет очень интересная информация для штаб-квартиры «Спирали».  Наш базовый лагерь в Хейвене находится прямо впереди.  Поднимись на лифте и познакомься с другими Рыцарями, которые, как и ты, выжили после крушения. Техники в лаборатории с нетерпением ждут возможности изучить этот артефакт.  Они займутся этим, как только ты прибудешь в Хейвен. \n\nНе беспокойся о остальных в спасательном лагере.  Благодаря тебе у нас есть работающая лифтовая система, чтобы добраться до них.  Ты спас их всех!
m.first_conversation_1=Поздравляем, примите свой приз!
m.forge_knight_1a=«Колыбель» — опасный мир, и для выживания важно иметь в своем арсенале мощное снаряжение. Для этого вам понадобится Кузница.
m.forge_knight_2a=Кузница использует тепло, накопленное в твоем снаряжении, и объединяет его с силой Огненных кристаллов, чтобы раскрыть его новый потенциал.
m.forge_knight_3a=В городе вы можете воспользоваться Кузницей в любое время.  В Часовых механизмах доступ к ней открывается через Станцию арсенала.
m.forge_knight_4a=При использовании Кузницы вы увидите список всех предметов, готовых к повышению уровня. Выбрав предмет, вы увидите, как его можно улучшить.
m.forge_knight_5a=Для изготовления каждого предмета потребуется определенный тип Огненного кристалла. Огненные кристаллы можно получить в Складе снабжения, заработать за выполнение определенных миссий, а также найти в блоках с сокровищами в Часовом механизме!
m.forge_knight_6a=Огненные кристаллы довольно нестабильны, и существует вероятность, что попытка изготовления закончится неудачей.  Однако мы обнаружили, что, добавив больше Огненных кристаллов, можно увеличить шанс успешного создания предмета. \n\nКроме того, чем больше Огненных кристаллов вы добавите, тем выше шанс, что к предмету будут применены специальные бонусы\! \n
m.forge_knight_7a=Теперь, когда вы знаете о Кузнице, не хотите ли заглянуть туда?
m.fountain_1=Приветствую и добро пожаловать в Хейвен!  Если вы направитесь на север, то дойдете до Аркады, где сможете ознакомиться с подробностями нашей миссии.  Если вы направитесь на запад, то дойдете до Базара, где Незнакомцы продают различные предметы экипировки и оружия.  Обязательно проверяйте их ассортимент ежедневно, он меняется!
m.gh_bechamel_1=Приветствую, {0}, чем могу помочь?
m.gh_bechamel_2=Пожалуйста, внимательно изучите превью статуй!  Иногда у меня возникают трудности с воплощением некоторых аксессуаров, таких как ауры и специальные предметы, в виде статуй.  Возврат не предусмотрен, поэтому убедитесь, что вам нравится то, что вы видите, прежде чем покупать!
m.guard_laboratory_1a=Извини, {0}, у тебя пока нет права входа в лабораторию.
m.hav_clock_1a=Привет, малыш. Похоже, тебе нужны какие-то знания.
m.hav_clock_2a=Я поделюсь с тобой тем, что знаю, малыш.
m.hav_clock_3a=Трудно сказать точно, так как большая часть того, что находится внутри, кажется, происходит из разных миров. Некоторые, похоже, из древнейших царств, где, без сомнения, когда-то обитали бесчисленные старые боги и существа.\n\nЭтот мир неестественен. То, что ты видишь в нем, никогда не должно было здесь быть. Великие истории стольких миров бесконечно крутятся в шестернях этой огромной машины... . Мне это кажется довольно печальным.
m.hav_clock_3b=Существуют разные теории. Некоторые говорят, что ответственны за это гремлины, которых ты сейчас видишь за работой. Но это кажется слишком грандиозным даже для их, казалось бы, бесконечной рабочей силы. Даже имея средства для этого, как они «начали»? Где они нашли силу?
m.hav_clock_3c=Что-то обладающее огромной силой, малышка. Из центра Часового механизма исходит огромный энергетический сигнал, но это все, что мы знаем. Никто никогда не добирался до самого ядра. Или, по крайней мере, если кто-то и добирался, то никогда не возвращался.\n\nСпросить об этом нужно у гремлинов, ведь они, вероятно, проникли в Часовой механизм глубже, чем любое другое существо. Но это может оказаться затруднительным, так как они довольно неприятная компания.
m.hav_entryknight_1a=Ты пришел из бездны?  Как?
m.hav_entryknight_2a=Всегда рад видеть другого Рыцаря Спирали!
m.hav_entryknight_3a=Тебе лучше укрыться за городскими стенами. Здесь, снаружи, небезопасно.
m.hav_greeter_1a=Добро пожаловать в Хейвен, малышка. Присоединяйся к своим друзьям и помоги им добыть «блестяшки» у Часовых механизмов. «Блестяшки» всегда ценятся Незнакомцами.
m.hav_grem_1a=Привет, малышка. Похоже, тебе нужны какие-то знания.
m.hav_grem_2a=Мои знания в твоем распоряжении, малышка.
m.hav_grem_3a=Гремлины — это раса существ, невероятно искусно создающих и разбирающих всевозможные механизмы. Они одновременно являются легионом гениальных мастеров и силой мощного разрушения.
m.hav_grem_3b=Все гремлины, принадлежащие к колонии, служат королю Тинкинзару. Говорят, что Тинкинзар — великий правитель и гений механики, ответственный за концепцию всего Часового механизма. Однако, насколько нам известно, короля никогда не видели простые гремлины; вместо этого его приказы передаются и выполняются его «Алым Орденом» — страшной и ревностной группой гремлинов, которые единственные имеют доступ к великому королю.
m.hav_grem_3c=Большинство из них нападут на вас, как только увидят, но есть и такие — изгои из колонии, которые нашли убежище в городах под землей. Их жизнь тяжела: их ненавидят соплеменники, и они больше не живут в мире, который считали своим домом.
m.hav_guardian_1a=Добро пожаловать в Хейвен, {0}, мы ждали вас.
m.hav_mecha_1a=Я получил отличную сделку на этого сломанного механического рыцаря. Если я смогу понять, как заставить его работать правильно, у меня будет личная охрана для моих экспедиций в Часовых Механизмах.
m.hav_snipes_1a=Пожалуйста, будьте осторожны, не наступите на снайпов, малыш.
m.hav_snipes_2a=Снайпы — это грациозные, очаровательные, привлекательно-пухлые птицы, которые вы видите, бродящие по Убежищу. Некоторые говорят, что они самые красивые существа в галактике, но вы никогда не услышите этого от самих снайпов, так как они невероятно скромны.
m.hunter_1a=Здравствуйте, мой добрый Рыцарь, я Армеро, великий охотник дикой природы и куратор этого престижного логова, которое вы видите перед собой. \n\nНа стенах находятся некоторые из многих трофеев, добытых в смелых экспедициях, где жизнь и конечности ставились на карту ради переживания чистого, неукротимого волнения охоты. \n\nТеперь скажите, есть ли у вас тот же искра внутри? Тот же вкус к свежему воздуху, к опасности?
m.hunter_2a=Отлично\! Тогда, возможно, вы и ваши друзья будете полезны этому логову. Видите ли, алхимическая машина, которую вы видите перед собой, может создать великолепные трофеи монстров для вашего Гильдейского Зала. \n\nАлхимическая машина использует материалы и короны из вашего Гильдейского С treasury и депонирует результаты обратно в Гильдейскую казну.
m.hunter_3a=Действительно\! Для создания трофеев монстров потребуется большое количество материалов, так что было бы разумно, что требуется групповая работа. \n\nНаконец, некоторые из материалов, которые вам понадобятся, можно получить только потратив токены боссов у Бринкса на Убежищенском Базаре. Они служат доказательством вашей доблести в победе над такими ужасными существами\!
m.hunter_4a=Вот это дух\! Дайте этим монстрам по заслугам\!
m.imposto_25=Глорп\! Становится темно...
m.imposto_50=Глорп\! Если бы у меня были кости, они бы сломались\!
m.imposto_75=Глорп\! Меня накрывает\!
m.imposto_99=Глорп\! Помогите, на меня нападают
m.imposto_attack=Глорп\! Гринчлины вернулись\!
m.imposto_death=Отменить миссию\! Я отступаю обратно в Убежище\! Глорп\!
m.impostoclaus=Глорп, глорп, глорп\! Счастливого Зимнего Фестива!\n\nВойдите в праздничное настроение с боями снежками на зимних уровнях Локаута и обменяйте эти монеты Крокмо на великолепные Санти Шляпы\!
m.impostoclaus_1a=Глорп\! Глорп\! Глорп\! Счастливого Зимнего Фестива!\n\nЭто особенное время года наконец наступило, когда деликатный покров чудесного белого снега покрывает Убежище, и каждый Stranger, каждый снайп и каждый Рыцарь наполняет свои сердца праздничным настроением.\n\nНо вам я должен сказать, что, к сожалению, не всё хорошо. Без мотива или причины группа сквиженных-сердцем гринчлинов угрожает этому Зимнему Фестивалю\!
m.impostoclaus_2a=Такая смелость, такой дух\! Да, возможно, с немного удачи у вас есть шанс против ужасных злодеев, что хотят разрушить зимнефестивальные мечты. \n\nТак что обратите внимание на добавление зимнефестивальной миссии, поднимите меч, и я дам вам награды\!
m.impostoclaus_3a=Глорп\! Глорп\! Глорп\!
m.impostoclaus_fail=Наша миссия по спасению Зимнего Фестиваля заканчивается поражением\! Гринчлины победили, нам нужно отступить\!
m.impostoclaus_win=Глорп\! Глорп\! Зимний Фестиваль спасен, и одно ясно\: все сердца теперь поют с праздничным настроением\!
m.lab_biscotti_1a=Привет\! Я Бискотти, главный повар Скайларка\! Я всё ещё настраиваю алхимизатор пищи для бойцов-спрайтов, так что загляните позже.
m.lab_biscotti_2a=Действительно! Боевой спрайт способен преобразовывать материю в полезную энергию. Эта машина может принимать определенные материалы и превращать их в особый корм для спрайтов… то есть, когда её наконец откалибруют.
m.lab_biscotti_3a=Привет, {0}! Как шеф-повар «Скайларка», я был назначен курировать разработку рациона питания для наших новых спутников-спрайтов. Похоже, в Часовых механизмах они действительно сильно разнообразились. Будет интересно посмотреть, как они будут развиваться. \n\nУ вас есть вопросы по поводу кормления и ухода за вашим спрайтом?
m.lab_biscotti_3aa=У вас есть еще вопросы по поводу кормления и ухода за вашим спрайтом?
m.lab_biscotti_4a=Накормить своего боевого спрайта очень просто! Просто откройте интерфейс боевого спрайта и выберите его значок. Там вы сможете выбрать материал из своего арсенала и поместить его в лоток для кормления. \n\nПосле того как вы добавили материал в очередь для синтеза вашим спрайтом, просто нажмите «Накормить спрайта» — и приятного аппетита!
m.lab_biscotti_4b=У спрайтов есть определенный аппетит, который ограничивает количество материалов, которые они могут съесть за один раз. Когда вы кормите своего спрайта материалом, его аппетит уменьшается. Как только он полностью иссякнет, вы не сможете его накормить.
m.lab_biscotti_4c=В любой момент времени у спрайта есть «любимый предмет» — особый материал, который он любит есть больше всего. Подача такого материала вашему спрайту — отличное угощение, которое дает ему много тепла.
m.lab_biscotti_4d=Необходимые предметы появятся, как только ваш спрайт будет готов к повышению уровня. После того как ваш спрайт поглотит достаточно тепла, над кормушкой появится уведомление о «необходимом материале». Этот материал НЕОБХОДИМО дать спрайту, чтобы он мог развиваться дальше.
m.lab_biscotti_5b=Аппетит спрайта со временем будет естественным образом расти, хотя и медленно. Чтобы быстро увеличить аппетит, отправьте его на пробежку в Часовой механизм. Поглощение тепла от монстров — отличный способ сжечь калории!
m.lab_biscotti_5c=Любимые предметы можно создать с помощью этой самой алхимической машины, которую вы видите перед собой. Для этого нужно всего лишь два одинаковых материала и несколько минералов из Часового механизма. Просто!
m.lab_biscotti_5d=В большинстве случаев это просто стандартный любимый предмет, но когда ваш спрайт будет готов к эволюции, понадобится катализатор эволюции.
m.lab_hahn_1a=(Хан выглядит занятым и, похоже, не замечает вас)
m.lab_harness_1a=Я Райли, помощник Морлина.  Я сейчас работаю над изобретением способа еще больше усилить наших боевых спрайтов.  Загляните позже, когда у вас появится спрайт с постоянной привязкой.
m.lab_knight1_1a=Мы спасли из «Скайларка» всё, что смогли, а остальное сколотили с помощью Странников.
m.lab_knight2_1a=Излучения из ядра этого мира оказали странное воздействие на наших боевых спрайтов.
m.lab_knight3_1a=Нам удалось извлечь из «Скайларка» вторичный генератор практически в целости и сохранности. К сожалению, его мощности едва хватает на работу этой лаборатории, не говоря уже о питании нашего корабля.  Нам нужно найти другой источник энергии, если мы хотим когда-нибудь вернуться домой.
m.lab_knight4_1a=Разведывательные отряды обнаружили несколько странных и удивительных вещей внутри «Часового механизма».
m.lab_knight5_1a={0}, ты уже видел эти минералы во время своих путешествий?  Они просто потрясающие! Тебе стоит спросить об этом у шефа-геолога Найта Вегнера.  Я слышал, что он настоящий эксперт по минералам!
m.lab_knight6_1a=Мы не будем рисковать с этим артефактом, который ты нашел, {0}. Когда-нибудь гремлины могут вернуться за ним.  Будь начеку!
m.lab_knight7_1a=Первые показания зашкаливают, {0}\!  Мы никогда раньше не сталкивались с чем-то подобным.  Потребуется некоторое время, чтобы полностью понять, для чего используется этот объект.
m.lab_progress_1=Готов поспорить, эти «Колокола Зверей» тебе очень пригодились, да, {0}?
m.lab_progress_2=Спасибо, что победил Снарболакса. Слишком много наших оруженосцев погибло из-за этого чудовища. Теперь, когда эта угроза осталась позади, я могу спать спокойнее. \n\nС нетерпением жду рассказов о твоих будущих подвигах, солдат!
m.lab_progress_3=К счастью, ущерб, нанесенный лаборатории, оказался не слишком значительным. По крайней мере, оборудование для обслуживания наших боевых спрайтов осталось целым.
m.lab_progress_4=Мы удвоили количество патрулей вокруг Хейвена на случай нового нападения, но у меня такое чувство, что те гремлины уже получили то, за чем пришли...
m.lab_progress_5=Потребуется немного времени, чтобы все наше оборудование снова заработало в полную силу.
m.lab_progress_6=Этот дворец из желе... какое странное место. И еще, интересно, что это за странное устройство, которое ты нашел внутри дворца? Похоже, его не создавали такие существа, как желе.
m.lab_progress_7=Очень редко мне встречались желе, которые не нападали на нас при встрече. Сейчас я удаляю шипы с этого. Они довольно милые, когда не пытаются тебя пронзить!
m.lab_progress_8=Этот гремлин родом из колонии Эмберлайт, расположенной глубоко в Часовых механизмах. Это группа изгоев, которые восстали против короля Тинкинзара и Алого Ордена. Мы надеемся заключить с ними договор, который позволит нам использовать их колонию в качестве оперативной базы для наших миссий в глубинах подземелий.
m.lab_progress_9=Еще одно странное устройство\! Очевидно, что это устройство не было создано альмирианцами, так же как и предыдущее устройство не было создано медузами. Однако мы заметили одну вещь\: это устройство все еще активно. Более того, энергетическая сигнатура похожа на показания, которые мы сняли с Артефакта до того, как его украли. Думаю, это требует дальнейшего исследования.
m.mission_apocrea_warden=Если ты собираешься идти дальше, будь начеку. Я чувствую ловушку.
m.mission_camefrombelow=Все исчезли. Оно... Оно пришло из-под земли.
m.mission_cogknight_ambushed=Б-будь осторожен... они... они повсюду... в тени...\!
m.mission_cogknight_battle_a=Не могу... идти дальше...
m.mission_cogknight_battle_b=Мы не сможем продвинуться дальше в базу, пока ты не уничтожишь эти артиллерийские пушки\!
m.mission_cogknight_battle_c=Зайди внутрь, воспользуйся лифтом... взорви то, что управляет этими пушками!
m.mission_cogknight_battle_d=Ты справился! Этот взрыв вывел пушки из строя!
m.mission_cogknight_camp2_a=Мы видели взрывы даже из лагеря! Это было потрясающе!
m.mission_cogknight_camp2_b=Без твоей помощи мы бы не прошли мимо этой артиллерии!
m.mission_cogknight_camp2_c=Держись!
m.mission_cogknight_camp2_d=Мы видели, как гремлины зарывают там мины, смотри под ноги!
m.mission_cogknight_camp2_e=Мы удержим линию!
m.mission_cogknight_camp2_f=Прокрадись вокруг и посмотри, сможешь ли ты проникнуть внутрь той сторожки!
m.mission_cogknight_camp2_g=Если бы только был способ открыть эти ворота!
m.mission_cogknight_camp3_a=Мы внутри!  Вот оно!
m.mission_cogknight_camp3_b=Будьте осторожны при столкновении с Военачальником!
m.mission_cogknight_camp3_c=Мы прорвали их оборону. Теперь они загнаны в угол!
m.mission_cogknight_camp3_d=Удачи там, мы знаем, что у вас получится!
m.mission_cogknight_camp_a=Наконец-то подкрепление из штаба Спирали!
m.mission_cogknight_camp_b=Один из наших отрядов прорвался внутрь, но оказался в окружении, спасите их, если сможете!
m.mission_cogknight_camp_c=Нам нужно, чтобы вы проникли внутрь и уничтожили эти пушки!
m.mission_cogknight_camp_d=Будь осторожен, эти Гремлины обнесли место колючей проволокой.
m.mission_cogknight_camp_e=Гремлины прячут взрывчатку в тех бункерах, я уверен, что если бросить что-нибудь внутрь, это их взорвет!
m.mission_cogknight_camp_f=Будь осторожен там!
m.mission_cogknight_epilogue_a=Не беспокойся о Фероне, он очень скоро поправится.
m.mission_cogknight_epilogue_b=Подумать только, всё это могло обрушиться на Хейвен...
m.mission_cogknight_epilogue_c=Победа за нами!
m.mission_cogknight_epilogue_d=Пока что мы не нашли тело Сируса, но никто не мог выжить после такого взрыва.
m.mission_cogknight_epilogue_e=Расшифровать эту гремлинскую криптографию займет целую вечность...
m.mission_cogknight_prisoner_a=Военачальник Сирус сошел с ума!  Мне нужно сбежать в Эмберлайт.
m.mission_cogknight_prisoner_b=Я сбегу, когда будет безопасно.  Спасибо, что спасли меня!
m.mission_cogknight_wounded=. . .
m.mission_cogmaster_1=Две пушки перестали стрелять!  Немедленно доложите, вы, ублюдки!
m.mission_cogmaster_2=Посторонние в моем Арсенале?  Я позабочусь, чтобы вы ушли… тихо.
m.mission_cogmaster_3=Думаете, можно просто открыть входную дверь и войти? Вы за это поплатитесь!
m.mission_cogmaster_4=Кто послал вас, адские железные убийцы?  Это был Херекс? Неважно. Есть способы это выяснить...
m.mission_collectorknight_a=Выглядит искусственно, но, кажется, обладает зловещим сознанием...
m.mission_collectorknight_b=Они вырываются из-под земли повсюду вокруг нас...
m.mission_collectorknight_c=От этого места у меня мурашки по коже.
m.mission_collectorknight_d=Пожалуйста, верни боевых духов!
m.mission_crimson_chaos_recon_1=Рад встрече! Когда я услышал, что посылают тебя, {0}, я не поверил. Победитель Ванадука! Для меня честь докладывать тебе.
m.mission_crimson_chaos_recon_2=Вот в чем дело, {0}, ничего. Мы следили за базой внизу несколько недель, а потом там наступила тишина. Совершенно неожиданно. Мы не знаем, что ты там найдёшь. Наши датчики не фиксируют никаких признаков жизни.
m.mission_crimson_propaganda_1=Девять видят всё, слышат всё.
m.mission_crimson_propaganda_2=Только король Тинкинзар владеет Железным Законом!
m.mission_explosion_warning=Внимание! Обнаружены взрывы! Немедленно эвакуируйтесь!
m.mission_gatelock_disengage_1=Разблокировка замка ворот 1.
m.mission_gatelock_disengage_2=Разблокировка замка ворот 2.
m.mission_lab_bystander_a=Они появились из ниоткуда...
m.mission_lab_bystander_b=Наши охранники были перебиты.  У нас не было ни единого шанса.
m.mission_lab_bystander_c=Мы устроили баррикаду вокруг Артефакта, но её прорвали. Простите...
m.mission_lockedoutknight_a=Спасибо за помощь!
m.mission_lockedoutknight_b=Мы обеспечивали безопасность лифта, когда дверь закрылась за нами.
m.mission_lockedoutknight_c=Спасибо, что спасли нашу команду!
m.mission_researcher_a=Мы изучали этот метеорит, когда появились эти лишайники!
m.mission_researcher_b=Мы отрезаны!  Пожалуйста, помогите нам победить этих лишайников!
m.mission_researcher_c=Не знаю, сколько продержится наше силовое поле...
m.mission_survivorknight_a=Б-будьте осторожны... оно преследует нас... следит за каждым нашим движением!
m.mission_survivorknight_b=Оно выследило нас... схватило остальных членов моей команды...
m.mission_survivorknight_c=Страж Диких Лесов… ужасный Снарболакс!
m.mission_wildwoods_defeatedknight=. . .
m.mon_pocket_1=Приветствую! Я Нонна из Агентства по усыновлению Эмберлайт! \n\nМы в Агентстве по усыновлению Эмберлайт собираем маленьких монстров, которые заблудились в самых темных глубинах Часового механизма.  Оставшись без дома и без возможности позаботиться о себе, мы стараемся найти этим нуждающимся монстрам хороший дом! \n\nКупив один из этих очаровательных «кармашков с монстрами», вы сможете носить с собой своего собственного маленького монстра! \n\nАгентство по усыновлению «Эмберлайт» будет время от времени посещать Хейвен, и вы никогда не знаете, что мы сможем вам предложить!
m.monster_codex_battlepod=Битлпод \nЭти неподвижные автоматоны скрывают небольшой арсенал под своей двойной бронированной броней. Каждый Битлпод обладает уникальным набором атак и защитных способностей, которые не дадут вам заскучать.
m.monster_codex_devilites=Девилайты \nДевилайты — рабочая лошадка подземного мира. Если Босс Ямы поймает бездельничающего Девилайта, он может повысить его до разъярённого Овертаймера или покорного Йесмана.
m.monster_codex_roarmulus_twins=Близнецы Роармулус \nЭти гигантские «пушечные щенки» обладают непробиваемой броней и мощным вооружением. Их кожа настолько толстая, что они уязвимы только для огня своих же собратьев.
m.monster_codex_royal_jelly=Королевское молочко \nЭтот огромный желеобразный куб имеет короткий фитиль и любит кидаться своим весом. Когда его королевские дегустаторы отсутствуют, отравленный парфе станет настоящей королевской болью.
m.monster_codex_snarbolax=Снарболакс \nМифический Снарболакс обладает иммунитетом к атакам рыцарей. Если позвонить в Колокол Зверей, когда он находится поблизости, зверь будет оглушен и подчинится.
m.monster_codex_trojan=Троян \nЭти огромные левиафаны неуязвимы с передней стороны. Поразите кристалл на их спине, чтобы сбить их с ног.
m.monster_codex_vanaduke=Лорд Ванадук \nО вечном герцоге Альмирийской империи известно очень мало. Наши датчики показывают, что маска является источником силы, а также потенциальной слабостью.
m.monster_codex_zombie=Зомби \nШатающиеся зомби воскреснут из мертвых, если их убить рядом с Тотемом Грим. Отведите их подальше, чтобы вы могли дать им вечный покой.
m.moorcroft_archives_1a=Добро пожаловать в архивы Муркрофта, путешественник. Здесь вы найдете знаменитую коллекцию древних гримуаров из многих забытых миров. Это потрясающее зрелище, я знаю! \n\nВы можете свободно осматриваться, но, пожалуйста, не прикасайтесь — некоторые из этих книг наполнены невероятной мистической силой. Вы можете пораниться!
m.moorcroft_archives_2a=Ой, {0}, это ужасно, просто ужасно! \n\nУжасающее полчище чёрных кошек вырвалось из какого-то мрачного портала в глубине Часового механизма и напало на Архивы Муркрофта!
m.moorcroft_archives_3a=Черные кошки — это самые мрачные души бывшего племени кошек. На них лежит самое тяжелое из всех проклятий, и они бездумно стремятся поглощать магические ауры. Это постоянное поглощение силы делает их невероятно сильными. \n\nСкорее всего, их привлекла сила, излучаемая древними гримуарами, хранящимися здесь, в Архивах. \n\nПожалуйста, {0}, ты должен помочь нам восстановить Архивы Муркрофта\!
m.moorcroft_archives_4a=Затем прочеши Часовой механизм в поисках этих проклятых кошек и уничтожь их\! Даже если они съели книги, ты сможешь восстановить Древние Страницы. Эти страницы можно отдать Монтегю в обмен на награды. Помоги нам, и мы поможем тебе! \n\nЧерных кошек можно встретить случайно при столкновении со спикошами на 2-м и 3-м уровнях (Врата Аркады и Миссии). Есть также ежедневная Миссия Престижа, которая, скорее всего, приведет к гнезду черных кошек.
m.moorcroft_archives_5a=Отлично! Удачи тебе, {0}. Она тебе понадобится — черные кошки — это несчастная шайка...
m.npc_campguard_a=Будь осторожен там, рыцарь.
m.npc_campguard_b=Добро пожаловать в наш лагерь! Присядь у костра, если хочешь немного отдохнуть.
m.npc_campguard_c=Мы здесь немного отдыхаем, прежде чем отправиться глубже в Часовые механизмы.
m.npc_campguard_d=Я здесь дежурю.  Никогда не знаешь, когда могут напасть монстры.
m.npc_campguard_e=Рад вас видеть!
m.npc_campknight_a=Присаживайтесь и отдохните немного.
m.npc_campknight_b=Подойдите, согрейтесь у костра.
m.npc_campknight_c=Я уже чувствую, как мороз отступает.
m.npc_captainknight_a=Вспомните о своём обучении, рыцари!
m.npc_captainknight_b=Поднимите щиты, чтобы блокировать атаки!
m.npc_captainknight_c=Не забудьте взвести бомбу!
m.npc_captainknight_d=Координируйте свои атаки!
m.npc_captainknight_e=Используйте окружающую обстановку в своих интересах!
m.npc_captainknight_f=Укрывайтесь, если вас заваливают!
m.npc_captainknight_g=Не забывайте помогать товарищам по отряду!
m.npc_graveknight_a=Нет, их просто слишком много... Я больше не могу с ними сражаться. Осталось только свет этих свечей. Без него я...
m.npc_lostknight_a=Спасибо, что «спасли» меня, но я чувствую себя хорошо.
m.npc_lostknight_b=Приятно знать, что штаб-квартира «Спирали» не забыла обо мне.
m.npc_lostknight_c=Я мог бы уйти, но подумай, чему я мог бы научиться, если бы остался!
m.npc_mineraltech_a=Я полевой исследователь, работающий под руководством шефа Гео Найта Вегнера.
m.npc_mineraltech_b=Хм, похоже, определенные комбинации привлекают разных монстров.
m.npc_mineraltech_c=Не обращай внимания на Хьюберта, его уже обезопасили.
m.npc_minerknight_a=Ты можешь нести только один минерал за раз, так что выбирай самый большой.
m.npc_minerknight_b=Штаб «Спирали» хочет, чтобы мы доставили эти минералы обратно в Хейвен.
m.npc_minerknight_c=Говорят, эти минералы питают все врата в Аркаде.
m.npc_onwatch_a=Я сейчас не могу разговаривать. Я на вахте.
m.npc_onwatch_b=Я знаю, что они вернутся.
m.npc_onwatch_c=Ты что-нибудь видел там?
m.npc_recruit_a=Мне просто нужно немного отдохнуть, прежде чем двигаться дальше.
m.npc_recruit_b=Я оставил свой калибр на станции «Арсенал»...?
m.npc_recruit_c=Думаю, мне нужно изготовить лучший щит, когда я вернусь в Хейвен.
m.npc_recruit_d=Это моя первая экспедиция в Часовые механизмы!
m.npc_recruit_e=Есть какие-нибудь советы для меня?
m.npc_recruit_f=Где здесь предохранитель?
m.npc_recruit_g=Ты уже видел комнату опасностей? Слышал, что там очень сложно.
m.npc_rummageknight_a=Я знаю, что это было где-то здесь...
m.npc_rummageknight_b=Я сейчас не могу разговаривать.
m.npc_supplies_a=Эти припасы пришли как раз вовремя.
m.npc_supplies_b=Уже несколько дней, как у нас не было свежих припасов.
m.npc_supplies_c=Спасибо, что пополнили запасы нашего лагеря.
m.npc_supply_teaser_knight=Извини, у меня мало времени на разговоры. Мне нужно доставить все эти припасы на наши передовые посты. Люди часто забывают, что без таких рыцарей, как мы, доставляющих припасы в Часовые механизмы, наша способность разведывать отдаленные территории была бы сильно ограничена. Какая неблагодарная работа, да?
m.npc_survivorknight_a=Они... Они всех поймали, кроме меня. Я просто спрятался в углу.
m.npc_survivorknight_b=Они пришли из темноты. Не было времени реагировать.
m.npc_survivorknight_c=Я не просил об этом.
m.npc_teaser_knight=Последнее задание было действительно странным. Мы расчищали путь к лифту, когда вдали заметили какие-то странные сооружения. Но мы не могли понять, как до них добраться.  Наверное, придется просто держать их на примете в будущем.  В конце концов, «Часовой механизм» постоянно меняется.
m.npc_techknight_a=Я собираю образцы со всего этого пласта.
m.npc_techknight_b=Хорошие данные — как хороший пудинг: их много не бывает.
m.npc_techknight_c=Еще несколько тестов...
m.npc_veteran_a=Я всегда ношу с собой разнообразное снаряжение... на всякий случай.
m.npc_veteran_b=Не забудь свой щит, он спасет тебе жизнь!
m.npc_veteran_c=Я всегда ношу с собой бластер, никогда не знаешь, когда он может пригодиться.
m.npc_veteran_d=Я должен уберечь этих новобранцев от неприятностей.
m.npc_veteran_e=Бомба отлично подходит для борьбы с ордой монстров.
m.npc_veteran_f=Я всегда ношу с собой меч на случай ближнего боя.
m.npc_veteran_g=Подготовка — лучший способ выжить в Часовых механизмах.
m.npc_veteran_h=Держись рядом со своим отрядом — помни, что в одиночку здесь опасно!
m.och_leader_1_1a=Рад встрече, {0}\! Рад, что штаб Спирали прислал нам подкрепление, и как раз вовремя\! Мы в безвыходном положении и нуждаемся в твоей помощи\!
m.och_leader_1_2a=Наше продвижение остановилось из-за той артиллерии на стенах, которая прижимает нас к земле.  Ранее мы устроили отвлекающий маневр, чтобы небольшой отряд рыцарей смог прорвать линию фронта и вывести эту артиллерию из строя... но, похоже, у них не получилось.  Теперь они застряли там, а мы застряли здесь\! \n\nМне нужно, чтобы ты прорвал линию фронта, проник в центр управления артиллерией и нашел способ навсегда вывести эти пушки из строя\!  Тем временем я перегруппирую войска, чтобы мы могли поддержать твой штурм.  Удачи там, солдат\!
m.och_leader_2_1a=Отлично, {0}\!  Это было настоящее фейерверк-шоу\!  Благодаря тебе мы смогли очистить эту проклятую зону высадки и перенести нашу оперативную базу к внутренним воротам\!
m.och_leader_2_2a=Эти массивные затворы преграждают нам путь, и, судя по разведывательным данным, открыть их можно только изнутри двух соседних сторожевых домиков. Я не буду напрасно тратить жизни солдат, атакуя домик с фронта. Мне нужно, чтобы ты нашел обходной путь. Обойди оборону с фланга, проникни внутрь домика и открой ворота!
m.och_leader_3_1a=(Лейтенант  Ферон, похоже, ранен) \n\nВот ты где, {0}, пришел на грандиозный финал, да?
m.och_leader_3_2a=Это были эти проклятые маскирующиеся чудовища\! Они вышли из теней и устроили засаду.   Когда я доберусь до Сееруса, я... Ааа! \n\n(Ферон падает на бок, явно получив более серьезные ранения, чем казалось сначала) \n\nЧерт, я с трудом держу меч...
m.och_leader_3_3a=Да, похоже, я больше не способен сражаться.  Теперь все зависит от тебя, {0}. Только ты обладаешь силой, чтобы противостоять Сиерусу и привлечь его к ответственности.  Сегодня здесь погибло много рыцарей.  Удостои их память чести, завершив начатое дело!
m.och_leader_4_1a={0}\!  Я едва могу поверить, что тебе удалось вступить в прямой бой с Военачальником и выйти из того ада живым!  В тебе заложено все, что нужно настоящему герою!
m.och_leader_4_2a=С помощью биотехников я скоро поправлюсь и вновь буду готов к службе.  {0}, я не могу переоценить, насколько важна эта победа для всех Рыцарей Спирали.  Вы помогли нам нанести мощный удар по «Алому Ордену», уничтожив их Великий Арсенал. \n\nБлагодаря вам, в ближайшее время у сил гремлинов не будет больше таких огромных военных машин. А благодаря тому, что наши техники изучают то, что находится в личных покоях Сируса, мы, возможно, получим ценную информацию о технологии гремлинов или даже узнаем местонахождение остальной части «Алого Ордена»!
m.och_leader_4_3a=Найдите время, чтобы отдохнуть и насладиться этой грандиозной победой.  Штаб Спрайла, несомненно, снова обратится к вам!
m.please_wait=Пожалуйста, подождите
m.rc_bomb_1a=Уже успели опробовать бомбы? В отличие от других видов оружия, бомбы можно использовать только в качестве заряженной атаки. Любые другие действия приведут к тому, что она просто погаснет. Но если вы зарядите их... БУМ! Они могут нанести серьезный урон сразу нескольким монстрам!
m.rc_end_1a=Вот и все, новобранец. Это последние ворота, ведущие из Спасательного лагеря через пропасть в Хейвен. Как только ты их пройдешь, тебе больше не придется сюда возвращаться. В Хейвене ты сможешь купить все, что есть в Спасательном лагере, и многое другое. \n\nЕсть вопросы?
m.rc_end_2a=Чем я могу тебе помочь?
m.rc_end_3a=Нет, вернуться назад ты не сможешь. Как только ты доберешься до Хейвена, твоё обучение будет завершено, и твоей новой задачей станет помощь Рыцарям Спирали, которые теперь базируются в Хейвене.
m.rc_end_3b=Хотя путь опасен, вам не придется углубляться слишком далеко, так что с монстрами, которых вы встретите, должно быть достаточно легко справиться. Однако разведчики сообщают об усилении активности гремлинов в этом районе с тех пор, как мы разбили лагерь, так что будьте осторожны.
m.rc_end_3c=Как только вы доберетесь до Хейвена, я бы посоветовал вам осмотреть город и ознакомиться со всеми достопримечательностями и услугами, которые он может предложить. Вы также получите доступ к более мощному снаряжению, чем то, что мы предлагаем здесь, и будете окружены гораздо более опытными рыцарями. Обязательно обращайтесь к ним за помощью, если заблудитесь.
m.rc_greet2_1a=Приветствую, я командир отряда Грета.  Вы, должно быть, {0}. Рендон сказал, что мы должны вас ждать, и как раз вовремя.  Этот спасательный лагерь переживает кризис.
m.rc_greet2_2a=Короче говоря, в лагере нет энергии, а солнце скоро сядет. Прошлой ночью в темноте на нас набросились всевозможные ужасные монстры.  Мы ничего не видели и не могли запустить наши оборонительные турели. \n\n...мы потеряли много новобранцев. \n\nНам нужно направить энергию в Спасательный лагерь, чтобы мы смогли создать оборонительный периметр до наступления ночи\!
m.rc_greet2_3a=Наши сканирования обнаружили древний генератор под этим лагерем.  Он должен подавать энергию на поверхность, но, похоже, что-то отводит её в сторону. \n\nНам нужно, чтобы ты отправился исследовать древний генератор и вернул энергию на поверхность.  Но тебе нужно быть готовым — это совершенно неизведанная территория, кишащая монстрами. \n\nРендон сказал, что хочет встретиться с тобой, прежде чем ты приступишь к этой миссии.  Почему бы тебе сначала не поговорить с ним?
m.rc_greet2_4a=Пожалуйста, {0}, помоги нам восстановить энергоснабжение спасательного лагеря, чтобы мы могли организовать оборонительный периметр.  Мы не можем позволить себе потерять еще больше новобранцев из-за ночных тварей\!
m.rc_greet3_1a=Ты восстановил электроснабжение и спас нас всех, {0}\!  Я не знаю, как тебя отблагодарить, все эти новобранцы обязаны тебе жизнью. \n\nТеперь тебе следует попытаться связаться со штабом «Спирали» через свой коммуникатор.
m.rc_injured_a=Прошлой ночью ужасные монстры напали на нас в темноте.  Это был полный хаос. Без питания для турелей мы не могли защищаться. \n\nСтолько храбрых рыцарей погибло...
m.rc_injured_b=Один из тех механических монстров схватил меня.  Когти этой проклятой твари прорвали мою броню насквозь\!
m.rc_injured_c=Благодаря тебе нам не придётся пережить ещё одну ночь, подобную прошлой...
m.rc_injured_d=Когда энергия восстановилась, я смог починить свою броню. Будем надеяться, что я больше не столкнусь со слишком большим количеством этих чудовищных ржавых корыт!
m.rc_instruct_1a=Приветствую, новобранец.  Всегда приятно видеть, как еще один рыцарь добирается до Спасательного лагеря.  Полагаю, ты хочешь подготовиться к путешествию в Хейвен.  Хорошее место для начала — это ворота, ведущие в Часовой механизм.  Просто подойди к панели управления на северном конце лифта и нажми кнопку действия ([[?ACTION]]).\n\nЕсть вопросы?
m.rc_instruct_2a=Что бы ты хотел узнать?
m.rc_instruct_3a=Часовой механизм — это огромный комплекс шестеренок и механизмов, расположенный прямо под поверхностью всего этого мира. Это действительно невероятное зрелище. Мы оказались в странном и опасном мире. Будь осторожен.
m.rc_instruct_3b=«Ворота» — это точка входа в Часовой механизм. Они выглядят как лифты, которые вы видите перед собой. На каждых воротах установлен монитор, на котором отображается уникальный значок ворот, а также панель управления, позволяющая пользователю пройти через ворота. Эти ворота всегда приведут вас в одно и то же место, но под другими воротами находятся подвижные полы. В таких случаях вы никогда не знаете, что вас ждет дальше!
m.rc_nervous_1a=Я хочу купить что-нибудь на короны, заработанные на тренировочной площадке, но этот торговец меня совершенно пугает. Как ты думаешь, что он скрывает под этими одеждами?\!
m.rc_recruit_a=У нас может и нет электричества, но я могу хотя бы разжечь костёр, чтобы обеспечить немного света на эту ночь.
m.rc_recruit_b=Из спасательных капсул удалось спасти не так много снаряжения.  Его даже не хватит на каждого здорового рыцаря.
m.rc_recruit_c=Ты можешь в это поверить?  Вся эта пропасть заполнена какой-то гигантской машиной.  Кажется, она уходит вниз бесконечно. \n\nИнтересно, вся ли планета такая?
m.rc_recruit_d=Между теплом костра и безопасностью оборонительных турелей, думаю, сегодня ночью я буду спать крепко.
m.rc_recruit_e=В воздухе витает напряжение! Похоже, сегодня ночью нам всё-таки не придётся вступать в последний бой!
m.rc_recruit_f=Говорят, что тебе предстоит спуститься на этом лифте в пропасть внизу. Ты чертовски смелее меня...
m.rc_rhendon_1a=Как ты думаешь, что это за штука, {0}?  Должно быть, это важно, раз тот Развог так взбесился, когда ты это стащил. \n\nПоделом ему за то, что пытался тебя убить и все такое!
m.rc_sleepy_1a=Тренировки... такие тяжелые... просто нужно отдохнуть.... мои глаза...
m.rc_soil_1a=Я собираю геологические образцы для штаб-квартиры Спирали. Пока что мои тесты выявляют сотни уникальных образцов почвы в каждом сантиметре земли под нашими ногами. Это невозможно, я, наверное, просчитался...
m.rc_technician_a=Судя по этим сканам, в недрах под лагерем должен быть какой-то источник энергии, но он каким-то образом отводится...
m.rc_technician_b=Без энергии эта штука бесполезна.  Как же нам теперь защищаться от этих монстров?\!
m.rc_technician_c=Энергия снова поступила в лагерь\!  Ты это сделал, {0}\!
m.rc_vet_1a=Спасибо за помощь. Береги себя\!
m.rc_vet_2a=Всегда будь начеку. Кто знает, какие еще опасности ждут нас в этом мире?
m.rc_vet_3a=Я не смогу успокоиться, пока мы не свяжемся со штаб-квартирой «Спирали».
m.rc_virgil_1a=Будь осторожен впереди.
m.rc_virgil_2a=Этот проход ведет прямо над огромной пропастью.  Не хочу, чтобы тебя сдуло в бездну внизу.
m.rc_virgil_3a=Похоже, он ведет к какому-то лифту, но без питания все это просто не работает.
m.rc_virgil_4a=Привет, {0}.  Когда ты восстановил питание в лагере, этот лифт тоже включился.  Полагаю, он спустит тебя глубоко в пропасть внизу, и что ты там найдешь — никто не знает. \n\nЕсли твоя цель — спуститься в эти глубины, убедись, что ты готов встретиться с тем, что тебя там ждет.
m.rc_warning_1a=Вверху по этой лестнице находятся ворота в Хейвен. Обязательно поговори с Виргилием перед входом, чтобы знать, чего ожидать.
m.rescue_door_sk_success=Отличное время! Ты свободен. Удачи!
m.rescue_knight_1=Спасибо, что освободил меня, друг.
m.rescue_knight_2=Уф! Там было тесно.
m.rescue_knight_3=Мне очень хотелось размять ноги.
m.rescued_stranger_1a=Привет, малыш.  Ты обнаружишь, что в этом новом мире много опасностей, но также много возможностей для смелых и предприимчивых!  Твой товарищ ждет тебя чуть дальше по тропе.  Мы, несомненно, увидимся снова.  Пока!
m.rfc_court_1a=Еще раз приветствую тебя, рожденный звездами.
m.rfc_court_2a=Да, мы, духи природы, — это дождь, корни и почва. Но ты не такой, как мы. Ты похож на тех, кто внизу.
m.rfc_court_3a=К сожалению, даже после восстановления нашей связи с Матерью-Духом мы можем сделать лишь немногое, чтобы спасти это место. Однако, даже когда один путь закрывается, другой может открыться. Такова природа этого изменчивого мира.  Удачи, рожденный звездами.
m.rfc_court_4a=Хотя ты и победил Ванадука, кажется, что проклятие, которое он наложил на это королевство, всё ещё не снято. Чтобы сдержать эти бушующие теневые пламени, нам потребуются все наши силы.
m.rfc_court_5a=Мы все почувствовали тот момент, когда ты победил Ванадука. Вся цитадель содрогнулась, когда он пал, и на мгновение нам показалось, что это королевство будет уничтожено вместе со своим правителем. Вы должны быть осторожны, бродя по этим залам, когда все вокруг рушится!
m.rfc_court_6a=Держитесь крепче, путешественник. Вы стоите во дворе Королевства Альмире. Разве вы не слышите, как трубы возвещают о возвращении наших могучих легионов? Разве вы не испытываете благоговейного трепета перед престижной геральдикой наших великих родов и государственных деятелей?
m.rfc_court_7a=(Ты чувствуешь огромную гордость, исходящую от падшего рыцаря, но он больше ничего не говорит и устремляет взгляд вдаль, к жизни, которую видит только он.)
m.rfc_court_7b=(Твои слова, похоже, не беспокоят падшего рыцаря, чей разум, кажется, затерялся где-то в славе его прошлой жизни.)
m.ritual_1a=Какой мрачный ритуал?
m.ritual_2b=Где ты это нашел?\! Отдай его\! Я наконец-то смогу завершить свою работу\! Но небольшое дружеское предупреждение\: я понятия не имею, что может случиться. Это может быть очень плохо. Тебе, наверное, стоит подготовиться на случай, если дела пойдут... наперекосяк.
m.ritual_3a=Ладно, начинаем...\n\nКАТ-ТУ... БЛУГАТО... НЭКО!
m.ritual_4a=Ну, это было неожиданно. В следующий раз у меня получится!
m.seerus_1=Ты ищешь силу? Ярость горящей звезды, заключенной в сталь? Я покажу тебе и то, и другое!
m.seerus_defeated=Лучше пусть всё сгорит, чем отдать Арсенал кому-то другому!
m.sl_guard_1=Рад встрече, рыцарь.  Перед тобой лифты, ведущие к тому, что в штаб-квартире Спирали называют «Логовами Теней».  В Логовах Теней обитают одни из самых могущественных монстров в Часовых механизмах, так что убедись, что ты полностью экипирован на 3-м уровне, прежде чем идти дальше.
m.sl_guard_2=Разведчики-рыцари, отважившиеся проникнуть в эти странные, новые миры, утверждают, что на каждом шагу их окутывает ужасная тьма.  Здесь происходит что-то еще, и нам нужны наши лучшие рыцари, чтобы это расследовать.
m.sl_guard_3=Все Логова Теней заперты странным механизмом, который можно открыть только с помощью «Ключа Теней».  Ключи Теней можно приобрести в Складе снабжения. \n\nКак только один из членов отряда использует Ключ Теней, состав отряда фиксируется и не может быть изменен, так что выбирайте членов отряда с умом!
m.sl_guard_4=Тогда удачи вам.  Логова Теней станут самым большим испытанием, с которым вам пришлось столкнуться.
m.sprite_tut_1a=Приветствую, {0}. Полагаю, у вас есть вопросы о боевых спрайтах. Чем я могу вам помочь?
m.sprite_tut_1aa=Есть еще вопросы о боевых спрайтах? Чем я могу вам помочь?
m.sprite_tut_2a=Боевые спрайты повышают свой уровень, накапливая тепло, точно так же, как ваше оружие и снаряжение. Они могут накапливать тепло двумя способами\: поглощая его во время сражений в «Часовых механизмах» и потребляя материалы, синтезируя их в тепло.
m.sprite_tut_2b=По мере повышения уровня спрайты осваивают новые боевые навыки и получают очки навыков.
m.sprite_tut_2c=Все боевые спрайты носят механическую броню, которая привязывает их навыки к определенному типу урона. Однако не все спрайты могут носить любую броню. Например, дракон не может наносить проникающий урон. \n\nПо умолчанию у вас есть железный ремень, который может надеть любой спрайт. Если вы хотите разнообразить свой арсенал, как вы, вероятно, делаете с оружием и снаряжением, вам нужно приобрести новые ремни.
m.sprite_tut_2d=Боевые спрайты получают перки на определенных уровнях, которые вы можете экипировать в интерфейсе боевого спрайта. Перки дают бонусы к вашим характеристикам.
m.sprite_tut_3a=Кормление спрайта материалами — самый быстрый способ повысить его уровень. Поговорите с Бискотти здесь, в Лаборатории, чтобы узнать больше о кормлении спрайтов.
m.sprite_tut_3b=Каждый боевой спрайт изучает три навыка, которые вы можете использовать в бою. Навыки изучаются автоматически на определенных уровнях по мере роста уровня спрайта. \n\nБоевые навыки становятся сильнее с помощью очков навыков.
m.sprite_tut_3c=Обратитесь к Райли здесь, в лаборатории, чтобы приобрести новые доспехи. После покупки доспехи автоматически добавляются в ваш список доспехов в интерфейсе боевого спрайта. \n\nКроме того, при покупке прямого улучшения для уже имеющихся доспехов они будут заменены на более совершенные.
m.sprite_tut_3d=Перки открываются случайным образом. Некоторые перки встречаются гораздо реже других, и для их полного открытия спрайту потребуется достичь очень высокого уровня. \n\nВы можете получать перки даже после достижения 100-го уровня!
m.sprite_tut_4a=Ваш спрайт будет эволюционировать по мере повышения его уровня. На определенных ключевых уровнях вашему спрайту потребуется «Катализатор эволюции», чтобы он мог повысить уровень дальше. После получения его ваш спрайт физически изменит свой облик! \n\nБудет интересно посмотреть, как эти странные, новые формы боевых спрайтов будут эволюционировать со временем.
m.sprite_tut_4b=Очки навыков получаются регулярно по мере повышения уровня спрайта. Их можно применять к навыкам в интерфейсе боевого спрайта. \n\nПри применении очка навыка вы должны выбрать параметр для улучшения, например скорость перезарядки или общий урон.
m.sprite_tut_4c=Улучшения снаряжения определенно стоят своих корон. Улучшенные версии каждого снаряжения сокращают время перезарядки боевых навыков\!
m.sprite_tut_5b=И не беспокойтесь о том, что вы распределите очки навыков «неправильно», ведь со временем вы наберете достаточно очков, чтобы полностью развить все свои навыки!
m.sprite_tut_6b=Как только вы распределите все свои очки навыков и достигнете очень высокого уровня со своим спрайтом, вы начнете выбирать свои «ультра-навыки». Ультра-навыки — это улучшенные версии навыков вашего спрайта. У каждого навыка спрайта есть два варианта ультра-навыка.
m.sprite_tut_7b=Вы можете выбрать только одно ультимативное умение на каждое умение спрайта, так что выбирайте с умом! Также обратите внимание, что выбор ультимативных умений еще больше изменит внешний вид вашего спрайта. \n\nБлагодаря всем этим вариантам ваш спрайт на максимальном уровне обязательно будет выглядеть  и вести себя иначе, чем остальные!
m.standby_knight_recruit_1=Мой меч в твоих руках!
m.standby_knight_recruit_2=Я прикрою тебя!
m.standby_knight_recruit_3=За Орден Спирали!
m.test_greeter_1=Ты здесь для тестирования?  Хорошо, обязательно ознакомься с последней информацией о том, что нужно тестировать, на доске «Тестовый сервер» в официальных форумах Spiral Knights.  Спасибо, проходи.
m.tier_1_requirements=Требования выполнены, {0}.  Чтобы продолжить и исследовать более глубокие уровни Часового механизма, вам сначала необходимо достичь 4-2-го ранга. \n\nВернитесь сюда после выполнения необходимых миссий ранга.
m.tier_2_requirements=Отлично, {0}.  Чтобы продолжить и исследовать более глубокие уровни Часового механизма, вам сначала необходимо достичь 7-1 ранга. \n\nВернитесь сюда, как только выполните необходимые миссии ранга.
m.tier_done=Отлично, {0}.  Достигнув требуемого ранга, вы получили разрешение исследовать более глубокие уровни Часового механизма.  Удачи вам.
m.tortodrone_haven_1=Штаб-квартира Спирали поручила нам расследовать сообщения о том, что по всему Часовому механизму появляются обломки павших тортодронов и скопления темной материи. Кора считает, что Демоны что-то замышляют. Есть доказательства, что они причастны к исчезновению тортодронов.
m.tortodrone_haven_2=Спрятанный в таинственном саду, мы обнаружили странный портал, который штаб-квартира называет Мрачными Вратами. Судя по тому, что нам удалось расшифровать, для его открытия понадобится какой-то ключ. Штаб-квартира Спирали полагает, что глифы, которые мы заметили у Фиендов, могут иметь какое-то отношение к открытию ворот.
m.tut_intro2_1a=...ответь, {0}, ты там?  Это разведчик-рыцарь Рендон!
m.tut_intro2_2a=Ты только что приземлился на поверхности Колыбели.  Моя спасательная капсула разбилась чуть севернее твоего местоположения.  Нам нужно встретиться и найти ближайший пункт сбора. \n\nБудь осторожен и держи меч наготове, здесь повсюду враждебные существа\!
m.tut_intro3_1a={0}\! Как я рад тебя видеть!  Это место такое чуждое, что я рад увидеть знакомое лицо, а не очередного врага.
m.tut_intro3_2a=Я установил связь с рыцарями, которые разбили спасательный лагерь впереди.  Если ты пойдешь на север, то в конце концов должен до него добраться. \n\nЯ пока останусь здесь и постараюсь найти других Рыцарей, чьи корабли разбились в этой местности.  Встретимся в спасательном лагере до захода солнца. \n\nИ если ты столкнешься с чем-то действительно опасным, нажми [[?DEFEND]], чтобы использовать свой щит!
m.tut_intro3_3a=Удачи!
m.tut_intro3_3b=Будь осторожен!
m.tut_intro3_3c=Помни, нажми [[?DEFEND]], чтобы использовать свой щит!
m.tut_intro4_1a=Я пока останусь здесь и найду других рыцарей, которые разбились в этой местности.  Встретимся в спасательном лагере на севере. \n\nИ если ты столкнешься с чем-то действительно опасным, нажми [[?DEFEND]], чтобы использовать щит!
m.tut_intro_1a=Добро пожаловать в Колыбель, новобранец! Всегда рад видеть рыцаря, который выжил после падения в целости и сохранности. Недалеко от твоего местоположения находится спасательный лагерь.  Я проведу тебя туда — но приготовь меч, на дороге впереди враги!\n
m.tut_warden_1a=Привет, рыцарь. Должно быть, ты и есть {0}. Рендон сообщил нам по рации, что ты уже в пути. Иди с нами, лагерь спасателей совсем рядом.
m.tut_warden_2a=Я тоже так думаю. Ну, тогда пойдем... \n\nПодожди, что-то не так. Держись крепче, кажется, к нам присоединились гости!
m.tut_warden_3a=Отлично сработано, {0}\! Похоже, ты знаешь, как вести себя на поле боя. \n\nПойдем, направляемся в лагерь. Может, ты поможешь нам разобраться, что, черт возьми, здесь происходит.
m.vise_seerus=Привет, парень!  \nСобираешься сразиться со стариком Сирусом, да?  Будь осторожен, у него не все в порядке с головой. Он совершенно не в себе.  \n\nМы с ним знакомы давным-давно, но ничего такого, что стоило бы вспоминать.  Если твоя миссия увенчается успехом, попробуй принести мне небольшой сувенир.  Я сделаю тебе что-нибудь приятное в благодарность за твои труды.
m.winterfest_branch_cont=Опасный путь ведет тебя дальше вверх по этой опасной горе. Пока что ты пройдешь мимо тайника с сокровищами Гринчлинов, спрятанного здесь, ради шанса на еще большую добычу выше в горах. \n\nБудь осторожен! Если тебя одолеют предстоящие испытания, прежде чем ты дойдешь до следующего укрытия, ты лишишься всех сокровищ!
m.winterfest_branch_exit=Путь в Хейвен позволит тебе сбежать с этой опасной горы и по пути собрать добычу из сокровищ Гринчлинов! \n\nОднако, если ты решишь пропустить это сейчас и продолжить подниматься в гору, тебя ждут еще более ценные сокровища...
m.winterfest_campknight_1a=Это опасное восхождение, {0}. Смотри под ноги и остерегайся ловушек гринчлинов!
m.winterfest_campknight_2a=Т-так... х-холодно.
