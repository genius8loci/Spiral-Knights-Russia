n.rfc_dungeon_1a=Я томлюсь в этих залах даже спустя все эти долгие столетия, лишённый вечного покоя моим проклятым повелителем. Я чувствую, как его дух цепляется за этот разрушенный мир и сейчас. Он отказывается уходить и тем самым обрекает нас всех.
n.rfc_dungeon_2a=Я был заточён здесь более тысячи лет назад за дерзость — осмелился возвысить голос против своего сюзерена. Моим наказанием стало провести здесь всю жизнь. Даже когда огонь поглотил цитадель, даже в смерти я не обрёл свободу. Моя душа прикована к этим проклятым камням.
