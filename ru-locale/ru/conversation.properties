m.almire_historian_1a=Мы восстановили те немногие записи из Совлитской Крепости, что касаются Королевства Альмир. В сочетании с крупицами знаний, полученными от природных спрайтов в самой Огнештормовой Цитадели, мы начинаем всё яснее понимать историю Альмира.
m.almire_historian_2a=Из найденных манускриптов мы узнали, что Огнештормовая Цитадель некогда была частью гораздо более обширного королевства, известного как Альмир, тысячи лет назад. Хотя его окружали воинственные нации, Альмир славился боевым мастерством своих многочисленных легионов. Эти легионы оберегали королевство долгие годы. Увы, их оказалось недостаточно.
m.almire_historian_3a=Что ж, теперь мы знаем, что существовали грандиозные цитадели, в которых размещались вооружённые силы Альмира, и великие поместья для его знатных родов. Должно быть, это было потрясающее зрелище. Мы полагаем, что остатки королевства всё ещё тлеют где-то в руинах. Возможно, что-то уцелело... хотя, судя по косвенным свидетельствам, надежда на это ничтожна.
m.arc_leader_1=Доброй встречи, солдат, и отличная работа — ты добрался до нашего базового лагеря в Хейвене. Я — лейтенант Ферон. Капитан Озло поручил мне руководить нашей горнодобывающей операцией в Часовом Механизме.\n\nПеред тобой — «Аркада», удивительный комплекс, служащий нашим связующим звеном с сердцем Часового Механизма. Раз ты здесь новенький, введу тебя в курс того, чем Спиральная штаб-квартира занимает нас здесь.
m.arc_leader_2=После крушения Скайларка его основной теариумный реактор взорвался, разрушив часть корабля и лишив его главного источника энергии. Поскольку мы до сих пор не нашли несколько сотен тонн теариума, просто валяющихся где попало, наша птичка фактически лишилась крыльев.\n\nС помощью Странников мы смогли организовать небольшую базу операций здесь, в Хейвене. Когда мы запустили наши системы, то обнаружили, что из сердца этой глыбы исходит энергетическая сигнатура беспрецедентной мощности.
m.arc_leader_3=Совершенно верно\! Ядро Часового Механизма вполне может содержать источник энергии, необходимый нам для создания нового питания Скайларка и восстановления его до рабочего состояния. Есть лишь одна проблема — сам Часовой Механизм по своему устройству напоминает какую-то безумную смертельную ловушку.\n\nДобраться до Ядра будет непросто...
m.arc_leader_4=Вот такой настрой мне по нраву. Работает это так\: ты используешь Врата впереди для исследования Часового Механизма и добычи особых минералов. Затем ты вкладываешь эти минералы обратно во Врата, чтобы изменить Часовой Механизм внизу, создавая новые, неизведанные уровни.\n\nМы полагаем, что минералы — это ключ к открытию пути к Ядру, нам лишь нужно понять, как их использовать\!
m.arc_leader_5=Ты доказал свою боеготовность, и я верю, что ты с честью послужишь Спиральному Ордену. Врата в Часовой Механизм — прямо впереди. \n\nУдачи тебе\!
m.arc_mintut_1=Приветствую. Я Вегнер, Главный Рыцарь-Геолог Скайларка и руководитель геологических исследований в Часовом Механизме.
m.arc_mintut_2=Во время своих странствий по Часовому Механизму ты будешь находить пять особых минералов\: кримзонит, лунный камень, валестоун, люминит и тёмную материю.
m.arc_mintut_3=Залежи руды встречаются на всех уровнях Часового Механизма, и чтобы измельчить их до переносимого размера, нужно разбивать их ударами. За раз можно нести лишь один минерал, но его можно заменить, подобрав другой. Ищи самый большой и блестящий — он самый ценный.
m.arc_mintut_4=Как только ты благополучно доберёшься до лифта, минерал, который ты несёшь, попадёт в твой арсенал для дальнейшего использования. Каждый в твоей группе получает минералы всех остальных, так что нет нужды спорить, кому достанется лучший\!
m.arc_mintut_5=Минералы используются для создания корма для спрайтов в Лаборатории. Корм для спрайтов очень важен для развития твоего спрайта, так что хватай минералы, когда видишь их\!
m.arc_mintut_6=Наши геологические исследования продолжаются, так что этим странным и могущественным минералам, возможно, найдётся ещё немало удивительных применений.
m.atg_greeter_1a=Добро пожаловать в наш продвинутый тренировочный зал. Здесь ты найдёшь полезные советы по выживанию, которые помогут тебе в путешествии по Часовому Механизму. \n\nНужны указания?
m.atg_greeter_2a=На западе ты узнаешь о полезных предметах, встречающихся в Часовом Механизме. На севере — о различных типах блоков и дверей. На востоке тебя ждёт множество ловушек и опасностей, а также боевой зал для отработки защиты от тренировочных кубов. Не переживай, мы приняли все меры, чтобы кубы были совершенно безвредны\!
m.atg_guard=Приветствую\! За этой дверью находится продвинутый тренировочный зал. Как Спиральный Рыцарь, ты вправе пользоваться им для оттачивания навыков и изучения Часового Механизма.
m.barracks_booster_1=Хочешь зарабатывать ещё больше монет Крогмо с каждого матча?
m.barracks_booster_2=Приобрети Усилитель Монет Крогмо у Торговца Улучшениями\!
m.bazaar_tour_10a=Давай навестим Бринкс.
m.bazaar_tour_11a=Бринкс — Торговец Жетонами, выдающий определённые предметы рыцарям в обмен на жетоны, которые можно добыть в Часовом Механизме. Жетоны находятся в сундуках с сокровищами, выдаются как награда за миссии или выпадают при уничтожении особых боссов.
m.bazaar_tour_12a=Остался последний магазин, и мы закончим. Лучшее я приберёг напоследок.
m.bazaar_tour_13a=Перед нами Бешамель — мастер аксессуаров, который может добавить украшения к твоему снаряжению при наличии билета. С аксессуарами твоя экипировка будет по-настоящему выделяться в толпе — очень рекомендую попробовать. Скоро ты станешь притчей во языцех\!
m.bazaar_tour_14a=Билеты на аксессуары можно найти в сундуках или на Аукционном Доме, если другой рыцарь решит их продать.
m.bazaar_tour_15a=Что ж, это покрывает основы Базара. Это поистине замечательное место, где можно найти практически всё, что тебе нужно. \n\nХочешь, чтобы я повторил всё ещё раз, или ты уже разобрался?
m.bazaar_tour_16a=Ещё одна экскурсия? Без проблем, следуй за мной\!
m.bazaar_tour_16b=Чудесно\! Рад, что помог тебе сориентироваться. Удачи тебе, {0}\!
m.bazaar_tour_1a=Добро пожаловать на Базар, {0}\! Хочешь экскурсию по магазинам и услугам?
m.bazaar_tour_2a=Странники вроде Квиллиона торгуют оружием и бронёй. Каждый из них специализируется на определённом типе товаров, так что поговори с ними и узнай, что у них есть. Они не слишком разговорчивы, зато у них всегда свежий ассортимент каждый день\! \n\nТолько убедись, что твой ранг достаточен для экипировки предмета\!
m.bazaar_tour_3a=Рад, что спросил — конечно\! Давай заглянем к Вателю.
m.bazaar_tour_4a=Ватель продаст тебе подборку рецептов, а также средства для смены индивидуального цвета и другие товары.
m.bazaar_tour_5a=Именно так — ты можешь добыть рецепты и материалы для алхимизации оружия и снаряжения на алхимических станциях. Пойдём, покажу одну.
m.bazaar_tour_6a=Перед нами алхимическая станция, с которой ты, без сомнения, очень сдружишься по мере улучшения своего арсенала. \n\nЧто ж, это все магазины. Хочешь ещё одну экскурсию?
m.bazaar_tour_7a=Панч и Вайс — гремлины-кузнецы, способные изменять свойства твоего оружия и снаряжения.
m.bazaar_tour_8a=Полегче, {0}, не все гремлины из одного теста. Некоторые не согласны с участью, уготованной Королём Тинкинзаром и Багровым Орденом. Более того, где-то в глубинах Часового Механизма, говорят, есть целый город гремлинов, покинувших Великую Колонию.
m.bazaar_tour_9a=Ладно, вернёмся к делу. \n\nПанч может добавить Уникальные Варианты — особые бонусы к твоему оружию и снаряжению — за определённую плату. Но его методы, скажем так... хаотичны. Никогда точно не знаешь, что получишь. \n\nВайс действует аккуратнее. Он может снять привязку с твоего оружия и снаряжения за отдельную плату, позволив тебе снова продать или подарить предмет\!
m.biscotti_1=Привет, я Бискотти, шеф-повар Скайларка\! У нас тут небольшая ситуация, которая может быть, а может и не быть связана с разумными, чудовищными тортами, которые, возможно, полностью захватили мою кухню и расплодились по Часовому Механизму... \n\nВ общем, я договорился со Странниками о наградах за сдачу кусков торта, подтверждающих твоё участие в истреблении этих ужасных тварей, которые, возможно, существуют, а возможно, и нет.
m.biscotti_2=Отлично\! Помочь мне можно двумя способами\: \n\nТы можешь принять новую Престижную Миссию «Полная Тортастрофа», доступную ежедневно. \n\nИли можешь отправиться в Часовой Механизм и выкорчёвывать заражение этих «торт-монстров» сколько угодно. Просто ищи характерную глазурь\!
m.biscotti_3=Спасибо, {0}, ценю. И сделай мне одолжение — никому в Спиральной штаб-квартире об этом маленьком «инциденте» не рассказывай...
m.casino_bouncer_a=Только члены Клуба C.U.B.E. могут войти в Зал Высоких Шаталок.
m.casino_bouncer_b=Извини, только для VIP.
m.casino_bouncer_c=Добро пожаловать в Зал Высоких Шаталок\!
m.casino_bouncer_d=Добро пожаловать, входите.
m.casino_guard_a=Глорп\! Тут всё спокойно.
m.casino_guard_b=Золотой Слизень приветствует тебя. Глорп\!
m.casino_guard_c=Глорп-глорп. Приятного отдыха.
m.casino_imposto_a=Ещё один Гелевый Коктейль, пожалуйста. Взболтать.
m.casino_imposto_b=О, тебя тут раньше не видели\!
m.casino_imposto_c=Официант? Ох, простите, сударь.
m.casino_jelly_a=Глорп\! Проглотил крону. Вкусно.
m.casino_jelly_b=Только что из парикмахерской, заметно?
m.casino_jelly_c=Однажды я выиграю столько, что построю собственный дворец\! Глорп-глорп\!
m.casino_jelly_d=Я всё проиграл\!
m.casino_klepto_a=Я ничего не украду... Обещаю\!
m.casino_klepto_b=Эй, а что это вон там?
m.casino_klepto_c=Я не тот клептолиск, которого вы ищете.
m.casino_monster_a=Эй, не жульничай\!
m.casino_monster_b=Хватит подсматривать мне через плечо.
m.casino_monster_c=Думаю, никто и не заметит моего отсутствия.
m.casino_monster_d=Одолжишь оружие?
m.casino_monster_e=Эй, не загораживай\!
m.casino_monster_f=Тсс, никому не говори, что я тут.
m.casino_monster_g=Я тут либо праздную, либо топлю печали.
m.casino_monster_h=Удача переменчива — порой от плохой к ещё худшей...
m.casino_monster_i=Я здесь, чтобы выслушать. Выговорись.
m.casino_pitboss_a=Производительность выросла на два процента с тех пор, как я ввёл обязательные сверхурочные.
m.casino_pitboss_b=Я повысил себя до Старшего Менеджера по Жутким Орудиям Разрушения.
m.casino_pitboss_c=Я безжалостно эксплуатировал своих работников, чтобы оказаться там, где я сейчас.
m.casino_pitboss_d=Только что оформил очередной оптовый заказ канцтоваров. Они у нас вечно заканчиваются.
m.casino_pitboss_e=Парень из Дьявол-IT хотел перевести наш офис на сплошное глифо-пользование, но мне нравится тратить бумагу, когда есть возможность.
m.casino_royaljelly_a=Только прилетел из Муркрофта, и знаете, мои королевские ядра совсем разрядились.
m.casino_royaljelly_b=Ловите желешку...
m.casino_royaljelly_c=Три лишайника заходят в комнату...
m.casino_royaljelly_d=Не забывайте оставлять чаевые.
m.casino_skelly_a=Т-так... ярко...
m.casino_skelly_b=Попробуй ещё...
m.casino_skelly_c=Я никогда отсюда не уходил...
m.casino_yesman_a=Приятного отдыха\!
m.casino_yesman_b=Каждый желешка — желанный гость в «Золотом Слизне»\!
m.casino_yesman_c=Извините, вы опоздали на «счастливый час» на минуту. В следующий раз.
m.casino_yesman_d=Каждый желешка — победитель в «Золотом Слизне»\!
m.casino_yesman_e=Сотрудники Undercorp получают бесплатную кружку при каждом посещении.
m.casino_yesman_f=Добро пожаловать в Зал Высоких Шаталок\!
m.core_busy_1=Извини. Сейчас не могу говорить.
m.core_guard_1=Тебе стоит поговорить с Вэлин.
m.core_guard_2=Вы принесли нам припасы?
m.core_lead_1=Приветствую. Я лейтенант Вэлин, командующая полевыми исследованиями Ядра. Ты, очевидно, один из сильнейших среди Спиральных Рыцарей, раз добрался до этих адских глубин, но одной силы недостаточно, чтобы продвинуться дальше.
m.core_lead_2=Мы пытаемся найти способ активировать Ядро с помощью минералов, обнаруженных в Часовом Механизме. Эти минералы способны преобразовывать Часовой Механизм — мы видели это в Аркаде Хейвена. Мы полагаем, что можем использовать эту силу для активации Ядра и... каким-то образом его открыть.
m.core_lead_3=Да, сам капитан Озло приказал нам держаться столько, сколько возможно, и узнать всё, что в наших силах. Если мы когда-нибудь покинем эту планету, то лишь благодаря этому Ядру.  \n\nЯ убеждена, что помимо потенциального источника энергии, Ядро является своего рода нервным центром всего, что ты видишь в Часовом Механизме. Это чувствуется в остатках воздуха здесь, внизу — дикое, зловещее ощущение, что это не просто машина.
m.core_lead_4=Я говорю о том, что мы знаем — этот мир не является естественным, и лично я не верю, что эти орды жалких гремлинов, сколь бы трудолюбивы они ни были, могли построить целый мир. Им помогало нечто, далеко превосходящее их возможности, и, возможно, это нечто таится внутри Ядра. \n\nТо же самое касается Альфа-Отряда. Они не могли просто исчезнуть, даже в самых дальних глубинах Часового Механизма. Они были лучшими из лучших. Это Ядро поглотило их.
m.core_lead_5=Не знаю как, но они нашли бы способ. Должны были найти... а теперь их нет.
m.core_resting_1=Не волнуйся. Он выкарабкается.
m.core_resting_2=Скорей бы вернуться в Хейвен...
m.core_resting_3=Надеюсь, припасы скоро доставят.
m.core_tech_1=Добро пожаловать в полевой исследовательский лагерь Ядра. Есть новости с поверхности?
m.core_tech_2=Это просто — продолжай собирать минералы в Часовом Механизме и питать ими Врата в Аркаде. Нам нужно анализировать, как энергия минералов воздействует на Ядро. Проблема в том, что на эти глубины доходит лишь малая толика энергии. Мы можем собрать лишь крупицу данных с каждых запущенных Врат.
m.core_tech_3=Свежего воздуха? Тепла? Эти глубины — не та среда, которую многие из нас способны выдержать ещё долго, но лейтенант настаивает, чтобы мы продолжали, что, может быть, выброс энергии от следующих Врат даст нам ответ, который нам нужен. \n\nБесспорно одно — наш лейтенант предана делу. Не припомню, чтобы она хотя бы сомкнула веки, не говоря уже о сне.
m.core_unconcious_1=. . .
m.dark_harvest_exp=Добро пожаловать на Фестиваль Тёмного Урожая\! Этот ежегодный праздник чествует нежить праздничными масками, восхитительными сладостями и опасными розыгрышами\!\n\nЧтобы принять участие, исследуй Часовой Механизм и попробуй отыскать легендарного «Тыквенного Короля». Этот отвратительный овощ раздаёт конфеты посетителям. Конфеты можно обменять у торговцев на Городской Площади Хейвена на маски монстров\!\n\nЕсли ты предпочитаешь действовать напрямую или тебе просто не хватает пары-тройки, наш продавец также продаёт конфеты.
m.deskclerk_1a=Добро пожаловать в Поместье Муркрофт, где усталые души приходят отдохнуть (если у них есть чем). Если вы намерены остаться на ночь, помните: лёгкая уборка в номере проводится каждые девяносто девять лет, континентальный завтрак подаётся за счёт заведения в каждое полнолуние, и вы не сможете покинуть это место навсегда и навечно. Приятного пребывания\!
m.em_greeter_1a=Добро пожаловать в Эмберлайт, убежище для гремлинов-изгнанников.
m.emberlight_visitor_1a=Гремлины Эмберлайта благодарят тебя за устранение этой угрозы.
m.emberlight_visitor_2a=Но я пришёл предупредить тебя\! Багровый Орден не остановится на Рормулусовом Проекте. Багровый Орден отчаянно стремится уничтожить всех врагов. Высоких, маленьких и изгнанников. Все враги для Багрового Ордена\!
m.emberlight_visitor_3a=Могу чем-то помочь?
m.emberlight_visitor_4a=Эмберлайт основан гремлинами-изгнанниками из Великой Колонии. Гремлины Эмберлайта не подчиняются Железному Закону, поэтому бежали или умерли. Мы начали заново с Эмберлайтом. Новая колония — дом для немногих\: бывшие прожектёры, торговцы, бойцы, все предатели в глазах гремлинов Великой Колонии.
m.emberlight_visitor_4b=Никто не знает наверняка. Тинкинзара не видели уже очень давно. Багровый Орден выполняет планы Тинкинзара для Крейдла. Эмберлайт был бельмом на глазу грандиозного плана — потому что построен изгнанниками. Хейвен, наверное, то же самое — основан не-гремлинами. Не часть плана\!
m.energy_info_1a=Знаешь, что самый важный ресурс на Крейдле? ЭНЕРГИЯ\! Верно, дружище, нечто настолько особенное, что стоит кричать о нём\! Хочешь узнать об этой невероятно важной штуке? Я как раз эксперт в этом вопросе\!
m.energy_info_2a=Отлично\! Разложу тебе всё в три простых урока\: что это, как используется и как добыть больше.
m.energy_info_3a=Энергия — это особая сила, постоянно излучаемая из ядра этого мира. Она совершенно стабильна и никогда не теряется, если её не потратить или не обменять. (Количество энергии видно на модуле энергии в твоём арсенале.)
m.energy_info_3b=Энергия нужна для самых разных вещей\! Это основная валюта для покупок на Складе Снабжения, она позволяет приобретать улучшения, воскрешать себя в Часовом Механизме, когда заканчиваются Искры Жизни, и необходима для создания гильдии. \n\nТы также найдёшь всевозможные устройства в мире, которые активируются с помощью энергии. Просто ищи синий символ энергии на устройстве.
m.energy_info_3c=Энергию можно получить только путём покупки за реальные деньги или через обмен на Бирже. Чтобы купить или обменять энергию, просто открой Склад Снабжения и нажми кнопку «Получить Энергию».
m.fc_bridge_1=Немногие одолевают мост, путник. Быть может, у тебя есть шанс выжить, а быть может... нет, даже добрые спрайты внизу будут поглощены пламенем Ванадьюка. Всё безнадёжно.
m.fc_bridge_2=Лорд Ванадьюк — повелитель этого разрушенного мира. Некогда король Альмира, Ванадьюк теперь командует ужасающим легионом среди пепла своего бывшего королевства. Тебе лучше никогда не пересекать его путь.
m.fc_bridge_3=Выбор не за тобой.
m.fc_court_1=Ты... ты не один из заблудших. Ты, должно быть, силён, раз добрался до этого двора. Прошу тебя, помоги мне\!
m.fc_court_2=Я — спрайт, сила природы, призванная в этот мир, чтобы потушить противоестественный огонь, пожирающий его. Но Ванадьюк обнаружил и пленил нас. Мне удалось бежать, но остальные спрайты всё ещё в его плену.\n\nТеперь никто не может пройти дальше двора, поскольку столбы теневого пламени преграждают все выходы. Теневое пламя можно потушить лишь водой, текущей из этих духовных источников. Эта вода — чистейшая во всей природе, проистекающая прямо из родников в обители самой Матери Духов.
m.fc_court_3=Без силы остальных спрайтов вода никогда не потечёт в этом мире. Необходима фокусная связь с Матерью Духов, чтобы принести хоть каплю воды в столь гнетущий мир. Повелитель этого мира позаботился о том, чтобы пламя вокруг него полыхало вечно.
m.fc_court_4=Тогда ты ещё и храбр, путник. Ты найдёшь моих сородичей по всему двору. Но будь очень осторожен — ужасные прислужники Ванадьюка охраняют их. Многие патрулируют главную аллею, так что следи за спиной.\n\nКогда найдёшь спрайта, неси его обратно к священному кругу перед тобой. Они наверняка ослаблены проклятием Ванадьюка и нуждаются в восстановлении. Когда шестеро воссоединятся, мы создадим фокусную связь с Матерью Духов и призовём воду в источники.
m.fc_court_5=Да хранит тебя Мать Духов.
m.fc_court_complete_1=Наша связь с Матерью Духов теперь крепка благодаря тебе\! Используй воду из духовных источников, чтобы потушить теневое пламя. Путь впереди усеян теневым пламенем и прислужниками Ванадьюка, и хотя мы, спрайты, мало чем можем помочь тебе в бою, мы хотя бы способны призвать духовные источники в некоторых местах.
m.fc_court_reminder_1=Когда найдёшь спрайта, неси его обратно к священному кругу перед тобой. Они наверняка ослаблены проклятием Ванадьюка и нуждаются в восстановлении. Когда мы все воссоединимся, мы создадим фокусную связь с Матерью Духов и призовём воду в источники.\n\nПожалуйста, поторопись\!
m.fc_greeter_1=Внемли моему предостережению, путник — это опасный и ужасный край. Ты стоишь у врат Огнештормовой Цитадели, бывшего сердца великого Королевства Альмир, ныне — владения, искажённого огнём и злобой.\n\nУходи отсюда, если хочешь жить.
m.fc_greeter_2=Да будет твой конец милосердно быстрым.
m.final_test_knight_1a=Невероятно\! Я бы никогда не подумал, что новобранец выберется живым из того пылающего крушения\! Ты, должно быть, что-то особенное... \n\nМеня зовут Ферон, лейтенант Спирального Ордена. Мы считали весь этот комплекс заброшенным, пока ведущий к нему лифт внезапно не ожил. Когда мы начали расследование, тут всё запылало\! \n\nКак ты тут оказался?
m.final_test_knight_2a=Понятно. Это будет очень ценная информация для Спиральной штаб-квартиры. Наш базовый лагерь в Хейвене — прямо впереди. Поднимайся на лифте и встреться с другими рыцарями, пережившими крушение. Техники в Лаборатории с нетерпением ждут, чтобы изучить этот артефакт. Они займутся им, когда ты доберёшься до Хейвена. \n\nНе переживай за остальных в Спасательном Лагере. Благодаря тебе у нас есть работающая система лифтов, чтобы добраться до них. Ты спас их всех\!
m.first_conversation_1=Поздравляем, забери свой приз\!
m.forge_knight_1a=Крейдл — опасный мир, и жизненно важно иметь в арсенале мощное снаряжение для выживания. Для этого тебе понадобится Кузница.
m.forge_knight_2a=Кузница использует тепло, накопленное в твоём снаряжении, и соединяет его с силой Огненных Кристаллов, чтобы раскрыть его новый потенциал.
m.forge_knight_3a=В городе ты можешь использовать Кузницу в любой момент. В Часовом Механизме — через Станцию Арсенала.
m.forge_knight_4a=При использовании Кузницы ты увидишь список предметов, готовых к повышению уровня. Выбрав предмет, ты увидишь, как его можно улучшить.
m.forge_knight_5a=Каждый предмет требует определённого типа Огненного Кристалла. Огненные Кристаллы можно приобрести на Складе Снабжения, заработать за выполнение определённых миссий и найти в сундуках с сокровищами в Часовом Механизме\!
m.forge_knight_6a=Огненные Кристаллы довольно нестабильны, и есть шанс, что попытка ковки окажется неудачной. Однако мы выяснили, что чем больше Огненных Кристаллов ты добавишь, тем выше шанс успешной ковки. \n\nБолее того, чем больше Огненных Кристаллов ты вложишь, тем выше вероятность получить особые бонусы для предмета\! \n
m.forge_knight_7a=Теперь, когда ты знаешь о Кузнице, хочешь взглянуть на неё?
m.fountain_1=Приветствую и добро пожаловать в Хейвен\! Если пойдёшь на север, попадёшь в Аркаду, где узнаешь подробности нашей миссии. Если на запад — попадёшь на Базар, где Странники предлагают подборку снаряжения и оружия. Обязательно проверяй их ассортимент ежедневно — он меняется\!
m.gh_bechamel_1=Приветствую, {0}, чем могу помочь?
m.gh_bechamel_2=Пожалуйста, внимательно осмотрите превью статуй\! Порой мне трудно воспроизвести некоторые аксессуары, такие как ауры и особые предметы, в форме статуи. Возврат невозможен, так что убедитесь, что вам нравится то, что вы видите, прежде чем совершать покупку\!
m.guard_laboratory_1a=Извини, {0}, у тебя пока нет допуска в лабораторию.
m.hav_clock_1a=Приветствую тебя, малыш. Похоже, тебе нужны какие-то знания.
m.hav_clock_2a=Я поделюсь с тобой тем, что знаю, малыш.
m.hav_clock_3a=Трудно сказать наверняка, ведь так много из того, что находится внутри, по всей видимости, происходит из разных миров. Некоторые, похоже, из царств великой древности, некогда населённых бесчисленными старыми богами и созданиями.\n\nЭтот мир неестественен. То, что ты видишь в нём, никогда не должно было здесь оказаться. Великие истории стольких миров, бесконечно перемалываемые шестернями этой громадной машины... Мне это представляется весьма печальным.
m.hav_clock_3b=Существуют разные теории. Некоторые говорят, что ответственны гремлины, которых ты видишь работающими на нём сейчас. Но это кажется слишком грандиозным даже для их, казалось бы, бесчисленной рабочей силы. Даже имея средства для этого, как они «начали»? Где они нашли силу?
m.hav_clock_3c=Нечто невероятной мощи, малыш. Из центра Часового Механизма исходит колоссальный энергетический сигнал, но это всё, что мы знаем. Никто никогда не добирался до Ядра. Или, по крайней мере, если кто-то и добирался, он так и не вернулся.\n\nСтоило бы спросить гремлинов — ведь они, вероятно, спускались в Часовой Механизм глубже любого другого существа. Но это может оказаться затруднительным, поскольку они весьма неуживчивый народ.
m.hav_entryknight_1a=Ты пришёл из расщелины? Как?
m.hav_entryknight_2a=Всегда приятно видеть ещё одного Спирального Рыцаря\!
m.hav_entryknight_3a=Тебе лучше пройти за городские стены. Здесь небезопасно.
m.hav_greeter_1a=Добро пожаловать в Хейвен, малыш. Присоединяйся к своим друзьям в добыче блестяшек из Часового Механизма. Странники всегда ценят блестяшки.
m.hav_grem_1a=Приветствую тебя, малыш. Похоже, тебе нужны какие-то знания.
m.hav_grem_2a=Мои знания — твои, малыш.
m.hav_grem_3a=Гремлины — раса существ, невероятно искусных в создании и демонтаже всевозможных механизмов. Они одновременно легион блестящих мастеров и сила разрушительного могущества.
m.hav_grem_3b=Все гремлины, принадлежащие к колонии, служат Королю Тинкинзару. Говорят, Тинкинзар — великий правитель и механический гений, ответственный за замысел всего Часового Механизма. Однако, насколько мы понимаем, короля никогда не видят простые гремлины — его приказы доставляются и исполняются Багровым Орденом, грозной и фанатичной группой гремлинов, которые одни удостоены аудиенции великого короля.
m.hav_grem_3c=Большинство из них атакуют тебя при первой встрече, но есть и другие — изгнанники из колонии, нашедшие убежище в подземных городах. Их жизнь тяжела — ненавидимые собственным народом, они больше не принадлежат миру, который когда-то называли домом.
m.hav_guardian_1a=Добро пожаловать в Хейвен, {0}, мы тебя ждали.
m.hav_mecha_1a=Я по случаю приобрёл этого сломанного меха-рыцаря. Если удастся заставить его работать как надо, у меня будет личный телохранитель для вылазок в Часовой Механизм.
m.hav_snipes_1a=Пожалуйста, старайся не наступать на снипов, малыш.
m.hav_snipes_2a=Снипы — это грациозные, очаровательные, обворожительно-пухлые птицы, которых ты видишь повсюду в Хейвене. Некоторые считают их самыми прекрасными созданиями в галактике, но ты никогда не услышишь этого от самих снипов, ибо они невероятно скромны.
m.hunter_1a=Приветствую, доблестный рыцарь! Я Армеро, великий охотник диких земель и хранитель этого славного охотничьего зала, что перед тобой. \n\nНа стенах — некоторые из многочисленных трофеев, добытых в отважных экспедициях, где жизнь и здоровье были поставлены на кон ради чистого, неукротимого азарта охоты. \n\nСкажи, есть ли в тебе та же искра? Тот же вкус к простору, к опасности?
m.hunter_2a=Великолепно\! Тогда, быть может, ты и твои товарищи послужите этому залу. Видишь ли, алхимическая машина перед тобой умеет создавать великолепные трофеи монстров для твоего Зала Гильдии. \n\nАлхимическая машина использует материалы и кроны из Сокровищницы Гильдии и помещает результат обратно в неё.
m.hunter_3a=Именно\! Трофеи монстров требуют огромного количества материалов, так что командная работа как нельзя кстати. \n\nИ наконец, некоторые необходимые материалы можно получить только в обмен на жетоны боссов у Бринкс на Базаре Хейвена. Они служат доказательством твоей доблести в победе над грозными созданиями\!
m.hunter_4a=Вот это дух\! Задай этим тварям жару\!
m.imposto_25=Глорп\! Вокруг темнеет...
m.imposto_50=Глорп\! Будь у меня кости — они были бы переломаны\!
m.imposto_75=Глорп\! Меня одолевают\!
m.imposto_99=Глорп\! Помогите, на меня напали
m.imposto_attack=Глорп\! Гринчлины вернулись\!
m.imposto_death=Миссия провалена\! Отступаю в Хейвен\! Глорп\!
m.impostoclaus=Глорп, глорп, глорп\! Счастливого Зимнего Фестиваля\!\n\nПроникнись праздничным настроением в снежных боях на зимних уровнях Блокировки и обменивай Монеты Крогмо на великолепные шапки Санты\!
m.impostoclaus_1a=Глорп\! Глорп\! Глорп\! Счастливого Зимнего Фестиваля\!\n\nНаконец-то настало то особое время года, когда нежное белоснежное покрывало чудесного снега укрывает Хейвен, и каждый Странник, каждый снип и каждый рыцарь наполняет своё сердце праздничным весельем.\n\nНо должен тебе поведать — увы, не всё ладно. Без какого-либо повода или причины банда гринчлинов со сморщенными сердцами угрожает этому Зимнему Фестивалю\!
m.impostoclaus_2a=Какая храбрость, какой задор\! Да, быть может, с толикой удачи у тебя есть шанс против ужасных тварей, что вознамерились уничтожить мечты о Зимнем Фестивале. \n\nТак обрати внимание на новую праздничную миссию, возьми меч в руки, и я дарую тебе награды\!
m.impostoclaus_3a=Глорп\! Глорп\! Глорп\!
m.impostoclaus_fail=Наша миссия по спасению Зимнего Фестиваля завершилась поражением\! Гринчлины победили, мы отступаем\!
m.impostoclaus_win=Глорп\! Глорп\! Зимний Фестиваль спасён, и одно ясно как день\: все сердца теперь поют праздничным весельем\!
m.lab_biscotti_1a=Привет\! Я Бискотти, шеф-повар Скайларка\! Я всё ещё калибрую алхимизатор пищи для боевых спрайтов, так что загляни ко мне позже.
m.lab_biscotti_2a=Именно\! Боевой спрайт может синтезировать материю в полезную энергию. Эта машина берёт определённые материалы и алхимизирует их в особый корм для спрайтов... то есть, когда она наконец будет откалибрована.
m.lab_biscotti_3a=Привет, {0}\! Как шеф-повар Скайларка, мне поручено следить за питательным развитием наших новых спрайтов-компаньонов. Кажется, они очень разнообразились там, внизу, в Часовом Механизме. Будет интересно посмотреть, как они будут развиваться. \n\nЕсть вопросы о кормлении и уходе за твоим спрайтом?
m.lab_biscotti_3aa=Есть ещё вопросы о кормлении и уходе за твоим спрайтом?
m.lab_biscotti_4a=Кормить боевого спрайта просто\! Открой интерфейс боевого спрайта и выбери иконку своего спрайта. Оттуда ты можешь выбрать материал из арсенала и поместить его в кормушку. \n\nКогда материал поставлен в очередь на синтез, просто нажми «Скормить спрайту» — и приятного аппетита\!
m.lab_biscotti_4b=Спрайты обладают определённым аппетитом, ограничивающим количество материалов, которые они могут съесть за раз. Когда ты скармливаешь материал спрайту, его аппетит уменьшается. Когда он полностью исчерпан, ты не сможешь кормить его.
m.lab_biscotti_4c=В любой момент спрайт имеет «любимый предмет» — особый материал, который он любит есть больше всего. Скормив такой, ты порадуешь спрайта и дашь ему много тепла.
m.lab_biscotti_4d=Необходимые предметы появятся, когда спрайт будет готов к повышению уровня. Когда спрайт накопит достаточно тепла, над кормушкой появится уведомление о «необходимом материале». Этот материал ОБЯЗАТЕЛЬНО нужно скормить спрайту, чтобы он мог развиваться дальше.
m.lab_biscotti_5b=Аппетит спрайта восстанавливается естественным образом со временем, хоть и медленно. Чтобы быстро повысить аппетит, возьми его на пробежку в Часовой Механизм. Поглощение тепла от монстров — отличный способ сжечь калории\!
m.lab_biscotti_5c=Любимые предметы можно алхимизировать на этой самой алхимической машине перед тобой. Нужны лишь два любых одинаковых материала и немного минералов из Часового Механизма. Проще простого\!
m.lab_biscotti_5d=В большинстве случаев это обычный любимый предмет, но когда спрайт готов к эволюции, потребуется Эво-Катализатор.
m.lab_hahn_1a=(Ган выглядит занятым и, похоже, не замечает тебя)
m.lab_harness_1a=Я Райли, ассистент Морлина. Я работаю над изобретением способа ещё больше усилить наших боевых спрайтов. Загляни позже, когда у тебя появится постоянно привязанный спрайт.
m.lab_knight1_1a=Мы спасли что могли со Скайларка и собрали остальное с помощью Странников.
m.lab_knight2_1a=Излучения ядра этого мира оказали странное воздействие на наших боевых спрайтов.
m.lab_knight3_1a=Нам удалось извлечь вспомогательный генератор Скайларка почти неповреждённым. К сожалению, его мощности едва хватает для питания этой лаборатории, не говоря уже о нашем корабле. Нам нужен другой источник энергии, если мы когда-нибудь надеемся вернуться домой.
m.lab_knight4_1a=Разведывательные отряды обнаружили странные и удивительные вещи в Часовом Механизме.
m.lab_knight5_1a={0}, ты уже встречал эти минералы в своих путешествиях? Они потрясающие\! Тебе стоит спросить о них Главного Рыцаря-Геолога Вегнера. Говорят, он эксперт по минералам\!
m.lab_knight6_1a=Мы не рискуем с этим артефактом, который ты нашёл, {0}. Однажды гремлины могут вернуться за ним. Будь начеку\!
m.lab_knight7_1a=Первые показания зашкаливают, {0}\! Мы никогда не сталкивались ни с чем подобным. Потребуется время, чтобы полностью понять, для чего этот объект.
m.lab_progress_1=Держу пари, эти Звериные Колокольчики тебе здорово пригодились, {0}?
m.lab_progress_2=Спасибо, что победил Снарболакса. Слишком многие из наших оруженосцев встретили безвременный конец по вине этого зверя. Мне будет спокойнее, зная, что этой угрозы больше нет. \n\nС нетерпением жду вестей о твоих будущих подвигах, солдат\!
m.lab_progress_3=К счастью, повреждения лаборатории оказались не слишком обширными. Оборудование для обслуживания боевых спрайтов уцелело — это главное.
m.lab_progress_4=Мы удвоили число патрулей вокруг Хейвена на случай повторной атаки, но у меня есть чувство, что те гремлины уже получили то, за чем пришли...
m.lab_progress_5=Потребуется немного времени, чтобы полностью восстановить всё наше оборудование.
m.lab_progress_6=Этот желейный дворец... какое странное место. И ещё — что за загадочное устройство ты нашёл внутри дворца? Не похоже, чтобы его создали слизни.
m.lab_progress_7=Крайне редко мне попадались слизни, которые не нападали при первом взгляде. С этого я сейчас снимаю шипы. Они даже милые, когда не пытаются тебя проткнуть\!
m.lab_progress_8=Этот гремлин родом из колонии Эмберлайт, расположенной глубоко в Часовом Механизме. Это группа изгнанников, восставших против Короля Тинкинзара и Багрового Ордена. Мы надеемся заключить с ними договор, который позволит нам использовать их колонию как базу для наших операций на более глубоких уровнях.
m.lab_progress_9=Ещё одно загадочное устройство\! Это явно создано не альмирцами, точно так же как предыдущее — не слизнями. Но кое-что мы заметили\: это устройство до сих пор активно. Более того, его энергетическая сигнатура схожа с показаниями, которые мы сняли с Артефакта до его похищения. Это требует дополнительного исследования.
m.mission_apocrea_warden=Если идёшь дальше — будь настороже. Чую ловушку.
m.mission_camefrombelow=Все пропали. Оно... оно пришло снизу.
m.mission_cogknight_ambushed=О-осторожно... они... они повсюду... в тенях...\!
m.mission_cogknight_battle_a=Н-не могу... дальше...
m.mission_cogknight_battle_b=Мы не сможем продвинуться дальше в базу, пока вы не уничтожите те артиллерийские орудия\!
m.mission_cogknight_battle_c=Проникните внутрь, используйте лифт... взорвите то, что управляет этими орудиями\!
m.mission_cogknight_battle_d=Вы сделали это\! Этот взрыв уничтожил орудия\!
m.mission_cogknight_camp2_a=Мы видели взрывы прямо из лагеря\! Это было потрясающе\!
m.mission_cogknight_camp2_b=Без вашей помощи мы бы не прошли мимо той артиллерии\!
m.mission_cogknight_camp2_c=Держитесь\!
m.mission_cogknight_camp2_d=Мы видели, как гремлины тут прятали мины — осторожнее с дорогой\!
m.mission_cogknight_camp2_e=Мы удержим позицию\!
m.mission_cogknight_camp2_f=Обойдите с фланга и попробуйте проникнуть в ту сторожевую башню\!
m.mission_cogknight_camp2_g=Если бы только был способ открыть те ворота\!
m.mission_cogknight_camp3_a=Мы прорвались\! Вот оно\!
m.mission_cogknight_camp3_b=Будьте осторожны при встрече с Воителем\!
m.mission_cogknight_camp3_c=Мы прорвали их оборону. Теперь они в ловушке\!
m.mission_cogknight_camp3_d=Удачи, мы знаем — вы справитесь\!
m.mission_cogknight_camp_a=Наконец-то подкрепление из Спиральной штаб-квартиры\!
m.mission_cogknight_camp_b=Один из наших отрядов прорвался внутрь, но был отрезан — спасите их, если сможете\!
m.mission_cogknight_camp_c=Нам нужно, чтобы вы проникли внутрь и вывели из строя эти орудия\!
m.mission_cogknight_camp_d=Осторожно, те гремлины обвили всё колючей проволокой.
m.mission_cogknight_camp_e=Гремлины прячут взрывчатку в бункерах. Бьюсь об заклад, если забросить что-нибудь внутрь, они взлетят на воздух\!
m.mission_cogknight_camp_f=Будьте осторожны там\!
m.mission_cogknight_epilogue_a=Не переживайте за Ферона, его мигом поставят на ноги.
m.mission_cogknight_epilogue_b=Подумать только — всё это могло обрушиться на Хейвен...
m.mission_cogknight_epilogue_c=Победа за нами\!
m.mission_cogknight_epilogue_d=Пока тело Сируса не обнаружено, но никто не мог бы выжить после такого взрыва.
m.mission_cogknight_epilogue_e=На расшифровку этой гремлинской криптографии уйдёт целая вечность...
m.mission_cogknight_prisoner_a=Воитель Сирус безумен\! Мне надо бежать в Эмберлайт.
m.mission_cogknight_prisoner_b=Я улизну, когда станет безопасно. Спасибо за спасение\!
m.mission_cogknight_wounded=. . .
m.mission_cogmaster_1=Два орудия замолчали\! Немедленный доклад, болваны\!
m.mission_cogmaster_2=Нарушители в моём Арсенале? Я позабочусь, чтобы вы ушли... тихо.
m.mission_cogmaster_3=Решили, что можно просто открыть парадную дверь и зайти?\! Вы за это поплатитесь\!
m.mission_cogmaster_4=Кто вас послал, проклятые железные убийцы? Герекс? Не имеет значения. Есть способы это выяснить...
m.mission_collectorknight_a=Выглядит искусственным, но, похоже, обладает зловещим сознанием...
m.mission_collectorknight_b=Они хлынули из-под земли отовсюду...
m.mission_collectorknight_c=От этого места мурашки по коже.
m.mission_collectorknight_d=Прошу, спасите боевых спрайтов\!
m.mission_crimson_chaos_recon_1=Доброй встречи\! Когда я услышал, что посылают тебя, {0}, не поверил своим ушам. Сам Победитель Ванадьюка\! Честь для меня — докладывать тебе.
m.mission_crimson_chaos_recon_2=В том-то и дело, {0} — ничего. Мы следили за базой внизу неделями, а потом она замолчала. Совершенно внезапно. Мы не уверены, что ты найдёшь там. Наши сенсоры не показывают активных форм жизни.
m.mission_crimson_propaganda_1=Девять видят всё, слышат всё.
m.mission_crimson_propaganda_2=Только Король Тинкинзар хранит Железный Закон\!
m.mission_explosion_warning=Внимание\! Обнаружены взрывы\! Немедленная эвакуация\!
m.mission_gatelock_disengage_1=Замок врат 1 деактивирован.
m.mission_gatelock_disengage_2=Замок врат 2 деактивирован.
m.mission_lab_bystander_a=Они появились из ниоткуда...
m.mission_lab_bystander_b=Наша охрана была сметена. У нас не было ни единого шанса.
m.mission_lab_bystander_c=Мы выстроили баррикаду вокруг Артефакта, но её прорвали. Простите...
m.mission_lockedoutknight_a=Спасибо за помощь\!
m.mission_lockedoutknight_b=Мы обеспечивали безопасность лифта, когда дверь за нами захлопнулась.
m.mission_lockedoutknight_c=Спасибо, что спасли нашу команду\!
m.mission_researcher_a=Мы изучали тот метеорит, когда появились лишайники\!
m.mission_researcher_b=Мы отрезаны\! Помогите нам одолеть этих лишайников\!
m.mission_researcher_c=Не знаю, сколько ещё продержится наше силовое поле...
m.mission_survivorknight_a=О-осторожно... оно преследует нас... следит за каждым нашим шагом\!
m.mission_survivorknight_b=Оно выследило нас... расправилось с остальными из моей команды...
m.mission_survivorknight_c=Страж Диких Чащ... ужасный Снарболакс\!
m.mission_wildwoods_defeatedknight=. . .
m.mon_pocket_1=Приветствую\! Я Нонна из Агентства Усыновления Эмберлайта\! \n\nМы в Агентстве Усыновления Эмберлайта подбираем детёнышей монстров, заблудившихся в самых тёмных глубинах Часового Механизма. Лишившись дома и любых средств к существованию, они нуждаются в заботливом хозяине\! \n\nПриобретя один из этих очаровательных «карманных монстров», ты сможешь носить с собой собственного детёныша\! \n\nАгентство Усыновления Эмберлайта время от времени навещает Хейвен, и никогда не знаешь, что мы предложим\!
m.monster_codex_battlepod=Батлпод \nЭти неподвижные автоматоны скрывают небольшой арсенал под своей двойной бронёй. Каждый батлпод обладает уникальной комбинацией атак и защит, которая непременно заставит тебя гадать.
m.monster_codex_devilites=Дьяволята \nДьяволята — рабочие лошадки загробного мира. Если бесовский надзиратель застанет бездельничающего дьяволёнка, он может повысить его до озлобленного Сверхурочника или покладистого Подхалима.
m.monster_codex_roarmulus_twins=Близнецы Рормулус \nЭти гигантские пушечные собаки обладают непробиваемой бронёй и мощным вооружением. Их шкура настолько толста, что они уязвимы лишь для огня друг друга.
m.monster_codex_royal_jelly=Королевский Желе \nЭтот массивный желеобразный куб обладает коротким нравом и любит бросаться своим весом. Когда рядом нет его королевских дегустаторов, отравленное парфе было бы ему ой как некстати.
m.monster_codex_snarbolax=Снарболакс \nМифический Снарболакс невосприимчив к атакам рыцарей. Удар Звериного Колокольчика, когда зверь рядом, оглушит его и сделает уязвимым.
m.monster_codex_trojan=Троян \nЭти массивные левиафаны неуязвимы спереди. Ударь по кристаллу на их спине, чтобы поставить их на колени.
m.monster_codex_vanaduke=Лорд Ванадьюк \nМало что известно о вечном герцоге Альмирской Империи. Наши датчики показывают, что маска является источником его силы, а также потенциальной слабостью.
m.monster_codex_zombie=Зомби \nШаркающие зомби воскреснут из мёртвых, если сражены рядом с Мрачным Тотемом. Отведи их подальше, чтобы даровать им вечный покой.
m.moorcroft_archives_1a=Добро пожаловать в Архивы Муркрофта, путник. Здесь ты найдёшь блистательную коллекцию древних гримуаров из множества забытых миров. Впечатляющее зрелище, не правда ли\! \n\nМожешь осмотреться, но, пожалуйста, ничего не трогай — некоторые из этих книг наполнены невероятной мистической силой. Можешь пораниться\!
m.moorcroft_archives_2a=О, {0}, это ужасно, просто ужасно\! \n\nОрда чёрных котов вылезла из какого-то тёмного портала в глубинах Часового Механизма и разграбила Архивы Муркрофта\!
m.moorcroft_archives_3a=Чёрные коты — самые мрачные души бывшего Кошачьего Племени. Они несут тяжелейшее проклятие и бездумно стремятся поглотить магические ауры. Непрерывное поглощение силы делает их невероятно могущественными. \n\nИх, вероятно, привлекла энергия, исходящая от древних гримуаров здесь, в Архивах. \n\nПрошу тебя, {0}, помоги нам восстановить Архивы Муркрофта\!
m.moorcroft_archives_4a=Тогда прочеши Часовой Механизм в поисках этих гнусных котов и уничтожь их\! Даже если они сожрали книги, ты сможешь восстановить Древние Страницы. Эти страницы можно отдать Монтегю в обмен на награды. Поможешь нам — поможем тебе\! \n\nЧёрные коты случайно встречаются при столкновении со спукатами на Слое 2 и Слое 3 (Врата Аркады и Миссии). Также есть ежедневная Престижная Миссия, которая, вероятно, ведёт к гнезду чёрных котов.
m.moorcroft_archives_5a=Великолепно\! Удачи тебе, {0}. Она тебе понадобится — чёрные коты приносят несчастье...
m.npc_campguard_a=Береги себя снаружи, рыцарь.
m.npc_campguard_b=Добро пожаловать в наш лагерь\! Присядь у костра, если хочешь немного отдохнуть.
m.npc_campguard_c=Мы здесь отдыхаем, прежде чем двигаться глубже в Часовой Механизм.
m.npc_campguard_d=Я несу дозор. Никогда не знаешь, когда нагрянут монстры.
m.npc_campguard_e=Доброй встречи\!
m.npc_campknight_a=Присядь и отдохни немного.
m.npc_campknight_b=Подойди, погрейся у огня.
m.npc_campknight_c=Уже чувствую, как холод отступает.
m.npc_captainknight_a=Помните свою подготовку, рыцари\!
m.npc_captainknight_b=Поднимите щит, чтобы блокировать атаки\!
m.npc_captainknight_c=Не забудьте зарядить бомбу\!
m.npc_captainknight_d=Координируйте ваши атаки\!
m.npc_captainknight_e=Используйте окружение в своих интересах\!
m.npc_captainknight_f=Укройтесь, если вас одолевают\!
m.npc_captainknight_g=Не забывайте помогать товарищам\!
m.npc_graveknight_a=Нет, их слишком много... Я больше не в силах сражаться. Остался лишь свет этих свечей. Без него я...
m.npc_lostknight_a=Спасибо за «спасение», но я в полном порядке.
m.npc_lostknight_b=Приятно знать, что Спиральная штаб-квартира обо мне не забыла.
m.npc_lostknight_c=Я мог бы уйти, но подумай, сколько можно узнать, если остаться\!
m.npc_mineraltech_a=Я полевой исследователь, работаю под началом Главного Рыцаря-Геолога Вегнера.
m.npc_mineraltech_b=Хмм, определённые комбинации, похоже, привлекают различные виды монстров.
m.npc_mineraltech_c=Не обращай внимания на Хьюберта, с него сняли шипы.
m.npc_minerknight_a=За раз можно нести лишь один минерал, так что выбирай самый крупный.
m.npc_minerknight_b=Спиральная штаб-квартира хочет, чтобы мы доставляли эти минералы в Хейвен.
m.npc_minerknight_c=Говорят, эти минералы питают каждые Врата в Аркаде.
m.npc_onwatch_a=Не могу сейчас разговаривать. Я на посту.
m.npc_onwatch_b=Знаю, что они вернутся.
m.npc_onwatch_c=Ты видел что-нибудь там, снаружи?
m.npc_recruit_a=Мне нужно просто немного отдохнуть, прежде чем двигаться дальше.
m.npc_recruit_b=Кажется, я оставил свой калибур на Станции Арсенала...
m.npc_recruit_c=Думаю, мне нужно скрафтить щит получше, когда вернусь в Хейвен.
m.npc_recruit_d=Это моя первая вылазка в Часовой Механизм\!
m.npc_recruit_e=Есть советы для новичка?
m.npc_recruit_f=Где у этой штуки предохранитель?
m.npc_recruit_g=Ты уже видел комнату опасности? Говорят, они жуть какие сложные.
m.npc_rummageknight_a=Точно помню, это было где-то здесь...
m.npc_rummageknight_b=Не могу сейчас говорить.
m.npc_supplies_a=Припасы подоспели как нельзя кстати.
m.npc_supplies_b=Мы уже несколько дней без свежих припасов.
m.npc_supplies_c=Спасибо, что снабдил наш лагерь.
m.npc_supply_teaser_knight=Извини, не могу особо болтать. Мне нужно переправить все эти припасы к нашим передовым аванпостам. Люди склонны забывать, что без таких рыцарей, как мы, что таскают припасы в глубины Часового Механизма, наша способность разведывать отдалённые области была бы крайне ограничена. Неблагодарная работёнка, а?
m.npc_survivorknight_a=Они... они расправились со всеми, кроме меня. Я просто спрятался в углу.
m.npc_survivorknight_b=Они пришли из тьмы. Времени среагировать не было.
m.npc_survivorknight_c=Я не подписывался на это.
m.npc_teaser_knight=Последняя миссия выдалась странной. Мы расчищали путь к лифту, когда заметили какие-то необычные сооружения вдалеке. Но мы не нашли способа до них добраться. Видимо, придётся просто следить за ними в будущем. Часовой Механизм ведь вечно меняется.
m.npc_techknight_a=Я собираю образцы со всей ступени.
m.npc_techknight_b=Хорошие данные — как хороший пудинг, их никогда не бывает слишком много.
m.npc_techknight_c=Ещё парочка тестов...
m.npc_veteran_a=Я всегда ношу с собой разное снаряжение... на всякий случай.
m.npc_veteran_b=Не забывай свой щит — он спасёт тебе жизнь\!
m.npc_veteran_c=Я всегда ношу с собой бластер — никогда не знаешь, когда пригодится.
m.npc_veteran_d=Мне приходится вытаскивать этих новобранцев из неприятностей.
m.npc_veteran_e=Бомба отлично подходит, чтобы разобраться с ордой монстров.
m.npc_veteran_f=Я держу меч при себе для ближних столкновений.
m.npc_veteran_g=Подготовка — твой лучший инструмент для выживания в Часовом Механизме.
m.npc_veteran_h=Держись со своим отрядом — помни, опасно идти одному\!
m.och_leader_1_1a=Доброй встречи, {0}\! Рад, что Спиральная штаб-квартира прислала нам подкрепление, и как нельзя вовремя\! Нас прижали к стенке, и нам нужна твоя помощь\!
m.och_leader_1_2a=Наше наступление застопорилось из-за артиллерии на стенах, которая прижимает нас огнём. Ранее мы устроили отвлекающий манёвр, чтобы небольшой отряд рыцарей прорвался через фронт и заглушил артиллерию... но, похоже, они потерпели неудачу. Теперь они в ловушке внутри, а мы застряли снаружи\! \n\nМне нужно, чтобы ты прорвался через передовую, проник в центр управления артиллерией и нашёл способ уничтожить те орудия навсегда\! Тем временем я перегруппирую войска, чтобы мы могли развить твою атаку. Удачи, солдат\!
m.och_leader_2_1a=Отличная работа, {0}\! Вот это было светопредставление\! Благодаря тебе мы смогли зачистить эту проклятую зону высадки и перенести нашу базу операций ко внутренним воротам\!
m.och_leader_2_2a=Эти тяжёлые шестерни стоят у нас на пути, и, по данным разведки, единственный способ их открыть — из двух соседних сторожевых башен. Я не стану бессмысленно класть людей, штурмуя башни в лоб. Мне нужно, чтобы ты нашёл обходной путь. Обойди оборону с фланга, проникни в сторожевую башню и открой ворота\!
m.och_leader_3_1a=(Лейтенант Ферон, похоже, ранен) \n\nВот и ты, {0}, явился на финальный аккорд?
m.och_leader_3_2a=Это были проклятые маскирующиеся бесы\! Они появились из теней и устроили засаду. Когда я доберусь до Сируса, я... Арх\! \n\n(Ферон заваливается на бок, явно более серьёзно раненый, чем казалось поначалу) \n\nПроклятье, не могу удержать меч...
m.och_leader_3_3a=Да, похоже, я больше не годен для этого боя. Теперь всё зависит от тебя, {0}. Только ты обладаешь достаточной силой, чтобы встретить Сируса лицом к лицу и призвать его к ответу. Многие рыцари сложили головы здесь сегодня. Почти их дух, завершив начатое\!
m.och_leader_4_1a={0}\! С трудом верю, что тебе удалось сразиться с Воителем один на один и выйти живым из этого пекла\! В тебе задатки настоящего героя\!
m.och_leader_4_2a=С помощью биотехников я быстро поправлюсь и снова буду в строю. {0}, невозможно переоценить, как важна эта победа для всех Спиральных Рыцарей. Ты помог нанести мощнейший удар по Багровому Ордену, уничтожив их Великий Арсенал. \n\nБлагодаря тебе гремлинские силы останутся без этих массивных боевых машин ещё долгое время. А наши техники, изучив содержимое личных покоев Сируса, возможно, получат бесценные сведения о гремлинских технологиях или даже о местонахождении остальных членов Багрового Ордена\!
m.och_leader_4_3a=Отдохни и насладись этой грандиозной победой. Спиральная штаб-квартира наверняка призовёт тебя снова\!
m.please_wait=Пожалуйста, подождите
m.rc_bomb_1a=Уже пробовал бомбы? В отличие от другого оружия, бомбы можно использовать только как заряженную атаку. Любое иное действие заставляет их просто зашипеть и погаснуть. Но если ты их зарядишь... БУМ\! Они способны серьёзно потрепать сразу нескольких монстров\!
m.rc_end_1a=Вот и всё, рекрут. Это последние Врата, ведущие из Спасательного Лагеря через расщелину в Хейвен. Как только ты пройдёшь через них, возвращаться сюда больше не понадобится. Всё, что есть в Спасательном Лагере, и многое другое доступно в Хейвене. \n\nЕсть вопросы?
m.rc_end_2a=Чем могу помочь?
m.rc_end_3a=Нет, ты не сможешь вернуться. Как только ты достигнешь Хейвена, твоя подготовка будет завершена, и твоей новой задачей станет помощь Спиральным Рыцарям, базирующимся в Хейвене.
m.rc_end_3b=Хоть путь и опасен, ты не спустишься слишком глубоко, так что монстры, которых встретишь, должны быть вполне по силам. Однако разведчики сообщают о возросшей активности гремлинов в этом районе с тех пор, как мы разбили лагерь, так что будь начеку.
m.rc_end_3c=По прибытии в Хейвен советую тебе обследовать город и ознакомиться со всеми достопримечательностями и услугами. Тебе откроется более мощное снаряжение, и вокруг будет множество опытных рыцарей. Обязательно обращайся к ним за помощью, если заблудишься.
m.rc_greet2_1a=Приветствую, я командир отряда Грета. Ты, должно быть, {0}. Рендон сказал, что ты идёшь, и ты прибыл как нельзя вовремя. Наш Спасательный Лагерь переживает кризис.
m.rc_greet2_2a=Если коротко — в лагере нет электричества, а солнце скоро сядет. Прошлой ночью всевозможные жуткие монстры набросились на нас в темноте. Мы ничего не видели, а наши оборонительные турели были обесточены. \n\n...мы потеряли много рекрутов. \n\nНам нужно подвести энергию к Спасательному Лагерю, чтобы установить оборонительный периметр до наступления ночи\!
m.rc_greet2_3a=Наши сканеры обнаружили древний генератор под лагерем. Он должен передавать энергию на поверхность, но что-то, похоже, перенаправляет её. \n\nНам нужно, чтобы ты спустился и обследовал древний генератор, перенаправив энергию обратно на поверхность. Но будь готов — это совершенно неизведанная территория, кишащая монстрами. \n\nРендон хотел встретиться с тобой перед миссией. Зайди к нему сначала.
m.rc_greet2_4a=Прошу тебя, {0}, помоги нам восстановить энергоснабжение Спасательного Лагеря, чтобы мы могли установить оборонительный периметр. Мы не можем позволить себе потерять ещё хоть одного рекрута от ночных тварей\!
m.rc_greet3_1a=Ты восстановил энергию и спас нас всех, {0}\! Не могу выразить, как я благодарна — все эти рекруты обязаны тебе жизнью. \n\nТеперь тебе стоит связаться со Спиральной штаб-квартирой через свой комлинк.
m.rc_injured_a=Прошлой ночью на нас напали ужасные монстры в кромешной тьме. Это был сущий хаос. Без энергии для турелей мы не могли обороняться. \n\nСтолько храбрых рыцарей потеряно...
m.rc_injured_b=Один из тех механических монстров зацепил меня. Проклятые когти его пробили мою броню насквозь\!
m.rc_injured_c=Благодаря тебе нам не придётся пережить ещё одну такую ночь...
m.rc_injured_d=С восстановленной энергией я смог починить свою броню. Надеюсь, мне больше не придётся сталкиваться с этими чудовищными ржавыми машинами\!
m.rc_instruct_1a=Приветствую, рекрут. Всегда приятно видеть ещё одного рыцаря, добравшегося до Спасательного Лагеря. Полагаю, ты хочешь подготовиться к путешествию в Хейвен. Хорошее начало — здешние Врата в Часовой Механизм. Просто подойди к панели управления на северной стороне подъёмника и нажми кнопку действия ([[?ACTION]]).\n\nЕсть вопросы?
m.rc_instruct_2a=Что бы ты хотел узнать?
m.rc_instruct_3a=Часовой Механизм — это колоссальный комплекс шестерён и механизмов, расположенный прямо под поверхностью всего этого мира. Зрелище поистине невероятное. Мир, в который мы попали, — странный и опасный. Ступай осмотрительно.
m.rc_instruct_3b=«Врата» — это точка входа в Часовой Механизм. Они имеют вид подъёмников, которые ты видишь перед собой. У каждых Врат есть дисплей с уникальной иконкой и панель управления для входа. Эти Врата всегда ведут в одно и то же место, но у других этажи под ними постоянно сменяются. Там никогда точно не знаешь, что ждёт дальше\!
m.rc_nervous_1a=Я хочу купить что-нибудь за кроны, заработанные на тренировочных полигонах, но этот торговец наводит на меня жуть. Как думаешь, что он прячет под этими одеждами?\!
m.rc_recruit_a=Электричества у нас нет, но хотя бы костёр я могу разжечь — пусть будет хоть немного света этой ночью.
m.rc_recruit_b=Из спасательных капсул удалось вытащить немного снаряжения. Тут даже на каждого боеспособного рыцаря не хватает.
m.rc_recruit_c=Можешь поверить? Вся эта расщелина заполнена гигантским механизмом какого-то рода. Кажется, он уходит вниз бесконечно. \n\nИнтересно, вся ли планета такая?
m.rc_recruit_d=Между теплом костра и защитой оборонительных турелей — думаю, этой ночью я усну спокойно.
m.rc_recruit_e=Чувствую электричество в воздухе\! Похоже, нам не придётся давать последний бой этой ночью\!
m.rc_recruit_f=Говорят, ты собираешься спуститься по этому лифту в расщелину. Ты куда смелее меня...
m.rc_rhendon_1a=Как думаешь, что это за штуковина, {0}? Наверняка важная, раз тот Развог так разъярился, когда ты её стащил. \n\nПоделом ему, за то что пытался тебя убить и всё такое\!
m.rc_sleepy_1a=Тренировки... так тяжко... просто нужно... отдохнуть... глаза...
m.rc_soil_1a=Я собираю геологические образцы для Спиральной штаб-квартиры. Пока мои анализы выявляют сотни уникальных образцов почвы в каждом дюйме земли под нашими ногами. Это невозможно, наверняка я ошибся в расчётах...
m.rc_technician_a=Согласно сканированию, где-то в глубинах под лагерем должен быть источник энергии, но он каким-то образом перенаправлен...
m.rc_technician_b=Без энергии эта штука бесполезна. Как нам защищаться от тех монстров?\!
m.rc_technician_c=Энергия хлынула в лагерь\! Ты сделал это, {0}\!
m.rc_vet_1a=Спасибо за помощь тогда. Береги себя\!
m.rc_vet_2a=Всегда будь начеку. Кто знает, какие ещё опасности подстерегают нас в этом мире?
m.rc_vet_3a=Я не успокоюсь, пока мы не свяжемся со Спиральной штаб-квартирой.
m.rc_virgil_1a=Осторожнее впереди.
m.rc_virgil_2a=Этот переход ведёт прямо над гигантской расщелиной. Не хотелось бы, чтобы тебя сдуло в бездну.
m.rc_virgil_3a=Похоже, он ведёт к какому-то лифту, но без энергии вся эта штука мертва.
m.rc_virgil_4a=Приветствую, {0}. Когда ты восстановил энергию в лагере, этот лифт тоже ожил. Полагаю, он доставит тебя в глубины расщелины, а что ты там найдёшь — можно лишь гадать. \n\nЕсли ты намерен спуститься вниз, убедись, что готов к встрече с тем, что тебя ждёт.
m.rc_warning_1a=Наверху — Врата в Хейвен. Обязательно поговори с Виргилом перед входом, чтобы знать, чего ожидать.
m.rescue_door_sk_success=Отличный тайминг\! Путь свободен. Удачи\!
m.rescue_knight_1=Спасибо, что вызволил меня, друг.
m.rescue_knight_2=Фух\! Там было тесновато.
m.rescue_knight_3=Мне точно нужно было размять ноги.
m.rescued_stranger_1a=Приветствую, малыш. В этом новом мире тебя ждёт немало опасностей, но также и множество возможностей для предприимчивых и храбрых\! Один из твоих собратьев ждёт тебя чуть дальше по тропе. Мы, несомненно, ещё увидимся. Прощай пока\!
m.rfc_court_1a=Приветствую вновь, звёздорождённый.
m.rfc_court_2a=Да, мы, природные спрайты — дождь, корень и почва. Но ты не такой, как мы. Ты — как те, что внизу.
m.rfc_court_3a=Увы, даже с восстановленной связью с Матерью Духов мы можем сделать лишь немногое для спасения этого места. Однако, когда закрывается один путь, может открыться другой. Такова природа этого переменчивого мира. Удачи, звёздорождённый.
m.rfc_court_4a=Хоть ты и одолел Ванадьюка, проклятие, которое он наложил на это королевство, всё ещё не рассеялось. Все наши силы уходят на то, чтобы сдерживать это бушующее теневое пламя.
m.rfc_court_5a=Мы все ощутили момент, когда ты сразил Ванадьюка. Вся цитадель содрогнулась при его падении, и на мгновение мы подумали, что этот мир будет уничтожен вместе со своим правителем. Будь осторожен, бродя по этим залам — всё вокруг рушится\!
m.rfc_court_6a=Стой, путник. Ты стоишь при дворе Королевства Альмир. Разве ты не слышишь, как трубы возвещают о возвращении наших могучих легионов? Разве ты не восхищён великолепной геральдикой наших благородных домов и государственных мужей?
m.rfc_court_7a=(Ты ощущаешь великую гордость, исходящую от павшего рыцаря, но он больше не произносит ни слова, глядя вдаль — туда, где видит жизнь, доступную лишь ему одному.)
m.rfc_court_7b=(Твои слова, похоже, не трогают павшего рыцаря, чей разум, кажется, затерялся где-то в славе его прошлой жизни.)
m.ritual_1a=Какой тёмный ритуал?
m.ritual_2b=Где ты это нашёл?\! Дай сюда\! Наконец-то смогу завершить свой труд\! Но предупреждаю\: понятия не имею, что может произойти. Может быть очень скверно. Тебе, вероятно, стоит подготовиться на случай, если всё пойдёт... наперекосяк.
m.ritual_3a=Ладно, вот оно...\n\nКАТ-ТУ... БЛУУГАТО... НЕКО\!
m.ritual_4a=Что ж, этого я не ожидал. В следующий раз получится\!
m.seerus_1=Ты ищешь могущество? Ярость пылающей звезды, закованную в сталь? Я покажу тебе и то, и другое\!
m.seerus_defeated=Пусть лучше всё сгорит, чем Арсенал достанется кому-то ещё\!
m.sl_guard_1=Доброй встречи, рыцарь. Перед тобой лифты, ведущие в так называемые «Теневые Логова». Теневые Логова содержат одних из самых могущественных монстров Часового Механизма, так что убедись, что ты полностью экипирован снаряжением Слоя 3, прежде чем идти дальше.
m.sl_guard_2=Рыцари-Разведчики, побывавшие в этих новых, странных мирах, утверждают, что чувствуют всепоглощающую тьму на каждом шагу. Здесь происходит нечто иное, и нам нужны наши лучшие рыцари для расследования.
m.sl_guard_3=Все Теневые Логова заперты странным механизмом, который можно открыть только «Теневым Ключом». Теневые Ключи можно приобрести на Складе Снабжения. \n\nКогда один из членов группы использует Теневой Ключ, состав группы фиксируется и не может меняться, так что выбирай товарищей с умом\!
m.sl_guard_4=Тогда удачи. Теневые Логова станут величайшим испытанием из всех, что тебе доводилось встречать.
m.sprite_tut_1a=Приветствую, {0}. Полагаю, у тебя есть вопросы о боевых спрайтах. Чем могу помочь?
m.sprite_tut_1aa=Ещё вопросы о боевых спрайтах? Чем могу помочь?
m.sprite_tut_2a=Боевые спрайты повышают уровень, накапливая тепло, как и твоё оружие и снаряжение. Тепло можно получить двумя способами\: поглощая его во время сражений в Часовом Механизме и поедая материалы, синтезируя их в тепло.
m.sprite_tut_2b=По мере роста уровня спрайт будет осваивать новые боевые навыки и получать очки навыков.
m.sprite_tut_2c=Все боевые спрайты носят механическую упряжь, которая настраивает их навыки на определённый тип урона. Не все спрайты могут носить все упряжи. Например, дракон не способен наносить колющий урон. \n\nПо умолчанию у тебя есть железная упряжь, которую может носить любой спрайт. Если хочешь расширить арсенал, как ты, вероятно, делаешь с оружием и снаряжением, тебе нужно приобрести новые упряжи.
m.sprite_tut_2d=Боевые спрайты получают перки на определённых уровнях, которые можно экипировать в интерфейсе боевого спрайта. Перки дают бонусы к твоим характеристикам.
m.sprite_tut_3a=Кормление спрайта материалами — самый быстрый способ повысить его уровень. Поговори с Бискотти здесь, в Лаборатории, чтобы узнать больше о кормлении спрайтов.
m.sprite_tut_3b=Каждый боевой спрайт освоит три навыка, которые можно использовать в бою. Навыки автоматически изучаются на определённых уровнях по мере роста спрайта. \n\nБоевые навыки усиливаются благодаря очкам навыков.
m.sprite_tut_3c=Загляни к Райли здесь, в Лаборатории, чтобы приобрести новые упряжи. После покупки упряжь автоматически добавляется в список упряжей в интерфейсе боевого спрайта. \n\nКроме того, при покупке прямого улучшения уже имеющейся упряжи она заменяется улучшенной версией.
m.sprite_tut_3d=Перки разблокируются случайно. Некоторые перки намного реже других и потребуют очень высокого уровня спрайта для полной разблокировки. \n\nТы даже можешь получить перки после достижения 100-го уровня\!
m.sprite_tut_4a=Твой спрайт будет эволюционировать по мере повышения уровня. На определённых ключевых уровнях спрайту потребуется скормить Эво-Катализатор для дальнейшего развития. После этого внешний вид спрайта физически изменится\! \n\nБудет интересно наблюдать, как эти новые, странные формы боевых спрайтов будут развиваться со временем.
m.sprite_tut_4b=Очки навыков регулярно зарабатываются при повышении уровня спрайта. Их можно распределить по навыкам в интерфейсе боевого спрайта. \n\nПри распределении очка навыка нужно выбрать параметр для усиления, например время перезарядки или общий урон.
m.sprite_tut_4c=Улучшения упряжи определённо стоят затраченных крон. Улучшенные версии каждой упряжи сокращают перезарядку боевых навыков\!
m.sprite_tut_5b=И не переживай о «неправильном» распределении очков навыков — со временем ты заработаешь достаточно, чтобы довести все навыки до максимума\!
m.sprite_tut_6b=Когда ты распределишь все очки навыков и достигнешь очень высокого уровня со своим спрайтом, тебе предстоит выбрать «ультимативные навыки». Ультимативные навыки — это улучшенные версии навыков твоего спрайта. Для каждого навыка спрайта есть два варианта ультимативного.
m.sprite_tut_7b=Можно выбрать лишь один ультимативный навык для каждого навыка спрайта, так что выбирай с умом\! Также учти, что выбор ультимативных навыков ещё раз изменит внешний вид твоего спрайта. \n\nСо всеми этими опциями твой спрайт максимального уровня точно будет выглядеть и вести себя не так, как остальные\!
m.standby_knight_recruit_1=Мой меч — к твоим услугам\!
m.standby_knight_recruit_2=Я прикрою\!
m.standby_knight_recruit_3=Во имя Спирального Ордена\!
m.test_greeter_1=Пришёл на тестирование? Ладно, убедись, что ознакомился с последней информацией о том, что тестировать, на доске Тестового Сервера в официальных форумах Spiral Knights. Спасибо, проходи.
m.tier_1_requirements=Доброй встречи, {0}. Чтобы продвинуться дальше и исследовать более глубокие уровни Часового Механизма, ты должен сначала достичь Ранга 4-2. \n\nВозвращайся, когда выполнишь необходимые Ранговые Миссии.
m.tier_2_requirements=Доброй встречи, {0}. Чтобы продвинуться дальше и исследовать более глубокие уровни Часового Механизма, ты должен сначала достичь Ранга 7-1. \n\nВозвращайся, когда выполнишь необходимые Ранговые Миссии.
m.tier_done=Доброй встречи, {0}. Достигнув необходимого ранга, ты допущен к исследованию более глубоких уровней Часового Механизма. Удачи тебе.
m.tortodrone_haven_1=Спиральная штаб-квартира поручила нам расследовать сообщения о том, что обломки тортодронов и скопления тёмной материи появляются повсюду в Часовом Механизме. Кора полагает, что бесы что-то замышляют. Есть свидетельства их причастности к исчезновению тортодронов.
m.tortodrone_haven_2=В укромном уголке таинственного сада мы обнаружили странный портал, который штаб-квартира называет Мрачными Вратами. Из того, что мы смогли расшифровать, для их открытия нужен некий ключ. Спиральная штаб-квартира считает, что глифы, которые мы заметили у бесов, могут быть связаны с открытием этих врат.
m.tut_intro2_1a=...приём, {0}, ты меня слышишь? Это Рыцарь-Разведчик Рендон\!
m.tut_intro2_2a=Ты только что достиг поверхности Крейдла. Моя спасательная капсула упала к северу от твоей позиции. Нужно встретиться и найти ближайшую точку сбора. \n\nБудь осторожен и приготовь меч — повсюду враждебные создания\!
m.tut_intro3_1a={0}\! Как же я рад тебя видеть\! Это место настолько чужое, что я счастлив увидеть знакомое лицо, а не очередного агрессора.
m.tut_intro3_2a=Я установил комлинк-связь с рыцарями, организовавшими Спасательный Лагерь впереди. Если пойдёшь на север, в конце концов доберёшься до него. \n\nЯ останусь здесь и буду искать других рыцарей, чьи капсулы упали поблизости. Встретимся в Спасательном Лагере до заката. \n\nИ если повстречаешь что-нибудь по-настоящему опасное, нажми [[?DEFEND]], чтобы использовать щит\!
m.tut_intro3_3a=Удачи\!
m.tut_intro3_3b=Будь осторожен\!
m.tut_intro3_3c=Помни, нажми [[?DEFEND]], чтобы использовать щит\!
m.tut_intro4_1a=Я останусь здесь и буду искать других рыцарей, чьи капсулы упали поблизости. Встретимся в Спасательном Лагере к северу. \n\nИ если повстречаешь что-нибудь по-настоящему опасное, нажми [[?DEFEND]], чтобы использовать щит\!
m.tut_intro_1a=Добро пожаловать на Крейдл, рекрут\! Всегда рад видеть рыцаря, пережившего десантирование целым и невредимым. Неподалёку от твоей позиции — Спасательный Лагерь. Я проведу тебя туда, но приготовь меч — впереди на дороге враги\!\n
m.tut_warden_1a=Приветствую, рыцарь. Ты, должно быть, {0} — Рендон передал по рации, что ты на подходе. Идём с нами, Спасательный Лагерь почти рядом.
m.tut_warden_2a=Мы тоже. А теперь двинем— \n\nПогоди, что-то не так. Приготовься, кажется, у нас гости\!
m.tut_warden_3a=Здорово, {0}\! Похоже, ты знаешь, как вести себя на поле боя. \n\nПойдём, двигаем к лагерю. Может, ты поможешь нам разобраться, что тут вообще происходит.
m.vise_seerus=Привет, парень\! \nСобрался на Сируса, значит? Осторожнее, он не в своём уме. Откровенно с катушек слетел. \n\nМы с ним давно знакомы, но не из тех знакомств, что хочется вспоминать. Если тебе улыбнётся удача — притащи мне сувенирчик оттуда. Я тебе кое-что славное из него смастерю.
m.winterfest_branch_cont=Путь опасностей уводит тебя ещё выше по этой коварной горе. Пока ты минуешь тайник с сокровищами гринчлинов ради шанса на ещё более богатый улов дальше по склону. \n\nБудь предупреждён\! Если испытания впереди одолеют тебя прежде, чем ты достигнешь следующего укрытия, ты лишишься всех сокровищ\!
m.winterfest_branch_exit=Путь в Хейвен позволяет покинуть эту коварную гору и собрать клад из сокровищ гринчлинов по дороге\! \n\nОднако, если ты решишь пройти мимо и продолжить подъём, впереди ждут ещё более щедрые сокровища...
m.winterfest_campknight_1a=Подъём опасен, {0}. Смотри под ноги и берегись ловушек гринчлинов\!
m.winterfest_campknight_2a=Т-так... х-х-холодно.
m.winterfest_campknight_3a=Эти гринчлины хитры и непредсказуемы. Рекомендую взять разнообразное снаряжение, чтобы быть готовым ко всему, чем они могут огорошить.
