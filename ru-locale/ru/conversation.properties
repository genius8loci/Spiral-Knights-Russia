r.almire_historian_1a=Что вы узнали об Альмире?
r.almire_historian_2a=Что случилось с остальным королевством?
r.arc_leader_1=Звучит важно, расскажите, как это работает.
r.arc_leader_2=Если бы нам удалось обуздать эту силу...
r.arc_leader_3=Я готов к этой задаче\!
r.arc_leader_4=Я понял свою миссию.
