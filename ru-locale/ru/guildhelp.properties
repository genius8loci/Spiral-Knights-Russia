m.design_info=Режим дизайна позволяет члену гильдии, имеющему достаточный ранг, переставлять мебель и другие элементы инфраструктуры в зале гильдии. В режиме дизайна предметы мебели можно поднимать и опускать, как Золотой ключ или Тяжелую статую, а по умолчанию их можно поворачивать, удерживая с помощью колесика мыши. Когда вы будете довольны результатом перестановки, вы можете опубликовать изменения из консоли команд и сделать их видимыми для остальных членов гильдии.
m.emporium_info=Магазин «Песня птиц» позволяет высокопоставленным членам гильдии приобретать предметы для гильдии, используя средства из казны гильдии. К этим предметам относятся различные предметы мебели для Зала гильдии и улучшения. Приобретенные предметы попадают прямо в казну гильдии и, таким образом, никогда не могут быть удалены из гильдии.\n Некоторые предметы мебели даже имеют специальные эффекты при активации! Любую мебель, находящуюся в казне гильдии, можно разместить в зале гильдии с помощью режима дизайна.\n В «Эмпориуме Бердсонг» вы также можете приобрести улучшения гильдии, которые расширяют ее возможности, например, увеличивают максимальное количество членов.\n По мере увеличения размера зала гильдии за счет добавления расширений, ассортимент предметов, доступных в каталоге «Эмпориума Бердсонг», также увеличивается. Обязательно заглядывайте сюда почаще, чтобы узнать, что появилось нового!
m.guild_hall_info=Зал гильдии — это нервный центр любой гильдии в Spiral Knights. Здесь члены гильдии могут расслабиться, планировать будущие миссии и пользоваться различными удобствами Зала гильдии, которые находятся в их распоряжении. Зал гильдии можно настраивать по своему усмотрению, а также расширять, чтобы он подходил для гильдий любого размера. В нем также можно разместить широкий выбор уникальной мебели и типов комнат, так что согласуйте свои действия с друзьями, чтобы ваш Зал гильдии стал настоящим отражением вашей гильдии\!\n Когда Зал гильдии открывается впервые, он состоит из двух комнат\: вестибюля и комнаты с консолью управления. Гильдии, желающие получить больше пространства для настройки, могут приобрести расширения, чтобы увеличить базовый размер своего Зала гильдии. Они доступны через Консоль управления в режиме проектирования.\n Гильдии, расширившие полезное пространство в своем Зале, могут заполнить его различными комнатами, доступными для покупки в «Эмпориуме Птичьего пения». Эти комнаты могут быть простыми, как пустая комната для размещения мебели, или же содержать одно из множества различных удобств для гильдии, таких как алхимические терминалы, магазины и многое другое\!\n Для содержания Залов гильдии требуется большое количество ресурсов, что выражается в еженедельных расходах на содержание в коронах. По мере того, как Зал гильдии получает все больше расширений, эти расходы увеличиваются, поэтому убедитесь, что в казне вашей гильдии достаточно коронок, чтобы оплатить все!
m.record_info=Журнал гильдии фиксирует важные недавние события в гильдии, такие как пожертвования в казну гильдии, вклады и снятие средств из различных хранилищ гильдии, а также повышения, приемы и уходы членов гильдии. Они позволяют членам гильдии с более высоким рангом отслеживать, кто вносит или забирает много из гильдии, и действовать соответственно.
m.storage_info=Хранилище гильдии действует как общий банк предметов. Члены гильдии соответствующего ранга могут добавлять или удалять снаряжение или предметы из хранилища по своему усмотрению. Это отличный способ делиться ресурсами между товарищами по гильдии или помогать новым членам\!\n ПРЕДУПРЕЖДЕНИЕ\: предметы, помещенные в хранилище гильдии, могут быть удалены и забраны любым членом гильдии, имеющим доступ к хранилищу. Не кладите в хранилище гильдии предметы, которые хотите оставить себе!
m.treasury_info=Казна гильдии содержит все предметы и короны, находящиеся в общей собственности гильдии. Чтобы разместить мебель в зале гильдии, ее сначала необходимо добавить в казну. Расходы на новые комнаты, предметы из магазина «Песня птиц» и еженедельное содержание также оплачиваются из казны, поэтому члены гильдии должны следить за тем, чтобы казна гильдии всегда была полна коронок!\n ПРЕДУПРЕЖДЕНИЕ\: Ничто из того, что добавлено в казну гильдии, не может быть удалено ни одним членом гильдии, включая мастера гильдии. При добавлении предметов или коронок в казну гильдии они навсегда становятся собственностью гильдии. Исключений нет.
