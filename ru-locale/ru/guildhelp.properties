m.design_info=Режим дизайна позволяет участнику гильдии достаточного ранга переставлять мебель и прочие элементы интерьера в зале гильдии. В режиме дизайна предметы мебели можно поднимать и ставить на место, как золотой ключ или тяжёлую статую. По умолчанию удерживаемые предметы можно вращать колёсиком мыши. Когда расстановка вас устроит, вы можете применить изменения через командную консоль, и они станут видны остальным членам гильдии.
m.emporium_info=Эмпориум «Птичья Песнь» позволяет высокоранговым участникам гильдии приобретать предметы для гильдии на средства из казны гильдии. Эти предметы включают разнообразную мебель и улучшения для зала гильдии. Купленные предметы поступают прямо в казну гильдии и никогда не могут быть изъяты из неё.\n Мебель бывает самых разных типов и размеров и используется для украшения комнат и залов вашей гильдии, чтобы они стали по-настоящему уютными. Некоторые предметы мебели даже обладают особыми эффектами\! Любую мебель из казны гильдии можно разместить в зале гильдии с помощью режима дизайна.\n В Эмпориуме «Птичья Песнь» также продаются улучшения гильдии, расширяющие её возможности — например, увеличение максимального числа участников.\n По мере расширения зала гильдии ассортимент Эмпориума также увеличивается. Заглядывайте почаще, чтобы узнать, что нового\!
m.guild_hall_info=Зал гильдии — это сердце любой гильдии в Spiral Knights. Здесь участники гильдии могут отдохнуть, спланировать будущие вылазки и воспользоваться различными удобствами. Зал гильдии легко настраивается под любые нужды и может быть расширен для гильдий любого размера. В нём также можно разместить множество уникальной мебели и типов комнат, так что объединяйтесь с друзьями, чтобы сделать свой зал настоящим отражением вашей гильдии\!\n При первом открытии зал гильдии состоит из двух комнат\: вестибюля и комнаты с командной консолью. Гильдии, желающие больше места для настройки, могут приобрести расширения для увеличения базового размера зала. Они доступны через командную консоль в режиме дизайна.\n Гильдии, расширившие своё пространство, могут заполнить его самыми разными комнатами, доступными в Эмпориуме «Птичья Песнь». Комнаты могут быть как пустыми для расстановки мебели, так и содержать различные полезные объекты — алхимические станции, магазины и многое другое\!\n Содержание зала гильдии требует значительных ресурсов, что выражается в еженедельной плате в кронах. С ростом числа расширений эта плата увеличивается, поэтому убедитесь, что в казне гильдии достаточно крон\!
m.record_info=Журнал гильдии фиксирует важную недавнюю деятельность внутри гильдии: пожертвования в казну гильдии, операции с хранилищами гильдии, а также повышения, приход и уход участников. Журнал помогает высокоранговым членам гильдии отслеживать, кто вносит вклад или берёт много из гильдии, и действовать соответственно.
m.storage_info=Хранилище гильдии действует как общий банк предметов. Участники гильдии соответствующего ранга могут класть или забирать снаряжение и предметы по своему усмотрению. Это отличный способ делиться ресурсами между согильдийцами или помогать новичкам\!\n ВНИМАНИЕ\: Предметы, помещённые в хранилище гильдии, может забрать любой участник гильдии с доступом к нему. Не кладите в хранилище то, что хотите оставить себе\!
m.treasury_info=Казна гильдии хранит все предметы и кроны, находящиеся в коллективном владении гильдии. Чтобы разместить мебель в зале гильдии, она должна сначала оказаться в казне. Расходы на новые комнаты, покупки в Эмпориуме «Птичья Песнь» и еженедельное содержание также оплачиваются из казны, поэтому участники гильдии должны следить за её пополнением\!\n ВНИМАНИЕ\: Всё, что помещено в казну гильдии, невозможно забрать обратно — ни один участник, включая гильдмастера. Добавляя предметы или кроны в казну, вы навсегда передаёте их в собственность гильдии. Исключений нет.
