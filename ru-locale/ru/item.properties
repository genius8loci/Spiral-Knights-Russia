m.acheron=Ахерон
m.add_more_bonuses=Добавьте больше огненных кристаллов, чтобы разблокировать шансы на бонусы!
m.add_more_success=Добавьте больше огненных кристаллов, чтобы увеличить шанс успеха кузницы и бонусы!
m.adv_evo_catalyst=Усовершенствованный катализатор эволюции
m.advanced_cautery_sword=Усовершенствованный каутерический меч
m.advanced_orb=Усовершенствованный алхимический шар
m.aegis=Эгида
m.aero_armor=Аэро-доспехи
m.aerohelm=Аэро-шлем
m.airbraker_shield=Щит-воздухозамедлитель
m.alchemy_room=Комната алхимика
m.alloy=Сплав
m.almire_bench_char=Обугленная скамейка
m.almire_bench_rest=Восстановленная скамейка
