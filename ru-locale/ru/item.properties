d.energy_well=ИСПОЛЬЗОВАТЬ\: Энергетический банк для использования членами гильдии.
d.furni_inspect=ИСПОЛЬЗОВАТЬ\: Рассмотреть поближе.
d.furni_lay=ИСПОЛЬЗОВАТЬ\: Ненадолго прилечь.
d.furni_library_lectern_cursed=ИСПОЛЬЗОВАТЬ\: Призывает потерянный дух.
d.furni_library_lectern_mystic=ИСПОЛЬЗОВАТЬ\: Накладывает таинственное заклинание.
d.furni_sit=ИСПОЛЬЗОВАТЬ\: Присесть отдохнуть.
d.furni_statue=Рыцарь, которого стоит помнить.
d.gsc_vip=К О М П Л И М Е Н Т А Р Н О\n\nПоскольку вы являетесь ключевым посетителем казино, мы рады предложить вам членство бесплатно.
d.recover_accessory=Извлекает аксессуар из предмета, возвращая аксессуар в ваш арсенал.
d.remove_accessory=ВНИМАНИЕ\! Удаление аксессуара из предмета уничтожит аксессуар.
e.message_too_long=Сообщение слишком длинное.
e.not_use_busy=Нельзя использовать этот предмет, пока вы заняты
e.not_use_location=Нельзя использовать этот предмет здесь
e.not_use_snow_bucket=Нельзя использовать этот предмет сейчас. Его можно использовать только в городе или в зале гильдии. Одновременно может быть использовано не более 10 штук.
e.not_wrapable=Предмет нельзя завернуть.
e.untradeable=Этот предмет нельзя обменять.
f.acheron=Поражая с дикой мощью Подземного Мира, это тёмное оружие, по слухам, способно довести слабых духом рыцарей до грани безумия.
f.adv_evo_catalyst=Замкнутый заряд крайне нестабильной энергии, который могут синтезировать боевые спрайты. Благодаря этому спрайты способны эволюционировать в ещё более совершенные формы с ещё более могущественными навыками.
f.advanced_cautery_sword=Каутеризирующий Меч с дополнительной функцией пилы, приспособленной для разрезания костных шипов крупных лишайниковых колоний.
f.advanced_orb=Редкий инкапсулированный элемент, применяемый в алхимической трансмутации. Эта сфера превосходна и может использоваться для создания весьма могущественных предметов.
f.aegis=Величественный щит, вверяемый лишь достойнейшим членам Спирального Ордена. Является ли его герб реликвией древнего Ордена или творением рыцарей, созданным на Крейдле — доподлинно неизвестно.
f.aero_armor=Обтекаемая аэродинамическая броня из лёгких гремлинских сплавов. Снижает нежелательную турбулентность в хаотичных ближних боях.
f.aerohelm=Лёгкий аэродинамический шлем, способный поднять вам настроение. Летать он не позволит, так что придётся импровизировать.
f.airbraker_shield=Лёгкий, компактный, пневматически активируемый щит, расширяющий свою площадь для отражения вражеских атак.
f.alchemy_room=Утилитарная комната, оснащённая двумя Алхимическими Машинами и торговцем общими товарами.
f.almire_bench=Добротная скамья, созданная для сановников Альмира.
f.almire_chair=Высеченный стул, столь же древний, как и хворающие аристократы Альмира.
f.almire_rug=Этот редкий ковёр был извлечён из руин королевской резиденции.
f.almire_table=Стол, перенесённый из священных залов Альмира для украшения вашего жилища.
f.almire_tapestry=Искусный гобелен с величественным гербом Альмира.
f.almirian_crusader_armor=Доспех, некогда носимый элитной королевской гвардией Альмира. Цвет слоновой кости был символом чистоты Альмира — и земель его, и сердец его народа.
f.almirian_crusader_helm=Шлем, некогда носимый элитной королевской гвардией Альмира. Цвет слоновой кости был символом чистоты Альмира — и земель его, и сердец его народа.
f.alpha_claw_gauntlet=Защитная перчатка из шкуры вольвера, оснащённая бритвенно-острыми когтями.
f.amputator=Венец исследований семейства слизней: нагретые возвратно-поступательные лезвия рассекают любого слизня с хирургической точностью и не дают его студенистому телу восстановиться.
f.ancient_plate_helm=Допотопный шлем, чей вес делает его неподъёмным для всех, кроме обладателей титанической силы.
f.ancient_plate_mail=Доспех-артефакт, некогда, по преданию, носимый титанами. Хоть и обеспечивает потрясающую защиту, его невероятный вес делает ношение весьма обременительным.
f.ancient_plate_shield=Антикварный щит, чьё происхождение затерялось в веках.
f.ancient_shell=Фрагмент прочного панциря тортодрона. Ходят слухи, что если уснуть на панцире тортодрона, можно ощутить тонкие вибрации, зовущие этих могучих существ к таинственному конечному пункту Великого Странствия.
f.angelic_cuirass=Изысканно украшенный костюмный доспех, призванный пробудить небесную связь.
f.angelic_helm=Прекрасный шлем, созданный по подобию небесного стража.
f.angelic_helmet=Прекрасный костюм, созданный исключительно для выдающихся голов.
f.angelic_raiment=Великолепный доспех, непрестанно сияющий, словно озарённый солнцем.
f.antigua=Загадочная реликвия забытых времён. Использует пороховой заряд для стрельбы.
f.arc_razor=Искусно выкованный механический меч, при каждом взмахе выбрасывающий острые сгустки энергии.
f.arcana=Исключительное стрелковое оружие, выпускающее мощные стихийные заряды, которые многие Спиральные Рыцари именуют «волшебными снарядами».
f.arcane_salamander_mask=Маска Саламандры, пропитанная магической силой. Считается, что она создана из фамильяров могущественных ведьм.
f.arcane_salamander_suit=Костюм Саламандры, пропитанный магической силой. Считается, что он создан из фамильяров могущественных ведьм.
f.arctic_acolyte_hood=Капюшон, который, по слухам, носят странствующие полярные послушники. «Мы видели, как они направились к горам, вглубь необъятного замёрзшего континента... но зачем?»
f.arctic_acolyte_mantle=Бронированная мантия, которую, по слухам, носят странствующие полярные послушники. «Мы видели, как они направились к горам, вглубь необъятного замёрзшего континента... но зачем?»
f.arctic_rogue_mail=Бронированная кольчуга, предположительно созданная полярным разбойником. Дополнена ледяными пластинами для маскировки в арктических экспедициях.
f.arctic_rogue_mask=Маска, предположительно созданная полярным разбойником. Осколки льда скроют вашу личность во время тайных арктических операций.
f.argent_peacemaker=Древнее стрелковое оружие, выкованное из солнечного серебра. Его пули служат провожатыми для тех, кто отказывается покидать этот мир.
f.armor_ankle=Аксессуар, прикрепляемый к лодыжкам некоторых доспехов. Аксессуары устанавливаются у Бешамеля на Базаре Хейвена.
f.armor_arms=Аксессуар, прикрепляемый к рукам некоторых доспехов. Аксессуары устанавливаются у Бешамеля на Базаре Хейвена.
f.armor_back=Аксессуар, прикрепляемый к спине некоторых доспехов. Аксессуары устанавливаются у Бешамеля на Базаре Хейвена.
f.armor_fallen=Проклятый доспех, некогда носимый небесным созданием, низвергнутым из рая.
f.armor_front=Аксессуар, прикрепляемый к передней части некоторых доспехов. Аксессуары устанавливаются у Бешамеля на Базаре Хейвена.
f.armor_rear=Аксессуар, прикрепляемый к задней части некоторых доспехов. Аксессуары устанавливаются у Бешамеля на Базаре Хейвена.
f.arthro_pod=Обтекаемый шлем, созданный по образу прочного хитинового панциря жука.
f.artillery_beacon=Портативный маяк, при развёртывании вызывающий шквал мощных ракет.
f.ascended_calibur=Выкован из редкого сплава солнечного серебра. Рыцари, достаточно искусные, чтобы владеть столь великолепным Калибуром, обычно сродняются со своим клинком и дают ему имя.
f.ash_agni=Когда эта бомба обратит поле боя в пепел — тогда, и только тогда, ваши враги получат дозволение умереть.
f.ash_tail_cap=Тёплая шапка из шкуры, дублёной жгучим перцем. Слегка пахнет карри.
f.ash_tail_coat=Добротная шкурная куртка с самоподогревом, защищающая владельца от атак заморозки. Секрет? Крошечная щепотка жгучего перца.
f.auction_room=Деловая комната с доступом к Аукционному Дому Хейвена.
f.aura=Аксессуар, прикрепляемый к некоторым доспехам. Аксессуары устанавливаются у Бешамеля на Базаре Хейвена.
f.authentic_mask=Высококачественная маска {0}, созданная в честь Фестиваля Тёмного Урожая. Отлично выполнена и служит вечно\!
f.auto_turret_kit=Устанавливает автоматическую турель, стреляющую по ближайшим врагам.
f.autogun=Полностью автоматическое стрелковое оружие, способное в быстром темпе выпускать мощные энергетические заряды.
f.avenger=Святой меч, созданный в иные времена для вооружения рыцарей, сражавшихся против легионов Подземного Мира.
f.azure_guardian_armor=Величественный комплект брони, обычно носимый предводителями Спирального Ордена. Невероятно толстый и защитный, но при этом удобный, как струящаяся чудо-ткань.
f.azure_guardian_helm=Благородный шлем, предназначенный для старших членов Спирального Ордена. Техника бесшовного вплетения драконьей чешуи в металл — тщательно оберегаемый секрет.
f.barbarous_thorn_blade=Мифический клинок, разящий с яростью самого Снарболакса. Владеющие им утверждают, что ощущают огненный взгляд зверя всякий раз, когда закрывают глаза.
f.barbarous_thorn_shield=Мифический щит, пропитанный яростью самого Снарболакса. Говорят, зверь может использовать светящиеся сферы на лицевой стороне щита, чтобы выслеживать малодушных владельцев.
f.barrier_cannon=Стрелковое оружие, алхимизированное из панциря тортодрона. Стихийная мощь тортодрона из Великого Странствия послужит вам в собственных экспедициях.
f.barrier_shell=Щит, алхимизированный из панциря тортодрона. Стихийная стойкость тортодрона из Великого Странствия послужит вам в путешествиях по суровым средам.
f.battle_chef_coat=Куртка рыцарей, работающих на камбузе Скайларка. С ними шутки плохи — эти повара мастера клинка как на поле боя, так и за его пределами.
f.battle_chef_hat=Шляпа рыцарей, работающих на камбузе Скайларка. С ними шутки плохи — эти повара мастера клинка как на поле боя, так и за его пределами.
f.beach_hat=Персональная переносная облегчённая конструкция для защиты головы от солнца.
f.beast_basher=Мощная кирка, модифицированная для нанесения дополнительного урона монстрам семейства зверей.
f.beast_scale=Относительно целая чешуйка, снятая с существа из Часового Механизма.
f.bechamel_room=Стильная комната, где Бешамель может добавлять или удалять аксессуары с вашего любимого снаряжения.
f.big_angry_bomb=Бомба невероятной мощности с отвратительным характером.
f.big_beast_basher=Было высказано предположение, что этой зверски острой киркой можно охотиться одновременно на зверей И минералы. Часовой Механизм уже не был прежним.
f.binding_essence=Странный, мерзкий реагент, который, предположительно, Апокрея использует для строительства своих структур. Стоит ему попасть на кожу — кажется, что он не смывается. Нет, должен смыться, просто нужно тереть усерднее. Усерднее, да...
f.bio_coat=Герметичный костюм биотехника, предназначенный для работы с враждебной или неизвестной флорой.
f.bio_helm=Герметичный шлем, разработанный биотехниками для сбора полевых образцов или работы в токсичных оранжереях.
f.biohazard=Тщательно проверьте герметичность доспеха перед использованием этого оружия, иначе будете страдать наравне с врагами. Снаряды Биоугрозы окутывают противника энергетическим полем, взрывающимся при получении урона.
f.black_chaingun=Высокотехнологичный пулемёт, способный обрушить на врага сотни теневых снарядов за кратчайшее время. Управление им требует умелых рук.
f.black_kat_cloak=Грубо сшитый плащ, повторяющий облик тенистого подрывника злосчастного Кошачьего Племени.
f.black_kat_cowl=Проклятый капюшон, источающий тёмную энергию. Говорят, он напоминает великого героя Кошачьего Племени Маргрела — того, кто открыл Книгу Серых Перьев и навлёк Катаклизм. Приносит великое несчастье каждому, кто осмелится его надеть.
f.black_kat_hood=Грубо сшитый капюшон, повторяющий облик тенистого подрывника злосчастного Кошачьего Племени.
f.black_kat_mail=Впечатляющая кольчуга, наделённая мощью Когтевальников — тайных спящих агентов Кошачьего Племени.
f.black_kat_mask=Впечатляющая маска, наделённая мощью Когтевальников — тайных спящих агентов Кошачьего Племени.
f.black_kat_raiment=Отвоёванное одеяние, источающее тёмную энергию. Говорят, оно напоминает великого героя Кошачьего Племени Маргрела — того, кто открыл Книгу Серых Перьев и навлёк Катаклизм. Приносит великое несчастье каждому, кто осмелится его надеть.
f.blackened_crest=Щит, некогда носимый рыцарем Альмира, ныне — проклятая реликвия, почти выгоревшая до неузнаваемости в Огнештормовой Цитадели. Для восстановления былого величия потребуется могущественнейшая алхимия.
f.blackhawk=Стрелковое оружие теневой направленности невероятной мощности. Говорят, оно хранит душу рыцаря, которому оставалось всего два дня до отставки.
f.blast_bomb=Универсальная бомба, выдаваемая Спиральным Рыцарям, зарекомендовавшим себя в полевых условиях.
f.blast_powder=Опасный побочный продукт огненных органических существ. Гремлины любят использовать его, чтобы взрывать всё подряд.
f.blaster=Универсальное стрелковое оружие, выдаваемое Спиральным Рыцарям, зарекомендовавшим себя в полевых условиях.
f.blaze_pepper=Восхитительная специя, ценимая обитателями Часового Механизма всех мастей. В молотом виде обладает ужасной привычкой цепляться решительно ко всему.
f.blazebrand=Высокотехнологичный клинок, сочетающий Спиральные и Часовые технологии. Способен произвести концентрированный высокотемпературный взрыв, безвредный для рыцарей.
f.blazebreak_armor=Надёжный комплект брони, мастерски отражающий самую огненную риторику. Неплох и в сопротивлении пламенным атакам.
f.blazebreak_helm=Надёжный шлем, который пригодится, когда обстановка накалится.
f.blazebreak_shield=Надёжный щит, который не позволит вам слишком распалиться в бою.
f.blazing_pulsar=Высокотехнологичный пульсар, способный метать компактные инферно на расстоянии. Снаряды пульсара усиливаются по мере удаления.
f.blight_needle=Доказанный факт: даже самый вирулентный токсин куда заразнее, если стрелять им беспорядочно по большой площади.
f.blighted_bone=Любопытный надколенник, знававший лучшие дни — после того как повидал нескольких лучших рыцарей.
f.blitz_needle=Когда подавление уже недостаточно, Блиц-Игла специализируется на «угнетающем огне».
f.blizzbrand=Высокотехнологичный клинок, сочетающий Спиральные и Часовые технологии. Способен произвести концентрированный низкотемпературный взрыв, безвредный для рыцарей.
f.blizzbreaker_armor=Надёжный комплект брони, мастерски противостоящий самому ледяному безразличию. Неплох и в сопротивлении атакам заморозки.
f.blizzbreaker_helm=Надёжный шлем, который не даст вам оцепенеть в напряжённой ситуации.
f.blizzbreaker_shield=Надёжный щит, который не позволит врагам заморозить вас.
f.blue_shard=Осколок Лунного Камня, слишком мелкий для запитки врат, но весьма пригодный в алхимии.
f.boater=Стильная шляпка для ношения на летних приёмах.
f.boltbrand=Высокотехнологичный клинок, сочетающий Спиральные и Часовые технологии. Способен произвести мощный электрический разряд, безвредный для рыцарей.
f.bolted_blade=Улучшенный Прото-Меч, укреплённый бронзовыми болтами, собранными в Часовом Механизме.
f.bombastic_demo_helm=Изящный шлем для разборчивого эксперта по взрывчатке. Он не подскажет, какое вино подходит к Нитрономе, но точно сохранит голову в красивом и целом виде.
f.bombastic_demo_suit=Отличный комплект брони для тех избранных, кто обращается с взрывчаткой с шиком и блеском... и при этом умудряется не подорвать себя.
f.bombhead_mask=Маска, заказанная Королём Крогмо в честь запуска Взрывной Сети, подозрительно напоминающая живую бомбу. Доступна в множестве стилей, чтобы подойти к любому комплекту брони.
f.book_of_dark_rituals=Древний гримуар, полный невыразимых потусторонних ритуалов. Как и любой проклятый том, наверняка найдётся некий одержимый, жаждущий заполучить его для крайне нечестивых целей. Обменивайте с осторожностью.
f.boosted_plate_helm=Спиральный Пластинчатый Шлем с усиленным внутренним источником энергии. Обзор несколько затруднён.
f.boosted_plate_mail=Спиральный Пластинчатый Доспех с усиленным внутренним источником энергии. Улучшение не сделало броню легче.
f.boosted_plate_shield=Великолепно отреставрированный Пластинчатый Щит, оснащённый внутренним источником энергии для отражения самых сокрушительных ударов.
f.bottomless_stocking=Межпространственная прореха в этом пушистом тканевом чулке поглощает любой помещённый в него предмет. Она даже проглотила швы.
f.box_elite_trinket=Содержит различные элитные пятизвёздочные тринкеты и улучшение ячейки тринкета. Предметы выбираются случайно. Ключ не требуется.
f.brandish=Надёжный клинок, чья скромная отделка скрывает истинную силу.
f.breach_blaster=Улучшенный колющий бластер, предназначенный для пробивания вражеской брони.
f.brigandine=Весьма практичный доспех в сочетании с вязаной курткой.
f.brimstone=Зловонный, стигийский, серный осколок, часто встречающийся в Подземном Мире.
f.bristling_buckler=Маленький щит с шипами, дополняющий ваш меч в ближнем бою.
f.bronze_bolt=Простой бронзовый болт, встречающийся повсюду в Часовом Механизме.
f.brute_core=Сочащийся голубой сгусток от особо могучего студенистого противника.
f.brute_jelly_helm=Крепкий шлем, выкроенный из чрезмерно агрессивной слизи.
f.brute_jelly_mail=Плотный комплект слизистой кольчуги, скроенный из останков особо воинственных желе.
f.brute_jelly_shield=Толстый щит из останков особо невоспитанных слизней. Прочный, лёгкий и восхитительно ягодного вкуса.
f.buccaneer_bicorne=Верная треуголка, надёжно защищающая от солнца, ветра, штормов и мстительных чаек.
f.buccaneer_box=Содержит различные уникальные предметы и аксессуары для буканьеров. Предметы выбираются случайно. Ключ не требуется.
f.buccaneer_broadsider=Грозное огнестрельное оружие с кремнёвым замком. Надёжность старинного механизма улучшена толикой гремлинского мастерства.
f.bucket_of_bloons=Это ведро, похоже, содержит бесконечный запас водяных шариков. Они вот-вот лопнут, так что бросайте их в друзей\!
f.bucket_of_flawed_snowballs=Это ведро, похоже, содержит бесконечный запас бракованных снежков. К сожалению, они начинают таять на воздухе, так что используйте их поскорее\!
f.buckled_coat=Зелёная куртка, скреплённая блестящими золотыми пряжками.
f.budding_coat=Порванный герметичный костюм может означать гибель, но, к счастью, этот заселён необычным симбиотическим растением. Наденьте его — и вам точно обеспечены умелые руки в садоводстве\!
f.budding_helm=Треснувший шлем биотехника, ставший домом для безобидного декоративного растения.
f.bushy_tail=Подозрительно целый хвост зверя из Часового Механизма.
f.caladbolg=Грозный большой меч из легенд — его удары рассекают поле боя, как радуга перечёркивает небо.
f.calibur=Стандартный меч, выдаваемый Спиральным Рыцарям, зарекомендовавшим себя в полевых условиях.
f.callahan=Стрелковое оружие невероятной мощи, способное оглушить цель. Говорят, оно заставляет жертв чувствовать себя далеко не такими удачливыми. Заряженный выстрел может даже пронзить нескольких врагов.
f.capsule_health=Маленькая капсула, восстанавливающая немного здоровья. Лучший друг искателя приключений\!
f.capsule_health_super=Капсула, восстанавливающая изрядное количество здоровья. Лучший друг искателя приключений\!
f.capsule_health_ultra=Капсула, восстанавливающая огромное количество здоровья. Никогда не выходите из дома без неё\!
f.capsule_remedy=Маленькая капсула, освежающая пользователя. Может снять все наложенные на вас статусные эффекты.\n\nБез паники\! Капсулы противоядия могут спасти жизнь, если вовремя о них вспомнить\!
f.captain_coat=Мореходное пальто, превосходное для космической фехтовальной эпохи.
f.casting_cone=Колпак для удобного колдовства. Конический, но не смешной.
f.catalyzer=Продвинутое алхимическое орудие, адаптированное из гремлинских горнодобывающих и подрывных устройств. Снаряды Катализатора окутывают врага энергетическим полем, взрывающимся при получении урона.
f.cautery_sword=Меч, созданный на основе медицинского инструмента; его нагретый клинок снижает повреждение тканей. Весьма грозен при истреблении монстров семейства слизней.
f.celestial_nav_helm=Особый шлем, созданный в память о древних исорианских звездоплавателях. С ним на голове вы видите ясный путь через ночное небо к бесчисленным мирам за горизонтом.
f.celestial_nav_suit=Особый костюм, созданный в память о древних исорианских звездоплавателях. С ним на себе вы чувствуете, что никогда не заблудились бы в космосе... если бы только Скайларк мог летать.
f.celestial_orbitgun=Этот пистолет, проецирующий планетоиды, вызывает образы рождения звёздных систем. Враги, попавшие в его пылающий водоворот, наверняка увидят свет.
f.celestial_ore=Невероятно редкий металл великой силы, по преданию, упавший с небес. Зачастую бездарно расходуется на короны и украшения для слизневой аристократии.
f.celestial_saber=Особая сабля, по слухам, напоминающая древних исорианских звездоплавателей, рассекавших ночное небо. С ней ваши враги точно увидят звёзды.
f.celestial_shield=Равноденствие Крейдла вдохновило двойственную натуру этого специализированного щита, равно защищающего от слепящего дневного света и ночного холода.
f.celestial_vortex=Небесная Бомба, модифицированная зарядом умирающего солнца. Враги, попавшие в огненный радиус взрыва, увидят проблеск зари мироздания.
f.chaos_cloak=Запретная мантия, по слухам, дарующая носителю защиту в безымянном царстве, где все стихии сливаются в одну и делятся на все.
f.chaos_cowl=Капюшон сомнительного происхождения, окутывающий владельца и тайной, и стихийной защитой.
f.chapeau_rose=Потрёпанная шляпа с пером, некогда принадлежавшая Рыцарю Розы — священному ордену храбрых и особенно щегольских героев, чьи бесчисленные приключения стали предметом множества народных сказаний. Рыцари Розы слыли непревзойдёнными фехтовальщиками, верившими, что их клинки подобны цветку их имени\: изящная красота, скрывающая жестокое жало.
f.charged_quicksilver_helm=Улучшенный Ртутный Шлем, способствующий уничтожению электрических врагов.
f.charged_quicksilver_mail=Улучшенный комплект Ртутной Кольчуги, заряжающий вас на бой.
f.charming_cap=Шляпа, которую следует носить, очаровывая очаровательных.
f.chess_room=Пустая комната с шахматной доской 8x8 в углу и рядом для зрителей.
f.chilling_duelist=Начните улаживать споры на рассвете с этим холодным заказным стрелковым оружием.
f.chroma_mask=Маска, выкроенная из шкуры хромалиска, дарующая владельцу его отменный вид.
f.chroma_suit=Костюм, скроенный из шкуры хромалиска. Удивительно, но хромалиски, похоже, находят существование этих доспехов лестным.
f.chroma_tear=Кристаллизованная слеза хромалиска, пригодная в качестве линзы для фокусировки оружия или коррекции близорукости.
f.circuit_breaker_armor=Доспех со взломанным стихийным ядром, направленным на сопротивление электричеству. Впрочем, эта нестандартная модификация создаёт другие стихийные уязвимости.
f.circuit_breaker_helm=Спиральный Шлем, модифицированный для дополнительной защиты от электричества ценой сопротивления огню и заморозке.
f.circuit_breaker_shield=Прото-Щит, модифицированный для некоторой защиты от электричества.
f.cloak=Необыкновенный плащ, любимый учениками тайных искусств.
f.clockblocker=Механический щит с точно подогнанными колёсами, шестернями и зубцами, делающими его прецизионным часовым инструментом.
f.clockworks_amrmor=Выкован из балок, шестерён, труб и обломков Часового Механизма. Пройдитесь по подиуму... нося на себе подиум\!
f.clockworks_box=Праздник всего, что связано с Часовым Механизмом\! Содержит костюмы и аксессуары из тех же балок, пластин, шестерён и зубцов, из которых состоят глубины планеты Крейдл. Предметы выбираются случайно. Ключ не требуется.
f.cobalt_armor=Высокопроизводительная броня Спирального Ордена, подходящая для любого приключения.
f.cobalt_helm=Высокопроизводительный шлем Спирального Ордена, подходящий для любого приключения.
f.coin_bonus_upgrade_1=При использовании увеличивает количество монет, получаемых в играх Колизея, на 1 на 24 часа. Одновременно может действовать до 6 ускорителей Монет Крогмо.
f.cold_iron_carver=Зачарованный меч из холодного железа, чей клинок отпугивает порождений тьмы.
f.cold_iron_vanquisher=Могучий клинок из холодного железа, выкованный с единственной целью — выслеживать и уничтожать нежить.
f.cold_snap=Прото-Бомба, модифицированная для создания небольших вспышек мороза при детонации.
f.coliseum_room=Оживлённая комната с кассой Колизея, Надзирателем за наградами Колизея и Алхимической Машиной Крогмо.
f.combuster=Сочетание принципов двигателей Скайларка с технологией Плавильни породило этот свирепый клинок, способный воспламенить даже самые огнестойкие материалы на расстоянии.
f.confetti=Используйте, чтобы подбросить в воздух и отпраздновать славные времена. Вперёд\!
f.confetti_bubbles=Используйте, чтобы выдуть облако пузырей в воздух. Посмотрите, сколько они продержатся, прежде чем лопнут\!
f.confetti_dark_harvest_treat=Отпразднуйте Фестиваль Тёмного Урожая, запустив увесистую тыкву в воздух. Что будет дальше — решает Тыквенный Король...
f.confetti_equinox=При броске это весеннее конфетти рассыпается свежепророщенной травой и благоухающими цветами. Дождь не требуется\!
f.confetti_fall_equinox=При броске это осеннее конфетти рассыпается угольками осени.
f.confetti_leaf=Чудесная хлопушка для лесных торжеств.
f.confetti_slime=При броске выглядит как маленькие розовые желейные кубики.
f.confetti_summer=При броске это летнее конфетти дарит тёплое чувство внутри.
f.confetti_winter=При броске это зимнее конфетти нагоняет изрядную прохладу.
f.cooling_cell=Маленькое устройство, применяемое в сложных механизмах для предотвращения перегрева. Также удобно держать в карманах жарким летним днём.
f.corrosive_acid=Едкое вещество, характерное для коррозийных существ.
f.cosmic_dust=Порция особого корма, любимого боевыми спрайтами, родом из космических глубин за самыми далёкими звёздами.
f.cosmic_mote=Маленький кусочек особого корма, любимого боевыми спрайтами, родом из космических глубин за самыми далёкими звёздами.
f.cosmic_orb=Сияющая сфера особого корма, любимого боевыми спрайтами, родом из космических глубин за самыми далёкими звёздами.
f.cosmic_star=Идеальная кристаллизация особого корма, любимого боевыми спрайтами, родом из космических глубин за самыми далёкими звёздами.
f.cosmic_stone=Концентрированный кусок особого корма, любимого боевыми спрайтами, родом из космических глубин за самыми далёкими звёздами.
f.cracked_crystal=Редкая кристаллизованная формация тепла, используемая для ковки высшего уровня оружия и снаряжения. Хоть и треснувший, он по-прежнему едва заметно мерцает.
f.crescent_helm=Крепкий шлем, напоминающий полумесяц при поднятом забрале.
f.crest_almire=Мерцающий герб, некогда гордо несомый благородными рыцарями Альмира. Говорят, он благословляет тех, кто сражается за родину, даруя внутреннюю силу.
f.crest_of_ur=Герб утраченного Легиона Ур — элитной банды демонических воителей, по преданию, некогда покоривших Подземный Мир. Держащий его слабо различает звук барабанов и цокот копыт.
f.crimsonite=Легендарный минерал огненно-красного цвета, по преданию, содержащий страсть, гнев и силу окружающей жизни.
f.crimsonite_deposit_1=Небольшое месторождение, из которого добывается одна единица кримзонита.
f.crimsonite_deposit_2=Приличное месторождение, из которого добывается несколько единиц кримзонита.
f.crimsonite_deposit_3=Крупное месторождение, из которого добывается множество единиц кримзонита.
f.crimsonite_deposit_4=Богатейшая жила, из которой добывается целое состояние кримзонита.
f.crimsonite_shard=Осколок Кримзонита, слишком мелкий для запитки врат, но весьма пригодный в алхимии.
f.critter_carapace=Хитиновый кусок, бережно снятый с существа Часового Механизма. На удивление хорошо сохранился.
f.crown_fallen=Проклятая корона, некогда носимая небесным созданием, низвергнутым из рая.
f.cryo_driver=Высокотехнологичное алхимическое оружие, выпускающее мощные крио-снаряды, многократно разделяющиеся при попадании.
f.cryotech_alchemer=Алхимическое стрелковое оружие, стреляющее сверхнизкотемпературными снарядами, разделяющимися при попадании.
f.cryotech_alchemer_mkii=Улучшенный Алхемер, стреляющий сверхнизкотемпературными зарядами с повышенной скорострельностью.
f.crystal_bomb=Осколочная бомба из маленькой взрывчатки, заключённой в сплав Лунного Камня и Валестоуна. Её успокаивающий лазурный оттенок клинически доказано успокаивает рыцарей и уничтожает нежить.
f.crystalline_defender=Прочный, качественный щит, покрытый защитным ледяным слоем, подходящий для любого приключения.
f.cuirass=Облегающий доспех — сплошное дело и ни единого кармана.
f.culet=Элегантно сконструированный доспех, способный польстить любой фигуре.
f.cursed_idol=Маленькая каменная статуэтка в облике одного из тысяч архидемонов Подземного Мира. Тенистая поверхность словно движется и клубится, как дым.
f.cutter=Бандитский меч с жуткой зазубренной кромкой.
f.cyclops_cap=Странный шлем с единственным сосредоточенным глазом, любимый начинающими стрелками.
f.dangerous_brigandine=Стёганая броня, напоминающая о высокой смертности элитных Рыцарей-Разведчиков. Разведчикам нужно двигаться налегке и быстро, часто очертя голову бросаясь в ситуации, способные нагнать ужас на остальных.
f.dangerous_diablo_helm=Шлем, носимый Рыцарями-Разведчиками. Созданный для устрашения врагов, он повторяет образ демона, который, по преданию, отломил собственный рог, чтобы использовать его как оружие перед своей гибелью.
f.dangerous_draped_armor=Свободная броня, носимая более опытными Рыцарями-Разведчиками. Ходят слухи, что подобное снаряжение шьётся из останков доспехов павших Разведчиков, напоминая носителю, что он всегда находится в объятиях Смерти.
f.dangerous_grim_mask=Шлем, носимый Рыцарями-Разведчиками. Созданный для устрашения врагов, он повторяет образ самой Смерти. Носящие его любят приговаривать: «Смерть всегда наблюдает, так что лучше устройте достойное зрелище.»
f.dangerous_hound_coat=Бывалая куртка, которую носят командиры отрядов Рыцарей-Разведчиков, прозванных «гончими». Прозвище, видимо, связано с их невероятными навыками выслеживания или с тем, что они дерутся, как дикие псы.
f.dangerous_oni_helm=Шлем, носимый Рыцарями-Разведчиками. Созданный для устрашения врагов, он повторяет образ демона, живущего в горах далёкой земли. Говорят, он охраняет врата в Рай, пропуская лишь достойных.
f.daring_rigadoon=Свирепый вертел, способный замедлить до ползанья даже самого бодрого из противников.
f.dark_briar_barrage=Мифический предмет, способный взорваться с яростью самого Снарболакса. Потусторонний вой, который он издаёт, по слухам, калечит сильнее самого взрыва.
f.dark_chaingun=Пулемёт, способный обрушить на врага шквал обжигающих теневых зарядов.
f.dark_ember=Искра пылающей энергии, извлечённая из тронного зала Лорда Ванадьюка. Она медленно тлеет с зловещей интенсивностью, создавая почти гипнотический транс при длительном созерцании.
f.dark_matter=Легендарный минерал тёмного и зловещего цвета, по преданию, содержащий сущности хаоса и небытия.
f.dark_matter_bomb=Осколочная бомба из маленькой взрывчатки, заключённой в Тёмную Материю. С момента открытия Тёмная Материя нашла множество применений — от питания Спиральных технологий до перестройки гремлинов на субатомном уровне.
f.dark_matter_deposit_1=Небольшое месторождение, из которого добывается одна единица тёмной материи.
f.dark_matter_deposit_2=Приличное месторождение, из которого добывается несколько единиц тёмной материи.
f.dark_matter_deposit_3=Крупное месторождение, из которого добывается множество единиц тёмной материи.
f.dark_matter_deposit_4=Богатейшая жила, из которой добывается целое состояние тёмной материи.
f.dark_matter_shard=Осколок Тёмной Материи, слишком мелкий для запитки врат, но весьма пригодный в алхимии.
f.dark_shard=Осколок Тёмной Материи, слишком мелкий для запитки врат, но весьма пригодный в алхимии.
f.dark_thorn_blade=Свирепый меч, чья сила укреплена подношением душ зверю внутри.
f.dark_thorn_shield=Мрачный страж, наделяющий удары меча сверхъестественной свирепостью.
f.dead_gold=Монета, вкладываемая в руки усопших перед погребением, дарующая плату за долгий путь.
f.deadly_candy_poker=Зубная боль — наименьшая из забот, когда вы вооружены этим пронзающим подарком.
f.deadly_charcoaler=Этот доблестный гриль гарантированно обуглит ваших соперников.
f.deadly_crystal_bomb=Крупный кусок сплава Лунного Камня и Валестоуна, начинённый мощной взрывчаткой. Исследования доказали, что эта бомба способна снизить тягу зомби к мозгам на 100%, разнеся их на куски.
f.deadly_dark_matter_bomb=Крупный кусок Тёмной Материи, начинённый мощной взрывчаткой. Эта бомба грубо нарушала бы технику безопасности Спирального Ордена, если бы они не потеряли последний экземпляр при крушении.
f.deadly_shard_bomb=Крупный кусок Кримзонита, начинённый мощной взрывчаткой. Никакого обеднённого Кримзонита\: эта бомба сделана из высшего сорта\! Или худшего, если вы — цель.
f.deadly_splinter_bomb=Крупный кусок синтетического минерала, начинённый мощной взрывчаткой. Факт\: проще всего найти занозу в стогу сена — взорвать стог.
f.deadly_virulisk_mask=Маска Вирулиска, улучшенная продвинутым фильтром токсинов. Внутри всегда пахнет искусственными хвойными иголками.
f.deadly_virulisk_suit=Добротный костюм из шкуры самого смертоносного вирулиска. К сожалению, он не унаследовал способность вирулиска к маскировке.
f.deadshot_chapeau=Мифическая шляпа для тех, кто никогда не промахивается. По слухам, она сшита из ткани, ранее побывавшей в могиле.
f.deadshot_mantle=Пончо для бледного всадника, нацелившегося на истребление злобной, уродливой нежити из тьмы.
f.decon_helm=Закалённый и стойкий к опасностям головной убор.
f.decon_rig=Экзоскелет из конструкционного железа и удобных кабелей, выкованный из самых костей Крейдла.
f.deconstructor=Бомба, специально сконструированная для демонтажа механизмов — разумных и не очень.
f.deep_sea_cuirass=Доспех с переливающейся чешуёй, движущейся, как мерцающие волны. Носить его не слишком приятно, поскольку он неизменно холоден и сыр.
f.defender=Прочный, качественный щит Спирального Ордена, подходящий для любого приключения.
f.dim_crystal=Редкая кристаллизованная формация тепла, используемая для ковки высшего уровня оружия и снаряжения. Тепло внутри мерцает, как крошечная свеча.
f.divine_avenger=Улучшенный Мститель, выкованный из чистейшего солнечного сплава. В этом мире осталось мало врагов, достойных быть поверженными столь великим клинком, и ещё меньше героев, достойных им владеть.
f.divine_dust=Порция особого корма, любимого боевыми спрайтами, вечно купающимися в свете небес.
f.divine_mantle=Небесный плащ, некогда, по преданию, носимый божественными мудрецами.
f.divine_mote=Маленький кусочек особого корма, любимого боевыми спрайтами, вечно купающимися в свете небес.
f.divine_orb=Сияющая сфера особого корма, любимого боевыми спрайтами, вечно купающимися в свете небес.
f.divine_star=Идеальная кристаллизация особого корма, любимого боевыми спрайтами, вечно купающимися в свете небес.
f.divine_stone=Концентрированный кусок особого корма, любимого боевыми спрайтами, вечно купающимися в свете небес.
f.divine_veil=Небесный капюшон, некогда носимый божественными мудрецами.
f.down_puffer=Пуховая пышная куртка. Превосходная теплоизоляция обеспечена пухом снайпов. (Ни один снайп не пострадал при изготовлении — перья собраны ненавязчиво, со свободно гуляющих птиц.)
f.dragon_scale=Бронированная чешуйка существа, считавшегося вымершим. Отражает свет потусторонним сиянием.
f.dragon_scale_helm=Мифический шлем, выкованный из чешуи легендарного существа.
f.dragon_scale_mail=Мифический доспех, выкованный из чешуи легендарного существа.
f.dragon_scale_shield=Мифический щит, выкованный из чешуи легендарного существа.
f.drake_scale=Прочная чешуйка, добытая у свирепого зверя.
f.drake_scale_helm=Шлем, выкованный из чешуи зверей, считающихся потомками драконов.
f.drake_scale_mail=Доспех, выкованный из чешуи зверей, считающихся потомками драконов.
f.drake_scale_shield=Крепкий щит, сформованный из прочной чешуи.
f.drakon_pod=Капсула со спрайтом, содержащая Дракона 1-го уровня. \n\nДракон — боевой спрайт, воплощающий огненное разрушение. Его навыки сосредоточены на чистой атакующей мощи.
f.draped_armor=Стильный доспех, добавляющий нотку элегантности в бой.
f.dread_captain_cutlass=Заказной изогнутый клинок, отточенный на неосторожных потерпевших кораблекрушение.
f.dread_skelly_mask=Венец пугающего головного убора, гарантированно защитит ваш черепок даже от самых адских теневых атак.
f.dread_skelly_shield=Большой костяной бастион, овеянный чёрной дымкой. Иногда издаёт тихий печальный шёпот — обычно напоминая о блокировании.
f.dread_skelly_suit=Самый грозный из известных костюмов-скелетов. В этих жутких доспехах нет ничего юморного.
f.dread_venom_striker=Оружие убийцы, чья кромка оставляет глубокие раны, сочащиеся ядом. Пожалуй, храните его отдельно от перекусов.
f.driftwood=Причудливый кусок дерева, который никак не хочет оставаться на месте.
f.dusker_cap=Шлем из шкуры для рыцарей, предпочитающих сражаться лоб в лоб.
f.dusker_coat=Тёплая куртка искателя приключений, позволяющая атаковать со свирепостью Альфа-Даскера.
f.ecto_drop=Капля эктоплазмы, тщательно собранная с несговорчивого нежити-добровольца. Неприятного оттенка зелёного.
f.electron_bomb=Адаптирована из нескольких неортодоксальных гремлинских теорий физики. Всякого, кого затянет в радиус взрыва, ждёт шок.
f.electron_charge=Маленький электро-взрывной заряд таинственного происхождения. Способен генерировать калечащий вихрь электричества.
f.electron_vortex=Электронная Бомба, снаряжённая нестабильной органической эссенцией. Попавших в карающий радиус взрыва жестоко нарекают «громоражёнными».
f.elemental_blaster=Улучшенный бластер, модифицированный для стрельбы стихийными зарядами.
f.elemental_cloak=Прекрасная мантия с разнообразной стихийной защитой, вплетённой прямо в ткань.
f.elemental_hood=Мистическая маска для колдующих бойцов, обеспечивающая существенную защиту от стихий.
f.elite_orb=Редкий инкапсулированный элемент, применяемый в алхимической трансмутации. Такие сферы используются элитными рыцарями для создания предметов исключительного качества и мощи.
f.emberbreak_armor=Доспех со взломанным стихийным ядром, направленным на сопротивление огню. Впрочем, эта нестандартная модификация создаёт другие стихийные уязвимости.
f.emberbreak_helm=Спиральный Шлем, модифицированный для дополнительной защиты от огня ценой сопротивления заморозке и электричеству.
f.emberbreak_shield=Прото-Щит, модифицированный для некоторой защиты от огня.
f.empty_room=Пустая комната Зала Гильдии со стандартным полом и обилием места для мебели\!
f.empty_room_catwalk=Пустая комната Зала Гильдии с промышленным полом и обилием места для мебели\!
f.empty_room_checker_large=Пустая комната Зала Гильдии со смешанным полом и обилием места для мебели\!
f.empty_room_checker_small=Пустая комната Зала Гильдии с шахматным узором на полу.
f.enamorock=Странный камень, от одного прикосновения к которому становится тепло и уютно на душе.
f.energy_well=После пополнения энергией, члены гильдии могут ежедневно снимать по 100 единиц энергии.
f.eternal_orb=Редкий инкапсулированный элемент, применяемый в алхимической трансмутации. Эта сфера ценится могущественнейшими рыцарями и используется для создания предметов чрезвычайной мощи.
f.everfrost=Маленькая россыпь ледяных кристаллов, которые никогда не тают, даже под прямым нагревом.
f.evo_catalyst=Замкнутый заряд крайне нестабильной энергии, который могут синтезировать боевые спрайты. Благодаря этому спрайты способны эволюционировать в высшие формы и обучаться новым навыкам.
f.exp_center_2f=Расширение, добавляющее большой центральный зал для собраний в Зале Гильдии.
f.exp_center_4f=Расширение, добавляющее маленькую центральную комнату в Зал Гильдии.
f.exp_east_1f=Расширение, добавляющее две комнаты в восточную часть Зала Гильдии.
f.exp_east_2f=Расширение, добавляющее две комнаты и маленький балкон в восточную часть Зала Гильдии.
f.exp_east_3f=Расширение, добавляющее две комнаты и маленький балкон в восточную часть Зала Гильдии.
f.exp_east_4f=Расширение, добавляющее три комнаты и маленький балкон в восточную часть Зала Гильдии.
f.exp_east_5f=Расширение, добавляющее две комнаты в восточную часть Зала Гильдии.
f.exp_west_1f=Расширение, добавляющее две комнаты в западную часть Зала Гильдии.
f.exp_west_2f=Расширение, добавляющее две комнаты и маленький балкон в западную часть Зала Гильдии.
f.exp_west_3f=Расширение, добавляющее две комнаты и маленький балкон в западную часть Зала Гильдии.
f.exp_west_4f=Расширение, добавляющее три комнаты и маленький балкон в западную часть Зала Гильдии.
f.exp_west_5f=Расширение, добавляющее две комнаты в западную часть Зала Гильдии.
f.eye_pack_amazing=Содержит три потрясающих формы глаз для вашего набора стиля\: Клевер, Череп и Микросхема.
f.eye_pack_bedazzling=Содержит три ослепительных формы глаз для вашего набора стиля\: Цветок, Цветение и Искра.
f.eye_pack_shapely=Содержит три фигурных формы глаз для вашего набора стиля\: Треугольник, Квадрат и Шестиугольник.
f.eye_pack_suited=Содержит набор подходящих форм глаз для вашего набора стиля\: Трефы, Бубны, Черви и Пики.
f.fang_of_vog=Меч, по преданию, созданный из клыка огненного зверя Вога.
f.faust=Могучий проклятый меч, выкованный в Подземном Мире. Его мощные заряженные атаки порой проклинают самого владельца.
f.fearless_rigadoon=Вершина парализующих колющих — неясно, что сильнее ошеломляет противников: его элегантность или жестокий укус.
f.fencing_jacket=Просторный камзол, любимый начинающими фехтовальщиками.
f.feral_cannon=Стрелковое оружие, алхимизированное из закалённого панциря тортодрона. Держа его, вы ощущаете колющую энергию внутри, ожидающую высвобождения.
f.feral_kat_hood=Примитивный капюшон, повторяющий облик дикого зверя.
f.feral_shell=Щит, алхимизированный из закалённого панциря тортодрона. Даже острейшие когти вольвера лишь скользят по этому компактному панцирю.
f.fiend_portal_key=Использование позволит вам открыть Зловещие Врата в Древней Роще и пройти через них.
f.fiendglyph=Фрагмент бесовского удостоверения. Объединив пять различных глифов в полное удостоверение, вы сможете открыть Зловещие Врата в Древней Роще.
f.fierce_flamberge=Пылающая сабля, главный аргумент которой — зажарить ваших врагов на вертеле.
f.fiery_atomizer=Мощная алхимическая бомба, создающая плотное облако высоковоспламеняющейся обжигающей пыли.
f.fiery_diskgun=Стрелковое оружие с адским двигателем, запускающим раскалённые диски в быстрой последовательности. Диски возвращаются, достигнув апогея.
f.fiery_pepperbox=Когда вас атакует стая Ледяных Кубов, все рыцари сходятся во мнении\: счастье — это Огненный Перцемёт.
f.fiery_vaporizer=Алхимическая бомба, создающая облако высоковоспламеняющегося тумана.
f.fiery_vaporizer_mkii=Огненный Испаритель, модифицированный для распыления горючих веществ на большей площади.
f.final_flourish=Главное оружие серьёзного фехтовальщика — парирует столь же легко, сколь и потрошит врагов.
f.fine_fabric=Добротный отрез прочной ткани, стащенный у обитателя Часового Механизма.
f.fire_barrier=Окружает вас огненными сферами, способными поджечь врагов.
f.fire_raider_helm=Безупречный шлем рейдера, не считая пары вмятин и толстого слоя пепла.
f.fire_raider_tunic=Сокровища на расстоянии вытянутой руки и пепел за спиной — в этой покрытой сажей куртке.
f.firebreak_armor=Улучшенная Уголёчная броня, дополнительно взломанная для сопротивления огню.
f.firebreak_helm=Уголёчный Шлем, модифицированный для дополнительной защиты от огня.
f.firebreak_shield=Уголёчный Щит, модифицированный для усиленной защиты от огня.
f.fireburst_brandish=Улучшенный Брандиш, пропитанный стихийной эссенцией огня.
f.firecracker=Прото-Бомба, модифицированная для создания небольших вспышек огня при детонации.
f.firefighter_helmet=Обычно носимый пожарными, этот шлем не обеспечивает особой защиты, но даёт высокое сопротивление огню.
f.firetail_mail=Пылающая обезьянья кольчуга, обычно носимая командирами в бою. Защитит от множества ранений.
f.firetail_mask=Тлеющая обезьянья маска, созданная в честь нового года. Пылающий силуэт продемонстрирует вашу властную натуру.
f.fireworks=В пору торжеств Спиральный Орден направляет часть своих подрывников на создание впечатляющих фейерверков.
f.firo_driver=Высокотехнологичное алхимическое оружие, выпускающее мощные огненные снаряды, многократно разделяющиеся при попадании.
f.firotech_alchemer=Алхимическое стрелковое оружие, стреляющее снарядами жидкого пламени, разделяющимися при попадании.
f.firotech_alchemer_mkii=Улучшенный Алхемер, стреляющий зарядами напалма с повышенной скорострельностью.
f.flak_jacket=Лёгкая бронированная куртка, позволяющая выглядеть и чувствовать себя хладнокровно.
f.flamberge=Огненный клинок, прожигающий столь же легко, сколь и прокалывающий.
f.flame_soul=Могущественная сущность, остающаяся после гибели существа в слепой огненной ярости.
f.flaming_pulsar=Пульсар, снаряжённый обжигающей энергией, усиливающейся со временем. Снаряды пульсара набирают мощь по мере удаления.
f.flare_popper=Хоть и не предназначенная для вечеринок, Рыцари-Разведчики любят запускать сигнальные ракеты в честь миссий, с которых все вернулись живыми. К несчастью, по словам любого Разведчика, таких ракет в небо уходит до обидного мало.
f.flawed_orb=Редкий инкапсулированный элемент, применяемый в алхимической трансмутации. Хоть и с изъяном, эта сфера пригодна для создания маломощных предметов.
f.flawed_snowball=Плотно слепленный снежок, к сожалению, слишком бракованный для алхимии. Лучше всего просто швырнуть его... кому-нибудь в голову.
f.flourish=Стильная сабля, отлично подходящая для того, чтобы расстраивать планы врагов.
f.foiled_frosted_helm=Восхитительный шлем из торта, созданный во время празднования годовщины Спиральных Рыцарей. Несмотря на красивую фольговую обёртку, он всё ещё из торта и со временем рассыпается.
f.forbidden_fruit=Грешная лакомка, обожаемая оголодавшими бесами.
f.force_buckler=Прото-Щит, модифицированный для сопротивления оглушающим ударам.
f.force_dynamo=Интригующее устройство, способное, казалось бы, генерировать энергию из ниоткуда.
f.fowl_cloak=Простой пернатый плащ. Облачитесь в пух и пустите пух ко дну\!
f.fowl_cloak_vol=Опалённый пернатый плащ. Разведите огонь и встречайте новый год с петушиным задором.
f.fowl_cowl=Клювастая маска под простым капюшоном. Примите облик пернатых друзей и отпразднуйте новый год.
f.fowl_cowl_vol=Клювастая маска под опалённым капюшоном. Встречайте новый год в стихийном одеянии.
f.frayed_fabric=Потрёпанные остатки нарядов обитателя Часового Механизма. Вероятно, пригодны для переработки.
f.freeze_barrier=Окружает вас ледяными сферами, способными заморозить врагов на месте.
f.freeze_raider_helm=Меховой шлем, гарантированно согреет вас в зимнем набеге.
f.freeze_raider_tunic=Набег быстр, тепло надето — в этой меховой куртке.
f.freezing_atomizer=Мощная алхимическая бомба, производящая плотное облако крайне морозного тумана.
f.freezing_pulsar=Пульсар, снаряжённый замораживающим агентом, холодающим со временем. Снаряды пульсара набирают мощь по мере удаления.
f.freezing_vaporizer=Алхимическая бомба, производящая облако сверхнизкотемпературного тумана.
f.freezing_vaporizer_mkii=Морозный Испаритель, модифицированный для распыления сверхнизкотемпературных веществ на большей площади.
f.frenzy_avenger_helm=Шлем, носимый небесными стражами, охраняющими царство, сокрытое на вершине овеянной ветрами горы.
f.frenzy_caller=Праздничная хлопушка богов, призывающая вспышку неистовства с небес.
f.frenzy_champion_helm=Шлем той, что бросила вызов богам и штурмовала врата небесного царства. Говорят, свистящие ветра — вечные боевые кличи её осады.
f.frenzy_crusader_helm=Шлем мифических воинов, которые, по преданию, сражаются с таким неистовством, что оставляют за собой вихри.
f.frenzy_dragon_helm=Зачарованный шлем в облике зверя, который, по поверью, сотворил мир своим прохождением\: его неистовство породило могучие ветра, его чешуи стали тенями.
f.frenzy_plate_mail=Легендарный доспех, по преданию, наделяющий владельца неистовством тысячи полубогов.
f.frenzy_rider_mantle=Легендарный доспех, предположительно носимый богом, что неистовством высекал целые миры из камня.
f.frenzy_warrior_helm=Шлем легендарного мастера клинка, чьё одно лишь неистовство могло сразить армии, прежде чем те поднимались против него.
f.frost_gel=Капля прохладной слизи, собранная с хладнокровного обитателя Часового Механизма.
f.frost_gun=Модифицированный Прото-Пистолет, снабжённый низкоинтенсивным алхимическим замораживающим агентом.
f.frost_sword=Этот меч холоден как лёд и готов пожертвовать вашей любовью, а заодно и любыми монстрами, оказавшимися на пути.
f.frostbreaker_armor=Доспех со взломанным стихийным ядром, направленным на сопротивление заморозке. Впрочем, эта нестандартная модификация создаёт другие стихийные уязвимости.
f.frostbreaker_helm=Спиральный Шлем, модифицированный для дополнительной защиты от заморозки ценой сопротивления огню и электричеству.
f.frostbreaker_shield=Прото-Щит, модифицированный для некоторой защиты от заморозки.
f.frosted_helm=Восхитительный шлем из торта, созданный во время празднования годовщины Спиральных Рыцарей. Поскольку он из торта, со временем рассыпается.
f.frozen_great_cleaver=Заказной Триглав, сконструированный Бискотти, шеф-поваром Скайларка. Хоть она и клянётся, что он используется только для готовки, нетрудно догадаться, что немало монстров познакомились с ним на разделочной доске.
f.frozen_pulsar=Высокотехнологичный пульсар, способный произвести снежную бурю изо льда при созревании зарядов. Снаряды пульсара набирают мощь по мере удаления.
f.fuel_canister=Маленькая ёмкость, некогда использовавшаяся для хранения топлива сложного механизма.
f.fur_cap=Уютная меховая шапка, повторяющая облик дикого зверя.
f.fur_coat=Особо тёплая куртка, сшитая из шкуры пушистого зверя.
f.furious_flamberge=Искусные фехтовальщики могут вырезать своё имя на противниках. Легендарные — выжигают.
f.furious_fork=Хороший повар знает, когда переворачивать котлеты. Великий повар жарит котлеты, пока их переворачивает.
f.furni_beacon_floor_blue=Спиральный осветитель, обычно используемый для подсветки особых зон или обозначения ограниченной акции.
f.furni_beacon_floor_green=Спиральный осветитель, обычно используемый на контрольных точках.
f.furni_beacon_floor_red=Спиральный осветитель, обычно устанавливаемый в опасных зонах.
f.furni_beacon_floor_yellow=Спиральный осветитель, обычно используемый для рекомендации осторожности.
f.furni_bed_spiralmilitary=Удобная койка — лучше, чем спальник на земле.
f.furni_bench_manor=Изысканная скамья, идеальная для отдыха в элегантной позе.
f.furni_block_ice=Блок из плотно утрамбованного снега. Идеален для возведения снежных крепостей\!
f.furni_brazier_short_blue=Низкий факел с причудливым голубым пламенем.
f.furni_brazier_short_green=Низкий факел с жутковатым зелёным пламенем.
f.furni_brazier_short_orange=Низкий факел с потусторонним оранжевым пламенем.
f.furni_brazier_short_purple=Низкий факел с необычным пурпурным пламенем.
f.furni_brazier_tall_blue=Высокий факел с причудливым голубым пламенем.
f.furni_brazier_tall_green=Высокий факел с жутковатым зелёным пламенем.
f.furni_brazier_tall_orange=Высокий факел с потусторонним оранжевым пламенем.
f.furni_brazier_tall_purple=Высокий факел с необычным пурпурным пламенем.
f.furni_candles_small=Россыпь маленьких свечей, добавляющих классическую атмосферу любой комнате.
f.furni_chair_manor=Изысканное кресло, хитроумно созданное для уютного комфорта.
f.furni_chair_spiralfield=Одно стандартное сиденье Спирального Ордена, обеспечивающее стандартный уровень комфорта для одного Спирального Рыцаря.
f.furni_chess=Статуэтка-фигурка, идеальная для настольной игры.
f.furni_chest_spiralfootlocker=Запечатанный ящик, полный важного снаряжения Спирального Ордена. Например, носков.
f.furni_clutter_bone_bonepile=Некоторые сочтут использование кучи костей в качестве декора «дерзким». Все остальные — «жутким».
f.furni_clutter_houseplant_shrub_blue=Голубое растение в весёлом горшке.
f.furni_clutter_houseplant_shrub_green=Зелёное растение в весёлом горшке.
f.furni_clutter_houseplant_shrub_red=Розовое растение в весёлом горшке.
f.furni_clutter_houseplant_shrub_yellow=Солнечное шафрановое растение в весёлом горшке.
f.furni_clutter_luggage=Стильные чемоданы, подходящие для упаковки всего необходимого для последнего путешествия в вашей жизни.
f.furni_clutter_skbedroll=Мягкий спальник на случай «выживания в дикой природе». Для Спирального Рыцаря, застрявшего на Крейдле, это большую часть времени.
f.furni_clutter_skescapepod_shut=Спиральная технология, используемая для эвакуации с повреждённых кораблей. Внутри очень тесно.
f.furni_counter_spiral=Модульный элемент стойки, который можно комбинировать бесконечным числом способов. Будьте осторожны при работе с бесконечностью.
f.furni_crate_toughbox_shut=Крепкий охранный контейнер, используемый для самых разных целей.
f.furni_crate_toughbox_weapons=Полон опасной взрывчатки и бритвенно-острых мечей\! Хранить в недоступном для детей месте.
f.furni_drawer_spiral=Маленький комод, набитый разнообразными важными предметами.
f.furni_floormonitors=Эти прочные мониторы активируются, когда на них наступают. Не совсем ясно, кто решил, что это хорошая идея.
f.furni_gaslamp_short_blue=Невысокий элегантный фонарь, излучающий голубое свечение с тихим шипением.
f.furni_gaslamp_short_green=Невысокий элегантный фонарь, излучающий зелёное свечение с тихим шипением.
f.furni_gaslamp_short_orange=Невысокий элегантный фонарь, излучающий оранжевое свечение с тихим шипением.
f.furni_gaslamp_short_purple=Невысокий элегантный фонарь, излучающий пурпурное свечение с тихим шипением.
f.furni_gaslamp_tall_blue=Высокий элегантный фонарь, излучающий голубое свечение с тихим шипением.
f.furni_gaslamp_tall_green=Высокий элегантный фонарь, излучающий зелёное свечение с тихим шипением.
f.furni_gaslamp_tall_orange=Высокий элегантный фонарь, излучающий оранжевое свечение с тихим шипением.
f.furni_gaslamp_tall_purple=Высокий элегантный фонарь, излучающий пурпурное свечение с тихим шипением.
f.furni_library_bookstack_1=Разрозненная стопка разнообразных текстов — от кулинарных книг до потусторонних кодексов, исписанных неразборчивыми письменами.
f.furni_library_lectern_ancient=Кафедра, идеальная для раздумий над множеством причудливых и любопытных томов забытого знания.
f.furni_library_lectern_cursed=Кафедра со зловещим томом, полным нечитаемых каракулей и размазанных отпечатков кошачьих лап.
f.furni_library_lectern_mystic=Кафедра с магическим томом, полным тайных символов, эзотерических формул и нескольких особо грубых рисунков.
f.furni_pet_chromalisk=Робкий хромалиск, кажется, потерявший свой язык.
f.furni_pet_companion_cube=Общительный слизень с неудержимым любопытством. (Лимит 1 на зал).
f.furni_pet_flying_snipe=Снайп, радостно парящий по воздуху.
f.furni_pet_lazy_gobble_snipe=Праздничный осенний снайп, который останется там, где поставлен.
f.furni_pet_lazy_rooster=Праздничный новогодний снайп, который останется там, где поставлен.
f.furni_pet_lazy_snipe=Тихо отдыхающий снайп, который останется там, где поставлен.
f.furni_pet_mewkat=Очаровательный маленький призрачный котёнок, обожающий бродить и мяукать на всё, что видит.
f.furni_pet_nature_sprite=Дух Природы, предпочитающий странствовать, а не следовать воле Матери Духов.
f.furni_pet_plump_gobble_snipe=Впечатляюще крупный индюшачий снайп, отдыхающий после сытного обеда.
f.furni_pet_plump_rooster=Впечатляюще крупный Бухгок, отдыхающий после сытного обеда.
f.furni_pet_wandering_gobble_snipe=Праздничный осенний снайп, который исследует окрестности.
f.furni_pet_wandering_rooster=Праздничный новогодний снайп, который исследует окрестности.
f.furni_pet_wandering_snipe=Любопытный снайп, который исследует окрестности.
f.furni_pet_zombie_bellhop=Служащий гостиницы с необычной преданностью, отвечающий за доставку багажа в номер. Обычно достаточно предложить донести сумки.
f.furni_rainbow=Великолепная дуга преломлённого света. Что она означает?
f.furni_shelf_manor_bookcase=Неприметная полка, уставленная зловещими томами с невыразимой мощью.
f.furni_shelf_spiral1=Простая полка, забитая полезными инструментами и устройствами.
f.furni_spiralorder_fieldsensor=Крепкий Спиральный сканер, собирающийся за минуты, предоставляющий часы разведданных и служащий годами.
f.furni_spiralorder_sundries=Контейнеры с припасами — всё, что нужно Спиральному Рыцарю, чтобы встать утром.
f.furni_statue=Памятная статуя, которую можно установить в Зале Гильдии. Допускается не более {0} статуй на зал.
f.furni_table_manor_1=Изысканный столик, тщательно изготовленный для монументального великолепия.
f.furni_table_spiral1=Маленький столик, мечтающий однажды объединиться с другими столиками и стать большим столом.
f.furni_trophy_battlestand_champions=Элегантная витрина в честь повышения рыцаря до ранга Чемпиона.
f.furni_trophy_battlestand_knights=Отличная витрина в честь полного принятия рыцаря в Спиральный Орден.
f.furni_trophy_battlestand_soldiers=Простая витрина в честь вербовки рыцаря в Спиральный Орден.
f.furni_trophy_battlestand_vanguards=Великолепная витрина в честь вознесения рыцаря на высший эшелон Спирального Ордена.
f.furni_trophy_boss_roarmulus_1=Освобождённый набор чертежей, демонстрирующий полную спецификацию и масштаб Проекта Рормулус.
f.furni_trophy_boss_roarmulus_2=Миниатюрная модель одного из Близнецов Рормулус. К счастью, неактивна.
f.furni_trophy_boss_roarmulus_3=Безоружная полумасштабная копия конечного продукта Проекта Рормулус. Без вооружения годится лишь для того, чтобы оживить унылую комнату.
f.furni_trophy_boss_royaljelly_1=Мягкая драгоценность, высоко ценимая слизнями. Эта была извлечена из Дворца Королевского Желе и кропотливо сохранена как предмет для беседы.
f.furni_trophy_boss_royaljelly_2=Весёлое украшение, ранее носимое самим Королевским Желе. Лихо водружено на студенистую подушку.
f.furni_trophy_boss_royaljelly_3=Уменьшенная модель Королевского Желе. Он бы, наверное, был польщён, если бы его уже не расплющили.
f.furni_trophy_boss_snarbolax_1=Длинный бритвенно-острый зуб — доказательство того, что вы встретили легендарного Снарболакса и выжили, чтобы триумфально вернуться.
f.furni_trophy_boss_snarbolax_2=Маленькая статуэтка Снарболакса, изображающая жуткую тень в оглушённом состоянии.
f.furni_trophy_boss_snarbolax_3=Большая модель Снарболакса, подробнейше воспроизводящая его клыки, что грызут, и когти, что рвут.
f.furni_trophy_boss_vanaduke_1=Великолепно сохранённая королевская печать утраченного королевства Альмир. Ей место в музее.
f.furni_trophy_boss_vanaduke_2=Зловещая маска, ранее носимая Ванадьюком, Лордом Огнештормовой Цитадели. Она слишком велика для рыцаря.
f.furni_trophy_boss_vanaduke_3=Художественная композиция из маски, доспеха и скипетра Лорда Ванадьюка. Она символизирует безрассудство алчности, агонию отчаяния и то, как круто смотрятся огонь и шипы вместе.
f.furni_wardrobe_sklocker=Запертый шкаф с неиспользуемой одеждой и бронёй.
f.fused_demo_helm=Улучшенный Подрывной Шлем, опасно сплавленный с нестабильным ядром мощного Кубо-Взрыва. Вызывает неприятный гул в ушах.
f.fused_demo_suit=Улучшенный Подрывной Костюм, опасно сплавленный с нестабильным ядром мощного Кубо-Взрыва. И всё же вы чувствуете себя намного безопаснее.
f.fusion_blaster=Улучшенный стихийный бластер, предназначенный для изгнания существ, скрывающихся в тенях.
f.galactic_guardian_helm=Памятный шлем в честь бесчисленных храбрых исорианских стражей, защищавших экипажи звездолётов в их приключениях среди звёзд.
f.galactic_guardian_vest=Надев этот потрясающе звёздный жилет, вы сможете вести других к безопасности даже в самых тёмных уголках космоса.
f.garden_snipes_room=Мирный сад, населённый снайпами. Идеален как для отдыха, так и для безудержного вращения на месте.
f.gel_core=Студенистый ком размером с кулак, собранный у желе.
f.gel_drop=Капля слизи, собранная у желе. Всё ещё подрагивает.
f.gh_env_default=Стандартная среда, достоверно воспроизводящая затхлый воздух Часового Механизма.
f.gh_env_embers=Среда, наполняющая ваш Зал Гильдии падающим пеплом и сажей, словно сам Вог прошёл здесь.
f.gh_env_rain_shower=Идеальная среда для Залов Гильдии без страховки от пожара или чьи обитатели слишком ленивы, чтобы поливать растения.
f.gh_env_rain_torrent=Среда с почти невыносимым количеством дождя.
f.gh_env_snowing=Прекрасная среда, наполняющая ваш Зал Гильдии идеальным снегом\: тем, что нежно падает с неба и никогда не скапливается на земле, превращаясь в серую слякоть.
f.gh_theme_default=Стандартная тема Зала Гильдии.
f.gh_theme_divine=Яркая небесная тема, благодаря которой очень трудно потерять ключи.
f.gh_theme_fire=Огненная тема, которая точно сохранит ваш Зал Гильдии тёплым и уютным... или потным.
f.gh_theme_freeze=Морозная тема, превращающая Зал Гильдии в популярный курорт тёплыми летними месяцами на Крейдле.
f.gh_theme_poison=Весьма уникальная тема, дарующая вашему Залу Гильдии всю красоту и атмосферу канализационной системы.
f.gh_theme_shock=Высокоэнергетическая тема, наполняющая воздух электричеством. Побочные эффекты включают постоянный разряд статики от прикосновения к чему угодно.
f.gh_theme_spooky=Тёмная и зловещая тема, идеальная для Зала Гильдии, чьи обитатели пополнили ряды потусторонних.
f.ghost_bell=Маленький серебряный колокольчик, который носят деликатные призраки, предупреждая живых о своей близости.
f.gift_of_autumn=Редкий оберег, ценимый путешественниками, укрепляющий владельца в зимнюю пору.
f.gigawatt_pulsar=Мощно усиленное стрелковое оружие, поражающее врагов с силой удара молнии. Снаряды пульсара набирают мощь по мере удаления.
f.gilded_griffin=Прекрасный пистолет, названный в честь великого благородного зверя. Его золотая рама, по поверью, освещала путь в непроглядной тьме Подземного Мира.
f.glacius=Сочетание передовых теорий криогеники с технологией Камеры Охлаждения породило это продвинутое орудие, способное мгновенно заморозить грознейших из врагов.
f.glowing_crystal=Редкая кристаллизованная формация тепла, используемая для ковки высшего уровня оружия и снаряжения. Тепло внутри горит достаточно ярко, чтобы осветить тёмную комнату.
f.gm_armor=Впечатляющая индиговая броня — неоспоримый признак одного из великих Гейм-Мастеров Спирального Ордена.
f.gm_helmet=Впечатляющий индиговый шлем — неоспоримый признак одного из великих Гейм-Мастеров Спирального Ордена.
f.gold_dragon_armor=Доспех, некогда носимый членом «Золотых Драконов» — отряда бесстрашных рыцарей, специализировавшихся на устранении высокопоставленных целей Морай. После расформирования выжившие были объединены Десной в Рыцарей-Разведчиков.
f.gold_dragon_helm=Шлем, некогда носимый членом «Золотых Драконов» — отряда бесстрашных рыцарей, специализировавшихся на устранении высокопоставленных целей Морай. После расформирования выжившие были объединены Десной в Рыцарей-Разведчиков.
f.gold_wolf_coat=Доспех, некогда носимый членом «Золотых Волков» — отряда бесстрашных рыцарей, специализировавшихся на устранении высокопоставленных целей Морай. После расформирования выжившие были объединены Десной в Рыцарей-Разведчиков.
f.gold_wolf_hood=Шлем, некогда носимый членом «Золотых Волков» — отряда бесстрашных рыцарей, специализировавшихся на устранении высокопоставленных целей Морай. После расформирования выжившие были объединены Десной в Рыцарей-Разведчиков.
f.golden_solstice_ring=Зачарованное кольцо, воплощающее дух солнцестояния. Его блестящее золотое сияние ярче всего в летние месяцы.
f.gorgofist=Устрашающее стрелковое оружие, сочетающее двойную сокрушительную мощь горго и мифической тортомеги. Подавлять врагов ещё никогда не было так дьявольски весело.
f.gorgomega=Устрашающий щит, сочетающий двойную сокрушительную мощь горго и мифической тортомеги. Сокрушать врагов ещё никогда не было так дьявольски весело.
f.gram=Необычайно тяжёлый меч, чей вес замедлит даже самого проворного рыцаря. Впрочем, представьте, что он сделает с тем, кого вы им ударите...
f.gran_faust=Улучшенный Фауст, выкованный из первоклассной теневой стали. Его заряженные атаки достаточно мощны, чтобы проклясть владельца, но это не помешало дьяволятам ценить эти редкие клинки даже выше своего жалкого отпуска.
f.grand_flourish=Причудливый клинок для тех, кто предпочитает решать проблемы прыжком, подскоком и ударом.
f.grand_solstice_ring=Великолепное зачарованное кольцо, воплощающее дух солнцестояния. Его поверхность, кажется, меняет цвет со временем — то горячая, то холодная на ощупь.
f.grand_tortofist=Стрелковое оружие, наделённое безграничной яростью тортодрона. Держа его, вы ощущаете неистовую энергию внутри, рвущуюся на волю.
f.grand_tortoise=Щит, наделённый безграничной яростью тортодрона. Сами пластины этого колоссального панциря содрогаются от нестабильной энергии, ждущей высвобождения.
f.grate_plate=Защитная пластина с отверстиями-глазками для вентиляции выдыхаемого воздуха.
f.grave_soil=Ужасная земля из жуткой крипты. Всегда слегка холодна на ощупь.
f.graviton_bomb=Способная притягивать врагов к своему местоположению перед взрывом, эта бомба использует технологию, которую Спиральный Орден не вполне понимает.
f.graviton_charge=Маленький взрывной заряд таинственного происхождения. Способен генерировать вихрь сокрушительной гравитации.
f.graviton_vortex=Гравитонная Бомба, укреплённая потенциально опасным количеством теневой стали. Её взрыв должен притянуть ваших врагов к себе... если только не разорвёт всю вселенную надвое.
f.great_defender=Крепкий Защитник, улучшенный собственным внутренним источником энергии для более эффективной защиты.
f.great_defender_c=Качественная костюмная версия классического щита.
f.green_shard=Осколок Валестоуна, слишком мелкий для запитки врат, но весьма пригодный в алхимии.
f.green_ward=Крепкий щит с изумрудным отливом, спасающий рекрутов Спиральных Рыцарей от острых шипов и смертельных токсинов.
f.gremlin_disguise=Весьма убедительный костюм, придающий носителю вид гремлина. Настолько убедительный, что вас могут пригласить в Колонию\!
f.gremlin_gizmo=Странное устройство, применяемое в гремлинских механизмах. На нём выгравировано предупреждение не подвергать его прямому солнечному свету и не погружать в воду.
f.gremlin_helm=Особый шлем ручной ковки гремлинских мастеров, защищающий от суровейших условий. Этот экземпляр подогнан под рыцаря.
f.gremlin_suit=Особый костюм, пошитый гремлинскими руками под фигуру рыцаря. Защищает владельца, обеспечивая полный диапазон движений для ударов, стуканий и починки.
f.gremlonium=Высокотехнологичный компонент, созданный гремлинскими инженерами для питания их самых коварных машин. Постоянно издаёт тревожное шипение.
f.grey_feather_cowl=Пуховый капюшон для учёных, любящих выбираться в поле. Мягче самой роскошной подушки и при этом необычайно защитный.
f.grey_feather_mantle=Плащ для прославленных совлитских учёных — этот пернатый наряд полон мудрости веков... и невероятно мягок\!
f.grey_owlite_shield=Великолепная копия щита, который, по преданию, выдавался виднейшим совлитским чародеям. Держа его, вы преисполняетесь праведной мести.
f.grim_buster=Стрелковое оружие, алхимизированное из панциря осквернённого тортодрона. Тени словно сочатся из ствола, когда его пускают в ход.
f.grim_repeater=Используемый лишь элитнейшими рейнджерами Спиральных Рыцарей, этот дьявольский пулемёт заслужил своё имя невероятной скоростью выдачи теневых билетов в загробный мир.
f.grim_shell=Щит, алхимизированный из панциря осквернённого тортодрона. Тени словно удлиняются и липнут к нему, когда его пускают в ход.
f.grinchlin_snowball=Слеплен вручную ворчливыми гринчлинами горы Крампус — эти мерзкие снаряды гарантированно испортят любые Зимние Праздества.
f.grintovec=Ваши враги наверняка насладятся прохладным, освежающим ощущением удара ледником.
f.groundbreaker_armor=Доспех, носимый рыцарями, что были среди первых, кто отважился спуститься в глубины Часового Механизма.
f.groundbreaker_helm=Крепкий шлем, носимый рыцарями, что были среди первых, кто отважился спуститься в глубины Часового Механизма.
f.gsc_vip=Непередаваемое членство в клубе C.U.B.E. казино «Золотой Слизень». Привилегии членства могут быть изменены.
f.guild_bond=Поместите в казначейство гильдии, чтобы обменять на кроны.
f.guild_members_100=Позволяет вашей гильдии набрать до 100 членов\!
f.guild_members_150=Позволяет вашей гильдии набрать до 150 членов\!
f.guild_members_200=Позволяет вашей гильдии набрать до 200 членов\!
f.guild_members_250=Позволяет вашей гильдии набрать до 250 членов\!
f.guild_members_300=Позволяет вашей гильдии набрать до 300 членов\!
f.guild_storage=Навсегда добавляет хранилища Члена, Ветерана и Офицера в Командную Консоль Гильдии. Хранилища позволяют членам гильдии достаточного ранга обмениваться непривязанными предметами.
f.gun_puppy_disguise=Весьма убедительный костюм, придающий носителю вид оружейного пёсика. Настолько убедительный, что друзья могут пуститься от вас наутёк\!
f.gunpuppy_helm=Шлем, собранный из утилизированных деталей оружейного пёсика.
f.gunslinger_hat=Превосходный головной убор, который носили вооружённые пистолетами воители из забытых времён. Идеален для дуэлей, поисков или скитаний по бескрайним равнинам.
f.gunslinger_sash=Одежда вооружённых пистолетами воителей из забытых времён. Пахнет сыромятной кожей, пороховым дымом и действием.
f.hail_driver=Увидев расщепляющиеся заряды противоестественно холодного льда, вы поймёте, почему этот Драйвер прославлен.
f.hailstone=Маленький камешек, всегда слегка холодный на ощупь. Отлично подходит для охлаждения напитков без разбавления.
f.harlequin_cowl=Над носителем этого пёстрого капюшона не пошутишь — иначе обнаружите, что смех последний — ваш.
f.harlequin_suit=Костюм для тех, кто жонглирует, кувыркается или наделён даром озорства.
f.hatchet=Тяжёлый нож, используемый для рубки лиан и листвы в дебрях вокруг Спасательного Лагеря.
f.hazardous_brigandine=Стёганая броня, напоминающая о высокой смертности элитных Алых Разведчиков. Алые Разведчики должны двигаться налегке и быстро, чтобы оставаться впереди менее искусных отрядов.
f.hazardous_diablo_helm=Шлем, носимый Алыми Разведчиками. Созданный для устрашения врагов, он повторяет образ демона, который, по преданию, отломил собственный рог, чтобы использовать его как оружие перед своей гибелью.
f.hazardous_draped_armor=Свободная броня, носимая более опытными Алыми Разведчиками. Ходят слухи, что подобное снаряжение шьётся из останков доспехов павших Разведчиков — напоминание, что без крайней необходимости Разведчики не покидают товарищей.
f.hazardous_grim_mask=Шлем, носимый Алыми Разведчиками. Созданный для устрашения врагов, он повторяет образ самой Смерти. Носящие его любят приговаривать: «Смерть дышит в спину, так что смотрите только вперёд.»
f.hazardous_hedge_coat=Бывалая куртка командиров отрядов Алых Разведчиков, прозванных «живыми изгородями». Прозвище, видимо, связано с их невероятными навыками обхода с флангов или с шипами на их доспехах.
f.hazardous_oni_helm=Шлем, носимый Алыми Разведчиками. Созданный для устрашения врагов, он повторяет образ демона, живущего в горах далёкой земли. Говорят, он охраняет врата в Рай, пропуская лишь достойных.
f.haze_bomb=Алхимическая бомба, создающая отравляющее облако, способное оглушить попавших внутрь.
f.haze_bomb_mkii=Дымовая Бомба, модифицированная для распыления токсинов на большей площади.
f.haze_burst=Мощная алхимическая бомба, производящая плотное облако интенсивно дезориентирующего вещества.
f.heater_shield=Щит со встроенной печкой, согревающей владельца и защищающей от большинства атак заморозки. Многие рыцари также используют его как походную плиту в полевых условиях.
f.heavenly_guardian_armor=Блистательная белая броня, носимая защитниками небесных царств.
f.heavenly_guardian_helm=Блистательный белый шлем небесного воителя.
f.heavenly_iron_armor=Могучий доспех, по преданию, выкованный из ангельских щитов. Он сохранил многие божественные свойства небесных существ, но лишён их уязвимости к огню.
f.heavenly_iron_helm=Могучий шлем, по преданию, выкованный из ангельских щитов. Он сохранил многие божественные свойства небесных существ, но лишён их уязвимости к огню.
f.heavy_crystal_bomb=Цельный кусок сплава со взрывным сюрпризом внутри. Зомби ненавидят сюрпризы.
f.heavy_dark_matter_bomb=Цельный кусок Тёмной Материи со взрывным сюрпризом внутри. Гремлины ненавидят сюрпризы.
f.heavy_deconstructor=Улучшенный Деконструктор, крушащий роботов и сминающий конструктов на большей площади.
f.heavy_demo_helm=Усиленный шлем, который пригодится, если вы, мастер взрывов, возьмёте его с собой.
f.heavy_demo_suit=Усиленная броня для экспертов по взрывчатке.
f.heavy_gear=Утяжелённая шестерня, ранее участвовавшая в работе огромного механизма.
f.heavy_hatchet=Большой нож, предназначенный для валки деревьев. Неудивительно, что им также можно валить врагов, блоки, месторождения минералов и почти всё, во что вы захотите им ударить.
f.heavy_plate_helm=Массивный шлем, рассчитанный на всевозможные удары обычным оружием. Внутри слегка пахнет потом.
f.heavy_plate_mail=Тяжёлая броня, укреплённая большим количеством пластин, чем торговый автомат в Часовом Механизме. Слегка неудобна.
f.heavy_plate_shield=Огромный усиленный щит, идеальный для отражения ударов и сдерживания врагов.
f.heavy_pulsar=Пульсар, улучшенный Спиральной технологией для более мощного удара. Снаряды пульсара набирают мощь по мере удаления.
f.heavy_shard_bomb=Цельный кусок обеднённого Кримзонита со взрывным сюрпризом внутри. Все любят сюрпризы\!
f.heavy_splinter_bomb=Цельный кусок синтетического минерала со взрывным сюрпризом внутри. Вольверы ненавидят сюрпризы.
f.helm_back=Аксессуар, прикрепляемый к задней части некоторых шлемов. Аксессуары устанавливаются у Бешамеля на Базаре Хейвена.
f.helm_brow=Аксессуар, прикрепляемый ко лбу некоторых шлемов. Аксессуары устанавливаются у Бешамеля на Базаре Хейвена.
f.helm_front=Аксессуар, прикрепляемый к передней части некоторых шлемов. Аксессуары устанавливаются у Бешамеля на Базаре Хейвена.
f.helm_side=Аксессуар, прикрепляемый к боковой части некоторых шлемов. Аксессуары устанавливаются у Бешамеля на Базаре Хейвена.
f.helm_top=Аксессуар, прикрепляемый к верхней части некоторых шлемов. Аксессуары устанавливаются у Бешамеля на Базаре Хейвена.
f.hex_visor=Говорят, муха могла бы увернуться от чего угодно с такими глазами. Жаль, что вы не муха.
f.hexoskeleton=Защищает грудь, брюшко и ноги. Линька не требуется.
f.hive_box=Содержит один уникальный предмет на пчелиную тему. Предметы выбираются случайно. Ключ не требуется.
f.hive_helm=Насекомые узнают друг друга по запаху, но глаза по-прежнему нужны для грозного взгляда на соперников.
f.holiday_hat=Праздничный колпак, несущий тёплый дух праздников. Слегка пахнет имбирными пряниками.
f.holiday_hat_snow=Настолько праздничный колпак, что над ним идёт снег\! К счастью для владельца, сам колпак невероятно тёплый.
f.holiday_present=Идеально упакованная стопка подарков, которая точно порадует любого, кто их откроет.
f.honor_blade_1=Церемониальный меч, выдаваемый рекрутам Спиральных Рыцарей. Хоть и предназначен для парадов, его отточенное лезвие подходит для боя.
f.honor_blade_2=Церемониальный меч, выдаваемый закалённым Спиральным Рыцарям. Хоть и предназначен для парадов, его отточенное лезвие подходит для боя.
f.honor_blade_3=Церемониальный меч, выдаваемый Чемпионам Спирального Ордена. Хоть и предназначен для парадов, его отточенное лезвие подходит для боя.
f.honor_blade_4=Церемониальный меч, выдаваемый Авангардам Спирального Ордена. Хоть и предназначен для парадов, его отточенное лезвие подходит для боя.
f.honor_shield_1=Церемониальный щит, выдаваемый рекрутам Спиральных Рыцарей. Хоть и предназначен для парадов, его прочная конструкция подходит для боя.
f.honor_shield_2=Церемониальный щит, выдаваемый закалённым Спиральным Рыцарям. Хоть и предназначен для парадов, его прочная конструкция подходит для боя.
f.honor_shield_3=Церемониальный щит, выдаваемый Чемпионам Спирального Ордена. Хоть и предназначен для парадов, его прочная конструкция подходит для боя.
f.honor_shield_4=Церемониальный щит, выдаваемый Авангардам Спирального Ордена. Хоть и предназначен для парадов, его прочная конструкция подходит для боя.
f.hood=Мистический капюшон, чья величайшая сила — скрывать личность владельца.
f.horned_owlite_shield=Крепкий щит, напоминающий те, что, по преданию, носила совлитская молодёжь.
f.hot_edge=Модифицированный Прото-Меч, способный генерировать температуру, достаточную для воспламенения органических материалов.
f.humbug_hat=Жуткая шляпа для тех, кто истинно ненавидит волшебство Зимнего Фестиваля. Единственное объяснение — сердце на два размера меньше положенного.
f.humbug_hazer=Это ворчливое устройство гарантированно вызовет тошноту у любого, кроме самого закоренелого скряги.
f.hunters_lodge_room=Охотничий домик, курируемый великим охотником Армеро. Содержит гильдейскую Алхимическую Машину с рецептами трофеев монстров. Гильдейские Алхимические Машины используют ресурсы из казначейства гильдии и помещают результат туда же.
f.hunting_blade=Зазубренный нож для разделки крупной дичи. Режет зверей как масло.
f.ice_axe=Технический альпинистский инструмент, способный с точностью расковырять любого монстра.
f.ice_queen_crown=Величественная корона, напоминающая вечно-ледяную Снежную Королеву. Помимо отличной защиты, по слухам, значительно укрепляет эго и порождает холодную отчуждённость от окружающих.
f.ice_queen_mail=Величественный доспех, напоминающий вечно-ледяную Снежную Королеву. Помимо отличной защиты, по слухам, значительно укрепляет эго и порождает холодную отчуждённость от окружающих.
f.icebreaker_armor=Улучшенная Морозная броня, дополнительно взломанная для сопротивления заморозке.
f.icebreaker_helm=Морозный Шлем, модифицированный для дополнительной защиты от заморозки.
f.icebreaker_shield=Морозный Щит, модифицированный для усиленной защиты от заморозки.
f.iceburst_brandish=Улучшенный Брандиш, пропитанный стихийной эссенцией льда.
f.ideal_sword=Ох, этот меч просто идеален\!
f.ignition_armor=Лёгкая броня, усиленная для защиты рыцарей, отправляющихся в жаркие ситуации.
f.ignition_helm=Лёгкий шлем, усиленный для сохранения хладнокровия под давлением.
f.illuminating_ward=Личная свеча для отпугивания тьмы — и того, что в ней таится.
f.imperial_tricorne=Великолепная шляпа для тех, кто стремится построить империи, над которыми никогда не зайдёт солнце.
f.impostoclaus_hat=Невероятно праздничная шапка Зимнего Фестиваля, делающая владельца похожим на великого духа Зимнефеста — Импостоклауса. Глорп\! Глорп\! Глорп\!
f.indestructible_giftwrap=Подарки, завёрнутые в эту гринчлинскую шутку, никогда не удастся открыть. Только от гринчлинов можно ожидать, что они испортят бесплатную подарочную упаковку.
f.industrial_catalyzer=Катализатор, модифицированный для стрельбы опасно перезаряженными снарядами. Снаряды Катализатора окутывают врага энергетическим полем, взрывающимся при получении урона.
f.industrial_hard_hat=Обычно носимая строителями, эта каска не обеспечивает особой защиты, но даёт высокое сопротивление оглушению.
f.infernal_guardian_armor=Обугленная стигийская броня, носимая защитниками инфернальных глубин.
f.infernal_guardian_helm=Обугленный стигийский шлем бездонного воителя.
f.ionized_salt_bomb=Цельный кусок каменной соли со взрывным сюрпризом внутри. Желе ненавидят сюрпризы.
f.iron_buckler=Побитый маленький баклер из железа, выдерживающий чуть больше, чем Прото-Щит.
f.iron_dragon_armor=Доспех, некогда носимый членом «Железных Драконов» — отряда бесстрашных рыцарей, специализировавшихся на устранении высокопоставленных целей Морай. После расформирования выжившие были объединены Десной в Рыцарей-Разведчиков.
f.iron_dragon_helm=Шлем, некогда носимый членом «Железных Драконов» — отряда бесстрашных рыцарей, специализировавшихся на устранении высокопоставленных целей Морай. После расформирования выжившие были объединены Десной в Рыцарей-Разведчиков.
f.iron_gear=Металлическая шестерня, некогда бывшая частью сложного механизма.
f.iron_slug=Лишь грознейшие из врагов способны выдержать калечащий паралич, вызванный магнум-силой Iron Slug. Заряженный выстрел может пронзить нескольких врагов.
f.iron_wolf_coat=Доспех, некогда носимый членом «Железных Волков» — отряда бесстрашных рыцарей, специализировавшихся на устранении высокопоставленных целей Морай. После расформирования выжившие были объединены Десной в Рыцарей-Разведчиков.
f.iron_wolf_hood=Шлем, некогда носимый членом «Железных Волков» — отряда бесстрашных рыцарей, специализировавшихся на устранении высокопоставленных целей Морай. После расформирования выжившие были объединены Десной в Рыцарей-Разведчиков.
f.ironmight_plate_helm=Превосходный пластинчатый шлем, выкованный из сплава нескольких редких металлов. Слегка ограничит периферийное зрение, зато практически неприступен.
f.ironmight_plate_mail=Превосходная пластинчатая кольчуга, выкованная из сплава нескольких редких металлов. Стесняет движения, но невероятно прочна.
f.ironmight_plate_shield=Превосходный щит, выкованный из солнечного серебра. Значение герба на его лице утрачено во тьме веков.
f.irontech_bomb=Тяжёлая бомба, обмотанная толстыми железными пластинами. Хоть и медленнее большинства бомб, удар у неё мощнейший.
f.irontech_destroyer=Старший брат Железнотехнической Бомбы — Разрушитель раскрывает весь потенциал железнотехнической мощи.
f.ironwood=Безупречное бревно из одного из твердейших веществ, известных Спиральным Рыцарям.
f.jack_froster=Встречайте зимнюю сказку с этим кусачим морозным сюрпризом, идеальным, чтобы подарить врагам жестокое обморожение.
f.jalovec=Морозный меч для рыцарей, считающих, что было бы круто обрушить на врагов лавину боли.
f.jar_o_fireflies=Маленькая банка с зимоспящими светлячками, которых можно выпустить на праздничное торжество.
f.jaws_megalodon=Устрашающий шлем, повторяющий облик глубоководного чудовища.
f.jelly_animal=Великолепная звериная маска, являющая образец эктоплазменной экспроприации.
f.jelly_glue=Вязкое вещество, разработанное биотехниками для изучения слизневых существ. При смешении со слизью и желе позволяет придавать форму без потери формы. Хотя предназначено для научных целей, сам процесс считается «невероятно увлекательным».
f.jelly_helm=Желеобразный головной убор, выкроенный из студенистых стражей.
f.jelly_mail=Мягкий комплект брони из скользких слизней, который просто сочится стилем.
f.jelly_shield=Странного вида щит, созданный из желейной массы. Подобно самим слизневым монстрам, обеспечивает исключительную защиту от колющего урона.
f.justifier_hat=Изысканная шляпа для стрелков, не жалеющих лишних крон на качественное снаряжение.
f.justifier_jacket=Изысканный костюм для ищущих приключений стрелков, предпочитающих быть быстрыми, а не мёртвыми.
f.kamarin=Низкотехнологичный меч, более эффективный в сокрушении, чем в разрезании врагов — и повелевании их поверженными остатками.
f.kat_claw_cloak=Грубо сшитый плащ, повторяющий облик головореза злосчастного Кошачьего Племени.
f.kat_claw_cowl=Великолепно сшитый капюшон, по преданию, повторяющий облик героя Кошачьего Племени Скрайта — первого, кто взобрался на стены Совлитской Высшей Академии Магии.
f.kat_claw_hood=Грубо сшитый капюшон, повторяющий облик головореза злосчастного Кошачьего Племени.
f.kat_claw_mail=Впечатляющая кольчуга, наделённая мощью Когтерезов — свирепых рукопашных бойцов Кошачьего Племени.
f.kat_claw_mask=Впечатляющая маска, наделённая мощью Когтерезов — свирепых рукопашных бойцов Кошачьего Племени.
f.kat_claw_raiment=Отвоёванное одеяние, по преданию, повторяющее облик героя Кошачьего Племени Скрайта — первого, кто взобрался на стены Совлитской Высшей Академии Магии.
f.kat_eye_cloak=Грубо сшитый плащ, повторяющий облик меткого стрелка злосчастного Кошачьего Племени.
f.kat_eye_cowl=Великолепно сшитый капюшон, по преданию, повторяющий облик героя Кошачьего Племени Преоуа, чья артиллерия заставила замолчать Мудрецов Серопёрой Башни.
f.kat_eye_hood=Грубо сшитый капюшон, повторяющий облик меткого стрелка злосчастного Кошачьего Племени.
f.kat_eye_mail=Впечатляющая кольчуга, наделённая мощью Кошачьих Следопытов — искусных гренадёров Кошачьего Племени.
f.kat_eye_mask=Впечатляющая маска, наделённая мощью Кошачьих Следопытов — искусных гренадёров Кошачьего Племени.
f.kat_eye_raiment=Отвоёванное одеяние, по преданию, повторяющее облик героя Кошачьего Племени Преоуа, чья артиллерия заставила замолчать Мудрецов Серопёрой Башни.
f.kat_hiss_cloak=Грубо сшитый плащ, повторяющий облик вспыльчивого воина злосчастного Кошачьего Племени.
f.kat_hiss_cowl=Великолепно сшитый капюшон, по преданию, повторяющий облик героя Кошачьего Племени Тораира, который вцепился во врата Совлитской Высшей Академии Магии, пока и они, и его взрывчатка горели.
f.kat_hiss_hood=Грубо сшитый капюшон, повторяющий облик вспыльчивого воина злосчастного Кошачьего Племени.
f.kat_hiss_mail=Впечатляющая кольчуга, наделённая мощью Кошачьих Шипунов — неуравновешенных подрывников Кошачьего Племени.
f.kat_hiss_mask=Впечатляющая маска, наделённая мощью Кошачьих Шипунов — неуравновешенных подрывников Кошачьего Племени.
f.kat_hiss_raiment=Отвоёванное одеяние, по преданию, повторяющее облик героя Кошачьего Племени Тораира, который вцепился во врата Совлитской Высшей Академии Магии, пока и они, и его взрывчатка горели.
f.kat_suit=Когтистый костюм от портных Муркрофта. Идеален для любопытных рыцарей, склонных подремать после долгой ночи приключений.
f.kat_tribe_fetish=Потрёпанный фетиш ныне вымершего Кошачьего Племени — свирепых кошачьих воинов, ответственных за уничтожение совлитов и их престижной Высшей Академии Магии. Фетиши несли в бой кошачьи воители, и они, по поверью, приносят удачу — несмотря на незавидную судьбу самого Племени.
f.khorovod=Низкотехнологичный, но тем не менее добротно сделанный меч, чьи безжалостные удары способны оглушить зазевавшихся врагов. Владея им, так и хочется пуститься в пляс.
f.kilowatt_pulsar=Пульсар, улучшенный Спиральной технологией для нанесения неприятного электрошока при попадании. Снаряды пульсара набирают мощь по мере удаления.
f.leviathan_blade=Редкое сокровище Спирального Ордена — удары этого мифического меча, по преданию, обрушиваются на жертв подобно водам приливной волны.
f.light_shard=Осколок Люминита, слишком мелкий для запитки врат, но весьма пригодный в алхимии.
f.lightning_capacitor=Улучшенный Конденсатор, способный взорваться с яростью электрической бури.
f.lockbox=Особый ящик, содержащий один из сотен уникальных предметов\! Открывается только Серебряным Ключом. Серебряные Ключи продаются на Складе Снабжения.
f.lockbox_character=Особый ящик, содержащий один из множества уникальных предметов, изменяющих внешность вашего Рыцаря\! Открывается только Серебряным Ключом. Серебряные Ключи продаются на Складе Снабжения.
f.lockdown_guardian_shield=Щит, носимый Спиральным Защитником — стойким оплотом на поле боя.
f.lockdown_recon_shield=Высокотехнологичное устройство Разведывательных Специалистов Спирального Ордена, делающее пользователя почти невидимым для невооружённого глаза.
f.lockdown_striker_shield=Ускоряющее устройство, используемое Ударниками — грозными штурмовиками Спирального Ордена.
f.love_puppy_disguise=Весьма убедительный костюм, придающий носителю вид пёсика любви. Настолько убедительный, что друзья могут захотеть вас поцеловать\!
f.love_puppy_mask_forever=Особая маска, доказывающая, что любовь пёсика любви длится вечно. Одни утверждают, что они просто так запрограммированы, другие отвечают: «Вот и поговорили, Наука.»
f.luck_potion=Сиропообразный секрет, по мнению некоторых, укрепляющий счастливый случай. (Спиральная штаб-квартира не смогла определить какого-либо реального эффекта.)
f.luminite=Легендарный минерал лучезарного золотого цвета, по преданию, содержащий веру, мудрость и рвение окружающей жизни.
f.luminite_deposit_1=Небольшое месторождение, из которого добывается одна единица люминита.
f.luminite_deposit_2=Приличное месторождение, из которого добывается несколько единиц люминита.
f.luminite_deposit_3=Крупное месторождение, из которого добывается множество единиц люминита.
f.luminite_deposit_4=Богатейшая жила, из которой добывается целое состояние люминита.
f.luminite_shard=Осколок Люминита, слишком мелкий для запитки врат, но весьма пригодный в алхимии.
f.lump_coal=Гринчлинский подарок тем, кто вёл себя плохо или хорошо. Гринчлины — равноправные вредители.
f.mad_bomber_mask=Крепкий шлем, защищающий от взрывов, радиоволн и высокотехнологичных устройств контроля разума. По крайней мере, вас *хотят* убедить, что он это делает.
f.mad_bomber_suit=У кого-то зуб точить, у кого-то — позиция. Эта броня для тех из нас, у кого взрывной темперамент.
f.magic_cloak=Чудесная мантия, носимая учениками магических искусств.
f.magic_hood=Чарующий капюшон для рыцарей, увлекающихся прорицанием и помышляющих о колдовстве.
f.magister_robe=Церемониальная мантия учёных мастеров тайных искусств, часто теряющих ключи в одном из множества внутренних карманов.
f.magma_driver=Изрыгая сгустки расплавленной смерти с устрашающей скоростью, это возвышенное оружие не рекомендуется использовать вблизи (или на) кого-либо (или чего-либо), кто вам дорог.
f.magmatic_fanatic_mail=Пластинчатая кольчуга, по преданию, носимая фанатиками, поклонявшимися богу магмы. Его огни защитят достойных.
f.magmatic_fanatic_mask=Маска, по преданию, носимая фанатиками, поклонявшимися богу магмы. Его огни осветят путь к победе.
f.magnus=Крупное стрелковое оружие с мощнейшими снарядами, способными оглушить даже сильнейших монстров. Заряженный выстрел может пронзить нескольких врагов.
f.maidens_tear=Священная драгоценность, ценимая альмирскими рыцарями. Дарованная им возлюбленными, по преданию, хранит их в бою.
f.manor_green=Зелёный
f.manor_violet=Пурпурный
f.maskeraith_pod=Капсула со спрайтом, содержащая Маскерайта 1-го уровня. \n\nМаскерайт — боевой спрайт, воплощающий тени. Его навыки сосредоточены на хитрости и смертельных токсинах.
f.master_blast_bomb=Невероятно мощная взрывчатка, обычно используемая в горном деле, ныне несколько безрассудно выдаваемая для боевого применения.
f.master_blaster=Это продвинутое оружие — отличный выбор, если вашему отряду вдруг понадобится ещё один герой.
f.master_door=Устанавливает силовой барьер у входа в комнату, через который могут пройти только Главы Гильдии.
f.mecha_knight_kit=Мгновенно создаёт меха-рыцаря для вашей защиты.
f.mechaknight_disguise=Весьма убедительный костюм, придающий носителю вид меха-рыцаря. Настолько убедительный, что друзья могут попытаться вас разобрать\!
f.mechaknight_helm=Крепкий шлем, выкованный гремлинскими мастерами для защиты блока управления Меха-Рыцаря. Без блока управления прекрасно подходит рыцарю.
f.mechaknight_suit=Стройный доспех, предназначенный для маскировки рыцаря при спуске в глубины Крейдла.
f.medieval_war_helm=Горшковидный шлем, столь крепкий, что прослужит сто лет войны.
f.mega_magnus=Улучшенный Магнус, достаточно мощный, чтобы начисто снести монстру голову. Заряженный выстрел может пронзить нескольких врагов.
f.mega_tundrus=Улучшенный Тундрус, не берущий пленных — разве что замораживающий их в ледяную тюрьму. Заряженный выстрел может пронзить нескольких врагов.
f.member_door=Устанавливает силовой барьер у входа в комнату, через который могут пройти только члены гильдии ранга Член и выше.
f.mercurial_demo_helm=Подрывной шлем из гремлинских технологий. Для подрывника, желающего прибавки скорости, мощности и значительно сниженного шанса погибнуть от поражения электричеством... то есть для любого подрывника.
f.mercurial_demo_suit=Подрывной костюм из гремлинских технологий. Для подрывника, желающего прибавки скорости, мощности и значительно сниженного шанса погибнуть от поражения электричеством... то есть для любого подрывника.
f.mercurial_helm=Возвышенный серебряный шлем, позволяющий двигаться стремительно, как вода, хоть и не столь стремительно *сквозь* неё.
f.mercurial_mail=Превосходная серебряная броня, придающая шагу пружинистость и оберегающая от электрошока.
f.metal_sonic_mask=Зловещая маска, созданная механическим гением, чьи способности, говорят, соперничают с величайшими гремлинскими Шестерёнными Мудрецами.
f.metal_sonic_suit=Тщательно спроектированный доспех, который, по слухам, оснащён сверхмощным блоком V.Max Overdrive.
f.meteor_mote=Маленький кусочек редкого материала, по преданию, упавшего с неба. Гремлины обычно используют его в строительстве источников энергии.
f.mighty_cannon=Стрелковое оружие, алхимизированное из панциря тортодрона. Держа его, вы ощущаете нестабильные энергии внутри, рвущиеся на волю.
f.mighty_cobalt_armor=Продвинутый комплект брони Спирального Рыцаря, мастерски созданный с применением недавно расшифрованных технологий Часового Механизма.
f.mighty_cobalt_helm=Продвинутый шлем Спирального Рыцаря, выкованный из редкого сплава Лунного Камня и Люминита.
f.mighty_defender=Продвинутый щит Спирального Рыцаря, укреплённый для битвы и красиво украшенный для рассказов потом.
f.mighty_great_cleaver=Заказная Сударуска, сконструированная Бискотти, шеф-поваром Скайларка. Хоть она и клянётся, что он используется только для готовки, нетрудно догадаться, что немало монстров познакомились с ним на разделочной доске.
f.mighty_shell=Щит, алхимизированный из панциря тортодрона. Держа его, вы ощущаете неистовые энергии внутри, рвущиеся на волю.
f.mining_hat=Крепкая старая каска, некогда использовавшаяся для добычи ценных минералов. Защищает чуть лучше Спирального Шлема.
f.miracle_cloak=Чудотворная мантия, по преданию, дарующая одно чудо владельцу, когда оно ему нужнее всего.
f.miracle_hood=Чудотворная маска, по преданию, дарующая одно чудо владельцу, когда оно ему нужнее всего. На практике спасёт вашу шкуру куда чаще.
f.miracloth=Замечательный отрез невероятно мягкой ткани.
f.misplaced_promissory_note=Старый документ, обещающий выплату к дате, давно миновавшей. Даёт обычную защиту и усиленную защиту при сниженном здоровье.
f.mod_calibrator=Это сложное устройство специально создано для калибровки модов, и его не следует путать с Модом Калибратора, который модифицирует калибраторы. Распространённая ошибка.
f.monster_bone=Целая кость ныне покойного зверя.
f.moonstone=Легендарный минерал великолепного голубого цвета, по преданию, содержащий знания и истоки всех миров.
f.moonstone_deposit_1=Небольшое месторождение, из которого добывается одна единица лунного камня.
f.moonstone_deposit_2=Приличное месторождение, из которого добывается несколько единиц лунного камня.
f.moonstone_deposit_3=Крупное месторождение, из которого добывается множество единиц лунного камня.
f.moonstone_deposit_4=Богатейшая жила, из которой добывается целое состояние лунного камня.
f.moonstone_shard=Осколок Лунного Камня, слишком мелкий для запитки врат, но весьма пригодный в алхимии.
f.mug_misery=Проклятая питьевая утварь, которой может воспользоваться лишь по-настоящему злая душа. Говорят, владеющий ею навлекает тяжкие несчастья на окружающих.
f.nameless_hat=Безымянная шляпа, носимая безымянным героем легенд.
f.nameless_poncho=Безымянное пончо, носимое безымянным героем легенд.
f.needle_shot=Автомат, модифицированный для стрельбы колющими зарядами с устрашающей скоростью.
f.nefarious_hood=Капюшон, по преданию, созданный коварным бесёнком. Парящая руна непременно скроет вас в тайных кампаниях.
f.nefarious_raiment=Одеяние, по преданию, созданное коварным бесёнком. Эфирные пластины защитят от гнусных преследований, окутав вас тьмой.
f.nether_cannon=Стрелковое оружие, алхимизированное из панциря осквернённого тортодрона. Мучительный вой ярости разносится по ветру, когда его обрушивают на врагов.
f.nether_shell=Щит, алхимизированный из панциря осквернённого тортодрона. Мучительный вой ярости разносится по ветру, когда этот щит сокрушает врагов.
f.neutralizer=Вы удивитесь числу практических применений двух веществ, которые при смешении оставляют за собой буквально ничего. Снаряды Нейтрализатора окутывают врага энергетическим полем, взрывающимся при получении урона.
f.night_cap_pith=Удобный колпак для ночного отдыха рыцарей. Обеспечит восстанавливающий ночной сон.
f.night_cap_round=Удобный колпак для ночного отдыха рыцарей. Подарит пару дополнительных часов отдыха.
f.night_cap_sallet=Удобный колпак для ночного отдыха рыцарей. Подарит осознанные сны для противостояния кошмарам.
f.night_cap_tailed=Удобный колпак для ночного отдыха рыцарей. Подарит мирные сны всю ночь.
f.nightblade=Короткий клинок, пропитанный сущностью Подземного Мира.
f.nightmare_mane=Грива из жёсткой шерсти, снятая со Снарболакса. Каждое волокно словно скручивается и топорщится, будто жизнь по-прежнему течёт сквозь них.
f.nightshade=Опасная трава, губительная для большинства зверей, но лакомство для множества ядовитых существ.
f.nitronome=Продвинутая взрывчатка, выдаваемая лишь элитнейшим гренадёрам Спиральных Рыцарей. Изготовлена из синтетического вещества, зловеще тикающего даже в неснаряжённом виде.
f.no_door=Убирает установленную дверь и оставляет вход открытым для всех.
f.nodeslime_armor=Пёстрая прикрывающая ограда, носимая яростно почитаемыми воителями-победителями.
f.nodeslime_helm=Грозящая маска злобы, сотворённая из уничтоженной зловещей слизи.
f.nodeslime_shield=Эта потрёпанная колышущаяся стена выдерживает натиск, когда ей владеют несгибаемо волевые воины.
f.nodeslime_sword=Этот мозолистый режущий сокрушитель обрушивает ярость на обессиленных врагов.
f.nog_blaster=Одна высоковзрывная камера, полная сливочного, калорийного праздничного духа, который при выстреле наносит мощнейший удар.
f.nova_driver=Одного желания мало, чтобы спастись, если вы — несчастная цель этого всемогущего пистолета с силой самих звёзд.
f.obsidian_carbine=Смертоносное оружие, изготовленное из обсидиановых обелисков, найденных в пределах царства Апокреи. С каждым выстрелом слышится слабый шёпот — считается, что он произносит истинное имя цели.
f.obsidian_crusher=Необычная бомба, изготовленная из обсидиановых обелисков, найденных в пределах царства Апокреи. Несмотря на то, что это бомба, некоторых тянет держать её и «разгадывать», словно это какая-то головоломка.
f.obsidian_edge=Зловещий меч, выкованный из обсидиановых обелисков, найденных в пределах царства Апокреи. Стоит лишь взять его в руки, как вы начинаете ощущать вину за неведомое преступление.
f.obsidian_hood_of_devotion=«Укутайся в мои объятия и предайся моей бесконечной любви. Пусть дыхание твоё уносится, словно дым свечи, погружаясь в грёзы всё глубже и глубже.»
f.obsidian_hood_of_influence=«Говори единым истинным голосом, и они будут слушать. Тише детского шёпота, громче гибели мира.»
f.obsidian_hood_of_rituals=«С великим усердием и нежной заботой, с вечным сердцем и чистейшим разумом\: наточи камень, укрепи цепь, приветствуй ночь, испей из Кубка Королей.»
f.obsidian_hood_of_sight=«Сквозь мои глаза узришь ты путь в вечность. Чист мой взор, свободен от лжи реальности.»
f.obsidian_mantle_of_devotion=«Укутайся в мои объятия и предайся моей бесконечной любви. Пусть дыхание твоё уносится, словно дым свечи, погружаясь в грёзы всё глубже и глубже.»
f.obsidian_mantle_of_influence=«Говори единым истинным голосом, и они будут слушать. Тише детского шёпота, громче гибели мира.»
f.obsidian_mantle_of_rituals=«С великим усердием и нежной заботой, с вечным сердцем и чистейшим разумом\: наточи камень, укрепи цепь, приветствуй ночь, испей из Кубка Королей.»
f.obsidian_mantle_of_sight=«Сквозь мои глаза узришь ты путь в вечность. Чист мой взор, свободен от лжи реальности.»
f.obsidian_obelisk=Угольно-чёрная стела из неестественного камня, добытая в царстве Апокреи. Когда вглядываешься в неё, камень словно корчится и пульсирует вечной энергией, одновременно манящей и зловещей до отвращения.
f.obsidian_shard=Угольно-чёрный осколок неестественного камня. Держа его, голова наполняется образами далёкого берега, где волны бьются о скалы, что, кажется, корчатся в ледяной стуже воды.
f.ocarina_slime=Призовите спутника-куб, чтобы завершить своё завоевание.
f.officer_door=Устанавливает силовой барьер у входа в комнату, через который могут пройти только члены гильдии ранга Офицер и выше.
f.omega_shell=Щит, созданный из брони Тортомеги. Колоссальный вес этого мощного щита делает его вариантом лишь для сильнейших воинов.
f.omega_tortofist=Стрелковое оружие, наделённое безграничной яростью тортодрона. Владея им, вы способны обрушить энергию целого легиона тортодронов на своих врагов.
f.omegaward=Пульсирующие стихийные пластины этого щита мгновенно реагируют на неблагоприятные условия, защищая вас даже от самого экстремального холода или жара.
f.onesie=Один размер подходит всем. Можно стирать в машине, усиленный режим. Только сушка на воздухе.
f.overcharged_mixmaster=Ручной миксер промышленной мощности, который непременно всё перемешает.
f.owlite_feather=Маленькое перо, вырванное у совлита — представителя, по преданию, мифической расы великих птиц-магов.
f.owlite_mask=Маска совлитского учёного. Коты из Муркрофта с уверенностью заверили нас, что эта реконструкция соответствует их «гротескному и пернатому облику».
f.owlite_robe=Костюмная реконструкция изысканных мантий совлитов, основанная на новейших археологических находках.
f.owlite_shield=Деревянный оберег с грубым изображением давно исчезнувшего совлита.
f.owlite_wand=Говорят, палочка сама выбирает волшебника, так что не позволяйте ей увидеть вашего милого друга.
f.padded_armor=Свободно сидящий лёгкий доспех, обычно носимый стрелками.
f.padded_cap=Универсальный лёгкий шлем, обычно носимый стрелками.
f.padded_demo_helm=Улучшенный шлем для подрывников, подбитый мягкой стимулирующей подкладкой.
f.padded_demo_suit=Улучшенный костюм для подрывников, подбитый мягкой стимулирующей подкладкой.
f.padded_hunting_cap=Улучшенный шлем для охотников, подбитый мягкой стимулирующей подкладкой.
f.padded_hunting_coat=Улучшенная куртка для охотников, подбитая мягкой стимулирующей подкладкой.
f.pale_cool=Железно-зелёный
f.pale_neutral=Железно-серый
f.pale_warm=Железно-оранжевый
f.paper_mask=Простая бумажная маска {0}, созданная в честь Фестиваля Тёмного Урожая. Не очень качественная и со временем разваливается.
f.pathfinder_armor=Удобный доспех для прокладывания троп и защиты от укусов голодных монстров в дикой местности.
f.pathfinder_helm=Шлем, удобный для прокладывания троп и защиты от укусов голодных монстров в дикой местности.
f.pepperbox=Автомат, модифицированный для стрельбы высокотемпературными снарядами, способными охватить врагов пламенем.
f.peppermint_repeater=Эта праздничная ручная пушка — верное средство приправить противников свинцом праздничного настроения.
f.perfect_snowball=Ледяной снежок почти мифического совершенства. Хоть он и просится быть запущенным точно в чью-нибудь голову, лучше всего использовать его в алхимии.
f.permafroster=Техно-рыцари до сих пор не уверены, оттаивают ли вообще цели этого замораживающего оружия. Пока — «нет». Снаряды Пермафростера набирают мощь по мере удаления.
f.perplexing_element=Редкий металл, добытый из разрушенной горы в глубинах царства Апокреи. Под микроскопом он обнаруживает некую невозможную геометрию. Быть может, более усердное изучение, свободное от мирских отвлечений, раскроет его тайны.
f.personal_color=При использовании этот предмет навсегда изменит личный цвет вашего Рыцаря на указанный.
f.personal_eye=При использовании этот предмет навсегда изменит глаза вашего Рыцаря на указанную форму.
f.personal_height=При использовании этот предмет навсегда изменит рост вашего Рыцаря на указанный.
f.phantamos=Мощное стрелковое оружие, переполненное тёмной энергией. Фантамос — одно из последних пополнений арсенала Спиральных Рыцарей, поскольку удержание теневой энергии такой степени потребовало огромных исследований.
f.phial_phear=Стеклянная трубка с малой дозой феариума — странного химиката, по слухам, вселяющего панику в каждого, кто хотя бы учует его запах.
f.philoso_feather=Крупное серое перо, вырванное у величайшего из совлитских магов.
f.pierce_blaster=Улучшенный бластер, модифицированный для стрельбы бронебойными зарядами.
f.pig_armor=Завладейте всеобщим вниманием в этом кожаном костюме. Его прочная защита, возможно, однажды спасёт вашу шкуру.
f.pig_helm=Свирепый боевой шлем, чуть пахнущий копчёной яблоней изнутри.
f.piggy_banker=Маленький летучий банк, который непременно прожжёт дыру в карманах ваших врагов.
f.pile_o_pillows=Свежевыстиранная корзина подушек, готовых к метанию в друзей\!
f.pith_helm=Простой, но эффективный шлем, полюбившийся новобранцам Спиральных Рыцарей.
f.plague_essence=Мощная эссенция, оставшаяся после гибели существа от особо отвратительной болезни.
f.plague_needle=Рыцари спорят, пронзают ли снаряды этого оружия, а потом отравляют, или отравляют, а потом пронзают. Для несчастной жертвы это различие несущественно.
f.plasma_capacitor=Добавление продвинутого Спирального источника энергии придаёт этой бомбе шокирующе обширный радиус поражения.
f.plasma_cell=Высокотехнологичный плазменный источник, способный буквально ослепить кого-нибудь наукой.
f.plasmatech_demo_suit=Подрывной костюм, заказанный Королём Крогмо к открытию Сети Взрывов. Идеальный наряд для формальных детонаций и непринуждённых взрывов.
f.plate_helm=Тяжёлый шлем, пригодный для жестокого боя.
f.plate_mail=Гремящий, бряцающий, громоздкий доспех, пригодный для вынесения побоев.
f.plate_shield=Тяжёлый железный щит, мастерски отражающий удары, которые иначе оглушили бы вас.
f.plated_pathfinder_armor=Закалённый доспех, созданный для защиты от самых прожорливых монстров при исследовании неизведанного.
f.plated_pathfinder_helm=Закалённый шлем, созданный для защиты бесстрашных исследователей при покорении неизведанного.
f.plated_sentinel_armor=Доспех, укреплённый гремлинскими пластинами для защиты от множества опасных стихий.
f.plated_sentinel_helm=Шлем, укреплённый гремлинскими пластинами для защиты от множества опасных стихий.
f.plated_shade_armor=Костюм из дьявольской ткани, переплетённой с тёмной материей, для маскировки владельца, крадущегося в камуфлированных углах.
f.plated_shade_helm=Шлем из дьявольской ткани, переплетённой с тёмной материей, для маскировки владельца, крадущегося в камуфлированных углах.
f.poison_barrier=Окружает вас токсичными сферами, способными искалечить врагов.
f.polar_day_warden_coat=Утеплённая куртка, согревающая рыцаря на лютом полярном ветру. Бронепластины на меху идеальны для долгих дневных караулов.
f.polar_day_warden_hood=Утеплённый капюшон, согревающий рыцаря на лютом полярном ветру. Полностью закрывающая маска идеальна для долгих дневных караулов.
f.polar_day_wolf_coat=Тёплая куртка, полюбившаяся рыцарям полярных гарнизонов. Густой мех необходим во время их бесконечных дневных патрулей.
f.polar_day_wolf_hood=Тёплый капюшон, полюбившийся рыцарям полярных гарнизонов. Густой мех необходим во время их бесконечных дневных патрулей.
f.polar_night_warden_coat=Утеплённая куртка, согревающая рыцаря на лютом полярном ветру. Бронепластины на меху идеальны для долгих ночных караулов.
f.polar_night_warden_hood=Утеплённый капюшон, согревающий рыцаря на лютом полярном ветру. Полностью закрывающая маска идеальна для долгих ночных караулов.
f.polar_night_wolf_coat=Тёплая куртка, полюбившаяся рыцарям полярных гарнизонов. Густой мех необходим во время их бесконечных ночных патрулей.
f.polar_night_wolf_hood=Тёплый капюшон, полюбившийся рыцарям полярных гарнизонов. Густой мех необходим во время их бесконечных ночных патрулей.
f.polar_twilight_warden_coat=Утеплённая куртка, согревающая рыцаря на лютом полярном ветру. Бронепластины на меху идеальны для долгих часов наблюдения за горизонтом в полярных сумерках.
f.polar_twilight_warden_hood=Утеплённый капюшон, согревающий рыцаря на лютом полярном ветру. Полностью закрывающая маска идеальна для наблюдения за горизонтом в полярных сумерках.
f.polar_twilight_wolf_coat=Тёплая куртка, полюбившаяся рыцарям полярных гарнизонов. Говорят, полярные сумерки — дивное зрелище.
f.polar_twilight_wolf_hood=Тёплый капюшон, полюбившийся рыцарям полярных гарнизонов. Говорят, полярные сумерки — дивное зрелище.
f.polaris=Говорят, взрывы от этого звёздного оружия столь ярки, что с ним вы всегда найдёте путь во тьме. Снаряды Поляриса набирают мощь по мере удаления.
f.pollinator=Редкое продвинутое оружие, созданное биотехниками с применением захваченных гремлинских технологий. Стреляет частицами пыльцы, которые прилипают к врагу, вызывая взрывной урон, а заодно и чихание.
f.pollinator_plate=Выполнен в стиле невосчётных героев улья. Модно, функционально и слегка пушисто.
f.potocrowns=Неудачная находка для ваших врагов — взрывается болезненным ударом.
f.powderkeg=Осторожно, эта штука может рвануть как пресловутая пороховая бочка.
f.power_cell=Небольшое устройство для питания сложных механизмов.
f.power_dust=Порция особой пищи, любимой боевыми спрайтами, черпающими силу в грубой мощи на поле боя.
f.power_mitt=Необходимая вещь на любой кухне. Удобная посадка и тяжёлая серебротканевая поверхность великолепно подходят для работы с высокими температурами. Теперь вы готовите с размахом\!
f.power_mote=Маленький кусочек особой пищи, любимой боевыми спрайтами, черпающими силу в грубой мощи на поле боя.
f.power_orb=Блестящая сфера из особой пищи, любимой боевыми спрайтами, черпающими силу в грубой мощи на поле боя.
f.power_star=Идеальная кристаллизация особой пищи, любимой боевыми спрайтами, черпающими силу в грубой мощи на поле боя.
f.power_stone=Концентрированный кусок особой пищи, любимой боевыми спрайтами, черпающими силу в грубой мощи на поле боя.
f.primal_buster=Стрелковое оружие, алхимизированное из панциря тортодрона. Владея им, вы чувствуете природную энергию внутри, рвущуюся на волю.
f.primal_ore=Исключительный металл, пропитанный дикарским духом дикой природы.
f.primal_shell=Щит, алхимизированный из панциря тортодрона. Пластины, использованные в его конструкции, обеспечивают некоторую защиту от стихий огня и заморозки.
f.prisma_driver=Высокотехнологичное алхимическое оружие, стреляющее мощными призменными снарядами, многократно расщепляющимися при попадании.
f.prismatech_alchemer=Алхимическое стрелковое оружие, стреляющее снарядами из фотонно-заряженной жидкости, расщепляющимися при попадании.
f.prismatech_alchemer_mkii=Улучшенный Алхемер, выпускающий фотонные заряды с повышенной скорострельностью.
f.prismatic_frosted_helm=Восхитительный шлем из торта, созданный во время Юбилейного Празднования Спиральных Рыцарей. Использует странную призматическую глазурь, разработанную на тестовой кухне Бискотти, предотвращающую порчу. Пожалуйста, не ешьте его.
f.prize_box=Содержит уникальные костюмы и аксессуары серии {0}. Предметы выбираются случайно. Ключ для открытия не требуется.
