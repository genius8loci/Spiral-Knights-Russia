d.energy_well=ИСПОЛЬЗОВАТЬ\: Банк энергии для использования членами гильдии.
d.furni_inspect=ИСПОЛЬЗОВАТЬ\: Осмотреть поближе.
d.furni_lay=ИСПОЛЬЗОВАТЬ\: Немного прилечь.
d.furni_library_lectern_cursed=ИСПОЛЬЗОВАТЬ\: Призывает заблудшего духа.
d.furni_library_lectern_mystic=ИСПОЛЬЗОВАТЬ\: Накладывает таинственное заклинание.
d.furni_sit=ИСПОЛЬЗОВАТЬ\: Отдохнуть.
d.furni_statue=Рыцарь, которого нельзя забыть.
d.gsc_vip=Б Е С П Л А Т Н О\n\nПоскольку вы являетесь ключевым посетителем казино, мы рады предложить вам бесплатное членство.
d.recover_accessory=Восстанавливает аксессуар из предмета, возвращая его в ваш арсенал.
d.remove_accessory=ВНИМАНИЕ! Удаление аксессуара из предмета приведет к его уничтожению.
e.message_too_long=Сообщение слишком длинное.
e.not_use_busy=Невозможно использовать этот предмет, пока вы заняты
e.not_use_location=Невозможно использовать этот предмет здесь
e.not_use_snow_bucket=Этот предмет сейчас нельзя использовать. Его можно использовать только в городе или в зале гильдии. Одновременно может быть использовано не более 10 таких предметов.
e.not_wrapable=Этот предмет нельзя упаковать.
e.untradeable=Этот предмет нельзя обменять.
f.acheron=Обладая дикой силой Подземного мира, это темное оружие, как известно, доводит слабовольных рыцарей до грани безумия.
f.adv_evo_catalyst=Заряженный запас крайне нестабильной энергии, который могут синтезировать боевые спрайты. При этом спрайты могут эволюционировать в еще более продвинутые формы с еще более мощными навыками.
f.advanced_cautery_sword=Каутерический меч с дополнительной функцией пилы, приспособленной для прорезания костных шипов крупных колоний лишайников.
f.advanced_orb=Редкий, заключенный в капсулу элемент, используемый в алхимической трансмутации. Этот шар является исключительным и может быть использован для создания очень мощных предметов.
f.aegis=Великолепный щит, который доверяют только самым достойным членам Ордена Спирали. Непонятно, является ли его герб реликвией древнего Ордена или творением рыцарей, проведших время на Колыбели.
f.aero_armor=Обтягивающая аэродинамическая броня, изготовленная из легких сплавов гремлинов. Она уменьшит нежелательную турбулентность во время хаотичных воздушных боев.
f.aerohelm=Легкий аэродинамический шлем, который обязательно поднимет вам настроение. Он не даст вам летать, так что придется импровизировать.
f.airbraker_shield=Легкий, компактный и пневматически активируемый щит, который увеличивает свою площадь при атаках врага.
f.alchemy_room=Практичная комната, оборудованная двумя алхимическими машинами и лавкой с товарами широкого ассортимента.
f.almire_bench=Прочная скамья, изготовленная для альмирских чиновников.
f.almire_chair=Резной стул, столь же древний, как и увядающие аристократы Альмира.
f.almire_rug=Этот редкий ковер был извлечен из руин королевской резиденции.
f.almire_table=Стол, перенесенный из священных залов Альмира, чтобы украсить ваше жилище.
f.almire_tapestry=Шедевральный гобелен, украшенный возвышенным гербом Альмира.
f.almirian_crusader_armor=Доспехи, когда-то ношенные элитной королевской гвардией королевства Альмира. Его цвет слоновой кости был символом чистоты Альмира — как самой земли, так и сердец ее народа.
f.almirian_crusader_helm=Шлем, который когда-то носила элитная королевская гвардия королевства Альмира. Его цвет слоновой кости был символом чистоты Альмира — как самой земли, так и сердец ее народа.
f.alpha_claw_gauntlet=Защитные перчатки из шкуры волвера, снабженные острыми как бритва когтями.
f.amputator=Венец исследований семейства слизней: нагреваемые возвратно-поступательные лезвия разрезают любых слизней с хирургической точностью и не дают их желеобразным телам восстановиться.
f.ancient_plate_helm=Рудиментарный шлем, чей вес делает его неудобным для всех, кроме обладателей титанической силы.
f.ancient_plate_mail=Доспех-артефакт, который, по преданию, носили титаны. Хотя он обеспечивает потрясающую защиту, его невероятный вес делает его ношение обременительным.
f.ancient_plate_shield=Антикварный щит, происхождение которого утрачено с течением времени.
f.ancient_shell=Осколок прочной панцирной оболочки Тортодрона. Ходят слухи, что, заснув на панцире Тортодрона, можно почувствовать едва уловимые вибрации, призывающие этих могучих существ к таинственному конечному пункту «Длинного переселения».
f.angelic_cuirass=Красиво украшенные костюмные доспехи, призванные вызвать ощущение связи с небесами.
f.angelic_helm=Красивый шлем, созданный по подобию небесного стража.
f.angelic_helmet=Красивый костюм, созданный исключительно для больших голов.
f.angelic_raiment=Прекрасные доспехи, которые постоянно сияют, словно освещенные солнцем.
f.antigua=Загадочная реликвия из забытых времен. Для стрельбы в ней используется взрывчатый порох.
f.arc_razor=Искусно изготовленный механический меч, который при взмахе выбрасывает острые энергетические стрелы.
f.arcana=Исключительный пистолет, стреляющий мощными элементальными выстрелами, которые многие Рыцари Спирали называют «магическими ракетами».
f.arcane_salamander_mask=Маска саламандры, наполненная магической силой.  Считается, что она создана из фамильяров могущественных ведьм.
f.arcane_salamander_suit=Костюм саламандры, наполненный магической силой.  Считается, что он создан из фамильяров могущественных ведьм.
f.arctic_acolyte_hood=Капюшон, который, по слухам, носят странствующие арктические аколиты. «Мы видели, как они направлялись прямо к горам, уходя вглубь обширного замерзшего континента, но зачем?»
f.arctic_acolyte_mantle=Плащ с металлической обшивкой, который, по слухам, носят странствующие арктические аколиты. «Мы видели, как они направлялись прямо к горам, уходя вглубь обширного замерзшего континента, но зачем?»
f.arctic_rogue_mail=Кольчуга, которую, по слухам, изготовил арктический разбойник. Она укреплена ледяным покрытием, чтобы скрыть ваше местонахождение во время арктических экспедиций.
f.arctic_rogue_mask=Маска, которую, по слухам, изготовил арктический разбойник. Осколки льда скроют вашу личность во время тайных арктических экспедиций.
f.argent_peacemaker=Древний пистолет, выкованный из солнечного серебра. Его пули служат проводниками для тех, кто отказывается покинуть этот мир.
f.armor_ankle=Аксессуар, который можно прикрепить к лодыжке некоторых видов доспехов.  Аксессуары можно прикрепить в «Аксессуаризаторе» на базаре Хейвена.
f.armor_arms=Аксессуар, который можно прикрепить к рукавам некоторых видов доспехов.  Аксессуары можно прикрепить в «Аксессуаризаторе» на базаре Хейвена.
f.armor_back=Аксессуар, который можно прикрепить к спине некоторых доспехов.  Аксессуары можно прикрепить в «Аксессуаризаторе» на базаре Хейвена.
f.armor_fallen=Проклятый комплект доспехов, который когда-то носил небесное существо, изгнанное из рая.
f.armor_front=Аксессуар, который можно прикрепить к передней части некоторых видов брони.  Аксессуары можно прикрепить в «Аксессуаризаторе» на базаре Хейвена.
f.armor_rear=Аксессуар, который можно прикрепить к задней части некоторых видов брони.  Аксессуары можно прикрепить в «Аксессуаризаторе» на базаре Хейвена.
f.arthro_pod=Обтекаемый шлем, созданный по образцу прочного хитина панциря жука.
f.artillery_beacon=Портативный маяк, который при развертывании вызывает град мощных ракет.
f.ascended_calibur=Изготовленный из редкого сплава солнечного серебра, рыцари, достаточно талантливые, чтобы обладать такими прекрасными Калибурами, как этот, обычно сближаются со своими мечами и дают им имена.
f.ash_agni=Только когда эта бомба превратит поле битвы в пепел, только тогда вашим врагам будет позволено умереть.
f.ash_tail_cap=Теплая шапка, сделанная из кожи, выделанной с использованием пламенного перца. От нее слабо пахнет карри.
f.ash_tail_coat=Это хорошо сшитое кожаное пальто самонагревается, защищая владельца от атак замораживания. Секрет? Крошечная щепотка пламенного перца.
f.auction_room=Деловая комната, из которой можно попасть в аукционный дом «Хейвена».
f.aura=Аксессуар, который можно прикрепить к некоторым видам брони. Аксессуары можно прикрепить в «Аксессуаризаторе» на базаре «Хейвена».
f.authentic_mask=Высококачественная маска {0}, созданная в честь праздника «Тёмный урожай». Она отлично сделана и служит вечно!
f.auto_turret_kit=Размещает автоматическую турель, стреляющую по ближайшим врагам
f.autogun=Полностью автоматический пистолет, способный быстро стрелять мощными энергетическими зарядами.
f.avenger=Святой меч, созданный в другое время для вооружения рыцарей, сражавшихся против легионов Подземного мира.
f.azure_guardian_armor=Великолепный комплект доспехов, который обычно носят лидеры Ордена Спирали. Он необычайно толстый и защитный, но при этом так же удобен в носке, как струящаяся чудесная ткань.
f.azure_guardian_helm=Благородный шлем, предназначенный для самых высокопоставленных членов Ордена Спирали. Техника, с помощью которой чешуя дракона бесшовно вплетается в металл, является строго охраняемой тайной.
f.barbarous_thorn_blade=Мифический клинок, наполненный яростью самого Снарболакса. Те, кто им владеет, утверждают, что, закрыв глаза, чувствуют на себе жгучий взгляд чудовища.
f.barbarous_thorn_shield=Мифический щит, проникнутый яростью самого Снарболакса. Говорят, что зверь может использовать светящиеся шары на поверхности щита, чтобы видеть и выслеживать слабодушных владельцев.
f.barrier_cannon=Пистолет, созданный из панциря тортдрона. Элементальная сила тортдрона, участвовавшего в «Длинном переселении», должна помочь вам в ваших собственных экспедициях.
f.barrier_shell=Щит, созданный из панциря тортдрона. Элементальная стойкость тортдрона, участвовавшего в «Длинном переселении», должна помочь вам в ваших собственных путешествиях по суровым местностям.
f.battle_chef_coat=Пальто, которое носят рыцари, работающие на камбузе «Скайларка». С этими поварами не стоит шутить: они — мастера меча как на поле боя, так и за его пределами.
f.battle_chef_hat=Шляпа, которую носят рыцари, работающие на камбузе «Скайларка». С этими поварами не стоит шутить: они — мастера меча как на поле боя, так и за его пределами.
f.beach_hat=Легкая переносная конструкция для защиты от солнца, крепящаяся на голову.
f.beast_basher=Мощный киркой, модифицированный для нанесения дополнительного урона монстрам семейства зверей.
f.beast_scale=Относительно неповрежденная чешуя, добытая с существа «Часовой механизм».
f.bechamel_room=Модная комната, где Бешамель может добавлять или удалять аксессуары с вашего любимого снаряжения.
f.big_angry_bomb=Невероятно мощная бомба с ужасным характером.
f.big_beast_basher=Было высказано предположение, что этот жестоко острый горный киркой, вероятно, можно использовать как для охоты на зверей, так и для добычи полезных ископаемых. С тех пор «Часовые механизмы» уже не были прежними.
f.binding_essence=Странный, отвратительный реагент, который, как полагают, используется Апокреей для строительства своих сооружений. Попав на кожу, он, кажется, никогда не смывается. Нет, он должен смываться, просто нужно тереть сильнее. Сильнее, да...
f.bio_coat=Герметичный чистый костюм биотехника, предназначенный для работы с враждебной или неизвестной флорой.
f.bio_helm=Герметичный шлем, разработанный биотехниками для сбора полевых образцов или работы в токсичных теплицах.
f.biohazard=Обязательно тщательно проверьте герметичность своей брони перед использованием этого оружия, иначе вы можете оказаться в таком же плачевном положении, как и ваши враги. Пули «Биоопасность» окутывают врага энергетическим полем, которое взрывается после получения урона.
f.black_chaingun=Высокотехнологичный пулемёт, способный выпустить сотни теневых зарядов за очень короткое время. Для управления им требуются навыки.
f.black_kat_cloak=Грубо сшитый плащ, стилизованный под теневого сапера из злополучного племени Кат.
f.black_kat_cowl=Проклятый капюшон, наполненный темной энергией. Говорят, он напоминает великого героя племени Кат, Маргрела, того самого, кто открыл «Книгу серых перьев» и вызвал Катаклизм. Он приносит огромное несчастье любому, кто осмелится его надеть.
f.black_kat_hood=Грубо вытесанный капюшон, стилизованный под фигуру теневого сапера из злополучного племени Кат.
f.black_kat_mail=Внушительная кольчуга, наполненная силой «Кат-Напперов» — тайной спящей ячейки племени Кат.
f.black_kat_mask=Внушительная маска, наполненная силой «Кат-Напперов» — тайной спящей ячейки племени Кат.
f.black_kat_raiment=Восстановная одежда, наполненная темной энергией. Говорят, что она напоминает великого героя племени Кат, Маргрела, того самого, кто открыл «Книгу серых перьев» и вызвал Катаклизм. Она приносит огромное несчастье любому, кто осмелится ее надеть.
f.blackened_crest=Щит, когда-то принадлежавший рыцарю Альмира, а теперь проклятая реликвия, почти сгоревшая до неузнаваемости в Цитадели Огненного Шторма. Чтобы вернуть ему былую славу, потребуется очень мощная алхимия.
f.blackhawk=Пистолет, связанный с силами тьмы и обладающий невероятной мощью; говорят, что в нем заключена душа рыцаря, которому оставалось всего два дня до выхода на пенсию.
f.blast_bomb=Универсальная бомба, выдаваемая рыцарям Спирали, доказавшим свою храбрость в бою.
f.blast_powder=Опасный побочный продукт, образующийся при использовании огня органическими существами. Гремлины обожают использовать его для взрывов.
f.blaster=Универсальный пистолет, вручаемый рыцарям Спирали, доказавшим свою храбрость в бою.
f.blaze_pepper=Восхитительная специя, ценимая всеми обитателями Часового мира. В порошкообразном виде она имеет ужасную привычку прилипать абсолютно ко всему.
f.blazebrand=Высокотехнологичный клинок, сочетающий в себе технологии Спирали и Часового мира. Он способен производить концентрированный высокотемпературный взрыв, безвредный для рыцарей.
f.blazebreak_armor=Надежный комплект доспехов, способный отразить даже самые пламенные речи. Он также неплохо противостоит огненным атакам.
f.blazebreak_helm=Надежный шлем, который пригодится, когда дело дойдет до жарких моментов.
f.blazebreak_shield=Надежный щит, который не даст вам слишком разогреться в бою.
f.blazing_pulsar=Высокотехнологичный пульсар, способный запускать компактные адские огни издалека. Выстрелы пульсара становятся мощнее по мере увеличения расстояния.
f.blight_needle=Доказано, что даже самый ядовитый токсин становится гораздо опаснее, если его без разбора распылять на обширной территории.
f.blighted_bone=Странная коленная чашечка, видавшая лучшие дни, когда в ней служили более достойные рыцари.
f.blitz_needle=Когда подавления просто недостаточно, «Блиц-игла» специализируется на «угнетающем огне».
f.blizzbrand=Высокотехнологичный клинок, сочетающий в себе технологии Спирали и Часового механизма. Он способен производить сконцентрированный низкотемпературный взрыв, безвредный для рыцарей.
f.blizzbreaker_armor=Надежный комплект доспехов, способный отразить даже самые холодные атаки. Он также неплохо противостоит атакам замораживания.
f.blizzbreaker_helm=Надежный шлем, который не даст вам замерзнуть в напряженных ситуациях.
f.blizzbreaker_shield=Надежный щит, который не позволит врагам заморозить вас.
f.blue_shard=Осколок лунного камня, слишком маленький для использования в качестве источника энергии для ворот, но очень полезный в алхимии.
f.boater=Стильный скиммер для летних вечеринок.
f.boltbrand=Высокотехнологичный клинок, сочетающий в себе технологии «Спирали» и «Часового механизма». Он способен генерировать мощный электрический разряд, безвредный для рыцарей.
f.bolted_blade=Улучшенный прото-меч, укрепленный бронзовыми болтами, добытыми из часовых механизмов.
f.bombastic_demo_helm=Изысканно изготовленный шлем для взыскательных экспертов по взрывчатым веществам. Он не подскажет вам, какое вино лучше всего сочетается с нитрономом, но, безусловно, сохранит вашу голову в целости и сохранности.
f.bombastic_demo_suit=Превосходный комплект доспехов, специально выкованный для тех избранных немногих, кто умеет обращаться со взрывчаткой с размахом и изяществом... при этом умудряясь не взорвать себя.
f.bombhead_mask=Маска, заказанная королем Крогмо в честь запуска Blast Network, которая, как ни странно, напоминает действующую бомбу. Доступна в широком разнообразии стилей, так что, скорее всего, найдется подходящая к любому комплекту доспехов.
f.book_of_dark_rituals=Древний гримуар, наполненный невыразимыми таинственными ритуалами. Как и в случае с любой проклятой книгой, скорее всего, где-то есть какой-нибудь извращенец, который хочет заполучить её для крайне злобных целей. Торгуйте с осторожностью.
f.boosted_plate_helm=Шлем из спиральной брони с усиленным внутренним источником энергии. Из него немного трудно видеть.
f.boosted_plate_mail=Кольчуга «Спираль» с усиленным внутренним источником энергии. Модернизация не сделала доспехи легче.
f.boosted_plate_shield=Красиво отреставрированный щит, оснащенный внутренним источником энергии, который помогает отражать даже самые сильные удары.
f.bottomless_stocking=Межпространственный разрыв в этом носке из ворсистой ткани поглощает любой предмет, помещенный внутрь.  Он даже поглотил швы.
f.box_elite_trinket=Содержит различные элитные пятизвездочные украшения и улучшение слота для украшений. Предметы выбираются случайным образом. Для открытия ключ не требуется.
f.brandish=Надежный клинок, чья сила не отражена в отсутствии украшений.
f.breach_blaster=Улучшенный пробивающий бластер, предназначенный для пробивания вражеской брони.
f.brigandine=Очень практичный комплект брони в сочетании с вязаной курткой.
f.brimstone=Вонючий, стигийский, серный осколок, часто встречающийся в Подземном мире.
f.bristling_buckler=Небольшой щит с шипами, который станет отличным дополнением к мечу в перестрелке.
f.bronze_bolt=Простой бронзовый болт, который можно найти повсюду в Часовых механизмах.
f.brute_core=Сочащийся синий комок, полученный от особо сильного желеобразного противника.
f.brute_jelly_helm=Прочный шлем, изготовленный из чрезвычайно густой слизи.
f.brute_jelly_mail=Прочный комплект слизистой кольчуги, изготовленный из останков особо враждебных медуз.
f.brute_jelly_shield=Толстый щит, сделанный из останков особо невежливых слизней. Он прочный, легкий и имеет восхитительный ягодный вкус.
f.buccaneer_bicorne=Надежная шапка, обеспечивающая надежную защиту от солнца, ветра, штормов и злобных чаек.
f.buccaneer_box=Содержит один из различных уникальных предметов и аксессуаров для пиратов. Предметы выбираются случайным образом. Для открытия ключ не требуется.
f.buccaneer_broadsider=Грозное огнестрельное оружие, оснащенное кремневым замком. Надежность старинного механизма была улучшена благодаря небольшому секрету гремлинов.
f.bucket_of_bloons=Кажется, в этом ведре бесконечный запас водных шариков. Они выглядят готовыми лопнуть, так что бросай их в своих друзей!
f.bucket_of_flawed_snowballs=В этом ведре, похоже, бесконечный запас «Несовершенных снежков». К сожалению, они начинают таять при контакте с воздухом, так что лучше поспешите их использовать!
f.buckled_coat=Зеленоватое пальто, застегнутое блестящими золотыми пряжками.
f.budding_coat=Разорванный костюм может означать смерть, но, к счастью, этот был заселен необычным симбиотическим растением. Наденьте его, и у вас гарантированно появится «зеленый палец»!
f.budding_helm=В этом потрескавшемся биотехнологическом шлеме обитает безобидное декоративное растение.
f.bushy_tail=Странно неповрежденный образец хвоста механического зверя.
f.caladbolg=Грозный великий меч из легенд, его удары рассекают поле битвы, как радуга пересекает небо.
f.calibur=Стандартный меч, выдаваемый Рыцарям Спирали, доказавшим свою доблесть на поле боя.
f.callahan=Пистолет невероятной мощности, способный ошеломить цель. Говорят, что после его выстрела цель чувствует себя гораздо менее удачливой. Заряженный выстрел может даже пробить нескольких врагов.
f.capsule_health=Небольшая капсула, восстанавливающая небольшое количество здоровья. Лучший друг искателя приключений!
f.capsule_health_super=Капсула, восстанавливающая большое количество здоровья. Лучший друг искателя приключений!
f.capsule_health_ultra=Капсула, восстанавливающая огромное количество здоровья. Никогда не выходите из дома без неё!
f.capsule_remedy=Небольшая капсула, которая освежает пользователя. Её можно использовать для снятия всех статусов, от которых вы страдаете.\n\nНе паникуйте! Капсулы «Ремеди» могут спасти вам жизнь, если вы не забудете их использовать!
f.captain_coat=Морской плащ, идеально подходящий для космического фехтования.
f.casting_cone=Шлем для удобного заклинания. Имеет коническую форму, но это не повод для смеха.
f.catalyzer=Усовершенствованное алхимическое оружие, созданное на основе горно-взрывных устройств Гремлинов. Пули «Катализатора» окружают врага энергетическим полем, которое взрывается после получения урона.
f.cautery_sword=Меч, созданный на основе медицинского инструмента; его нагретое лезвие уменьшает повреждение тканей. Он очень эффективен при уничтожении монстров из семейства слизи.
f.celestial_nav_helm=Специальный шлем, созданный в честь древних исорских космонавтов.  С ним вы сможете увидеть ясный путь через ночное небо к бесчисленным мирам за его пределами.
f.celestial_nav_suit=Специальный скафандр, созданный в честь древних исоранских космонавтов.  Надев его, вы почувствуете, что никогда не заблудитесь в космосе... если бы только «Скайларк» мог летать.
f.celestial_orbitgun=Этот пистолет, стреляющий планетоидами, вызывает в воображении образы зарождения звездных систем. Противники, попавшие в его пылающий водоворот, непременно увидят свет.
f.celestial_ore=Чрезвычайно редкий металл огромной силы, который, как говорят, пришел с небес.  Часто его совершенно зря тратят на короны и украшения для королевской семьи слизи.
f.celestial_saber=Особый сабель, который, как говорят, напоминает древних исорских космонавтов, прорезавших ночное небо. С ним на вооружении ваши враги наверняка увидят звезды.
f.celestial_shield=Равноденствие в Колыбели вдохновило создателей на создание этого уникального щита, который в равной степени защищает как от ослепительного дневного света, так и от ночного холода.
f.celestial_vortex=Небесная бомба, модифицированная с использованием энергии угасающего солнца. Враги, попавшие в радиус действия её огненного взрыва, увидят проблеск зари сотворения мира.
f.chaos_cloak=Запретный плащ, который, как говорят, дарует своему владельцу защиту в безымянном царстве, где все стихии, по преданию, сливаются воедино и распадаются на части.
f.chaos_cowl=Капюшон сомнительного происхождения, окутывающий своего владельца тайной и стихийной защитой.
f.chapeau_rose=Старинная шляпа с перьями, когда-то принадлежавшая Рыцарю Розы — священному ордену отважных и особенно лихой героев, чьи многочисленные приключения стали темой многих народных сказок. Говорили, что Рыцари Розы были непревзойденными фехтовальщиками, веря, что их клинки подобны цветам, чьё имя они носят\: нежная красота, скрывающая жестокий укол.
f.charged_quicksilver_helm=Улучшенный Шлем из жидкой ртути, способствующий уничтожению электрических врагов.
f.charged_quicksilver_mail=Улучшенный комплект Кольчуги из жидкой ртути, который зарядит вас энергией для битвы.
f.charming_cap=Такая шляпа, которую носят, чтобы очаровывать очаровательных.
f.chess_room=Пустая комната с шахматной доской 8x8 в углу и рядами сидений для зрителей.
f.chilling_duelist=Начинайте разрешать споры с первыми лучами рассвета с помощью этого холодного, изготовленного на заказ пистолета.
f.chroma_mask=Маска, изготовленная из шкуры хромалиска, придающая владельцу особый вид.
f.chroma_suit=Костюм, сшитый из шкуры хромалиска. Удивительно, но хромалиски, похоже, считают существование этой брони лестным для себя.
f.chroma_tear=Кристаллизованная слеза хромалиска, подходящая в качестве линзы для фокусировки оружия или для коррекции близорукости.
f.circuit_breaker_armor=Броня с взломанным элементальным ядром, предназначенная для защиты от ударов током. Однако эта нестандартная модификация создает другие элементарные слабости.
f.circuit_breaker_helm=Шлем «Спираль», модифицированный для обеспечения дополнительной защиты от ударов, за счет снижения сопротивления огню и морозу.
f.circuit_breaker_shield=Прото-щит, модифицированный для обеспечения некоторой защиты от ударов.
f.cloak=Необыкновенный плащ, любимый учениками тайных наук.
f.cobalt_armor=Высокоэффективные доспехи Ордена Спирали, подходящие для любых приключений.
f.cobalt_helm=Высокоэффективный шлем Ордена Спирали, подходящий для любого приключения.
f.coin_bonus_upgrade_1=После использования это улучшение увеличит количество монет, получаемых в играх Колизея, на 1 в течение 24 часов.  В любой момент времени у вас может быть активно до 6 усилителей монет Крогмо.
f.cold_iron_carver=Зачарованный меч, изготовленный из холодного железа, клинок которого отгоняет существ тьмы.
f.cold_iron_vanquisher=Мощный клинок из холодного железа, выкованный с единственной целью — выслеживать и уничтожать нежить.
f.cold_snap=Прото-бомба, модифицированная для генерации небольших всплесков мороза при взрыве.
f.coliseum_room=Оживленная комната с кассой Колизея, администратором по наградам Колизея и алхимической машиной Крогмо.
f.combuster=Сочетание принципов работы двигателей «Скайларка» с технологией, лежащей в основе доменной печи, привело к созданию этого жестокого клинка, способного с расстояния воспламенить даже самые огнестойкие материалы.
f.confetti=Используйте этот предмет, чтобы бросить его в воздух и отпраздновать радостные моменты. Давайте!
f.confetti_bubbles=Используйте этот предмет, чтобы выпустить в воздух облако пузырей. Посмотрите, как долго они продержатся, прежде чем лопнут!
f.confetti_dark_harvest_treat=Отпразднуйте Праздник Тёмного урожая, запустив в воздух огромную тыкву. Что будет дальше — решать Королю тыкв...
f.confetti_equinox=Когда его бросают, это весеннее конфетти рассыпается свежей травой и ароматными цветами. Дождь не нужен!
f.confetti_fall_equinox=Когда его бросают, это осеннее конфетти рассыпается осенними углями.
f.confetti_leaf=Фантастический подарок для гостей, используемый на лесных праздниках.
f.confetti_slime=При броске оно выглядит как маленькие розовые кубики желе.
f.confetti_summer=При броске это летнее конфетти согревает вас изнутри.
f.confetti_winter=При броске это зимнее конфетти вызывает сильный озноб.
f.cooling_cell=Небольшое устройство, используемое в сложных механизмах для предотвращения их перегрева. Также удобно носить с собой в кармане в жаркие летние дни.
f.corrosive_acid=Едкое вещество, характерное для коррозионных существ.
f.cosmic_dust=Часть особого корма, который любят боевые духи, пришедшие из космоса, лежащего далеко за пределами самых дальних звезд.
f.cosmic_mote=Небольшой кусочек специальной пищи, любимой боевыми духами, прилетевшими из космоса, из глубин, лежащих за самыми далёкими звёздами.
f.cosmic_orb=Блестящая сфера специальной пищи, любимой боевыми духами, прилетевшими из космоса, из глубин, лежащих за самыми далёкими звёздами.
f.cosmic_star=Идеальная кристаллизация специальной пищи, любимой боевыми духами, прилетевшими из космоса, из глубин, лежащих за самыми далёкими звёздами.
f.cosmic_stone=Концентрированный кусок особой пищи, любимой боевыми духами, пришедшими из космоса, лежащего далеко за самыми далёкими звёздами.
f.cracked_crystal=Редкое кристаллизованное образование тепла, используемое для создания оружия и снаряжения более высоких уровней. Хотя оно и треснуло, оно всё ещё слабо светится.
f.crescent_helm=Прочный шлем, напоминающий полумесяц, когда поднимается забрало.
f.crest_almire=Сверкающий герб, который когда-то с гордостью носили благородные рыцари Альмира. Говорят, что он благословляет тех, кто сражается за свою родину, даруя им внутреннюю силу.
f.crest_of_ur=Герб исчезнувшего Легиона Ура — элитного отряда демонических воинов, которые, по преданию, когда-то покорили Подземный мир. Тот, кто держит его в руках, может едва различимо услышать звук барабанов и топот копыт.
f.crimsonite=Легендарный минерал огненно-красного цвета, который, как говорят, содержит в себе страсть, гнев и силу окружающей жизни.
f.crimsonite_deposit_1=Небольшое месторождение минерала, которое даст одну единицу кримсонита.
f.crimsonite_deposit_2=Месторождение минерала приличных размеров, которое даст несколько единиц кримсонита.
f.crimsonite_deposit_3=Большой кусок минералов, из которого можно добыть огромное количество кримсонита.
f.crimsonite_deposit_4=Главная жила металлосодержащих минералов, из которой можно добыть целый джекпот кримсонита.
f.crimsonite_shard=Осколок кримзонита, слишком маленький для использования в качестве источника энергии для ворот, но очень полезный в алхимии.
f.critter_carapace=Кусок хитина, аккуратно снятый с существа из Часового механизма. Он в удивительно хорошем состоянии.
f.crown_fallen=Проклятая корона, которую когда-то носил небесное существо, изгнанное из рая.
f.cryo_driver=Высокотехнологичный алхимический пистолет, стреляющий мощными криопулями, которые при ударе разлетаются на части.
f.cryotech_alchemer=Алхимический пистолет, стреляющий пулями сверхнизкой температуры, которые при ударе разлетаются на части.
f.cryotech_alchemer_mkii=Усовершенствованный Alchemer, стреляющий снарядами из материала сверхнизкой температуры с повышенной скорострельностью.
f.crystal_bomb=Осколочная бомба, сформированная из небольшого взрывчатого вещества, заключенного в сплав лунного камня и валестоуна. Клинически доказано, что ее успокаивающий голубовато-синий оттенок умиротворяет рыцарей и уничтожает нежить.
f.crystalline_defender=Прочный, высококачественный щит, покрытый защитным ледниковым льдом, подходящий для любых приключений.
f.cuirass=Обтягивающий доспех, созданный исключительно для дела и не имеющий карманов.
f.culet=Элегантно скроенный доспех, способный выгодно подчеркнуть любую фигуру.
f.cursed_idol=Небольшая каменная статуэтка, высеченная в виде одного из тысяч главных демонов Подземного мира. Цвет ее теневой поверхности кажется движущимся и меняющимся, как дым.
f.cutter=Меч бандита с жестоким рядом зазубренных зубцов.
f.cyclops_cap=Странный шлем с единственным пристальным глазом, любимый младшими стрелками.
f.dangerous_brigandine=Броня с набивкой, которая, кажется, подчеркивает высокую смертность элитных разведчиков-рейнджеров. Разведчикам-рейнджерам необходимо путешествовать налегке и быстро, часто бросаясь в ситуации, которые привели бы в ужас других рыцарей.
f.dangerous_diablo_helm=Шлем, который носят разведчики-рейнджеры. Созданный, чтобы пугать врагов, этот шлем имеет облик демона, который, по преданию, отломал себе рог, чтобы использовать его как оружие, когда ему грозила гибель.
f.dangerous_draped_armor=Свободная броня, которую носят более опытные разведчики-рейнджеры. Ходят слухи, что такая экипировка изготавливается из остатков доспехов рейнджеров, павших в бою, служа напоминанием тому, кто ее носит, что он всегда находится в объятиях Смерти.
f.dangerous_grim_mask=Шлем, который носят разведчики-рейнджеры. Созданный, чтобы пугать врагов, этот шлем имеет облик самой Смерти. У тех, кто его носит, есть поговорка: «Смерть всегда наблюдает, так что можно хотя бы устроить хорошее представление».
f.dangerous_hound_coat=Потрепанный в боях плащ, который носят командиры отрядов разведывательных рейнджеров, прозванных «гончими». Это прозвище, вероятно, возникло из-за их невероятных навыков следопытства или, возможно, из-за того, что в бою они сражаются как дикие собаки.
f.dangerous_oni_helm=Шлем, который носят члены «Разведывательных рейнджеров». Созданный, чтобы пугать врагов, этот шлем имеет облик демона, обитающего в горах далекой страны. Говорят, что он охраняет вход в сами врата рая и пропускает только тех, кто достоин.
f.daring_rigadoon=Свирепый копье, которое заставит ползти даже самых сильных врагов.
f.dark_briar_barrage=Мифический предмет, способный взорваться с яростью самого Снарболакса. Говорят, что неземной вой, который он издает, наносит больше урона, чем сам взрыв.
f.dark_chaingun=Пулемет, способный вести шквал огненных теневых зарядов.
f.dark_ember=Частица горящей энергии, спасенная из тронного зала лорда Ванадука. Она медленно тлеет с зловещей интенсивностью, создавая почти гипнотический транс, если смотреть на нее в течение какого-либо времени.
f.dark_matter=Легендарный минерал мрачного и зловещего цвета, который, как говорят, содержит в себе сущность как хаоса, так и небытия.
f.dark_matter_bomb=Осколочная бомба, состоящая из небольшого взрывчатого вещества, заключенного в темную материю. С момента своего открытия темная материя нашла множество применений: от питания спиральной технологии до перестройки гремлинов на субатомном уровне.
f.dark_matter_deposit_1=Небольшое месторождение минералов, которое даст одну единицу темной материи.
f.dark_matter_deposit_2=Месторождение минералов приличных размеров, которое даст несколько единиц темной материи.
f.dark_matter_deposit_3=Крупный кусок минералов, который даст огромное количество единиц темной материи.
f.dark_matter_deposit_4=Материнская жила металлосодержащих минералов, которая даст джекпот темной материи.
f.dark_matter_shard=Осколок темной материи, слишком маленький для использования в питании ворот, но очень полезный в алхимии.
f.dark_shard=Осколок Тёмной материи, слишком малый для использования в качестве источника энергии для ворот, но чрезвычайно полезный в алхимии.
f.dark_thorn_blade=Свирепый меч, сила которого была укреплена благодаря принесению в жертву душ внутреннему чудовищу.
f.dark_thorn_shield=Мрачный щит, придающий ударам меча сверхъестественную жестокость.
f.dead_gold=Монета, которую кладут в руки умерших перед погребением, давая им пропитание на предстоящее долгое путешествие.
f.deadly_candy_poker=Зубная боль будет самой меньшей из их проблем, когда вы вооружитесь этим пробивающим подарком.
f.deadly_charcoaler=Этот доблестный гриль гарантированно обуглит ваших соперников.
f.deadly_crystal_bomb=Большой кусок сплава лунного камня и валестоуна, начиненный мощным взрывчатым веществом. Исследования показали, что эта бомба может уменьшить тягу зомби к мозгам на 100%, разрывая их на куски.
f.deadly_dark_matter_bomb=Большой кусок темной материи, начиненный мощным взрывчатым веществом. Эта бомба явно нарушала бы правила безопасности Ордена Спирали, если бы они не потеряли последний экземпляр руководства при крушении.
f.deadly_shard_bomb=Большой кусок кримзонита, начиненный мощным взрывчатым веществом. Здесь больше нет обедненного кримзонита\: эта бомба сделана из хорошего материала! Или из плохого, если вам посчастливилось оказаться мишенью.
f.deadly_splinter_bomb=Крупный кусок синтетического минерала, начиненный мощным взрывчатым веществом. Факт\: самый простой способ найти иголку в стоге сена — взорвать этот стог.
f.deadly_virulisk_mask=Маска Вирулиска, усовершенствованная с помощью современного токсинного фильтра. Внутри она всегда пахнет искусственной хвойной иголкой.
f.deadly_virulisk_suit=Превосходный костюм, сшитый из шкуры самого смертоносного из Вирулисков. К сожалению, он, похоже, не унаследовал способность Вирулиска к маскировке.
f.deadshot_chapeau=Мифическая шляпа для тех, кто никогда не промахивается. Ходят слухи, что она сделана из ткани, которая ранее была похоронена.
f.deadshot_mantle=Пончо для бледного всадника, нацеленного на уничтожение злых, уродливых нежити, обитающих во тьме.
f.deconstructor=Бомба, специально разработанная для уничтожения механизмов, будь то разумных или нет.
f.deep_sea_cuirass=Доспех с радужными чешуйками, которые кажутся движущимися, как мерцающие волны. Носить эту броню довольно неудобно, так как она по своей природе всегда холодная и влажная.
f.defender=Прочный, высококачественный щит Ордена Спирали, подходящий для любых приключений.
f.dim_crystal=Редкое кристаллизованное скопление тепла, используемое для создания оружия и снаряжения более высоких уровней. Тепло внутри мерцает, как крошечная свеча.
f.divine_avenger=Усовершенствованный «Мститель», выкованный из чистейшей солнечной стали. В этом мире осталось лишь несколько врагов, достойных того, чтобы их победил столь прекрасный клинок, а героев, достойных владеть им, — ещё меньше.
f.divine_dust=Порция особой пищи, которую любят боевые духи, вечно купающиеся в небесном свете.
f.divine_mantle=Небесный плащ, который, как полагают, когда-то носили небесные мудрецы.
f.divine_mote=Небольшой кусочек особой пищи, любимой боевыми духами, вечно греющимися в небесном свете.
f.divine_orb=Блестящий шар особой пищи, любимой боевыми духами, вечно греющимися в небесном свете.
f.divine_star=Идеальная кристаллизация особой пищи, любимой боевыми духами, вечно греющимися в свете небес.
f.divine_stone=Концентрированный кусок особой пищи, любимой боевыми духами, вечно греющимися в свете небес.
f.divine_veil=Небесный капюшон в стиле, который когда-то носили небесные мудрецы.
f.down_puffer=Пуховая куртка. Превосходную теплоизоляцию обеспечивают пуховые перья бекаса. (При изготовлении этой куртки бекасам не был нанесен вред, перья были собраны без нарушения их естественной среды обитания у свободно пасущихся бекасов.)
f.dragon_scale=Бронированная чешуя существа, которое считалось вымершим. Она отражает свет, создавая неземной блеск.
f.dragon_scale_helm=Мифический шлем, изготовленный из чешуи легендарного существа.
f.dragon_scale_mail=Мифические доспехи, изготовленные из чешуи легендарного существа.
f.dragon_scale_shield=Мифический щит, изготовленный из чешуи легендарного существа.
f.drake_scale=Прочная чешуя, вырванная из тела жестокого зверя.
f.drake_scale_helm=Шлем, изготовленный из чешуи зверей, считающихся потомками драконов.
f.drake_scale_mail=Доспехи, выкованные из чешуи зверей, считающихся потомками драконов.
f.drake_scale_shield=Прочный щит, сформированный из крепкой чешуи.
f.drakon_pod=Капсула спрайта, содержащая боевого спрайта Дракона 1-го уровня. \n\nДракон — это боевой спрайт, олицетворяющий огненное разрушение. Его навыки сосредоточены на грубой, наступательной силе.
f.draped_armor=Стильный комплект доспехов, придающий сражению нотку элегантности.
f.dread_captain_cutlass=Специально изготовленный изогнутый катлас, заточенный на небрежных изгнанниках.
f.dread_skelly_mask=Самый страшный из всех призрачных головных уборов, который непременно защитит ваш череп даже от самых адских атак теней.
f.dread_skelly_shield=Большой костлявый щит, окутанный черноватым туманом. Иногда он издает тихий, печальный шепот, обычно напоминающий о том, что нужно блокировать удары.
f.dread_skelly_suit=Самый ужасающий костюм скелета из всех известных. В этой страшной одежде нет ничего смешного.
f.dread_venom_striker=Оружие убийцы, лезвие которого наносит глубокие раны, из которых сочится яд. Лучше хранить его отдельно от ваших закусок.
f.driftwood=Странный кусок дерева, который просто не хочет оставаться на месте.
f.dusker_cap=Шлем из кожи для рыцарей, предпочитающих сражаться с противниками лицом к лицу.
f.dusker_coat=Теплое плащ авантюриста, который позволит вам наносить удары с яростью Альфа-Дускера.
f.ecto_drop=Немного эктоплазмы, тщательно собранной с невольного нежить-добровольца. У нее неприятный оттенок зеленого.
f.electron_bomb=Созданная на основе нескольких нетрадиционных теорий Гремлинов о физике, эта бомба преподнесет шок любому, кому не повезло оказаться в зоне ее взрыва.
f.electron_charge=Небольшой электро-взрывной заряд загадочного происхождения. Способен генерировать парализующий вихрь электричества.
f.electron_vortex=Электронная бомба, модифицированная с помощью заряда нестабильной органической эссенции. Враги, попавшие в радиус ее разрушительного взрыва, жестоко называются «поражёнными молнией».
f.elemental_blaster=Улучшенный бластер, модифицированный для стрельбы элементальными снарядами.
f.elemental_cloak=Изысканная мантия, в ткань которой вплетены многочисленные элементы защиты от стихий.
f.elemental_hood=Мистическая маска для колдующих бойцов, обеспечивающая значительную защиту от стихий.
f.elite_orb=Редкий, заключённый в капсулу элемент, используемый в алхимической трансмутации. Такие сферы используются элитными рыцарями для создания предметов исключительного качества и силы.
f.emberbreak_armor=Доспехи с взломанным элементальным ядром, предназначенным для сопротивления огню. Однако эта нестандартная модификация создаёт другие элементальные слабости.
f.emberbreak_helm=Шлем «Спираль», модифицированный для обеспечения дополнительной защиты от огня за счет снижения сопротивляемости замораживанию и ударам.
f.emberbreak_shield=Щит «Прото», модифицированный для обеспечения некоторой защиты от огня.
f.empty_room=Пустая комната в зале гильдии со стандартным напольным покрытием и большим пространством для мебели!
f.empty_room_catwalk=Пустая комната в зале гильдии с промышленным напольным покрытием и большим пространством для мебели!
f.empty_room_checker_large=Пустая комната в зале гильдии со смешанным напольным покрытием и большим пространством для мебели\!
f.empty_room_checker_small=Пустая комната в зале гильдии с шахматным узором на полу.
f.enamorock=Странный камень, который вызывает теплые и приятные чувства, если просто держать его в руках.
f.energy_well=После пополнения энергетического колодца члены гильдии могут ежедневно извлекать из него 100 единиц энергии.
f.eternal_orb=Редкий, заключённый в капсулу элемент, используемый в алхимической трансмутации. Этот шар ценится самыми могущественными рыцарями и применяется для создания предметов необычайной силы.
f.everfrost=Небольшой участок ледяных кристаллов, которые, кажется, никогда не тают, даже под воздействием прямого тепла.
f.evo_catalyst=Запечатанный заряд крайне нестабильной энергии, который могут синтезировать боевые спрайты. Благодаря этому спрайты могут эволюционировать в более совершенные формы и осваивать новые навыки.
f.exp_center_2f=Расширение, добавляющее большой центральный зал для собраний в Зал Гильдии.
f.exp_center_4f=Расширение, добавляющее небольшую центральную комнату в Зал Гильдии.
f.exp_east_1f=Расширение, добавляющее две комнаты к восточной стороне Зала Гильдии.
f.exp_east_2f=Расширение, добавляющее две комнаты и небольшую смотровую площадку к восточной стороне Зала Гильдии.
f.exp_east_3f=Расширение, добавляющее две комнаты и небольшую смотровую площадку к восточной стороне Зала Гильдии.
f.exp_east_4f=Расширение, добавляющее три комнаты и небольшую смотровую площадку к восточной стороне Зала Гильдии.
f.exp_east_5f=Расширение, добавляющее две комнаты к восточной стороне здания Гильдии.
f.exp_west_1f=Расширение, добавляющее две комнаты к западной стороне здания Гильдии.
f.exp_west_2f=Расширение, добавляющее две комнаты и небольшой смотровой майданчик к западной стороне здания Гильдии.
f.exp_west_3f=Расширение, добавляющее две комнаты и небольшую смотровую площадку к западной стороне Зала Гильдии.
f.exp_west_4f=Расширение, добавляющее три комнаты и небольшую смотровую площадку к западной стороне Зала Гильдии.
f.exp_west_5f=Расширение, добавляющее две комнаты к западной стороне Зала Гильдии.
f.eye_pack_amazing=Содержит три удивительных формы глаз для вашего набора стилей\: Клевер, Череп и Схема.
f.eye_pack_bedazzling=Содержит три ослепительных формы глаз для вашего набора стилей\: Цветок, Расцвет и Блеск.
f.eye_pack_shapely=Содержит три фигурных формы глаз для вашего набора стилей\: Треугольник, Квадрат и Шестиугольник.
f.eye_pack_suited=Содержит набор подходящих форм глаз для вашего набора стилей\: «Треф», «Бубна», «Сердце» и «Пика».
f.fang_of_vog=Меч, который, как говорят, был создан из клыка огненного чудовища Вога.
f.faust=Мощный проклятый меч, выкованный в Подземном мире. Его мощные заряженные атаки иногда могут проклясть того, кто им владеет.
f.fearless_rigadoon=Непревзойденный оружие, парализующее противника; неясно, что именно ошеломляет противников — его изящество или его жестокий удар.
f.fencing_jacket=Свободная куртка, которую предпочитают начинающие фехтовальщики.
f.feral_cannon=Пистолет, созданный путем алхимии из закаленной панцирной оболочки тортодрона. Держа его в руках, можно почувствовать проникающую энергию, которая только и ждет, чтобы быть высвобожденной.
f.feral_kat_hood=Примитивный на вид капюшон, сделанный так, чтобы напоминать дикого зверя.
f.feral_shell=Щит, созданный путем алхимии из закаленной панцирной оболочки тортодрона. Даже самые острые когти росомахи лишь скользят по этому компактному панцирю.
f.fiend_portal_key=Использование этого предмета позволит вам открыть и пройти через Мрачные Ворота в Древнем Роще.
f.fiendglyph=Фрагмент Идентификационной Карты Демона. Объединение пяти различных глифов в Идентификационную Карту позволит вам открыть Мрачные Ворота в Древнем Роще.
f.fierce_flamberge=Жгучий сабель, главная цель которого — зажарить ваших врагов.
f.fiery_atomizer=Мощная алхимическая бомба, создающая плотное облако легко воспламеняющейся, обжигающей пыли.
f.fiery_diskgun=Пистолет, приводимый в действие адским двигателем, который стреляет расплавленными дисками в быстрой последовательности. Выпущенные диски возвращаются, достигнув апогея.
f.fiery_pepperbox=Когда на вас нападает рой «Ледяных кубиков», все рыцари сходятся во мнении\: счастье — это «Огненный перцовый баллончик».
f.fiery_vaporizer=Алхимическая бомба, создающая облако легко воспламеняющегося тумана.
f.fiery_vaporizer_mkii=«Огненный испаритель», модифицированный для распыления горючего вещества на большую площадь.
f.final_flourish=Лучшее оружие серьезного фехтовальщика, способное с одинаковой легкостью наносить ответные удары и разрывать врагов на части.
f.fine_fabric=Кусок прочной ткани отличного качества, украденный у жителя Часового механизма.
f.fire_barrier=Окружает вас огненными шарами, способными поджечь врагов
f.fire_raider_helm=Незапятнанный шлем рейдеров, за исключением нескольких вмятин и толстого слоя пепла.
f.fire_raider_tunic=С этим покрытым сажей плащом сокровища у вас под рукой, а пепел — в вашем следе.
f.firebreak_armor=Улучшенная броня «Угасающий огонь», дополнительно доработанная для защиты от огня.
f.firebreak_helm=Шлем «Угасающий огонь», модифицированный для обеспечения дополнительной защиты от огня.
f.firebreak_shield=Щит «Emberbreak», модифицированный для повышенной защиты от огня.
f.fireburst_brandish=Улучшенный «Brandish», пропитанный элементальной сущностью огня.
f.firecracker=«Proto Bomb», модифицированная для генерации небольших вспышек огня при взрыве.
f.firefighter_helmet=Этот шлем, обычно носимый пожарными, не обеспечивает значительной защиты, но дает владельцу высокую огнестойкость.
f.firetail_mail=Пылающая обейка обезьяньего типа, которую обычно носят командиры в бою. Она защищает владельца от множества ранений.
f.firetail_mask=Пылающая маска обезьяньего типа, созданная к празднованию Нового года. Её пламенный силуэт подчеркнет ваш властный облик.
f.fireworks=Во время праздников Орден Спирали направляет часть своих специалистов по боеприпасам на создание впечатляющих фейерверков.
f.firo_driver=Высокотехнологичный алхимический пистолет, стреляющий мощными фиро-пулями, которые при ударе разлетаются на части.
f.firotech_alchemer=Алхимический пистолет, стреляющий пулями из жидкого пламени, которые при ударе разлетаются на части.
f.firotech_alchemer_mkii=Улучшенный Alchemer, стреляющий зарядами напалма с увеличенной скоростью.
f.flak_jacket=Легкая бронежилет, позволяющий вам выглядеть и чувствовать себя круто.
f.flamberge=Огненная рапира, прожигающая все на своем пути.
f.flame_soul=Мощная эссенция, остающаяся после гибели существа в слепом, огненном ярости.
f.flaming_pulsar=Пульсар, модифицированный с помощью обжигающей энергии, которая с течением времени горит все сильнее. Выстрелы из пульсара становятся мощнее по мере увеличения дальности.
f.flare_popper=Хотя эти ракеты и не предназначались для вечеринок, разведчики-рейнджеры любят запускать сигнальные ракеты в небо, чтобы отпраздновать завершение миссий, из которых все вернулись живыми. К сожалению, любой рейнджер скажет вам, что в небо запускается слишком мало таких ракет.
f.flawed_orb=Редкий элемент в капсуле, используемый в алхимической трансмутации. Несмотря на дефекты, этот шар по-прежнему полезен для изготовления предметов низкой мощности.
f.flawed_snowball=Твердо спрессованный снежок, который, к сожалению, слишком бракован, чтобы использовать его в алхимии. Лучше всего просто выбросить его... кому-нибудь в голову.
f.flourish=Стильная сабля, прекрасно подходящая для того, чтобы сбивать с толку ваших врагов.
f.foiled_frosted_helm=Вкусный шлем из торта, созданный во время празднования годовщины Spiral Knights. Несмотря на красивую фольгированную обертку, он все равно сделан из торта и в конце концов развалится.
f.forbidden_fruit=Греховная закуска, любимая голодными демонами.
f.force_buckler=Прото-щит, модифицированный для защиты от оглушающих ударов.
f.force_dynamo=Очаровательное устройство, которое, кажется, может генерировать энергию из ниоткуда.
f.fowl_cloak=Простой плащ из перьев. Украсьтесь пухом и отпразднуйте Новый год.
f.fowl_cloak_vol=Потемневший от огня плащ из перьев. Зажгите огонь под ногами и будьте пунктуальны, как петухи, когда поют.
f.fowl_cowl=Маска с клювом, скрытая под простым капюшоном. Примите облик своих пернатых друзей и отпразднуйте Новый год.
f.fowl_cowl_vol=Маска с клювом, скрытая под обожженным капюшоном. Встретьте Новый год в этом наряде стихии.
f.frayed_fabric=Потрепанные остатки одежды жителя Часового механизма. Ее, вероятно, можно переработать.
f.freeze_barrier=Окружает вас ледяными шарами, способными заморозить врагов на месте.
f.freeze_raider_helm=Шлем с меховой подкладкой, который точно согреет вас во время зимнего рейда.
f.freeze_raider_tunic=Нападайте быстро и согревайтесь в этом меховом плаще.
f.freezing_atomizer=Мощная алхимическая бомба, создающая плотное облако крайне холодного тумана.
f.freezing_pulsar=Пульсар, модифицированный с использованием замораживающего вещества, температура которого со временем понижается. Ударная волна пульсара становится мощнее по мере удаления от источника.
f.freezing_vaporizer=Алхимическая бомба, создающая облако тумана сверхнизкой температуры.
f.freezing_vaporizer_mkii=Модифицированный «Замораживающий испаритель», распыляющий химикаты сверхнизкой температуры на более широкую площадь.
f.frenzy_avenger_helm=Шлем, который носят небесные стражи, охраняющие королевство, спрятанное на вершине обдуваемой ветрами горы.
f.frenzy_caller=Подарок богов, используемый для призыва вспышки ярости с небес.
f.frenzy_champion_helm=Шлем того, кто бросил вызов богам и штурмовал врата небесного царства. Некоторые говорят, что свистящие ветры — это вечные боевые крики ее осады.
f.frenzy_crusader_helm=Шлем, который носят мифические воины, о которых говорят, что они сражаются с таким неистовством, что оставляют за собой вихри.
f.frenzy_dragon_helm=Зачарованный шлем, вылепленный в облик чудовища, которое, как полагают некоторые, сформировало мир своим прохождением\: его неистовство породило могучие ветры, а его чешуя стала тенями.
f.frenzy_plate_mail=Легендарные доспехи, которые, как говорят, наполняют своего владельца яростью тысячи полубогов.
f.frenzy_rider_mantle=Легендарные доспехи, которые, как полагают, носил бог, использовавший ярость, чтобы высекать целые миры из камня.
f.frenzy_warrior_helm=Шлем, который носил легендарный мастер меча, настолько быстрый, что одной лишь своей яростью мог сразить целые армии, прежде чем они успевали подняться против него.
f.frost_gel=Капля холодной слизи, собранной у одного из клиентов «Часового механизма».
f.frost_gun=Модифицированный Proto Gun, дополненный алхимическим замораживающим агентом низкой интенсивности.
f.frost_sword=Этот меч холоден, как лед, и готов пожертвовать вашей любовью, помимо любых монстров, которые случайно встанут у вас на пути.
f.frostbreaker_armor=Доспехи с взломанным элементальным ядром, предназначенным для сопротивления замораживанию. Однако эта нестандартная модификация создает другие элементальные слабости.
f.frostbreaker_helm=Шлем Spiral Helm, модифицированный для обеспечения дополнительной защиты от замораживания за счет сопротивляемости огню и ударам.
f.frostbreaker_shield=Щит Proto Shield, модифицированный для обеспечения некоторой защиты от замораживания.
f.frosted_helm=Вкусный шлем из торта, созданный во время празднования годовщины Spiral Knights. Поскольку он сделан из торта, со временем он разваливается.
f.frozen_great_cleaver=Специально изготовленный топор «Триглав», разработанный Бискотти, шеф-поваром ресторана «Скайларк». Хотя она клянется, что использует его исключительно для приготовления пищи, невольно закрадывается мысль, что немало монстров также оказались на его острие.
f.frozen_pulsar=Высокотехнологичный пульсар, способный выпустить ледяной взрыв, подобный метели, как только его заряды созреют. Выстрелы из пульсара становятся мощнее по мере того, как они пролетают все дальше.
f.fuel_canister=Небольшой контейнер, когда-то использовавшийся для хранения топлива для сложной машины.
f.fur_cap=Теплая меховая шапка, изображающая морду дикого зверя.
f.fur_coat=Особо теплый плащ, сшитый из шкуры пушистого зверя.
f.furious_flamberge=Великие фехтовальщики могут вырезать свое имя на теле противника. Легендарные же — выжигают его там.
f.furious_fork=Хороший повар знает, когда переворачивать гамбургеры. Великий повар готовит гамбургеры, пока их переворачивает.
f.furni_beacon_floor_blue=Источник света, выпущенный Спиралью, обычно используемый для освещения особых зон или указания на наличие временной распродажи.
f.furni_beacon_floor_green=Источник света, выпущенный Спиралью, обычно используемый на контрольно-пропускных пунктах.
f.furni_beacon_floor_red=Источник света, выпускаемый Spiral, обычно устанавливаемый в опасных зонах.
f.furni_beacon_floor_yellow=Источник света, выпускаемый Spiral, обычно используемый для предупреждения о необходимости соблюдать осторожность.
f.furni_bed_spiralmilitary=Удобная раскладушка, которая лучше, чем спать в спальном мешке.
f.furni_bench_manor=Изысканная скамейка, идеально подходящая для уютного отдыха.
f.furni_block_ice=Блок из плотно утрамбованного снега. Идеально подходит для строительства сложных снежных крепостей!
f.furni_brazier_short_blue=Короткий факел, наполненный странным синим огнем.
f.furni_brazier_short_green=Короткий факел, наполненный жутким зеленым огнем.
f.furni_brazier_short_orange=Короткий факел, наполненный неземным оранжевым огнем.
f.furni_brazier_short_purple=Короткий факел, наполненный странным фиолетовым огнем.
f.furni_brazier_tall_blue=Высокий факел, наполненный странным синим огнем.
f.furni_brazier_tall_green=Высокий факел, наполненный жутким зеленым огнем.
f.furni_brazier_tall_orange=Высокий факел, наполненный неземным оранжевым огнем.
f.furni_brazier_tall_purple=Высокий факел, наполненный необычным фиолетовым огнем.
f.furni_candles_small=Рассыпанные маленькие свечи, которые придают любой комнате немного классической атмосферы.
f.furni_chair_manor=Изысканное кресло, искусно изготовленное для уютного комфорта.
f.furni_chair_spiralfield=Один стандартный стул Ордена Спирали, способный обеспечить стандартный уровень комфорта для одного рыцаря Спирали.
f.furni_chess=Статуэтка, идеально подходящая для настольной игры.
f.furni_chest_spiralfootlocker=Запертый шкафчик, заполненный важным снаряжением Ордена Спирали, например носками.
f.furni_clutter_bone_bonepile=Некоторые люди назвали бы использование беспорядочной кучи костей в качестве декоративного элемента «смелым». А все остальные? «Жутким».
f.furni_clutter_houseplant_shrub_blue=Свежее голубое растение в веселом горшке.
f.furni_clutter_houseplant_shrub_green=Весёлое зелёное растение в веселом горшке.
f.furni_clutter_houseplant_shrub_red=Розово-красное растение в веселом горшке.
f.furni_clutter_houseplant_shrub_yellow=Солнечно-шафрановое растение в веселом горшке.
f.furni_clutter_luggage=Стильные чемоданы, подходящие для хранения всего, что вам понадобится в последнем путешествии, которое вы когда-либо совершите.
f.furni_clutter_skbedroll=Мягкий спальный мешок, идеально подходящий для тех случаев, когда вам приходится «жить в суровых условиях». Для Спирального Рыцаря, застрявшего на Крэдле, это бывает почти всегда.
f.furni_clutter_skescapepod_shut=Устройство спиральной технологии, используемое для эвакуации с поврежденных звездолетов. Внутри они очень тесные.
f.furni_counter_spiral=Модульный элемент столешницы, который можно комбинировать бесконечным количеством способов. Будьте осторожны при работе с бесконечностью.
f.furni_crate_toughbox_shut=Это прочный и надежный контейнер, используемый для различных целей.
f.furni_crate_toughbox_weapons=Он заполнен опасными взрывчатыми веществами и острыми как бритва мечами! Хранить в недоступном для детей месте.
f.furni_drawer_spiral=Небольшой набор ящиков, заполненных различными важными предметами.
f.furni_floormonitors=Эти прочные мониторы включаются, когда на них наступают. Не совсем понятно, кому это пришло в голову.
f.furni_gaslamp_short_blue=Невысокий, элегантный уличный фонарь, излучающий синее свечение с тихим шипением.
f.furni_gaslamp_short_green=Невысокий, элегантный уличный фонарь, излучающий зеленое свечение с тихим шипением.
f.furni_gaslamp_short_orange=Невысокий, элегантный уличный фонарь, излучающий оранжевое сияние с легким шипением.
f.furni_gaslamp_short_purple=Невысокий, элегантный уличный фонарь, излучающий фиолетовое сияние с легким шипением.
f.furni_gaslamp_tall_blue=Высокий, элегантный уличный фонарь, излучающий синее сияние с легким шипением.
f.furni_gaslamp_tall_green=Высокий, элегантный уличный фонарь, излучающий зеленое сияние с легким шипением.
f.furni_gaslamp_tall_orange=Высокий, элегантный уличный фонарь, излучающий оранжевое сияние с легким шипением.
f.furni_gaslamp_tall_purple=Высокий, элегантный уличный фонарь, излучающий фиолетовое сияние с легким шипением.
f.furni_library_bookstack_1=Беспорядочная стопка разнообразных книг — от кулинарных справочников до таинственных кодексов, исписанных непонятным шрифтом.
f.furni_library_lectern_ancient=Пюпитр, идеально подходящий для размышлений над множеством старинных и любопытных томов, содержащих забытые знания.
f.furni_library_lectern_cursed=Пюпитр, на котором лежит зловещий фолиант, исписанный неразборчивыми каракулями и испачканный чернильными отпечатками лап кошки.
f.furni_library_lectern_mystic=Пюпитр, на котором лежит магический фолиант, исписанный тайными символами, эзотерическими формулами и несколькими особенно грубыми каракулями.
f.furni_pet_chromalisk=Робкий хромалиск, который, похоже, потерял дар речи.
f.furni_pet_companion_cube=Общительный слизь с неудержимым любопытством. (Не более 1 на зал).
f.furni_pet_flying_snipe=Бекас, который с удовольствием парит в воздухе.
f.furni_pet_lazy_gobble_snipe=Праздничный осенний бекас, который останется там, где его поставили.
f.furni_pet_lazy_rooster=Праздничный новогодний бекас, который останется там, где его поставили.
f.furni_pet_lazy_snipe=Тихо отдыхающий бекас, который останется там, где его поставили.
f.furni_pet_mewkat=Очаровательный маленький призрачный котенок, который любит бродить и мяукать практически на все, что видит.
f.furni_pet_nature_sprite=Дух Природы, предпочитающий бродить, а не следовать за Матерью-Духом.
f.furni_pet_plump_gobble_snipe=Впечатляюще крупный бекас, который наслаждается долгим отдыхом после сытного обеда.
f.furni_pet_plump_rooster=Впечатляюще крупный буггок, который приятно и долго отдыхает после сытного обеда.
f.furni_pet_wandering_gobble_snipe=Праздничный осенний бекас, который будет исследовать окрестности.
f.furni_pet_wandering_rooster=Праздничный новогодний бекас, который будет исследовать окрестности.
f.furni_pet_wandering_snipe=Любопытный бекас, который будет исследовать окрестности.
f.furni_pet_zombie_bellhop=Необычайно преданный своему делу коридорный, отвечающий за доставку багажа в номера гостей. Большинство просто предлагают самим нести чемоданы.
f.furni_rainbow=Великолепная дуга преломленного света. Что это значит?
f.furni_shelf_manor_bookcase=Неприметная полка, заполненная неземными фолиантами с невыразимой силой.
f.furni_shelf_spiral1=Простая полка, забитая полезными инструментами и устройствами.
f.furni_spiralorder_fieldsensor=Прочный спиральный сканер, который собирается за считанные минуты, предоставляет часы информации и служит годами.
f.furni_spiralorder_sundries=Контейнеры с припасами, содержащие всё необходимое рыцарю Спирали для начала дня.
f.furni_statue=Памятная статуя, которую можно разместить в зале гильдии. В каждом зале можно разместить до {0} статуй.
f.furni_table_manor_1=Изысканный приставной столик, тщательно изготовленный для монументального великолепия.
f.furni_table_spiral1=Небольшой столик, который стремится однажды соединиться с другими столиками, чтобы стать большим столом.
f.furni_trophy_battlestand_champions=Элегантная экспозиция, посвященная повышению рыцаря до звания Чемпиона.
f.furni_trophy_battlestand_knights=Изысканная экспозиция, посвященная полному принятию рыцаря в Орден Спирали.
f.furni_trophy_battlestand_soldiers=Простая экспозиция, посвященная призыву рыцаря в Орден Спирали.
f.furni_trophy_battlestand_vanguards=Великолепная экспозиция, посвященная восхождению рыцаря на высшую ступень Ордена Спирали.
f.furni_trophy_boss_roarmulus_1=Освобожденный набор чертежей, демонстрирующий полные характеристики и масштаб проекта «Роармулус».
f.furni_trophy_boss_roarmulus_2=Миниатюрная модель одного из близнецов Роармулус. К счастью, она неактивна.
f.furni_trophy_boss_roarmulus_3=Невооруженная копия конечного продукта проекта «Роармулус» в половинном масштабе. Без вооружения она годится разве что для того, чтобы оживить унылую комнату.
f.furni_trophy_boss_royaljelly_1=Мягкий драгоценный камень, который очень ценят слизи. Этот экземпляр был изъят из Дворца Королевского Млечка и тщательно сохранен в качестве предмета для разговора.
f.furni_trophy_boss_royaljelly_2=Весёлое украшение, которое когда-то носил сам Королевский Млечок. Оно игриво уперлось в желеобразную подушку.
f.furni_trophy_boss_royaljelly_3=Уменьшенная модель Королевского Млечка. Ему, наверное, было бы лестно, если бы его не раздавили.
f.furni_trophy_boss_snarbolax_1=Длинный, острый как бритва зуб — доказательство того, что вы встретили легендарного Снарболакса и выжили, чтобы вернуться сюда.
f.furni_trophy_boss_snarbolax_2=Небольшая статуэтка Снарболакса, изображающая дикого зверя в ошеломленном состоянии.
f.furni_trophy_boss_snarbolax_3=Большая модель Снарболакса, с мельчайшими деталями изображающая его кусающие челюсти и хватающие когти.
f.furni_trophy_boss_vanaduke_1=Великолепно сохранившаяся королевская печать затерянного королевства Альмире. Вероятно, ей место в музее.
f.furni_trophy_boss_vanaduke_2=Зловещая маска, которую когда-то носил Ванадук, повелитель Цитадели Огненной Бури. Она слишком велика, чтобы ее мог носить рыцарь.
f.furni_trophy_boss_vanaduke_3=Художественная композиция из маски, доспехов и скипетра лорда Ванадука. Она олицетворяет безумие алчности, агонию отчаяния и то, как потрясающе смотрятся вместе огонь и шипы.
f.furni_wardrobe_sklocker=Запертый шкаф, в котором хранятся одежда и доспехи, не надетые в данный момент.
f.fused_demo_helm=Улучшенный шлем «Демо», опасно слившийся с нестабильным ядром мощного «Взрывного куба». Он издает неприятный гул в ушах.
f.fused_demo_suit=Улучшенный костюм демо, опасно слившийся с нестабильным ядром мощного взрывного куба. Тем не менее, в нем вы будете чувствовать себя гораздо безопаснее.
f.fusion_blaster=Усовершенствованный элементальный бластер, предназначенный для изгнания существ, скрывающихся в тени.
f.galactic_guardian_helm=Памятный шлем, отдающий дань уважения бесчисленным отважным стражам Исорана, защищавшим космические экипажи в их приключениях по звездам.
f.galactic_guardian_vest=Надев этот потрясающий звездный жилет, вы сможете привести других в безопасное место даже в самых темных уголках космоса.
f.garden_snipes_room=Мирный сад, в котором обитает множество Снайпов. Идеально подходит как для отдыха, так и для безумного кружения на месте.
f.gel_core=Гелеобразный комок размером с кулак, добытый из желе.
f.gel_drop=Капля слизи, добытая из желе. Она все еще дрожит.
f.gh_env_default=Стандартная обстановка, которая действительно передает затхлый воздух Часового механизма.
f.gh_env_embers=Обстановка, которая наполняет ваш Зал Гильдии падающим пеплом и сажей, словно сам Вог прошел мимо.
f.gh_env_rain_shower=Идеальная обстановка для Залов Гильдии, у которых нет страховки от пожара или члены которых просто слишком ленивы, чтобы когда-либо поливать свои растения.
f.gh_env_rain_torrent=Окружение, в котором дождя почти слишком много.
f.gh_env_snowing=Прекрасное окружение, наполняющее ваш Зал гильдии идеальным снегом\: таким, который мягко падает с неба и никогда не скапливается на земле, не тая в серую грязь.
f.gh_theme_default=Тема Зала гильдии по умолчанию.
f.gh_theme_divine=Яркая, небесная тема, с которой будет очень сложно потерять ключи.
f.gh_theme_fire=Огненная тема, которая обязательно согреет ваш Зал гильдии и сделает его уютным... или потным.
f.gh_theme_freeze=Морозная тема, которая превращает Залы гильдий в популярное место отдыха во время теплых летних месяцев на Cradle.
f.gh_theme_poison=Очень уникальная тема, которая придаст вашему Залу Гильдии всю красоту и атмосферу канализационной системы.
f.gh_theme_shock=Энергичная тема, наполняющая воздух электричеством. Побочные эффекты включают постоянные статические разряды при прикосновении к абсолютно любому предмету.
f.gh_theme_spooky=Темная и зловещая тема, идеально подходящая для Зала Гильдии, члены которой входят в число недавно ушедших из жизни.
f.ghost_bell=Небольшой серебристый колокольчик, который носят внимательные призраки, чтобы предупредить живых о своем приближении.
f.gift_of_autumn=Редкий амулет, ценимый путешественниками, который укрепляет его владельца в зимний сезон.
f.gigawatt_pulsar=Мощно усовершенствованный пистолет, поражающий врагов с силой молнии. Выстрелы из «Пульсара» становятся мощнее по мере увеличения дальности.
f.gilded_griffin=Прекрасный пистолет, названный в честь великого и благородного зверя. Считалось, что его золотая оправа дает свет в непроглядной тьме Подземного мира.
f.glacius=Сочетание передовых теорий криогеники с технологией, лежащей в основе Охлаждающей камеры, привело к созданию этого усовершенствованного оружия, способного мгновенно заморозить самых грозных врагов.
f.glowing_crystal=Редкое кристаллическое скопление тепла, используемое для создания оружия и снаряжения более высоких уровней. Тепло внутри горит достаточно ярко, чтобы осветить темную комнату.
f.gm_armor=Впечатляющие доспехи цвета индиго, которые являются неоспоримым признаком одного из невероятных Гейм-Мастеров Ордена Спирали.
f.gm_helmet=Впечатляющий шлем цвета индиго, который является неоспоримым признаком одного из невероятных Гейм-Мастеров Ордена Спирали.
f.gold_dragon_armor=Доспехи, которые когда-то носил член отряда «Золотых драконов» — отряда бесстрашных рыцарей, специализировавшихся на ликвидации особо важных целей Мораи. После роспуска отряда выжившие его члены были объединены Десной с другими отрядами для формирования «Разведывательных рейнджеров».
f.gold_dragon_helm=Шлем, который когда-то носил член отряда «Золотых драконов» — отряда бесстрашных рыцарей, специализировавшихся на ликвидации важных целей Мораи. После расформирования отряда выжившие члены были объединены Десной с другими отрядами для формирования «Разведывательных рейнджеров».
f.gold_wolf_coat=Доспехи, которые когда-то носил член отряда «Золотых волков» — отряда бесстрашных рыцарей, специализировавшихся на ликвидации важных целей Мораи. После расформирования отряда выжившие члены были объединены Десной с другими отрядами для формирования «Разведывательных рейнджеров».
f.gold_wolf_hood=Шлем, который когда-то носил член отряда «Золотых волков» — отряда бесстрашных рыцарей, специализировавшихся на ликвидации важных целей Мораи. После расформирования отряда выжившие члены были объединены Десной с другими отрядами для формирования «Разведывательных рейнджеров».
f.golden_solstice_ring=Зачарованное кольцо, воплощающее дух солнцестояния. Его сверкающий золотой блеск сияет ярче всего в летние месяцы.
f.gorgofist=Ужасающий пистолет, сочетающий в себе двойную сокрушительную силу горго и мифического тортомега. Уничтожение врагов ещё никогда не доставляло столько дьявольского удовольствия.
f.gorgomega=Ужасающий щит, сочетающий в себе двойную сокрушительную силу горго и мифического тортомега. Сокрушение врагов ещё никогда не доставляло столько дьявольского удовольствия.
f.gram=Необычайно тяжелый меч, вес которого замедлит даже самого быстроного рыцаря. При этом представьте, что он сделает с тем, кого вы им ударите...
f.gran_faust=Улучшенный Фауст, выкованный из теневой стали высшего качества. Его заряженные атаки настолько мощны, что могут проклясть самого владельца, но это не мешает Девилаитам ценить эти редкие клинки даже больше, чем свой скудный отпуск.
f.grand_flourish=Причудливый клинок для тех, кто предпочитает решать свои проблемы с помощью прыжка, скачка и удара.
f.grand_solstice_ring=Великолепное зачарованное кольцо, воплощающее дух солнцестояния. Его поверхность, кажется, меняет цвет со временем, иногда на ощупь она горячая, а иногда холодная.
f.grand_tortofist=Пистолет, наполненный безграничной яростью тортодрона. Держа его в руках, можно почувствовать, как энергия ярости внутри жаждет вырваться наружу.
f.grand_tortoise=Щит, наполненный безграничной яростью тортодрона. Сами пластины этого колоссального панциря дрожат, пока нестабильная энергия внутри ждет своего часа, чтобы вырваться наружу.
f.grave_soil=Ужасная земля, выкопанная из жуткой крипты. На ощупь она всегда немного холодная.
f.graviton_bomb=Способная притягивать врагов к месту взрыва, эта бомба использует технологию, которую Орден Спирали не до конца понимает.
f.graviton_charge=Небольшой взрывной заряд загадочного происхождения. Он способен генерировать вихрь сокрушительной гравитации.
f.graviton_vortex=Гравитонная бомба, укрепленная потенциально опасным количеством теневой стали. Ее взрыв должен притянуть ваших врагов к себе... если, конечно, он не разорвет всю вселенную пополам.
f.great_defender=Прочный «Защитник», модернизированный собственным внутренним источником энергии для более эффективной защиты.
f.great_defender_c=Искусно изготовленная костюмная версия классического щита.
f.green_shard=Осколок Валестоуна, слишком маленький для использования в качестве источника энергии для ворот, но чрезвычайно полезный в алхимии.
f.green_ward=Прочный щит с изумрудным отблеском, защищающий новобранцев «Спиральных рыцарей» от опасностей в виде острых шипов и смертоносных ядов.
f.gremlin_disguise=Очень убедительный костюм, который делает того, кто его носит, похожим на гремлина. Он настолько убедителен, что вы вполне можете получить приглашение в Колонию!
f.gremlin_gizmo=Странное устройство, используемое в механизмах гремлинов. На нем есть надпись с предупреждением не подвергать его воздействию прямых солнечных лучей и не погружать в воду.
f.gremlin_helm=Специальный шлем, изготовленный вручную кузнецами-гремлинами для защиты от самых суровых условий. Этот экземпляр был модифицирован, чтобы подойти рыцарю.
f.gremlin_suit=Специальный костюм, сшитый с гремилинским присущим изяществом, чтобы идеально сидеть на рыцаре. Он защищает того, кто его носит, при этом обеспечивая полную свободу движений для ударов, стуков или починок.
f.gremlonium=Высокотехнологичный состав, созданный инженерами-гремилинами для питания их самых коварных машин.  Он постоянно издает тревожный шипящий звук.
f.grey_feather_cowl=Пуховый капюшон, созданный для ученых, которые любят выходить в поле. Он мягче самой роскошной подушки, но при этом обеспечивает исключительную защиту.
f.grey_feather_mantle=Плащ для известных ученых-оулитов; эта перьевая накидка наполнена мудростью веков... и невероятно мягкая!
f.grey_owlite_shield=Великолепная копия щита, который, как полагают, выдавали самым выдающимся волшебникам Оулайта. Держа его в руках, вы наполняетесь духом праведной мести.
f.grim_buster=Пистолет, созданный путем алхимии из панциря заражённого тортодрона. Кажется, что из ствола струятся тени, когда он направлен на цель.
f.grim_repeater=Этот дьявольский пулемет, которым пользуются только самые элитные рейнджеры Спиральных рыцарей, получил свое название благодаря невероятной скорости, с которой он раздает теневые билеты в загробный мир.
f.grim_shell=Щит, созданный путем алхимии из панциря коррумпированного тортодрона. Кажется, что тени удлиняются и цепляются за него, когда он приходит в действие.
f.grinchlin_snowball=Сделанные вручную ворчливыми гринчлинами с горы Крампус, эти отвратительные снаряды наверняка омрачат любые зимние праздники.
f.grintovec=Ваши враги наверняка оценят прохладное, освежающее ощущение от удара ледника.
f.groundbreaker_armor=Доспехи, которые носят рыцари, первыми отважившиеся спуститься в глубины Часового механизма.
f.groundbreaker_helm=Прочный шлем, который носят рыцари, первыми отважившиеся спуститься в глубины Часового механизма.
f.gsc_vip=Непередаваемое членство в клубе C.U.B.E. казино «Золотой слизь». Преимущества членства могут изменяться.
f.guild_bond=Внесите средства в казну вашего гильдии, чтобы обменять короны.
f.guild_members_100=Позволяет вашей гильдии набрать до 100 членов!
f.guild_members_150=Позволяет вашей гильдии набрать до 150 членов!
f.guild_members_200=Позволяет вашей гильдии набирать до 200 членов\!
f.guild_members_250=Позволяет вашей гильдии набирать до 250 членов\!
f.guild_members_300=Позволяет вашей гильдии набирать до 300 членов\!
f.guild_storage=Навсегда добавляет опции «Хранилище членов», «Хранилище ветеранов» и «Хранилище офицеров» в консоль команд гильдии. Хранилища позволяют членам гильдии, имеющим достаточный ранг, обмениваться несвязанными предметами с другими членами гильдии.
f.gun_puppy_disguise=Очень убедительный костюм, который делает того, кто его носит, похожим на щенка-пушку.  Он настолько убедителен, что ваши друзья могут просто обмануть вас\!
f.gunpuppy_helm=Шлем, изготовленный вручную из утилизированных деталей «Gun Puppy».
f.gunslinger_hat=Превосходный головной убор, который носили вооруженные пистолетами воины из забытых времен. Он идеально подходит для дуэлей, поисков или странствий по высоким равнинам.
f.gunslinger_sash=Одежда, которую носили вооруженные пистолетами воины из забытых времен. От нее пахнет сыромятной кожей, пороховым дымом и сражениями.
f.hail_driver=Как только вы увидите разрывающие воздух громкие удары неестественно холодного льда, которые он производит, вы поймете, почему этого Водителя прославляют.
f.hailstone=Небольшой камень, который всегда немного холодный на ощупь. Он отлично подходит для охлаждения напитков, не разбавляя их вкус.
f.harlequin_cowl=Не смейте высмеивать того, кто носит этот красочный капюшон, иначе вы сами окажетесь в роли объекта насмешек.
f.harlequin_suit=Костюм для тех, кто жонглирует, кувыркается или обладает даром проказничества.
f.hatchet=Тяжелое лезвие, используемое для рубки лиан и листвы в дикой местности, окружающей Спасательный лагерь.
f.hazardous_brigandine=Броня с набивкой, которая, кажется, подчеркивает высокий уровень смертности элитных Алых Разведчиков. Алым Разведчикам нужно путешествовать налегке и быстро, чтобы опережать отряды с меньшими навыками.
f.hazardous_diablo_helm=Шлем, который носят члены «Алых разведчиков». Этот шлем, призванный устрашать врагов, имеет облик демона, который, по преданию, отломал себе рог, чтобы использовать его в качестве оружия, когда ему грозила гибель.
f.hazardous_draped_armor=Свободная броня, которую носят более опытные «Алые разведчики». Ходят слухи, что подобное снаряжение изготавливается из остатков доспехов разведчиков, павших в бою, служа напоминанием о том, что разведчики никогда не оставляют товарища в беде, если в этом нет крайней необходимости.
f.hazardous_grim_mask=Шлем, который носят члены «Алых разведчиков». Этот шлем, призванный устрашать врагов, имеет облик самой Смерти. У тех, кто его носит, есть поговорка: «Смерть наступает на пятки, так что смотри вперед».
f.hazardous_hedge_coat=Изношенный в боях плащ, который носят командиры отрядов «Алых разведчиков», прозванные «живыми изгородями». Это прозвище, вероятно, возникло из-за их невероятных навыков фланговых атак или, возможно, в связи с шипами, украшающими их доспехи.
f.hazardous_oni_helm=Шлем, который носят члены «Алых разведчиков». Созданный, чтобы пугать врагов, этот шлем имеет облик демона, обитающего в горах далекой страны. Говорят, что он охраняет вход в сам рай и пропускает только тех, кто достоин.
f.haze_bomb=Алхимическая бомба, создающая ядовитое облако, способное оглушить тех, кто окажется внутри.
f.haze_bomb_mkii=Бомба «Туман», модифицированная для рассеивания ядовитых химикатов на более широкую площадь.
f.haze_burst=Мощная алхимическая бомба, создающая плотное облако вещества, вызывающего сильную дезориентацию.
f.heater_shield=Щит со встроенной печью, который согревает владельца и защищает его от большинства атак, вызывающих замораживание. Многие рыцари также используют его в качестве импровизированной плиты во время похода.
f.heavenly_guardian_armor=Сияющая белая броня, которую носят защитники небесных царств.
f.heavenly_guardian_helm=Сияющий белый шлем, принадлежащий небесному воину.
f.heavenly_iron_armor=Мощный комплект брони, который, как говорят, изготовлен из ангельских щитов. Он сохраняет многие божественные свойства, которыми обладают небесные существа, но лишен их уязвимости к огню.
f.heavenly_iron_helm=Мощный шлем, который, как говорят, изготовлен из ангельских щитов.  Он сохраняет многие божественные свойства, которыми обладают небесные существа, но лишен их уязвимости к огню.
f.heavy_crystal_bomb=Твердый кусок сплава с взрывным сюрпризом внутри. Зомби ненавидят сюрпризы.
f.heavy_dark_matter_bomb=Твёрдый кусок тёмной материи с взрывным сюрпризом внутри. Гремлины ненавидят сюрпризы.
f.heavy_deconstructor=Улучшённый деконструктор, который будет уничтожать роботов и раздавливать конструкции на более обширной территории.
f.heavy_demo_helm=Усиленный шлем, который может пригодиться, если вы, мастер взрывов, возьмёте его с собой.
f.heavy_demo_suit=Усиленная броня, предназначенная для экспертов по взрывчатым веществам.
f.heavy_gear=Утяжеленное снаряжение, которое ранее помогало в управлении огромной машиной.
f.heavy_hatchet=Большой топор, предназначенный для сруба деревьев. Неудивительно, что вы также можете использовать его для сруба врагов, блоков, месторождений полезных ископаемых и почти всего остального, что захотите им ударить.
f.heavy_plate_helm=Массивный шлем, рассчитанный на то, чтобы выдерживать всевозможные удары от обычного оружия. Внутри пахнет немного потом.
f.heavy_plate_mail=Толстая броня, укрепленная большим количеством металлических пластин, чем в автомате Clockworks. Она немного неудобна.
f.heavy_plate_shield=Огромный укрепленный щит, идеально подходящий для отражения ударов и отражения атак врагов.
f.heavy_pulsar=Пульсар, модернизированный с использованием технологии «Спираль» для увеличения мощности. Выстрелы из пульсара становятся мощнее по мере увеличения дальности.
f.heavy_shard_bomb=Твёрдый кусок обеднённого кримзонита с взрывным сюрпризом внутри. Все любят сюрпризы!
f.heavy_splinter_bomb=Твёрдый кусок синтетического минерала с взрывным сюрпризом внутри. Волверы ненавидят сюрпризы.
f.helm_back=Аксессуар, который можно прикрепить к задней части некоторых шлемов.  Аксессуары можно прикрепить в «Аксессуаризаторе» на базаре Хейвена.
f.helm_brow=Аксессуар, который можно прикрепить к лобу некоторых шлемов.  Аксессуары можно прикрепить в «Аксессуаризаторе» на базаре Хейвена.
f.helm_front=Аксессуар, который можно прикрепить к передней части некоторых шлемов.  Аксессуары можно прикрепить в «Аксессуаризаторе» на базаре Хейвена.
f.helm_side=Аксессуар, который можно прикрепить к боковой части некоторых шлемов.  Аксессуары можно прикрепить в «Аксессуаризаторе» на базаре Хейвена.
f.helm_top=Аксессуар, который можно прикрепить к верхней части некоторых шлемов.  Аксессуары можно прикрепить в Accessorizor в Haven Bazaar.
f.hex_visor=Говорят, что муха с такими глазами может увернуться от чего угодно. Жаль, что вы не муха.
f.hexoskeleton=Защищает грудную клетку, брюшко и ноги. Линька не требуется.
f.hive_box=Содержит один уникальный предмет на тему улья. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.hive_helm=Насекомые узнают друг друга по запаху, но глаза всё равно нужны, чтобы грозно смотреть на соперников.
f.holiday_hat=Праздничная шапка, несущая в себе тёплый дух праздников. От неё слабо пахнет имбирным печеньем.
f.holiday_hat_snow=Праздничная шапка настолько торжественная, что над ней падает снег!  К счастью для того, кто ее носит, сама шапка очень теплая.
f.holiday_present=Идеально упакованная куча подарков, которая обязательно порадует любого, кто ее откроет.
f.honor_blade_1=Церемониальный меч, выдаваемый новобранцам Спиральных рыцарей. Хотя он предназначен для торжественных случаев, его острое лезвие делает его пригодным для боевого использования.
f.honor_blade_2=Церемониальный меч, выдаваемый опытным Рыцарям Спирали. Хотя он предназначен для торжественных случаев, его острое лезвие делает его пригодным для боевого использования.
f.honor_blade_3=Церемониальный меч, выдаваемый Чемпионам Ордена Спирали. Хотя он предназначен для торжественных случаев, его острое лезвие делает его пригодным для боевого использования.
f.honor_blade_4=Церемониальный меч, выдаваемый Авангарду Ордена Спирали. Хотя он предназначен для торжественных случаев, его острое лезвие делает его пригодным для боевого использования.
f.honor_shield_1=Церемониальный щит, выдаваемый новобранцам Рыцарей Спирали. Хотя он предназначен для торжественных случаев, его прочная конструкция делает его пригодным для боевого использования.
f.honor_shield_2=Церемониальный щит, вручаемый опытным Рыцарям Спирали. Хотя он предназначен для торжественных случаев, его прочная конструкция позволяет использовать его в бою.
f.honor_shield_3=Церемониальный щит, вручаемый Чемпионам Ордена Спирали. Хотя он предназначен для торжественных случаев, его прочная конструкция позволяет использовать его в бою.
f.honor_shield_4=Церемониальный щит, выдаваемый Авангарду Ордена Спирали. Хотя он предназначен для торжественных случаев, его прочная конструкция делает его пригодным для использования в бою.
f.hood=Мистический капюшон, главная сила которого заключается в сокрытии личности того, кто его носит.
f.horned_owlite_shield=Прочный щит, похожий на те, что, по преданию, носили юные Овлиты.
f.hot_edge=Модифицированный прото-меч, способный генерировать температуру, достаточную для сжигания органического материала.
f.humbug_hat=Ужасная шляпа, которую носят те, кто искренне ненавидит магию Зимнего фестиваля. Единственное возможное объяснение этому чувству — сердце на два размера меньше нормы.
f.humbug_hazer=Это ворчливое устройство гарантированно вызовет тошноту у любого, кроме самого угрюмого ворчуна.
f.hunters_lodge_room=Охотничий домик для охоты на монстров, организованный великим охотником Армеро. Содержит гильдейскую алхимическую машину с рецептами трофеев монстров. Гильдейские алхимические машины используют ресурсы из гильдейской казны и отправляют результаты в гильдейскую казну.
f.hunting_blade=Зазубренный клинок, используемый для добивания крупной дичи. Он режет зверей как масло.
f.ice_axe=Специализированный альпинистский инструмент, позволяющий с высокой точностью расчленять монстров.
f.ice_queen_crown=Царственная корона, напоминающая корону вечно холодной Ледяной королевы.  Помимо отличной защиты, она, как говорят, значительно укрепляет самооценку и создает холодное отстранение от окружающих.
f.ice_queen_mail=Царственный доспех, напоминающий доспехи вечно холодной Ледяной королевы.  Помимо отличной защиты, говорят, что она значительно укрепляет самолюбие и создает холодную отстраненность от окружающих.
f.icebreaker_armor=Улучшенные доспехи «Ледолома», дополнительно доработанные для защиты от замораживания.
f.icebreaker_helm=Шлем «Ледолома», модифицированный для дополнительной защиты от замораживания.
f.icebreaker_shield=Щит «Ледолома», модифицированный для повышенной защиты от замораживания.
f.iceburst_brandish=Улучшенный «Брандиш», наполненный элементальной сущностью льда.
f.ideal_sword=Чувак, этот меч просто идеален!
f.ignition_armor=Легкая броня, усиленная для защиты рыцарей, отправляющихся в жаркие приключения.
f.ignition_helm=Легкий шлем, усиленный для того, чтобы голова рыцаря оставалась холодной в напряженных ситуациях.
f.illuminating_ward=Личная свеча, отгоняющая тьму и то, что в ней скрывается.
f.imperial_tricorne=Великолепная шляпа, которую носят те, кто стремится построить империи, над которыми солнце никогда не заходит.
f.impostoclaus_hat=Сказочно праздничная шляпа Зимнего фестиваля, которая делает того, кто ее носит, похожим на великого духа Зимнего фестиваля, Импостоклауса. Глорп! Глорп! Глорп!
f.indestructible_giftwrap=Подарки, завернутые в эту шутку от Гринчлинов, больше никогда не удастся открыть. Оставьте Гринчлинам право испортить бесплатные услуги по упаковке подарков для всех.
f.industrial_catalyzer=Катализатор, модифицированный для стрельбы опасными сверхзаряженными снарядами. Пули из Катализатора окутывают врага энергетическим полем, которое взрывается после получения урона.
f.industrial_hard_hat=Обычно носящаяся строителями, эта каска не обеспечивает значительной защиты, но дает владельцу высокую сопротивляемость оглушению.
f.infernal_guardian_armor=Обугленная стигийская броня, которую носят те, кто защищает адские глубины.
f.infernal_guardian_helm=Обугленный стигийский шлем, принадлежащий воину из бездны.
f.ionized_salt_bomb=Твёрдый кусок каменной соли с взрывным сюрпризом внутри. Медузы ненавидят сюрпризы.
f.iron_buckler=Небольшой кованый железный щиток, способный выдержать чуть больше ударов, чем «Прото-щит».
f.iron_dragon_armor=Доспехи, которые когда-то носил член отряда «Железных драконов» — отряда бесстрашных рыцарей, специализировавшихся на ликвидации важных целей Мораи. После роспуска отряда выжившие его члены были объединены Десной с другими отрядами для формирования «Разведывательных рейнджеров».
f.iron_dragon_helm=Шлем, который когда-то носил член отряда «Железных драконов» — отряда бесстрашных рыцарей, специализировавшихся на ликвидации важных целей Мораи. После расформирования отряда выжившие члены были объединены Десной с другими отрядами для формирования «Разведывательных рейнджеров».
f.iron_gear=Металлическая шестерня, которая когда-то была частью сложного механизма.
f.iron_slug=Только самые страшные враги способны противостоять парализующему воздействию, вызванному мощным ударом «Железного пуля». Заряженный выстрел может даже пробить нескольких врагов насквозь.
f.iron_wolf_coat=Доспехи, которые когда-то носил член отряда «Железных волков» — отряда бесстрашных рыцарей, специализировавшихся на ликвидации важных целей Мораи. После расформирования их выжившие члены были объединены Десной с другими отрядами, чтобы сформировать «Разведывательных рейнджеров».
f.iron_wolf_hood=Шлем, который когда-то носил член «Железных волков», отряда бесстрашных рыцарей, специализировавшегося на ликвидации важных целей Мораи. После расформирования их выжившие члены были объединены Десной с другими отрядами, чтобы сформировать «Разведывательных рейнджеров».
f.ironmight_plate_helm=Превосходный ламельный шлем, выкованный из сплава нескольких редких металлов. Он немного ограничивает боковое зрение, но практически непробиваем.
f.ironmight_plate_mail=Превосходная пластинчатая кольчуга, выкованная из сплава нескольких редких металлов. Она сковывает движения, но невероятно прочна.
f.ironmight_plate_shield=Превосходный щит, выкованный из солнечного серебра. Значение герба на его лицевой стороне утрачено во времени.
f.irontech_bomb=Тяжелая бомба, обернутая толстыми железными пластинами. Хотя она летит медленнее большинства бомб, она обладает мощной ударной силой.
f.irontech_destroyer=Старший брат бомбы Irontech, «Разрушитель» раскрывает весь потенциал силы irontech.
f.ironwood=Незапятнанное бревно из одного из самых твердых материалов, известных рыцарям Спирали.
f.jack_froster=Введите зимнюю сказку с помощью этого обжигающего нос, неприятного сюрприза, который идеально подходит для того, чтобы нанести вашим врагам сильный обморожение.
f.jalovec=Дрожащий меч для рыцарей, которые считают, что было бы круто обрушить на своих врагов лавину боли.
f.jar_o_fireflies=Небольшая банка с зимующими светлячками, которых можно выпустить по торжественному поводу.
f.jaws_megalodon=Устрашающий шлем, стилизованный под глубоководного монстра.
f.jelly_animal=Великолепная маска в виде животного, олицетворяющая эктоплазматическое преобразование.
f.jelly_glue=Вязкий состав, разработанный компанией «Биотех», для изучения слизистых существ. При смешивании со слизью и желеобразной материей он позволяет изменять форму, не теряя при этом своих свойств. Хотя этот процесс предназначен исключительно для научных целей, его обычно считают «суперзабавным».
f.jelly_helm=Желеобразный головной убор, изготовленный из липких стражей.
f.jelly_mail=Мягкий комплект доспехов, изготовленный из скользких слизи, который просто излучает стиль.
f.jelly_shield=Странно выглядящий щит, созданный из желеобразной материи. Как и многие слизистые монстры, он обеспечивает пользователю исключительную защиту от проникающего урона.
f.justifier_hat=Изысканная шляпа для мастеров пистолета, которые не жалеют нескольких крон на высококачественное снаряжение.
f.justifier_jacket=Изысканный костюм для ищущих опасности стрелков, которые предпочитают быть быстрыми, чем мертвыми.
f.kamarin=Низкотехнологичный меч, который менее эффективен в резании, чем в сокрушении врагов и запугивании их перед вами.
f.kat_claw_cloak=Грубо сшитый плащ, сделанный так, чтобы напоминать безжалостного воина из злополучного племени Кат.
f.kat_claw_cowl=Великолепно сшитый капюшон, который, как говорят, напоминает героя племени Кат, Скрайта, первым взобравшегося на стены Высшей Академии Магии Оулайт.
f.kat_claw_hood=Грубо вытесанный капюшон, стилизованный под образ безжалостного воина из злополучного племени Кат.
f.kat_claw_mail=Внушительная кольчуга, наполненная силой Кат-Клоуэров — грозных бойцов передовой линии племени Кат.
f.kat_claw_mask=Впечатляющая маска, наполненная силой Коготь-Клоуэров, грозных бойцов первой линии племени Кат.
f.kat_claw_raiment=Восстановная одежда, по слухам, напоминающая героя племени Кат, Скрайта, первого, кто взобрался на стены Высшей Академии Магии Оулайт.
f.kat_eye_cloak=Грубо сшитый плащ, сделанный по подобию меткого воина злополучного племени Кат.
f.kat_eye_cowl=Великолепно сшитый капюшон, который, как говорят, напоминает героя племени Кат, Преову, чья артиллерия заставила замолчать мудрецов Башни Серого Пера.
f.kat_eye_hood=Грубо вытесанный капюшон, сделанный по подобию меткого воина из злополучного племени Кат.
f.kat_eye_mail=Впечатляющие кольчуги, наполненные силой Искателей Кат, искусных гренадеров из племени Кат.
f.kat_eye_mask=Впечатляющая маска, наполненная могуществом «Искателей Кат» — искусных гранатометчиков племени Кат.
f.kat_eye_raiment=Восстановная одежда, по слухам, напоминающая героя племени Кат, Преову, чья артиллерия заставила замолчать мудрецов Башни Серого Пера.
f.kat_hiss_cloak=Грубо сшитый плащ, созданный по подобию вспыльчивого воина злополучного племени Кат.
f.kat_hiss_cowl=Великолепно сшитый капюшон, который, как говорят, напоминает героя племени Кат, Тораира, который цеплялся за ворота Высшей Академии Магии Оулайт, пока и она, и его взрывчатка горели.
f.kat_hiss_hood=Грубо вырезанный капюшон, созданный по подобию вспыльчивого воина злополучного племени Кат.
f.kat_hiss_mail=Впечатляющие кольчуги, наполненные силой Кат-Хиссеров, нестабильных бомбардировщиков племени Кат.
f.kat_hiss_mask=Впечатляющая маска, наполненная силой Кат-Хиссеров, нестабильных бомбардировщиков племени Кат.
f.kat_hiss_raiment=Восстановная одежда, по слухам, напоминающая героя племени Кат, Тораира, который цеплялся за ворота Высшей Академии Магии Оулайт, пока и она, и его взрывчатка горели.
f.kat_suit=Костюм с когтями, сшитый портными из Муркрофта. Идеально подходит для любознательных рыцарей, склонных устраивать перерывы на дремоту после долгой ночи приключений.
f.kat_tribe_fetish=Потрепанный талисман ныне исчезнувшего племени Кат — свирепых кошачьих воинов, виновных в уничтожении Оулитов и их престижной Высшей Академии Магии. Фетиши брали с собой в бой воины племени Кат, и, несмотря на печальную судьбу самого племени, считается, что они приносят удачу.
f.khorovod=Простой, но тем не менее качественно изготовленный меч, чьи жестокие удары могут оглушить ничего не подозревающих врагов. Во время боя с ним возникает желание танцевать.
f.kilowatt_pulsar=Пульсар, усовершенствованный с помощью технологии Спирали, чтобы наносить неприятный удар током при столкновении. Выстрелы Pulsar становятся мощнее по мере удаления от источника.
f.leviathan_blade=Редкое сокровище Ордена Спирали; говорят, что удары этого мифического меча обрушиваются на жертв, как вода при приливной волне.
f.light_shard=Осколок Люминита, слишком маленький для использования в качестве источника энергии для ворот, но очень полезный в алхимии.
f.lightning_capacitor=Улучшенный конденсатор, способный взорваться с яростью электрической бури.
f.lockbox=Специальный ящик, содержащий один из сотен уникальных предметов!  Его можно открыть только Серебряным ключом.  Серебряные ключи можно приобрести в Складе снабжения.
f.lockbox_character=Специальный сундук, в котором находится один из множества уникальных предметов, изменяющих внешний вид вашего Рыцаря!  Его можно открыть только Серебряным ключом.  Серебряные ключи можно приобрести в Складе снабжения.
f.lockdown_guardian_shield=Щит, которым вооружен Страж Спирали — верный защитник на поле боя.
f.lockdown_recon_shield=Высокотехнологичное устройство, используемое разведчиками Ордена Спирали, которое делает пользователя практически невидимым для невооруженного глаза.
f.lockdown_striker_shield=Устройство, повышающее скорость, используемое Штурмовиками — мощными ударными войсками Ордена Спирали.
f.love_puppy_disguise=Очень убедительный костюм, который делает того, кто его носит, похожим на щенка любви.  Он настолько убедителен, что ваши друзья могут захотеть поцеловать вас!
f.love_puppy_mask_forever=Специальная маска, доказывающая, что любовь щенка любви длится вечно и навсегда. Некоторые могут возразить, что они просто запрограммированы таким образом, другие скажут: «К черту тебя, наука».
f.luck_potion=Сиропообразная жидкость, которая, по мнению некоторых, усиливает удачу. (Штаб-квартира Spiral не может подтвердить никакого реального эффекта.)
f.luminite=Легендарный минерал сияющего золотистого цвета, который, как говорят, содержит веру, мудрость и энтузиазм окружающей его жизни.
f.luminite_deposit_1=Небольшое месторождение минерала, которое даст одну единицу люминита.
f.luminite_deposit_2=Неплохое месторождение минералов, из которого можно добыть несколько единиц люминита.
f.luminite_deposit_3=Крупный кусок минералов, из которого можно добыть огромное количество единиц люминита.
f.luminite_deposit_4=Главная жила металлосодержащих минералов, из которой можно добыть целый джекпот люминита.
f.luminite_shard=Осколок люминита, слишком маленький для использования в качестве источника энергии для ворот, но очень полезный в алхимии.
f.lump_coal=Подарок от гринчлинов для тех, кто был непослушным или послушным.  Гринчлины — это равные по своим возможностям портители вечеринок.
f.mad_bomber_mask=Прочный шлем, предназначенный для защиты от взрывов, радиоволн и высокотехнологичных устройств управления сознанием. По крайней мере, именно так они *хотят*, чтобы вы думали.
f.mad_bomber_suit=У некоторых людей есть свои счёты. У других — своё мнение. Эта броня предназначена для тех из нас, кто обладает взрывным характером.
f.magic_cloak=Чудесная мантия, которую носят ученики в искусстве заклинаний и колдовства.
f.magic_hood=Очаровательный капюшон для рыцарей, которые балуются гаданием и размышляют о магии.
f.magister_robe=Церемониальная мантия, которую носят ученые мастера тайных искусств, часто оставляющие свои ключи в одном из многочисленных внутренних карманов.
f.magma_driver=Извергая с пугающей скоростью глотки расплавленной смерти, это великолепное оружие не рекомендуется использовать рядом с (или на) кем-либо (или чем-либо), кто вам дорог.
f.magmatic_fanatic_mail=Кольчуга, которую, по преданию, носили фанатики, поклонявшиеся богу магмы. Её пламя защитит тех, кто достоин.
f.magmatic_fanatic_mask=Маска, которую, по преданию, носили фанатики, поклонявшиеся богу магмы. Её пламя осветит путь к победе.
f.magnus=Большой пистолет с мощными патронами, способными оглушить даже самых сильных монстров. Заряженный выстрел может пробить даже нескольких врагов.
f.maidens_tear=Священный драгоценный камень, дорогой сердцу альмирийских рыцарей.  Подаренный им их возлюбленными, он, как говорят, защищает их в бою.
f.manor_green=Зеленый
f.manor_violet=Фиолетовый
f.maskeraith_pod=Капсула спрайта, содержащая боевого спрайта Maskeraith 1-го уровня. \n\nMaskeraith — это боевой спрайт, олицетворяющий тени. Его навыки сосредоточены на уловках и смертоносных ядах.
f.master_blast_bomb=Невероятно мощный взрывчатый предмет, обычно используемый в горнодобывающей промышленности, который теперь несколько опрометчиво применяется в бою.
f.master_blaster=Это усовершенствованное оружие — отличный выбор, если вашей группе приключенцев понадобится еще один герой.
f.master_door=Устанавливает силовой барьер у входа в комнату, который могут пройти только мастера гильдии.
f.mecha_knight_kit=Мгновенно создает механического рыцаря для вашей защиты.
f.mechaknight_disguise=Очень убедительный костюм, который делает того, кто его носит, похожим на механического рыцаря. Он настолько убедителен, что ваши друзья могут попытаться разобрать вас на части!
f.mechaknight_helm=Прочный шлем, изготовленный вручную кузнецами-гремлинами для защиты блока управления механического рыцаря. С удаленным блоком управления он отлично сидит на рыцаре.
f.mechaknight_suit=Обтягивающий доспех, разработанный для маскировки рыцаря, когда он погружается в глубины Колыбели.
f.medieval_war_helm=Шлем, прочно сконструированный, чтобы выдержать сто лет войны.
f.mega_magnus=Улучшенный Магнус, достаточно мощный, чтобы снести голову монстру. Заряженный выстрел может даже пробить нескольких врагов.
f.mega_tundrus=Улучшенный «Тундурус», который не берет пленных, за исключением тех случаев, когда берет, и тогда тюрьма оказывается сделана из льда. Заряженный выстрел может даже пробить нескольких врагов.
f.member_door=Устанавливает силовой барьер у входа в комнату, который могут пройти только члены гильдии ранга «Член» и выше.
f.mercurial_demo_helm=Демонстрационный шлем, созданный на основе технологии гремлинов. Он предназначен для бомбардировщиков, желающих повысить скорость, увеличить мощность и значительно снизить вероятность гибели от поражения электрическим током... то есть, пожалуй, для всех бомбардировщиков.
f.mercurial_demo_suit=Демо-костюм, созданный с использованием технологии гремлинов. Он предназначен для бомбардировщиков, которые хотят увеличить скорость, получить больше мощности и значительно снизить вероятность гибели от поражения электрическим током... то есть, вероятно, для всех бомбардировщиков.
f.mercurial_helm=Великолепный серебряный шлем, который позволит вам двигаться так же быстро, как вода, хотя, возможно, не так быстро *сквозь* нее.
f.mercurial_mail=Превосходный комплект серебряных доспехов, который придаст вам бодрости, одновременно защищая от ударов током.
f.metal_sonic_mask=Зловещая маска, созданная гением механики, чьи способности, как говорят, могут соперничать даже с величайшими гремлинскими мудрецами-механиками.
f.metal_sonic_suit=Тщательно сконструированный доспех, который, как говорят, оснащен сверхмощным блоком V. Max Overdrive.
f.meteor_mote=Небольшой кусочек редкого материала, который, как говорят, упал с неба. Гремлины обычно используют его при создании источников энергии.
f.mighty_cannon=Пистолет, созданный путем алхимической переработки панциря тортодрона. Во время его использования можно почувствовать нестабильную энергию внутри, которая только и ждет, чтобы быть высвобожденной.
f.mighty_cobalt_armor=Усовершенствованный комплект доспехов «Спирального рыцаря», искусно изготовленный с использованием недавно расшифрованной технологии «Часовых механизмов».
f.mighty_cobalt_helm=Усовершенствованный шлем «Спирального рыцаря», выкованный из редкого сплава лунного камня и люминита.
f.mighty_defender=Усовершенствованный щит «Спирального рыцаря», укреплённый для боя и украшенный изящным тиснением, чтобы потом рассказывать об этом.
f.mighty_great_cleaver=Специально изготовленный сударуска, разработанный Бискотти, шеф-поваром «Скайларка». Хотя она клянется, что использует его только для приготовления пищи, нельзя не подумать, что немало монстров также встретились с ним на разделочной доске.
f.mighty_shell=Щит, созданный с помощью алхимии из панциря тортодрона. Держа его в руках, можно почувствовать энергию ярости, которая только и ждет, чтобы вырваться наружу.
f.mining_hat=Прочный старинный шлем, когда-то использовавшийся для добычи драгоценных минералов. Он обеспечивает немного большую защиту, чем шлем «Спираль».
f.miracle_cloak=Чудесный плащ, который, как говорят, дарует владельцу одно чудо, когда тот в этом больше всего нуждается.
f.miracle_hood=Чудесная маска, которая, как говорят, дарует владельцу одно чудо, когда тот в этом больше всего нуждается.  На практике она, скорее всего, спасет вам жизнь гораздо чаще.
f.miracloth=Чудесный кусок невероятно мягкой ткани.
f.misplaced_promissory_note=Старый документ, содержащий обещание выплатить определенную сумму в давно минувшую дату. Даёт обычную защиту и повышенную защиту при сниженном здоровье.
f.mod_calibrator=Это сложное устройство было специально создано для калибровки модов и не следует путать его с модом «Calibrator», который модифицирует калибраторы. Это распространённая ошибка.
f.monster_bone=Целая кость от ныне покойного зверя.
f.moonstone=Легендарный минерал ярко-голубого цвета, который, как говорят, содержит знания и истоки всех миров.
f.moonstone_deposit_1=Небольшое месторождение минералов, которое даст одну единицу лунного камня.
f.moonstone_deposit_2=Месторождение минералов приличных размеров, которое даст несколько единиц лунного камня.
f.moonstone_deposit_3=Большой кусок минералов, из которого можно добыть огромное количество лунного камня.
f.moonstone_deposit_4=Главная жила металлосодержащих минералов, из которой можно добыть огромное количество лунного камня.
f.moonstone_shard=Осколок лунного камня, слишком маленький для использования в качестве источника энергии для ворот, но очень полезный в алхимии.
f.mug_misery=Проклятая питьевая посуда, которую может использовать только по-настоящему злобная душа. Говорят, что те, кто владеет ею, приносят тяжёлые несчастья окружающим.
f.nameless_hat=Безымянная шляпа, которую носил безымянный легендарный герой.
f.nameless_poncho=Безымянное пончо, которое носил безымянный легендарный герой.
f.needle_shot=Автомат, модифицированный для стрельбы проникающими болтами с пугающей скоростью.
f.nefarious_hood=Капюшон, который, как говорят, изготовил злобный имп. Парящая руна непременно скроет вас во время тайных операций.
f.nefarious_raiment=Одежда, которую, как говорят, изготовил злобный имп. Эфирные пластины защитят вас от жестоких нападений, окутывая вас тьмой.
f.nether_cannon=Пистолет, созданный из панциря заражённого тортодрона. Когда он обрушивается на ваших врагов, на ветру слышен мучительный вопль ярости.
f.nether_shell=Щит, созданный из панциря заражённого тортодрона. Когда этот щит пробивает ваших врагов, на ветру слышен мучительный вопль ярости.
f.neutralizer=Вы удивитесь, сколько практических применений можно найти у двух веществ, которые, соединившись, буквально не оставляют после себя ничего. Пули «Нейтрализатора» окутывают врага энергетическим полем, которое взрывается после получения урона.
f.night_cap_pith=Удобная шапка для рыцарей, которую можно носить ночью. Гарантирует владельцу крепкий и восстанавливающий сон.
f.night_cap_round=Удобная шапка для рыцарей, которую можно носить ночью. Гарантирует владельцу несколько дополнительных часов отдыха.
f.night_cap_sallet=Удобная шапка для рыцарей, которую можно носить ночью. Гарантирует владельцу ясные сны, помогающие справиться с кошмарами.
f.night_cap_tailed=Удобная шапка для рыцарей на ночь. Гарантирует владельцу спокойные сны всю ночь.
f.nightblade=Короткий клинок, пропитанный эссенцией Подземного мира.
f.nightmare_mane=Пальто из грубой шерсти, снятой со Снарболакса. Каждая волосинка кажется скрученной и потрепанной, словно в ней все еще течет жизнь.
f.nightshade=Опасная трава, вредная для большинства зверей, но вкусная для множества ядовитых существ.
f.nitronome=Усовершенствованный взрывчатый снаряд, выдаваемый только самым элитным гранатометчикам Спиральных Рыцарей. Он изготовлен из синтетического вещества, которое зловеще тикает даже в невооруженном состоянии.
f.no_door=Удаляет любую установленную дверь и оставляет комнату открытой для входа любого.
f.nodeslime_armor=Пестрая защитная мантия, которую носят горячо почитаемые победители.
f.nodeslime_helm=Угрожающая маска злобы, изготовленная из уничтоженной зловещей слизи.
f.nodeslime_shield=Эта обветшалая, шаткая стена способна выдержать сильнейшие удары, если ею владеют воины с непоколебимой волей.
f.nodeslime_sword=Этот закаленный, способный разрушать все на своем пути меч обрушивает ярость на измученных врагов.
f.nog_blaster=Одна камера, наполненная взрывоопасной смесью сливочного, богатого холестерином веселья, которая при выстреле наносит мощный удар.
f.nova_driver=Тебе понадобится нечто большее, чем просто желание, чтобы спастись, если ты станешь несчастной мишенью этого всемогущего пистолета, обладающего силой самих звезд.
f.obsidian_carbine=Смертоносное оружие, изготовленное из обсидиановых обелисков, найденных в царстве Апокреи. При каждом выстреле слышен слабый шепот, который, как полагают, является истинным именем цели.
f.obsidian_crusher=Странная бомба, изготовленная из обсидиановых обелисков, найденных в царстве Апокреи. Несмотря на то, что это бомба, некоторых тянет взять её в руки и «разгадать», как будто это какая-то головоломка.
f.obsidian_edge=Зловещий меч, изготовленный из обсидиановых обелисков, найденных в царстве Апокреи. Просто держа его в руках, ты почему-то чувствуешь себя виновным в неизвестном преступлении.
f.obsidian_hood_of_devotion=«Окутай себя моим объятием и поддайся моей бесконечной любви. Пусть твое дыхание уносится от тебя, как дым свечи, погружая тебя во все более глубокий сон».
f.obsidian_hood_of_influence=«Говори единственным, истинным голосом, и они будут слушать. Тихо, как шепот ребенка, и громогласно, как смерть этого мира».
f.obsidian_hood_of_rituals=„С большим мастерством и нежной заботой, с вечным сердцем и чистым разумом\: заточи камень, укрепи цепь, приветствуй ночь, испий Чашу Королей.“
f.obsidian_hood_of_sight='Через мои глаза ты увидишь путь к вечности. Чист мой взгляд, свободный от лжи реальности.'
f.obsidian_mantle_of_devotion=„Окутай себя моим объятием и поддайся моей бесконечной любви. Пусть твое дыхание уносится от тебя, как дым свечи, погружая тебя во все более глубокий сон.“
f.obsidian_mantle_of_influence='Говори единственным, истинным голосом, и они будут слушать. Тихо, как шепот ребенка, и громогласно, как смерть этого мира.'
f.obsidian_mantle_of_rituals=„С большим мастерством и нежной заботой, с вечным сердцем и умом, столь чистым\: заточи камень, укрепи цепь, приветствуй ночь, испий Чашу Королей.“
f.obsidian_mantle_of_sight='Через мои глаза ты увидишь путь к вечности. Чист мой взор, свободный от лжи реальности.'
f.obsidian_obelisk=Смертельно-черная стела из неестественного камня из царства Апокреи. Когда вы смотрите на нее, камень кажется извивающимся и пульсирующим вечной энергией, которая одновременно манит и пугает самым гротескным образом.
f.obsidian_shard=Угольно-черный осколок неестественного камня. Держа его в руках, голова наполняется образами далекого берега, где волны разбиваются о скалы, которые, кажется, корчатся в холоде воды.
f.ocarina_slime=Призовите куб-компаньона, чтобы завершить свое завоевание.
f.officer_door=Устанавливает силовой барьер у входа в комнату, который могут пройти только члены гильдии в звании «Офицер» и выше.
f.omega_shell=Щит, созданный из панциря Тортомеги. Из-за огромного веса этого мощного щита он подходит только самым сильным воинам.
f.omega_tortofist=Пистолет, наполненный безграничной яростью Тортодрона. Вооружившись им, вы сможете обрушить на своих врагов энергию целого легиона Тортодронов.
f.omegaward=Пульсирующие элементальные пластины этого щита мгновенно реагируют на неблагоприятные погодные условия, защищая вас даже от самой сильной жары или холода.
f.onesie=Один размер подходит всем. Можно стирать в стиральной машине на интенсивном цикле. Сушить только на воздухе.
f.overcharged_mixmaster=Промышленный ручной миксер, который обязательно взболтает ситуацию.
f.owlite_feather=Небольшое перо, выщипанное у оулайта — мифической расы величественных волшебных птиц.
f.owlite_mask=Маска ученого-оулита. Каты из Муркрофта с уверенностью заверили нас, что эта реконструкция соответствует их «гротескному и оперенному облику».
f.owlite_robe=Костюм, воссоздающий изысканные одеяния оулитов, созданный на основе последних археологических находок.
f.owlite_shield=Деревянный щит с вырезанным на нем грубым изображением давно исчезнувшего оулита.
f.owlite_wand=Говорят, что палочка выбирает волшебника, так что не позволяйте этой увидеть вашего милого друга.
f.padded_armor=Свободный комплект легких доспехов, который обычно носят стрелки.
f.padded_cap=Легкий шлем универсального размера, который обычно носят стрелки.
f.padded_demo_helm=Улучшенный шлем для бомбардировщиков, подбитый мягкой, стимулирующей набивкой.
f.padded_demo_suit=Улучшенный костюм для бомбардировщиков, подбитый мягкой, стимулирующей набивкой.
f.padded_hunting_cap=Улучшенный шлем для охотников, подбитый мягкой, стимулирующей набивкой.
f.padded_hunting_coat=Улучшенное пальто для охотников, подбитое мягкой, стимулирующей набивкой.
f.pale_cool=Железно-зеленый
f.pale_neutral=Железно-серый
f.pale_warm=Железно-оранжевый
f.paper_mask=Простая бумажная {0} маска, изготовленная в честь Праздника Тёмного Урожая. Она сделана некачественно и со временем разваливается.
f.pathfinder_armor=Удобный комплект доспехов для прокладывания новых путей и защиты от укусов голодных монстров в дикой местности.
f.pathfinder_helm=Шлем, удобный для прокладывания новых путей и защиты от укусов голодных монстров в дикой местности.
f.pepperbox=Автомат, модифицированный для стрельбы высокотемпературными пулями, способными охватить врагов.
f.peppermint_repeater=Этот праздничный ручной пистолет — идеальное оружие, чтобы обсыпать ваших противников горячим свинцом праздничного веселья.
f.perfect_snowball=Ледяной снежок почти мифической совершенности. Хотя он и просится, чтобы его бросили прямо в чью-нибудь голову, лучше всего использовать его в алхимии.
f.permafroster=Технические рыцари пока не уверены, размораживаются ли цели этого пистолета глубокой заморозки вообще. Пока что — «нет». Выстрелы из Permafroster становятся мощнее по мере того, как летят дальше.
f.perplexing_element=Редкий металл, добытый из разбитой горы в глубине королевства Апокреа. Под микроскопом он демонстрирует некую невозможную геометрию. Возможно, более тщательное изучение, свободное от отвлекающих факторов мира, раскроет его секреты.
f.personal_color=После использования этот предмет навсегда изменит личный цвет вашего рыцаря на указанный цвет.
f.personal_eye=После использования этот предмет навсегда изменит форму глаз вашего рыцаря на указанную.
f.personal_height=После использования этот предмет навсегда изменит рост вашего рыцаря на указанный.
f.phantamos=Мощный пистолет, наполненный темной энергией. Фантамос — одно из самых последних пополнений арсенала Рыцарей Спирали, так как для удержания теневой энергии такой силы потребовались обширные исследования.
f.phial_phear=Стеклянная пробирка, содержащая небольшую дозу феария — странного химического вещества, которое, как говорят, вызывает панику у любого, кто даже слегка почувствует его запах.
f.philoso_feather=Большое серое перо, выщипанное у величайшего из магов Оулайта.
f.pierce_blaster=Усовершенствованный бластер, модифицированный для стрельбы проникающими снарядами.
f.pig_armor=Привлеките к себе все внимание в этом кожаном костюме. Его прочная защита может однажды спасти вам шкуру.
f.pig_helm=Свирепый боевой шлем, внутри пахнущий дымком яблоневого дерева.
f.piggy_banker=Небольшой взрывоопасный банк, который наверняка прожжет дыру в карманах ваших врагов.
f.pile_o_pillows=Корзина свежевыстиранных подушек, готовых к тому, чтобы их швырять в ваших друзей!
f.pith_helm=Простой, но эффективный шлем, любимый новобранцами Спиральных Рыцарей.
f.plague_essence=Мощная эссенция, оставшаяся после гибели существа от особо гнилостной болезни.
f.plague_needle=Рыцари расходятся во мнениях: пронзают ли болты этого оружия сначала, а потом отравляют, или сначала отравляют, а потом пронзают. Для несчастной цели это различие не имеет никакого значения.
f.plasma_capacitor=Благодаря установке усовершенствованного источника энергии Spiral эта бомба обладает поразительно большим радиусом взрыва.
f.plasma_cell=Высокотехнологичный плазменный источник, способный ослепить кого угодно наукой.
f.plasmatech_demo_suit=Демонстрационный костюм, заказанный королем Крогмо в честь запуска Blast Network. Это идеальная одежда как для торжественных взрывов, так и для более непринужденных.
f.plate_helm=Тяжёлый шлем, подходящий для интенсивных боёв.
f.plate_mail=Звенящая, лязгающая, громоздкая броня, способная выдержать сильные удары.
f.plate_shield=Тяжёлый железный щит, способный отражать удары, которые в противном случае ошеломили бы вас.
f.plated_pathfinder_armor=Упрочненный комплект доспехов, созданный для защиты даже от самых кровожадных монстров во время исследования неизвестного.
f.plated_pathfinder_helm=Упрочненный шлем, созданный для защиты отважных исследователей во время исследования неизвестного.
f.plated_sentinel_armor=Доспех, усиленный гремлинской брони, для защиты от целого ряда опасных элементов.
f.plated_sentinel_helm=Шлем, укреплённый бронированными пластинами из гремлинской стали, защищающий от целого ряда опасных факторов.
f.plated_shade_armor=Доспехи из демонической ткани, переплетённой тёмной материей, позволяющие скрыть своего владельца, когда тот крадётся в замаскированных углах.
f.plated_shade_helm=Шлем из демонической ткани, переплетенной с темной материей, чтобы скрывать своего владельца, пока тот крадется в замаскированных углах.
f.poison_barrier=Окружает вас токсичными шарами, способными выводить из строя врагов
f.polar_day_warden_coat=Утепленное пальто, которое согреет рыцаря при столкновении с лютыми полярными ветрами. Броня с меховой подкладкой делает его идеальным для многочасового дневного дежурства.
f.polar_day_warden_hood=Утепленный капюшон, который согреет рыцаря при столкновении с лютыми полярными ветрами. Маска, полностью закрывающая лицо, делает его идеальным для многочасового дневного дежурства.
f.polar_day_wolf_coat=Теплое пальто, любимое рыцарями, дислоцированными в полярных регионах. Толстая меховая подкладка необходима во время их бесконечных дневных патрулей.
f.polar_day_wolf_hood=Теплый капюшон, любимый рыцарями, дислоцированными в полярных регионах. Толстая меховая подкладка необходима во время их бесконечных дневных патрулей.
f.polar_night_warden_coat=Утепленное пальто, которое согреет рыцаря при столкновении с сильными полярными ветрами. Броня с меховой подкладкой делает его идеальным для многочасовой ночной вахты.
f.polar_night_warden_hood=Утепленный капюшон, который согреет рыцаря в условиях суровых полярных ветров. Маска, полностью закрывающая лицо, делает его идеальным выбором для многочасового ночного дежурства.
f.polar_night_wolf_coat=Теплое пальто, которое предпочитают рыцари, несущие службу в полярных регионах. Толстая меховая подкладка необходима во время их бесконечных ночных патрулей.
f.polar_night_wolf_hood=Теплый капюшон, любимый рыцарями, дислоцированными в полярных регионах. Толстая меховая подкладка необходима во время их бесконечных ночных патрулей.
f.polar_twilight_warden_coat=Утепленное пальто, которое согреет рыцаря при столкновении с лютыми полярными ветрами. Броня с меховой подкладкой делает его идеальным для многочасового наблюдения за горизонтом во время полярных сумерек.
f.polar_twilight_warden_hood=Утепленный капюшон, который согреет рыцаря при столкновении с лютыми полярными ветрами. Маска, полностью закрывающая лицо, делает его идеальным для наблюдения за горизонтом во время полярных сумерек.
f.polar_twilight_wolf_coat=Теплое пальто, которое предпочитают рыцари, дислоцированные в полярных регионах. Говорят, что полярные сумерки — это удивительное зрелище.
f.polar_twilight_wolf_hood=Теплый капюшон, любимый рыцарями, дислоцированными в полярных регионах. Говорят, что полярные сумерки — это удивительное зрелище.
f.polaris=Говорят, что взрывы, вызванные этим звездным оружием, настолько яркие, что вы всегда сможете найти дорогу в темноте. Выстрелы Polaris становятся мощнее по мере того, как летят дальше.
f.pollinator=Редкий усовершенствованный пистолет, созданный биотехнологами на основе захваченной технологии гремлинов. Он стреляет частицами пыльцы, которые прилипают к противнику, нанося ему взрывной урон и вызывая насморк.
f.pollinator_plate=Создан в стиле незаметных героев улья. Модный, функциональный и немного пушистый.
f.potocrowns=Неудачное находка для ваших врагов: взрывается, нанося болезненный удар.
f.powderkeg=Осторожно, эта штука может взорваться, как метафорическая бочка с порохом.
f.power_cell=Небольшое устройство, используемое для питания сложных машин.
f.power_dust=Часть специальной пищи, которую любят боевые спрайты, примкнувшие к силам, дающим им грубую силу на поле боя.
f.power_mitt=Необходимая вещь на любой кухне. Удобная посадка и поверхность из плотного серебряного плетения отлично подходят для работы с высокими температурами. Теперь вы готовите с мощью!
f.power_mote=Небольшой кусочек особой пищи, которую предпочитают боевые духи, примкнувшие к силам, дарующим им грубую силу на поле боя.
f.power_orb=Блестящий шар особой пищи, которую предпочитают боевые духи, примкнувшие к силам, дарующим им грубую силу на поле боя.
f.power_star=Идеальная кристаллизация особой пищи, которую любят боевые духи, примкнувшие к силам, дарующим им грубую силу на поле боя.
f.power_stone=Концентрированный кусок особой пищи, которую любят боевые духи, примкнувшие к силам, дарующим им грубую силу на поле боя.
f.primal_buster=Пистолет, созданный путем алхимии из панциря тортодрона. Во время его использования можно почувствовать природную энергию, ждущую своего высвобождения.
f.primal_ore=Необыкновенный металл, проникнутый диким духом природы.
f.primal_shell=Щит, созданный с помощью алхимии из панциря тортодрона. Пластины, использованные при его изготовлении, обеспечивают некоторую защиту от стихий огня и мороза.
f.prisma_driver=Высокотехнологичный алхимический пистолет, стреляющий мощными призматическими пулями, которые при ударе разлетаются на множество частей.
f.prismatech_alchemer=Алхимический пистолет, стреляющий пулями из заряженной фотонами жидкости, которые распадаются при ударе.
f.prismatech_alchemer_mkii=Усовершенствованный Alchemer, стреляющий зарядами фотонной жидкости с увеличенной скорострельностью.
f.prismatic_frosted_helm=Вкусный шлем из торта, созданный во время празднования годовщины Spiral Knights. Он покрыт странной призматической глазурью, разработанной в тестовой кухне Бискотти, которая предотвращает его порчу.  Пожалуйста, не ешьте его.
f.prize_box=Содержит уникальные костюмы и аксессуары {0}. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_aerodynamic=Содержит уникальные аэродинамические костюмы и аксессуары. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_almire_furniture=Содержит различные уникальные предметы мебели в стиле Альмира. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_ancient=Содержит различные уникальные предметы, созданные в древней, завуалированной родине тортдронов. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_autumn=Содержит различные уникальные костюмы и аксессуары в осеннем стиле. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_blazing=Содержит различные уникальные костюмы и аксессуары в стиле «Пламенный». Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_blooming=Содержит различные уникальные костюмы и аксессуары, посвященные расцветающей весне.  Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_budding=Содержит различные уникальные костюмы и аксессуары, посвященные расцветающей весне.  Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_c=Полная коллекция костюмов и аксессуаров {0}. Будет выбран один предмет случайным образом.  Для открытия ключ не требуется.
f.prize_box_cavalry=Содержит различные уникальные аксессуары и предметы в честь Года Лошади!  Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_chess=Содержит один случайно выбранный поднимаемый предмет мебели «Шахматная мини-статуя».  Для открытия ключ не требуется.
f.prize_box_colossal=Содержит различные уникальные костюмы и аксессуары в честь Года Лошади!  Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_companion=Содержит различные предметы для вашего спрайта и шанс получить редкие предметы. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_construct=Содержит различные уникальные костюмы и предметы в стиле «Конструкт». Предметы выбираются случайным образом. Для открытия ключ не требуется.
f.prize_box_cozy=Содержит различные уникальные костюмы и аксессуары в стиле «Уютный». Предметы выбираются случайным образом. Для открытия ключ не требуется.
f.prize_box_dangerous=Содержит различные уникальные предметы, используемые элитными разведчиками Десны. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_dazed=Содержит различные уникальные костюмы и аксессуары в стиле «Ошеломленный». Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_decoration=Содержит различные праздничные украшения для вашего Зала Гильдии, которые помогут создать атмосферу зимнего праздника.  Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_disguise=Содержит различные уникальные костюмы и аксессуары в стиле «Маскировка». Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_electric=Содержит различные уникальные костюмы и аксессуары в стиле «Электрик». Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_equinox=Содержит различные уникальные костюмы и аксессуары, посвященные равноденствию в Cradle!  Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_extraordinary=Содержит различные уникальные костюмы и предметы, которые обязательно придадут вам энергии и вернут бодрость! Предметы выбираются случайным образом. Для открытия ключ не требуется.
f.prize_box_forge=Содержит ценные раритеты и другие разнообразные предметы. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_frenzy=Содержит различные уникальные костюмы и аксессуары, созданные из грома и молнии. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_frosty=Содержит различные уникальные костюмы и аксессуары в стиле «Морозный». Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_gobble=Содержит различные праздничные «Гоббл-Снайпы» для вашего Зала Гильдии, включая очень большие «Пухлые Гоббл-Снайпы». Предметы выбираются случайным образом. Для открытия ключ не требуется.
f.prize_box_gourmet=Содержит различные уникальные костюмы и оружие, используемое боевыми поварами. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_gremlin=Содержит различные уникальные костюмы и предметы, изготовленные гремлинами. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_grey=Содержит различные уникальные костюмы и аксессуары в стиле «Серый». Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_guildhall=Содержит случайные предметы интерьера.  Для открытия ключ не требуется.
f.prize_box_hazardous=Содержит различные уникальные предметы, используемые элитными «Алыми разведчиками» Рендона. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_hunter=Содержит различные уникальные костюмы и аксессуары в стиле «Охотник». Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_lucky=Содержит различные счастливые и редкие предметы. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_moorcroft=Содержит различные уникальные предметы интерьера, посвященные поместью Муркрофт. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_nemesis=Содержит различные уникальные предметы, символизирующие добро и зло. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_obsidian=Содержит различные уникальные и ужасающие предметы, найденные в царстве Апокреи. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_owlite=Содержит уникальные костюмы и аксессуары Owlite, воссозданные на основе последних археологических находок. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_plunge=Содержит различные уникальные костюмы и предметы, посвященные теплым летним дням.  Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_polar=Содержит различные уникальные костюмы и аксессуары, популярные в полярных регионах. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_rage=Содержит различные уникальные костюмы и аксессуары, созданные из грома и молнии. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_raiders=Содержит один из различных уникальных предметов и аксессуаров для рейдеров. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_rooster=Содержит различные уникальные предметы в честь года Петуха! Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_rose_regalia=Содержит различные уникальные костюмы и аксессуары из серии «Роза Регалия». Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_running_wild=Содержит различные уникальные костюмы и аксессуары в стиле собак. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_slime=Содержит различные уникальные костюмы и предметы, дополняющие серию снаряжения Jelly. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_slumber=Содержит различные уникальные костюмы и аксессуары в стиле «Слэмбер». Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_solstice=Содержит различные уникальные предметы, посвященные солнцестоянию! Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_spiralhorn=Содержит различные уникальные аксессуары и предметы, посвященные Году Овна!  Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_spiraltail=Содержит различные уникальные аксессуары и предметы, посвященные Году Обезьяны!  Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_splash=Содержит различные уникальные костюмы и предметы в честь теплых летних дней.  Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_spritely=Содержит различные уникальные аксессуары и новые цвета спрайтов в честь боевых спрайтов. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_stormy=Содержит различные уникальные костюмы и аксессуары, созданные из грома и молнии. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_stranger=Содержит различные уникальные костюмы и аксессуары в стиле «Странник». Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_surge=Содержит различные уникальные костюмы и аксессуары в стиле «Волна». Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_surprise=Содержит одну случайно выбранную сундучку с призами в честь годовщины Ордена Спирали на сервере Cradle. Для открытия ключ не требуется.
f.prize_box_surprise_2=Содержит две случайно выбранные сундучки с призами в честь годовщины Ордена Спирали на сервере Cradle. Для открытия ключ не требуется.
f.prize_box_surprise_3=Содержит три случайно выбранных сундука с призами в честь годовщины Ордена Спирали на Cradle.  Для открытия ключ не требуется.
f.prize_box_surprise_4=Содержит четыре случайно выбранных сундука с призами в честь годовщины Ордена Спирали на Cradle.  Для открытия ключ не требуется.
f.prize_box_vile=Содержит различные уникальные костюмы и аксессуары в стиле Vile. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_volcanic=Содержит различные уникальные костюмы и аксессуары в стиле Volcanic. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.prize_box_winterfest=Содержит различные уникальные призы Winterfest. Предметы выбираются случайным образом.  Для открытия ключ не требуется.
f.proto_blade=Быстрый, компактный универсальный клинок, выдаваемый всем новобранцам Spiral Knight.
f.proto_bomb=Небольшая бомба, используемая новобранцами Spiral Knight для освоения искусства взрывать предметы.
f.proto_duelist=Шестизарядное огнестрельное оружие, предпочитаемое снайперами среди новобранцев «Спиральных рыцарей».
f.proto_gun=Компактное огнестрельное оружие, выдаваемое всем новобранцам «Спиральных рыцарей».
f.proto_shield=Небольшой щит, выдаваемый всем новобранцам «Спиральных рыцарей».
f.proto_sword=Небольшой меч, выдаваемый всем новобранцам «Спиральных рыцарей».
f.pullover=Идеальный свитер как для вечеринок, так и для опасных приключений.
f.pulsar=Высокотехнологичное оружие Гремлинов, изначально разработанное для элитных отрядов солдат «Железного Когтя». Ударная сила выстрелов из «Пульсара» увеличивается по мере увеличения дальности.
f.pummel_gun=«Панч-ган», специально модифицированный для боевого применения. Отдача от его мощной зарядной атаки печально известна среди новобранцев.
f.pumpkin_bombhead_mask=Маска Бомбхеда с угрожающей гримасой, напоминающей великого, тыквоподобного Короля Панкина.
f.punch_gun=Используемый для взрыва поврежденных десантных капсул, этот инструмент для экстренного спасения отлично подходит и в качестве мощного однозарядного пистолета.
f.punch_n_vise_room=Оживленная комната, где можно обратиться к Панчу и Вайзу, чтобы они расстегнули и переделали ваше снаряжение.
f.punkin_cinnamug=Пенистая смесь тыквы и корицы, которая наверняка обжжет тех, кто не дождется, пока эта кружка остынет.
f.punkin_pie_pan=Горячий, дымящийся пирог, приготовленный из настоящих тыквенных отростков! Не подходит для потребления рыцарями, пожалуйста, выбросьте у ближайшего друга.
f.punkin_pie_slice=Горячий, дымящийся кусок пирога.
f.punkin_sprout=Небольшая веточка, способная вырасти в огромную тыкву.
f.purring_cap=Странная шапка, сделанная в виде мяуката. Говорят, она дарует владельцу девять жизней.
f.pvp_bomb=Создает взрыв в форме креста, размер которого увеличивается при получении бонусов. Для использования не требуется зарядка.
f.quicksilver_helm=Превосходный шлем, изготовленный из того, что когда-то было Quicksilver.
f.quicksilver_mail=Превосходный комплект кольчуги, изготовленный из того, что когда-то было Quicksilver.
f.quilted_demo_helm=Шлем с уютной подкладкой из роскошного стеганого материала Stay-Alert. Звуки изнутри немного приглушены.
f.quilted_demo_suit=Костюм, уютно подбитый роскошной стеганой тканью Stay-Alert. Пахнет немного потом.
f.quilted_hunting_cap=Гибкий шлем, подбитый роскошной стеганой тканью Stay-Alert. Пахнет животными.
f.quilted_hunting_coat=Гибкое пальто, подбитое роскошной стеганой тканью Stay-Alert. Пахнет затхлостью.
f.radiant_crystal=Редкое кристаллизованное скопление тепла, используемое для создания оружия и снаряжения более высоких уровней. Тепло внутри него дикое и загадочное, сияющее ярче любого естественного огня.
f.radiant_pulsar=Ультрасовременный пистолет, предназначенный исключительно для лучших и ярчайших представителей Ордена Спирали. Выстрелы из «Пульсара» становятся мощнее по мере увеличения дальности.
f.radiant_silvermail=Улучшенный комплект «Серебряной кольчуги», который, как говорят, ярко сияет даже в самые темные часы.
f.radiant_sun_shards=Цельный кусок заряженного солнечной энергией люминита с взрывным сюрпризом внутри. Девилиты ненавидят сюрпризы.
f.rage_caller=Подарок богов, используемый для призыва луча ярости с небес.
f.rageous_plate_mail=Легендарный комплект доспехов, который, как говорят, наполняет своего владельца яростью титанов.
f.raging_avenger_helm=Шлем, который носят небесные стражи, охраняющие королевство, спрятанное на вершине горы, покрытой магмой.
f.raging_champion_helm=Шлем того, кто бросил вызов богам и разрушил врата небесного королевства.
f.raging_crusader_helm=Шлем, который носят мифические воины, которые, как говорят, вступают в бой, ведомые своей яростью.
f.raging_dragon_helm=Зачарованный шлем, выполненный в образе чудовища, которое, по поверьям, уничтожало мир на своём пути\: его ярость превращалась в магматический дождь, а дыхание — в тайфун.
f.raging_rider_mantle=Легендарные доспехи, которые, как полагают, носил бог, использовавший ярость, чтобы высекать целые миры из камня.
f.raging_warrior_helm=Шлем, который носил легендарный мастер меча, настолько гневный, что одной лишь своей яростью мог сразить армии, восставшие против него.
f.raider_buckler=Легкий деревянный щит, который блокирует простые атаки и позволяет наносить быстрые контратаки.
f.raider_helm=Незапятнанный шлем налетчика, за исключением нескольких вмятин.
f.raider_tunic=В этом плаще сокровища находятся у вас под рукой.
f.raiders_axe=Богато украшенный, огненный топор, любимый налетчиками за его универсальность.
f.raiders_hammer=Богато украшенный молот, наполненный силой великой бури; он настолько острый, насколько может быть тупое оружие.
f.raiders_sword=Меч с рунами, который превратит вашего врага в куски.
f.raiment=Длинная, струящаяся боевая одежда, которую лучше всего дополнить парой ангельских крыльев.
f.ranger_signal_flare=Сигнальная ракета, которая сигнализирует ближайшему разведчику-рейнджеру о необходимости оказать огневую поддержку.
f.raptor=Древний пистолет, наполненный заклинаниями, предназначенными для уничтожения злобных существ Подземного мира. Как и его тезка, его пули летят быстро и бьют со смертельной силой.
f.razor_ribbon=Помните\: при обращении с подарочными коробками Гринчлина всегда надевайте перчатки из пластинчатой брони.
f.reaper_rib=Кость, окрашенная в черный цвет злобой ее прежнего владельца.
f.recover_accessory=Билеты на аксессуары можно обменять у «Аксессуаризатора» на базаре «Хейвен».
f.red_saber=Сабля цвета пылающего солнца, которую вручают рыцарям, проявившим образцовую храбрость в прошлых сражениях.
f.red_shard=Осколок кримзонита, слишком маленький для использования в качестве источника энергии для ворот, но очень полезный в алхимии.
f.redwood=Крепкий кусок качественной необработанной древесины. Обычно используется для изготовления шкафов.
f.rename_guild=Позволяет выбрать новое название для вашей гильдии. Этот предмет может использовать только мастер гильдии, и он уничтожается после использования.
f.rename_knight=Позволяет выбрать новое имя для вашего рыцаря. Этот предмет уничтожается после использования.
f.replica_mask=Пластиковая маска {0}, изготовленная в честь Праздника Тёмного урожая. Она сделана некачественно и со временем разваливается.
f.reset_star=Особый спрайт-продукт, который сбрасывает начисленные очки навыков и отменяет выбор любого ультимативного навыка.
f.riftlocker=Смертоносный пистолет, который, как говорят, способен пробить тяжелые доспехи одним выстрелом. Это оружие сыграло решающую роль во время осады Исоры, пробивая боевые машины Мораи.
f.rigadoon=Ошеломляющая сабля, которая заставит вашего противника потерять бдительность.
f.robo_wrecker=Инструмент, похожий на гаечный ключ, который, как полагают, был разработан гремлинами. Хотя его происхождение остается загадкой, его способность разрушать конструкции хорошо задокументирована.
f.rock_jelly_helm=Прочный головной убор, сшитый из зубчатой желеобразной массы.
f.rock_jelly_mail=Эта желеобразная броня сочетает в себе прочность камня и защиту от проникающих ударов, которую обеспечивает липкая слизь. Удивительно, что вам удалось победить то желе, из которого она сделана.
f.rock_jelly_shield=Изготовленный из самых прочных слизистых экземпляров, он также служит источником калорий на случай чрезвычайной ситуации для застрявших рыцарей.
f.rock_salt=Небольшое количество минерала Часового механизма, в который не вложено абсолютно ничего. Он жадно впитывает близлежащие эссенции и ароматы, что делает его незаменимым ингредиентом в кулинарии и проклятием всех желе.
f.rock_salt_bomb=Осколочная бомба, состоящая из небольшого взрывчатого вещества, заключенного в каменную соль. Не рекомендуется использовать на кухне.
f.rocket_hammer_1=Разработанное самим Военачальником Сирусом, это злобное оружие гремлинов оснащено ракетным двигателем, способным выстреливать владельца вперед с мощным ударом молота.  Эта конкретная модель является прототипом.
f.rocket_hammer_2=Разработанное самим Военачальником Сирусом, это злобное оружие гремлинов оснащено ракетным двигателем, способным выстреливать владельца вперед с мощным ударом молота.  Эта конкретная модель представляет собой более стабильную версию, которая взрывала подопытных гремлинов гораздо реже, чем прототип.
f.rocket_hammer_3=Разработанное самим Военачальником Сирусом, это злобное оружие гремлинов оснащено ракетным двигателем, способным выстреливать владельца вперед с помощью мощного удара молотом.  Эта окончательная, усовершенствованная конструкция поистине достойна Великого Арсенала великого Военачальника Сируса.
f.rocket_sprocket=Прочная звездочка, используемая в механизмах для запуска снарядов.
f.rocky_core=Вкусное мармеладное лакомство с непробиваемой каменной оболочкой. Немало рыцарей лишилось зубов, пытаясь добраться до липкой сердцевины.
f.roly_poly=Обычный броненосчик.
f.ronin_gasa=Потерянная соломенная шапка, когда-то принадлежавшая безхозному мастеру меча.
f.round_helm=Изящный шлем, который только и ждет, чтобы его украсили.
f.royal_core=Пахнущий сладким запахом комок слизи, собранный с особо благородного экземпляра слизи.
f.royal_jelly_crown=Суровые королевские регалии, недавно воспроизведенные из величественных смолистых останков.
f.royal_jelly_mail=Жестоко вязкий комплект доспехов, кропотливо изготовленный из самых благородных экземпляров дрожащего слизи.
f.royal_jelly_shield=Лучшая защита для претендентов на слизистый трон.
f.royal_skewer=Зазубренный, острый как бритва шип от одного из самых могущественных слизи на Колыбели. После извлечения из слизи он становится хрупким и со временем превращается в пыль.
f.rugged_robo_wrecker=Улучшенный робот-разрушитель, который помог множеству конструкций превратиться в дымящиеся кучи металлолома.
f.rust_cool=Медно-синий
f.rust_neutral=Медно-угольный
f.rust_warm=Медно-желтый
f.sacred_ghost_armor=Призрачный доспех для тех, кто охотится на призраков.
f.sacred_ghost_helm=Шлем-призрак для тех, кто охотится на призраков.
f.sacred_guerrilla_armor=Прочный доспех для тех, кто хочет сразить нескольких чудовищ.
f.sacred_guerrilla_helm=Шлем для тех, кто хочет сразить нескольких чудовищ.
f.sacred_hazard_armor=Прочная броня для тех, кто хочет расправиться со слизнями.
f.sacred_hazard_helm=Прочный шлем для тех, кто охотится на слизней.
f.sacred_hex_armor=Призрачная броня для тех, кто нацелен на адских существ.
f.sacred_hex_helm=Призрачный шлем для тех, кто стремится к адскому.
f.sacred_keeper_armor=Блакитный доспех для тех, кто хочет разгромить роботов.
f.sacred_keeper_helm=Блакитный шлем для тех, кто хочет разгромить роботов.
f.sacred_pathfinder_armor=Усиленный доспех с двойной подкладкой, который наверняка остановит даже самых опасных врагов.
f.sacred_pathfinder_helm=Усиленный шлем, который наверняка остановит даже самых опасных врагов.
f.sacred_sentinel_armor=Сияющий защитный доспех с двойным плетением, защищающий от непредсказуемых стихий.
f.sacred_sentinel_helm=Сияющий защитный доспех с двойной тканью, защищающий от непредсказуемых стихий.
f.sacred_shade_armor=Темный доспех, созданный, чтобы пережить всё, что может выскользнуть из теней.
f.sacred_shade_helm=Шлем, созданный, чтобы пережить всё, что может выскользнуть из теней.
f.sacred_wraith_armor=Прочный доспех для тех, кто охотится на гремлинов.
f.sacred_wraith_helm=Отточенный шлем для тех, кто охотится на гремлинов.
f.salamander_mask=Маска, изготовленная из шкуры саламандры.
f.salamander_suit=Костюм, изготовленный из шкуры саламандры. Он наделяет владельца естественной устойчивостью этого зверя к огню.
f.sallet=Обтекаемый шлем, любимый бойцами на передовой.
f.savage_tortofist=Пистолет, созданный путем алхимии из закаленной панцирной оболочки тортодрона. Во время боя вы почувствуете первобытную энергию разъяренной стаи росомах, ждущих своего часа.
f.savage_tortoise=Щит, созданный путем алхимии из закаленной панцирной оболочки тортодрона. Даже разъяренной стае росомах будет трудно пробить его укрепленные пластины.
f.scalding_hot_cocoa=Обжигающий всплеск сладкого уничтожения ждет любого врага, который набросится на эту кружку, не дождавшись, пока она остынет.
f.scale_helm=Шлем, изготовленный из чешуи ползучего чудовища.
f.scale_mail=Сверкающий комплект змеиной чешуи, сплетенный в доспехи.
f.scale_shield=Очень стильный щит, изготовленный из чешуи ящерицы. Хотя в целом он довольно слаб, плотная сетка чешуи делает его весьма устойчивым к проникающему урону.
f.scarlet_shield=Щит, найденный в Алой крепости. Он дает владельцу дополнительное здоровье. Те, кто носит его, говорят, что иногда слышат слабые удары сердца, доносящиеся изнутри.
f.scary_skelly_mask=Улучшенная маска скелета, пропитанная элементальной сущностью страха. При ношении у вас волосы на затылке встают дыбом.
f.scary_skelly_shield=Небольшой жуткий щит, защищающий вас от теней.
f.scary_skelly_suit=Улучшенный костюм скелета, пропитанный элементальной сущностью страха. В комплект входят брюки, которые не испугаешь.
f.schemer_scrap=Фрагмент чертежа, который используют гремлины-интриганы для создания своих механических чудовищ. Собрав достаточно таких фрагментов и немного скотча, вы сможете самостоятельно собрать металлическую машину смерти!
f.scintillating_sun_shards=Крупный кусок заряженного солнечной энергией люминита, наполненный мощным взрывчатым веществом. Пиротехническое шоу при взрыве просто потрясающее.
f.scissor_blades=Специально изготовленный клинок Левиафана, разработанный Бешамелем, Мастером Аксессуаров. Хотя эти клинки обычно используются для изготовления стильных украшений для доспехов, говорят, что они достаточно мощны, чтобы рассечь твердую скалу.
f.scrap_metal=Кусок металлолома, который легко можно переделать.
f.scythe=Старый крестьянский инструмент, отложенный на сезон, но этот клинок также отлично подходит для того, чтобы косить врагов.
f.sealed_sword=Загадочный меч с огромным нераскрытым потенциалом. Он гудит, наполненный первозданной силой.
f.searing_edge=Легкое лезвие, которое поджигает врагов при ударе. Технология, предотвращающая возгорание рукояти, более продвинута, чем сам меч.
f.seerus_fragment_1=Разбитый осколок маски, которую когда-то носил Военачальник Сирус, найденный во время осады его Великого Арсенала.
f.seerus_fragment_2=Поврежденный фрагмент маски, которую когда-то носил полководец Сирус, найденный во время осады его Великого Арсенала.
f.seerus_fragment_3=Идеальный фрагмент маски, которую когда-то носил полководец Сирус, найденный во время осады его Великого Арсенала.
f.sentenza=Древний пистолет, выкованный из теневой стали. Говорят, что им владел злой существа, обладавший «ангельскими глазами».
f.sentinel_armor=Доспехи, наделенные способностью отражать различные бедствия, с которыми рыцари могут столкнуться при исполнении служебных обязанностей.
f.sentinel_helm=Шлем, наделенный способностью отражать различные бедствия, с которыми рыцари могут столкнуться при исполнении служебных обязанностей.
f.seraphic_helm=Прекрасная кольчужная шапочка, заставляющая своего владельца сражаться со злом с праведным гневом.
f.seraphic_mail=Прекрасная кольчужная куртка, заставляющая своего владельца сражаться со злом с праведным гневом.
f.seraphynx_pod=Капсула спрайта, содержащая боевого спрайта Seraphynx 1-го уровня. \n\nSeraphynx — это боевой спрайт, воплощающий божественный свет. Его навыки сосредоточены на поддержке рыцарей в бою с помощью защиты и восстановления.
f.serene_armor=Древняя броня, изношенная стихиями. Находясь в этой броне, можно почувствовать отдаленные колебания, вызванные миграцией бесчисленных тортодронов, путешествующих в неизвестные земли.
f.serene_helm=Древний, прочный шлем, покрытый мягким слоем мха.  В прохладном, каменном внутреннем пространстве этого шлема можно услышать слабую и успокаивающую песню, создаваемую шелестом ветров, прилетающих из дальних земель.
f.shade_armor=Доспех, пропитанный темной материей, позволяющий его владельцу стрелять точно и заставать врагов врасплох из тени.
f.shade_helm=Шлем, пропитанный темной материей, позволяющий владельцу застать врагов врасплох, стреляя прямо из тени.
f.shadow_blaster=Усовершенствованный бластер, модифицированный для стрельбы теневыми снарядами.
f.shadow_driver=Высокотехнологичный алхимический пистолет, стреляющий мощными теневыми пулями, которые при ударе разлетаются на части.
f.shadow_dust=Порция специальной пищи, любимой боевыми духами, которые обретают свои силы с помощью запретных темных искусств.
f.shadow_key=Таинственный ключ, открывающий группе доступ в Логова Теней.  Ключ Теней уничтожается после использования.
f.shadow_mote=Небольшой кусочек специальной пищи, которую любят боевые духи, обретающие свои силы с помощью запретных темных искусств.
f.shadow_orb=Блестящий шар из специальной пищи, которую любят боевые духи, обретающие свои силы с помощью запретных темных искусств.
f.shadow_star=Идеальная кристаллизация специальной пищи, которую любят боевые духи, обретающие свои силы с помощью запретных темных искусств.
f.shadow_steel=Необыкновенный металл, пропитанный ползучей тьмой Подземного мира.
f.shadow_stone=Концентрированный кусок особого сырья, любимого боевыми духами, которые черпают свою силу из запретных темных искусств.
f.shadowsun_slicker=Зловещий плащ, который, как говорят, таит в себе огромную силу, питающуюся непрощенными грехами своих владельцев.
f.shadowsun_stetson=Элегантная шляпа для дуэлянтов, предпочитающих сражаться в полночь, а не в полдень.
f.shadowtech_alchemer=Алхимический пистолет, стреляющий пулями из концентрированной тени, которые раскалываются при ударе.
f.shadowtech_alchemer_mkii=Улучшенный Alchemer, стреляющий зарядами тени с увеличенной скоростью.
f.shako=Церемониальная шапка, которую рыцари надевают во время особо престижных мероприятий.
f.shard_bomb=Осколочная бомба, сформированная из небольшого взрывчатого вещества, заключенного в обедненный Кримзонит. Обедненный он или нет, этот гад способен разбрасывать серьезные осколки.
f.sharp_fang=Особенно острый премоляр. Или, может, это клык?
f.shining_crystal=Редкое кристаллическое скопление тепла, используемое для создания оружия и снаряжения высших уровней. Тепло внутри него горит, как звезда, сияющая в ночном небе.
f.shining_ward=Священный щит, защищающий владельца от зла.
f.ship_wheel=Как это вообще может быть хорошим щитом? Откуда он вообще взялся? Осторожно, приятель, задавай такие вопросы — а то тебя могут заставить пройти по доске.
f.shivermist_buster=Изначально Shivermist Buster использовался для мгновенного замораживания скоропортящихся продуктов, но гораздо большее удовольствие доставляет его применение для мгновенного замораживания монстров на месте.
f.shock_barrier=Окружает вас шарами молнии, которые могут наносить врагам электрические разряды.
f.shock_raider_helm=Простой шлем, защищающий владельца как от стихий, так и от врагов.
f.shock_raider_tunic=Этот плащ налетчика отшит антистатическим мехом.
f.shockburst_brandish=Улучшенный Brandish, наполненный элементальной сущностью молнии.
f.shocking_edge=Легкий клинок, способный наносить жертвам болезненные удары током. Молодые рыцари любят размахивать им в праздники.
f.shocking_salt_bomb=Крупный кусок каменной соли, начиненный мощным взрывчатым веществом. В целях питания этот конкретный кусок соли был обогащен опасным количеством электричества. Постойте, что?
f.shogun_helmet=Величественный шлем, который носили воины, давным-давно объединившие землю под знаменем восходящего солнца.
f.shroom_cap=Это не просто трюфель, в этой шляпе, похожей на гриб, ты будешь милым, как пуговица.
f.silent_nightblade=Изготовленный из самых дьявольских материалов, найденных на Крэдле, этот чернильный клинок может взорваться с дьявольской яростью.
f.silver_coil=Электромагнитный механизм, изготовленный из металла с чрезвычайно высокой проводимостью.
f.silver_key=Особый ключ, способный открыть любой сундук.  После использования ключ уничтожается.
f.silver_solstice_ring=Зачарованное кольцо, воплощающее дух солнцестояния. Его сверкающий серебряный блеск сияет ярче всего в зимние месяцы.
f.silvermail=Прочная, но легкая броня для рыцарей, поклявшихся выслеживать и уничтожать нежить, где бы она ни скрывалась.
f.silversix=Загадочная антикварная вещь с блестящей серебряной отделкой; говорят, что эти пистолеты использовали «священники-стрелки» в давно забытые времена.
f.silverweave=Полотно сдержанного цвета, в которое искусно вплетены драгоценные металлы. Оно выглядит со вкусом и роскошно, но при этом надежно защищает.
f.simple_orb=Редкий, заключённый в капсулу элемент, используемый в алхимической трансмутации. В неочищенном виде этот шар можно использовать для создания более мощных предметов.
f.sinful_brew=Ядовитый напиток, любимый всеми демонами. Несмотря на его широкое распространение, он официально запрещён в Подземном мире в качестве маркетингового хода.
f.sinister_skelly_mask=Улучшенная маска скелета, которая наверняка напугает любых бесхребетных монстров, бродящих по Часовым механизмам.
f.sinister_skelly_shield=Щит-кайт, в котором обитает доброжелательный призрак. Он должен помочь вам организовать энергичную оборону против теней.
f.sinister_skelly_suit=Костлявый доспех, пульсирующий злобой. Любой, кто скептически относится к силе этого доспеха, заслуживает хорошего подшучивания.
f.skelly_mask=Жуткая маска, подходящая как для пугания детей, так и для защиты от атак теней.
f.skelly_shield=Одержимый буклер, лучше всего подходящий для отражения злой энергии.
f.skelly_suit=Леденящий душу наряд, который естественным образом отражает атаки теней.
f.skolver_cap=Искусно сшитая кожаная шапка, которая станет идеальной короной для любого короля диких прерий.
f.skolver_coat=Лучшее из одежды из шкуры росомахи, этот плащ был искусно сшит, чтобы придать вашим рукопашным атакам дополнительную силу.
f.slime_coin_gold=Скользкий шекель, созданный с помощью протоплазматической алхимии; эту монету можно использовать только в казино «Золотой Слайм».
f.slime_key=Скользкий ключ, который открывает только сундук «Слайм». После использования ключ уничтожается.
f.slime_lockbox=Скользкий, слизистый сундук, выигранный в казино «Золотой Слайм».  В ней находится один из множества специальных предметов.  Ее можно открыть с помощью ключа Слизи или Серебряного ключа.
f.slime_slasher=Прочная лопата, модифицированная для нанесения дополнительного урона монстрам семейства слизи.
f.slime_trinket=Странный круг, покрытый окаменелой слизью.
f.slumber_smogger=Алхимическая бомба, которая затуманивает область снотворным веществом.
f.slumber_smogger_mkii=«Сонный дымогенератор», модифицированный для рассеивания сонного дыма на более широкую площадь.
f.slumber_squall=Мощная алхимическая бомба, создающая густой туман из сонного дыма.
f.snarble_barb=Звериный клинок, способный стрелять скользкими шипами в тех, кто противостоит его владельцу.
f.snarbolax_cap=Темная шапка, сделанная из шкуры зловещего Снарболакса. Даже смотреть на нее слишком пристально опасно.
f.snarbolax_coat=Темный костюм, сделанный из шкуры зловещего Снарболакса. Даже смотреть на него слишком пристально опасно.
f.snarbostuffing=Плотный и пушистый наполнитель из специального полимера, который не разрушается под воздействием проклятой шерсти Снарболакса. Идеально подходит для изготовления трофеев или очаровательных проклятых мягких игрушек.
f.snow_hat=Уютная зимняя шапка, которая согреет вас как во время охоты на замороженных медуз, так и при простом растапливании зефира в горячем шоколаде.
f.solid_cobalt_armor=Прочный комплект кобальтовой брони, перекованный для дополнительного комфорта и защиты.
f.solid_cobalt_helm=Прочный кобальтовый шлем с улучшенными внутренними системами и внешним усилением.
f.somnambulists_totem=Обычный предмет с уникальной текстурой и весом, результат частичного переваривания Слоомбарго.
f.sorcerer_robe=Изысканная мантия, которую, как известно, носят могущественные чародеи, и один парень по имени Боб.
f.soul_dust=Прах усопших. Сохранилась ли в нем хоть какая-то частица души — пока неизвестно.
f.spark_life=Мощный заряд чистой энергии, который мгновенно оживляет вас или другого члена группы.
f.spark_plug=Небольшой механический компонент, который действительно запускает двигатель конструкта.
f.spell_book=Старый словарь, в котором, похоже, содержится немало заклинаний.
f.spike_shower=Мощное устройство, предназначенное для того, чтобы с рыком разрывать противников на куски.
f.spine_cone=Свирепое устройство, буквально усыпанное шипами.
f.spiral_brigandine=Легкие доспехи, выдаваемые всем новобранцам Спиральных рыцарей.
f.spiral_cloak=Легкие доспехи, выдаваемые всем новобранцам Спиральных рыцарей.
f.spiral_cool=Спиральный синий
f.spiral_crescent_helm=Легкий шлем, выдаваемый всем новобранцам «Спиральных рыцарей».
f.spiral_cuirass=Легкие доспехи, выдаваемые всем новобранцам «Спиральных рыцарей».
f.spiral_culet=Легкие доспехи, выдаваемые всем новобранцам «Спиральных рыцарей».
f.spiral_demo_helm=Прочный шлем, предназначенный для рыцарей, склонных к взрывам.
f.spiral_demo_suit=Прочная броня, предназначенная для рыцарей, склонных к взрывам.
f.spiral_draped_armor=Легкая броня, выдаваемая всем новобранцам «Спиральных рыцарей».
f.spiral_flak_jacket=Легкая броня, выдаваемая всем новобранцам «Спиральных рыцарей».
f.spiral_hood=Легкий шлем, выдаваемый всем новобранцам «Спиральных рыцарей».
f.spiral_neutral=Белый Спирали
f.spiral_pith_helm=Легкий шлем, выдаваемый всем новобранцам Рыцарей Спирали.
f.spiral_plate_helm=Тяжелый шлем из железа, рассчитанный на то, чтобы выдерживать оглушающие удары.
f.spiral_plate_mail=Тяжёлая броня из железных пластин, способная выдержать множество обычных атак.
f.spiral_round_helm=Лёгкий шлем, выдаваемый всем новобранцам «Спиральных рыцарей».
f.spiral_sallet=Легкий шлем, выдаваемый всем новобранцам «Спиральных рыцарей».
f.spiral_scale_helm=Легкий кольчужный шлем, который слегка защищает от колющих ударов.
f.spiral_scale_mail=Прочная, легкая кольчуга, обеспечивающая защиту от колющих атак.
f.spiral_soaker=Смертоносный водяной пистолет, способный промочить даже самого сухого из врагов.
f.spiral_tailed_helm=Легкий шлем, выдаваемый всем новобранцам «Спиральных рыцарей».
f.spiral_warm=Спиральный красный
f.spiraltail_mail=Простая обеймистая кольчуга, которую обычно носят на парадах для привлечения процветания и удачи.
f.spiraltail_mask=Простая обеймистая маска, созданная для празднования Нового года. Ваши хитрые проделки наверняка станут зрелищем.
f.spitfire=Модифицированный Proto Gun, дополненный слабым пламенным выбросом.
f.splinter_bomb=Осколочная бомба, состоящая из небольшого взрывчатого вещества, заключенного в синтетический минерал. Этот материал, склонный к расколу и бесполезный в остальном, идеально подходит для того, чтобы нанести врагам неприятные осколочные ранения.
f.spoiled_treat=Ужасная боль в животе ждет тех, кто отведает зловонную еду прошлого Зимнего фестиваля.
f.spur=Механизированный меч со встроенным двигателем, который при использовании генерирует энергетические всплески.
f.stagger_storm=Хотя изначально это устройство было разработано Орденом Спирали для безвредного обезвреживания опасных видов, то, как вы поступите с врагами, которым не повезло оказаться в эпицентре бури, зависит исключительно от вас.
f.starlit_demo_helm=Светящийся шлем, укрепленный против снотворных туманов. Внутри он удивительно мягкий.
f.starlit_demo_suit=Усовершенствованный костюм для подрывных работ, способный противостоять самым сильным туманам сна. Мягкое свечение странным образом бодрит.
f.starlit_hunting_cap=Усовершенствованная охотничья шапка, светящаяся и пушистая, устойчивая к самым сильным снотворным туманам.
f.starlit_hunting_coat=Усовершенствованный, пропитанный звездным светом охотничий плащ, который не даст вам заснуть, даже когда он убаюкивает вас своим пушистым комфортом.
f.static_capacitor=Взрывное устройство гремлинского происхождения, предназначенное для создания смертоносного электрического поля.
f.static_clinger=Скрытая нить энергии, парящая по всему Часовому механизму, часто цепляющаяся за волосы и одежду. Она слишком велика, чтобы правильно переработать в Энергию, но очень полезна в алхимии.
f.static_diskgun=Потрясающе мощный пистолет, создающий шквал заряженных дисков. Выпущенные диски возвращаются, достигнув апогея.
f.static_edge=Модифицированный Прото-меч, способный генерировать электрический заряд низкой интенсивности.
f.static_flash=Прото-бомба, модифицированная для генерации небольших всплесков электричества при взрыве.
f.steamvalve_mask=Хотя сейчас эти специальные герметичные маски уступили место более совершенным устройствам, когда-то их использовали солдаты в условиях экстремальных атмосферных условий. Клапан давления на спине нужно было поворачивать с особой точностью, иначе голова солдата, ну, взорвалась бы изнутри.
f.stellar_sentinel_helm=Этот шлем когда-то носили исорские звездоплаватели из далекого прошлого, которые несли вахту во время внесолнечных операций. Надев его, вы почувствуете, что понимаете тайны вселенной.
f.stellar_sentinel_suit=Этот скафандр когда-то носили исорские звездоплаватели, жившие в далеком прошлом и следившие за операциями за пределами Солнечной системы. Надев его, вы почувствуете, что можете погрузиться в самое сердце звезды.
f.stoic_buster=Пистолет, созданный из панциря тортдрона. Вооружившись им, вы ощущаете тихое дуновение ветра и можете вызвать грохочущую бурю, которая следует за ним.
f.stoic_shell=Щит, созданный из панциря тортдрона. Вооружившись им, вы ощущаете тихое дуновение ветра и можете вызвать грохочущую бурю, которая следует за ним.
f.stone_tortoise=Большой, мощный щит, сделанный в виде панциря животного. Его внушительный вес может затруднять атаку.
f.stop_sign=Странный щит, способный предотвратить нанесение вреда пользователю многими статусными атаками. Однако он обладает неестественной силой, заставляющей пользователя останавливаться, когда он находится за ним.
f.storm_avenger_helm=Шлем, который носят небесные стражи, охраняющие королевство, скрытое на вершине заснеженной горы.
f.storm_caller=Дар богов, позволяющий призывать молнии с небес.
f.storm_champion_helm=Шлем того, кто бросил вызов богам и штурмовал врата небесного царства. Некоторые говорят, что раскаты грома — это вечное эхо её осады.
f.storm_chaser=Редкий элементаль, парящий в грозовых тучах. Его электрический гул создает почти мелодичный хор, который можно слабо услышать между раскатами грома.
f.storm_crusader_helm=Шлем, который носят мифические воины, которые, как говорят, мчатся в бой на молнии.
f.storm_dragon_helm=Зачарованный шлем, изготовленный в виде чудовища, которое, как полагают некоторые, создало мир своим прохождением\: его огонь — солнце, его кости — горы.
f.storm_driver=Скрытый заряд, пронизывающий это могущественное оружие, достаточно силен, чтобы вызвать дискомфорт у того, кто им владеет, и сильную боль у того, в кого оно попало.
f.storm_rider_mantle=Легендарные доспехи, которые, как полагают, носил бог, использовавший молнии, чтобы высекать целые миры из камня.
f.storm_warrior_helm=Шлем, который носил легендарный мастер меча, настолько искуссный, что мог рассекать молнии, когда те ударялись о землю.
f.stranger_cap=Шляпа, которую когда-то носил один из загадочных Странников.  Местные Снайпы, кажется, притягиваются к тому, кто ее носит.
f.stranger_hat=Шляпа, которую когда-то носил один из загадочных Странников.  Кажется, в каждом шве прячутся маленькие разноцветные перья.
f.stranger_robe=Мантия, которую когда-то носил один из загадочных Странников.  Местные Снайпы, похоже, притягиваются к тому, кто ее носит.
f.strike_needle=Планы по модификации «Ударной иглы» для использования в небоевых целях были отложены после того, как новобранец случайно продырявил койку лейтенанта Ферона.
f.striker=Быстрый меч, любимый членами более скрытных отделений Ордена Спирали.
f.stun_gun=Прото-пушка, модифицированная для оглушения монстров. Оглушенные монстры двигаются и атакуют медленнее, чем обычно.
f.style_kit={0}  Этот предмет будет уничтожен, но вы сможете повторно применить этот модификатор к своему рыцарю с помощью набора стилей.
f.sudaruska=Прочное оружие для рыцаря, готового с радостью пожертвовать стилем и блеском ради невероятной силы удара.
f.sulfur=Вонючий, стигийский, серный осколок, часто встречающийся в Подземном мире.
f.sun_shards=Осколочная бомба, сформированная из небольшого взрывчатого вещества, заключенного в заряженный солнечной энергией люминит. Что бы ни случилось, не смотрите на нее прямо.
f.sun_silver=Необыкновенный металл, пронизанный сияющим светом неба.
f.sunset_duster=Прочный комплект кожаной одежды, созданный для паломника с настоящим мужеством.
f.sunset_stetson=Прочная шляпа для стрелков, которая не должна стоить вам больше, чем горсть крон.
f.super_blast_bomb=Улучшенная взрывная бомба, сочетающая в себе нестабильный источник тепла с непроверенным взрывчатым веществом, что делает ее крайне опасной.
f.super_blaster=Усиленный бластер, хорошо подходящий для длительных экспедиций вглубь Часового механизма.
f.super_brawl_crown=Вручается чемпиону Super Brawl\!
f.super_crystal_bomb=Осколочная бомба, наполненная ещё большим количеством сплава. Применяйте прямо в голову противнику.
f.super_dark_matter_bomb=Осколочная бомба, наполненная ещё большим количеством Тёмной материи. Сколько Тёмной материи будет слишком много? Вот столько.
f.super_fire_barrier=Окружает вас мощными огненными шарами, способными поджечь врагов
f.super_food=Накормите этим своего спрайта, чтобы наполнить его тепло до максимума!
f.super_freeze_barrier=Окружает вас мощными ледяными шарами, способными заморозить врагов на месте
f.super_poison_barrier=Окружает вас мощными токсичными шарами, способными парализовать врагов
f.super_shard_bomb=Осколочная бомба, набитая еще большим количеством истощенного Кримзонита. Лучшее лекарство для воинственного существа — это, безусловно, кристалл в череп.
f.super_shock_barrier=Окружает вас мощными шарами молнии, которые могут поражать врагов током
f.super_slime_slasher=Лопата с острым лезвием, которая особенно хорошо подходит для борьбы со слизнями в окопах.
f.super_splinter_bomb=Осколочная бомба, наполненная ещё большим количеством синтетического минерала. Её также можно использовать для измельчения овощей, если вас не смущает необходимость время от времени вытаскивать кристаллы из зубов.
f.super_stun_gun=Усовершенствованный электрошокер, мощный разряд которого отпугнёт даже самых устрашающих монстров-часовщиков.
f.supernova=Разрушения, оставленные на своем пути этим беспрецедентным пистолетом, не имеют ничего общего с туманностью. Выстрелы из Supernova становятся мощнее по мере увеличения дальности.
f.supply_deluxe_compact=Набор полезных припасов, ценимый исследовательскими командами Spiral Knight, работающими в глубинах Clockworks.  В этом наборе класса «люкс» достаточно припасов, чтобы прокормить целый отряд рыцарей в течение недели.
f.supply_pack_compact=Набор полезных припасов, ценимый исследовательскими командами «Спиральных рыцарей», работающими в глубинах «Часового механизма».  В этом компактном наборе достаточно припасов, чтобы прокормить одного рыцаря в течение недели.
f.supply_standard_compact=Набор полезных припасов, ценимый исследовательскими командами «Спиральных рыцарей», работающими в глубинах «Часового механизма».  В этом стандартном наборе достаточно припасов, чтобы прокормить нескольких рыцарей в течение недели.
f.surge_breaker_armor=Надежный комплект брони, способный выдержать самые шокирующие откровения. Он также неплохо противостоит электрическим атакам.
f.surge_breaker_helm=Надежный шлем, призванный защитить ваш череп от любых неприятных ударов.
f.surge_breaker_shield=Надежный щит, который поможет вам сохранять равновесие в бою.
f.sweet_dreams=Не дайте себя обмануть пушистому внешнему виду этого оружия. Оно бьёт гораздо сильнее, чем кажется. Идеальное оружие для борьбы с тем, что шуршит по ночам.
f.swift_flourish=Улучшенная версия «Flourish» для рыцарей, которые стремятся расправляться с противниками с изяществом.
f.swiftstrike_buckler=Небольшой, удобный в использовании щит, позволяющий пользователю наносить быстрые удары.
f.swimsuit_trunks=Пара плавок из серии «Спираль», предназначенных для прибрежных экспедиций и веселья на солнце.
f.swimsuit_wrap=Парео из серии «Спираль», накинутое поверх цельного купальника, предназначенного для прибрежных экспедиций и веселья на солнце.
f.swordstone=Прекрасный кусок природного камня, идеально подходящий для заточки лезвия смертоносного меча.
f.tabard_rose=Потертый, расшитый табард, когда-то принадлежавший Рыцарю Розы — священному ордену отважных и особенно лихой героев, чьи многочисленные приключения стали темой многих народных сказок. Говорили, что Рыцари Розы были непревзойденными фехтовальщиками, веря, что их клинки подобны цветам, чьё имя они носят\: нежная красота, скрывающая жестокий укол.
f.tailed_helm=Выразительный шлем, доказывающий, что два пера всегда лучше, чем одно.
f.teddy_bear_buckler=Высокотехнологичный энергетический щит, замаскированный под безобидного плюшевого мишку. Идеальный спутник для защиты от ночных приспешников.
f.tempered_calibur=Меч «Калибур», перекованный и закаленный с помощью самых передовых технологий, доступных оружейникам Ордена Спирали.
f.the_ban_stick=Ударь тебя с яростью лома.
f.the_bitter_end=Щит, который носят все члены Разведывательных рейнджеров. Его название служит напоминанием всем рейнджерам о том, когда именно им разрешается бросить его в бою.
f.the_final_gasp=Щит, который носят все члены Алых разведчиков. Его название служит напоминанием всем разведчикам о том, когда именно им разрешается бросить его в бою.
f.thunderball=Шар из чистой электрической энергии, который, как правило, можно найти на дне моря.
f.thunderous_plate_mail=Легендарный доспех, который, как говорят, наделяет своего владельца силой небесного грома.
f.thwack_hammer=Энергичный гаечный ключ, специально предназначенный для уничтожения механических врагов.
f.thwacker_shield=Щит, переделанный гремлинами и используемый рыцарями «Темный Клык». Подобно самим гремлинам, он устойчив к огню и ударам. Рыцари, использующие эти щиты, отмечают, что полностью удалить прилипшую к ним шерсть невозможно.
f.ticket_unbind_0=Используйте этот билет в Кузнице развязывания, чтобы развязать предмет с 0 звездами.
f.ticket_unbind_1=Используйте этот билет в Кузнице развязывания, чтобы развязать предмет с 1 звездой.
f.ticket_unbind_2=Используйте этот билет в Кузнице развязывания, чтобы развязать предмет с 2 звездами.
f.ticket_unbind_3=Используйте этот билет в Кузнице развязывания, чтобы развязать предмет с 3 звездами.
f.ticket_unbind_4=Используйте этот билет в Кузнице развязывания, чтобы развязать предмет с 4 звездами.
f.ticket_unbind_5=Используйте этот билет в Кузнице развязывания, чтобы развязать предмет с 5 звездами.
f.ticket_variants_1=Используйте этот билет в Кузнице вариантов, чтобы сбросить варианты предмета до 1 случайного варианта.
f.ticket_variants_2=Используйте этот билет в Кузнице вариантов, чтобы сбросить варианты предмета до 2 случайных вариантов.
f.ticket_variants_3=Используйте этот билет в Кузнице вариантов, чтобы сбросить варианты предмета до 3 случайных вариантов.
f.token_cake=Кусок торта, служащий трофеем за победу над ордой «Крип-кейков». Шеф-повар Бискотти утверждает, что ни эти трофеи, ни инцидент, приведший к их появлению, официально никогда не имели места.
f.token_candy=Конфета, изготовленная в честь Праздника Тёмного урожая. Её можно обменять на городской площади Хейвена на различные маски для костюмов.
f.token_core=Фрагмент странного материала, найденный в сердце Часового механизма. Каждый фрагмент, похоже, имеет совершенно уникальный состав, как снежинки. Эти фрагменты очень ценятся в штаб-квартире Спирали, так как там надеются изучить природу сердца механизма.
f.token_forge=Небольшой струйка сущностного духа технологии и прогресса. Она чрезвычайно ценна для Ордена Спирали. Отнесите её торговцу жетонами на базаре Хейвена!
f.token_grim=Небольшая струйка сущностного духа тьмы и разложения. Она чрезвычайно ценна для Ордена Спирали. Отнесите её торговцу жетонами на базаре Хейвена!
f.token_jelly=Эти мягкие драгоценные камни, которые обычно носят только члены королевской семьи желе, являются официальной валютой королевств желе. Хотя слизи их очень ценят, большинство других существ просто съедают их, так как они довольно вкусные.
f.token_krogmo=Монета, выпущенная великим королем Крогмо для участников его Колизея.  Ее можно обменять на призы у Начальника по наградам Колизея.
f.token_page=Рассыпающаяся страница, вырванная из давно забытого гримуара из архивов поместья Муркрофт. Неразборчивый текст, написанный на ней, слабо светится в темноте, словно в самих словах таится сила.
f.token_primal=Небольшая частица сущностного духа природы. Она представляет огромную ценность для Ордена Спирали. Отнесите её торговцу жетонами на базаре Хейвена!
f.token_roarmulus=Специальная печатная плата, разработанная инженерами-гремлинами, предназначенная для усиления лая и укусов близнецов Роармулус.
f.token_snarbolax=Длинный, острый как бритва зуб, вырванный из пасти Снарболакса; сувенир, символизирующий победу рыцаря над чудовищным преследователем из Сумеречных Диких Лесов.
f.token_spirit=Потусторонний клеймо, наложенное на душу, захваченную таинственной Апокреей. Его удаление позволяет плененной душе сбежать из узничества в ужасном царстве Апокреи.
f.token_vanaduke=Печать из затерянного королевства Альмире, доказательство того, что ее обладатель преодолел вечно горящую бездну, известную как Цитадель Огненной Бури.
f.token_winter=Крошечный список желаний, составленный одним из детей Эмберлайта. Он означает, что вы исполнили их праздничные желания и спасли Зимний фестиваль. Разве это не наполняет вас радостью?
f.token_winter_wishlist=Этот список желаний к Зимнему фестивалю был утерян давным-давно. В нём перечислены тёплые ткани, защищающие от снега. Рэндольф наградит тех рыцарей, кто принесёт ему стопку таких тканей. Так что принесите их ему и получите подарок в ответ.
f.torchstone=Небольшой камень, постоянно тлеющий. Гремлины, патрулирующие Охлаждающие камеры, иногда используют их в качестве грелки для рук.
f.torpor_tantrum=Ультра-бомба сна. Это как сказка на ночь, только взрывнее.
f.toxic_atomizer=Мощная алхимическая бомба, создающая удушающее ядовитое облако.
f.toxic_catalyzer=Катализатор, модифицированный для стрельбы опасными радиоактивными снарядами. Пули Катализатора окутывают врага энергетическим полем, которое взрывается после получения урона.
f.toxic_core=Твердый, пульсирующий комок, из которого сочится едкая жидкость.
f.toxic_needle=Автомат, модифицированный для стрельбы проникающими болтами, пропитанными сильным ядом.
f.toxic_vaporizer=Алхимическая бомба, создающая ядовитое облако токсинов.
f.toxic_vaporizer_mkii=Токсичный испаритель, модифицированный для рассеивания ядовитых веществ на большую площадь.
f.toy_box=Содержит один уникальный костюм или аксессуар из Игрушечной страны. Предметы выбираются случайным образом. Для открытия ключ не требуется.
f.toy_soldier_cap=Стандартная форма для новобранцев, которые умеют маршировать, отдавать честь и иногда падать с полок.
f.toy_soldier_coat=Сшит специально для участия в сражениях за Игрушечную страну, но также идеально подходит для выступлений на парадах.
f.toy_soldier_crown=Сверкающая корона, которую носят элитные подразделения Игрушечной страны и те, от кого слабо пахнет лаком.
f.training_room=Простая комната, дающая доступ к частному тренировочному залу гильдии, идеально подходящая для изучения новых навыков или поддержания старых в тонусе.
f.tri_guard_armor=Специальный комплект доспехов, разработанный специально для рыцарей, отправляющихся на первую разведку чужих планет. Этот прочный комплект защищает от различных суровых погодных условий.
f.tri_guard_helm=Специальный шлем, разработанный специально для рыцарей, отправляющихся на первую разведку чужих планет. Этот прочный шлем защищает от различных суровых погодных условий.
f.triglav=Об этом всемогущем клинке не ходит никаких легенд, но это только потому, что люди редко настроены на разговоры после того, как их раздавила гора.
f.trinket_slot_upgrade=После использования это улучшение открывает слот для украшения на {0} дней.
f.troika=Меч, изготовленный по простым технологиям, который компенсирует недостаток внутренней силы огромным весом и размерами. Он способен наносить сокрушительные удары тем, кто умеет им владеть.
f.trojan_armor=Говорят, что доспехи отважных Стражей Спирали приносят огромное утешение другим рыцарям. Ничто так не говорит «вот и кавалерия», как вид этих железных гигантов, выходящих на поле боя.
f.trojan_disguise=Очень убедительный костюм, который делает того, кто его носит, похожим на троянца.  Он настолько убедителен, что ваши друзья могут просто воткнуть вам нож в спину!
f.trojan_helm=Шлем отважных Стражей Спирали, который, как говорят, приносит большое утешение другим рыцарям.  Ничто так не говорит «вот и кавалерия», как вид этих железных гигантов, выходящих на поле боя.
f.trojan_horseshoe=Смертельно черная подкова. Выглядит относительно безобидно.
f.true_love_locket=Небольшой медальон в форме сердца с надписью: «Всегда думаю о тебе, с любовью, Пупсик»
f.tundrus=Модифицированный магнус, гарантирующий, что если ваша цель каким-то образом выжила после первого выстрела, она все равно застынет на месте. Заряженный выстрел может даже пробить нескольких врагов.
f.turbillion=Показной механизированный клинок, турбина которого потрескивает с силой тысячи бурь.
f.tusk_helm=Созданный по образцу благородных зверей, известных своей силой и бесстрашием, этот шлем вселяет в врагов своего владельца такой ужас и уважение, что о его подвигах будут говорить еще долгие века.
f.twisted_snarble_barb=Искривленный Снарбл-Барб, усовершенствованный так, что при ударе издает приятный звук «сникер-снак».
f.twisted_spine_cone=Усовершенствованный Спайн-Коун, который будет бить противников шипами и зарывать их в колючие заросли.
f.twisted_targe=Твердый щит, который придаст вашим ударам меча дополнительную силу.
f.ult_evo_catalyst=Запечатанный заряд крайне нестабильной энергии, который могут синтезировать боевые спрайты. При этом спрайты могут эволюционировать в свои окончательные формы и использовать силу своих ультра-умений.
f.ultra_fire_barrier=Окружает вас смертоносными огненными шарами, способными поджечь врагов
f.ultra_freeze_barrier=Окружает вас смертоносными ледяными шарами, способными заморозить врагов на месте
f.ultra_poison_barrier=Окружает вас смертоносными ядовитыми шарами, способными парализовать врагов
f.ultra_shock_barrier=Окружает вас смертоносными шарами молнии, способными поразить врагов разрядом
f.umbra_driver=Этот ужасающе мощный пистолет стреляет пулями, полностью лишенными цвета, запаха и милосердия.
f.umbral_blaster=Усовершенствованный бластер теней, предназначенный для уничтожения инопланетных биологических форм.
f.unstable_core=Опасный кусок, извлечённый из взрывающегося врага. Он угрожающе гудит.
f.valestone=Легендарный минерал ярко-зеленого цвета, который, как говорят, содержит сущность всей природной жизни.
f.valestone_deposit_1=Небольшое месторождение минерала, которое даст одну единицу лунного камня.
f.valestone_deposit_2=Месторождение минерала приличных размеров, которое даст несколько единиц лунного камня.
f.valestone_deposit_3=Большой кусок минералов, из которого можно добыть огромное количество лунного камня.
f.valestone_deposit_4=Главная жила металлосодержащих минералов, из которой можно добыть целый джекпот лунного камня.
f.valestone_shard=Осколок валстоуна, слишком маленький для использования в качестве источника энергии для ворот, но очень полезный в алхимии.
f.valiance=Этот высокопроизводительный пистолет является символом Ордена Спирали и с гордостью носится ветеранами. Как часто говорят, рыцарю не нужна смелость\: достаточно доблести.
f.valkyrie_helm=Бесценный шлем, название которого обитатели Подземного мира не осмеливаются произносить.
f.valkyrie_mail=Бесценный комплект доспехов, название которого обитатели Подземного мира не осмеливаются произносить.
f.var_slime_lockbox=Особый сундук, появившийся из обычного сундука со слизью.  Для его открытия требуется ключ от слизи или серебряный ключ, но в нём гарантированно находится редкое снаряжение, костюм или аксессуар цвета слизи.
f.venom_fiend_mail=Кольчуга, которую, по слухам, изготовили по образу ядовитого демона. Она поставляется с зловещим костюмом, пульсирующим от мерзкой эссенции.
f.venom_fiend_mask=Маска, которую, как говорят, изготовили по образу ядовитого демона.  Она пропитана мерзкой эссенцией, которая наверняка напугает ваших врагов.
f.venom_veiler=Venom Veiler — лучшее из устройств для распыления яда, которое можно использовать для уничтожения вредителей на посевах. В крайнем случае, его можно использовать и для уничтожения урожая.
f.veteran_door=Устанавливает силовой барьер у входа в комнату, который могут пройти только члены гильдии ранга «Ветеран» и выше.
f.vial_curse=Стеклянная ампула, содержащая концентрированную сущность демона. Ее можно использовать, чтобы наложить на врагов проклятие.\n\nБросьте его как гранату и наложите на врагов 10 лет несчастья!
f.vial_curse_super=Стеклянная ампула, содержащая концентрированную сущность демона. Её можно использовать для наложения на врагов Проклятия.\n\nЭта конкретная ампула выглядит гораздо опаснее стандартной. Бросьте её как гранату и наложите на врагов 10 лет несчастья!
f.vial_curse_ultra=Стеклянный флакон с концентрированной сущностью демона. Его можно использовать, чтобы наложить на врагов проклятие.\n\nЭтот флакон — самый опасный из всех. Бросьте его как гранату и подарите своим врагам 10 лет невезения!
f.vial_fire=Стеклянная ампула, содержащая расплавленную смесь. Ее можно использовать, чтобы наложить на врагов Огонь.\n\nБросьте ее как гранату и превратите их в поджаренный хлеб!
f.vial_fire_super=Богато украшенная стеклянная ампула, содержащая расплавленную смесь. Ее можно использовать, чтобы наложить на врагов Огонь.\n\nЭта конкретная ампула выглядит гораздо опаснее стандартной. Бросьте её как гранату и превратите их в поджаренный тост!
f.vial_fire_ultra=Богато украшенная стеклянная колба, содержащая расплавленную смесь. Её можно использовать, чтобы наложить на врагов эффект Огня.\n\nЭта конкретная колба — самая опасная из всех. Бросьте её как гранату и превратите их в поджаренный тост!
f.vial_freeze=Стеклянная колба, содержащая ледяной ветер. Её можно использовать, чтобы наложить на врагов эффект замораживания.\n\nБросьте её как гранату и заморозьте врагов на месте!
f.vial_freeze_super=Изысканная стеклянная ампула, содержащая ледяной ветер. Её можно использовать, чтобы наложить на врагов эффект замораживания.\n\nЭта конкретная ампула выглядит гораздо опаснее стандартной. Бросьте её как гранату и заморозьте врагов на месте!
f.vial_freeze_ultra=Изысканная стеклянная колба, содержащая ледяной ветер. Её можно использовать, чтобы наложить на врагов эффект «Заморозка».\n\nЭта колба — самая опасная из всех. Бросьте её как гранату и заморозьте врагов на месте!
f.vial_poison=Стеклянная ампула, содержащая ослабляющие токсины. Ее можно использовать, чтобы наложить на врагов эффект «Отравление».\n\nБросьте ее как гранату и ослабьте атакующие способности ваших противников!
f.vial_poison_super=Изысканная стеклянная ампула, содержащая ослабляющие токсины. Ее можно использовать, чтобы наложить на врагов эффект «Отравление».\n\nЭта конкретная ампула выглядит гораздо опаснее стандартной. Бросьте её как гранату и ослабьте атаку ваших врагов!
f.vial_poison_ultra=Богато украшенная стеклянная ампула, содержащая ослабляющие токсины. Её можно использовать, чтобы наложить на врагов яд.\n\nЭта конкретная ампула — самая опасная из всех. Бросьте её как гранату и ослабьте атаку ваших врагов!
f.vial_shock=Стеклянная ампула, содержащая гиперзаряженные электрические жидкости. Ее можно использовать, чтобы наложить на врагов эффект «Удар током».\n\nБросьте ее как гранату и нанесите своим врагам настоящий УДАР током!
f.vial_shock_super=Изысканная стеклянная колба, содержащая электрическую жидкость с гиперзарядом. Её можно использовать, чтобы наносить врагам удар током.\n\nЭта колба выглядит гораздо опаснее стандартной. Бросьте её как гранату и подарите своим противникам настоящий разряд тока!
f.vial_shock_ultra=Изысканная стеклянная ампула, содержащая гиперзаряженную электрическую жидкость. Ее можно использовать, чтобы нанести врагам удар током.\n\nЭта конкретная ампула — самая опасная из всех. Бросьте ее как гранату и подарите своим врагам настоящий УДАР током!
f.vial_sleep=Стеклянная ампула, содержащая снотворное зелье. Ее можно использовать, чтобы наложить на врагов эффект «Сон».\n\nБросьте ее как гранату, и ваши враги заснут в считанные секунды!
f.vial_sleep_super=Изысканная стеклянная ампула, содержащая снотворное зелье. Ее можно использовать, чтобы наложить на врагов эффект «Сон».\n\nЭта конкретная ампула выглядит гораздо опаснее стандартной. Бросьте ее как гранату, и ваши враги заснут в считанные секунды!
f.vial_sleep_ultra=Богато украшенная стеклянная ампула, содержащая снотворное зелье. Ее можно использовать, чтобы наложить на врагов эффект «Сон».\n\nЭта конкретная ампула — самая опасная из всех. Бросьте его как гранату, и ваши враги заснут в считанные секунды!
f.vial_stun=Изысканная стеклянная колба, содержащая мерцающие вспышки. Ее можно использовать, чтобы оглушить врагов.\n\nБросьте ее как гранату, и ваши враги будут слишком ошеломлены, чтобы преследовать вас!
f.vial_stun_super=Изысканная стеклянная колба, содержащая мерцающие вспышки. Её можно использовать, чтобы оглушить врагов.\n\nЭта колба выглядит гораздо опаснее стандартной. Бросьте её как гранату, и ваши противники будут настолько ошеломлены, что не смогут вас преследовать!
f.vial_stun_ultra=Изысканная стеклянная колба, содержащая мерцающие вспышки. Ее можно использовать, чтобы оглушить врагов.\n\nЭта колба — самая опасная из всех. Бросьте ее как гранату, и ваши враги будут настолько ошеломлены, что не смогут вас преследовать!
f.vile_seal=Небольшой обрывок древнего пергамента, пропитанный темной магией. Считается, что он дарует силу тем, чьи души полны зла.
f.vile_striker=Коварный сабель, в котором хранится заряд яда. Его зазубренное лезвие не предназначено для резки хлеба!
f.virulent_catalyzer=Благодаря использованию технологии Спирали этот ужасающий пистолет получил мощный ядовитый заряд. Пули «Катализатора» окутывают врага энергетическим полем, которое взрывается после получения урона.
f.virulent_seedling=Это маленькое, опасное растение было превращено биотехниками в оружие, так что при взрыве оно рассеивает облако токсичных спор. Не дайте размеру обмануть вас, оно обладает мощностью в несколько килоаудрей.
f.virulisk_mask=Маска, изготовленная из шкуры Вирулиска.
f.virulisk_suit=Толстый комплект снаряжения, изготовленный из туши вирулиска. Носитель обретет часть устойчивости к яду вирулиска, а также его пристрастие к флану.
f.vitapod=Увеличивает максимальное здоровье на {0}
f.vitasuit=Специальный костюм, дающий носителю солидный бонус к здоровью.
f.vitasuit_deluxe=Четыре из пяти медиков Спирали рекомендуют эту броню для повседневного использования. Пятый был раздавлен Тортодроном.
f.vitasuit_plus=Высокотехнологичная кольчуга, которая дает владельцу множество медицинских преимуществ, включая бонус к здоровью, более блестящие волосы и свежее дыхание.
f.vog_cub_cap=Толстая шапка, сильно пахнущая барбекю. Барбекю из чего? Не спрашивайте.
f.vog_cub_coat=Эта кожаная одежда настолько огнестойкая, что вам даже не будет мешать ее вонь древесного дыма.
f.volatile_catalyzer=Снятие защитных ограничений с устройства, созданного гремлинами, — верный способ лишиться конечности. В данном случае это, скорее всего, будет не ваша. Пули «Катализатор» окутывают врага энергетическим полем, которое взрывается после получения урона.
f.volcanic_demo_helm=Ультрасовременный шлем, укреплённый вулканическим железом и предназначенный для работы с высокотемпературными взрывчатыми веществами.
f.volcanic_demo_suit=Средство защиты высшего уровня для передового специалиста по взрывным работам. Благодаря встроенной системе охлаждения вы почувствуете себя так, будто вас поместили в криогенную камеру.
f.volcanic_iron=Необыкновенный металл, наполненный пламенной энергией магмы.
f.volcanic_pepperbox=Когда вы разбиваете лагерь на опасной территории, «Вулканический пеппербокс» идеально подходит как для поджаривания зефира, так и для поджаривания врагов.
f.volcanic_plate_helm=Превосходный пластинчатый шлем, пропитанный стихийной сущностью пламени. В нём трудно дышать, но он способен противостоять высоким температурам и любому количеству жестоких атак.
f.volcanic_plate_mail=Превосходные пластинчатые доспехи, пропитанные стихийной сущностью пламени и рассчитанные на то, чтобы выдерживать огромные удары.
f.volcanic_plate_shield=Превосходный щит, пропитанный сущностью стихии огня. Он настолько устойчив к высоким температурам, что остается загадкой, как его вообще удалось выковать.
f.volcanic_plated_pathfinder_armor=Упрочненный комплект доспехов, усиленный вулканическими сплавами, созданный для защиты от самых жарких монстров во время исследования неизвестного.
f.volcanic_plated_pathfinder_helm=Упрочненный шлем, усиленный вулканическими сплавами, созданный для защиты от самых жарких монстров во время исследования неизвестного.
f.volcanic_plated_sentinel_armor=Доспех, усиленный вулканическим покрытием для защиты от целого ряда стихий.
f.volcanic_plated_sentinel_helm=Шлем, укреплённый вулканическим бронированием для защиты от различных стихий.
f.volcanic_plated_shade_armor=Доспехи из огнестойкой ткани, пронизанной тёмной материей, позволяющие скрыть своего владельца, когда он прячется в раскалённых коридорах.
f.volcanic_plated_shade_helm=Шлем из огнестойкой ткани, переплетенной с темной материей, чтобы скрыть своего владельца, когда тот прячется в раскаленных коридорах.
f.volcanic_salamander_mask=Маска саламандры, укрепленная вулканическим железом. В полевых условиях ее можно использовать в качестве импровизированной кофейницы, если вас не смущает кофе со вкусом ящерицы.
f.volcanic_salamander_suit=Костюм саламандры, укрепленный прочными пластинами из вулканического железа. Обеспечивает превосходную защиту и может использоваться в качестве импровизированной печки во время длительных вылазок.
f.volt_breaker_armor=Улучшенная броня «Автоматический выключатель», дополнительно модифицированная для защиты от ударов тока.
f.volt_breaker_helm=Шлем «Выключатель», модифицированный для обеспечения дополнительной защиты от ударов током.
f.volt_breaker_shield=Щит «Выключатель», модифицированный для повышенной защиты от ударов током.
f.volt_driver=Высокотехнологичный алхимический пистолет, стреляющий мощными вольтовыми пулями, которые при ударе разлетаются на части.
f.volt_oil=Скользкое вещество, всегда имеющее небольшой электрический заряд.
f.voltaic_radical_mask=Маска, которую, как говорят, скопировал самосознательный меха-рыцарь. Встроенные гироскопы и амортизирующий гребень гарантированно скроют вашу личность.
f.voltaic_radical_suit=Костюм, который, как говорят, скопировал самосознательный меха-рыцарь. В комплект входит синтетический костюм, пульсирующий электрической энергией.
f.voltaic_tempest=Это высокотехнологичное высоковольтное устройство не рекомендуется использовать в воде, рядом с водой или вблизи людей, думающих о воде. Для безопасности вам, вероятно, не стоит на него смотреть.
f.voltech_alchemer=Алхимический пистолет, стреляющий высокозаряженными ионными пулями, которые распадаются при ударе.
f.voltech_alchemer_mkii=Улучшенный Alchemer, стреляющий электрическими разрядами с увеличенной скоростью.
f.voltedge=Объединение технологии спиральных конденсаторов с образцами, извлеченными из завода боеприпасов «Айронклоу», привело к созданию этого клинка, способного генерировать особенно опасный разряд мощностью 1,21 гигаватта.
f.wanderers_wand=Прекрасно подходит для махания.
f.warm_crystal=Редкое кристаллизованное скопление тепла, используемое для создания оружия и снаряжения более высоких уровней. Тепло внутри горит настолько сильно, что на ощупь оно кажется теплым.
f.warmaster_bomb_1=Мощная бомба, наполненная тёмной энергией, которую Военачальник Сирус создал с единственной целью — уничтожить других гремлинов, встававших у него на пути.
f.warmaster_bomb_2=Усовершенствованная версия тёмной бомбы, которую Военачальник Сирус создал с единственной целью — уничтожить других гремлинов, встававших у него на пути.
f.warmaster_bomb_3=Усовершенствованная версия теневой бомбы, которую Военачальник Сирус создал с единственной целью — уничтожить других гремлинов, встающих у него на пути.  Считается, что она была предназначена для использования против других членов Алого Ордена.
f.warmaster_helm_1=Ремейк маски, которую когда-то носил Военачальник Сирус из Алого Ордена.  Сделанная из обломков маски, она лишь отчасти напоминает оригинал.
f.warmaster_helm_2=Ремейк маски, которую когда-то носил Военачальник Сирус из «Алого Ордена».  Хотя она очень похожа на оригинал, в ней все еще отсутствуют некоторые детали.
f.warmaster_helm_3=Ремейк маски, которую когда-то носил Военачальник Сирус из «Алого Ордена».  Эта идеальная копия имеет ужасающее сходство с самим Сирусом и служит мрачным напоминанием об операции «Багровый Молот».
f.warp_dust=Легкая пыль, оставшаяся после того, как существо переместилось с невероятной скоростью. Отлично подходит для соуса.
f.waste_module=Небольшой контейнер, в котором когда-то собирались отходы от устройства, созданного для нанесения хаоса. Теперь он просто воняет.
f.weapon_slot_upgrade_30=После использования это улучшение открывает дополнительный слот для оружия на 30 дней.
f.wicked_idol=Одна из множества статуэток, которые носят демоны, чтобы завоевать благосклонность своих темных богов. Самыми ценными из них являются «MIBE» (mint in box of evil — «новые в коробке зла»).
f.wicked_whisker=Ус, добытый у великого героя племени Кат, Маргрела. Традиционно их носили в качестве оберега от магии Оулайта, но теперь они символизируют торжество добрых магических искусств над злом.
f.wild_buster=Пистолет, созданный путем алхимии из закаленной панцирной оболочки тортодрона. Во время его использования можно почувствовать яростную энергию внутри, которая только и ждет, чтобы быть высвобожденной.
f.wild_dust=Порция специальной пищи, любимой боевыми спрайтами, глубоко связанными с природным порядком великой дикой природы.
f.wild_hunting_blade=Легендарный клинок, которого боятся даже самые могучие волверы и хромалиски.
f.wild_mote=Небольшой кусочек специальной пищи, которую любят боевые спрайты, глубоко связанные с природным порядком великой дикой природы.
f.wild_orb=Блестящий шар из специальной пищи, которую любят боевые спрайты, глубоко связанные с природным порядком великой дикой природы.
f.wild_shell=Щит, созданный с помощью алхимии из закаленной панцирной оболочки. Он достаточно прочен, чтобы при ударе притупить желейный шип.
f.wild_star=Идеальное воплощение особого корма, которым питаются боевые духи, тесно связанные с природным порядком великой дикой природы.
f.wild_stone=Концентрированный кусок особой пищи, любимой боевыми духами, глубоко связанными с природным порядком великой дикой природы.
f.wildfire=Элитный пистолет, способный преподнести врагу на поле боя огромный сюрприз, поскольку его небольшие заряды энергии превращаются в бушующие лесные пожары. Выстрелы Wildfire становятся мощнее по мере того, как они пролетают все дальше.
f.winged_helm=Шлем, дизайн которого вызывает ассоциации с почти небесной красотой.
f.winmillion=Богато украшенный клинок, который при каждом взмахе выбрасывает вперед энергетические заряды. Известны случаи, когда неопытные пользователи порезались, впервые тренируясь с ним.
f.winter_grave=Невероятно мощная ручная пушка, чье прозвище не должно удивлять никого, кто случайно посмотрит на нее с неправильного конца. Заряженный выстрел может пробить даже нескольких врагов.
f.winter_onesie=Идеальная пижама для раздачи подарков или терпеливого ожидания появления Импостоклауса.
f.winter_pullover=Не слишком стильный свитер для снежного сезона. Идеальный свитер, чтобы позорить как свою семью, так и товарищей по гильдии.
f.winterfest_coat=Невероятно мягкий и модный зимний костюм, излучающий чудесную атмосферу Зимнего фестиваля. Он дает понять всем, что когда дело доходит до праздников, вы настроены серьезно.
f.winterfest_table=Стильный антикварный столик с тарелкой печенья, приготовленной для Импостклауса.
f.winterfest_tree=Великолепная спиралеобразная елка, украшенная в духе Зимнего фестиваля. По преданию, Импостклаус оставляет подарки тем, кто вел себя хорошо в течение года, а тем, кто был непослушным, дарит подарки, наполненные желе. Некоторые считают, что это единственная причина враждебности хромалисков.
f.wise_owlite_shield=Не нужно быть известным ученым-оулайтом, чтобы понять, что защищаться щитом — отличная идея.
f.wizard_box=Содержит один из различных уникальных, странных и удивительных предметов волшебников. Предметы выбираются случайным образом. Для открытия ключ не требуется.
f.wolver_cap=Яркая шапка, сделанная из значительно менее яркой шкуры росомахи.
f.wolver_coat=Толстая одежда для защиты вашей шкуры, сделанная из шкуры росомахи, которая не смогла защитить свою.
f.wolver_mask=Простая маска, сделанная из шкуры росомахи.
f.wooly_onesie=Чешущийся, но теплый комплект пижамы для рыцарей, который можно носить ночью. {0}
f.wooly_pullover=Стильный свитер для сезона перед снегом. {0}
f.woven_pathfinder_armor=Гибкий доспех, созданный для обеспечения подвижности и пронизанный волокнами слизи, защищающий от колючих и шипастых противников.
f.woven_pathfinder_helm=Гибкий шлем, созданный для обеспечения подвижности и пронизанный волокнами слизи, защищающий от колючих и шипастых противников.
f.woven_sentinel_armor=Доспехи, пронизанные вплетенными волосами росомахи, защищающие даже от самых суровых погодных условий.
f.woven_sentinel_helm=Шлем, пронизанный вплетенными волосами росомахи, защищающий даже от самых суровых погодных условий.
f.woven_shade_armor=Свободный доспех, позволяющий владельцу пробираться сквозь тени и нападать на ничего не подозревающих врагов.
f.woven_shade_helm=Свободный шлем, позволяющий владельцу пробираться сквозь тени и нападать на ничего не подозревающих врагов.
f.wrapping_paper=Упакуйте предмет в эту декоративную подарочную коробку и добавьте личное послание.
f.wrench_wand=Тяжёлый ручной инструмент, любимый гремлинами. Он подходит как для затягивания болтов, так и для раскалывания черепов.
f.wyvern_scale_helm=Этот прочный шлем, изготовленный из чешуи редких механических чудовищ, устойчив даже к самым высоким температурам.
f.wyvern_scale_mail=Для ковки этой прекрасной брони, изготовленной из чешуи редких механических чудовищ, требуются экстремальные температуры.
f.wyvern_scale_shield=Колючий щит, выкованный из хитина чудовищ, обеспечивающий отличную защиту как от жара, так и от яда.
f.zapper=Модифицированный Proto Gun, дополненный электрическим зарядом низкой интенсивности.
f.zee_core=Едкая масса, извлеченная из слизистого нападающего. Ее аромат — отличное средство от бессонницы, а также от ночного чихания и насморка.
l.cant_open=Не открывается
l.inspect_pack=Этот рюкзак содержит все перечисленные ниже предметы.
l.needs_key={0} может открыть
l.needs_sprite=Для использования этого предмета необходимо выполнить задание 2–3-го ранга «Вечная связь».
l.requires_key=Для разблокировки требуется Серебряный ключ
