f.proto_sword=Маленький меч, выдаваемый всем новобранцам Спиральных Рыцарей.
f.pullover=Идеальный свитер как для вечеринок, так и для опасных приключений.
f.pulsar=Высокотехнологичное гремлинское оружие, первоначально разработанное для элитных отрядов солдат Железного Когтя. Снаряды Пульсара набирают мощь по мере удаления.
f.pummel_gun=Ударный Пистолет, должным образом модифицированный для боевого применения. Отдача от его заряженной атаки хорошо известна среди новобранцев.
f.pumpkin_bombhead_mask=Маска Бомбоголова с угрожающей гримасой, напоминающей великого тыквенного Короля Тыкв.
f.punch_gun=Инструмент аварийного спасения, используемый для вскрытия повреждённых десантных капсул, который прекрасно подходит и как мощное одноразовое стрелковое оружие.
f.punch_n_vise_room=Оживлённая комната, где Панч и Вайс помогут развязать и переработать ваше снаряжение.
f.punkin_cinnamug=Пенистая смесь тыкв и корицы, которая непременно обожжёт тех, кто не дождётся остывания этой кружки.
f.punkin_pie_pan=Горячий, дымящийся пирог из настоящих тыквят\! Не пригоден для рыцарского употребления — пожалуйста, утилизируйте в ближайшего друга.
f.punkin_pie_slice=Горячий, дымящийся кусок пирога.
f.punkin_sprout=Маленький росток, способный вырасти в величественную тыкву.
f.purring_cap=Любопытная шапочка в виде мяукота. Говорят, она дарует владельцу девять жизней.
f.pvp_bomb=Создаёт крестообразный взрыв, увеличивающийся с усилениями. Не требует зарядки для использования.
f.quicksilver_helm=Отличный шлем, изготовленный из бывшего Ртутника.
f.quicksilver_mail=Отличная кольчуга, изготовленная из бывшего Ртутника.
f.quilted_demo_helm=Шлем, уютно подбитый роскошным бодрящим стёганым материалом. Звуки изнутри слегка приглушены.
f.quilted_demo_suit=Костюм, уютно подбитый роскошным бодрящим стёганым материалом. Слегка попахивает потом.
f.quilted_hunting_cap=Гибкий шлем, подбитый роскошным бодрящим стёганым материалом. Пахнет животными.
f.quilted_hunting_coat=Гибкая куртка, подбитая роскошным бодрящим стёганым материалом. Пахнет затхлостью.
f.radiant_crystal=Редкая кристаллическая формация тепла, используемая для ковки оружия и снаряжения высших уровней. Жар внутри дик и загадочен, сверкая ярче любого природного пламени.
f.radiant_pulsar=Передовое оружие, предназначенное лишь для лучших и ярчайших бойцов Спирального Ордена. Снаряды Пульсара набирают мощь по мере удаления.
f.radiant_silvermail=Улучшенная Серебряная Кольчуга, которая, по преданию, ярко сияет даже в самый тёмный час.
f.radiant_sun_shards=Массивный кусок солнечно-заряженного Люминита с взрывным сюрпризом внутри. Дьяволиты ненавидят сюрпризы.
f.rage_caller=Праздничная хлопушка богов, вызывающая столп ярости с небес.
f.rageous_plate_mail=Легендарный доспех, по преданию, пропитывающий носителя яростью титанов.
f.raging_avenger_helm=Шлем небесных стражей, охраняющих королевство, сокрытое на вершине покрытой магмой горы.
f.raging_champion_helm=Шлем того, кто бросил вызов богам и сжёг врата небесного королевства.
f.raging_crusader_helm=Шлем мифических солдат, которые, по преданию, верхом на ярости мчатся в битву.
f.raging_dragon_helm=Зачарованный шлем в облике зверя, который, по мнению некоторых, испепелил мир своим уходом\: его ярость стала магмовым дождём, его дыхание — тайфуном.
f.raging_rider_mantle=Легендарный доспех, по преданию, носимый богом, который яростью высекал целые миры из камня.
f.raging_warrior_helm=Шлем легендарного мастера меча, столь яростного, что одна лишь его ярость могла сокрушить армии, восставшие против него.
f.raider_buckler=Лёгкий деревянный щит, блокирующий базовые атаки и позволяющий контратаковать быстрым ударом.
f.raider_helm=Безупречный рейдерский шлем, не считая пары вмятин.
f.raider_tunic=В этой куртке сокровища у вас под рукой.
f.raiders_axe=Изысканный огненный топор, ценимый рейдерами за универсальность.
f.raiders_hammer=Изысканный молот, пропитанный силой могучей бури — самое передовое, чем может быть тупое оружие.
f.raiders_sword=Рунный меч, который превратит ваших врагов в мясную нарезку.
f.raiment=Длинное, струящееся боевое одеяние, лучше всего дополняемое парой ангельских крыльев.
f.ranger_signal_flare=Сигнальная ракета, вызывающая ближайшего Разведывательного Рейнджера для огневой поддержки.
f.raptor=Древний пистолет, зачарованный для уничтожения дьявольских созданий Подземного Мира. Подобно своему тёзке, его пули летят стремительно и разят с убийственной силой.
f.razor_ribbon=Помните\: при обращении с подарочными коробками гринчлинов всегда надевайте латные рукавицы.
f.reaper_rib=Кость, почерневшая от нечестивости своего бывшего обладателя.
f.recover_accessory=Билеты на аксессуары можно обменять у Бешамеля на Базаре Хейвена.
f.red_saber=Сабля цвета палящего солнца, вручаемая рыцарям, проявившим образцовую храбрость в прошлых операциях.
f.red_shard=Осколок Кримсонита, слишком мелкий для запитки врат, но весьма пригодный в алхимии.
f.redwood=Прочный кусок добротного необработанного дерева. Обычно используется для изготовления шкафов.
f.rename_guild=Позволяет выбрать новое имя для вашей гильдии. Может использоваться только главой гильдии и уничтожается после применения.
f.rename_knight=Позволяет выбрать новое имя для вашего рыцаря. Уничтожается после применения.
f.replica_mask=Пластиковая маска {0}, созданная в честь Фестиваля Тёмного Урожая. Не очень качественная и со временем разваливается.
f.reset_star=Особая пища для спрайтов, сбрасывающая примененные очки навыков и отменяющая выбор ультимативного навыка.
f.riftlocker=Смертоносное стрелковое оружие, по преданию, способное пробить тяжёлую броню одним выстрелом. Это оружие сыграло решающую роль во время осады Изоры, сокрушив боевые машины Морай.
f.rigadoon=Ошеломляющая сабля, которая застанет вашего противника врасплох.
f.robo_wrecker=Подобный гаечному ключу инструмент, предположительно гремлинского происхождения. Его истоки загадочны, но способность уничтожать конструктов прекрасно задокументирована.
f.rock_jelly_helm=Крепкий колпак, скроенный из зазубренного желе.
f.rock_jelly_mail=Это студенистое снаряжение сочетает прочность камня с колющей защитой липкой слизи. Удивительно, что вам удалось избить желе, из которого оно сделано.
f.rock_jelly_shield=Изготовлен из самых твердолобых склизких образцов. Также служит аварийным источником калорий для заплутавших рыцарей.
f.rock_salt=Небольшое количество минерала Часового Механизма, не пропитанного абсолютно ничем. Он жадно поглощает окружающие эссенции и вкусы, что делает его незаменимым в кулинарии и бичом слизней повсюду.
f.rock_salt_bomb=Осколочная бомба из небольшого заряда взрывчатки в оболочке из каменной соли. Не рекомендуется для кухонного применения.
f.rocket_hammer_1=Спроектированный самим Мастером Войны Сирусом, этот коварный гремлинский молот оснащён ракетным двигателем, способным выбросить владельца вперёд сокрушительным ударом. Данная модель — прототип.
f.rocket_hammer_2=Спроектированный самим Мастером Войны Сирусом, этот коварный гремлинский молот оснащён ракетным двигателем, способным выбросить владельца вперёд сокрушительным ударом. Данная модель — более стабильная версия, взрывавшая гремлинов-испытателей значительно реже прототипа.
f.rocket_hammer_3=Спроектированный самим Мастером Войны Сирусом, этот коварный гремлинский молот оснащён ракетным двигателем, способным выбросить владельца вперёд сокрушительным ударом. Эта финальная, усовершенствованная модель поистине достойна Великого Арсенала великого Мастера Войны Сируса.
f.rocket_sprocket=Прочная звёздочка, используемая механизмами, стреляющими снарядами.
f.rocky_core=Восхитительное мармеладное лакомство с непробиваемой каменной оболочкой. Немало рыцарских зубов было потеряно при попытке добраться до тягучей начинки.
f.roly_poly=Обыкновенная мокрица.
f.ronin_gasa=Потерянная соломенная шляпа, некогда принадлежавшая странствующему мастеру меча без господина.
f.round_helm=Изящный шлем, только и ждущий, чтобы его украсили аксессуарами.
f.royal_core=Сладко пахнущий комок слизи, собранный с особо благородного образца.
f.royal_jelly_crown=Дерзко-королевские регалии, недавно воссозданные из царственно-смолистых останков.
f.royal_jelly_mail=Злостно-вязкий комплект брони, кропотливо созданный из благороднейших образцов дрожащей слизи.
f.royal_jelly_shield=Первоклассная защита для претендентов на желейный трон.
f.royal_skewer=Зазубренный, бритвенно-острый шип от одного из мощнейших слизней Крейдла. Извлечённый из слизня, он становится хрупким и со временем обращается в прах.
f.rugged_robo_wrecker=Улучшенный робо-крушитель, помогший множеству конструктов превратиться в дымящиеся кучи металлолома.
f.rust_cool=Медно-синий
f.rust_neutral=Медно-угольный
f.rust_warm=Медно-жёлтый
f.sacred_ghost_armor=Призрачный доспех для тех, кто охотится на привидений.
f.sacred_ghost_helm=Жуткий шлем для тех, кто охотится на привидений.
f.sacred_guerrilla_armor=Крепкий доспех для тех, кто хочет одолеть зверей.
f.sacred_guerrilla_helm=Шлем для тех, кто хочет одолеть зверей.
f.sacred_hazard_armor=Крепкий доспех для тех, кто хочет пострелять слизней.
f.sacred_hazard_helm=Прочный шлем для тех, кто охотится на слизней.
f.sacred_hex_armor=Призрачный доспех для тех, кто метит в инфернальных.
f.sacred_hex_helm=Призрачный шлем для тех, кто метит в инфернальных.
f.sacred_keeper_armor=Лазурный доспех для тех, кто хочет крушить робо.
f.sacred_keeper_helm=Лазурный шлем для тех, кто хочет крушить робо.
f.sacred_pathfinder_armor=Усиленный доспех с двойной подкладкой, гарантированно останавливающий самых острых врагов.
f.sacred_pathfinder_helm=Усиленный шлем, гарантированно останавливающий самых острых врагов.
f.sacred_sentinel_armor=Сияющее защитное двойное плетение для изоляции от неуправляемых стихий.
f.sacred_sentinel_helm=Сияющее защитное двойное плетение для изоляции от неуправляемых стихий.
f.sacred_shade_armor=Тенистый доспех, способный пережить всё, что выползет из теней.
f.sacred_shade_helm=Шлем, способный пережить всё, что выползет из теней.
f.sacred_wraith_armor=Надёжный доспех для тех, кто охотится на гремлинов.
f.sacred_wraith_helm=Заточенный шлем для тех, кто охотится на гремлинов.
f.salamander_mask=Маска, изготовленная из шкуры саламандры.
f.salamander_suit=Костюм, изготовленный из шкуры саламандры. Дарует владельцу природную сопротивляемость зверя к огню.
f.sallet=Обтекаемый шлем, полюбившийся бойцам передовой.
f.savage_tortofist=Стрелковое оружие, алхимизированное из закалённого панциря тортодрона. Владея им, вы ощущаете первобытную энергию разъярённой стаи вольверов, рвущуюся на волю.
f.savage_tortoise=Щит, алхимизированный из закалённого панциря тортодрона. Даже разъярённая стая вольверов с трудом пробьёт его усиленные пластины.
f.scalding_hot_cocoa=Обжигающая волна сладкого разрушения ожидает любого врага, потянувшегося к этой кружке до её остывания.
f.scale_helm=Шлем, изготовленный из чешуи ползучего зверя.
f.scale_mail=Мерцающий набор змеиных чешуй, вплетённых в доспех.
f.scale_shield=Весьма стильный щит из ящеричных чешуй. Хотя в остальном он довольно слаб, плотное переплетение чешуй делает его крайне устойчивым к колющему урону.
f.scarlet_shield=Щит, найденный в Алой Крепости. Дарует владельцу дополнительное здоровье. Носящие его говорят, что порой слышат слабое биение сердца, доносящееся изнутри.
f.scary_skelly_mask=Улучшенная Скелетная Маска, пропитанная стихией страха. Надев её, вы чувствуете, как волоски на затылке встают дыбом.
f.scary_skelly_shield=Маленький жуткий щит для защиты от теней.
f.scary_skelly_suit=Улучшенный Скелетный Костюм, пропитанный стихией страха. В комплекте — подходящие штаны, которые невозможно испугать.
f.schemer_scrap=Обрывок чертежа гремлинских интриганов для постройки их механических чудовищ. Соберите достаточно обрывков и немного скотча — и сами соберёте железную машину смерти\!
f.scintillating_sun_shards=Крупный кусок солнечно-заряженного Люминита, начинённый мощной взрывчаткой. Пиротехническое шоу при детонации поистине ошеломительно.
f.scissor_blades=Заказной Клинок Левиафана, спроектированный Бешамелем. Хотя эти лезвия обычно используются для создания стильных аксессуаров для доспехов, говорят, они достаточно мощны, чтобы рассечь каменную породу.
f.scrap_metal=Выброшенный кусок металла, легко поддающийся переработке.
f.scythe=Старый фермерский инструмент, отставленный на сезон, — этот клинок также превосходно жнёт ваших врагов.
f.sealed_sword=Загадочный меч с великим нераскрытым потенциалом. Он гудит от сырой мощи.
f.searing_edge=Лёгкий клинок, поджигающий врагов при ударе. Технология, предохраняющая рукоять от возгорания, продвинутее самого меча.
f.seerus_fragment_1=Расколотый фрагмент маски, некогда носимой Мастером Войны Сирусом, добытый при осаде его Великого Арсенала.
f.seerus_fragment_2=Повреждённый фрагмент маски, некогда носимой Мастером Войны Сирусом, добытый при осаде его Великого Арсенала.
f.seerus_fragment_3=Совершенный фрагмент маски, некогда носимой Мастером Войны Сирусом, добытый при осаде его Великого Арсенала.
f.sentenza=Древнее стрелковое оружие, выкованное из теневой стали. Говорят, им владел некий злодей, обладавший «ангельскими глазами».
f.sentinel_armor=Доспех, наделённый силой отражать различные недуги, с которыми рыцари сталкиваются при исполнении долга.
f.sentinel_helm=Шлем, наделённый силой отражать различные недуги, с которыми рыцари сталкиваются при исполнении долга.
f.seraphic_helm=Прекрасный кольчужный капюшон, побуждающий владельца разить зло с праведной яростью.
f.seraphic_mail=Прекрасная кольчужная рубашка, побуждающая владельца разить зло с праведной яростью.
f.seraphynx_pod=Капсула со спрайтом, содержащая Серафинкса 1-го уровня. \n\nСерафинкс — боевой спрайт, воплощающий божественный свет. Его навыки сосредоточены на поддержке рыцарей в бою с помощью защиты и исцеления.
f.serene_armor=Древний доспех, выветренный стихиями. Стоя в нём, вы ощущаете далёкие толчки, вызванные миграцией бесчисленных тортодронов, странствующих к неведомым землям.
f.serene_helm=Древний, стойкий шлем, покрытый мягким слоем мха. Внутри его прохладного каменного нутра вы слышите тихую и успокаивающую песнь, сотканную из шелеста ветров далёких стран.
f.shade_armor=Доспех, пропитанный тёмной материей, позволяющей владельцу метко стрелять и нападать на врагов из теней.
f.shade_helm=Шлем, пропитанный тёмной материей, позволяющей владельцу заставать врагов врасплох, стреляя прямо из теней.
f.shadow_blaster=Улучшенный бластер, модифицированный для стрельбы теневыми зарядами.
f.shadow_driver=Высокотехнологичное алхимическое оружие, стреляющее мощными теневыми снарядами, многократно расщепляющимися при попадании.
f.shadow_dust=Порция особой пищи, любимой боевыми спрайтами, черпающими силу в запретных тёмных искусствах.
f.shadow_key=Загадочный ключ, дарующий отряду вход в Теневые Логова. Теневой Ключ уничтожается после использования.
f.shadow_mote=Маленький кусочек особой пищи, любимой боевыми спрайтами, черпающими силу в запретных тёмных искусствах.
f.shadow_orb=Блестящая сфера из особой пищи, любимой боевыми спрайтами, черпающими силу в запретных тёмных искусствах.
f.shadow_star=Идеальная кристаллизация особой пищи, любимой боевыми спрайтами, черпающими силу в запретных тёмных искусствах.
f.shadow_steel=Исключительный металл, пропитанный ползучей тьмой Подземного Мира.
f.shadow_stone=Концентрированный кусок особой пищи, любимой боевыми спрайтами, черпающими силу в запретных тёмных искусствах.
f.shadowsun_slicker=Зловещий плащ, по преданию, таящий великую силу, что питается непрощёнными грехами владельцев.
f.shadowsun_stetson=Щегольская шляпа для дуэлянтов, предпочитающих работать в полночь, а не в полдень.
f.shadowtech_alchemer=Алхимическое стрелковое оружие, стреляющее снарядами из концентрированной тени, расщепляющимися при попадании.
f.shadowtech_alchemer_mkii=Улучшенный Алхемер, выпускающий теневые заряды с повышенной скорострельностью.
f.shako=Церемониальная шапка, носимая рыцарями на особо торжественных мероприятиях.
f.shard_bomb=Осколочная бомба из небольшого заряда взрывчатки в оболочке из истощённого Кримсонита. Истощённый или нет, эта штука разбрасывает серьёзную шрапнель.
f.sharp_fang=Особо острый премоляр. А может, клык?
f.shining_crystal=Редкая кристаллическая формация тепла, используемая для ковки оружия и снаряжения высших уровней. Жар внутри горит подобно звезде, сияющей в ночном небе.
f.shining_ward=Священный щит, защищающий владельца от зла.
f.ship_wheel=Как это вообще может быть хорошим щитом? Откуда оно взялось? Осторожно, матрос — задашь такие вопросы и прогуляешься по доске.
f.shivermist_buster=Изначально использовавшийся для мгновенной заморозки скоропортящихся припасов, Шиверный Бустер куда приятнее применять для мгновенной заморозки монстров на месте.
f.shock_barrier=Окружает вас сферами молнии, способными поразить врагов разрядом.
f.shock_raider_helm=Простой шлем, защищающий владельца от стихий и врагов.
f.shock_raider_tunic=Антистатический мех выстилает эту рейдерскую куртку.
f.shockburst_brandish=Улучшенный Брандиш, пропитанный стихией молнии.
f.shocking_edge=Лёгкий клинок, способный нанести жертвам болезненный электрошок. Молодые рыцари любят размахивать ими на праздниках.
f.shocking_salt_bomb=Крупный кусок каменной соли, начинённый мощной взрывчаткой. В целях обогащения этот кусок соли был насыщен опасным количеством электричества. Подождите, что?
f.shogun_helmet=Величественный шлем, который носили воины, давным-давно объединившие страну под знаменем восходящего солнца.
f.shroom_cap=Небольшая уступка, зато вы будете неотразимы, как на подбор, в этой грибочковой шапочке.
f.silent_nightblade=Выкованный из самых дьявольских материалов Крейдла, этот чернильный клинок может взорваться дьявольской яростью.
f.silver_coil=Электромагнитный механизм из невероятно проводящего металла.
f.silver_key=Особый ключ, открывающий любой сундук. Уничтожается после использования.
f.silver_solstice_ring=Зачарованное кольцо, воплощающее дух Солнцестояния. Его искрящийся серебряный блеск ярче всего сияет зимними месяцами.
f.silvermail=Прочная, но лёгкая броня для рыцарей, поклявшихся выслеживать и уничтожать нежить, где бы она ни таилась.
f.silversix=Загадочный антиквариат с великолепной серебряной отделкой — говорят, этими пистолетами владели «священники-стрелки» в ныне забытые времена.
f.silverweave=Отрез неброской ткани, изящно переплетённой с драгоценным металлом. Вкусно-помпезная, но разумно-защитная.
f.simple_orb=Редкий инкапсулированный элемент, применяемый в алхимической трансмутации. Хотя и неочищенная, эта сфера может быть использована для создания более мощных предметов.
f.sinful_brew=Отвратительный напиток, любимый всеми бесами. Несмотря на повсеместное распространение, он официально запрещён в Подземном Мире — маркетинговый ход.
f.sinister_skelly_mask=Улучшенная Скелетная Маска, способная напугать любых бесхребетных монстров, бродящих по Часовому Механизму.
f.sinister_skelly_shield=Щит, населённый доброжелательным призраком. Поможет вам выстроить одухотворённую оборону от теней.
f.sinister_skelly_suit=Костяной барьер, пульсирующий злобой. Скептикам в отношении его силы полагается хорошая взбучка.
f.skelly_mask=Жуткая маска, годная как для запугивания детей, так и для защиты от теневых атак.
f.skelly_shield=Бесовский щит, лучше всего подходящий для блокировки дурной энергии.
f.skelly_suit=Леденящий душу наряд, естественным образом отталкивающий теневые атаки.
f.skolver_cap=Искусно выделанная шкурная шапка — идеальная корона для любого короля диких просторов.
f.skolver_coat=Вершина одежды из шкуры вольвера. Эта куртка мастерски скроена, чтобы придать вашим ближним атакам дополнительную мощь.
f.slime_coin_gold=Скользкий шекель, выделенный протоплазматической алхимией — эта монета используется только в Золотом Казино Слизней.
f.slime_key=Скользкий ключ, открывающий только Слизневый Сундук. Уничтожается после использования.
f.slime_lockbox=Скользкий, слизистый сундук, выигранный в Золотом Казино Слизней. Содержит один из множества особых предметов. Открывается Слизневым Ключом или Серебряным Ключом.
f.slime_slasher=Крепкая лопата, модифицированная для нанесения дополнительного урона монстрам семейства слизней.
f.slime_trinket=Любопытный кружок, покрытый окаменевшей слизью.
f.slumber_smogger=Алхимическая бомба, окутывающая территорию усыпляющим агентом.
f.slumber_smogger_mkii=Усыпляющий Смоггер, модифицированный для распыления сонного тумана на обширной территории.
f.slumber_squall=Мощная алхимическая бомба, создающая густой туман из сонной мглы.
f.snarble_barb=Звериный клинок, способный выстреливать скользкими шипами во всех, кто осмелится противостоять его владельцу.
f.snarbolax_cap=Теневая шапка из шкуры зловещего Снарболакса. Даже смотреть на неё слишком пристально опасно.
f.snarbolax_coat=Теневой костюм из шкуры зловещего Снарболакса. Даже смотреть на него слишком пристально опасно.
f.snarbostuffing=Плотный пушистый наполнитель из особого полимера, не разрушающегося при контакте с проклятым мехом Снарболакса. Идеален для создания трофеев или очаровательных проклятых мягких игрушек.
f.snow_hat=Уютная зимняя шапка, согревающая вас, охотитесь ли вы на замёрзших слизней или просто растворяете зефир в горячем шоколаде.
f.solid_cobalt_armor=Прочный комплект Кобальтовой Брони, перекованный для дополнительного комфорта и защиты.
f.solid_cobalt_helm=Прочный Кобальтовый Шлем с улучшенными внутренними системами и внешним усилением.
f.somnambulists_totem=Обычный предмет с необычной текстурой и весом — результат частичного переваривания Слумбарго.
f.sorcerer_robe=Изысканная мантия, которую носят могущественные колдуны. И один парень по имени Боб.
f.soul_dust=Прах усопших. Сохраняет ли он ещё хоть крупицу души — покажет время.
f.spark_life=Мощный заряд чистой энергии, мгновенно воскрешающий вас или члена отряда.
f.spark_plug=Маленькая механическая деталь, отлично заводящая мотор конструкта.
f.spell_book=Старый словарь, в котором, похоже, содержится немало заклинаний.
f.spike_shower=Мощное устройство, предназначенное для разрывания противников с рычанием.
f.spine_cone=Свирепое устройство, буквально лопающееся от шипов.
f.spiral_brigandine=Лёгкая броня, выдаваемая всем новобранцам Спиральных Рыцарей.
f.spiral_cloak=Лёгкая броня, выдаваемая всем новобранцам Спиральных Рыцарей.
f.spiral_cool=Спирально-синий
f.spiral_crescent_helm=Лёгкий шлем, выдаваемый всем новобранцам Спиральных Рыцарей.
f.spiral_cuirass=Лёгкая броня, выдаваемая всем новобранцам Спиральных Рыцарей.
f.spiral_culet=Лёгкая броня, выдаваемая всем новобранцам Спиральных Рыцарей.
f.spiral_demo_helm=Крепкий шлем для рыцарей со взрывными наклонностями.
f.spiral_demo_suit=Крепкая броня для рыцарей со взрывными наклонностями.
f.spiral_draped_armor=Лёгкая броня, выдаваемая всем новобранцам Спиральных Рыцарей.
f.spiral_flak_jacket=Лёгкая броня, выдаваемая всем новобранцам Спиральных Рыцарей.
f.spiral_hood=Лёгкий шлем, выдаваемый всем новобранцам Спиральных Рыцарей.
f.spiral_neutral=Спирально-белый
f.spiral_pith_helm=Лёгкий шлем, выдаваемый всем новобранцам Спиральных Рыцарей.
f.spiral_plate_helm=Тяжёлый железный шлем, способный выдержать оглушающие удары.
f.spiral_plate_mail=Тяжёлая железная броня, способная выдержать массу обычных атак.
f.spiral_round_helm=Лёгкий шлем, выдаваемый всем новобранцам Спиральных Рыцарей.
f.spiral_sallet=Лёгкий шлем, выдаваемый всем новобранцам Спиральных Рыцарей.
f.spiral_scale_helm=Лёгкий кольчужный шлем, слегка защищающий от колющих ударов.
f.spiral_scale_mail=Прочная лёгкая кольчуга, обеспечивающая защиту от колющих атак.
f.spiral_soaker=Смертоносный водяной пистолет, способный промочить даже самых засушливых врагов.
f.spiral_tailed_helm=Лёгкий шлем, выдаваемый всем новобранцам Спиральных Рыцарей.
f.spiral_warm=Спирально-красный
f.spiraltail_mail=Простая обезьянья кольчуга, обычно носимая на парадах для привлечения благоденствия и удачи.
f.spiraltail_mask=Простая обезьянья маска для встречи нового года. Ваши хитрые проделки непременно станут зрелищем.
f.spitfire=Модифицированный Прото-пистолет с низкоинтенсивной огненной вспышкой.
f.splinter_bomb=Осколочная бомба из небольшого заряда взрывчатки в оболочке из синтетического минерала. Этот хрупкий и иначе бесполезный материал идеален для того, чтобы серьёзно занозить врагов.
f.spoiled_treat=Ужасная боль в животе ожидает тех, кто отведает прогоркших яств давнего Зимнего Фестиваля.
f.spur=Механизированный меч со встроенным мотором, генерирующим энергетические всплески при использовании.
f.stagger_storm=Хотя изначально Спиральный Орден разработал его для безвредного усмирения опасных видов, что вы делаете с врагами, попавшими в бурю — всецело ваше решение.
f.starlit_demo_helm=Светящийся шлем, укреплённый против снотворных дымов. Внутри удивительно мягко.
f.starlit_demo_suit=Продвинутый подрывной костюм, устойчивый к сильнейшим усыпляющим туманам. Мягкое свечение на удивление бодрит.
f.starlit_hunting_cap=Продвинутая охотничья шапка — светящаяся и пушистая — устойчивая к сильнейшим усыпляющим туманам.
f.starlit_hunting_coat=Продвинутая куртка охотника, пропитанная звёздным светом, которая не даст вам заснуть, даже нежа в пуховом комфорте.
f.static_capacitor=Взрывное устройство гремлинского происхождения, создающее смертельное поле электричества.
f.static_clinger=Латентная нить энергии, парящая по Часовому Механизму, часто прилипающая к волосам и одежде. Слишком велика для дистилляции в Энергию, но весьма полезна в алхимии.
f.static_diskgun=Шокирующе мощное стрелковое оружие, порождающее бурю электризованных дисков. Диски Дискогана возвращаются, достигнув апогея.
f.static_edge=Модифицированный Прото-меч, способный генерировать низкоинтенсивный электрический заряд.
f.static_flash=Прото-бомба, модифицированная для генерации небольших электрических разрядов при детонации.
f.steamvalve_mask=Хотя ныне устаревшие, эти особые герметичные маски когда-то использовались солдатами в средах с экстремальной атмосферой. Клапан на задней стороне надо было повернуть именно так, иначе голова солдата, в общем, схлопывалась.
f.stellar_sentinel_helm=Этот шлем некогда носили изоранские звездоплаватели давно минувших эпох, стоявшие на страже межзвёздных операций. Надев его, вы чувствуете, будто постигаете механизмы вселенной.
f.stellar_sentinel_suit=Этот костюм некогда носили изоранские звездоплаватели давно минувших эпох, стоявшие на страже межзвёздных операций. Надев его, вы чувствуете, будто могли бы нырнуть в сердце звезды.
f.stoic_buster=Стрелковое оружие, алхимизированное из панциря тортодрона. Владея им, вы ощущаете тихое дуновение ветра и можете призвать громыхающую бурю, следующую за ним.
f.stoic_shell=Щит, алхимизированный из панциря тортодрона. Владея им, вы ощущаете тихое дуновение ветра и можете призвать громыхающую бурю, следующую за ним.
f.stone_tortoise=Большой, мощный щит в виде панциря существа. Его грозный вес может затруднить атаку.
f.stop_sign=Странный щит, способный блокировать множество статусных атак. Однако он обладает сверхъестественной силой, заставляющей владельца замирать при укрытии за ним.
f.storm_avenger_helm=Шлем небесных стражей, охраняющих королевство, сокрытое на вершине заснеженной горы.
f.storm_caller=Праздничная хлопушка богов, вызывающая удар молнии с небес.
f.storm_champion_helm=Шлем того, кто бросил вызов богам и штурмовал врата небесного королевства. Некоторые говорят, что раскаты грома — вечное эхо её осады.
f.storm_chaser=Редкий элементаль, парящий в грозовых тучах. Их электрическое гудение создаёт почти мелодичный хор, едва различимый между раскатами грома.
f.storm_crusader_helm=Шлем мифических солдат, которые, по преданию, верхом на молнии мчатся в битву.
f.storm_dragon_helm=Зачарованный шлем в облике зверя, который, по мнению некоторых, создал мир своим уходом\: его пламя стало солнцем, его кости — горами.
f.storm_driver=Латентный заряд, проходящий через это превосходное оружие, достаточно силён, чтобы причинить дискомфорт стрелку, и невыносимый дискомфорт жертве.
f.storm_rider_mantle=Легендарный доспех, по преданию, носимый богом, который молнией высекал целые миры из камня.
f.storm_warrior_helm=Шлем легендарного мастера меча, столь искусного, что мог рассечь молнию в момент удара о землю.
f.stranger_cap=Шапка, некогда носимая одним из загадочных Странников. Местные снипы, похоже, тянутся к владельцу.
f.stranger_hat=Шляпа, некогда носимая одним из загадочных Странников. В каждом шве, похоже, прячутся маленькие цветные перья.
f.stranger_robe=Мантия, некогда носимая одним из загадочных Странников. Местные снипы, похоже, тянутся к владельцу.
f.strike_needle=Планы модифицировать Ударную Иглу для небоевого применения были свёрнуты после того, как новобранец случайно изрешетил койку лейтенанта Ферона.
f.striker=Быстрый меч, полюбившийся членам более скрытных подразделений Спирального Ордена.
f.stun_gun=Прото-пистолет, модифицированный для оглушения монстров. Оглушённые монстры двигаются и атакуют медленнее обычного.
f.style_kit={0}  Этот предмет будет уничтожен, но вы сможете повторно применить этот модификатор к рыцарю, используя набор стиля.
f.sudaruska=Грубое оружие для рыцаря, готового обменять стиль и шик на нелепые объёмы тупой травмы.
f.sulfur=Зловонный, стигийский, сернистый осколок, часто встречающийся в Подземном Мире.
f.sun_shards=Осколочная бомба из небольшого заряда взрывчатки в оболочке из солнечно-заряженного Люминита. Что бы вы ни делали, не смотрите прямо на неё.
f.sun_silver=Исключительный металл, пропитанный сияющим светом небес.
f.sunset_duster=Крепкий кожаный наряд для пилигрима с истинной закалкой.
f.sunset_stetson=Крепкая шляпа для стрелков, которая обойдётся вам не дороже пригоршни крон.
f.super_blast_bomb=Улучшенная Бласт-Бомба, сочетающая нестабильный источник тепла с непроверенной взрывчаткой ради одного серьёзно опасного комплекта.
f.super_blaster=Сверхзаряженный Бластер, отлично подходящий для продолжительных экспедиций вглубь Часового Механизма.
f.super_brawl_crown=Вручается чемпиону Супер Драки\!
f.super_crystal_bomb=Осколочная бомба, набитая ещё большим количеством сплава. Применять непосредственно к голове врага.
f.super_dark_matter_bomb=Осколочная бомба, набитая ещё большим количеством Тёмной Материи. Сколько Тёмной Материи — перебор? Столько.
f.super_fire_barrier=Окружает вас мощными огненными сферами, способными поджечь врагов.
f.super_food=Накормите этим спрайта, чтобы наполнить его жар до максимума\!
f.super_freeze_barrier=Окружает вас мощными ледяными сферами, способными заморозить врагов на месте.
f.super_poison_barrier=Окружает вас мощными токсичными сферами, способными искалечить врагов.
f.super_shard_bomb=Осколочная бомба, набитая ещё большим количеством истощённого Кримсонита. Лучшее лекарство для воинственного существа — кристалл прямо в череп.
f.super_shock_barrier=Окружает вас мощными сферами молнии, способными поразить врагов разрядом.
f.super_slime_slasher=Лопата с убийственной заточкой, особенно хорошо подходящая для борьбы со слизнями в окопах.
f.super_splinter_bomb=Осколочная бомба, набитая ещё большим количеством синтетического минерала. Также годится для шинковки овощей, если вы не против выковыривать случайные кристаллы из зубов.
f.super_stun_gun=Улучшенный Оглушитель, чей мощный залп отобьёт охоту даже у самых настырных монстров Часового Механизма.
f.supernova=Разрушения, оставляемые этим непревзойдённым пистолетом, отнюдь не туманны. Снаряды Сверхновой набирают мощь по мере удаления.
f.supply_deluxe_compact=Набор полезных припасов, ценимый исследовательскими группами Спиральных Рыцарей глубоко в Часовом Механизме. Этого люксового комплекта хватит целому отряду на неделю.
f.supply_pack_compact=Набор полезных припасов, ценимый исследовательскими группами Спиральных Рыцарей глубоко в Часовом Механизме. Этого компактного комплекта хватит одному рыцарю на неделю.
f.supply_standard_compact=Набор полезных припасов, ценимый исследовательскими группами Спиральных Рыцарей глубоко в Часовом Механизме. Этого стандартного комплекта хватит паре рыцарей на неделю.
f.surge_breaker_armor=Надёжный доспех, мастерски переносящий самые шокирующие откровения. Неплох и в сопротивлении электрическим атакам.
f.surge_breaker_helm=Надёжный шлем, призванный оберегать ваш череп от неприятных разрядов.
f.surge_breaker_shield=Надёжный щит, помогающий вам сохранять заземлённость в бою.
f.sweet_dreams=Не обманывайтесь пушистой внешностью этого оружия. Оно бьёт куда сильнее, чем кажется. Идеальное оружие против того, что бродит во тьме.
f.swift_flourish=Улучшенный Флориш для рыцарей, которые всегда добивают врагов с толикой шика.
f.swiftstrike_buckler=Маленький простой щит, позволяющий владельцу проводить быстрые атаки.
f.swimsuit_trunks=Пара спиральных плавок для прибрежных экспедиций и солнечных развлечений.
f.swimsuit_wrap=Спиральное парео поверх сплошного купальника для прибрежных экспедиций и солнечных развлечений.
f.swordstone=Добротный кусок натурального камня, идеальный для заточки лезвия смертоносного клинка.
f.tabard_rose=Старинный вышитый табард, некогда принадлежавший Рыцарю Розы — священному ордену храбрых и особенно бравых героев, чьи многочисленные приключения стали темой множества легенд. Рыцари Розы считались непревзойдёнными фехтовальщиками, верившими, что их клинки подобны цветам их имени\: нежная красота, таящая безжалостное жало.
f.tailed_helm=Выразительный шлем, доказывающий, что два плюмажа всегда лучше одного.
f.teddy_bear_buckler=Высокотехнологичный энергетический щит, замаскированный под безобидного плюшевого мишку. Идеальный компаньон для защиты от порождений ночи.
f.tempered_calibur=Калибур, перекованный и закалённый по самым продвинутым методам оружейников Спирального Ордена.
f.the_ban_stick=Рази нечестивцев ломовой яростью.
f.the_bitter_end=Щит, носимый всеми членами Разведывательных Рейнджеров. Его название напоминает каждому Рейнджеру, в какой именно момент им дозволено опустить его в бою.
f.the_final_gasp=Щит, носимый всеми членами Алых Скаутов. Его название напоминает каждому Скауту, в какой именно момент им дозволено опустить его в бою.
f.thunderball=Сфера из чистого электричества, которая обычно обнаруживается на морском дне.
f.thunderous_plate_mail=Легендарный доспех, по преданию, пропитывающий носителя мощью небесного грома.
f.thwack_hammer=Бодрый гаечный ключ, отлично подходящий для разбора механических врагов.
f.thwacker_shield=Щит, переделанный гремлинами и используемый Тёмноклыковыми Молотильщиками. Подобно самим гремлинам, он устойчив к огню и электричеству. Рыцари, использующие эти щиты, утверждают, что с него невозможно полностью убрать налипшую шерсть.
f.ticket_unbind_0=Используйте этот билет у Освобождающей Кузницы, чтобы развязать предмет 0 звёзд.
f.ticket_unbind_1=Используйте этот билет у Освобождающей Кузницы, чтобы развязать предмет 1 звезды.
f.ticket_unbind_2=Используйте этот билет у Освобождающей Кузницы, чтобы развязать предмет 2 звёзд.
f.ticket_unbind_3=Используйте этот билет у Освобождающей Кузницы, чтобы развязать предмет 3 звёзд.
f.ticket_unbind_4=Используйте этот билет у Освобождающей Кузницы, чтобы развязать предмет 4 звёзд.
f.ticket_unbind_5=Используйте этот билет у Освобождающей Кузницы, чтобы развязать предмет 5 звёзд.
f.ticket_variants_1=Используйте этот билет у Вариантной Кузницы, чтобы сбросить варианты предмета на 1 случайный вариант.
f.ticket_variants_2=Используйте этот билет у Вариантной Кузницы, чтобы сбросить варианты предмета на 2 случайных варианта.
f.ticket_variants_3=Используйте этот билет у Вариантной Кузницы, чтобы сбросить варианты предмета на 3 случайных варианта.
f.ticktocktop=Достаточно сложностей, чтобы голова пошла кругом.
f.token_cake=Кусок торта — трофей победы над ордой Жутких Тортов. Шеф-повар Бискотти утверждает, что и эти трофеи, и инцидент, их породивший, официально никогда не происходили.
f.token_candy=Конфета, созданная в честь Фестиваля Тёмного Урожая. Можно обменять на Городской Площади Хейвена на различные костюмные маски.
f.token_core=Фрагмент странного материала, найденного в ядре Часового Механизма. Каждый фрагмент уникален по составу, подобно снежинкам. Эти фрагменты высоко ценятся Спиральной Штаб-квартирой, надеющейся постичь природу ядра через их изучение.
f.token_forge=Маленькая искорка сущностного духа технологий и прогресса. Чрезвычайно ценна для Спирального Ордена. Отнесите её Торговцу Жетонов на Базар Хейвена\!
f.token_grim=Маленькая искорка сущностного духа тьмы и разложения. Чрезвычайно ценна для Спирального Ордена. Отнесите её Торговцу Жетонов на Базар Хейвена\!
f.token_jelly=Обычно несомые лишь желейной знатью, эти мягкие самоцветы — официальная валюта желейных королевств. Хотя слизни их высоко ценят, большинство других существ просто едят их — они весьма вкусны.
f.token_krogmo=Монета, выдаваемая великим Королём Крогмо участникам его Колизея. Можно обменять на призы у Распорядителя Наград Колизея.
f.token_page=Осыпающаяся страница, вырванная из давно забытого гримуара муркрофтских архивов. Неподдающийся расшифровке язык на ней слабо светится в темноте, словно содержа силу в самих словах.
f.token_primal=Маленькая искорка сущностного духа природы. Чрезвычайно ценна для Спирального Ордена. Отнесите её Торговцу Жетонов на Базар Хейвена\!
f.token_roarmulus=Специальная плата, разработанная гремлинскими инженерами для усиления как рёва, так и хватки Близнецов-Рормулов.
f.token_snarbolax=Длинный, бритвенно-острый зуб, извлечённый из пасти Снарболакса — памятный знак торжества рыцаря над чудовищным охотником Сумеречных Диколесий.
f.token_spirit=Потусторонняя метка, наложенная на душу, захваченную таинственной Апокреей. Удаление метки позволяет пленённой душе вырваться из ужасного царства Апокреи.
f.token_vanaduke=Печать утраченного королевства Альмир, доказательство того, что её хранитель отважился на вечно пылающую бездну — Цитадель Огненной Бури.
f.token_winter=Крошечный список желаний одного из детей Эмберлита. Он означает, что вы исполнили их праздничные желания и спасли Зимний Фестиваль. Ну разве не согревает?
f.token_winter_wishlist=Этот список желаний к Зимнему Фестивалю был давно утерян. В нём указаны тёплые одежды для защиты от снега. Рэндольф наградит рыцарей со стопкой таких списков. Несите их ему и получите подарок.
f.torchstone=Маленький камень, постоянно тлеющий. Гремлины, патрулирующие Охладительные Камеры, иногда используют их как грелку для рук.
f.torpor_tantrum=Абсолютная сонная бомба. Как сказка на ночь, только более взрывная.
f.toxic_atomizer=Мощная алхимическая бомба, создающая удушающее ядовитое облако.
f.toxic_catalyzer=Каталайзер, модифицированный для стрельбы опасно радиоактивными снарядами. Снаряды Каталайзера окутывают врага энергетическим полем, взрывающимся при получении урона.
f.toxic_core=Плотный, пульсирующий кусок, сочащийся едкостью.
f.toxic_needle=Автомат, модифицированный для стрельбы пронзающими зарядами, пропитанными коварным ядом.
f.toxic_vaporizer=Алхимическая бомба, создающая ядовитое облако токсинов.
f.toxic_vaporizer_mkii=Токсичный Вапорайзер, модифицированный для распыления ядовитых агентов на обширной территории.
f.toy_box=Содержит один уникальный игрушечный костюм или аксессуар. Предметы выбираются случайно. Ключ для открытия не требуется.
f.toy_soldier_cap=Стандартная экипировка для новобранцев, умеющих маршировать, отдавать честь и иногда падать с полок.
f.toy_soldier_coat=Скроен для службы в битве за Игрушечный Край, но также идеален для позирования на парадах.
f.toy_soldier_crown=Блестящая корона, носимая элитными подразделениями Игрушечного Края и теми, от кого слегка пахнет лаком.
f.training_room=Простая комната с доступом к частному тренировочному залу гильдии — идеальна для освоения новых навыков или поддержания старых.
f.tri_guard_armor=Особый доспех, разработанный для рыцарей при первичной разведке чужих планет. Этот прочный костюм защищает от множества суровых стихий.
f.tri_guard_helm=Особый шлем, разработанный для рыцарей при первичной разведке чужих планет. Этот прочный шлем защищает от множества суровых стихий.
f.triglav=Об этом всемогущем клинке не сложено историй — лишь потому, что людям редко хочется болтать после того, как их раздавила гора.
f.trinket_slot_upgrade=При использовании открывает слот для безделушки на {0} дней.
f.troika=Низкотехнологичный меч, компенсирующий недостаток внутренней мощи чистым весом и размером. Способен наносить сокрушительные удары тем, кто в силах им владеть.
f.trojan_armor=Доспех стойких Спиральных Стражей, по преданию, вселяющий великое утешение в других рыцарей. Ничто не говорит «кавалерия прибыла» лучше, чем вид этих железных гигантов на поле боя.
f.trojan_disguise=Весьма убедительный костюм, придающий носителю вид троянца. Настолько убедительный, что друзья могут попытаться ударить вас в спину\!
f.trojan_helm=Шлем стойких Спиральных Стражей, по преданию, вселяющий великое утешение в других рыцарей. Ничто не говорит «кавалерия прибыла» лучше, чем вид этих железных гигантов на поле боя.
f.trojan_horseshoe=Угольно-чёрная подкова. С виду совершенно безобидная.
f.true_love_locket=Маленький медальон в форме сердца с надписью «Постоянно думаю о тебе, Пёсик Любви».
f.tundrus=Модифицированный магнус, гарантирующий, что если ваша цель каким-то чудом пережила первый выстрел, то она всё равно будет вморожена на месте. Заряженный выстрел может пронзить нескольких врагов.
f.turbillion=Пышный механизированный клинок, чья турбина потрескивает силой тысячи бурь.
f.tusk_helm=Созданный по образу благородных зверей, известных силой и бесстрашием, этот шлем вселяет такой ужас и уважение во врагов, что об этих деяниях будут говорить веками.
f.twisted_snarble_barb=Изогнутый Снарбловый Шип, усиленный для удовлетворительного удара со «щёлк-хрусть».
f.twisted_spine_cone=Улучшенный Шипошишак, который истерзает противников шипами и похоронит их в колючках.
f.twisted_targe=Дремучая тарга, придающая вашим колющим ударам особую остроту.
f.ult_evo_catalyst=Замкнутый заряд крайне нестабильной энергии, который могут синтезировать боевые спрайты. Благодаря ему спрайты способны эволюционировать в свои окончательные формы и овладеть силой ультимативных навыков.
f.ultra_fire_barrier=Окружает вас смертоносными огненными сферами, способными поджечь врагов.
f.ultra_freeze_barrier=Окружает вас смертоносными ледяными сферами, способными заморозить врагов на месте.
f.ultra_poison_barrier=Окружает вас смертоносными токсичными сферами, способными искалечить врагов.
f.ultra_shock_barrier=Окружает вас смертоносными сферами молнии, способными поразить врагов разрядом.
f.umbra_driver=Это устрашающе мощное оружие стреляет снарядами, начисто лишёнными цвета, запаха и милосердия.
f.umbral_blaster=Улучшенный теневой бластер, разработанный для нейтрализации инопланетных биоформ.
f.unstable_core=Опасный кусок, вырванный из гремучего врага. Зловеще гудит.
f.valestone=Легендарный минерал яркого зелёного цвета, по преданию, содержащий суть всего живого.
f.valestone_deposit_1=Небольшое месторождение, из которого добывается одна единица лунного камня.
f.valestone_deposit_2=Приличное месторождение, из которого добывается несколько единиц лунного камня.
f.valestone_deposit_3=Крупное месторождение, из которого добывается множество единиц лунного камня.
f.valestone_deposit_4=Богатейшая жила, из которой добывается целое состояние лунного камня.
f.valestone_shard=Осколок Валестона, слишком мелкий для запитки врат, но весьма пригодный в алхимии.
f.valiance=Это высокоэффективное стрелковое оружие — символ Спирального Ордена, с гордостью носимый ветеранами. Как часто говорят, рыцарю не нужна отвага\: достаточно Вальянса.
f.valkyrie_helm=Бесценный шлем, чьё имя обитатели Подземного Мира не смеют произнести.
f.valkyrie_mail=Бесценный доспех, чьё имя обитатели Подземного Мира не смеют произнести.
f.var_slime_lockbox=Особо-особый сундук, выделенный обычным Слизневым Сундуком. Требует Слизневый Ключ или Серебряный Ключ, но гарантированно содержит редкую цветную слизневую экипировку, костюм или аксессуар.
f.venom_fiend_mail=Бронированная кольчуга, предположительно созданная по образу ядовитого беса. В комплекте зловещий облегающий костюм, пульсирующий мерзкой эссенцией.
f.venom_fiend_mask=Маска, предположительно созданная по облику ядовитого беса. Пропитана мерзкой эссенцией, способной напугать ваших врагов.
f.venom_veiler=Вершина устройств для распыления токсинов, Ядовитый Вуалер можно использовать для уничтожения вредителей на посевах. В крайнем случае — для уничтожения посевов.
f.veteran_door=Устанавливает силовой барьер у входа в комнату, через который могут пройти только члены гильдии ранга Ветеран и выше.
f.vial_curse=Стеклянный пузырёк с концентрированной бесовской эссенцией. Может наложить на врагов Проклятие.\n\nМетните его как гранату и подарите врагам 10 лет невезения\!
f.vial_curse_super=Стеклянный пузырёк с концентрированной бесовской эссенцией. Может наложить на врагов Проклятие.\n\nЭтот пузырёк выглядит куда опаснее стандартного. Метните его как гранату и подарите врагам 10 лет невезения\!
f.vial_curse_ultra=Стеклянный пузырёк с концентрированной бесовской эссенцией. Может наложить на врагов Проклятие.\n\nЭтот пузырёк — самый опасный из всех. Метните его как гранату и подарите врагам 10 лет невезения\!
f.vial_fire=Стеклянный пузырёк с расплавленной смесью. Может наложить на врагов Горение.\n\nМетните его как гранату и поджарьте врагов\!
f.vial_fire_super=Изысканный стеклянный пузырёк с расплавленной смесью. Может наложить на врагов Горение.\n\nЭтот пузырёк выглядит куда опаснее стандартного. Метните его как гранату и поджарьте врагов\!
f.vial_fire_ultra=Изысканный стеклянный пузырёк с расплавленной смесью. Может наложить на врагов Горение.\n\nЭтот пузырёк — самый опасный из всех. Метните его как гранату и поджарьте врагов\!
f.vial_freeze=Стеклянный пузырёк с ледяным ветром. Может наложить на врагов Заморозку.\n\nМетните его как гранату и приморозьте врагов на месте\!
f.vial_freeze_super=Изысканный стеклянный пузырёк с ледяным ветром. Может наложить на врагов Заморозку.\n\nЭтот пузырёк выглядит куда опаснее стандартного. Метните его как гранату и приморозьте врагов на месте\!
f.vial_freeze_ultra=Изысканный стеклянный пузырёк с ледяным ветром. Может наложить на врагов Заморозку.\n\nЭтот пузырёк — самый опасный из всех. Метните его как гранату и приморозьте врагов на месте\!
f.vial_poison=Стеклянный пузырёк с ослабляющими токсинами. Может наложить на врагов Отравление.\n\nМетните его как гранату и подорвите атакующую мощь врагов\!
f.vial_poison_super=Изысканный стеклянный пузырёк с ослабляющими токсинами. Может наложить на врагов Отравление.\n\nЭтот пузырёк выглядит куда опаснее стандартного. Метните его как гранату и подорвите атакующую мощь врагов\!
f.vial_poison_ultra=Изысканный стеклянный пузырёк с ослабляющими токсинами. Может наложить на врагов Отравление.\n\nЭтот пузырёк — самый опасный из всех. Метните его как гранату и подорвите атакующую мощь врагов\!
f.vial_shock=Стеклянный пузырёк с гиперзаряженной электрожидкостью. Может наложить на врагов Электрошок.\n\nМетните его как гранату и как следует ТРЯХНИТЕ врагов\!
f.vial_shock_super=Изысканный стеклянный пузырёк с гиперзаряженной электрожидкостью. Может наложить на врагов Электрошок.\n\nЭтот пузырёк выглядит куда опаснее стандартного. Метните его как гранату и как следует ТРЯХНИТЕ врагов\!
f.vial_shock_ultra=Изысканный стеклянный пузырёк с гиперзаряженной электрожидкостью. Может наложить на врагов Электрошок.\n\nЭтот пузырёк — самый опасный из всех. Метните его как гранату и как следует ТРЯХНИТЕ врагов\!
f.vial_sleep=Стеклянный пузырёк со снотворным зельем. Может наложить на врагов Сон.\n\nМетните его как гранату, и ваши враги захрапят за секунды\!
f.vial_sleep_super=Изысканный стеклянный пузырёк со снотворным зельем. Может наложить на врагов Сон.\n\nЭтот пузырёк выглядит куда опаснее стандартного. Метните его как гранату, и ваши враги захрапят за секунды\!
f.vial_sleep_ultra=Изысканный стеклянный пузырёк со снотворным зельем. Может наложить на врагов Сон.\n\nЭтот пузырёк — самый опасный из всех. Метните его как гранату, и ваши враги захрапят за секунды\!
f.vial_stun=Изысканный стеклянный пузырёк с мерцающими вспышковыми пеллетами. Может наложить на врагов Оглушение.\n\nМетните его как гранату, и ваши враги будут слишком ошарашены, чтобы преследовать\!
f.vial_stun_super=Изысканный стеклянный пузырёк с мерцающими вспышковыми пеллетами. Может наложить на врагов Оглушение.\n\nЭтот пузырёк выглядит куда опаснее стандартного. Метните его как гранату, и ваши враги будут слишком ошарашены, чтобы преследовать\!
f.vial_stun_ultra=Изысканный стеклянный пузырёк с мерцающими вспышковыми пеллетами. Может наложить на врагов Оглушение.\n\nЭтот пузырёк — самый опасный из всех. Метните его как гранату, и ваши враги будут слишком ошарашены, чтобы преследовать\!
f.vile_seal=Клочок древнего пергамента, пропитанный тёмной магией. Считается, что он дарует силу обладателям злых душ.
f.vile_striker=Скрытная сабля, таящая заряд яда. Её зазубренное лезвие не предназначено для нарезки хлеба\!
f.virulent_catalyzer=Внедрение Спиральных технологий наделило это жуткое оружие мощнейшим ядовитым зарядом. Снаряды Каталайзера окутывают врага энергетическим полем, взрывающимся при получении урона.
f.virulent_seedling=Это маленькое опасное растение было превращено биотехниками в оружие, распыляющее облако токсичных спор при детонации. Не обманывайтесь размером — в нём несколько килоодри мощности.
f.virulisk_mask=Маска, изготовленная из шкуры вирулиска.
f.virulisk_suit=Плотный костюм, изготовленный из туши вирулиска. Владелец унаследует часть ядоустойчивости вирулиска, а также его пристрастие к флану.
f.vitapod=Увеличивает максимальное здоровье на {0}.
f.vitasuit=Особый костюм, дарующий владельцу крепкий и здоровый бонус.
f.vitasuit_deluxe=Четверо из пяти спиральных медиков рекомендуют эту броню для повседневного ношения. Пятого раздавил тортодрон.
f.vitasuit_plus=Высокотехнологичная кольчуга, обеспечивающая владельцу множество медицинских благ, включая бонус к здоровью, блестящие волосы и свежее дыхание.
f.vog_cub_cap=Толстая шапка, изрядно пахнущая барбекю. Барбекю из чего? Не спрашивайте.
f.vog_cub_coat=Эта шкурная одежда настолько огнестойкая, что вы даже не обратите внимания на запах дровяного дыма.
f.volatile_catalyzer=Снять предохранители с гремлинских технологий — верный способ лишиться конечности. В данном случае, скорее всего, не вашей. Снаряды Каталайзера окутывают врага энергетическим полем, взрывающимся при получении урона.
f.volcanic_demo_helm=Передовой шлем, усиленный вулканическим железом и предназначенный для работы с высокотемпературной взрывчаткой.
f.volcanic_demo_suit=Высокозащитная экипировка для передового подрывника. Внутренняя система охлаждения создаёт ощущение, будто вас криогенно заморозили.
f.volcanic_iron=Исключительный металл, пропитанный пылающей энергией магмы.
f.volcanic_pepperbox=На привале во вражеской территории Вулканический Пепербокс идеален для поджаривания как зефира, так и врагов.
f.volcanic_plate_helm=Превосходный пластинчатый шлем, пропитанный стихией пламени. Дышать в нём тяжело, зато он выдерживает высокие температуры и любое число свирепых атак.
f.volcanic_plate_mail=Превосходная пластинчатая броня, пропитанная стихией пламени и рассчитанная на колоссальные удары.
f.volcanic_plate_shield=Превосходный щит, пропитанный стихией пламени. Он настолько жаростойкий, что остаётся загадкой, как именно его выковали.
f.volcanic_plated_pathfinder_armor=Закалённый доспех, усиленный вулканическими сплавами, для защиты от самых «поджаренных» монстров при исследовании неизведанного.
f.volcanic_plated_pathfinder_helm=Закалённый шлем, усиленный вулканическими сплавами, для защиты от самых «поджаренных» монстров при исследовании неизведанного.
f.volcanic_plated_sentinel_armor=Доспех, укреплённый вулканическими пластинами для защиты от множества стихий.
f.volcanic_plated_sentinel_helm=Шлем, укреплённый вулканическими пластинами для защиты от множества стихий.
f.volcanic_plated_shade_armor=Костюм из огнестойкой ткани, переплетённой с тёмной материей, для маскировки владельца в раскалённых коридорах.
f.volcanic_plated_shade_helm=Шлем из огнестойкой ткани, переплетённой с тёмной материей, для маскировки владельца в раскалённых коридорах.
f.volcanic_salamander_mask=Маска Саламандры, усиленная вулканическим железом. В полевых условиях может служить кофеваркой-заменителем, если вам не мешает привкус ящерицы.
f.volcanic_salamander_suit=Костюм Саламандры, усиленный прочными пластинами вулканического железа. Чрезвычайно защитный и пригодный как походная плита при долгих развёртываниях.
f.volt_breaker_armor=Улучшенная Броня Цеперазбивателя, ещё более устойчивая к электрошоку.
f.volt_breaker_helm=Шлем Цеперазбивателя, модифицированный для усиленной защиты от электрошока.
f.volt_breaker_shield=Щит Цеперазбивателя, модифицированный для усиленной защиты от электрошока.
f.volt_driver=Высокотехнологичное алхимическое оружие, стреляющее мощными вольтовыми снарядами, многократно расщепляющимися при попадании.
f.volt_oil=Маслянистое вещество, всегда несущее лёгкий электрический заряд.
f.voltaic_radical_mask=Маска, предположительно воссозданная разумным меха-рыцарем. Внутренние гироскопы и электрический гребень надёжно скроют вашу личность.
f.voltaic_radical_suit=Костюм, предположительно воссозданный разумным меха-рыцарем. В комплекте синтетический облегающий костюм, пульсирующий электрической энергией.
f.voltaic_tempest=Это высокотехнологичное, высоковольтное устройство не рекомендуется использовать в воде, рядом с водой или вблизи людей, думающих о воде. Для надёжности лучше на него и не смотреть.
f.voltech_alchemer=Алхимическое стрелковое оружие, стреляющее высокозаряженными ионными снарядами, расщепляющимися при попадании.
f.voltech_alchemer_mkii=Улучшенный Алхемер, выпускающий электрические заряды с повышенной скорострельностью.
f.voltedge=Сочетание Спиральной конденсаторной технологии и образцов из Фабрики Боеприпасов Железного Когтя породило этот клинок, способный выдать особо опасный разряд в 1,21 гигаватт.
f.wanderers_wand=Замечательна для помахиваний.
f.warm_crystal=Редкая кристаллическая формация тепла, используемая для ковки оружия и снаряжения высших уровней. Жар внутри достаточно силён, чтобы чувствовать тепло на ощупь.
f.warmaster_bomb_1=Мощная бомба, переполненная тёмной энергией, которую Мастер Войны Сирус создал с единственной целью — устранения других гремлинов, стоявших на его пути.
f.warmaster_bomb_2=Усовершенствованная версия теневой бомбы, которую Мастер Войны Сирус создал с единственной целью — устранения других гремлинов, стоявших на его пути.
f.warmaster_bomb_3=Совершённая версия теневой бомбы, которую Мастер Войны Сирус создал с единственной целью — устранения других гремлинов, стоявших на его пути. По слухам, она предназначалась для использования против других членов Багрового Ордена.
f.warmaster_helm_1=Воссоздание маски, некогда носимой Мастером Войны Сирусом из Багрового Ордена. Изготовленная из расколотых фрагментов маски, она лишь отдалённо напоминает оригинал.
f.warmaster_helm_2=Воссоздание маски, некогда носимой Мастером Войны Сирусом из Багрового Ордена. Хотя она весьма похожа на оригинал, ей всё ещё не хватает деталей.
f.warmaster_helm_3=Воссоздание маски, некогда носимой Мастером Войны Сирусом из Багрового Ордена. Это безупречная копия, несущая ужасный облик самого Сируса — мрачный памятник Операции «Багровый Молот».
f.warp_dust=Лёгкая пыль, остающаяся после перемещения существа с невероятной скоростью. Великолепна в соусе.
f.waste_module=Маленький резервуар, некогда собиравший отходы устройства, созданного для разрушения. Теперь он просто воняет.
f.weapon_slot_upgrade_30=При использовании открывает дополнительный слот для оружия на 30 дней.
f.wicked_idol=Одна из множества статуэток, носимых бесами для снискания благосклонности тёмных богов. Самые ценные — «МИКУ» (мятное в коробке ужасов).
f.wicked_whisker=Ус, отвоёванный у великого героя Кошачьего Племени Маргрела. Традиционно их носили как оберег от совлитской магии, но теперь они символизируют торжество добрых магических искусств над злом.
f.wild_buster=Стрелковое оружие, алхимизированное из закалённого панциря тортодрона. Владея им, вы ощущаете неистовые энергии внутри, жаждущие вырваться наружу.
f.wild_dust=Порция особой пищи, любимой боевыми спрайтами, глубоко связанными с природным порядком дикой глуши.
f.wild_hunting_blade=Легендарный резак, которого страшатся даже могучие вольверы и хромалиски.
f.wild_mote=Маленький кусочек особой пищи, любимой боевыми спрайтами, глубоко связанными с природным порядком дикой глуши.
f.wild_orb=Блестящая сфера из особой пищи, любимой боевыми спрайтами, глубоко связанными с природным порядком дикой глуши.
f.wild_shell=Щит, алхимизированный из закалённого панциря тортодрона. Достаточно прочный, чтобы затупить желейный шип при ударе.
f.wild_star=Идеальная кристаллизация особой пищи, любимой боевыми спрайтами, глубоко связанными с природным порядком дикой глуши.
f.wild_stone=Концентрированный кусок особой пищи, любимой боевыми спрайтами, глубоко связанными с природным порядком дикой глуши.
f.wildfire=Элитное стрелковое оружие, способное преподнести сокрушительный сюрприз врагу, когда его малые заряды энергии превращаются в бушующие лесные пожары. Снаряды Дикого Огня набирают мощь по мере удаления.
f.winged_helm=Шлем, чей дизайн вызывает почти небесную красоту.
f.winmillion=Изысканный клинок, выбрасывающий сгустки энергии при каждом взмахе. Неопытные пользователи, бывало, ранили себя при первой тренировке.
f.winter_grave=Невероятно мощная ручная пушка, чьё прозвище не удивит никого, кто случится по неправильную сторону дула. Заряженный выстрел может пронзить нескольких врагов.
f.winter_onesie=Идеальная пижама для раздачи подарков или терпеливого ожидания визита Самозваноклауса.
f.winter_pullover=Не самый стильный свитер для снежного сезона. Идеальный способ смутить вашу семью и согильдийцев.
f.winterfest_coat=Изумительно мягкий и сезонно стильный костюм, излучающий чудесное настроение Зимнего Фестиваля. Он говорит всем, что в праздниках вы настроены серьёзно.
f.winterfest_table=Стильный антикварный стол с тарелкой печенья, оставленного для Самозваноклауса.
f.winterfest_tree=Великолепно закрученное дерево, украшенное в духе Зимнего Фестиваля. Фольклор гласит, что Самозваноклаус оставляет подарки для тех, кто был хорошим, а тем, кто был непослушным, набивает подарки желе. Некоторые верят, что именно поэтому хромалиски враждебны.
f.wise_owlite_shield=Не нужно быть прославленным совлитским учёным, чтобы понять, что защищаться щитом — отличная идея.
f.wizard_box=Содержит один из уникальных чудных и чудесных волшебных предметов. Предметы выбираются случайно. Ключ для открытия не требуется.
f.wolver_cap=Бойкая шапка из значительно менее бойкой шкуры вольвера.
f.wolver_coat=Толстая одежда для защиты вашей шкуры, из шкуры вольвера, который свою не уберёг.
f.wolver_mask=Простая маска из шкуры вольвера.
f.wooly_onesie=Колючая, но тёплая пижама для ночного отдыха рыцарей. {0}
f.wooly_pullover=Стильный свитер для предснежного сезона. {0}
f.woven_pathfinder_armor=Гибкий доспех для мобильности, переплетённый слизневыми волокнами для защиты от колючих и шипастых врагов.
f.woven_pathfinder_helm=Гибкий шлем для мобильности, переплетённый слизневыми волокнами для защиты от колючих и шипастых врагов.
f.woven_sentinel_armor=Доспех, переплетённый волчьей шерстью для защиты от самых суровых стихий.
f.woven_sentinel_helm=Шлем, переплетённый волчьей шерстью для защиты от самых суровых стихий.
f.woven_shade_armor=Свободный доспех, позволяющий владельцу красться в тенях и нападать на ничего не подозревающих врагов.
f.woven_shade_helm=Свободный шлем, позволяющий владельцу красться в тенях и нападать на ничего не подозревающих врагов.
f.wrapping_paper=Заверните предмет в эту декоративную подарочную коробку и добавьте персональное сообщение.
