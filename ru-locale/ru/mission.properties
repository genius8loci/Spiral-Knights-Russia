m.hall_of_heroes_3_2a=Рад встрече, {0}. Рад видеть вас вновь. \n\nИтак, {0}, для 4-Звёздочной Сертификации на вас должны быть экипированы броня, шлем, щит и оружие 4-звёздочного уровня или выше.
