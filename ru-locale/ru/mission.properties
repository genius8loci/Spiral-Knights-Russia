m.hall_of_heroes_5=Зал Героев
m.hall_of_heroes_5_10a=Поздравляю, {0}. Гео-Рыцари многим обязаны вашим усилиям.
m.hall_of_heroes_5_11a=(Он, по-видимому, очень пристально разглядывает угол.)
m.hall_of_heroes_5_12a=Авангард, значит? Рейнджеры всегда ищут умелых рыцарей вроде вас, {0}. Когда вся эта торжественность кончится, загляните ко мне, если хотите ещё раз посмеяться в лицо смерти и опасности\!
m.hall_of_heroes_5_1a=Рад встрече, {0}. Рад видеть вас вновь, да ещё при столь знаменательных обстоятельствах.
m.hall_of_heroes_5_2a=Вы стоите в Зале Героев, где лучшие из Спиральных Рыцарей предлагают всё, что могут, начинающим рыцарям. Таким рыцарям, каким некогда были и вы сами, когда впервые выбрались из спасательной капсулы и нашли дорогу в Хейвен. \n\nИ после стольких успешных миссий, дерзких спасательных операций и образцовой доблести в бою, вы теперь достойны встать в ряды этих героев.
m.hall_of_heroes_5_3a={0}, для меня великая честь, в присутствии всех тех, кто вас поддерживает и кому вы служите, присвоить вам высокое звание Авангарда Спиральных Рыцарей.
m.hall_of_heroes_5_4a=А теперь поприветствуйте тех, кто помог вам стать тем, кто вы есть сегодня. Когда закончите, воспользуйтесь лифтом наверх, чтобы получить награду.
m.hall_of_heroes_5_5a=Приятно наконец-то познакомиться лично, {0}\! Поздравляю\!
m.hall_of_heroes_5_6a=Служите с честью, Авангард.
m.hall_of_heroes_5_7a={0}, я думала, вы будете повыше.
m.hall_of_heroes_5_8a=Ого, вы и правда это сделали\!
m.hall_of_heroes_5_9a=Привет, {0}\! Вы только посмотрите на себя, ого\! Эй, Авангард или нет, вы же знаете, куда обращаться, если хотите по-настоящему выделиться, правда?
m.hall_of_heroes_bomber_1a=Привет, {0}, я Реми, рыцарь, специализирующийся на бомбах и взрывчатке. Мои рецепты довольно прямолинейны — создание оружия и снаряжения, нацеленного на то, чтобы разносить ваших врагов в клочья\! \n\nИспользование бомб — это не дело из разряда «бросил и забыл». Бомбы требуют понимания тайминга — как до, так и после установки, — чтобы получить максимальную отдачу. Снаряжение, на котором я специализируюсь, сделает вас рыцарем, которого ваш отряд посылает, чтобы уничтожить множество врагов разом. Бомбы — то, что нужно, чтобы разнести толпу тварей одним мощным БА-БАХ\!
m.hall_of_heroes_cobalt_1a=Рад встрече, {0}. Я Джорин, рыцарь, освоивший стандартное снаряжение Спиральных Рыцарей. Мои рецепты производят весьма надёжное оружие и снаряжение. \n\nТо, что ваше оружие не наносит причудливых особых типов урона или ваши доспехи не защищают от статусных эффектов, вовсе не означает, что вы не способны дать жару в Часовом Механизме. Снаряжение, на котором я специализируюсь, годится практически для любой ситуации. Оно сохранит вам жизнь и пакует неплохой удар по почти любому монстру на вашем пути.
m.hall_of_heroes_elemental_1a=Приветствую, {0}, я Архилус, рыцарь, использующий снаряжение с высокой защитой от стихийного урона. Мои рецепты производят доспехи и щиты, защищающие вас от стихийных атак конструктов и гремлинов. \n\nДоспехи и щиты с сопротивлением стихиям созданы по совитским технологиям. Хотя сами совиты уже давно прекратили существование, их потрясающее мастерство в управлении стихиями живёт в этом снаряжении.
m.hall_of_heroes_gunner_1a=Привет, {0}, меня зовут Даксен. Я рыцарь, специализирующийся на стрельбе. Мои рецепты производят оружие и снаряжение, заточенное под дальний бой... ну, знаете, стрелять по всяким штукам. \n\nПистолеты позволяют поражать врагов с безопасного расстояния, но не оставляют вам много вариантов, когда те подберутся вплотную. Думать и стрелять нужно быстро, чтобы стать хорошим стрелком. Снаряжение, на котором я специализируюсь, сделает из вас меткого стрелка, а не мёртвого рыцаря.
m.hall_of_heroes_heavy_1a=Здравствуйте, {0}, я Изола, рыцарь, использующий снаряжение, подобающее стражу отряда. Мои рецепты производят высокозащитные доспехи и сокрушительное оружие. \n\nТяжёлое оружие требует точного тайминга для эффективного использования, а снаряжение несколько замедляет вас. Но то, чем вы жертвуете в удобстве, возвращается чистой мощью. Снаряжение, на котором я специализируюсь, сделает вас рыцарем, на которого ваш отряд может положиться — тем, кто выстоит и встретит лицом к лицу даже самых свирепых монстров.
m.hall_of_heroes_piercing_1a=Привет, {0}, я Уолкон, рыцарь, использующий снаряжение с высокой защитой от колющего урона. Мои рецепты производят доспехи и щиты, защищающие вас от колющих атак слизней и зверей. \n\nОдно из лучших преимуществ выбора колющей защиты — доспехи часто делаются из мягких, упругих желейных материалов. В них можно буквально уснуть\!
m.hall_of_heroes_shadow_1a=Здравствуйте, {0}, я Силвин, рыцарь, использующий снаряжение с высокой защитой от теневого урона. Мои рецепты производят доспехи и щиты, защищающие вас от теневых атак бесов и нежити. \n\nТеневую защиту можно обуздать из самих теней. Доспехи и щиты, на которых я специализируюсь, созданы из тех самых бесовских и нежитебразных существ, что стремятся обратить силу теней против вас. К тому же они выглядят невероятно устрашающе и круто.
m.hall_of_heroes_specialist_1a=Привет, {0}, я Зебулон, рыцарь, использующий специализированное снаряжение, предназначенное для конкретных ситуаций. Мои рецепты производят оружие, нацеленное на определённые семейства монстров, и снаряжение со смешанными типами защиты. \n\nИногда вам действительно нужен меч, разящий нежить, или доспех, повышающий вашу эффективность в истреблении слизней. Снаряжение, на котором я специализируюсь, часто создано для конкретной задачи, но также отлично сочетается с другими комплектами. Экспериментируйте\!
m.hall_of_heroes_striker_1a=Приветствую, {0}, я Эхо, рыцарь, использующий снаряжение, подобающее ударнику отряда. Мои рецепты производят оружие и снаряжение, заточенное под стремительный ближний бой. \n\nАрсенал ударника сосредоточен на скорости. Вы стремитесь сблизиться с врагом, нанести мощный удар и отступить. Снаряжение, на котором я специализируюсь, сделает вас рыцарем, бросающимся в бой впереди отряда и наносящим удар первым, прежде чем враги успеют хотя бы выстрелить.
m.heart_of_ice_1a=Слушайте, Рейнджеры\! Хватайте шарфы и наточенные мечи, потому что там, куда мы направляемся, нас не ждёт тёплый приём\! Наши разведчики сообщают, что Аму-Сол — ледяная пустошь, кишащая бесами и голодными зверями. Этот бесовский город, похоже, распространяет свой ледяной холод по всему Часовому Механизму, и если мы не проникнем туда и не выясним почему, нас ждёт долгая зима на Крейдле. \n\nВперёд, Рейнджеры\!
m.heart_of_ice_2a=Re\: Запрос на выделение ресурсов, Аму-Сол \n\nВы получаете данное письмо в связи с некорректной/загадочной записью в вашем недавнем запросе на выделение ресурсов. Пожалуйста, предоставьте подробное описание предполагаемого использования следующих запрошенных ресурсов\: \n- 999 «непредубеждённых» дьяволят \n- 50 бочек «чем бы там ни питались морозошкуры» \n- «Возвышающийся столп» вечномороза и «все замёрзшие души, что он порождает» \n
m.heart_of_ice_2b=Кроме того, отдел кадров запрашивает обновлённую организационную структуру как можно скорее. Согласно нашим данным, все обязанности Управляющего Ямой, административные и прочие, были переданы некоему «Маулосу Вечного Мороза», это верно? \n\nС уважением, \nМоргральм \nПомощник начальника отдела распределения ресурсов, Нижекорп
m.heart_of_ice_3a=Re\: Re\: Запрос на выделение ресурсов, Аму-Сол \n\nБлагодарим за оперативный ответ. К сожалению, ваш запрос на выделение ресурсов отклонён. \n\nПричина\: \nПредоставленное обоснование необходимости запрошенных ресурсов\: «Да здравствует великий и ужасающий Маулос, истинный повелитель Слепящей Бездны.» \n
m.heart_of_ice_3b=Кроме того, отдел кадров по-прежнему ожидает запрошенную обновлённую организационную структуру. Обращаем ваше внимание, что «Все подвластны леденящей порче великого Маулоса» не является приемлемым описанием текущей руководящей иерархии. \n\nС уважением, \nМоргральм \nПомощник начальника отдела распределения ресурсов, Нижекорп
m.heart_of_ice_4a=Re\: Re\: Re\: Запрос на выделение ресурсов, Аму-Сол \n\nЯ связался со Службой Внутренних Расследований касательно недавнего хищения столпа вечномороза и «исчезновения» почти 1 000 дьяволят-операторов по вводу данных, поскольку, полагаю, это непосредственно связано с вашим недавно отклонённым запросом на выделение ресурсов. \n\nПотребуются дисциплинарные меры. Также прошу заполнить прилагаемый План Индивидуального Развития и вернуть его как можно скорее. \n
m.heart_of_ice_4b=Наконец, прошу проинструктировать ваш отдел прекратить использование нашей почтовой системы для информирования других отделов Нижекорп о том, что «Леденящая порча повелителя Маулоса неизбежна». Ненадлежащее использование почтовой системы снижает производительность. \n\nПоскольку дисциплинарные меры в отношении вашего отдела, несомненно, повлекут перевод в Отдел Вечных Мук, это, вероятно, наша последняя переписка. Желаю вам удачи в дальнейшей карьере в Нижекорп. \n\nС уважением, \nМоргральм \nПомощник начальника отдела распределения ресурсов, Нижекорп \n\nВложение\: Amu-Sol.pip
m.heart_of_ice_5a=Вложение повреждено и не может быть открыто.
m.heart_of_ice_6a=Ого, это колоссальная башня из вечномороза. Я раньше видел только маленькие горсточки этого вещества, и близко ничего подобного. \n\nСобранные нами разведданные указывают на то, что бесы используют крупные залежи этого вещества, чтобы заключать души погибших в ледяную тюрьму. \n\nПохоже, Маулос, тот ужасающий архибес, которого вы только что одолели, нашёл ему иное применение и на самом деле разрушал вечномороз, чтобы выпустить орды разъярённых замёрзших душ в Часовой Механизм. Если бы он закончил свою работу... что ж, даже не хочу представлять, сколько свитеров нам всем бы понадобилось...
m.heart_of_matter=Суть дела
m.heart_of_matter_1a=Здравствуйте, {0}, я давно хотела с вами поговорить, но, похоже, Спиральная штаб-квартира не даёт вам покоя.
m.heart_of_matter_2a=Как вы знаете, я формирую исследовательскую группу для работы непосредственно в Терминале Ядра. Чтобы успешно использовать его для восстановления Скайларка, жизненно необходимо достичь его и развернуть исследовательскую станцию. \n\nВсё указывает на то, что именно вы можете наконец добраться до Ядра. Прорвавшись через Огнештормовую Цитадель и установив связь с Ядром, моя команда сможет наладить необходимые линии снабжения и немедленно приступить к работе. Но мы не можем этого сделать, пока та адская цитадель и её ужасный правитель преграждают нам путь.
m.heart_of_matter_3a=Благодарю вас, {0}. Надеюсь, вам удастся. Как вы знаете, мы полагаем, что Альфа-Отряд добрался так далеко, но неясно, что с ними стало... Евклид, Парма, Гранц.... Рулен. \n\n(Лейтенант Вэлин, кажется, почти уходит в себя)
m.heart_of_matter_4a=Простите, да, разумеется. Удачи вам, {0}. Соберите лучший отряд, какой только сможете, и ведите его достойно. Мы все на вас рассчитываем.
m.high_temperature_hostages=Заложники высоких температур
m.honor_duty=Честь и долг
m.honor_duty_1a=Рад встрече, {0}, Чемпион Спиральных Рыцарей. Ваша служба нашему делу была на высочайшем уровне. Без вас достижение Ядра до сих пор оставалось бы несбыточной мечтой. Теперь у нас наконец есть шанс восстановить Скайларк и вернуться домой.
m.honor_duty_2a=Я прочёл ваш отчёт о Ядре — это потрясающе. Какое невероятное сооружение, и подумать только, что Альфа-Отряд, возможно, до сих пор жив, но... заключён внутри — это просто невероятно. \n\nМне известно, что Лейтенант Вэлин уже привела группу к Терминалу Ядра и организует базу для исследований. Это имеет огромное значение для всех Спиральных Рыцарей, и за это мы должны благодарить вас\!
m.honor_duty_3a=Воистину, как и все мы. \n\nИтак, {0}, вам нужно подготовиться к тому, что грядёт. Достижение Ядра — лишь начало для нас. Подозреваю, что Спиральная штаб-квартира будет поручать вам ещё немало миссий, которые под силу лишь кому-то с вашими способностями. \n\nИ наконец, мне доставляет честь сообщить, что вскоре вам будет присвоена одна из величайших наград Спиральных Рыцарей — звание Авангарда. Увидимся в Зале Героев.
m.in_cold_blood=Хладнокровие
m.intro_arcade=Миссии Аркады позволяют исследовать вечно меняющийся Часовой Механизм без конкретных целей. Посетите Аркаду Хейвена, чтобы узнать, как можно преобразовать Часовой Механизм под свои нужды\!
m.intro_arcade_locked=Выполняйте Ранговые Миссии, чтобы получить доступ к Миссиям Аркады\!
m.intro_expansion=Миссии Дополнений — особые миссии, которые необходимо разблокировать для доступа. Выполнение Миссий Дополнений приносит вам эксклюзивные награды\!
m.intro_expansion_locked=Выполняйте Ранговые Миссии, чтобы получить доступ к Миссиям Дополнений\!
m.intro_pref=Показывать вступление к миссии
m.intro_prestige=Престижные Миссии — бонусные миссии, предлагаемые вам ежедневно. Выполнение Престижных Миссий приносит вам престиж.
m.intro_prestige_locked=Выполняйте Ранговые Миссии, чтобы получить доступ к Престижным Миссиям\!
m.intro_rank=Ранговые Миссии — основная кампания Спиральных Рыцарей. Выполнение Ранговых Миссий приносит награды и позволяет достигать более высоких званий Спирального Рыцаря.
m.intro_reward_arcade=Выберите врата, чтобы просмотреть карту врат и настроить параметры начала экспедиции\!
m.intro_reward_expansion=Выберите карточку миссии, чтобы получить брифинг, увидеть доступные награды и настроить параметры начала миссии\! Миссии Дополнений необходимо разблокировать покупкой для получения доступа.
m.intro_reward_prestige=Выберите карточку миссии, чтобы получить брифинг, увидеть доступные награды и настроить параметры начала миссии\!
m.intro_reward_rank=Выберите карточку миссии, чтобы получить брифинг, увидеть доступные награды и настроить параметры начала миссии\!
m.intro_type=Выберите тип миссии\:
m.itemlisting_sale=РАСПРОДАЖА
m.joining=Присоединение\: {0}\nМиссия\: {1} ({2})
