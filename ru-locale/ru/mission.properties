b.p_moorcroft1=Кто-то или что-то призвало в Часовой механизм орду проклятых черных кошек. Эти теневые звери жаждут тайной силы и разграбили драгоценную коллекцию магических гримуаров в архивах поместья Муркрофт. \n\nВ чужих руках эти древние фолианты могут привести к катастрофе, но оказалось, что черные кошки не умеют читать, поэтому они просто решили их съесть. \n\nЖители поместья Муркрофт просят вас вернуть Древние Страницы магических гримуаров, которые, скорее всего, находятся в желудках черных кошек. Как именно их извлечь, решать вам... \n\nДля выполнения этой миссии отправляйтесь в глубины заплесневелой канализации, где, по разведданным, находится гнездо черных кошек. Найдите эти Древние Страницы и верните их в поместье Муркрофт!
b.p_moorcroft2=Кто-то или что-то призвало в «Часовой механизм» полчище проклятых чёрных кошек. Эти мрачные чудовища жаждут тайной магической силы и разграбили драгоценную коллекцию магических гримуаров из архива поместья Муркрофт. \n\nВ чужих руках эти древние фолианты могли бы привести к катастрофе, но оказалось, что чёрные кошки не умеют читать, поэтому они просто решили их съесть.\n\nЖители поместья Муркрофт просят вас вернуть Древние Страницы магических гримуаров, которые, скорее всего, находятся в желудках черных кошек. Как именно их извлечь, мы оставляем на ваше усмотрение... \n\nДля выполнения этой миссии отправляйтесь в раскаленную печь, где, по разведданным, находится гнездо черных кошек. Найдите эти Древние Страницы и верните их в поместье Муркрофт!
b.p_moorcroft3=Кто-то или что-то призвало в «Часовой механизм» полчище проклятых чёрных кошек. Эти мрачные чудовища жаждут тайной магической силы и разграбили драгоценную коллекцию магических гримуаров из архива поместья Муркрофт. \n\nВ чужих руках эти древние фолианты могут привести к катастрофе, но, как оказалось, чёрные кошки не умеют читать, поэтому они просто решили их съесть.\n\nЖители поместья Муркрофт просят вас вернуть Древние Страницы магических гримуаров, которые, скорее всего, находятся в желудках черных кошек. Как именно их извлечь, решать вам... \n\nДля выполнения этой миссии разведка обнаружила гнездо черных кошек за зоной с электрическим сопротивлением. Найдите эти Древние Страницы и верните их в поместье Муркрофт!
b.p_r3_gate_beast=Наши Гео-рыцари рискуют жизнью, работая в диких землях Часового механизма.  Хотя их находки бесценны, они часто находятся в самом сердце территории росомах.  Эти дикие звери безжалостно преследуют наших Гео-рыцарей, нападая на них ночью, когда они без охраны.  Иногда росомахи объединяются в стаю и нападают на целую исследовательскую команду.  Именно в такие моменты необходимо призывать на помощь отряд талантливых бойцов, чтобы спасти их.
b.p_r3_gate_construct=Гремлины не особо заботятся о том, чтобы убирать за собой. Наши разведывательные рыцари часто натыкаются на то, что, как они полагают, является заброшенными фабриками по производству оружия гремлинов, но на самом деле там по-прежнему кипит жизнь, полная враждебных конструктов, а в некоторых случаях там даже хранятся исправные и готовые к бою боевые машины! \n\nШтаб-квартира Спирали приказала, чтобы, по возможности, эти фабрики и их боевые машины были навсегда выведены из строя, чтобы избежать жертв в будущем.
b.p_r3_gate_fiend=Город демонов — странное место, которое штаб-квартира Спирали до сих пор не до конца понимает.  Демоны повсюду, и если они увидят поблизости одного из своих боссов, то сделают все, чтобы показаться продуктивными.  К сожалению, продуктивность часто определяется нападением на вторгшихся или их заключением в тюрьму, например, отряда проходящих рыцарей. \n\nНеясно, какую роль в конечном итоге играют заключенные рыцари в планах девилитов. Те, кто выжил в плену, сообщают, что условия были плохими, но хуже всего было то, что им приходилось ежедневно заполнять огромное количество бумаг.  Такой участи не заслуживает ни один рыцарь!
b.p_r3_gate_gremlin=На строительных площадках гремлинов часто можно найти ценные схемы их сооружений и даже оружия.  Попав в штаб-квартиру «Спирали», они дают редкую возможность заглянуть в секреты инженерного искусства гремлинов. \n\nСхемы гремлинов обычно хранятся в терминалах где-то на территории объекта.  Эти терминалы заблокированы и находятся под усиленной охраной.  Как только вы привлечете внимание хотя бы одного гремлина, будьте готовы к тому, что за вами пойдет вся команда!
b.p_r3_gate_slime=Лучший способ сдержать слизней — использовать большое количество каменной соли. Слизни просто ненавидят это вещество, так как при контакте с ним они растворяются.  Это некрасивое зрелище. \n\nИсследовательские группы, размещенные в лишайнистых логовах, часто окружают весь свой лагерь каменной солью, чтобы не стать ужином для какого-нибудь слизня.  Как можно себе представить, соль у них быстро заканчивается.  Когда ее запасы подходят к концу, вызывается отряд, который пробивается к лагерю и доставляет спасительную приправу.
b.p_r3_gate_undead=Руины замков Оулайта — это мрачные и проклятые места, кишащие легионами нежити-спукатов.  Самые страшные из них, казалось бы, непобедимые грималкины, постоянно скрываются в тени, ожидая момента, когда ваш спасительный свет наконец погаснет. \n\nНекоторые рыцари поддаются тьме и в этих теневых царствах парализуются от страха. Единственное, что может их спасти, — это отважные рыцари, давно избавившиеся от детского страха перед тьмой и всеми ужасными существами, скрывающимися в ней.
b.p_r3_kit=Некоторые рыцари входят в состав специальных исследовательских групп, которым редко выпадает возможность долго оставаться на поверхности.  Эти рыцари часто используют подземные поселения Часового механизма в качестве базовых лагерей.  Хотя монстры, управляющие этими поселениями, настроены дружелюбно, условия проживания там зачастую не совсем подходят для рыцарей. \n\nЭтим рыцарям всегда пригодятся припасы, чтобы сделать их пребывание немного более комфортным. Счастливый исследователь — продуктивный исследователь!
b.p_r3_kit_2=Некоторые рыцари входят в состав специальных исследовательских групп, которым редко выпадает возможность долго оставаться на поверхности.  Эти рыцари часто используют пригороды Часового механизма в качестве базовых лагерей.  Хотя монстры, управляющие этими городами, дружелюбны, удобства там зачастую не совсем подходят для рыцарей. \n\nЭтим рыцарям всегда пригодятся припасы, чтобы сделать их пребывание немного более комфортным. Счастливый исследователь — продуктивный исследователь!
b.p_r3_mat_0=Штаб-квартира Спирали постоянно стремится лучше понять существ, населяющих Часовые механизмы, путем изучения материалов.  Если у вас есть лишние материалы, вы можете еще больше повысить свой престиж, пожертвовав их штаб-квартире Спирали.
b.p_r3_mat_01=Штаб-квартира Spiral постоянно стремится лучше понять существ, населяющих Часовой механизм, путем изучения материалов.  Если у вас есть лишние материалы, вы можете еще больше повысить свой престиж, пожертвовав их штаб-квартире Spiral.
b.p_r3_mat_1=Штаб-квартира «Спираль» постоянно стремится лучше понять существ, населяющих Часовой механизм, путем изучения материалов.  Если у вас есть лишние материалы, вы можете еще больше повысить свой престиж, пожертвовав их штаб-квартире «Спираль».
b.p_r3_min=Главный гео-рыцарь Вегнер постоянно стремится углубить свои исследования таинственных минералов, обнаруживаемых в Часовом механизме.  Эксперименты, которые он проводит над имеющимися образцами, зачастую приводят к их разрушению.  Из-за этого ему всегда нужны отважные рыцари, готовые проникнуть в Часовой механизм, чтобы добыть для него новые образцы.
b.p_r4_gate_beast=Наши Гео-рыцари рискуют жизнью, работая в диких землях Часового механизма.  Хотя их находки бесценны, они часто находятся в самом сердце территории волверов.  Эти дикие звери безжалостно преследуют наших Гео-рыцарей, нападая на них ночью, когда они не охраняются.  Иногда волверы объединяются в стаю и нападают на целую исследовательскую команду.  Именно в такие моменты необходимо вызвать отряд талантливых бойцов, чтобы спасти их.
