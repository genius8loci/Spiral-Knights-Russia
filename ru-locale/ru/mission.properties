b.a_call_to_arms=Отчаянное экстренное сообщение по комлинку транслируется по всем каналам.
b.abandoned_depot=Рыцари, расквартированные в Спасательном Лагере, переоборудовали заброшенный объект под поверхностью Крейдла в тренировочную базу для обучения новобранцев основам выживания в Часовом Механизме. Будьте начеку\! Будучи частью Часового Механизма, объект наверняка населён всевозможными монстрами. Сохраняйте бдительность\!
b.accept=Принять
b.add=Добавить дополнение
b.advanced_alchemy=Теперь, когда вы достигли звания Солдата, Боско на Базаре Хейвена готов поделиться с вами новыми сведениями о продвинутых формах алхимии. Навестите его и узнайте о скрытом потенциале некоторых видов оружия и снаряжения\!
b.aggressive_assembly=Брифинг «Агрессивная Сборка»
b.alchemy_beginners=Алхимия — искусство, освоенное Спиральными Рыцарями, позволяющее пробуждать и сплавлять воедино внутренние силы различных материалов для создания могущественных новых предметов\! Спиральный Орден на протяжении веков опирался на алхимию как основной способ создания арсеналов, на которые рыцари полагались испокон времён. \n\nУзнайте, как алхимия станет неотъемлемой частью вашего выживания в этом чужом мире.
b.alchemy_mastery=Боско на Базаре Хейвена готов поделиться с вами сведениями о высшем уровне доступных вам алхимических знаний. Мастерский уровень алхимии станет жизненно важным инструментом вашего выживания в попытках достичь Ядра Часового Механизма.
b.alien_ooze=Одна из наших полевых исследовательских групп находится в осаде крупной колонии лишайников. Лишайники — инопланетный подвид семейства слизней, предположительно занесённый в Часовой Механизм метеоритом, упавшим на поверхность Крейдла. Этот особый вид слизня формируется из бесчисленных мелких слизней, образующих подвижные разумные «колонии». \n\nЛишайниковые колонии могут объединяться, создавая всё более крупные версии самих себя, стремительно обретая целый арсенал смертоносных когтей и шипов. Не позволяйте им сливаться любой ценой и спасите исследовательскую группу\!
b.alone_in_dark=Спукаты Поместья Муркрофт раздобыли для нас ещё одну ценную разведывательную информацию, заслуживающую проверки. По их словам, потерянная душа бывшего Королевства Альмир обитает на солдатском кладбище неподалёку от Огнештормовой Цитадели. Эта душа готова поведать нам о природе цитадели, а также о том, как пройти сквозь неё и добраться до Ядра. \n\nДости его будет непросто, учитывая расположение. Кладбища — ужасные места, особенно на такой глубине. Настоятельно рекомендуется продвигаться через кладбище как можно быстрее в поисках этой потерянной души.
b.ancient_generator=Спасательный Лагерь лишён энергии, а значит — и средств для обороны от полчищ монстров, атакующих его по ночам. Солнце стремительно садится, и теперь вам предстоит спуститься в тёмные глубины под лагерем и отыскать Древний Генератор. \n\nЕсли вам удастся восстановить энергоснабжение лагеря, Спиральные Рыцари смогут запитать турели и создать оборонительный периметр. Как только лагерь будет защищён, возможно, удастся восстановить связь со Спиральной штаб-квартирой.
b.another_trace=Техники Лаборатории Хейвена сообщают, что их система слежения наконец-то отремонтирована и вновь работает. Агент Разведки Кора хотела бы ввести вас в курс предстоящих задач. Свяжитесь с ней по комлинку для получения подробностей.
b.arcade=АРКАДА
b.axes_of_evil=В уровнях, известных как «Долина Головоломок», обнаружена лесозаготовительная операция гремлинов. Эти причудливо вырезанные острова являются домом для ещё более причудливых извилистых деревьев, которые гремлины, похоже, намерены полностью уничтожить. \n\nСпиральная штаб-квартира полагает, что гремлины используют древесину для ресурсного обеспечения разработки Проекта R, и нуждается в вас, чтобы войти в Долину Головоломок и прекратить это.
b.becoming_champion=Прослышав о ваших многочисленных свершениях и успешно выполненных миссиях для Спиральной штаб-квартиры, Лейтенант Ферон хотел бы поговорить с вами.
b.best_of_beast=После недавнего повышения Биотехник Ган получил звание «Главного Биотехника». Он был проинформирован о ваших недавних достижениях и хотел бы провести для вас краткий инструктаж о том, чего ожидать от семейств зверей и слизней по мере приближения к Ядру.
b.beyond_axes_of_evil=Несмотря на ваши предыдущие усилия, гремлины возобновили лесозаготовительную операцию в Долине Головоломок для снабжения своих оружейных заводов ресурсами. Учитывая результаты их последнего проекта — Близнецов Рормулус — Спиральная штаб-квартира хотела бы, чтобы вы положили конец их эко-разрушению, прежде чем это примет более серьёзный оборот\!
b.blades_fallen=Не каждый рыцарь, вступающий в Часовой Механизм, возвращается, чтобы вновь ощутить солнце на своём лице. В опасных глубинах Часового Механизма те, кто отваживается бросить вызов его угрозам, всегда осознают, что каждая экспедиция может стать последней. Иногда их тела удаётся найти, а порой остаются лишь фрагменты их снаряжения. \n\nПрямо за пределами Хейвена Спиральная штаб-квартира возвела солдатское кладбище, где павшие рыцари обретают покой. Как Спиральный Рыцарь, вы должны принять реальность смерти, чтобы осознать её тяжесть. \n\nДоставьте останки неизвестного рыцаря — его меч — к мемориалу на кладбище. Но будьте начеку — от кладбища исходят тёмные энергии, привлечённые бесчисленными душами, что покоятся в нём.
b.breaking_in_recruits=После испытания глубинами Огнештормовой Цитадели Спиральная штаб-квартира считает, что вы заслужили столь необходимый отдых. Как новоиспечённый Авангард Спиральных Рыцарей, Лейтенант Ферон считает вас идеальным кандидатом для обучения группы необстрелянных новобранцев выживанию в опасностях этого мира. Ваша миссия — встретиться с новобранцами на поверхности Крейдла и помочь им пережить их первый боевой выход.
b.built_to_destroy=Некогда известные Спиральной штаб-квартире как «Проект R», Близнецы Рормулус были идентифицированы как гремлинское оружие колоссальной мощи, созданное с единственной целью — уничтожить Хейвен. Хранящееся в самом сердце Фабрики Боеприпасов Железного Когтя, это оружие не только защищено ордами электрошоковых конструктов и гремлинов, — сама фабрика представляет крайне опасную взрывоопасную угрозу\! \n\nПомимо нейтрализации Близнецов Рормулус, Спиральная штаб-квартира хотела бы, чтобы вы извлекли Модуль Разведки Альфа-Отряда, предположительно находящийся где-то на территории фабрики. \n\nНастоятельно рекомендуется сформировать полный отряд перед развёртыванием.
b.chilled_to_bone=К настоящему моменту вы, несомненно, сталкивались со странными нежитью-монстрами, известными как «спукаты». Рыцари-Разведчики наконец обнаружили то, что, по-видимому, является источником этих призрачных кошкоподобных существ. \n\nКрупные скопления спукатов были замечены в том, что предположительно является потемневшими руинами совиного замка. Эта мрачная обитель, получившая название «Крепость Канделябров», освещена лишь серией совиных свечей. \n\nСоблюдайте осторожность, исследуя пространство за пределами света свечей. В темноте скрываются огромные спукаты, известные как «гримолкины». Гримолкины, по-видимому, невосприимчивы к любому оружию, и их следует избегать. Ваша единственная защита — оставаться на свету\! \n\nСпиральная штаб-квартира поручила вам эту миссию для сбора дополнительных данных о происхождении спукатов и тайне падения совитов. Исследуйте Крепость Канделябров и доложите о своих находках\!
b.choose_your_sprite=Морлин подготовил три спасённых вами Боевых Спрайта для оценки. Вам разрешено выбрать одного из них и установить с ним связь. Этот Боевой Спрайт навсегда станет вашим спутником в грядущих приключениях, так что выбирайте мудро. \n\nЭта миссия не может быть повторена.
b.complete_mission=Завершить миссию
b.craft_items=Создать предметы
b.creators_and_created=Чтобы быть полностью готовым к предстоящим испытаниям, Главный Биотехник Ган просит вас связаться с ним перед тем, как приступить к новым доступным вам миссиям.
b.crimson_chaos=Спиральная штаб-квартира мониторила несколько известных баз Багрового Ордена в надежде перехватить одного из их неуловимых высокопоставленных членов. Рыцари-Разведчики, назначенные следить за одной из баз, сообщают, что она внезапно затихла, и запросили подкрепление перед дальнейшим расследованием. Отправляйтесь к их местоположению и обследуйте базу на предмет каких-либо признаков произошедшего.
b.crossing_chasm=Чтобы добраться до базы операций Спиральной штаб-квартиры в Хейвене, вам потребуется спуститься в Часовой Механизм и пересечь массивную пропасть. Путешествие будет опасным, и рекомендуется запастись всем необходимым перед отправлением. \n\nВыполнение этой миссии оставит Спасательный Лагерь позади.
b.crossing_chasm_b=Восстановив энергоснабжение Спасательного Лагеря и установив контакт со Спиральной штаб-квартирой, пришло время попытаться пересечь пропасть к северу от Спасательного Лагеря и добраться до Хейвена, где нашли прибежище остальные Спиральные Рыцари. \n\nЧтобы пересечь пропасть, вам нужно спуститься на лифте в Часовой Механизм и найти другой лифт, чтобы подняться на противоположной стороне. Невозможно предсказать, какие опасности поджидают в тёмных глубинах, поэтому Рендон будет сопровождать вас в этом путешествии.
b.darkest_depths=Одолев Близнецов Рормулус и извлекнув Модуль Разведки Альфа-Отряда, пришло время связаться с Агентом Разведки Корой, чтобы получить отчёт об анализе модуля и информацию о вашем новом доступе к глубочайшим недрам Часового Механизма.
b.darkest_forces=Узнав, что ваши следующие миссии столкнут вас с бесовскими и нежитебразными монстрами в глубинах Слоя 3, Главный Биотехник Ган просил вас связаться с ним перед развёртыванием на новейшие миссии.
b.delved_too_deep=Правда раскрыта. Пришло время проинформировать Агента Разведки Кору и Спиральную штаб-квартиру о том, что вы и Лейтенант Вэлин узнали.
b.dreams_and_nightmares=Ответьте на сигнал бедствия из Терминала Ядра. У нас нет разведданных о том, чего ожидать. \nЭто опасная миссия. Приготовьтесь ко всему.
b.elemental_my_dear=Биотехник Ган согласился рассказать вам о монстрах Часового Механизма, наносящих стихийный урон. Свяжитесь с ним по комлинку и выслушайте, что он скажет.
b.ending_in_fire=Обнаружена странная энергетическая аномалия на уровнях прямо над Ядром. Свяжитесь с Агентом Разведки Корой для подробностей.
b.exp_mission=Брифинг
b.exp_mission_2=Брифинг 2
b.exp_mission_3=Брифинг 3
b.expansion=ДОПОЛНЕНИЕ
b.explosive_plot=Рыцари-Разведчики раскрыли то, что считают заговором гремлинов по уничтожению Хейвена\! Как Элитный Рыцарь, вы были отобраны Спиральной штаб-квартирой для расследования этого дела. Свяжитесь с Агентом Разведки Корой для подробностей.
b.eye_of_needle=Обработав данные, собранные вами в крепости совитов, а также дополнительные разведданные от Рыцарей-Разведчиков, Агент Разведки Кора подготовила для вас дебрифинг касательно массы негативной энергии, блокирующей доступ к Ядру.
b.faith_armor=Ученик по имени Уилкс, только что прибывший из Спасательного Лагеря, оказался в том, что Спиральная штаб-квартира называет «Камерой Ловушек». Эти уровни, предположительно гремлинской конструкции, по всей видимости, специально построены для поимки и, в конечном итоге, уничтожения тех, кто пытается исследовать Часовой Механизм. \n\nУилкс, вероятно, не осознал, во что ввязался, пока не стало слишком поздно. Теперь он где-то застрял в камере и нуждается в вашей помощи. \n\nНекоторых ловушек можно избежать, а иногда приходится просто принять удар. Спасая Уилкса, вы несомненно познаете истинную ценность крепкой брони.
b.first_contact=Вы выбрались из спасательной капсулы и добрались до Спасательного Лагеря как раз когда солнце село над инопланетным ландшафтом. Используя комлинк, пришло время установить контакт со Спиральной штаб-квартирой.
b.first_contact_b=С восстановлением энергоснабжения Спасательного Лагеря вы теперь можете использовать комлинк для связи со Спиральной штаб-квартирой и выяснить, где они обосновались после крушения Скайларка. Установив контакт со Спиральной штаб-квартирой, вы, возможно, узнаете, что послужило причиной крушения и каковы особенности этого инопланетного мира, который вы ныне населяете.
b.first_mission=Вы разработчик? Любите ли вы получать удовольствие? Умеете ли вы читать? Пусть эта миссия послужит вам примером.
b.from_below=Отряд Рекон-Рейнджеров Десны заблокирован где-то в глубинах Часового Механизма таинственной силой. Судя по серьёзности рапортов и панических сообщений от отряда, Спиральная штаб-квартира полагает, что только кто-то с вашим опытом способен справиться с той смертоносной силой, что удерживает их.
b.frostifur_fandango=Спиральная штаб-квартира получает многочисленные рапорты об отрядах, уничтоженных стаей вольверов, известной как «Стая Снегокогтей», на глубине 10. Эти свирепые ледяные вольверы обладают морозным укусом и крайне территориальны. Из-за их неослабевающих атак Спиральная штаб-квартира запрашивает опытный отряд для проникновения в их логово и уничтожения, дабы предотвратить дальнейшие потери. \n\nРекомендуется подготовить колющее оружие и снаряжение с устойчивостью к заморозке перед развёртыванием.
b.full_depot=Показать полный Склад снабжения
b.get_recipes=Получить рецепты
b.go_shopping=Базар Хейвена — место, где можно найти всевозможные товары и услуги, связанные с предметами. Ищете ли вы более мощный меч или просто хотите выделить свою броню из толпы — здесь есть всё, что нужно\!
b.go_shopping_b=Базар Хейвена — место, где можно найти всевозможные товары и услуги, связанные с предметами. Однако, похоже, у обычно оживлённого рынка творится какая-то суматоха. Времени терять нельзя — назревает неприятность\!
b.great_escape=Рыцари-Разведчики собрали разведданные, показавшие, что гремлинский «Багровый Орден» начал отдавать приказы о строительстве временных тюрем в Часовом Механизме, куда заключаются пленённые Спиральные Рыцари. Считается, что эти приказы — прямая реакция на ваше уничтожение Близнецов Рормулус. \n\nДополнительные данные указывают, что временные тюрьмы — лишь промежуточное решение до постройки более крупного объекта. Спиральная штаб-квартира, однако, не намерена допустить, чтобы заключённые рыцари оставались там достаточно долго, чтобы в этом убедиться.
b.guardians_of_cradle=Вы приглашены на совещание с несколькими представителями Спиральной штаб-квартиры для обсуждения дальнейших действий в отношении Ядра и угрозы Роя. Присоединитесь к ним в Зале Героев, чтобы узнать об Оперативных Миссиях.
b.hall_of_heroes_1=Зал Героев — место, куда рыцари приходят для получения Звёздной Сертификации, позволяющей им проникать на более глубокие уровни Часового Механизма. Каждая сертификация гарантирует, что рыцарь соответствует звёздному уровню, необходимому для преодоления вызовов предстоящих миссий. \n\nЗал Героев также предоставляет рыцарям возможность побеседовать с рыцарями-ветеранами и узнать об их снаряжении, а также приобрести рецепты для подобного снаряжения. \n\nПосетите Зал Героев и получите 2-звёздочную Сертификацию, чтобы получить доступ к миссиям на более глубоких уровнях Часового Механизма.
b.hall_of_heroes_2=Чтобы спуститься ещё глубже в Часовой Механизм, вам необходимо вновь посетить Зал Героев и поговорить с Лейтенантом Баррусом для получения 3-звёздочной Сертификации.
b.hall_of_heroes_3=Чтобы спуститься ещё глубже в Часовой Механизм, вам необходимо посетить Зал Героев и поговорить с Лейтенантом Баррусом для получения 4-звёздочной Сертификации.
b.hall_of_heroes_4=Чтобы спуститься достаточно глубоко для достижения Ядра, вам необходимо посетить Зал Героев и поговорить с Лейтенантом Баррусом для получения 5-звёздочной Сертификации.
b.hall_of_heroes_5=Пришло время вновь войти в Зал Героев. Пройдя полную Звёздную Сертификацию и успешно выполнив множество миссий, обеспечивших выживание Спиральных Рыцарей на Крейдле, Спиральная штаб-квартира готовит вас к высокому званию Авангарда.
b.heart_of_matter=Лейтенант Вэлин возглавляла первый отряд, отправившийся в Часовой Механизм на поиски Альфа-Отряда. Она — талантливый командир отряда, которого считают равным самому Евклиду. Вэлин никогда не прекращала поиски и теперь пытается сформировать исследовательскую группу непосредственно у Ядра, чтобы лучше понять само место, где, по имеющимся данным, обрывается след Альфа-Отряда.
b.high_temperature_hostages=Разведка сообщила о гремлинской бригаде по демонтажу, разбирающей часть Часового Механизма для получения лома в качестве ресурсов для их Проекта R. Используя мощные сварочные горелки, они в буквальном смысле выжигают всё дотла. \n\nОдин из отрядов, обследовавших объект, пропал и, предположительно, удерживается в плену на месте. \n\nПроникните в пылающую Зону Деконструкции и спасите пленённых рыцарей. Но будьте предупреждены: по слухам, на объекте скрывается мощный охранный конструкт.
b.honor_duty=Лейтенант Ферон хотел бы коротко побеседовать с вами по поводу вашего достижения — прорыва через Огнештормовую Цитадель.
b.in_cold_blood=Что-то серьёзно встревожило хромалисков на уровнях под городом Эмберлайт. Спиральная штаб-квартира отправила туда отряд для расследования, и те быстро пропали с радаров. Теперь они прислали сигнал бедствия, сообщив, что окружены на глубине 21 хромалисками всех разновидностей. \n\nБиотехники предполагают, что хромалиски разъярены из-за близости к Ядру. Другие считают, что может быть сезон спаривания. Независимо от причины, отряд нуждается в спасении, прежде чем встретит свой конец от этих ящериц\!
b.king_of_ashes=В вечно пылающих глубинах Огнештормовой Цитадели Лорд Ванадьюк поджидает любое живое существо, осмелившееся вступить в его проклятое королевство. Всякий отряд, когда-либо пытавшийся проникнуть в цитадель, погибал или просто пропадал, подобно бесчисленным потерянным душам, прикованным к этому ужасному царству. \n\nЛорд Ванадьюк готов к войне, полагая в своём помутнённом разуме, что всякий, кто дерзнёт войти в цитадель, — вторженец, стремящийся захватить его королевство. Он стоит последним препятствием на пути к Ядру и любой надежде Спиральных Рыцарей восстановить Скайларк и вернуться домой. \n\nКак Чемпион Спиральных Рыцарей, только вы обладаете тем, что нужно, чтобы повести команду в самое сердце этого инферно и встретить титаническую мощь Лорда Ванадьюка.
b.laboratory_visit=Биотехник Морлин заведует Лабораторией, расположенной в Гарнизоне Хейвена. Он ищет способного рыцаря, готового бросить вызов Часовому Механизму ради спасения запаса «Боевых Спрайтов», утраченных при крушении Скайларка.
b.learn_recipes=Изучить рецепты
b.lfg=ПОИСК ГРУППЫ
b.minerals_rock=Главный Рыцарь-Геолог Вегнер отвечает за исследование странных минералов, которые рыцари начали добывать в Часовом Механизме. Он полагает, что они могут хранить ключ к проникновению в Ядро и извлечению энергии, необходимой для восстановления Скайларка. \n\nВстретьтесь с ним на Аркаде Хейвена и узнайте, как вы можете помочь его исследованиям, а также раскрыть истинную мощь Аркады Хейвена\!
b.mission=Вернуться к миссиям
b.mission_sprite_1=Рендон ожидает вас в области Часового Механизма, известной как Степи Заката, где разведка обнаружила запас пропавших Боевых Спрайтов. Закрепите спрайтов и очистите территорию от враждебных сил. Вам разрешено задействовать любых обнаруженных спрайтов для выполнения миссии.
b.mission_sprite_2=Рендон ожидает вас в области Часового Механизма, известной как Беспокойная Железная Дорога, где разведка обнаружила запас пропавших Боевых Спрайтов. Закрепите спрайтов и очистите территорию от враждебных сил. Вам разрешено задействовать любых обнаруженных спрайтов для выполнения миссии.
b.mission_sprite_3=Рендон ожидает вас на заброшенном гремлинском химическом заводе, где разведка обнаружила запас пропавших Боевых Спрайтов. Закрепите спрайтов и очистите территорию от враждебных сил. Вам разрешено задействовать любых обнаруженных спрайтов для выполнения миссии.
b.monstrous_research=К настоящему моменту вы, вероятно, собрали несколько образцов материалов в ходе ваших первых экспедиций в Часовой Механизм. Спиральная штаб-квартира запрашивает часть этих материалов для продолжения исследований существ, населяющих Часовой Механизм.
b.monstrous_research_2=К настоящему моменту вы, вероятно, собрали в первой ступени Часового Механизма интересные материалы, полезные для Спиральной штаб-квартиры. Помогите продвинуть непрерывное исследование тайн Крейдла, пожертвовав материалы.
b.monstrous_research_3=Биотехник Ган пытается продвинуть свои исследования семейств слизней и зверей и запрашивает образцы ваших недавних миссий. Он особо просил напомнить вам о его «весьма информативной лекции», прочитанной вам «совершенно бесплатно», при принятии решения о сотрудничестве.
b.monstrous_research_4=Биотехник Ган пытается продвинуть свои исследования семейств конструктов и гремлинов и запрашивает образцы ваших недавних миссий. Он вновь особо просил напомнить вам о «другой весьма информативной лекции», прочитанной вам «совершенно бесплатно во второй раз», при принятии решения о сотрудничестве.
b.monstrous_research_5=Биотехник Ган пытается продвинуть свои исследования семейств бесов и нежити и запрашивает образцы ваших недавних миссий. Он вновь особо просил напомнить вам о его «лучшей бесплатной лекции на данный момент» при принятии решения о сотрудничестве.
b.monstrous_research_6=Пройдя через челюсти свирепейших вольверов, уклонившись от шипов полностью эволюционировавших желейных кубов и даже мерзких извержений вирулисков, вы несомненно собрали образцы из этих столкновений, которые были бы весьма полезны исследовательским группам Спиральной штаб-квартиры.
b.monstrous_research_7=Сразившись с элитными гремлинами клана Тёмного Клыка, уклонившись от сокрушительных ударов ламберов и выдержав оптические залпы ретродов, вы несомненно собрали образцы из этих столкновений, которые были бы весьма полезны исследовательским группам Спиральной штаб-квартиры.
b.monstrous_research_8=Обратив в прах ужаснейших зомби, ускользнув от ледяных пастей гримолкинов и одержав победу в битве против армии троянов, вы несомненно собрали образцы из этих столкновений, которые были бы весьма полезны исследовательским группам Спиральной штаб-квартиры.
b.new_chapter=Одолев Снарболакса и извлекнув Модуль Разведки Альфа-Отряда, пришло время связаться с Агентом Разведки Корой, чтобы получить отчёт об анализе модуля и информацию о сертификации в Зале Героев.
b.new_threat=Смертоносные силы плетут заговор против Хейвена. Свяжитесь с Агентом Разведки Корой и узнайте, как вы можете помочь.
b.occurance_at_owlite_keep=Неожиданный источник разведданных обнаружился среди обитателей Поместья Муркрофт. Несколько спукатов, называющих его домом, вышли на контакт с одним из наших Рыцарей-Разведчиков и предоставили подробности о массе негативной энергии, появившейся над Ядром. \n\nНазывая её «местом пылающей ненависти» и «темницей тёмных душ», они говорят, что вы можете прочесть обо всём этом в «одной из тех странных совиных книг» в крепости совитов, расположение которой они указали. \n\nЕсли их утверждения верны, Спиральная штаб-квартира может получить ценные разведданные при обследовании крепости совитов. Просто помните, что все эти совиные строения кишат потерянными душами бесчисленных монстров-нежити. Подготовьтесь соответствующим образом.
b.oilers_in_boilers=Котельная под Поместьем Муркрофт захвачена легионом маслянистых слизней, известных как «маслоботы», которых, похоже, привлекают огненные условия. Это может обернуться катастрофой для всех близлежащих уровней, если слизни проникнут в котлы и спровоцируют взрыв. \n\nПоместье Муркрофт служит бесценным узлом связи с Слоем 2, а его усопшие обитатели были самыми радушными хозяевами. В интересах Спиральной штаб-квартиры отправить отряд разобраться с тлеющими слизнями, пока они не устроят огненную бурю, отрезав нам доступ ко Слою 2. \n\nВам предстоит отыскать маслоботов и выдворить их из котельной\!
b.operation_crimson_hammer_1=Воитель Сирус — злобный мастер вооружений всемогущего Багрового Ордена гремлинов. Считающийся истинным вдохновителем Близнецов Рормулус и бесчисленных других гремлинских орудий, он является создателем и поставщиком дьявольских военных машин для Багрового Ордена. \n\nРыцари-Разведчики под командованием Лейтенанта Ферона недавно обнаружили «Великий Арсенал» Сируса — его центр разработки и хранилище всего вооружения. Теперь сам Ферон ведёт несколько отрядов рыцарей прямо в Великий Арсенал с намерением выследить Сируса и уничтожить его военные машины. \n\nСтолкнувшись с ожесточённым сопротивлением, отряды Ферона нуждаются в подкреплении, и Спиральная штаб-квартира направляет вас на помощь.
b.operation_crimson_hammer_2=Воитель Сирус — мастер вооружений Багрового Ордена гремлинов. Считающийся истинным вдохновителем Близнецов Рормулус и бесчисленных других гремлинских орудий, он является создателем и поставщиком дьявольских военных машин для Багрового Ордена. \n\nРыцари-Разведчики под командованием Лейтенанта Ферона недавно обнаружили «Великий Арсенал» Сируса — его центр разработки и хранилище всего вооружения. Теперь сам Ферон ведёт несколько отрядов рыцарей прямо в Великий Арсенал с намерением выследить Сируса и уничтожить его военные машины. \n\nСтолкнувшись с ожесточённым сопротивлением, отряды Ферона нуждаются в подкреплении, и Спиральная штаб-квартира направляет вас на помощь.
b.operation_crimson_hammer_3=Воитель Сирус — мастер вооружений Багрового Ордена гремлинов. Считающийся истинным вдохновителем Близнецов Рормулус и бесчисленных других гремлинских орудий, он является создателем и поставщиком дьявольских военных машин для Багрового Ордена. \n\nРыцари-Разведчики под командованием Лейтенанта Ферона недавно обнаружили «Великий Арсенал» Сируса — его центр разработки и хранилище всего вооружения. Теперь сам Ферон ведёт несколько отрядов рыцарей прямо в Великий Арсенал с намерением выследить Сируса и уничтожить его военные машины. \n\nСтолкнувшись с ожесточённым сопротивлением, отряды Ферона нуждаются в подкреплении, и Спиральная штаб-квартира направляет вас на помощь.
b.p_anniversary_r3=Шеф-повар Скайларка Бискотти было поручено испечь торты в честь годовщины Спиральных Рыцарей. Что-то, по-видимому, пошло не так на её кухне, и она запрашивает подкрепление для оказания «кулинарной помощи».
b.p_anniversary_r4=Шеф-повар Скайларка Бискотти было поручено испечь торты в честь годовщины Спиральных Рыцарей. Что-то, по-видимому, пошло не так на её кухне, и она запрашивает подкрепление для оказания «кулинарной помощи».
b.p_anniversary_r6=Шеф-повар Скайларка Бискотти было поручено испечь торты в честь годовщины Спиральных Рыцарей. Что-то, по-видимому, пошло не так на её кухне, и она запрашивает подкрепление для оказания «кулинарной помощи».
b.p_anniversary_r7=Шеф-повар Скайларка Бискотти было поручено испечь торты в честь годовщины Спиральных Рыцарей. Что-то, по-видимому, пошло не так на её кухне, и она запрашивает подкрепление для оказания «кулинарной помощи».
b.p_anniversary_r9=Шеф-повар Скайларка Бискотти было поручено испечь торты в честь годовщины Спиральных Рыцарей. Что-то, по-видимому, пошло не так на её кухне, и она запрашивает подкрепление для оказания «кулинарной помощи».
b.p_anniversary_shock_r3=Мы получаем рапорты, что Гроут, местный повар Эмберлайта, ведёт себя... странно. Похоже, Бискотти поручила ему часть выпечки, однако ответственность, по-видимому, ударила ему в голову. Он исчез в Часовом Механизме вскоре после того, как Бискотти доставила последний ящик с тестом. С празднованием Годовщины под угрозой, Бискотти нуждается в кулинарных чемпионах, чтобы разобраться в этой кутерьме\!
b.p_apocrea_r4=Несколько опытных рыцарей пропали в, казалось бы, обычном участке Тоннелей Часового Механизма. Спиральная штаб-квартира подозревает злой умысел и назначила вас для расследования уровня.
b.p_apocrea_r6=Несколько опытных рыцарей пропали в, казалось бы, обычном участке Тоннелей Часового Механизма. Спиральная штаб-квартира подозревает злой умысел и назначила вас для расследования уровня.
b.p_apocrea_r7=Несколько опытных рыцарей пропали в, казалось бы, обычном участке Тоннелей Часового Механизма. Спиральная штаб-квартира подозревает злой умысел и назначила вас для расследования уровня.
b.p_apocrea_r9=Несколько опытных рыцарей пропали в, казалось бы, обычном участке Тоннелей Часового Механизма. Спиральная штаб-квартира подозревает злой умысел и назначила вас для расследования уровня.
b.p_demo_starlight=Начните миссию.
b.p_fast_advancement=Используйте эту эксклюзивную миссию тестового сервера для быстрого усиления вашего оружия и снаряжения. Каждый уровень этой миссии идентичен, что позволяет менять экипированное оружие и снаряжение на каждой глубине. \n\nДля максимального нагрева любого предмета нужно лишь несколько огоньков тепла\! Используйте «Вернуться в Хейвен» до прохождения конца, чтобы можно было вернуться к этой миссии.
b.p_fiend_test_t1=Пожалуйста, обратитесь к опубликованным инструкциям по тестированию этого контента.
b.p_ghost_machine_r4=Внимание\: Это Опасная Миссия\! \n\n\nДесна и её Рекон-Рейнджеры — элитная команда, задачей которой является сбор разведданных с самых опасных уровней Часового Механизма. Присоединение к ним может принести великую награду, но опасный путь гарантирован\! \n\nСпиральная штаб-квартира получила сигнал бедствия из заброшенного объекта глубоко в Часовом Механизме. Сигнал бедствия пришёл в виде цифрового сообщения со словами «спасите нас». Полагая, что это может быть ловушкой, Спиральная штаб-квартира развернула Рекон-Рейнджеров Десны для обследования объекта и помощи тому, кто мог отправить сообщение.
