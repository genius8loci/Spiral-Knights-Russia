b.p_r9_mat_345=Штаб-квартира «Спирали» постоянно стремится лучше понять существ, населяющих Часовой механизм, путем изучения материалов.  Если у вас есть лишние материалы, вы можете еще больше повысить свой престиж, пожертвовав их штаб-квартире Spiral.
b.p_r9_mat_4=Штаб-квартира Spiral постоянно стремится лучше понять существ, населяющих Часовой механизм, путем изучения материалов.  Если у вас есть лишние материалы, вы можете еще больше повысить свой престиж, пожертвовав их штаб-квартире Spiral.
b.p_r9_mat_5=Штаб-квартира «Спираль» постоянно стремится лучше понять существ, населяющих Часовой механизм, путем изучения материалов.  Если у вас есть лишние материалы, вы можете еще больше повысить свой престиж, пожертвовав их штаб-квартире «Спираль».
b.p_r9_min=Главный рыцарь Гео Вегнер постоянно стремится продвигать свои исследования загадочных минералов, обнаруживаемых в Часовых механизмах.  Эксперименты, которые он проводит с имеющимися образцами, зачастую приводят к их разрушению.  По этой причине ему всегда нужны отважные рыцари, готовые проникнуть в Часовые механизмы, чтобы добыть для него новые образцы.
b.p_r9_weap_4=Рыцари, спасенные из плена гремлинов, часто остаются ни с чем, кроме плохих воспоминаний о том, как их запирали в клетке и издевались над ними злобные похитители.  Их оружие всегда крадут, а снаряжение часто повреждают инженеры-гремлины, чтобы исключить любую возможность выживания при попытке побега. \n\nЧтобы вернуть этих рыцарей в строй и подготовить их к бою, штаб-квартире Спирали нужны другие рыцари, имеющие доступ к достаточным ресурсам, чтобы помочь и снабдить их необходимым оружием и снаряжением.
b.p_r9_weap_5=Рыцари, спасенные из плена гремлинов, часто остаются ни с чем, кроме плохих воспоминаний о том, как их заперли в клетке и издевались над ними злобные похитители.  Их оружие всегда крадут, а снаряжение часто повреждают инженеры гремлинов, чтобы исключить любую возможность выживания при попытке побега. \n\nЧтобы вернуть этих рыцарей в отряд, готовый к бою, штаб-квартире Spiral нужна помощь других рыцарей, имеющих доступ к достаточным ресурсам, чтобы обеспечить их необходимым оружием и снаряжением.
