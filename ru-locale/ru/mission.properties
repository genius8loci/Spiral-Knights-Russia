b.p_halloween_r3=Каждый год «Странники Хейвена» воздают дань уважения своеобразному духу, известному как «Тыквенный король», чтобы обеспечить богатый осенний урожай. Этот озорной призрак с удовольствием разыгрывает свою публику, но тут же вознаграждает её вкусными конфетами за пережитые приключения. \n\nОтпразднуйте Праздник Тёмного урожая и помогите «Странникам», найдя Тыквенного короля и воздав ему дань уважения.  Вы наверняка соберете по дороге конфеты, так что загляните на городскую площадь Хейвена и обменяйте их на призы!
b.p_halloween_r4=Каждый год Странники Хейвена воздают дань уважения странному духу, известному как «Тыквенный король», чтобы обеспечить хороший осенний урожай.  Этот озорной призрак с удовольствием разыгрывает свою публику, но быстро вознаграждает ее вкусными конфетами за терпение. \n\nОтпразднуйте Праздник темного урожая и помогите Странникам, найдя Короля тыкв и воздав ему дань уважения.  Вы наверняка соберете по дороге конфеты, так что загляните на городскую площадь Хейвена и обменяйте их на призы!
