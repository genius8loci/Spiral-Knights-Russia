b.p_moorcroft1=Кто-то или что-то призвало орду проклятых чёрных катов в Часовой Механизм. Эти тёмные звери жаждут магической силы и разграбили драгоценную коллекцию магических гримуаров из Архивов Поместья Муркрофт. \n\nВ чужих руках эти древние тома могли бы стать катастрофой, но оказалось, что чёрные каты не умеют читать, так что они просто решили их съесть.\n\nОбитатели Поместья Муркрофт просят вас извлечь Древние Страницы магических гримуаров, которые, по всей вероятности, находятся в желудках чёрных котов. Как именно их добыть — оставим на ваше усмотрение... \n\nДля этой миссии спуститесь в глубины гнилой канализации, где разведка обнаружила гнездо чёрных котов. Верните те Древние Страницы в Поместье Муркрофт\!
