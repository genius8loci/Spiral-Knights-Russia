m.laboratory_visit=Визит в Лабораторию
m.laboratory_visit_1a=Приветствую, {0}\! Слышал, вы недавно прибыли в Хейвен из-за великой расселины. Пока вы были там, вам не встречались наши боевые спрайты?
m.laboratory_visit_2a=Ах, ну да, вы же новобранец. Большинство рыцарей встречают своего первого спрайта на поле боя. Вероятно, у вас ещё не было возможности увидеть хоть одного. \n\nПозвольте объяснить...
m.laboratory_visit_3a=Боевой спрайт — это управляемый искусственным интеллектом конструкт, способный вести разведку и оказывать лёгкую боевую поддержку. Боевые спрайты обладают высокой адаптивностью. Их ИИ позволяет им чутко наблюдать за окружением и помогать своему рыцарю наиболее оптимальным способом.
m.laboratory_visit_4a=Когда боевой спрайт закрепляется за рыцарем, в код спрайта прописывается «связь», обязывающая его поддерживать рыцаря при любых обстоятельствах. Они никогда не покинут вас\! \n\nК сожалению, грузовые контейнеры с запасом боевых спрайтов Скайларка упали глубоко в Часовой Механизм после крушения.
m.laboratory_visit_5a=Разведывательному отряду удалось отследить местоположение многих из этих боевых спрайтов. Рендон отправлен вперёд, чтобы разведать три из этих мест, и встретится с вами в Часовом Механизме. \n\nВы должны обезопасить наших боевых спрайтов прежде, чем они попадут в руки врага\!
m.legion_almire_1a=Ничто так не разгоняет кровь, как смертельно опасная вылазка через проклятый некрополь, а, Рейнджеры? \n\nНекрополь берёт начало из Альмира — павшего королевства некоего безумного лорда как-его-там, население\: бессчётные легионы Нежити. Судя по всему, эти не-вполне-живые обитатели стерегут нечто, что Спиральная штаб-квартира хотела бы заполучить. \n\nНаша задача — найти особую книгу, часть гораздо более обширного собрания сочинений, которое может пролить свет на природу этого проклятого королевства. Так что хватайте шлемы и лучшее оружие против зомби — тёплого приёма я не жду. \n\nВперёд, Рейнджеры\!
m.legion_almire_2a=Отрывок из хроник Лорда Бранделла, Верховного Канцлера Альмира\: \n\nПодобно столь многим своим подданным, Закон и Порядок бежали из Альмира. Лишь Правосудие осталось, но и оно искривлено проклятым пламенем, что терзает наше королевство. Правосудие отныне — пылающий скипетр некогда великого Лорда Ванадьюка. Правосудие стремительно, неумолимо, беспощадно. \n\nМоё положение одарило меня многим при жизни. Когда-то я любил вид, открывающийся из моей башни. С этих высот я мнил себя первым, кто встречает весну, первым, кто вдыхает аромат жизни, когда расцветают цветы.
m.legion_almire_3a=Теперь лишь смерть и дым витают в воздухе, даже на этих великих высотах. И огонь; неестественное пламя, что, кажется, горит вечно, пламя, обращающее даже самых благочестивых мужей в кошмарных чудовищ — я знаю, что это пламя вскоре поглотит и меня. \n\nЯ не подарю бывшему Лорду свою собственную жизнь. Она не его, чтобы отнимать, чтобы искажать. Это будет мой последний приказ. Это будет моё Правосудие.
m.loading=Загрузка деталей покупки...
m.loading_depot=Загрузка...
m.minerals_rock=Камешки и Минералы\!
m.mission_completed=Миссия\nЗавершена
m.mission_cost=СТОИМОСТЬ\: Кроны\: {0}, Энергия\: {1}
m.mission_sprite_1=Откровение в Пламени
m.mission_sprite_1_1a=Итак, {0}, приступим. Похоже, нам с вами предстоит небольшая охота на спрайтов, а? \n\nЯ настроил свой трекер по данным рыцарей-разведчиков, но что-то не так. Энергетическая сигнатура, которую я улавливаю, хаотична, но определённо принадлежит боевому спрайту. Возможно, они в беде — поспешим\!
m.mission_sprite_1_2a=Что за... это... боевые спрайты? Что-то с ними произошло, они превратились в какое-то существо.
m.mission_sprite_1_3a=Они выглядят дружелюбно. Более того, ведут себя совсем как знакомые мне боевые спрайты. Единственное отличие — они, эм, ну, похожи на драконов.
m.mission_sprite_1_4a=Эй, похоже, один из спрайтов к вам привязался\! Что ж, не будем тратить эту силу впустую — я останусь здесь и защищу этих спрайтов. А вы используйте вашего нового друга, чтобы зачистить остальную территорию от врагов.
m.mission_sprite_1_5a=Я останусь здесь и защищу этих спрайтов. Некоторые транспортные контейнеры для спрайтов пусты. Думаю, кто-то или что-то охотится за ними. \n\nВы идите вперёд и зачистите территорию от врагов, чтобы спасательный отряд мог безопасно прибыть.
m.mission_sprite_1_6a=Это поразительно\! Боевые спрайты, которых вы спасли из Закатных Степей, каким-то образом трансформировались в совершенно новую сущность\!
m.mission_sprite_1_7a=В самом деле. Хотя их клеточная структура по-прежнему полностью идентична боевому спрайту. Моя гипотеза: они стремительно эволюционировали, чтобы выжить в новой среде, но как? Наши технологии никогда не были способны на подобное...
m.mission_sprite_1_8a=Да. Похоже, нам ещё многому предстоит научиться в этом месте. \n\nВ отчёте Рендона упоминалось, что многие спрайты пропали с места обнаружения. Он предположил злой умысел.
m.mission_sprite_1_9a=Если так, мы должны предотвратить дальнейший ущерб. А теперь, прошу, ещё больше спрайтов ждут спасения. И кто знает, что мы обнаружим, когда доберёмся до них\!
m.mission_sprite_2=Ангелы из Древности
m.mission_sprite_2_1a=Ну и местечко, а? Похоже на какую-то старинную железнодорожную станцию, захваченную неупокоенными духами. Странное место для подземелья. \n\nВ любом случае, нам лучше поторопиться к тайнику со спрайтами, учитывая то, что мы обнаружили в Закатных Степях. Вперёд\!
m.mission_sprite_2_2a=Сначала драконы, а теперь... маленькие крылатые кошачьи создания? Не могу поверить, что мы снова наблюдаем этот феномен\!
m.mission_sprite_2_3a=Ого, {0}, у вас прямо талант в обращении с боевыми спрайтами\! Не будем терять время. Расчистите путь впереди, чтобы спасательная команда смогла безопасно пройти\!
m.mission_sprite_2_4a=Хм, кажется, эти спрайты изучают старинные книги. Я и не знал, что они умеют читать\! \n\nВ любом случае, я останусь здесь и защищу этих спрайтов. Вижу ещё пустые транспортные контейнеры — дурной знак. Вы идите вперёд и зачистите территорию от врагов, чтобы спасательный отряд мог безопасно прибыть.
m.mission_sprite_2_6a=И вновь эти спрайты, похоже, адаптировали свою форму в соответствии с окружающей средой.
m.mission_sprite_2_7a=Неясно, {0}. Судя по отчёту Рендона, я бы сказал, что они почерпнули знания из тех древних магических фолиантов, которые вы обнаружили рядом с этими спрайтами. Поразительно, что они, судя по всему, адаптировали свои боевые способности именно благодаря этому.
m.mission_sprite_2_8a=Да, похоже, эти спрайты освоили способность фокусировать свои силы на умениях защиты своего рыцаря. Учитывая это и их внешний облик, я нарёк их «серафинксами».
m.mission_sprite_2_9a=Да, знаю. Как бы то ни было, мне также сообщили, что часть транспортных контейнеров для спрайтов снова оказалась пуста. Что-то тут нечисто... \n\nА теперь обезопасьте последний тайник со спрайтами, пока тот, кто их похищает, не нашёл его первым\!
m.mission_sprite_3=Призрачная Маска
m.mission_sprite_3_10a=Ваш сарказм принят к сведению. \n\nИтак, о пустых транспортных контейнерах для спрайтов — злой умысел подтверждён.
m.mission_sprite_3_11a=Разведывательный отряд обнаружил гигантского конструкта-монстра, подобного которому мы прежде не видели, похищающего нескольких боевых спрайтов. Мы полагаем, что за всем этим стоят гремлины.
m.mission_sprite_3_12a=Ценю вашу отвагу, но если первые доклады об этом конструкте-монстре верны, вам понадобится дополнительная помощь. Я подготовлю подборку боевых спрайтов для установления связи с вами, {0}. Мы поговорим снова, как только я завершу все приготовления.
m.mission_sprite_3_1a=Будьте настороже, {0}, — что бы ни затевали здесь гремлины, это создало крайне опасную обстановку. \n\nПоспешим к тайнику со спрайтами, пока ещё больше их не пропало\!
m.mission_sprite_3_2a=Ой, это спрайты или какие-то призраки?
m.mission_sprite_3_3a=Спрайты снова изменились, и на этот раз они наводят на меня настоящий ужас\!
m.mission_sprite_3_4a=Хех, не оглядывайтесь, {0}, но за вашим плечом привидение\! Будем надеяться, что эти спрайты вложили не все свои силы во внешний облик. \n\nИспользуйте его, чтобы расчистить путь впереди и обеспечить безопасный проход спасательной команде\!
m.mission_sprite_3_5a=И снова множество пустых транспортных контейнеров. Дело плохо, {0}. Лучше идите вперёд и зачистите территорию от врагов, чтобы спасательный отряд мог безопасно прибыть.
m.mission_sprite_3_6a=Мне любопытно... что, по-вашему, скрывается за их масками? Подождите, нет, не хочу знать.
m.mission_sprite_3_7a=Открытия на этой планете становятся всё более странными. Теперь наши спрайты принимают облик неких призраков.
m.mission_sprite_3_8a=Да, именно. Эти спрайты обрели способность маскироваться, использовать сами тени вокруг себя для обмана. Если учесть это и их обретённые навыки в токсинах и ослаблениях, я бы сказал, что они весьма полезны на поле боя.
m.mission_sprite_3_9a=О да, учитывая их внешний вид, полагаю, «маскерейт» им вполне подходит\!
m.monstrous_research=Чудовищные Изыскания
m.monstrous_research_2=Чудовищные Изыскания
m.monstrous_research_3=Чудовищные Изыскания
m.monstrous_research_4=Чудовищные Изыскания
m.monstrous_research_5=Чудовищные Изыскания
m.monstrous_research_6=Чудовищные Изыскания
m.monstrous_research_7=Чудовищные Изыскания
m.monstrous_research_8=Чудовищные Изыскания
m.name=Имя
m.new_chapter=Новая Глава
m.new_chapter_1a=Поздравляю с получением звания Солдата, {0}\! Слышал, вы задали тому Снарболаксу знатную трёпку — отличная работа\! \n\nНам удалось проанализировать Модуль Разведки Евклида, который вы обнаружили в логове Снарболакса. Судя по записи, Евклид подозревал то же, что и наши Гео-Рыцари обнаружили вскоре после крушения — уровни внутри Часового Механизма состоят из местности множества инопланетных миров\!
m.new_chapter_2a=Мы пока не можем утверждать наверняка, но, похоже, каким бы образом ни был сформирован Крейдл, он вобрал в себя крупные фрагменты других миров. Если это правда, то мы никогда прежде не видели ничего подобного.
m.new_chapter_3a=Спиральная штаб-квартира разрешает вам посетить Зал Героев и получить Сертификат 2 Звезды. \n\nЗал Героев — место, куда рыцари, растущие в звании, подобные вам, приходят как для изучения и приобретения новых рецептов снаряжения, так и для получения допуска к более глубоким уровням Часового Механизма. \n\nДля первого посещения достаточно лишь носить полное снаряжение 2 Звезды, которое у вас уже есть, так что это будет проще простого\!
m.new_threat=Новая Угроза
m.new_threat_10a=Приём, {0}\! Что там произошло?
m.new_threat_11a=Боже мой\! Какая связь между этими гремлинами и тем Артефактом?
m.new_threat_12a=Хмм, похоже, большая часть нашего сенсорного оборудования повреждена. Потребуется время, чтобы всё наладить настолько, чтобы я смогла отследить Артефакт. Пока мы этим занимаемся, вам стоит связаться с одним из наших Биотехников — Ганом. Он немного грубоват, но поможет вам подготовиться к предстоящим испытаниям. \n\nЯ свяжусь с вами позже, как только мои системы слежения снова заработают\!
m.new_threat_1a=Приветствую, {0}\! У нас две миссии жизненной важности. Во-первых, мы засекли энергетическую сигнатуру, схожую с той, что исходит от Артефакта, найденного вами в Часовом Механизме. Сейчас мы наводимся на эту сигнатуру. Обнаружение источника может помочь нам понять, что тот гремлинский интриган Развог намеревался делать с Артефактом, или на что это устройство в действительности способно.
m.new_threat_2a=И раз уж речь зашла о гремлинах — мы начинаем получать тревожно большое количество сообщений о мобилизации гремлинов в Часовом Механизме под Хейвеном. Подробностей пока немного, но учитывая наш прежний опыт общения с ними, мы полагаем, что они готовятся к нападению.
m.new_threat_3a=Спиральная штаб-квартира считает, что вы — лучший выбор для отслеживания энергетической сигнатуры, поскольку именно вы принесли нам Артефакт. Рендон будет направлен по следу гремлинов внизу.
m.new_threat_4a=(Кора замолкает) \n\nЛёгок на помине — Рендон выходит на связь прямо сейчас; говорит, срочно. Переключаю на него...
m.new_threat_5a={0}, здесь, в Лаборатории, происходит что-то серьёзное. Вы должны немедленно прибыть сюда\!
m.new_threat_6a=Из лаборатории только что доносились крики и взрывы. Думаю, на нас напали\! Лучше экипируйтесь. Понятия не имею, что там творится, но нам лучше быть готовыми ко всему\!
m.new_threat_7a=Шшш\! Итак, вы — те, кто победил Развога и забрал то, что принадлежит мне. Вы недостойны обладать этим могущественным Артефактом, и потому я здесь, чтобы избавить вас от него.
m.new_threat_8a=Пфф\! Я не какой-то там заурядный гремлин. Я — тысяча глаз, что наблюдают за вами во мраке. Я — шипящий клинок, что шепчет вашу погибель. Разрушьте каждую стену и шестерню в этом проклятом месте — и найдёте лишь тени. \n\nМеня не остановить таким, как вы\! Шшш\!
m.new_threat_9a=Вам не остановить то, что вы не способны увидеть.
m.new_threat_9b=(Нет никаких следов гремлина или Артефакта. Этот гремлин весьма искусен в заметании следов.)
m.new_threat_bystander_1a=Мы едва выбрались живыми. В один момент всё было спокойно, а в следующий — гремлины полезли из-под земли\!
m.new_threat_bystander_1b=Осторожнее там. Похоже, с ними был кто-то здоровый...
m.new_threat_bystander_1c=Я переживаю за спрайтов\!
m.new_threat_bystander_1d=Я только что слышал взрыв в глубине лаборатории\! \n\nМы справимся с этими монстрами, {0}. Вы идите и убедитесь, что Артефакт в безопасности\! Скорее\!
m.no_objective=Нет текущей цели
m.occurance_at_owlite_keep=Происшествие в Совиной Крепости
m.occurance_at_owlite_keep_1a=(Это, по-видимому, тот самый совиный фолиант, о котором спукаты говорили, что он описывает место над Ядром. Его страницы сильно изношены, и лишь фрагменты оригинального текста поддаются расшифровке.)
m.occurance_at_owlite_keep_2a=...Этот мир знал мало больших трагедий, чем падение великого Королевства Альмир. Некогда живописный, прекрасный край густых лесов и бескрайних равнин... \n\n...соседние королевства объявили войну... \n\n...в поисках силы, способной переломить ход событий, Лорд Ванадьюк Альмирский бежал в горы...
m.occurance_at_owlite_keep_3a=...вернувшись чем-то противоестественным... \n\n...бесконечный ад... \n\n...Альмир уничтожен... \n\n...они не могут уйти, не могут избежать пламени...
m.occurance_at_owlite_keep_4a=(Оставшиеся страницы слишком истлели, чтобы расшифровать что-либо ещё, за исключением даты описанных событий, которая указывает, что Королевство Альмир было уничтожено более тысячи лет назад.)
