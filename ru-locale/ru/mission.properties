m.razwog_defeated=На одежде Развога есть странный алый символ.
m.rc_buddyknight_1a={0}\! Я слышал, что тебя выбрали, чтобы спасти ситуацию, да?  Ну, прежде чем ты начнешь выделываться «героем» и устремишься в темноту внизу, почему бы нам с тобой не отправиться на другую сторону лагеря и не преподать урок нескольким монстрам, которые разгромили этот лагерь прошлой ночью?
m.rc_buddyknight_2a=Ну, тогда тебе понадобится вот это!  Это протобомба, и она отлично подходит для того, чтобы все взрывать! \n\nУ меня была лишняя в капсуле, так что считай это авансом за то, что спас нам всем шкуры.
m.rc_buddyknight_3a=Давай сразу же найдем ей достойное применение. \n\nТы можешь принимать миссии, нажав кнопку «Миссия» вверху экрана, и принять миссию, которую я тебе дал.
m.rc_buddyknight_4a=Прими мою миссию, и давай приступим к делу — взорвем кое-что!
m.rc_buddyknight_5a=Похоже, сам мир пытался заманить тебя в ловушку — чуть не погиб! \n\nБудь начеку, когда пойдёшь исследовать Древний генератор внизу. Если на поверхности этого мира кишат монстры и повсюду расставлены ловушки, кто знает, что ты найдёшь там, внизу, в темноте!
m.reporting_duty=Являюсь на службу
m.reporting_duty_1a=Рад встрече, солдат, и спасибо, что добрался до нашего базового лагеря здесь, в Хейвене. Я лейтенант Ферон. Капитан Озло поручил мне курировать наши горнодобывающие операции в Часовых механизмах. \n\nПеред тобой — «Аркада», увлекательный комплекс, служащий нашим мостом в самое сердце Часовых механизмов. Поскольку ты здесь новичок, я кратко расскажу, чем нас здесь заставила заняться штаб-квартира Спирали.
m.reporting_duty_2a=После крушения «Скайларка» его основное ядро из тиария взорвалось, уничтожив часть корабля и лишив его основного источника энергии. Поскольку до сих пор мы не нашли несколько сотен тонн тириума, просто валяющихся где-то поблизости, «Птица» фактически лишилась крыльев. \n\nС помощью «Странников» нам удалось развернуть небольшую оперативную базу здесь, в Хейвене. Как только наши системы заработали, мы обнаружили, что в самом сердце этой скалы резонирует энергетический след беспрецедентной мощности.
m.reporting_duty_3a=Совершенно верно! В самом сердце Часового механизма вполне может находиться источник энергии, необходимый нам для создания нового источника питания для «Скайларка» и восстановления его работоспособности. Есть только одна проблема — сам Часовой механизм, похоже, построен как какая-то безумная смертельная ловушка. \n\nДобраться до сердца будет нелегко...
m.reporting_duty_4a=Вот такой настрой мне и нравится. Продолжай выполнять задания для штаба «Спирали», которые тебе поручают. С твоей помощью у нас есть шанс добраться до Сердца и спасти Исору.
m.reporting_duty_5a=Тогда я разрешаю тебе принимать задания из Аркады.  Ты можешь попасть в Аркаду через интерфейс заданий или подойти прямо к воротам здесь, в самой Аркаде. Под вашими ногами находится огромный мир, ждущий своего открытия.\n\nУдачи вам!
m.rescues_and_recycling=Спасения и переработка
m.return_of_ur=Возвращение Ура
m.rise_or_fall=Восход или падение
m.rotting_metropolis=Гниющий мегаполис
m.sale_cost=РАСПРОДАЖА! {0}
m.scarlet_fortress=Алая крепость
m.search_continues=Поиски продолжаются
m.search_continues_1a={0}, я не знаю, как вас отблагодарить.  Мы уже создали нашу исследовательскую базу и собираем огромное количество данных, которые мы никогда бы не получили без ваших усилий.
m.search_continues_2a=Модуль разведки, который вы добыли, очень странный.  У меня нет причин сомневаться в правдивости слов Пармы, но как это произошло, я просто не могу сказать.  Всё в «Ядре» указывает на то, что в него нет никаких «дверей».  Это не сооружение, построенное для входа снаружи.  Скорее, всё обстоит с точностью до наоборот.
m.search_continues_3a=Возможно.  Если посмотреть на него, это вполне вероятно.  Нам нужно изучить его подробнее.
m.search_continues_4a=Я не знаю, но она нарисовала действительно ужасающую картину. Что-то шевелится в сердце этого мира, {0}, что-то ужасное.  Я чувствовал это с тех пор, как мы впервые ступили на эту землю; невидимые глаза, следящие за каждым нашим движением, фигуры, формирующиеся за пределами поля зрения... нечто большее, чем гремлины, обитает в этом мире.
m.search_continues_5a=Я не отказался от поиска Эвклида, Пармы, Гранца и Рулена.  Они где-то там, и я найду их, даже если для этого придется самому войти в Ядро.
m.search_continues_6a=Ты тоже, Авангард.
m.securing_camp=Если ты решишь принять
m.securing_camp_1a=Что ж, похоже, мы попали в затруднительное положение, {0}. Чтобы этот лагерь заработал, предстоит проделать немало работы, поэтому тебе теперь разрешено принимать задания! Все доступные задания ты найдешь на панели «Деятельности».
m.securing_camp_2a=Задания варьируются от опасных боевых столкновений до разговоров с определенными людьми, такими как я.  Выполняя задания, вы будете продвигаться к новым званиям, что, в свою очередь, откроет вам доступ к всё более мощному снаряжению.  Грета сообщила мне, что вы займётесь решением нашей проблемы с энергоснабжением в Древнем генераторе?
m.securing_camp_3a=Что ж, будь начеку. Если на поверхности этого мира кишит монстрами, кто знает, что ты найдешь там, внизу, в темноте!
m.securing_camp_4a=Не забудь принять эту миссию и будь осторожен там, внизу!
m.securing_camp_b=Обеспечение безопасности лагеря
m.securing_camp_b_1a=Вот ты где, {0}\!  Я уже начинал думать, что ты не появишься\! \n\nЛадно, давай приступим к работе по обеспечению безопасности этого места.  Но сначала тебе нужно экипировать ту протобомбу, которую я тебе дал.  Подойди к станции «Арсенал» позади меня и экипируй её.
m.securing_camp_b_2a=Отлично!  Теперь краткий урок по заряженным атакам. \n\nЗаряженные атаки можно выполнять с любым оружием, удерживая кнопку АТАКА и дожидаясь, пока аура заряда достигнет максимального уровня.  Во время заряда ты можешь свободно передвигаться!
m.securing_camp_b_3a=Как только аура заряда достигнет максимального уровня, отпусти кнопку АТАКА и нанеси сокрушительную заряженную атаку!
m.securing_camp_b_4a=Бомбы особенны тем, что у них нет стандартной атаки.  Бомбу можно использовать ТОЛЬКО в качестве заряженной атаки, так что постарайся маневрировать вокруг монстров во время заряда!
m.securing_camp_b_5a=Ладно, потренируйся в нескольких бомбовых атаках, а потом иди туда и уничтожь этих монстров!
m.securing_camp_b_6a=Что-то произошло!  Эта дверь внезапно появилась позади тебя, словно ловушка! \n\nЗащищайся, {0}!
m.securing_camp_b_7a=Что это было, черт возьми?  Откуда взялась эта дверь? \n\nПохоже, этот механический мир под нашими ногами нацелился на нас, {0}. Лучше будь осторожен! \n\nВ любом случае, я думаю, что эта область безопасна, по крайней мере до наступления ночи.  Давай вернемся в лагерь.
m.sewer_stash=Запас в канализации
m.shadow_beast=Тень зверя
m.shadow_knows=Тень знает
m.shadow_knows_1a={0}, я слышал, тебя повысили до рыцаря... э-э, молодец, да?
m.shadow_knows_2a=Штаб-квартира «Спирали» сообщила мне, что ты готов узнать о монстрах, наносящих урон тенью, верно?
m.shadow_knows_3a=Очень хорошо, тогда давай начнём.  Урон тенью обычно вызывается скоплениями отрицательной энергии.  Атаки, наносящие урон тенью, включают в себя всё: от психического манипулирования вышеупомянутой отрицательной энергией до физических атак с использованием оружия, выкованного из тёмной материи.
m.shadow_knows_4a=Возможно, геологии здесь не место?  Вы правы, {0}. \n\nПродолжим: урон от тени наносят монстры семейств демонов и нежити.  Кроме того, демоны, как правило, уязвимы к проникающему урону, а нежить — к урону от стихий. Имейте это в виду. \n\nИтак, вам нужно что-нибудь еще?
m.shadow_knows_5a=Здесь всё?  Да, хотя я хотел бы добавить ещё одну вещь.
m.shadow_knows_6a=Я слышал, как некоторые из других биотехников говорили о том, как сильно они хотят снова запустить «Скайларк» и вернуться домой.  Я слышал, что они очень благодарны рыцарям, таким как ты, {0}.
m.shadowplay=Shadowplay
m.shadowplay_1a=Опять опоздали! Я уже собрал энергию, необходимую для использования Артефакта, и ничто из того, что вы сейчас сделаете, не остановит то, что я запустил.
m.shadowplay_2a=Уходи. Я дам тебе последний шанс, прежде чем уничтожу твой назойливый вид. Однако, если ты решишь отклонить мое щедрое предложение, то можешь прийти и сразиться со мной в Ядре, где я ускорю твою гибель.
m.shadowplay_3a=С нетерпением жду нашей следующей... встречи.
m.shocking_sentient_sentries=Шокирующие разумные часовые
m.shocking_sentient_sentries_1a=«Искра-кастер Делюкс» почти готов, обещаю. Мне нужно еще немного времени, Военачальник.
m.shocking_sentient_sentries_2a=Похоже, время истекло, Спуттерспарк.  Тебе лучше надеяться, что твоя игрушка сработает.
m.shocking_sentient_sentries_3a=Ааааа! Нет, нет, нет! Н-но он еще не готов...!  Похоже, у меня нет выбора! \n\nSparkcaster Deluxe... активируйся!
m.shocking_sentient_sentries_4a=Аааа! Мне нужно убираться отсюда! \n\nАварийный Сникфилд... активировать!
m.shopping_again=Пойдем снова за покупками!
m.shopping_again_10a=Билеты на аксессуары можно найти в ящиках с замками или на Аукционе, если другой Рыцарь случайно их продает.
m.shopping_again_11a=Ну, вот и все основные моменты о Базаре.  Это действительно фантастическое место, где можно найти практически все, что угодно. \n\nХочешь, я еще раз все повторю, или думаешь, что уже все понял?
m.shopping_again_12a=Без проблем, у меня есть время.  Давай вернёмся к Панчу и Вайзу.
m.shopping_again_12b=Замечательно!  Рад, что смог тебе помочь.  Удачи, и помни, что я всегда буду здесь, чтобы твоя броня выглядела уникально!
m.shopping_again_1a=Привет, {0}\!  Ого, ты уже стал Солдатом?  Ты действительно быстро продвигаешься по служебной лестнице. \n\nВ любом случае, я здесь, чтобы показать тебе некоторые из более продвинутых услуг Базара. Для начала, хочешь узнать, как еще больше усилить свое снаряжение?
m.shopping_again_2a=А кто не хочет?  Пойдем в мастерскую Панча и Вайза.
m.shopping_again_3a=Панч и Вайз — кузнецы-гремлины, которые могут изменять свойства твоего оружия и снаряжения.
m.shopping_again_4a=Не волнуйся, {0}, не все гремлины одинаковы.  Некоторые не согласны с методами короля Тинкинзара и Алого Ордена.  На самом деле, мне сказали, что где-то в глубине Часового Механизма есть целый город, полный гремлинов, покинувших Великую Колонию.
m.shopping_again_5a=Ладно, вернёмся к делу. \n\nПанч может за определённую плату добавить к вашему оружию и снаряжению «уникальные варианты» — своего рода специальные бонусы. Но его методы, э-э... хаотичны.  Никогда не знаешь, что именно получишь. \n\nВайс действует чуть более точно.  За определенную плату он может развязать ваше оружие и снаряжение, позволяя вам снова продать или подарить этот предмет!
m.shopping_again_6a=Пойдем к Бринксу.
m.shopping_again_7a=Бринкс — торговец жетонами, выдающий рыцарям определенные предметы в обмен на жетоны, которые можно собрать в Часовых механизмах.  Жетоны можно найти в блоках с сокровищами, получить в качестве награды за миссии или найти после победы над особыми боссами.
m.shopping_again_8a=Осталось посетить всего один магазин, и на этом мы закончим. Я приберег самое лучшее напоследок.
m.shopping_again_9a=А вот и... я!  Я — «Аксессуаризатор», добавляющий аксессуары к вашему снаряжению, если у вас есть билет.  С аксессуарами ваше снаряжение будет действительно выделяться из толпы, я настоятельно рекомендую попробовать.  Вы скоро станете любимчиком всех\!
m.shopping_again_b=Пойдем по магазинам\!
m.shopping_again_b_1a=Привет, {0}\!  Вау, вы уже стали Солдатом?  Ты действительно быстро продвигаешься по служебной лестнице. \n\nВ любом случае, я Бешамель, и я здесь, чтобы провести тебе экскурсию по некоторым из более продвинутых услуг Базара. Для начала, хочешь узнать, как еще больше усилить свое снаряжение?
m.silent_legion=Безмолвный Легион
m.silent_legion_1a=Тебя послали за мной?  Чтобы забрать меня обратно?  Нет, я теперь там, где мне и положено быть. Я больше не служу Ордену Спирали и останусь здесь. \n\nУходи отсюда и никогда не возвращайся.  Оставь меня в покое.
m.silent_legion_2a=Могу поклясться, что только что слышал их — их голоса доносились на ветру.  Больше не крики, больше не плач — шепот.  Неразборчивый даже в тишине этого места.  Они оставляют меня здесь?  Почему я должен остаться? \n\nТы... Я предупреждал тебя не приближаться, держаться от меня подальше.  Теперь ты узнаешь, что они сделали... что те, кто близок ко мне, умирают!
m.silent_legion_3a=От его павшего тела исходит сильная печаль.  Его глаза тускнеют, и тьма окутывает его.  Аркус потерян.
m.silent_legion_recon_mod=Меня тянет в это место. \n\nВ глазах этих безмолвных воинов я вижу себя\: холодным, сильным, непоколебимым... и рушащимся. Меня просили отпустить это, двигаться дальше, но я не могу. \n\nИх лица, их предсмертные крики... они преследовали меня в снах, и я больше не сплю.  Теперь я вижу их, когда закрываю глаза, поэтому я не буду моргать. \n\nЯ останусь здесь, среди камней... не моргая, не забывая.
m.skies_under_cradle=Небо над колыбелью
m.sovereign_slime=Властелин слизи
m.spark_roar=Искра и рев
m.stars=Звезды
m.start=СТАРТ
m.status_deployed=Развернут\nРыцари, присоединившиеся к развернутой группе, не получат очки за выполнение миссии.
m.status_lobby=Лобби миссии\nРыцари, присоединившиеся в лобби миссии, могут получить очки за выполнение миссии.
m.steam_dlc=Доступно в Steam
m.steam_overlay_disabled=Для покупки дополнений необходимо включить оверлей Steam. Убедитесь, что в настройках Steam «В игре» установлен флажок «Включить Steam Community в игре», а затем перезапустите игру.
m.strength_unity=Сила в единстве
m.target_acquired=Цель обнаружена
m.target_acquired_1a=Привет, {0}, надеюсь, ты готов к тому, что я снова отправлю тебя в логово льва.
m.target_acquired_2a=Да, проект R, похоже, на самом деле представляет собой два огромных оружия, известных как «Близнецы Роармулус».  Разработанные одним из членов самого «Кримсон Ордера», «Близнецы Роармулус» представляют собой своего рода конструкт-пушки, которые гремлины намерены продвинуть через «Часовой механизм» в «Аркаду Хэйвена»! \n\nСудя по схемам, их мощность намного превосходит стандартное оружие гремлинов и может нанести поистине сокрушительный ущерб Хэйвену, штаб-квартире «Спирали» и «Странникам», если они доберутся до Аркады.
m.target_acquired_3a=Мы определили, что оно находится на самом нижнем уровне гремлинского объекта, известного как «Завод боеприпасов Железный Коготь».  Завод используется для производства всех видов гремлинского оружия и представляет собой высокую опасность даже для работающих там гремлинов. \n\nВы должны быть готовы к сильному сопротивлению со стороны конструктов, питающихся шоком, и гремлинов.
m.target_acquired_4a=Осталось еще одно дело — похоже, ты не первый рыцарь, проникший на завод боеприпасов «Железный коготь». Мы обнаружили еще один разведывательный модуль отряда «Альфа» где-то на территории завода. Попробуй его найти. Надеюсь, анализ подтвердит, что отряд Эвклида выбрался оттуда живым...
m.terminal_meltdown=Плавление терминала
m.the_collector=Коллекционер
m.the_flickering_flame=Мерцающее пламя
m.the_flickering_flame_1a=О, {0}\! Как будто всех этих странных событий было недостаточно, у меня для тебя есть шокирующая новость.
m.the_flickering_flame_2a=Мы как раз получали отчет от команды лейтенанта Ваэлин на Центральном терминале, когда наш сигнал прервался. Потребовалось некоторое время, но мне удалось определить источник помех. Они исходят от того странного устройства, которое вы обнаружили возле тронного зала Ванадука в Цитадели Огненного шторма.  Похоже, кто-то его активировал.
m.the_flickering_flame_3a=Мы не знаем наверняка, но это должно быть связано с Артефактом. Энергетические сигнатуры идентичны. Если в этом замешан Артефакт, это означает...
m.the_flickering_flame_4a=Мы тоже так думаем. Мне очень не хочется отправлять тебя обратно в это ужасное место, {0}, но если и есть какая-то надежда быстро разгадать эту загадку, то это ты. Цитадель по-прежнему очень опасна, так что будь осторожен!
m.the_gauntlet=Перчатка
m.time_enough_at_last=Наконец-то хватило времени
m.time_enough_at_last_1a=О, привет.  Полагаю, ты из штаба «Спирали».
m.time_enough_at_last_2a=Ах да, мой отряд.  Хорошая компания… сильные и целеустремленные.  Честно говоря, не уверен, что я туда вписываюсь — я всегда больше любил читать!  Думаю, без меня они справятся.
m.time_enough_at_last_3a=Не знаю... Мне здесь хорошо среди всех этих древних фолиантов.  У меня есть что почитать, больше, чем я смог бы прочитать за всю жизнь.  Но, полагаю, это не будет проблемой. \n\nПожалуйста, просто возвращайтесь в Хейвен.  Сообщите моему отряду, что я в порядке и в безопасности.
m.time_enough_at_last_4a=Да, так и есть, не правда ли?  Я не должен был приходить сюда один.  Я должен был остаться со своим отрядом. \n\n(Эджер смотрит вдаль) \n\nЯ даже не помню, как это произошло... может, и никогда не вспомню.  Но это не было больно.
m.time_enough_at_last_5a=Я говорю, что мне теперь предстоит много читать.  Сражение закончилось, вот и все. \n\nПожалуйста, возвращайся в Хейвен и сообщи всем, что все в порядке.
m.time_to_crafty=Время проявить изобретательность
m.tortodrone_1a=[Все] Важное напоминание для сотрудников\: \n\nДля доступа в зону подготовки требуется идентификационная карта. При правильном предъявлении идентификационная карта будет использована для питания «Мрачных ворот». Помните\: «Используя карту, вы её теряете». \n\nИдентификационные карты, не использованные таким образом («утерянные, повреждённые или потерянные»), должны быть переоформлены отделом кадров. Стоимость замены карты будет вычтена из вашей следующей зарплаты, а в личное дело сотрудника будет внесена отметка. Не допускайте этого. Не теряйте свою идентификационную карту. \n\nС уважением, \nМорграл'м \nПомощник руководителя отдела распределения ресурсов, Undercorp
m.toxic_plant_1a=Ладно, Рейнджеры, слушайте внимательно — у нас есть приказ проникнуть на объект по производству биологического оружия гремлинов, возглавляемый членом их «Алого Ордена», известным как «Херекс».  Это просто изысканный способ сказать, что один из самых безумных среди безумных гремлинов любит заряжать свой пистолет нестандартными пулями. \n\nМы не знаем, что он там готовит, так что вооружитесь и не забудьте надеть маски. Если Херекс хоть немного похож на Сируса, то там вы рискуете подхватить нечто похуже простуды. \n\nВперед, рейнджеры! \n
m.toxic_plant_2a=Официальный приказ от Херекса, Шепчущего Яда\: \n\nПроизводство Соединения 42 должно быть немедленно прекращено.  Хотя это грозный яд и, без сомнения, полезен для достижения... «высшей» силы в Ордене, он, похоже, обрел интеллект, выходящий далеко за рамки обычного биотоксина.
m.toxic_plant_2b=Все следы «Соединения 42» должны быть уничтожены, вместе с объектом и всеми инженерами, не входящими в «Внутренний круг». Напомни «Сжигателям», которым эти приказы кажутся неудобными, что те, кто ослушается, вскоре услышат мой шепот у себя за ухом. \n\nЗапечатай двери и сожги всё дотла.
m.toy_soldiers=Игрушечные солдатики
m.true_champion=Истинный чемпион
m.true_champion_1a={0}\! О, {0}, ты справился\! Ха-ха\! \n\nЯ так рада, что ты выбрался оттуда живым\!  Я очень за тебя переживала\!
m.true_champion_2a=Ну, на мой взгляд, это только начало для тебя, {0}.  Ты — настоящий Чемпион Рыцарей Спирали.  И раз меня не перевели, полагаю, это только начало и для «нас» тоже!
m.true_champion_3a=Ты всегда можешь на меня рассчитывать! \n\nИтак, я уверен, у тебя куча дел.  Мы здесь с ума сходим, пытаясь разобраться в том разведывательном модуле, который ты обнаружил за пределами Ядра.  Как, черт возьми, отряд Альфа мог «проникнуть» в Ядро?
m.true_champion_4a=Да, полагаю, у нас это вполне может получиться.  Тогда счастливого пути, {0}.
m.tutorial_mission=Место крушения
m.unavailable=Скоро будет доступно\!
m.unknown=???
m.verify_exchange=Подтверди эти предметы для обмена на награды за миссию.
m.vicious_viscous=Злобный и вязкий
