b.p_r6_gate_undead=Руины замков Оулайта — это мрачные и проклятые места, кишащие легионами нежити-спукатов.  Худшие из них, казалось бы, непобедимые грималкины, постоянно скрываются в тени, ожидая момента, когда ваш спасительный свет наконец погаснет. \n\nНекоторые рыцари поддаются тьме и парализуются от страха в этих теневых царствах. Единственное, что может их спасти, — это отважные рыцари, давно избавившиеся от детского страха перед тьмой и всеми ужасными существами, скрывающимися в ней.
b.p_r6_kit=Некоторые рыцари входят в состав специальных исследовательских групп, которым редко выпадает шанс оставаться на поверхности в течение длительного времени.  Эти рыцари часто используют подземные города Часового механизма в качестве базовых лагерей.  Хотя монстры, управляющие этими городами, дружелюбны, удобства там зачастую не совсем подходят для рыцарей. \n\nЭтим рыцарям всегда пригодятся припасы, чтобы сделать их пребывание немного более комфортным. Счастливый исследователь — продуктивный исследователь!
b.p_r6_kit_2=Некоторые рыцари входят в состав специальных исследовательских групп, которым редко выпадает возможность долго оставаться на поверхности. Эти рыцари часто используют подземные поселения Часового механизма в качестве базовых лагерей. Хотя монстры, населяющие эти поселения, настроены дружелюбно, условия проживания там не всегда подходят для рыцарей. \n\nЭтим рыцарям всегда пригодятся припасы, чтобы сделать их пребывание немного более комфортным. Счастливый исследователь — продуктивный исследователь!
b.p_r6_mat_1=Штаб-квартира «Спирали» постоянно стремится лучше понять существ, населяющих Часовой механизм, путем изучения материалов.  Если у вас есть лишние материалы, вы можете еще больше повысить свой престиж, пожертвовав их штаб-квартире «Спирали».
b.p_r6_mat_123=Штаб-квартира «Спирали» постоянно стремится лучше понять существ, населяющих Часовой механизм, путем изучения материалов.  Если у вас есть лишние материалы, вы можете еще больше повысить свой престиж, пожертвовав их штаб-квартире Spiral.
b.p_r6_mat_2=Штаб-квартира Spiral постоянно стремится лучше понять существ, населяющих Часовой механизм, путем изучения материалов.  Если у вас есть лишние материалы, вы можете еще больше повысить свой престиж, пожертвовав их штаб-квартире Spiral.
b.p_r6_mat_3=Штаб-квартира «Спираль» постоянно стремится лучше понять существ, населяющих Часовой механизм, путем изучения материалов.  Если у вас есть лишние материалы, вы можете еще больше повысить свой престиж, пожертвовав их штаб-квартире «Спираль».
b.p_r6_min=Главный рыцарь Гео Вегнер постоянно стремится продвигать свои исследования загадочных минералов, обнаруженных в Часовых механизмах.  Эксперименты, которые он проводит с имеющимися образцами, зачастую приводят к их разрушению.  По этой причине ему всегда нужны отважные рыцари, готовые проникнуть в Часовые механизмы, чтобы добыть для него новые образцы.
b.p_r6_weap_2=Рыцари, спасенные из плена гремлинов, часто остаются ни с чем, кроме плохих воспоминаний о том, как их запирали в клетке и издевались над ними злобные похитители.  Их оружие всегда крадут, а снаряжение часто повреждают инженеры-гремлины, чтобы исключить любую возможность выживания при попытке побега. \n\nЧтобы вернуть этих рыцарей в строй и подготовить их к бою, штаб-квартире Спирали нужны другие рыцари, имеющие доступ к достаточным ресурсам, чтобы помочь и снабдить их необходимым оружием и снаряжением.
b.p_r6_weap_3=Рыцари, спасенные из плена гремлинов, часто остаются ни с чем, кроме плохих воспоминаний о том, как их заперли в клетке и издевались над ними злобные похитители.  Их оружие всегда крадут, а снаряжение часто повреждают инженеры гремлинов, чтобы исключить любую возможность выживания при попытке побега. \n\nЧтобы вернуть этих рыцарей в строй и подготовить их к бою, штаб-квартира Spiral нуждается в помощи других рыцарей, имеющих доступ к достаточным ресурсам, которые смогут предоставить им необходимое оружие и снаряжение.
b.p_r7_gate_beast=Наши «Гео-рыцари» рискуют жизнью, работая в диких землях Часового механизма. Хотя их открытия бесценны, они часто находятся в самом сердце территории росомах. Эти дикие звери безжалостно преследуют наших «Гео-рыцарей», нападая на них ночью, когда те не охраняются.  Иногда росомахи объединяются в стаю и нападают на целую исследовательскую команду.  Именно в такие моменты приходится вызывать отряд талантливых бойцов, чтобы спасти их.
b.p_r7_gate_construct=Гремлины не очень-то любят убирать за собой.  Наши разведчики-рыцари часто натыкаются на то, что, как они полагают, является заброшенными фабриками по производству оружия гремлинов, но на самом деле там по-прежнему кипит жизнь, полная враждебных конструктов, а в некоторых случаях там даже хранятся боевые машины, готовые к действию! \n\nШтаб-квартира «Спирали» приказала, чтобы, по возможности, эти фабрики и их боевые машины были навсегда выведены из строя, чтобы избежать будущих жертв.
b.p_r7_gate_fiend=Город демонов — это странное место, которое даже в штаб-квартире «Спирали» до конца не понимают. Демоны повсюду, и если они замечают поблизости одного из своих «боссов из Преисподней», то готовы на все, чтобы создать видимость своей продуктивности.  К сожалению, продуктивность часто определяется нападением на вторгшихся или их заключением в тюрьму, например, отряда проходящих рыцарей. \n\nНеясно, какую роль в конечном итоге заключенные рыцари играют в планах девилитов. Те, кто выжил в плену, сообщают, что условия были плохими, но хуже всего было то, что им приходилось ежедневно заполнять огромное количество бумаг.  Такой участи не заслуживает ни один рыцарь!
b.p_r7_gate_gremlin=На строительных площадках гремлинов часто можно найти ценные схемы гремлинских сооружений и даже оружия.  Попав в штаб-квартиру Спирали, они дают редкую возможность заглянуть в инженерное искусство гремлинов. \n\nСхемы гремлинов обычно хранятся в терминалах где-то на площадке.  Эти терминалы заперты и тщательно охраняются.  Как только вы привлечете внимание одного гремлина, будьте готовы к тому, что за вами пойдет вся команда\!
b.p_r7_gate_slime=Лучший способ сдержать слизней — использовать большое количество каменной соли. Слизни просто ненавидят это вещество, так как при контакте с ним они растворяются.  Зрелище не из приятных. \n\nИсследовательские группы, размещенные в лишайнистых логовах, часто окружают весь свой лагерь каменной солью, чтобы не стать ужином для какого-нибудь слизня.  Как можно себе представить, соль у них быстро заканчивается.  Когда её запасы подходят к концу, вызывается отряд, который пробивается к лагерю и доставляет эту спасительную приправу.
b.p_r7_gate_undead=Руины замков Оулайта — это мрачные и проклятые места, кишащие легионами нежити-спукатов.  Худшие из них, казалось бы, непобедимые грималкины, постоянно скрываются в тени, ожидая момента, когда ваш спасительный свет наконец погаснет. \n\nНекоторые рыцари поддаются тьме и парализуются от страха в этих теневых царствах. Единственное, что может их спасти, — это отважные рыцари, давно избавившиеся от детского страха перед тьмой и всеми ужасными существами, скрывающимися в ней.
