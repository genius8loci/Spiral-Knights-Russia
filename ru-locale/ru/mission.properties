m.weight_of_darkness=Тяжесть тьмы
m.welcome_to_haven=Добро пожаловать в Хейвен!
m.welcome_to_haven_1a=Ты добрался, {0}\!  Я рад, что ты благополучно прибыл в Хейвен.  Я сообщу в штаб-квартиру «Спирали», что теперь ты будешь выполнять задания в Хейвене.  Для начала я поручил тебе несколько заданий, которые помогут тебе освоиться и познакомиться со всем, что может предложить Хейвен.  Не забудь поздороваться со «Странниками», когда начнешь исследовать город.
m.welcome_to_haven_2a=Коренных жителей Хейвена называют «Странниками». Их невозможно не заметить — это высокие фигуры в плащах и масках. Несмотря на их устрашающий вид, они очень помогают нам и в основном держатся особняком. А вот странные маленькие птички в городе, похоже, их очень любят!
m.welcome_to_haven_3a=Отлично, спасибо, что вы такой хороший посол! \n\nНаконец, мне нужно ввести вас в курс дела насчет так называемой «энергии».  Она очень важна для вашей миссии здесь, на Крэдл.
m.welcome_to_haven_4a=Энергия необходима для приобретения мощного снаряжения и предметов в Складе снабжения. \n\nВы найдете для нее множество применений в своих путешествиях, просто ищите символ энергии!
m.welcome_to_haven_5a=Энергию можно получить только путем покупки за реальные деньги или обмена через биржу. Чтобы купить или обменять энергию, просто открой Склад снабжения и нажми кнопку «Получить энергию».
m.welcome_to_haven_6a=Я скоро свяжусь с тобой снова, удачи {0}\!
m.welcome_to_haven_b=Добро пожаловать в Хейвен\!
m.welcome_to_haven_b_1a=Ты добрался, {0}\!  Я рад, что ты благополучно прибыл в Хейвен.  Я подтвержу в штаб-квартире «Спирали», что теперь ты будешь выполнять задания в Хейвене. \n\nДля начала я выдал тебе несколько заданий, которые помогут тебе освоиться и познакомиться со всем, что может предложить Хейвен.  Обязательно поздоровайся со Странниками, когда начнешь исследовать город.
m.welcome_to_haven_b_2a=Коренных жителей Хейвена называют «Странниками». Их невозможно не заметить — это высокие фигуры в плащах и масках. Несмотря на их устрашающий вид, они очень помогают нам и в основном держатся особняком. А вот странные маленькие птички в городе, похоже, их очень любят!
m.welcome_to_haven_b_3a=Отлично, спасибо, что вы такой хороший посол! \n\nЯ скоро свяжусь с вами снова, удачи {0}!
m.whipping_mishandling=Порка и неправильное обращение
m.winterfest_danger_1a=Приветствую! Вы, должно быть, тот храбрый рыцарь, которого штаб-квартира «Спирали» послала, чтобы разобраться с этими Гринчлинами. Гора Крампус не похожа на другие уровни, поэтому позвольте мне объяснить вам, как она устроена.
m.winterfest_danger_2a=Гора Крампус — это дом фракции гринчлинов и их союзников. Они очень скупы и сами не бросают никакой добычи. Все их сокровища хранятся в укрытиях, которые вы найдете на вершине горы.
m.winterfest_danger_3a=В этих укрытиях у вас будет два варианта\: покинуть гору и забрать часть сокровищ Гринчлина или продолжить подъем. \n\nЕсли вы решите продолжить путь, то откажетесь от добычи в этом укрытии, но найдете ещё больше сокровищ в следующем.
m.winterfest_danger_4a=Гора Гринчлин — это суровое место, и лишь немногие рыцари обладают достаточной выносливостью, чтобы достичь ее вершины. Если вам покажется, что дела идут слишком плохо, выбирайтесь отсюда! В противном случае вы рискуете потерять всё!
m.winterfest_danger_5a=Удачи вам. И постарайтесь не замерзнуть!
m.work_idle_hands=Работа для «Бездельников»
