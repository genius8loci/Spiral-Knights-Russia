b.p_toxic_plant_r4=Внимание\: Это Опасная Миссия\! \n\nДесна и её Рекон-Рейнджеры — элитная команда, задачей которой является сбор разведданных с самых опасных уровней Часового Механизма. Присоединение к ним может принести великую награду, но опасный путь гарантирован\! \n\nСпиральная штаб-квартира обнаружила гремлинский завод биологического оружия глубоко в Часовом Механизме. Считается, что этот объект принадлежит члену Багрового Ордена, известному лишь как «Герекс». Рекон-Рейнджерам поручено проникнуть на объект и раскрыть природу биооружия Герекса, прежде чем оно будет применено. \n
b.p_toxic_plant_r6=Внимание\: Это Опасная Миссия\! \n\nДесна и её Рекон-Рейнджеры — элитная команда, задачей которой является сбор разведданных с самых опасных уровней Часового Механизма. Присоединение к ним может принести великую награду, но опасный путь гарантирован\! \n\nСпиральная штаб-квартира обнаружила гремлинский завод биологического оружия глубоко в Часовом Механизме. Считается, что этот объект принадлежит члену Багрового Ордена, известному лишь как «Герекс». Рекон-Рейнджерам поручено проникнуть на объект и раскрыть природу биооружия Герекса, прежде чем оно будет применено. \n
