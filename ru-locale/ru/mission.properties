b.p_r6_weap_3=Рыцарей, спасённых из гремлинского плена, нередко ожидает лишь дурная память о сидении в клетке и издевательствах рычащих пленителей. Их оружие всегда крадут, а снаряжение часто повреждается гремлинскими инженерами, чтобы исключить любую возможность побега. \n\nЧтобы вернуть этих рыцарей в строй, готовых к бою, Спиральная штаб-квартира нуждается в других рыцарях, имеющих доступ к ресурсам, для обеспечения их необходимым оружием и снаряжением.
b.p_r7_gate_beast=Наши Рыцари-Геологи рискуют жизнью, работая в дебрях Часового Механизма. Хотя их находки бесценны, они часто размещены в самом сердце территории вольверов. Эти дикие звери неустанно выслеживают наших Рыцарей-Геологов, похищая их ночью без охраны. Порой вольверы формируют стаю и нападают на целую исследовательскую группу. Именно в такие моменты на помощь вызывается опытный отряд.
b.p_r7_gate_construct=Гремлины не слишком хороши в уборке за собой. Наши Рыцари-Разведчики нередко натыкаются на якобы выведенные из эксплуатации гремлинские оружейные фабрики, где по-прежнему кипит деятельность враждебных конструктов, а в некоторых случаях даже стоят работоспособные, активные боевые машины\! \n\nСпиральная штаб-квартира распорядилась подобные фабрики и их боевые машины останавливать раз и навсегда при любой возможности во избежание дальнейших потерь.
b.p_r7_gate_fiend=Бесовский город — странное место, которое Спиральная штаб-квартира до сих пор не полностью понимает. Дьяволята повсюду, и если они видят рядом одного из своих Мастеров Арены, то сделают всё, чтобы выглядеть продуктивно. К сожалению, продуктивность нередко определяется нападением или заключением под стражу нарушителей — например, отряда рыцарей, проходящего мимо. \n\nНеясно, какой цели в конечном счёте послужат пленённые рыцари в дьяволятской повестке. Выжившие в плену сообщают, что условия были скверными, но хуже всего были горы бумажной работы, которую им приходилось заполнять ежедневно. Такой участи не заслуживает ни один рыцарь\!
b.p_r7_gate_gremlin=Гремлинские строительные площадки часто содержат ценные чертежи гремлинских сооружений и даже вооружений. Добытые Спиральной штаб-квартирой, они дают редкое представление о гремлинской инженерии. \n\nСхемы гремлинов обычно хранятся в терминалах где-то на объекте. Эти терминалы заблокированы и тщательно охраняются. Стоит привлечь внимание одного гремлина — ждите всю бригаду\!
b.p_r7_gate_slime=Лучший способ держать слизней на расстоянии — щедро применять каменную соль. Слизни её терпеть не могут, ведь от прикосновения к ней они растворяются. Зрелище не из приятных. \n\nИсследовательские группы, расквартированные в лишайниковых логовах, нередко обносят весь свой лагерь каменной солью, чтобы не стать чьим-нибудь ужином. Как можно догадаться, запасы тают быстро. Когда соль подходит к концу, на помощь вызывается отряд, прорывающий себе путь к лагерю с жизненно важной приправой.
b.p_r7_gate_undead=Руины совиных замков — тёмные и проклятые места, кишащие легионами спукатов-нежити. Злейшие из них, казалось бы непобедимые гримолкины, постоянно таятся в тенях, поджидая момента, когда ваш спасительный свет наконец погаснет. \n\nНекоторые рыцари поддаются тьме и цепенеют от страха в этих мрачных краях. Единственное, что может их спасти — отважные рыцари, давно избавившиеся от детских страхов перед темнотой и всеми ужасами, что таятся в ней.
b.p_r7_kit=Некоторые рыцари входят в состав особых исследовательских групп, которым редко выпадает шанс надолго подняться на поверхность. Эти рыцари часто используют подгорода Часового Механизма в качестве полевых лагерей. Хотя монстры, управляющие этими городками, дружелюбны, удобства не всегда подходят для рыцарей. \n\nЭти рыцари всегда рады припасам, которые сделают их пребывание чуть комфортнее. Счастливый исследователь — продуктивный исследователь\!
b.p_r7_kit_2=Некоторые рыцари входят в состав особых исследовательских групп, которым редко выпадает шанс надолго подняться на поверхность. Эти рыцари часто используют подгорода Часового Механизма в качестве полевых лагерей. Хотя монстры, управляющие этими городками, дружелюбны, удобства не всегда подходят для рыцарей. \n\nЭти рыцари всегда рады припасам, которые сделают их пребывание чуть комфортнее. Счастливый исследователь — продуктивный исследователь\!
b.p_r7_mat_2=Спиральная штаб-квартира постоянно стремится глубже понять существ, населяющих Часовой Механизм, через исследование материалов. Если у вас есть запасные материалы, вы можете повысить свой Престиж, пожертвовав их Спиральной штаб-квартире.
b.p_r7_mat_234=Спиральная штаб-квартира постоянно стремится глубже понять существ, населяющих Часовой Механизм, через исследование материалов. Если у вас есть запасные материалы, вы можете повысить свой Престиж, пожертвовав их Спиральной штаб-квартире.
