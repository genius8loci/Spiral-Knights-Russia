b.p_tortodrone_r3=В Часовых механизмах стали появляться обломки павших тортодронов и скопления тёмной материи, что заставило штаб-квартиру «Спирали» предположить, что Демоны каким-то образом связаны с исчезновением этих некогда мифических существ. Чтобы выяснить, что замышляют Фиенды, вам нужно найти способ открыть одну из их Мрачных Врат и пройти через нее. Штаб-квартира Спирали подозревает, что глифы, которые носят с собой Фиенды, могут быть ключами к самостоятельному открытию врат.
b.p_tortodrone_r4=В Часовых механизмах стали появляться обломки падших тортодронов и скопления темной материи, что заставило штаб-квартиру «Спирали» предположить, что Фиенды каким-то образом связаны с исчезновением этих некогда мифических существ. Чтобы выяснить, что замышляют Фиенды, вам нужно найти способ открыть одну из их Мрачных ворот и пройти через нее. Штаб-квартира Спирали подозревает, что глифы, которые носят с собой Фиенды, могут оказаться ключами, позволяющими вам самостоятельно открыть врата.
b.p_tortodrone_r6=В Часовом Механизме стали появляться обломки павших тортодронов и скопления темной материи, что заставило штаб-квартиру Спирали предположить, что Демоны каким-то образом связаны с исчезновением этих некогда мифических существ. Чтобы выяснить, что замышляют Демоны, вам нужно найти способ открыть один из их Мрачных Врат и пройти через него. Штаб-квартира Спирали подозревает, что глифы, которые носят с собой Фиенды, могут быть ключами к самостоятельному открытию ворот.
b.p_tortodrone_r7=В Часовых механизмах стали появляться обломки падших тортдронов и скопления темной материи, что заставило штаб-квартиру Спирали предположить, что Фиенды каким-то образом связаны с исчезновением этих некогда мифических существ. Чтобы выяснить, что замышляют Фиенды, вам нужно найти способ открыть одну из их Мрачных Врат и пройти через нее. Штаб-квартира Спирали подозревает, что глифы, которые носят с собой Фиенды, могут быть ключами к тому, чтобы открыть врата самостоятельно.
b.p_tortodrone_r9=В Часовых механизмах стали появляться обломки падших тортодронов и скопления темной материи, что заставило штаб-квартиру «Спирали» предположить, что Фиенды каким-то образом связаны с исчезновением этих некогда мифических существ. Чтобы выяснить, что замышляют Фиенды, вам нужно найти способ открыть одну из их Мрачных ворот и пройти через нее. Штаб-квартира Спирали подозревает, что глифы, которые носят с собой Фиенды, могут оказаться ключами, позволяющими вам самостоятельно открыть врата.
b.p_toxic_plant_r4=Предупреждение\: это опасная миссия! \n\nДесна и её разведывательные рейнджеры — элитный отряд, которому поручено добыть разведданные на самых опасных уровнях «Часового механизма». Присоединение к ним может принести большие награды, но это, без сомнения, будет смертельно опасным путешествием! \n\nШтаб «Спирали» обнаружил объект по производству биологического оружия гремлинов в глубине «Часового механизма». Считается, что этот объект принадлежит члену «Алого Ордена», известному лишь как «Херекс». Разведчикам-рейнджерам поручено проникнуть на объект и выяснить, что представляет собой биологическое оружие Херекса, прежде чем оно будет применено. \n
b.p_toxic_plant_r6=Предупреждение\: это опасная миссия! \n\nДесна и ее разведывательные рейнджеры — элитная команда, которой поручено добывать разведданные на самых опасных уровнях Часового механизма.  Присоединение к ним может принести большие награды, но это гарантированно будет опасным путешествием! \n\nШтаб-квартира Spiral обнаружила объект по производству биологического оружия гремлинов глубоко внутри Часового механизма. Считается, что этот объект принадлежит члену «Алого ордена», известному только как «Херекс». Разведчикам-рейнджерам поручено проникнуть на объект и раскрыть суть биологического оружия Херекса, прежде чем оно будет применено. \n
b.p_toxic_plant_r7=Предупреждение\: это опасная миссия! \n\nДесна и её разведывательные рейнджеры — элитный отряд, которому поручено добыть разведданные на самых опасных уровнях «Часового механизма». Присоединение к ним может принести большие награды, но это, без сомнения, будет смертельно опасным путешествием! \n\nШтаб «Спирали» обнаружил объект по производству биологического оружия гремлинов в глубине «Часового механизма». Считается, что этот объект принадлежит члену «Алого Ордена», известному лишь как «Херекс». Разведчикам-рейнджерам поручено проникнуть на объект и раскрыть суть биологического оружия Херекса, прежде чем оно будет применено. \n
b.p_toxic_plant_r9=Предупреждение\: это опасная миссия! \n\nДесна и ее разведывательные рейнджеры — элитная команда, которой поручено добывать разведданные на самых опасных уровнях Часового механизма.  Присоединение к ним может принести большие награды, но это гарантированно будет опасным путешествием! \n\nШтаб-квартира Spiral обнаружила объект по производству биологического оружия гремлинов глубоко внутри Часового механизма. Считается, что этот объект принадлежит члену «Алого ордена», известному только как «Херекс». Разведчикам-рейнджерам поручено проникнуть на объект и раскрыть природу биологического оружия Херекса, прежде чем оно будет применено. \n
b.p_winterfest_danger_r7=Предупреждение\: это опасная миссия! \n\nПо поручению Импостоклауса штаб-квартира «Спираль» обнаружила оперативную базу злобных гринчлинов. Пришло время дать им отпор и раз и навсегда покончить с их террором на Зимнем фестивале. Но это будет нелегкая задача. \n\nТе, кто примет эту миссию, должны взобраться на гору Крампус — опасный поход, полный засад Гринчлинов и ледяных смертельных ловушек. По пути вы найдете укрытия, которые позволят вам собрать сокровища Гринчлинов и сбежать с горы, или же продолжить путь к вершине за еще большими наградами! Но будьте предупреждены\: Гринчлины и их союзники — скупое племя и не бросят НИКАКОГО лута. Все сокровища, которые можно найти на горе Крампус, находятся в укрытиях. И если вы пройдете мимо них ради более крупных наград впереди, вы рискуете потерять все, если потерпите неудачу! \n\nНекоторые говорят, что на самой вершине горы Крампус лежит тайник с добычей гринчлинов, в котором могут быть сокровища, которых никто еще не видел...
b.p_winterfest_danger_r9=Предупреждение\: это опасная миссия! \n\nПо поручению Импостоклауса штаб-квартира «Спираль» обнаружила оперативную базу злобных гринчлинов. Пришло время дать им отпор и раз и навсегда покончить с их террором на Зимнем фестивале. Но это будет нелегкая задача. \n\nТе, кто примет эту миссию, должны взобраться на гору Крампус — опасный поход, полный засад Гринчлинов и ледяных смертельных ловушек. По пути вы найдете укрытия, которые позволят вам собрать сокровища Гринчлинов и сбежать с горы, или же продолжить путь к вершине ради еще больших наград! Но будьте предупреждены\: Гринчлины и их союзники — скупые типы и не бросят НИКАКОГО лута. Все сокровища, которые можно найти на горе Крампус, находятся в укрытиях. И если вы пройдете мимо них ради более крупных наград впереди, вы рискуете потерять все, если потерпите неудачу! \n\nНекоторые говорят, что на самой вершине горы Крампус лежит тайник с добычей гринчлинов, который может содержать сокровища, которых никто никогда не видел...
b.p_winterfest_r3=Каждый раз во время Зимнего фестиваля группа гремлинов с зеленой шерстью устраивает настоящий беспорядок в городе Эмберлайт. Эти «гринчлины», как их называют, не остановятся ни перед чем, пока не утащат все до последнего подарка из города Эмберлайт. \n\nИтак, Импостоклаус попросил Спиральных Рыцарей взять в руки оружие и сразиться с монстрами, угрожающими городу Эмберлайт. Так что хватайте подарок и откликнитесь на его призыв! Позаботьтесь о том, чтобы в городе Эмберлайт все провели веселый Зимний фестиваль.
b.p_winterfest_r4=Каждый год во время Зимнего фестиваля в городке Эмберлайт наводит ужасный беспорядок отряд гремлинов с зеленой шерстью. Эти «гринчлины», как их называют, не остановятся ни перед чем, пока не утащат из Эмберлайта абсолютно все подарки. \n\nИ вот Импостоклаус попросил Спиральных Рыцарей взять в руки оружие и сразиться с монстрами, угрожающими городу Эмберлайт. Так что хватайте подарок и откликнитесь на его призыв! Позаботьтесь о том, чтобы в городе Эмберлайт все провели веселый Зимний фестиваль.
b.p_winterfest_r6=Каждый раз во время Зимнего фестиваля группа гремлинов с зеленой шерстью устраивает настоящий беспорядок в городе Эмберлайт. Эти «гринчлины», как их называют, не остановятся ни перед чем, пока не утащат все до последнего подарка из города Эмберлайт. \n\nИтак, Импостоклаус попросил Рыцарей Спирали взять в руки оружие и сразиться с монстрами, угрожающими городу Эмберлайт. Так что хватайте подарок и откликнитесь на его призыв! Позаботьтесь о том, чтобы в городе Эмберлайт все провели веселый Зимний фестиваль.
b.p_winterfest_r7=Каждый раз во время Зимнего фестиваля в городке Эмберлайт наводит ужасный беспорядок отряд гремлинов с зеленой шерстью. Эти «гринчлины», как их называют, не остановятся ни перед чем, пока не утащат из Эмберлайта абсолютно все подарки. \n\nИ вот Импостоклаус попросил Спиральных Рыцарей взять в руки оружие и сразиться с монстрами, угрожающими городу Эмберлайт. Так что хватайте подарок и откликнитесь на его призыв! Позаботьтесь о том, чтобы в городе Эмберлайт все провели веселый Зимний фестиваль.
b.p_winterfest_r9=Каждый раз во время Зимнего фестиваля группа гремлинов с зеленой шерстью устраивает настоящий беспорядок в городе Эмберлайт. Эти «гринчлины», как их называют, не остановятся ни перед чем, пока не утащат все до последнего подарка из города Эмберлайт. \n\nИтак, Импостоклаус попросил Рыцарей Спирали взять в руки оружие и сразиться с монстрами, угрожающими городу Эмберлайт. Так что хватайте подарок и откликнитесь на его призыв! Позаботьтесь о том, чтобы в городе Эмберлайт все провели веселый Зимний фестиваль.
b.pierce_of_cake=Теперь, когда вы выполняете миссии на «Уровне 2» Часового механизма, монстры начнут наносить особые виды урона, о которых вам нужно знать и к которым нужно подготовиться, иначе вас ждет верная гибель! \n\nОдин из наших ведущих биотехников, Хан, подготовил краткий урок по прокалывающим монстрам.  Поговорите с ним по коммуникатору, прежде чем приниматься за новые миссии.
b.pioneers=После крушения «Скайларка» капитан Озло отобрал элитный отряд «Спиральных рыцарей», чтобы они первыми проникли в «Часовой механизм».  Больше их никто не видел.  Свяжитесь с агентом разведки Корой и узнайте, какую роль вы сыграете в раскрытии этой тайны.
b.plan_of_attack=Глубоко в токсичной пещере скрывается секретная испытательная лаборатория, которую гремлины используют в качестве полигона для тестирования компонентов Проекта R.  Сообщается, что рядом с одним из этих компонентов, находящихся в стадии разработки, хранятся схемы проекта. \n\nЕсли это правда, то рядом с одним из компонентов Проекта R, скорее всего, будет какой-то терминал.  Найдите терминал и извлеките схемы для анализа.  Это должно пролить свет на истинную суть Проекта R.
b.prestige=ПРЕСТИЖ
b.prestigious_opportunity=Похоже, вы отлично себя проявили в глазах штаб-квартиры Spiral.  Свяжитесь с агентом разведки Корой и узнайте, как вы можете принимать дополнительные миссии от штаб-квартиры Spiral.
b.pumping_up=Вы можете свободно пользоваться Залом усовершенствованной подготовки в любое время, чтобы попрактиковаться с новым оружием или узнать о других уникальных особенностях «Часовых механизмов».  Загляните туда и посмотрите, что там есть!
