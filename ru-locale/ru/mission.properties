m.pierce_of_cake=Кусочек торта
m.pierce_of_cake_1a=Здравствуйте, {0}.  Штаб-квартира «Спираль» сообщила мне, что вам понадобится краткий урок о видах монстров в Часовых механизмах, наносящих проникающий урон, верно?
m.pierce_of_cake_2a=Очень хорошо, {0}, давайте сразу приступим к делу.  Похоже, чем ближе монстры подбираются к Ядру, тем ярче проявляются их уникальные свойства.  В большинстве случаев это выражается в том, что они могут наносить особые виды урона, для отражения которых требуется специальная защита. \n\nНа 2-м уровне монстр, наносящий особый вид урона, всегда наносит как обычный, так и особый урон.  Таким образом, обычная защита по-прежнему остается вполне приемлемым выбором.
m.pierce_of_cake_3a=Да, на данном этапе вам необходимо начать формировать арсенал, защищающий вас от особых видов урона. \n\nВ ходе текущих миссий вам предстоит сражаться с монстрами, наносящими проникающий урон.  Поэтому вам следует начать приобретать шлемы, доспехи и щиты, защищающие от проникающего урона.
m.pierce_of_cake_4a=Проникающий урон наносят монстры семейства слизи и зверей. Кроме того, монстры-слизи, как правило, уязвимы к урону от теней, а сами звери — к проникающему урону. Имейте это в виду. \n\nИтак, вам ещё что-нибудь нужно?
m.pierce_of_cake_5a=С удовольствием. Всего хорошего.
m.pioneers=Пионеры
m.pioneers_10a=Рулен был очень... логичен.  Думаю, он прекрасно осознавал наши шансы добраться до Ядра и затем что-то с ним сделать, чтобы восстановить «Скайларк».  Думаю, Рулен точно знал, на какую миссию он отправляется, когда они впервые спустились в темноту Часового механизма.
m.pioneers_11a=Ладно, перейдем к делу.  Мы обнаружили разведывательный модуль отряда «Альфа» в районе Часового механизма, известном как «Сумеречные Дикие Леса».  Однако в этой конкретной зоне обитает ужасное существо, известное как «Снарболакс». \n\nСнарболакс быстро расправлялся с такими же сквайрами, как ты, но я знаю, что ты справишься, {0}. Но тебе нужно подготовиться.  Я поручил тебе серию миссий, которые позволят тебе собрать снаряжение, подходящее для борьбы с этим ужасным чудовищем и возвращения разведывательного модуля!
m.pioneers_12a=Мы рассчитываем на тебя, {0}.
m.pioneers_1a=Привет, {0}, надеюсь, у тебя всё хорошо.  Произошло нечто, что заставит тебя столкнуться с самым серьёзным испытанием в твоей жизни. \n\nУ меня есть приказ из штаба «Спирали», который поступил от самого капитана Озло.  Ты был выбран в число Рыцарей, которые будут активно искать следы отряда Альфа.
m.pioneers_2a=Неудивительно, ведь многие новобранцы постоянно о них говорят. Для некоторых рыцарей они — настоящие герои. \n\nОтряд Альфа — это элитный отряд рыцарей, лично отобранных Озло для первого проникновения в Часовой механизм с целью обнаружить источник мощного энергетического сигнала, исходящего из-под земли.  Поскольку все системы на «Скайларке» были отключены в течение нескольких недель, радиосвязь была невозможна.  Вместо этого они оставляли по пути целую серию разведывательных модулей, словно след из крошек хлеба.
m.pioneers_3a=Когда наши техники наконец восстановили работу систем связи «Скайларка», мы не смогли установить связь с отрядом «Альфа», и с тех пор о них ничего не слышно. Их канал полностью мертв. \n\nИменно эта мертвая линия заставляет нас всех ломать голову.  Наши коммуникаторы созданы, чтобы выдерживать всевозможные экстремальные условия, даже взрывы.  Черт, они же, в конце концов, пережили крушение «Скайларка».  Я не могу придумать ничего, что могло бы полностью уничтожить связь.
m.pioneers_4a=Нам нужно, чтобы вы выяснили, что с ними произошло. Для начала вам предстоит найти известные местоположения их разведывательных модулей и собрать их для анализа.  Я буду отвечать за определение их примерного местонахождения и направление вас к ним.  Ваша задача — отправиться в дикую местность и вернуть их. \n\nКроме того, я кратко расскажу вам о каждом из четырех членов отряда «Альфа»\: командире отряда Эвклиде, страже отряда Гранце, разведчике отряда Парме и техническом специалисте отряда Рулене.
m.pioneers_5a=Эвклид не был типичным рыцарем.  К тому времени, когда большинство в его дивизионе получали герб оруженосца, он уже достиг звания авангарда.  Как командир отряда, он возглавил серию успешных атак против Мораи во время освобождения Исоры.  Блестящий тактик, он был известен тем, что выполнял задачи с половиной рыцарей других отрядов.
m.pioneers_6a=Именно по этой причине Озло выбрал его, чтобы он повел небольшой отряд в неизвестные глубины Часового механизма.  В конце концов, если ты закалился в боях под обстрелом тайфунов Мораев, ты, наверное, сможешь справиться с чем угодно, верно? \n\nНо, возможно, Часовой механизм оказался слишком сложной задачей даже для его способностей.  Мы просто не знаем.
m.pioneers_7a=Гранц был настоящим ветераном в этой группе.  Будучи опытным Стражем, Гранц специализировался на обеспечении безопасности своего отряда, а именно — уничтожая всё, что могло бы причинить им вред. \n\nГранц очень серьёзно относился к своей Клятве Стража, часто подвергая себя непосредственной опасности, чтобы защитить других.  Этот парень был самоотверженным.  Я представляю, что если бы с отрядом «Альфа» действительно случилась беда, Гранц не позволил бы ей закончиться без адской схватки.
m.pioneers_8a=Парма была самой молодой в нашей группе, очень талантливой разведчицей, но с небольшим боевым опытом.  Мы с ней учились в академии вместе, и я помню день, когда техники-симуляторы решили, что их программа сломалась из-за действий Пармы.  Она даже извинилась! \n\nНо я все равно беспокоюсь за нее.  Судя по отчетам, которые я читал, «Часовые механизмы» не похожи ни на что из того, с чем мы сталкивались раньше.  Я только надеюсь, что пока она будет держать их в курсе того, что впереди, они будут прикрывать ей спину.
m.pioneers_9a=Рулен был нанят как технический гений, который, по мнению капитана Озло, понадобится для навигации по обширному механизированному миру «Часовых механизмов».  В его основные обязанности входило все: от отключения замков до ремонта брони и уничтожения разумных конструкций.  Кроме того, он возглавил анализ Ядра, как только отряд достиг его.
m.plan_of_attack=План атаки
m.prestige_header=Престиж\: {0}
m.prestige_reward=Престиж\: {0}
m.prestigious_opportunity=Престижная возможность
m.prestigious_opportunity_1a=Приветствуем, {0}, и поздравляем с тем, что ты стал оруженосцем!  Твои достижения привлекли внимание штаб-квартиры «Спирали», и тебе предоставлено право выполнять престижные миссии. \n\nПрестижные миссии — это отборные задания, предлагаемые тебе ежедневно, за выполнение которых ты получаешь престиж в качестве награды.  Иногда эти миссии требуют доставки предметов в штаб-квартиру Spiral или другим рыцарям, а иногда вам предстоит исследовать Часовой механизм.
m.prestigious_opportunity_2a=Престижные миссии являются полностью добровольными и не могут повторяться в течение одного дня.  И не забудьте следить за специальными миссиями, которые предлагают большие престижные награды\!
m.prestigious_opportunity_3a=Я верю в тебя, {0}.  Я просто знаю, что ты будешь среди избранных Рыцарей, достаточно умелых, чтобы добраться до Ядра и, если повезет, вытащить нас с этой планеты.
