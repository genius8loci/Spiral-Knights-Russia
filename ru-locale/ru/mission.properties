m.laboratory_visit=Посещение лаборатории
m.laboratory_visit_1a=Здравствуйте, {0}\!  Я слышал, что вы недавно прибыли в Хейвен из-за Великой бездны.  Пока вы были там, сталкивались ли вы с каким-нибудь из наших боевых спрайтов?
m.laboratory_visit_2a=Ах, да, верно, вы же новый рекрут.  Большинство рыцарей впервые сталкиваются со спрайтами на поле боя.  Скорее всего, у вас еще не было возможности увидеть его. \n\nПозвольте мне объяснить...
m.laboratory_visit_3a=Боевой спрайт — это управляемое искусственным интеллектом создание, способное вести разведку и оказывать легкую боевую поддержку.  Боевые спрайты обладают высокой адаптивностью.  Их искусственный интеллект позволяет им внимательно наблюдать за окружающей обстановкой и помогать рыцарю наиболее оптимальным образом.
m.laboratory_visit_4a=Когда боевой спрайт выдается рыцарю, в его код записывается «связь», обязывающая его поддерживать рыцаря при любых обстоятельствах.  Они никогда не покинут вас! \n\nК сожалению, грузовые ящики с запасом боевых спрайтов «Скайларка» после крушения упали глубоко в Часовой механизм.
m.laboratory_visit_5a=Разведывательному отряду удалось вычислить, где приземлилось большинство этих боевых спрайтов.  Рендон был отправлен вперед, чтобы разведать три из этих мест, и встретится с вами в Часовых механизмах. \n\nВы должны обеспечить безопасность наших боевых спрайтов, прежде чем они попадут в руки врага\!
m.legion_almire_1a=Нет ничего лучше, чем рискованная прогулка по призрачному некрополю, чтобы по-настоящему заставить кровь закипеть, верно, Рейнджеры? \n\nЭтот некрополь возник в Альмире — падшем королевстве какого-то сумасшедшего лорда как-его-там, население которого составляют\: бесчисленные легионы нежити.  Судя по всему, эти не совсем живые обитатели охраняют нечто, что штаб-квартира «Спирали» хотела бы заполучить. \n\nНаша задача — добыть особую книгу, часть гораздо более обширной коллекции трудов, которая может пролить свет на природу этого проклятого королевства.  Так что хватайте шлемы и лучшее оружие для борьбы с зомби — я не ожидаю теплого приема. \n\nВ путь, Рейнджеры!
m.legion_almire_2a=Отрывок из записей лорда Бранделла, верховного канцлера Альмира\: \n\nКак и многие его подданные, Закон и Порядок покинули Альмир.  Осталась только Справедливость, но и она была извращена проклятыми пламенами, опустошающими наше королевство.  Справедливость теперь — это горящий скипетр нашего некогда великого лорда Ванадука.  Справедливость быстра, непоколебима, безжалостна. \n\nМое положение дало мне многое в жизни.  Раньше я любил вид, открывающийся с моей башни. С этих высоких высот я считал себя первым, кто встречает весну, первым, кто вдыхает запах жизни в воздухе, когда распускаются цветы.
m.legion_almire_3a=Теперь в воздухе витают лишь смерть и дым, даже с этих огромных высот. И пожары; неестественные пожары, которые, кажется, горят вечно, пожары, которые превращают даже самых благочестивых людей в ужасные кошмары, я знаю, что эти пожары скоро заберут и меня. \n\nЯ не подарю своему бывшему Господу свою жизнь.  Она не принадлежит ему, чтобы он мог ею распоряжаться и извращать. Это будет моим последним приказом.  Это будет моим правосудием.
m.loading=Загрузка сведений о покупке...
m.loading_depot=Загрузка...
m.minerals_rock=Минералы и камни!
m.mission_completed=Миссия\nЗавершена
m.mission_cost=СТОИМОСТЬ\: Короны\: {0}, Энергия\: {1}
m.mission_sprite_1=Откровение в пламени
m.mission_sprite_1_1a=Ладно, {0}, приступим. Похоже, нам с тобой предстоит небольшая охота на спрайтов, а? \n\nЯ настроил свой трекер по данным разведчика-рыцаря, но что-то не так. Энергетический след, который я улавливаю, нестабилен, но это определенно боевой спрайт. Возможно, они в беде, так что давай поспешим!
m.mission_sprite_1_2a=Что за... это... боевые спрайты? С ними что-то случилось, они превратились в каких-то существ.
m.mission_sprite_1_3a=Они кажутся дружелюбными. На самом деле они ведут себя точно так же, как боевые спрайты, которых я знаю. Единственное отличие в том, что они, э-э, ну, выглядят как драконы.
m.mission_sprite_1_4a=Эй, похоже, один из спрайтов проникся к тебе симпатией! Ну, давай не будем тратить эту дополнительную силу зря — я останусь здесь и буду защищать этих спрайтов. А ты воспользуйся помощью своего нового друга, чтобы очистить остальную часть территории от врагов.
m.mission_sprite_1_5a=Я останусь здесь и буду защищать этих спрайтов. Некоторые из этих ящиков для перевозки спрайтов пусты. Думаю, кто-то или что-то охотится за ними. \n\nИди вперед и очисти территорию от врагов, чтобы спасательная команда смогла безопасно прибыть.
m.mission_sprite_1_6a=Это поразительно! Боевые спрайты, которых ты спас в Закатных степях, каким-то образом превратились в новое существо!
m.mission_sprite_1_7a=Действительно.  Хотя их клеточная структура по-прежнему полностью соответствует боевому спрайту.  Моя гипотеза заключается в том, что они каким-то образом быстро эволюционировали, чтобы выжить в новой среде, но как?  Наша технология никогда не смогла бы сделать что-то подобное...
m.mission_sprite_1_8a=Да.  Похоже, нам предстоит многое узнать об этом месте. \n\nВ отчете Рендона отмечалось, что многие спрайты пропали с этого места. Он предположил, что это дело рук злоумышленников.
m.mission_sprite_1_9a=Если это так, мы должны предотвратить дальнейший ущерб.  А теперь, пожалуйста, там ещё остались спрайты, которых нужно спасти.  И кто знает, что мы обнаружим, когда туда доберемся!
m.mission_sprite_2=Ангелы из древности
m.mission_sprite_2_1a=Как тебе это место, а? Похоже на какую-то старую железнодорожную станцию, заброшенную беспокойными духами. Какое странное место для подземелья. \n\nВ любом случае, учитывая то, что мы обнаружили в Закатных степях, нам лучше побыстрее отправиться к тайнику спрайтов. Пошли!
m.mission_sprite_2_2a=Сначала драконы, а теперь... маленькие крылатые кошачьи существа? Не могу поверить, что мы снова сталкиваемся с этим явлением!
m.mission_sprite_2_3a=Вау, {0}, похоже, у тебя неплохо получается сражаться со спрайтами! Давай не будем терять время. Очисти путь впереди, чтобы спасательная команда смогла пройти безопасно!
m.mission_sprite_2_4a=Э-э, кажется, эти спрайты изучают старые книги. Я даже не знал, что они умеют читать! \n\nВ любом случае, я останусь здесь и буду защищать этих спрайтов. Я вижу ещё пустые транспортные ящики; это нехорошо. Ты иди вперёд и очисти территорию от врагов, чтобы спасательная команда смогла безопасно прибыть.
m.mission_sprite_2_6a=Похоже, эти спрайты снова изменили свою форму, чтобы вписаться в окружающую среду.
m.mission_sprite_2_7a=Непонятно, {0}. Судя по отчету Рендона, я бы сказал, что они почерпнули что-то из старых магических фолиантов, которые ты обнаружил рядом с этими спрайтами. Удивительно, что, судя по всему, благодаря этому они адаптировали свои боевые способности.
m.mission_sprite_2_8a=Да, похоже, эти спрайты овладели способностью направлять свои силы на защиту своего рыцаря. Учитывая это и их внешний вид, я назвал их «серафинксами».
m.mission_sprite_2_9a=Да, я знаю. В любом случае, я также понимаю, что некоторые ящики для перевозки спрайтов снова оказались пустыми. Что-то здесь не так... \n\nИтак, обезопасьте последний тайник со спрайтами, пока то, что их крадет, не нашло его!
m.mission_sprite_3=Маска Призрака
m.mission_sprite_3_10a=Твой сарказм принят к сведению. \n\nИтак, что касается тех пустых ящиков для перевозки спрайтов: мы подтвердили, что это дело нечисто.
m.mission_sprite_3_11a=Разведывательный отряд сообщил о большом монстре-конструкте, подобного которому мы еще не видели, уносящем несколько боевых спрайтов. Мы полагаем, что за всем этим стоят гремлины.
m.mission_sprite_3_12a=Я восхищаюсь твоей храбростью, но если первоначальные сообщения об этом монстре-конструкте верны, тебе понадобится дополнительная помощь. Я подготовлю несколько боевых спрайтов, готовых к слиянию с тобой, {0}. Поговорим, когда я закончу с подготовкой.
m.mission_sprite_3_1a=Будь начеку, {0}, что бы ни затевали здесь гремлины, это сделало окружающую обстановку очень опасной. \n\nДавай поспешим к тайнику спрайтов, пока не пропали еще какие-нибудь!
m.mission_sprite_3_2a=Ужас, это спрайты или какие-то призраки?
m.mission_sprite_3_3a=Спрайты снова изменились, и на этот раз они меня действительно пугают!
m.mission_sprite_3_4a=Хе-хе, не оборачивайся, {0}, но у тебя за спиной призрак! Будем надеяться, что эти призраки не вложили всю свою силу в внешний вид. \n\nИспользуй его, чтобы расчистить путь впереди, чтобы спасательная команда смогла пройти безопасно!
m.mission_sprite_3_5a=И снова куча пустых транспортных ящиков. Намечается неприятность, {0}. Тебе лучше пойти вперед и очистить территорию от врагов, чтобы спасательная команда смогла безопасно прибыть.
m.mission_sprite_3_6a=Мне любопытно... как ты думаешь, что скрывается за их масками? Постой, нет, я не хочу знать.
m.mission_sprite_3_7a=Открытия на этой планете с каждым днём становятся всё страннее. Теперь наши спрайты принимают форму какого-то призрака.
m.mission_sprite_3_8a=Да, совершенно верно. Эти спрайты обрели способность маскироваться, используя окружающие их тени для обмана. Учитывая это и их новые навыки в области ядов и ослаблений, я бы сказал, что они могут оказаться весьма полезными на поле боя.
m.mission_sprite_3_9a=Да, учитывая их внешний вид, я думаю, что «маскерайт» им очень подходит!
m.monstrous_research=Исследование чудовищ
m.monstrous_research_2=Исследование чудовищ
m.monstrous_research_3=Исследование чудовищ
