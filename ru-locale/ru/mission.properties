m.pumping_up=Подготовка
m.pumping_up_1a=Привет, {0}.  Меня зовут Конвей.  Штаб-квартира Spiral сообщает, что тебе нужны дополнительные подсказки, которые помогут тебе в предстоящих миссиях.  Не против встретиться со мной в зале углубленной подготовки, чтобы я тебе всё объяснил?
m.pumping_up_2a=Добро пожаловать в Зал усовершенствования, {0}.  Здесь вы найдете полезные советы по выживанию, которые помогут вам в путешествии по Часовому механизму. \n\nХотите осмотреть помещения?
m.pumping_up_3a=Здесь у нас собраны ценные предметы и объекты, которые вы, вероятно, встретите в Часовом механизме.
m.pumping_up_4a=Некоторые предметы можно использовать для атаки монстров, например, эти флаконы.  Здесь, на этом стрельбище, вы можете попрактиковаться в их поднятии и метании.
m.pumping_up_5a=Вдоль северной стены у нас собраны всевозможные блоки, переключатели, двери и кнопки из Часового механизма. Если вы хотите преодолеть коварные и смертоносные механизмы внизу, я советую вам ознакомиться с тем, как они работают!
m.pumping_up_6a=На восточной стороне у нас есть несколько комнат для боевой практики. Эти тренировочные кубы в основном безвредны и идеально подходят для экспериментов с вашим оружием и техниками использования щита!
m.pumping_up_7a=Наконец, у нас есть комнаты с ловушками и опасностями. Вы можете прийти сюда, чтобы посмотреть, как иногда можно повлиять на ловушки, а также узнать о ловушках, наносящих различные виды урона.
m.pumping_up_8a=Ну, на этом экскурсия закончена, {0}. Хочешь, я повторю всё ещё раз, или ты готов попробовать всё самостоятельно?
m.pumping_up_9a=Хорошо, тогда давай начнём с самого начала.
m.pumping_up_9b=Отлично, тогда я зачислю тебе эту миссию. \n\nНе забывай: если захочешь вернуться для дальнейшего обучения, Зал продвинутого обучения находится на городской площади Хейвена.  Будь осторожен, {0}.
