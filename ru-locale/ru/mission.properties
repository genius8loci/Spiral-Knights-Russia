m.pseudoplayer_test=Полигон PseudoPlayer
m.pumping_up=Подготовка
m.pumping_up_1a=Здравствуйте, {0}. Я — Конвей. Спиральная штаб-квартира говорит, вам не помешают дополнительные наставления для предстоящих миссий. Не желаете встретиться со мной в Зале Продвинутых Тренировок для инструктажа?
m.pumping_up_2a=Добро пожаловать в Зал Продвинутых Тренировок, {0}. Здесь вы найдёте полезные советы по выживанию, которые помогут вам в путешествиях по Часовому Механизму. \n\nЖелаете экскурсию по залу?
m.pumping_up_3a=Здесь у нас коллекция ценных предметов и объектов, которые вы, скорее всего, встретите в Часовом Механизме.
m.pumping_up_4a=Некоторые предметы можно использовать для атаки на монстров, например, эти пузырьки. Вы можете потренироваться подбирать и бросать их на этом полигоне.
m.pumping_up_5a=Вдоль северной стены у нас выставлены всевозможные блоки, переключатели, двери и кнопки из Часового Механизма. Если хотите преодолевать хитроумные и смертоносные устройства там, внизу, советую познакомиться с принципами их работы\!
m.pumping_up_6a=На восточной стороне у нас пара комнат для боевых тренировок. Эти Тренировочные Кубы практически безвредны и идеально подходят для экспериментов с вашим оружием и техникой щита\!
m.pumping_up_7a=И наконец, зал ловушек и опасностей. Здесь вы можете увидеть, как иногда удаётся воздействовать на ловушки, а также узнать о ловушках, наносящих различные виды урона.
m.pumping_up_8a=Что ж, экскурсия окончена, {0}. Хотите, чтобы я повторил всё заново, или вы готовы опробовать всё сами?
m.pumping_up_9a=Хорошо, тогда начнём сначала.
m.pumping_up_9b=Отлично, тогда я засчитаю вам выполнение этой миссии. \n\nПомните, если захотите вернуться на тренировку, Зал Продвинутых Тренировок находится на Городской Площади Хейвена. Берегите себя, {0}.
