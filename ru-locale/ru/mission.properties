b.p_r4_weap_1=Рыцарей, спасённых из гремлинского плена, нередко ожидает лишь дурная память о сидении в клетке и издевательствах рычащих пленителей. Их оружие всегда крадут, а снаряжение часто повреждается гремлинскими инженерами, чтобы исключить любую возможность побега. \n\nЧтобы вернуть этих рыцарей в строй, готовых к бою, Спиральная штаб-квартира нуждается в других рыцарях, имеющих доступ к ресурсам, для обеспечения их необходимым оружием и снаряжением.
b.p_r4_weap_2=Рыцарей, спасённых из гремлинского плена, нередко ожидает лишь дурная память о сидении в клетке и издевательствах рычащих пленителей. Их оружие всегда крадут, а снаряжение часто повреждается гремлинскими инженерами, чтобы исключить любую возможность побега. \n\nЧтобы вернуть этих рыцарей в строй, готовых к бою, Спиральная штаб-квартира нуждается в других рыцарях, имеющих доступ к ресурсам, для обеспечения их необходимым оружием и снаряжением.
