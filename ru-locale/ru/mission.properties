m.hall_of_heroes_4_2a=Рад встрече, {0}. Рад видеть вас вновь. Немногие рыцари добираются так далеко и способны собрать арсенал столь великой мощи. \n\nИтак, {0}, для 5-Звёздочной Сертификации на вас должны быть экипированы броня, шлем, щит и оружие 5-звёздочного уровня или выше.
