m.rc_buddyknight_1a={0}\! Слышал, тебя выбрали спасать мир, а? Ну, прежде чем ты начнёшь корчить из себя героя и отправишься маршировать во тьму, давай-ка мы с тобой пойдём на ту сторону лагеря и проучим парочку монстров, что разворотили лагерь прошлой ночью?
m.rc_buddyknight_2a=Тогда тебе понадобится вот это\! Это Прото-Бомба, и она отлично подходит для того, чтобы всё вокруг разнести\! \n\nУ меня в капсуле была запасная, так что считай это авансом за спасение наших шкур.
m.rc_buddyknight_3a=Давай сразу пустим её в дело. \n\nПринять миссию можно, нажав кнопку «Миссия» вверху экрана и приняв выданную мной миссию.
m.rc_buddyknight_4a=Принимай мою миссию — и за дело, будем что-нибудь взрывать\!
m.rc_buddyknight_5a=Казалось, сам мир пытался заманить тебя в ловушку — вот это было на волоске\! \n\nДержи ухо востро, когда отправишься исследовать Древний Генератор внизу. Если на поверхности этого мира кишат монстры и всё утыкано ловушками, кто знает, что тебя ждёт там, в темноте\!
m.reporting_duty=На службу
m.reporting_duty_1a=Рад приветствовать, солдат, и отличная работа — вы добрались до нашего форпоста здесь, в Хейвене. Я — Лейтенант Ферон. Капитан Озло назначил меня руководить нашей операцией по добыче ресурсов из Часового Механизма. \n\nПеред вами раскинулась «Аркада» — удивительный комплекс, служащий нашей связью с сердцем Часового Механизма. Поскольку вы здесь новичок, я кратко введу вас в курс того, чем нас занимает Спиральная штаб-квартира.
m.reporting_duty_2a=После крушения Скайларка его первичное теариумное ядро взорвалось, уничтожив часть корабля и лишив его основного источника энергии. Поскольку мы пока не нашли несколько сотен тонн теариума, просто валяющихся без дела, птица фактически лишилась крыльев. \n\nС помощью Странников нам удалось организовать небольшую базу операций здесь, в Хейвене. Когда мы наладили наши системы, мы обнаружили, что в самом сердце этой глыбы пульсирует энергетический сигнал невиданной мощи.
m.reporting_duty_3a=Именно\! Ядро Часового Механизма вполне может содержать источник энергии, необходимый для создания нового энергоблока для Скайларка и восстановления его лётной готовности. Есть лишь одна проблема — сам Часовой Механизм, похоже, устроен как какая-то безумная смертельная ловушка. \n\nДобраться до Ядра будет нелегко...
m.reporting_duty_4a=Вот такой боевой дух мне по нраву. Продолжайте выполнять миссии для Спиральной штаб-квартиры по мере их назначения. С вашей помощью у нас есть шанс достичь Ядра и спасти Исору.
m.reporting_duty_5a=В таком случае я уполномочиваю вас приступать к Миссиям Аркады. Вы можете попасть в Аркаду через интерфейс Миссий или подойти к вратам прямо здесь, в самой Аркаде. Под вашими ногами раскинулся необъятный мир, ожидающий исследования.\n\nУдачи вам\!
m.rescues_and_recycling=Спасение и Утилизация
m.return_of_ur=Возвращение Ура
m.rise_or_fall=Возвыситься или Пасть
m.rotting_metropolis=Гниющий Мегаполис
m.sale_cost=РАСПРОДАЖА\! {0}
m.scarlet_fortress=Алая Крепость
m.search_continues=Поиск Продолжается
m.search_continues_1a={0}, не нахожу слов благодарности. Мы уже развернули исследовательскую базу и собираем колоссальный объём данных, который без ваших усилий был бы нам недоступен.
m.search_continues_2a=Собранный вами Модуль Разведки весьма необычен. У меня нет оснований сомневаться в словах Пармы, но как это произошло — я просто не могу объяснить. Всё, что мы знаем о Ядре, указывает на то, что в него нет «дверей». Это не сооружение, построенное для входа снаружи. Скорее, всё выглядит с точностью до наоборот.
m.search_continues_3a=Возможно. Если присмотреться, в этом есть смысл. Нам необходимо изучить это более тщательно.
m.search_continues_4a=Не знаю, но картина, которую она нарисовала, безусловно, ужасает. Нечто шевелится в сердце этого мира, {0}, нечто страшное. Я чувствовала это с тех самых пор, как мы ступили на эту планету: незримые глаза, наблюдающие за каждым нашим шагом, силуэты, проступающие на самой границе зрения... нечто более великое, чем гремлины, считает этот мир своим домом.
m.search_continues_5a=Я не прекратила поиски Евклида, Пармы, Гранца и Рулена. Они где-то там, и я найду их, даже если для этого придётся войти в Ядро самой.
m.search_continues_6a=И вам того же, Авангард.
m.securing_camp=На Ваше Усмотрение
m.securing_camp_1a=Что ж, похоже, мы оказались в непростом положении, {0}. Работы невпроворот, чтобы привести этот лагерь в боевую готовность, так что отныне вы уполномочены получать миссии\! Все доступные миссии вы найдёте в панели Заданий.
m.securing_camp_2a=Миссии варьируются от опасных боевых столкновений до бесед с определёнными людьми, такими как я. Выполняя миссии, вы будете зарабатывать прогресс для получения новых званий, которые, в свою очередь, откроют вам доступ ко всё более могущественному снаряжению. Грета сообщила мне, что вы беретёсь за проблему энергоснабжения в Древнем Генераторе?
m.securing_camp_3a=Что ж, будьте начеку. Если поверхность этого мира кишит монстрами, кто знает, что поджидает вас там, внизу, во тьме\!
m.securing_camp_4a=Не забудьте принять миссию и будьте там осторожны\!
m.securing_camp_b=Укрепление Лагеря
m.securing_camp_b_1a=Вот ты где, {0}\! Я уже начал думать, что ты не появишься\! \n\nЛадно, приступаем к укреплению этого места. Но сначала тебе нужно экипировать ту Прото-Бомбу, что я тебе дал. Подойди к Arsenal Station за моей спиной и экипируй её.
m.securing_camp_b_2a=Отлично\! А теперь краткий урок по заряженным атакам. \n\nЗаряженные атаки можно выполнять любым оружием, удерживая кнопку АТАКИ и дожидаясь, пока аура заряда достигнет максимума. Во время зарядки можно свободно перемещаться\!
m.securing_camp_b_3a=Как только аура заряда достигнет максимума, отпустите кнопку АТАКИ и обрушьте на врагов сокрушительную заряженную атаку\!
m.securing_camp_b_4a=Бомбы особенны тем, что у них нет обычной атаки. Бомбу можно использовать ТОЛЬКО как заряженную атаку, так что не забывайте маневрировать, пока заряжаете\!
m.securing_camp_b_5a=Ладно, потренируйся с бомбами, а потом отправляйся туда и уничтожь этих монстров\!
m.securing_camp_b_6a=Что-то случилось\! Эта дверь возникла за тобой, словно ловушка\! \n\nЗащищайся, {0}\!
m.securing_camp_b_7a=Какого чёрта это было? Откуда взялась эта дверь? \n\nПохоже, этот механический мир под нашими ногами имеет на нас зуб, {0}. Будь настороже\! \n\nВ любом случае, думаю, территория зачищена — по крайней мере до наступления ночи. Возвращаемся в лагерь.
m.sewer_stash=Тайник в Канализации
m.shadow_beast=Тень Зверя
m.shadow_knows=Тень Знает
m.shadow_knows_1a={0}, я слышал, вас повысили до Рыцаря... э-э, что ж, поздравляю, да?
m.shadow_knows_2a=Спиральная штаб-квартира уведомила меня, что вы готовы узнать о монстрах, наносящих теневой урон, верно?
m.shadow_knows_3a=Очень хорошо, тогда начнём. Теневой урон, как правило, порождается концентрациями негативной энергии. Атаки, наносящие теневой урон, включают всё — от психического манипулирования вышеупомянутой негативной энергией до физических ударов оружием, выкованным из тёмной материи.
m.shadow_knows_4a=Пожалуй, геологической науке нет места в этом разговоре? Вы правы, {0}. \n\nИдём дальше. Теневой урон наносится монстрами семейств бесов и нежити. Кроме того, бесы, как правило, уязвимы к колющему урону, а нежить — к стихийному. Держите это в уме. \n\nИтак, вам что-нибудь ещё требуется?
m.shadow_knows_5a=Закончили? Да, хотя есть ещё кое-что, что я хотел бы добавить.
m.shadow_knows_6a=Я слышал, некоторые Биотехники говорят о том, как им хотелось бы вернуть «Скайларк» в строй и отправиться домой. Говорят, они очень благодарны таким рыцарям, как вы, {0}.
m.shadowplay=Игра Теней
m.shadowplay_1a=Снова опоздали\! Я уже собрал достаточно энергии, чтобы использовать Артефакт, и ничто из того, что вы сделаете, не остановит запущенное мной.
m.shadowplay_2a=Ступайте. Я позволю вам насладиться последним мгновением, прежде чем уничтожу ваше назойливое племя. Впрочем, если вы предпочтёте отвергнуть моё великодушное предложение — добро пожаловать в Ядро, где я ускорю вашу кончину.
m.shadowplay_3a=С нетерпением жду нашей следующей... встречи.
m.shocking_sentient_sentries=Электрошоковые Разумные Стражи
m.shocking_sentient_sentries_1a=«Искромёт Делюкс» почти стабилен, обещаю. Мне нужно ещё чуть-чуть времени, Воитель.
m.shocking_sentient_sentries_2a=Похоже, время вышло, Спаттерспарк. Лучше бы твоя игрушка работала.
m.shocking_sentient_sentries_3a=Иииик\! Нет-нет-нет\! Н-но он ещё не готов...\! Похоже, у меня нет выбора\! \n\n«Искромёт Делюкс»... активация\!
m.shocking_sentient_sentries_4a=Гааах\! Мне нужно убираться отсюда\! \n\nАварийное поле невидимости... активация\!
m.shopping_again=За Покупками Снова\!
m.shopping_again_10a=Билеты на аксессуары можно найти внутри сундуков или на Аукционном Доме, если какой-нибудь рыцарь решит их продать.
m.shopping_again_11a=Что ж, на этом основы Базара, пожалуй, исчерпаны. Это поистине потрясающее место, где можно найти практически всё, что вам нужно. \n\nХотите, чтобы я повторил всё ещё раз, или вы уже во всём разобрались?
m.shopping_again_12a=Без проблем, я не тороплюсь. Давайте вернёмся к Панчу и Вайсу.
m.shopping_again_12b=Замечательно\! Рад, что смог вам помочь. Удачи, и помните — я всегда буду здесь, чтобы ваша броня выглядела неповторимо\!
m.shopping_again_1a=Привет, {0}\! Ого, уже Солдат? Вы действительно стремительно продвигаетесь по карьерной лестнице. \n\nВ общем, я здесь, чтобы провести для вас экскурсию по продвинутым услугам Базара. Для начала — хотите узнать, как ещё больше усилить своё снаряжение?
m.shopping_again_2a=Кто же не хочет, верно? Давайте заглянем в мастерскую Панча и Вайса.
m.shopping_again_3a=Панч и Вайс — гремлины-кузнецы, которые могут изменять свойства вашего оружия и снаряжения.
m.shopping_again_4a=Полегче, {0}, не все гремлины скроены из одного полотна. Некоторые не согласны с порядками Короля Тинкинзара и Багрового Ордена. Более того — где-то в глубинах Часового Механизма, говорят, есть целый город гремлинов, покинувших Великую Колонию.
m.shopping_again_5a=Ладно, вернёмся к делу. \n\nПанч может добавить Уникальные Варианты — особые бонусы к вашему оружию и снаряжению — за определённую плату. Но его методы, э-э... хаотичны. Никогда не знаешь, что получишь. \n\nВайс работает точнее. Он может снять привязку с вашего оружия и снаряжения за плату, позволяя вам снова продавать или дарить предмет\!
m.shopping_again_6a=Давайте навестим Бринкса.
m.shopping_again_7a=Бринкс — Обменщик Жетонов, выдающий определённые предметы рыцарям в обмен на жетоны, которые можно собрать в Часовом Механизме. Жетоны можно найти в блоках сокровищ, получить как награду за миссии или добыть при победе над особыми боссами.
m.shopping_again_8a=Остался последний магазин — и мы закончим. Лучшее я приберёг напоследок.
m.shopping_again_9a=Перед вами... я\! Я — Аксессуаризатор, добавляющий аксессуары к вашему снаряжению при наличии билета. С аксессуарами ваше снаряжение будет по-настоящему выделяться в толпе — настоятельно рекомендую попробовать. Скоро вы станете яблочком в глазу окружающих\!
m.shopping_again_b=За Покупками\!
m.shopping_again_b_1a=Привет, {0}\! Ого, уже Солдат? Вы действительно стремительно продвигаетесь по карьерной лестнице. \n\nВ общем, я Бешамель, и я здесь, чтобы провести для вас экскурсию по продвинутым услугам Базара. Для начала — хотите узнать, как ещё больше усилить своё снаряжение?
m.silent_legion=Безмолвный Легион
m.silent_legion_1a=Они послали тебя за мной? Вернуть меня? Нет, я на своём месте. Я более не служу Спиральному Ордену и останусь здесь. \n\nПокинь это место и никогда не возвращайся. Оставь меня в покое.
m.silent_legion_2a=Мне показалось, я только что слышал их — голоса, несомые ветром. Уже не крики, не рыдания — шёпот. Неразборчивый даже в тишине этого места. Они оставляют меня здесь? Почему я должен быть оставлен? \n\nТы... я предупреждал тебя не идти дальше, держаться от меня подальше. Теперь ты узнаешь, что они натворили... что те, кто рядом со мной, — погибают\!
m.silent_legion_3a=Пронзительная печаль исходит от его поверженного тела. Глаза его гаснут, и тьма окутывает его. Аркус потерян.
m.silent_legion_recon_mod=Меня влечёт к этому месту. \n\nВ глазах этих безмолвных воинов я вижу себя\: холодного, крепкого, непоколебимого... и рассыпающегося. Меня просили отпустить это, двигаться дальше, но я не в силах. \n\nИх лица, их предсмертные крики... они преследовали меня во снах, и потому я больше не сплю. Теперь я вижу их, стоит мне закрыть глаза, и потому я не моргну. \n\nЯ останусь здесь, среди камней... не моргая, не забывая.
m.skies_under_cradle=Небеса Под Крейдлом
m.sovereign_slime=Царь-Слизень
m.spark_roar=Искра и Рёв
m.stars=Звёзды
m.start=СТАРТ
m.status_deployed=Развёрнуто\nРыцари, присоединяющиеся к развёрнутой группе, не получат зачёт выполнения миссии.
m.status_lobby=Лобби Миссии\nРыцари, присоединяющиеся в Лобби Миссии, могут получить зачёт выполнения миссии.
m.steam_dlc=Доступно в Steam
m.steam_overlay_disabled=Оверлей Steam должен быть включён для покупки дополнений. Пожалуйста, убедитесь, что галочка «Включить оверлей Steam в игре» установлена в настройках Steam «В игре», затем перезапустите игру.
m.strength_unity=Сила в Единстве
m.target_acquired=Цель Обнаружена
m.target_acquired_1a=Здравствуйте, {0}, надеюсь, вы готовы к тому, что я снова отправлю вас в логово льва.
m.target_acquired_2a=Да, Проект R оказался двумя массивными орудиями, известными как «Близнецы Рормулус». Спроектированные одним из членов самого Багрового Ордена, Близнецы Рормулус представляют собой своего рода конструкт-пушки, которые гремлины намерены переместить вверх по Часовому Механизму прямо в Аркаду Хейвена\! \n\nСудя по схемам, их мощь значительно превосходит стандартное гремлинское вооружение и может оказаться поистине разрушительной для Хейвена, Спиральной штаб-квартиры и Странников, если достигнет Аркады.
m.target_acquired_3a=Мы определили их местонахождение — глубочайший уровень гремлинского объекта, известного как «Фабрика Боеприпасов Железного Когтя». Фабрика используется для производства всех видов гремлинского вооружения и крайне опасна даже для работающих на ней гремлинов. \n\nПриготовьтесь к ожесточённому сопротивлению электрошоковых конструктов и гремлинов.
m.target_acquired_4a=И ещё кое-что — похоже, вы будете не первым рыцарем, побывавшим на Фабрике Боеприпасов Железного Когтя. Мы засекли ещё один Модуль Разведки Альфа-Отряда где-то на территории фабрики. Пожалуйста, попытайтесь его извлечь. Надеюсь, анализ покажет, что отряд Евклида выбрался оттуда живым...
m.terminal_meltdown=Расплавление Терминала
m.the_collector=Коллекционер
m.the_flickering_flame=Мерцающее Пламя
m.the_flickering_flame_1a=О, {0}\! Словно всех этих странных происшествий было мало — у меня для вас потрясающие новости.
m.the_flickering_flame_2a=Мы принимали доклад от команды лейтенанта Вэлин у Терминала Ядра, когда наш сигнал был нарушен. Потребовалось время, но мне удалось установить источник помех. Он исходит от того странного устройства, которое вы обнаружили вблизи тронного зала Ванадьюка в Огнештормовой Цитадели. Похоже, кто-то его активировал.
m.the_flickering_flame_3a=Мы не знаем наверняка, но это должно быть связано с Артефактом. Энергетические сигнатуры идентичны. Если замешан Артефакт, это значит...
m.the_flickering_flame_4a=Таково и наше предположение. Мне ненавистна мысль отправлять вас обратно в это ужасное место, {0}, но если есть хоть малейшая надежда быстро докопаться до сути этой тайны — эта надежда — вы. Цитадель по-прежнему крайне опасна, поэтому, прошу, будьте осторожны\!
m.the_gauntlet=Испытание
m.time_enough_at_last=Времени Наконец Достаточно
m.time_enough_at_last_1a=О, здравствуйте. Полагаю, вы от Спиральной штаб-квартиры.
m.time_enough_at_last_2a=Ах да, мой отряд. Славные ребята... сильные и решительные. Не уверен, что я по-настоящему вписывался, если честно — всегда больше любил читать\! Думаю, они и без меня справятся.
m.time_enough_at_last_3a=Не знаю, не знаю... мне хорошо здесь, среди всех этих древних фолиантов. Мне есть что читать — больше, чем я когда-либо смогу за целую жизнь. Впрочем, полагаю, это уже не будет проблемой. \n\nПожалуйста, просто возвращайтесь в Хейвен. Передайте моему отряду, что я в порядке и в безопасности.
m.time_enough_at_last_4a=Да, это так, не правда ли? Мне не следовало приходить сюда одному. Мне нужно было остаться с отрядом. \n\n(Эджер смотрит вдаль) \n\nЯ даже не помню, как это случилось... быть может, и не вспомню. Но больно не было.
m.time_enough_at_last_5a=Я говорю, что мне предстоит много чтения. Бой окончен — вот и всё. \n\nПожалуйста, возвращайтесь в Хейвен и передайте всем, что всё хорошо.
m.time_to_crafty=Время Мастерить
m.tortodrone_1a=[Всем] Важное Напоминание Сотрудникам\: \n\nДля доступа в зону подготовки требуется ID-карта. Правильное предъявление ID-карты приведёт к её расходованию для запитки Мрачных Врат. Помните\: «Используешь — Теряешь.» \n\nID-карты, не использованные таким образом («утерянные, сломанные или куда-то подевавшиеся»), подлежат переоформлению через отдел кадров. Стоимость замены карты будет удержана из вашей следующей зарплаты, а в ваше личное дело будет внесена чёрная метка. Не допускайте этого. Не теряйте свою ID-карту. \n\nС наилучшими пожеланиями, \nМорграл'м \nЗаместитель Начальника Отдела Распределения Ресурсов, Undercorp
m.toxic_plant_1a=Внимание, Рейнджеры — получен приказ проникнуть на объект биологического оружия гремлинов под руководством члена их «Багрового Ордена», известного как «Герекс». Если по-простому, один из самых безумных среди безумных гремлинов любит заряжать своё оружие нестандартными боеприпасами. \n\nМы не знаем, что он там варит, так что вооружайтесь и не забудьте надеть маски. Если Герекс хоть вполовину как Сирус, можете подцепить нечто похуже насморка. \n\nВыдвигаемся, Рейнджеры\! \n
m.toxic_plant_2a=Официальный приказ Герекса, Шепчущего Яда\: \n\nПроизводство Состава 42 должно быть немедленно прекращено. Будучи грозным ядом и, без сомнения, полезным инструментом для обретения... «высшего» положения в Ордене, он, похоже, обрёл интеллект, далеко выходящий за рамки стандартного биотоксина.
m.toxic_plant_2b=Все следы Состава 42 должны быть уничтожены вместе с объектом и всеми инженерами, не входящими во внутренний круг. Напомните огнемётчикам, которым эти приказы не по нутру, что непослушные скоро услышат мой шёпот в своих ушах. \n\nЗапечатайте двери и сожгите всё дотла.
m.toy_soldiers=Оловянные Солдатики
m.true_champion=Истинный Чемпион
m.true_champion_1a={0}\! О, {0}, вы выбрались\! Ха-ха\! \n\nЯ так счастлива, что вы вышли оттуда живыми\! Я места себе не находила от волнения за вас\!
m.true_champion_2a=Что ж, на мой взгляд, это лишь начало для вас, {0}. Вы — истинный Чемпион Спиральных Рыцарей. А раз уж меня не перевели, полагаю, это начало и для «нас» тоже\!
m.true_champion_3a=Всегда можете на меня рассчитывать\! \n\nА теперь — уверена, у вас полно дел. Мы тут с ума сходим, пытаясь разобраться в том Модуле Разведки, что вы обнаружили у Ядра. Как, чёрт возьми, Альфа-Отряд мог «войти» в Ядро?
m.true_champion_4a=Да, полагаю, нам это предстоит выяснить. Доброго пути, {0}.
m.tutorial_mission=Место Крушения
m.unavailable=Скоро\!
m.unknown=???
m.verify_exchange=Подтвердите обмен этих предметов на Награды за Миссию.
m.vicious_viscous=Свирепый и Вязкий
m.vile_engine=Скверный Двигатель
m.weight_of_darkness=Бремя Тьмы
m.welcome_to_haven=Добро Пожаловать в Хейвен\!
m.welcome_to_haven_1a=Вы добрались, {0}\! Рада видеть вас в Хейвене целым и невредимым. Я подтвержу Спиральной штаб-квартире, что отныне вы будете выполнять миссии в Хейвене. Для начала я назначила вам несколько миссий, которые помогут освоиться со всем, что может предложить Хейвен. Обязательно поздоровайтесь со Странниками, когда начнёте исследовать город.
m.welcome_to_haven_2a=Коренные жители Хейвена зовутся «Странниками». Их невозможно не заметить — это высокие закутанные фигуры в масках. Несмотря на устрашающий вид, они оказались нам чрезвычайно полезны и по большей части держатся особняком. Забавные птички в городе их определённо обожают\!
m.welcome_to_haven_3a=Отлично, спасибо, что хороший посол\! \n\nНапоследок мне нужно ввести вас в курс того, что называется «энергией». Это крайне важно для вашей миссии здесь, на Крейдле.
m.welcome_to_haven_4a=Энергия необходима для приобретения могущественного снаряжения и предметов на Складе Снабжения. \n\nВ своих странствиях вы найдёте ей множество применений — просто ищите символ энергии\!
m.welcome_to_haven_5a=Энергию можно получить только путём покупки за реальные деньги или через обмен на Бирже. Чтобы купить или обменять энергию, просто откройте Склад Снабжения и нажмите кнопку «Получить Энергию».
m.welcome_to_haven_6a=Я скоро свяжусь с вами снова. Удачи, {0}\!
m.welcome_to_haven_b=Добро Пожаловать в Хейвен\!
m.welcome_to_haven_b_1a=Вы добрались, {0}\! Рада видеть вас в Хейвене целым и невредимым. Я подтвержу Спиральной штаб-квартире, что отныне вы будете выполнять миссии в Хейвене. \n\nДля начала я назначила вам несколько миссий, которые помогут освоиться со всем, что может предложить Хейвен. Обязательно поздоровайтесь со Странниками, когда начнёте исследовать город.
m.welcome_to_haven_b_2a=Коренные жители Хейвена зовутся «Странниками». Их невозможно не заметить — это высокие закутанные фигуры в масках. Несмотря на устрашающий вид, они оказались нам чрезвычайно полезны и по большей части держатся особняком. Забавные птички в городе их определённо обожают\!
m.welcome_to_haven_b_3a=Отлично, спасибо, что хороший посол\! \n\nЯ скоро свяжусь с вами снова. Удачи, {0}\!
m.whipping_mishandling=Хлёст и Безалаберность
m.winterfest_danger_1a=Приветствую\! Вы, должно быть, тот отважный рыцарь, которого Спиральная штаб-квартира послала разобраться с Гринчлинами. Гора Крампус отличается от других уровней, так что позвольте объяснить, как всё устроено.
m.winterfest_danger_2a=Гора Крампус — обитель фракции Гринчлинов и их союзников. Они весьма скупая братия и не роняют никакой добычи сами по себе. Все их сокровища хранятся в убежищах, которые вы найдёте по пути на вершину.
m.winterfest_danger_3a=Эти убежища предложат вам два варианта\: покинуть гору и забрать часть гринчлинских сокровищ, или продолжить восхождение. \n\nЕсли вы решите идти дальше, вы откажетесь от добычи в этом убежище, но найдёте ещё больше сокровищ в следующем.
m.winterfest_danger_4a=Гора Гринчлинов — суровая среда, и мало кому из рыцарей хватит стойкости, чтобы достичь её вершины. Если почувствуете, что становится слишком тяжко — воспользуйтесь выходом\! Иначе вы рискуете потерять всё\!
m.winterfest_danger_5a=Удачи вам. И постарайтесь не замёрзнуть\!
m.work_idle_hands=Работа для Праздных Рук
