b.p_r4_min=Главный рыцарь-геолог Вегнер всегда стремится продолжить свои исследования таинственных минералов, которые встречаются в Часовом механизме.  Эксперименты, которые он проводит над имеющимися образцами, как правило, приводят к их распаду.  Из-за этого ему всегда нужны отважные рыцари, которые проникнут в Часовой механизм, чтобы добыть для него больше образцов.
b.p_r4_weap_1=Рыцари, спасенные из плена гремлинов, часто остаются ни с чем, кроме плохих воспоминаний о том, как их запирали в клетке и издевались над ними рычащие похитители.  Их оружие всегда крадут, а снаряжение часто повреждают инженеры гремлинов, чтобы исключить любую возможность выживания при попытке побега. \n\nЧтобы вернуть этих рыцарей в строй и подготовить их к бою, штаб-квартире Spiral нужны другие рыцари, имеющие доступ к достаточным ресурсам, чтобы помочь и снабдить их необходимым оружием и снаряжением.
b.p_r4_weap_2=Рыцари, спасшиеся из плена гремлинов, зачастую остаются ни с чем, кроме мрачных воспоминаний о том, как их держали в клетке и издевались над ними злобные похитители.  Их оружие всегда крадут, а снаряжение часто повреждают инженеры-гремлины, чтобы исключить любую возможность выживания в случае попытки побега. \n\nЧтобы вернуть этих рыцарей в строй и подготовить их к бою, штаб-квартире Spiral нужна помощь других рыцарей, имеющих доступ к достаточным ресурсам, чтобы обеспечить их необходимым оружием и снаряжением.
