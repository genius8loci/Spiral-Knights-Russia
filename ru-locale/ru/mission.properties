m.name=Имя
m.new_chapter=Новая глава
m.new_chapter_1a=Поздравляем с тем, что ты стал Солдатом, {0}\!  Я слышал, ты хорошенько отлупил того Снарболакса, молодец\! \n\nУ нас появилась возможность проанализировать разведывательный модуль «Евклида», который ты обнаружил в логове Снарболакса.  Судя по записи, похоже, что Евклид подозревал нечто, что наши Гео-рыцари обнаружили уже после крушения — что уровни внутри Часового механизма состоят из ландшафтов нескольких инопланетных миров!
m.new_chapter_2a=Пока мы не можем сказать наверняка, но, похоже, что как бы ни сформировалась Колыбель, она включала в себя большие фрагменты других миров вокруг себя.  Если это правда, то мы никогда раньше не видели ничего подобного.
m.new_chapter_3a=Штаб-квартира «Спирали» разрешила вам посетить Зал героев и получить сертификат 2-й звезды. \n\nЗал героев — это место, куда рыцари, поднимающиеся по служебной лестнице, как и вы, приходят, чтобы узнать о новых рецептах снаряжения и получить их, а также получить сертификат, позволяющий проникнуть глубже в Часовой механизм. \n\nДля первого визита требуется лишь надеть все 2-звездочное снаряжение, которое у вас уже есть, так что это будет проще простого!
m.new_threat=Новая угроза
m.new_threat_10a=Заходи, {0}\!  Что там произошло?
m.new_threat_11a=О боже!  А какая вообще связь между этими гремлинами и тем Артефактом?
m.new_threat_12a=Хм, похоже, большая часть нашего сенсорного оборудования повреждена.  Восстановление работоспособности, необходимой для отслеживания Артефакта, может занять некоторое время.  Пока мы этим занимаемся, тебе следует связаться с одним из наших биотехников, Ханом.  Он немного грубоват, но сможет помочь тебе подготовиться к испытаниям, с которыми тебе, скорее всего, придётся столкнуться. \n\nЯ свяжусь с тобой позже, как только мое оборудование для отслеживания снова заработает!
m.new_threat_1a=Привет, {0}!  У нас есть две миссии жизненной важности.  Во-первых, мы обнаружили энергетический след, похожий на тот, что исходил от Артефакта, который ты нашел в Часовом механизме.  Сейчас мы наводимся на этот энергетический след.  Обнаружение источника может помочь нам понять, что этот коварный гремлин Развог планировал сделать с Артефактом или на что на самом деле способно это устройство.
m.new_threat_2a=И, кстати, о гремлинах: мы начинаем получать тревожное количество сообщений о мобилизации гремлинов в Часовых механизмах под Хейвеном.  Пока у нас не так много подробностей, но, учитывая наши предыдущие отношения с ними, мы предполагаем, что они готовятся к нападению.
m.new_threat_3a=Штаб-квартира «Спирали» считает, что вы — наш лучший выбор для отслеживания энергетической сигнатуры, поскольку именно вы принесли нам этот Артефакт.  Рендон будет отправлен на поиски гремлинов внизу.
m.new_threat_4a=(Кора делает паузу) \n\nО чем говорили, о том и дело: Рендон звонит прямо сейчас; говорит, что это срочно. Соединяю его...
m.new_threat_5a={0}, в Лаборатории происходит что-то серьезное.  Тебе нужно немедленно туда отправиться!
m.new_threat_6a=Только что из лаборатории доносились крики и взрывы.  Похоже, на нас напали!  Лучше вооружиться.  Я понятия не имею, что там происходит, но нам лучше быть готовыми ко всему!
m.new_threat_7a=Хст! Так это вы победили Развога и забрали то, что принадлежало мне.  Вы недостойны обладать этим могущественным артефактом, и я здесь, чтобы избавить вас от него.
m.new_threat_8a=Пфф!  Я не простой гремлин.  Я — тысяча глаз, наблюдающих за вами в темноте.  Я — шипящий клинок, шепчущий о вашей гибели.  Снесите каждую стену и каждый шестеренку в этом проклятом месте, и вы найдете лишь тени. \n\nТакие, как вы, не смогут меня остановить!  Хсс!
m.new_threat_9a=Невозможно остановить то, чего не видишь.
m.new_threat_9b=(Ни гремлина, ни Артефакта нигде не видно.  Этот гремлин, похоже, очень искусно заметает следы.)
m.new_threat_bystander_1a=Мы едва не погибли. Только что все было нормально, а в следующий момент гремлины уже вырывались из-под земли!
m.new_threat_bystander_1b=Будьте осторожны там.  Похоже, с ними был какой-то огромный...
m.new_threat_bystander_1c=Я беспокоюсь за спрайтов!
m.new_threat_bystander_1d=Я только что услышал взрыв в задней части лаборатории! \n\nМы разберемся с этими монстрами, {0}.  Иди и убедись, что Артефакт в безопасности!  Поторопись!
m.no_objective=Нет текущей цели
m.occurance_at_owlite_keep=Событие в крепости Оулайт
m.occurance_at_owlite_keep_1a=(По всей видимости, это тот самый фолиант из Оулайта, о котором говорили спикаты, — он якобы описывает место, расположенное над Ядром. Его страницы сильно изношены, и расшифровать удалось лишь отдельные фрагменты первоначального текста.)
m.occurance_at_owlite_keep_2a=...Этот мир видел мало трагедий, превосходящих падение великого Королевства Альмире.  Когда-то это было оживленное, прекрасное царство с густыми лесами и обширными равнинами... \n\n...соседние королевства объявили войну... \n\n...в поисках силы, необходимой для перелома хода событий, лорд Ванадук из Альмире бежал в горы. ..
m.occurance_at_owlite_keep_3a=...вернувшись в виде чего-то нечеловеческого... \n\n...бесконечного ада.... \n\n...Альмир разрушен... \n\n...они никогда не смогут уйти, они никогда не смогут спастись от пламени...
m.occurance_at_owlite_keep_4a=(Остальные страницы слишком повреждены, чтобы расшифровать что-либо, кроме даты описанных событий, которые указывают на то, что Королевство Альмире было разрушено более тысячи лет назад.)
