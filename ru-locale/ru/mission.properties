b.p_winterfest_danger_r7=Внимание\: Это Опасная Миссия\! \n\nОт имени Импостоклауса Спиральная штаб-квартира обнаружила базу операций коварных гринчлинов. Пришло время нанести им ответный удар и раз и навсегда положить конец их зимнефестовому террору. Но задача будет непростой. \n\nТе, кто примет эту миссию, должны взобраться на Гору Крампус — опасный путь, полный засад гринчлинов и ледяных смертоловушек. По дороге вы обнаружите укрытия, позволяющие собрать сокровища гринчлинов и покинуть гору, или продвинуться дальше к вершине за ещё большей наградой\! Только имейте в виду\: гринчлины и их союзники — скупая братия и НЕ роняют НИКАКОЙ добычи. Все сокровища Горы Крампус находятся в укрытиях. И если вы откажетесь от них ради большей награды впереди — рискуете потерять всё в случае неудачи\! \n\nПоговаривают, что на самой вершине Горы Крампус лежит тайник гринчлинской добычи, в котором, быть может, хранятся сокровища, невиданные доселе...
b.p_winterfest_danger_r9=Внимание\: Это Опасная Миссия\! \n\nОт имени Импостоклауса Спиральная штаб-квартира обнаружила базу операций коварных гринчлинов. Пришло время нанести им ответный удар и раз и навсегда положить конец их зимнефестовому террору. Но задача будет непростой. \n\nТе, кто примет эту миссию, должны взобраться на Гору Крампус — опасный путь, полный засад гринчлинов и ледяных смертоловушек. По дороге вы обнаружите укрытия, позволяющие собрать сокровища гринчлинов и покинуть гору, или продвинуться дальше к вершине за ещё большей наградой\! Только имейте в виду\: гринчлины и их союзники — скупая братия и НЕ роняют НИКАКОЙ добычи. Все сокровища Горы Крампус находятся в укрытиях. И если вы откажетесь от них ради большей награды впереди — рискуете потерять всё в случае неудачи\! \n\nПоговаривают, что на самой вершине Горы Крампус лежит тайник гринчлинской добычи, в котором, быть может, хранятся сокровища, невиданные доселе...
b.p_winterfest_r3=Каждый Зимнефест стая зелёношёрстных гремлинов учиняет изрядный переполох в городе Эмберлайт. Эти «гринчлины», как их прозвали, не успокоятся, пока не утащат все до единого подарки из города Эмберлайт. \n\nИ потому Импостоклаус обратился к Спиральным Рыцарям с просьбой взяться за оружие и дать отпор чудовищам, угрожающим городу Эмберлайт. Так хватайте подарок и откликнитесь на его зов\! Пусть каждый в городе Эмберлайт встретит радостный Зимнефест.
b.p_winterfest_r4=Каждый Зимнефест стая зелёношёрстных гремлинов учиняет изрядный переполох в городе Эмберлайт. Эти «гринчлины», как их прозвали, не успокоятся, пока не утащат все до единого подарки из города Эмберлайт. \n\nИ потому Импостоклаус обратился к Спиральным Рыцарям с просьбой взяться за оружие и дать отпор чудовищам, угрожающим городу Эмберлайт. Так хватайте подарок и откликнитесь на его зов\! Пусть каждый в городе Эмберлайт встретит радостный Зимнефест.
b.p_winterfest_r6=Каждый Зимнефест стая зелёношёрстных гремлинов учиняет изрядный переполох в городе Эмберлайт. Эти «гринчлины», как их прозвали, не успокоятся, пока не утащат все до единого подарки из города Эмберлайт. \n\nИ потому Импостоклаус обратился к Спиральным Рыцарям с просьбой взяться за оружие и дать отпор чудовищам, угрожающим городу Эмберлайт. Так хватайте подарок и откликнитесь на его зов\! Пусть каждый в городе Эмберлайт встретит радостный Зимнефест.
b.p_winterfest_r7=Каждый Зимнефест стая зелёношёрстных гремлинов учиняет изрядный переполох в городе Эмберлайт. Эти «гринчлины», как их прозвали, не успокоятся, пока не утащат все до единого подарки из города Эмберлайт. \n\nИ потому Импостоклаус обратился к Спиральным Рыцарям с просьбой взяться за оружие и дать отпор чудовищам, угрожающим городу Эмберлайт. Так хватайте подарок и откликнитесь на его зов\! Пусть каждый в городе Эмберлайт встретит радостный Зимнефест.
b.p_winterfest_r9=Каждый Зимнефест стая зелёношёрстных гремлинов учиняет изрядный переполох в городе Эмберлайт. Эти «гринчлины», как их прозвали, не успокоятся, пока не утащат все до единого подарки из города Эмберлайт. \n\nИ потому Импостоклаус обратился к Спиральным Рыцарям с просьбой взяться за оружие и дать отпор чудовищам, угрожающим городу Эмберлайт. Так хватайте подарок и откликнитесь на его зов\! Пусть каждый в городе Эмберлайт встретит радостный Зимнефест.
b.pierce_of_cake=Теперь, когда вы выполняете миссии в «Слое 2» Часового Механизма, монстры начнут наносить особые виды урона, о которых вам необходимо знать и к которым следует готовиться, иначе вас может ждать неминуемая гибель\! \n\nОдин из наших ведущих Биотехников, Ган, подготовил краткий урок о колющих монстрах. Поговорите с ним по комлинку, прежде чем приступать к дальнейшим миссиям.
b.pioneers=После крушения Скайларка Капитан Озло отобрал элитный отряд Спиральных Рыцарей, чтобы те первыми вошли в Часовой Механизм. Их больше никто не видел. Свяжитесь с Агентом Разведки Корой и узнайте, какую роль вам предстоит сыграть в раскрытии этой тайны.
b.plan_of_attack=В глубине ядовитой пещеры скрыта секретная испытательная лаборатория, которую гремлины использовали как полигон для компонентов Проекта R. Рядом с одним из всё ещё разрабатываемых компонентов, по имеющимся сведениям, находятся чертежи проекта. \n\nЕсли это правда, рядом с одним из компонентов Проекта R должен быть какой-то терминал. Найдите терминал и извлеките чертежи для анализа. Это должно пролить свет на истинную природу Проекта R.
b.prestige=ПРЕСТИЖ
b.prestigious_opportunity=Похоже, вы отлично проявили себя в глазах Спиральной штаб-квартиры. Свяжитесь с Агентом Разведки Корой и узнайте, как можно получить дополнительные миссии от Спиральной штаб-квартиры.
b.pumping_up=Вы можете свободно использовать Продвинутый Тренировочный Зал в любое время для практики с новым оружием или изучения уникальных особенностей Часового Механизма. Загляните туда и посмотрите, что он может предложить\!
b.purchase=Приобрести дополнение
b.pvp=КОЛИЗЕЙ
b.rank=РАНГ
b.remove=Удалить дополнение
b.reporting_duty=Лейтенант Ферон отвечает за надзор над горнодобывающей операцией Часового Механизма на Аркаде Хейвена. Доложите ему и узнайте о ситуации в Хейвене и миссии Спиральной штаб-квартиры по достижению Ядра Крейдла.
b.rescues_and_recycling=«Зона Деконструкции» — гремлинский рабочий объект, где гремлины, по-видимому, разбирают существующие уровни и используют компоненты для постройки новых. Их способность стремительно конструировать уровни и машины поразительна и уступает лишь их враждебности к любому, кто попадётся на пути. \n\nРыцари-Разведчики обнаружили, что один отряд, очевидно, слишком пристально наблюдал за их инженерными чудесами — теперь его удерживают в плену на одном из демонтажных объектов вблизи глубины 10. Неясно, что гремлины замышляют в отношении этих рыцарей и не планируют ли они просто позволить им погибнуть вместе с остальным разбираемым уровнем.
b.return_of_ur=Разведывательный отряд сообщает, что в глубинах бесовского города дьяволята пытаются призвать легион могучих воинов-троянов. Согласно разведданным из внутренней дьяволятской докладной записки, трояны известны как «Легион Ура» и когда-то насчитывали тысячи бойцов. Примечательно, что в записке указывалось, будто Легион Ура был заточён в Подземном Мире и для их возвращения потребуется нестандартный подход. \n\nКакие бы средства дьяволята ни намеревались использовать для переброски нескольких тысяч троянов в Часовой Механизм, их необходимо остановить. Проникните в их город и пресеките бесовскую армию, прежде чем она станет неудержимой\!
b.rise_or_fall=Проникновение во Дворец Королевского Желе и сражение с ордами слизней, служащих великому Королевскому Желе, не будет простой задачей. Настоятельно рекомендуется найти одну из «Боевых Арен» в Часовом Механизме и определить, готово ли ваше снаряжение к встрече с таким количеством свирепых слизней. \n\nСпиральная штаб-квартира обнаружила одну из этих загадочных арен, которая, похоже, заполнена всевозможными склизкими гладиаторами, жаждущими вызова. Задайте им жару\!
b.rotting_metropolis=Похоже, эти генераторы слизней существуют гораздо дольше, чем мы думали, источая свои мерзкие токсины в любые близлежащие уровни. \n\nСовременный город, весьма напоминающий те, что населяют дьяволята, охвачен этими токсинами и, вероятно, был покинут как дьяволятами, так и гремлинами в результате. Теперь легион слизней и нежити населяет это место, гроздясь в ядах, висящих в воздухе. Отряд, пытавшийся пройти через город, пропал без вести. Учитывая, что сам воздух токсичен, крайне необходимо, чтобы опытная команда вошла в этот город и спасла отряд. Иных надежд для них почти не осталось.
b.scarlet_fortress=В отличие от Островов Утренней Зари, Рыцари-Разведчики обнаружили ещё один гео-глобус, содержащий руины, по-видимому, древнего замка. Названная «Алая Крепость», эта рассыпающаяся твердыня также является обиталищем орды неупокоенных духов. Соблюдайте осторожность при исследовании её извилистых переходов.
b.search=Поиск
b.search_continues=Лейтенант Вэлин хотела бы поблагодарить вас за то, что вы открыли путь к Ядру и позволили ей основать полевую исследовательскую базу.
b.securing_camp=Прежде чем пытаться исследовать кишащие монстрами глубины под Спасательным Лагерем, Рендон хотел бы ввести вас в курс дела относительно выполнения миссий для Спиральной штаб-квартиры.
b.securing_camp_b=Прежде чем пытаться исследовать кишащие монстрами глубины под Спасательным Лагерем, Рендон просит вас помочь ему уничтожить монстров, атаковавших Спасательный Лагерь прошлой ночью.
b.sewer_stash=Похоже, Фабрика Боеприпасов Железного Когтя — не единственное место, где гремлины хранят мощное вооружение. Разведданные указывают, что после изготовления оружие вывозится с фабрики и размещается в тайных оружейных складах по всему Часовому Механизму. \n\nОдин из таких складов обнаружен в одной из сточных систем Часового Механизма. Путь к нему, скорее всего, будет неприглядным, но уничтожение хранящегося там оружия может значительно сократить потери в будущем.
b.shadow_beast=Спиральная штаб-квартира обнаружила Модуль Разведки, оставленный Альфа-Отрядом где-то в Сумрачных Дебрях. Ваша миссия — найти и извлечь модуль. \n\nСумрачные Дебри — обиталище стай диких зверей, уже доказавших свою смертоносность для отрядов. Поэтому Техники-Рыцари расставили по всей территории Звериные Колокола. Удар по ним должен оглушить любых зверей, попавших в зону звуковой волны. \n\nПримите к сведению, что Рыцари-Разведчики сообщали о присутствии ужасного зверя, подобного которому мы прежде не встречали, рыскающего по этому лесу. Известный как «Снарболакс», он являет собой тёмную массу клыков и когтей и, по-видимому, абсолютно невосприимчив к нашему оружию. При встрече с ним попытайтесь как можно скорее найти путь к отступлению.
b.shadow_knows=Биотехник Ган предположил, что с учётом вашего недавнего повышения вы готовы узнать о коварных монстрах Часового Механизма, наносящих теневой урон. Свяжитесь с ним по комлинку и послушайте, что он скажет.
b.shadowplay=Даже после поражения Лорда Ванадьюка от ваших рук Огнештормовая Цитадель продолжает пылать проклятым пламенем. Хотя Природные Спрайты неуклонно продвигаются в борьбе с огнём, кто-то или что-то недавно вызвало яростное возрождение его разрушительной силы. Спиральная штаб-квартира просит вас собрать ударный отряд рыцарей и вернуться в рушащиеся руины Огнештормовой Цитадели, чтобы обнаружить источник возмущения.
b.shocking_sentient_sentries=Рыцари-Разведчики обнаружили секретный оружейный объект, который, согласно имеющимся разведданным, может принадлежать высокопоставленному гремлину Багрового Ордена. Он хорошо укреплён небольшой армией электрифицированных конструктов, несомненно запрограммированных защищать объект любой ценой. \n\nХотя неясно, действительно ли этот оружейный склад принадлежит члену Багрового Ордена, проникновение и нейтрализация его содержимого от этого не менее оправданы. \n\nРекомендуется подготовить стихийное оружие и снаряжение с устойчивостью к электричеству перед развёртыванием.
b.shopping_again=Бешамель уже проводил для вас экскурсию по Базару Хейвена, включавшую места приобретения нового оружия, брони и рецептов. Теперь пришло время навестить его снова и узнать о более продвинутых услугах Базара. \n\nВы посетите мастерскую Панча и Вайса, Бринкса и даже заглянете в собственную лавку Бешамеля\!
b.shopping_again_b=Настало время узнать о более продвинутых услугах Базара. Следуйте за рыцарем Бешамелем и посетите мастерскую Панча и Вайса, Бринкса и даже собственную лавку Бешамеля\!
b.silent_legion=Рыцарь-Защитник Аркус был одним из лучших воинов на службе у Спиральных Рыцарей — до некоторого времени после крушения. Будучи одним из первых, кто отправился на поиски Альфа-Отряда, Аркус потерял свой собственный отряд в кровавом бою с ордой пылевых зомби. С тех пор он винил себя в их гибели, говоря, что предал свою Клятву Защитника — защищать свой отряд. \n\nТеперь Аркус в одиночку уходит в Часовой Механизм, не рискуя потерять ещё один отряд, и, как мы полагаем, каким-то образом пытается отыскать тот отряд, который некогда потерял. Когда эти экспедиции стали выглядеть саморазрушительными, Спиральная штаб-квартира отдала ему прямой приказ прекратить. \n\nАркус проигнорировал приказы и ушёл глубоко в Часовой Механизм, не вернувшись. Не желая потерять последнего бойца его отряда, Спиральная штаб-квартира просит вас проследовать к его последнему известному местонахождению — некоему загадочному скульптурному саду на глубине 26.
b.skies_under_cradle=Часовой Механизм — это завораживающий подземный комплекс, хранящий целые миры в своих колоссальных железных гео-глобусах. Один из них, обнаруженный Рыцарями-Разведчиками, известен как «Острова Утренней Зари» — ряд таинственных парящих островов под ложным небом. \n\nКак новоиспечённый Ученик, вы получаете допуск к исследованию руин на этих островах и сбору любых полезных материалов, которые обнаружите.
b.sovereign_slime=Источник странного энергетического сигнала, предположительно, находится где-то во Дворце Королевского Желе — обители одного из представителей слизневой аристократии, Королевского Желе. \n\nМощь этих самодержавных слизней не стоит недооценивать. Если вам доведётся столкнуться с этим вспыльчивым аристократом, разумно будет экипироваться соответствующим снаряжением и заручиться поддержкой полного отряда опытных рыцарей. \n\nНастоятельно рекомендуется экипировать снаряжение с устойчивостью к колющему урону и оружие с теневым уроном перед отправкой во Дворец Королевского Желе\!
b.spark_roar=Исключительно высокая концентрация конструктов обнаружена в области Часового Механизма, которую Спиральная штаб-квартира подозревает в связи с укрытием Багрового Ордена. В отличие от других монстров, конструкты, по-видимому, не способны к самовоспроизводству, а значит, каждый уничтоженный экземпляр — это необратимая брешь в их рядах. Задача будет стоящей вне зависимости от причастности Багрового Ордена. \n\nСпиральная штаб-квартира просит вас войти на эти уровни, обследовать возможное укрытие и уничтожить угрозу конструктов. \n\nНастоятельно рекомендуется экипироваться снаряжением с защитой от стихийного урона, а также стихийным и теневым оружием\!
b.strength_unity=Что-то всполошило стаю зверей на Островах Утренней Зари, и они обрушились на исследовательскую группу Рыцарей-Геологов. Загнанная в угол, группа послала сигнал бедствия, и Спиральная штаб-квартира поручила задачу спасения вам. \n\nДержась вместе, Рыцари-Геологи продержались до сих пор, но их время на исходе. Соберите команду и дайте отпор зверям, жаждущим поглотить ваших собратьев-рыцарей\!
b.target_acquired=Проанализировав чертежи, добытые вами из гремлинской испытательной лаборатории, Спиральная штаб-квартира теперь знает природу Проекта R и его местоположение на гремлинском оружейном объекте. Спиральная штаб-квартира просит вас проникнуть на этот объект и уничтожить Проект R, прежде чем он будет применён против Хейвена. Поговорите с Агентом Разведки Корой для получения полных деталей.
b.terminal_meltdown=Притянутые к Огнештормовой Цитадели, орда огненных слизней и зверей заполонила близлежащее топливное хранилище, ставя под угрозу само хранилище и наш доступ к цитадели. Если эти монстры перекинут пламя на топливные бочки, всё место взлетит на воздух. \n\nСпиральная штаб-квартира нуждается в вас, чтобы войти в хранилище и потушить огонь до того, как время истечёт и грянёт катастрофический взрыв\!
b.the_collector=Поступают разрозненные рапорты о крупной механической сущности, которую мы назвали «Коллекционер». Она перехватывает наших рыцарей и похищает как их, так и преследуемых ими спрайтов, заключая их в хорошо охраняемый комплекс глубоко в Часовом Механизме. Вооружившись своим новым спрайтом, ваша миссия — отыскать этого «Коллекционера» и освободить пленённых рыцарей и спрайтов.
b.the_flickering_flame=После вашей победы в Огнештормовой Цитадели Природные Спрайты великой Матери Духов наконец начали одерживать верх в борьбе с проклятым пламенем, охватившим обугленные руины Альмира. Недавняя вспышка затормозила этот прогресс, намекая на некую затаившуюся злонамеренную силу, продолжающую подпитывать огонь. Свяжитесь с Агентом Разведки Корой для подробностей.
b.the_gauntlet=Последняя битва стоит между вами и Огнештормовой Цитаделью. Предположительно придуманная самим Лордом Ванадьюком, эта неумолимая полоса испытаний кишит всевозможными порождениями тьмы и завершается кошмарной боевой ареной, которую необходимо покорить, чтобы получить доступ к вратам Огнештормовой Цитадели. \n\nЭта миссия потребует всего, что у вас есть, и требует полного арсенала мощного оружия и снаряжения. Если Лорд Ванадьюк испытывает вас — дайте ему бой, которого он просит, и покажите ему, на что способен истинный Чемпион\!
b.time_enough_at_last=Рыцарь по имени Эджер пропал при исследовании Алой Крепости. Учитывая, что этот рушащийся замок кишит спукатами и желейными кубами, его товарищи по отряду опасаются за его безопасность и попросили более опытного рыцаря вроде вас провести расследование. \n\nНайдите Эджера в крепости и верните его в Хейвен\!
b.time_to_crafty=Боско просит вас алхимизировать для него Горячий Клинок и Ледяное Оружие для проверки. Если всё будет хорошо, он сообщит Спиральной штаб-квартире, что вы освоили жизненно важное искусство алхимии, и даже добавит пару мощных Уникальных Вариантов к вашему новому оружию. Какой щедрый парень\!
b.toggle_arsenal=ПЕРЕКЛЮЧИТЬ АРСЕНАЛ
b.toy_soldiers=Рыцари-Разведчики сообщают о значительном увеличении числа меха-рыцарей в первой ступени Часового Механизма. Они обнаружили фабрику по производству меха-рыцарей вблизи Хейвена. \n\nМеха-рыцари считаются разработанными гремлинами часовыми из семейства конструктов, обладающими многими способностями Спиральных Рыцарей. Соблюдайте осторожность при поиске производственного центра и остановите его раз и навсегда\!
b.true_champion=Выбравшись из Огнештормовой Цитадели живым, Агент Разведки Кора с нетерпением ждёт вашего звонка.
b.uncomplete_mission=Отменить завершение миссии
b.unequip_items=Снять предметы
b.unlock=Разблокировать
b.vicious_viscous=Спиральная штаб-квартира хотела бы, чтобы вы обследовали уровни Часового Механизма, где обитают мощнейшие слизни и звери. Исследуя эти уровни и передавая боевые данные в Спиральную штаб-квартиру, вы в конечном счёте принесёте пользу всем рыцарям благодаря вашему опасному опыту. \n\nНастоятельно рекомендуется экипировать снаряжение с устойчивостью к колющему урону, а также колющее и теневое оружие\!
b.vile_engine=Где-то под уровнем, который облюбовали лишайники, скрывается странный объект неизвестного происхождения, используемый, по-видимому, для производства ядовитых слизней-монстров. «Генераторы слизней» способны стремительно производить слизней, которые затем быстро заселяют близлежащие уровни. \n\nОтряды на соседних уровнях уже докладывают о подавляющем числе ядовитых слизней, делающем невозможным проведение экспедиций глубже 23. Пришло время рыцарю вашего калибра сформировать отряд, проникнуть на этот странный объект и остановить производство этих мерзких созданий. \n\nЛюбые данные об их происхождении, которые вы сможете собрать, будут крайне ценны для Спиральной штаб-квартиры.
b.weight_of_darkness=Считается, что все бесы в Часовом Механизме перешли из измерения, известного как Подземный Мир. Хотя способ их перехода и мотивы на Крейдле неясны, данные, собранные из бесовских городов, по-видимому, указывают на то, что они застряли на Крейдле, подобно нам. \n\nНежить же остаётся загадкой. Почему духи возвращаются в материальный мир — неизвестно, хотя очевидно, что многие духи в Часовом Механизме пришли из других миров. Учитывая враждебность этих существ, единственный способ получить полезные данные — прямое взаимодействие, такое как бой. \n\nСпиральная штаб-квартира просит вас собрать боевые данные о могущественных бесах и нежити в Слое 3 Часового Механизма, чтобы лучше понять природу этих существ. \n\nНастоятельно рекомендуется экипировать снаряжение с устойчивостью к теневому урону, а также стихийное и колющее оружие\!
b.welcome_to_haven=Пережив путешествие до Хейвена, вы должны связаться с Агентом Разведки Корой по комлинку и передать ей отчёт. У неё есть информация о дальнейших действиях, а также особые инструкции по использованию энергии.
b.welcome_to_haven_b=Пережив путешествие до Хейвена, вы должны связаться с Агентом Разведки Корой по комлинку и передать ей отчёт. У неё есть информация о дальнейших действиях.
b.whipping_mishandling=После того как Рыцари-Разведчики обнаружили бесовский город, известный как Сол' Форк, Спиральная штаб-квартира развернула исследовательскую группу в самом сердце города для изучения обитающих там дьяволят. Их находки легли в основу нашего понимания культуры дьяволят и их мотивов для сотрудничества с гремлинами. \n\nЭта исследовательская группа отчаянно нуждается в припасах для продолжения полевой работы. Было бы очень полезно для непрерывных исследований Спиральной штаб-квартиры, если бы отряд вошёл в город и доставил необходимые припасы.
b.work_idle_hands=Дьяволята — разновидность бесов с весьма жёсткой корпоративной структурой, управляющей каждым их действием. Рыцари-Разведчики обнаружили серию дьяволятских «офисов» по всему Часовому Механизму, обычно расположенных в руинах инопланетного города. \n\nАнализ данных, собранных из этих офисов, показывает, что дьяволятские корпорации нанимаются гремлинами на аутсорсинг для проектирования и управления различными проектами, включая оружие, специально сконструированное для уничтожения отрядов Спиральных Рыцарей. \n\nПришло время вручить этим дьяволятам уведомления об увольнении и аннулировать их бесовские проекты.
c.rank=Ранг {0}-{1}
d.supply_depot_explanation=Склад снабжения полон предметов на продажу. По мере выполнения миссий станет доступно больше предметов.
e.expansion_example=Набор миссий-дополнений
e.expansion_example_2=Набор миссий-дополнений 2
e.good_unavailable=Извините, этот предмет больше недоступен.
e.operation_crimson_hammer=Операция «Багровый Молот»
f.p_tip=Знаки Престижа отображаются рядом с именем вашего рыцаря. Они автоматически присуждаются при накоплении достаточного Престижа.
g.featured_energy=Рекомендуемая Энергия
g.featured_items=Рекомендуемые Предметы
h.cost=СТОИМОСТЬ
h.item=ПРЕДМЕТ
h.new_missions=Доступны новые миссии\! Нажмите здесь\!
h.rank=РАНГ
m.a_call_to_arms=Призыв к оружию
m.a_call_to_arms1=Это Вэлин у Терминала Ядра. Отряд уничтожен. Повсюду тьма. Пришлите подмогу. Оно открывается.
m.abandoned_depot=Заброшенное Хранилище
m.advanced_alchemy=Продвинутая алхимия
m.advanced_alchemy_1a=Мы снова встретились, {0}. Спиральная штаб-квартира попросила меня познакомить вас с продвинутой алхимией. Не переживайте, это не займёт много времени. Мне ещё старого меха-рыцаря чинить.
m.advanced_alchemy_2a=В сущности, всё сводится к «ветвлению». Видите ли, бо́льшая часть алхимии, с которой вы, вероятно, сталкивались до сих пор, следует линейному пути развития. Предмет просто улучшается со временем, и каждая ступень лучше предыдущей. \n\nНо не все предметы таковы. Многие из них могут превратиться в несколько совершенно различных видов предметов, отличных от оригинала\!
m.advanced_alchemy_3a=Вы разберётесь по ходу дела, поверьте. Возьмём, к примеру, этот Брандиш. В нём заложен потенциал стать тремя различными типами стихийных клинков, наносящих мощные статус-эффекты, или даже тёмным мечом тени\! \n\nВам нужно лишь открыть рецепты, требующие Брандиш, и начать алхимизировать. Вот, можете даже оставить себе этот Брандиш. Переплавьте его во что-нибудь потрясающее.
m.aggressive_assembly=Агрессивная Сборка
m.alchemy_beginners=Алхимия для начинающих
m.alchemy_beginners_10a=Без проблем, тогда с самого начала...
m.alchemy_beginners_10b=Вы будете алхимизировать потрясающие предметы в мгновение ока\! Вот, кстати, пара рецептов для начала.
m.alchemy_beginners_1a=Здравствуйте, {0}\! Меня зовут Боско, и я здесь, чтобы провести для вас краткий курс основ алхимии. \n\nВ общем-то это простые вещи, благодаря этим Станциям Алхимии. Они делают всю тяжёлую работу за вас\!
m.alchemy_beginners_2a=Итак, суть такова — собирайте материалы и рецепты и превращайте их в оружие и снаряжение. Просто, верно?
m.alchemy_beginners_3a=Когда вы приобретаете рецепт и используете его, рецепт расходуется, но навсегда записывается в ваш список «известных» рецептов\! Как только рецепт известен, вы можете создавать сколько угодно предметов по нему, при условии наличия нужных материалов.
m.alchemy_beginners_4a=Когда вы взаимодействуете со Станцией Алхимии, откроется интерфейс алхимии, где вы увидите ваши известные рецепты...
m.alchemy_beginners_5a=...и необходимые материалы, сферы алхимии и кроны, нужные для трансмутации предмета.
m.alchemy_beginners_6a=Многие рецепты требуют экипируемый предмет определённого уровня. В рецепте они называются «особые предметы», и вы вольны выбрать подходящий, при условии, что это правильный предмет. \n\nЭто полезно, если рецепт требует предмет, которого у вас два экземпляра, но один превосходит другой.
m.alchemy_beginners_7a=Когда вы готовы трансмутировать предмет, нажмите «Трансмутировать» и затаите дыхание\!
m.alchemy_beginners_8a=Вот именно\! Ведь каждый раз, когда вы трансмутируете предмет через алхимию, есть шанс получить один из нескольких Уникальных Вариантов, делающих ваш предмет куда мощнее\!
m.alchemy_beginners_9a=На этом основы алхимии исчерпаны. Могу повторить всё ещё раз, если хотите, или засчитать вам выполнение этой миссии и отправить вас дальше.
m.alchemy_mastery=Мастерство алхимии
m.alchemy_mastery_1a=И снова здравствуйте, {0}. Насколько мне известно, вы уже на верном пути к Ядру и нуждаетесь в арсенале, который сохранит вам жизнь.
m.alchemy_mastery_2a=Хороший меч — это, конечно, хорошо, но как насчёт великолепного меча? Если вам нужно оружие, от которого содрогнутся небеса, то мастерский уровень алхимии — именно то, что вам нужно. \n\nКак только вы преобразите предмет в его 4- и 5-звёздочное воплощение, вы раскроете истинный скрытый потенциал этого предмета.
m.alchemy_mastery_3a=На уровне 4 и 5 звёзд снаряжение обеспечивает лучшую защиту, какую только можно найти, а оружие наносит сокрушительнейшие удары. Если вы хотите выжить там, куда направляетесь, вам необходимо начать собирать арсенал из 4- и 5-звёздочного снаряжения. \n\nИ помните — при достижении 5 звёзд предметы, как правило, разветвляются ещё больше, чем прежде. Ваши боевые возможности вот-вот значительно расширятся. Планируйте свой арсенал с умом.
m.alchemy_mastery_4a=Прежде чем вы уйдёте, вот несколько материалов для начала. Удачи.
m.alien_ooze=Инопланетная слизь
m.alien_ooze_1a=Мне пока нечего сказать, но это связано с Колокольчиками Зверей. (ТОЛЬКО ДЛЯ РАЗРАБОТЧИКОВ)
m.alone_in_dark=Один во тьме
m.alone_in_dark_1a=(Перед вами предстаёт потерянная душа Альмира. В его лице читается глубокая печаль. Устремив взгляд сквозь вас, он начинает говорить без всякого вступления.) \n\nЛорд Ванадьюк принёс огонь с гор в наше королевство. Всё сгорело. Его враги. Даже его семья. \n\nМоя семья тоже погибла. Я бежал с поля битвы, едва завидев волну пламени вдалеке. Мне удалось добраться до дома как раз вовремя, чтобы увидеть, как он горит. Я даже не помню, чем всё закончилось. У меня нет воспоминаний о собственной гибели.
m.alone_in_dark_2a=Теперь Лорд Ванадьюк правит цитаделью. Его душа заточена в некую ужасающую бронированную темницу. \n\nОн держит цитадель в постоянной боевой готовности, полагая, что его королевство всё ещё в осаде. Он даже не осознаёт, что то, что он пытается защитить, было утрачено тысячу лет назад.
m.alone_in_dark_3a=Если вы отважитесь войти в цитадель и сумеете добраться до тронного зала, прошу вас — положите конец его страданиям. Дайте душам, которые он держит привязанными к этому миру, шанс вернуться к своим близким. \n\nИ ещё кое-что — я слышал, что некая сила природы однажды пыталась исправить его злодеяния, но Лорд Ванадьюк заточил её где-то в своей крепости. Найти и освободить её может оказаться весьма полезным.
m.alone_in_dark_4a=(Потерянная душа продолжает смотреть сквозь вас, не произнося ни слова.)
m.ancient_generator=Древний Генератор
m.ancient_generator_1a=Что тут у нас, ещё одни зверушки, свалившиеся с неба? Явились отнять мою силу и нарушить мои исследования? \n\nНикто не смеет нарушать работу великого Интригана Развога\! Я позабочусь о том, чтобы вы никогда не покинули эту комнату живыми\!
m.ancient_generator_2a=Мерзкие вы, маленькие твари\! Не смейте прикасаться к артефакту\! \n\nАрх\! Я ещё до вас доберусь\!
m.anniversary_end_1={0}\! Вы справились\! Моя кухня снова моя\! \n\nНе забудьте, что кусочки торта можно обменять на потрясающие тортошлемы у Масквелла на Городской Площади Хейвена. Как гласит старая пекарская поговорка: «Носи шкуру поверженных врагов, дабы явить свою мощь воина\!» \n\nЛадно, может, это только я так говорю.
m.anniversary_gremlin_1a=Щепотка лунного камня, чуточка... К... Как вы... Кто вы такие\!? Вам тут не место\!
m.anniversary_gremlin_1b=Вон, вон, воооон\! Слишком много поваров на кухне\! Слишком много поваров на кухне\!
m.anniversary_gremlin_2=Что вы творите\!? Мои тортики\! Мои прелестные тортики\! Неприемлемо\!
m.anniversary_gremlin_3=Гуууррргл\! Какая сила\! Я поглощу вас и вашу мощь прибавлю к своей\!
m.anniversary_gremlin_4a=Вы... Я... Что это было? Вы что-то сказали?
m.anniversary_gremlin_4b=О нет\! Передайте ей, что торты будут готовы. Хм, я просто немного задержался. Давайте договоримся\: я дам вам лишний кусок торта, если мы оставим это между нами. Не хочу, чтобы меня выгнали с праздника.
m.anniversary_start_1={0}\! Как же я рад вас видеть\! Дела тут совсем плохи.
m.anniversary_start_2=Значит, дело вот в чём... Мне поручили испечь торты для большого празднования Годовщины Спиральных Рыцарей, и я, возможно, слегка погорячился, когда сказал, что смогу испечь пару миллионов за одну неделю. \n\nЧтобы ускорить процесс, я, возможно, использовал крохотную малюсенькую щепотку чистой, необработанной тёмной материи вместо разрыхлителя...
m.anniversary_start_3=Как бы то ни было, похоже, этот новый «рецепт» превратил торты в ужасных монстров, которые захватили мою кухню и расплодились по всему Часовому Механизму. Я бы хотел вернуть свою кухню, так что не могли бы вы помочь мне уничтожить этих жутких Тортов-Ползунов?
m.anniversary_start_4=Отлично\! Я встречу вас у выхода, как только вы их всех перебьёте. Но будьте осторожны — похоже, они научились использовать праздничные свечи в качестве оружия...
m.another_trace=Ещё один след
m.another_trace_1a=Здравствуйте, {0}, рада сообщить, что моё оборудование снова в строю\! Теперь у меня для вас есть и хорошие, и плохие новости. Хорошая новость\: мне удалось отследить источник того энергетического сигнала. А вот плохая\: источник энергии выявлен в крайне опасном районе Часового Механизма, который Рыцари-Разведчики окрестили «Дворцом Королевского Желе».
m.another_trace_2a=Место столь же странное, как и звучит. Оказывается, у монстров семейства слизней существует настоящая правящая аристократия элитных слизней. Эти «Королевские Желе» — огромные, эгоистичные и раздражительные слизни, обитающие в роскошных дворцах, которые, как мы предполагаем, были самовольно заняты, поскольку мы не верим, что слизни способны возводить строения.
m.another_trace_3a=Энергетический сигнал исходит откуда-то из Дворца Королевского Желе, и нам нужно, чтобы вы провели расследование. Королевские Желе крайне территориальны, поэтому вам, возможно, придётся пробиться сквозь их логово, чтобы достичь цели. Однако будьте настороже — Королевское Желе окружает себя немалой охраной. Вы, вероятно, столкнётесь со значительным сопротивлением при исследовании дворца.
m.another_trace_4a=Удачи, {0}. Обязательно как следует подготовьтесь, прежде чем браться за эту миссию.
m.apocrea_1_1a=Что такое? Ещё одна бедная душа, созревшая для жатвы Апокреи?
m.apocrea_1_2a=Ты, любопытный странник, стоишь в Обсидиановом Нексусе, обители Апокреи. Тебе, вероятно, уже никогда не суждено увидеть солнце.
m.apocrea_1_3a=Апокрея — это воплощение кошмаров\: ужасающий легион потусторонних фантазмов, чьё единственное стремление, по-видимому, — заманивать в ловушки и пожирать души всего живого. \n\nХотя ты можешь отважиться выйти за пределы этого нексуса, ты непременно угодишь в одну из их ловушек по пути.
m.apocrea_1_4a=Апокрея искажает реальность, превращая захваченную среду в западню. В этих западнях они выслеживают всё живое, пожиная души для некой непостижимой цели.
m.apocrea_1_5a=Ты не понимаешь, правда? У тебя просто нет выбора.
m.apocrea_2_1a=Что такое? Ты всё ещё в своём теле. Возможно, ты сможешь нам помочь.
m.apocrea_2_2a=Я — лишь ещё одна душа, скрывающаяся от взора Апокреи. Но я отказываюсь сдаваться. Пока они меня не нашли, я сделаю всё возможное, чтобы спасти хоть одну душу от моей участи.
m.apocrea_2_3a=Скоро ты окажешься в одной из ловушек, расставленных Апокреей. Если ты достаточно силён, чтобы выбраться, возможно, тебе удастся спасти нескольких потерянных душ по пути.
m.apocrea_2_4a=Потерянные души, пойманные Апокреей, прикованы к созданным ею реальностям. Найди потерянные души и освободи их от оков Апокреи.
m.apocrea_2_5a=Освободив их, ты получишь Апокрейский Знак как доказательство своего деяния. Принеси их мне, и мой друг здесь вознаградит тебя особыми сокровищами, что я собрал за время пребывания в этом мире. Эти предметы можно использовать для создания редких и могущественных вещей с помощью того обелиска созидания вон там.
m.apocrea_2_6a=Удачи тебе. Ступай быстро и избегай их хватки.
m.arc_mintut_1=Здравствуйте. Я Вегнер, Главный Гео-Рыцарь Скайларка и руководитель геологических исследований в Часовом Механизме.
m.arc_mintut_2=Во время путешествий по Часовому Механизму вы будете находить пять особых минералов\: кримзонит, лунный камень, валестон, люминит и тёмную материю.
m.arc_mintut_3=На всех уровнях Часового Механизма встречаются залежи руды, и вам нужно атаковать их, чтобы разбить до размеров, которые можно унести. Нести можно только один минерал за раз, но вы можете обменять его, подобрав другой. Ищите самый большой и блестящий — он наиболее ценен.
m.arc_mintut_4=Добравшись до лифта, минерал, который вы несёте, помещается в ваш арсенал для дальнейшего использования. Все члены вашего отряда получают минералы друг друга, так что нет нужды спорить, кому достанется лучший\!
m.arc_mintut_5=Минералы используются для создания пищи спрайтов в Лаборатории. Пища спрайтов крайне важна для развития вашего спрайта, так что хватайте минералы, когда видите их\!
m.arc_mintut_6=Наши геологические исследования продолжаются, так что, возможно, эти странные и могущественные минералы найдут ещё и другое, не менее увлекательное применение.
m.arsenal_knight_1a=Вы можете воспользоваться Arsenal Station за моей спиной, чтобы сменить снаряжение. Спустившись в Часовой Механизм, вы сможете менять экипированное снаряжение только на Arsenal Station вроде этой, так что лучше подготовьтесь заранее\!
m.axes_of_evil=Оси зла
m.becoming_champion=Становление Чемпиона
m.becoming_champion_1a=Рад встрече, {0}, немало времени прошло с тех пор, как мы впервые встретились — вы только прибыли из Спасательного Лагеря. Вы проделали долгий путь с тех пор, поднявшись аж до звания Элитного Защитника. \n\nВы одарённый солдат, {0}. Я не сомневаюсь, что вскоре вы станете Чемпионом среди Спиральных Рыцарей и сыграете решающую роль в разгадке великой тайны Ядра, восстановлении Скайларка и возвращении домой. Вы доказали, что способны противостоять легионам тёмных сил, таящихся под поверхностью.
m.becoming_champion_2a=Я слышал, Спиральная штаб-квартира подготовила для вас миссии, достойные истинного Чемпиона. Но чтобы стать таковым, вам потребуется соответствующее снаряжение. \n\nЯ вверяю вам инструменты, необходимые для того, чтобы стать Чемпионом. С этими рецептами вы сможете создать снаряжение высочайшего класса Спирального Ордена. С ним вы наконец сможете облачиться в доспехи Лазурного Стража, владеть мощью Клинка Левиафана и встретить любую угрозу под защитой Эгиды.
m.becoming_champion_3a=Так используйте их с честью и пусть они оберегают вас от ярости бесчисленных врагов, с которыми вам вскоре предстоит столкнуться. Ядро, которое мы ищем... в нём есть нечто поистине ужасающее. Я знаю, что оно вполне может стать нашим путём домой, но не могу отделаться от ощущения, что мы всё это время думали о нём совершенно неправильно.
m.becoming_champion_4a=Я имею в виду, что Ядро — это не гигантская батарея, питающая этот мир, а скорее оно и весь этот мир представляют собой колоссальную тюрьму, созданную для того, чтобы нечто никогда не смогло покинуть её. \n\nВспомните наши гео-сканы Крейдла прямо перед крушением — они показывают, что он состоит из сотен массивных плит других миров, словно пластины брони. Затем есть Часовой Механизм, самое противоестественное явление, что я когда-либо видел. Целый мир, единственная цель которого, по-видимому, — не дать никому добраться до своего Ядра.
m.becoming_champion_5a=Я обсуждаю это со Спиральной штаб-квартирой уже довольно давно, и они готовы провести дальнейшее расследование. Хотя не думаю, что мне удастся в ближайшее время отговорить их от попыток вскрыть Ядро. Это по-прежнему приоритет номер один. \n\nМогу лишь сказать — будьте осторожны, {0}. Думаю, этот мир припас для нас больше сюрпризов, чем мы подозреваем.
m.best_of_beast=Лучшие из зверей
m.best_of_beast_1a=Здравствуйте, {0}, рад видеть вас в добром здравии. Хотя это обычно не забота Главного Биотехника, я лично запросил возможность проинформировать вас об опасностях, которые поджидают вас в Слое 3 Часового Механизма. Не хотелось бы, чтобы вы погибли из-за дезинформации какого-нибудь младшего Биотехника.
m.best_of_beast_2a=Что ж, давайте приступим. \n\nСлой 3 ближе всего к Ядру, и подобно тому, как предметы высокого уровня реагируют на его мощь, то же происходит и с монстрами. Многие из них обретают новые формы и считаются максимально опасными. Вы должны подготовиться к каждой миссии заблаговременно.
m.best_of_beast_3a=Если вам предстоит столкнуться со зверями и слизнями в Слое 3, знайте — они способны наносить чистый колющий урон. Только лучшее снаряжение с защитой от колющего урона сохранит вам жизнь перед лицом этих могучих колющих хищников. \n\nКак только вы завершите предстоящие миссии, мы побеседуем снова. Удачи, {0}.
m.beyond_axes_of_evil=За пределами Осей зла
m.blades_fallen=Клинки павших
m.breaking_in_recruits=Обкатка новобранцев
m.breaking_in_recruits_1a=Приветствия. Маленький. Ты. Не наступай. На снайпов.
m.breaking_in_recruits_2a=Приветствия. Бери блестяшки. Бери блестяшки.
m.breaking_in_recruits_3a=Снайпы. Купить? Продать?
m.breaking_in_recruits_k1a=Гремлины\!? Я правильно считываю эти данные? Засада\!? Как они смогли обмануть наши сенсоры?
m.breaking_in_recruits_k2a=Это уже не учебная тренировка\! Доставьте тех новобранцев к лифту. Мы эвакуируем их обратно в Хейвен. А вам придётся спуститься ниже и выяснить, кто за всем этим стоит.
m.built_to_destroy=Создано разрушать\!
m.built_to_destroy_1a=«Девятеро видят всё, слышат всё. Подчиняйся Железному Закону.»
m.built_to_destroy_2a=Директивы Багрового Ордена\: \n\n- ДОЛГ каждого гремлина — давать отпор металлическим захватчикам\! \n\n- Каждый гремлин обязан работать над уничтожением Хейвена. Крейдл принадлежит нам\! \n\n- Каждый гремлин обязан хранить ВЕРНОСТЬ Королю Тинкинзару и Багровому Ордену. Железный Закон должен быть исполнен\!
m.built_to_destroy_2b=Передача\: \n\n«Они продолжают наступать и срывать наши планы\! Как они могли обнаружить Проект R? Почему не было предупреждения о нападении?» \n\n«Герекс и его приспешники должны были шпионить за ними, но все они бесследно исчезли, словно трусы.» \n\n«Нарушить Железный Закон — значит бросить вызов Ордену\! Выследите предателя. Герекс ответит за эту неудачу.»
m.chasm_b_rhendon_1a=Похоже, у нас нет выбора, {0}. Эта штуковина не стоит того, чтобы за неё умирать.
m.chasm_b_rhendon_2a=Этот дьявол\! \n\nВсё рушится\! Нам нужно немедленно найти способ потушить этот огонь\!
m.chilled_to_bone=Промёрзший до костей
m.choose_your_sprite=Вечные узы
m.choose_your_sprite_10a=Итак, вы выбрали теневого маскерейта, Боевого Спрайта для тех, кто желает таиться в тенях и поражать врага внезапными атаками? \n\nОднажды выбрав, пути назад не будет\!
m.choose_your_sprite_11a=Поздравляю, {0}\! Вы установили связь со своим Боевым Спрайтом\! Он, без сомнения, станет бесценным спутником в ваших грядущих миссиях. \n\nЕсли у вас возникнут дополнительные вопросы о воспитании вашего нового Боевого Спрайта, обязательно обращайтесь ко мне или к Бискотти здесь, в Лаборатории.
m.choose_your_sprite_12a=Хорошо, просто поговорите со мной снова, когда будете готовы сделать выбор.
m.choose_your_sprite_1a=Приветствую, {0}\! Теперь, когда у меня было достаточно времени для изучения спасённых вами Боевых Спрайтов, я могу дать вам надлежащую оценку каждого из них. \n\nНесмотря на их, скажем так, необычный внешний вид, мы пришли к заключению, что эти «новые» Боевые Спрайты не только пригодны для боя, но, возможно, даже обрели улучшенные способности в результате своей трансформации.
m.choose_your_sprite_2a=Я предоставлю вам описание каждого Боевого Спрайта. В знак признания вашей доблести при спасении этих спрайтов Спиральная штаб-квартира уполномочила вас установить связь с одним из них. Эта связь будет длиться вечно и является серьёзной ответственностью. \n\nПожалуйста, тщательно обдумайте своё решение; пути назад не будет.
m.choose_your_sprite_3a=Доступны три различных Боевых Спрайта. Каждый по-разному отреагировал на энергию, исходящую от этого мира, и каждый предлагает уникальный боевой опыт. \n\nСреди этих спрайтов — огненный дракон, сияющий серафинкс и теневой маскерейт.
m.choose_your_sprite_4a=Дракон — это Боевой Спрайт, воплощающий огненное разрушение. Его умения сосредоточены на прямой атаке\: огненная стрела создаёт взрывной снаряд, огненный барьер окружает рыцаря защитными огненными шарами, а огненная буря порождает мощнейшую волну пламени. \n\nДракон лучше всего подходит бесстрашным рыцарям, предпочитающим лобовой, разрушительный бой.
m.choose_your_sprite_5a=Серафинкс — это Боевой Спрайт, воплощающий защиту и восстановление. Его умения направлены на поддержку рыцарей в бою\: луч света создаёт устойчивый поток святого света, сердечный удар повышает шанс выпадения сердец из монстров, а ангельская аура создаёт световой щит, защищающий рыцаря и членов отряда в его пределах. \n\nСерафинкс лучше всего подходит рыцарям, желающим оберегать свой отряд и оказывать ему помощь.
m.choose_your_sprite_6a=Маскерейт — это Боевой Спрайт, воплощающий обман и ослабление. Его умения сосредоточены на диверсиях\: едкие иглы выпускают ядовитые шипы, взрывающиеся при последующей атаке, теневой плащ позволяет рыцарю стать невидимым для монстров, а колдовской туман позволяет рыцарю наложить на монстров замедленный взрыв урона. \n\nМаскерейт лучше всего подходит рыцарям, желающим таиться в тенях и поражать врага внезапными атаками.
m.choose_your_sprite_7a=Превосходно\! Какого Боевого Спрайта вы выберете своим спутником?
m.choose_your_sprite_8a=Итак, вы выбрали огненного дракона, Боевого Спрайта для тех, кто предпочитает лобовой, разрушительный бой? \n\nОднажды выбрав, пути назад не будет\!
m.choose_your_sprite_9a=Итак, вы выбрали сияющего серафинкса, Боевого Спрайта для тех, кто желает оберегать свой отряд и оказывать ему помощь? \n\nОднажды выбрав, пути назад не будет\!
m.collector_prisoner_1a=Ох, я едва вижу... Спиральная штаб-квартира послала вас на наше спасение?
m.collector_prisoner_2a=Мой спасательный отряд попал в засаду какого-то гигантского механического ужаса. У нас не было ни единого шанса. Как хорошо, что вы появились вовремя, иначе не знаю, выбрались бы мы.
m.collector_prisoner_3a=Думаю, да... мы попробуем выскользнуть, когда сможем.\n\nОх, но будьте осторожны\! То, что нас поймало, всё ещё здесь и охраняет большой тайник наших захваченных Боевых Спрайтов. Если планируете сразиться с этим, берегитесь его смертоносной атаки тараном. Удачной охоты\!
m.cost=СТОИМОСТЬ\:
m.creators_and_created=Создатели и создания
m.creators_and_created_1a=Здравствуйте, {0}, похоже, у вас не возникло особых проблем с текучими ордами и им подобными, что, несомненно, можно приписать хорошему инструктажу об их повадках перед миссией.
m.creators_and_created_2a=Одна огневая мощь доведёт вас лишь до определённого предела, {0}. К примеру, гремлины, без сомнения, сильны сами по себе, хотя бы за счёт одной лишь численности, но эти маленькие пушистые гении решили ещё и укрепить свои силы, создав армию конструктов.
m.creators_and_created_3a=Не все, но большинство из них считаются непосредственно произведёнными по гремлинским чертежам, да. Мы полагаем, что большинство были первоначально сконструированы во время строительства Часового Механизма. Часть из них остаётся под контролем гремлинов, другие вышли из повиновения, а остальные стали чем-то совершенно иным.
m.creators_and_created_4a=У нас было несколько случаев, когда рыцари встречали невраждебных конструктов, которые, по их клятвенным уверениям, вели себя как подлинные разумные существа. Но в это крайне сложно поверить. Гремлины блистательны, но блистательны в том виде прямолинейной инженерии, которая просто доводит дело до конца и не более. Грубая сила. \n\nИскусственная жизнь? Ну, это уже нечто совершенно иное.
m.creators_and_created_5a=Верно. Спиральная штаб-квартира сообщила мне, что в следующий раз вам, вероятно, предстоит столкнуться с ордами гремлинов и конструктов. Имейте в виду, что в Слое 3 эти монстры способны наносить чистый стихийный урон. Непременно экипируйтесь соответствующим образом.
m.crimson_chaos=Багровый хаос
m.crossing_chasm=Через пропасть
m.crossing_chasm_b=Через пропасть
m.crossing_chasm_b_1a=Думали, сможете просто уйти с артефактом? Отдайте его сейчас же, или я подожгу этот фитиль и превращу вас в миллион крохотных тлеющих кусочков\!
m.crossing_chasm_b_2a=Замечательно\! Артефакт я оставлю себе, а вас всё равно сожгу дотла\! \n\nХахаха\!
m.crossing_chasm_b_3a=Что\!? Вы ещё здесь\!? \n\nЭтот артефакт мой\! Жалкие рыцаришки, вам никогда не завладеть его силой\! \n\nЧто ж, придётся уничтожить вас самолично\!
m.crossing_chasm_b_4a=Спасибо, {0}. Я думал, нам конец. \n\nДавайте доставим артефакт в Спиральную штаб-квартиру, пока кто-нибудь ещё не попытается его стащить.
m.crossing_chasm_b_5a=Эй, {0}\! Вижу, вы раздобыли Прото-Бомбу\! Она очень полезна, когда нужно разобраться с группами врагов.
m.crossing_chasm_b_6a=Бомбы особенны тем, что у них нет обычной атаки. Бомбу можно использовать ТОЛЬКО как ЗАРЯЖЕННУЮ АТАКУ, так что не забывайте уворачиваться от монстров во время зарядки\! \n\nМожете опробовать её. Только не забудьте экипировать на Arsenal Station впереди.
m.crossing_chasm_b_7a=Я доставлю артефакт в Лабораторию. Когда будете готовы, вам стоит отправиться в Хейвен и встретиться с остальными. У меня такое чувство, что мы застрянем на этой планете надолго, так что стоит посмотреть, чем мы можем помочь.
m.cryptic_coder=Интриган Развог\: Работай вдали от остальных. Орден не должен никогда узнать, что артефакт у нас. Найди способ запитать его. Принеси его мне. Не предавай меня. Я узнаю. \n\n-Г
m.cryptic_coder_crimson_chaos=Проникнуть на Комплекс. \nЗабрать все чертежи. \nДевятеро молчат, но мы заставим их умолкнуть. \nРыцари преследуют, но мы остановим их. \n\nЛишь Герекс постигает Истину. Лишь Герекс сойдёт вниз. \nДругого быть не может.
m.cryptic_coder_spark_roar=Железный Закон Нарушен\! \nБагровый Орден — Ложь\! \nДевятеро слепы, им не узреть Истину, что таится внизу. \nДевятеро глухи, им не услышать Резонанс, что бьётся в недрах этого мира. \n\nГерекс более не служит одним из Девяти. \nЛишь Герекс зрит и внемлет Истине. Лишь Герекс восторжествует. \nСледуй за Герексом, и ты будешь пощажён.
m.cwt_mintut_1=Это Вегнер, Главный Гео-Рыцарь Скайларка. Я фиксирую высокую концентрацию залежей минералов в вашем районе.
m.cwt_mintut_2=Да, именно\! Во время путешествий по Часовому Механизму вы будете находить пять особых минералов\: кримзонит, лунный камень, валестон, люминит и тёмную материю.
m.cwt_mintut_3=Атакуйте минеральную колонну, чтобы разбить её до переносимого размера. Нести можно только один минерал за раз, но вы можете обменять его, подобрав другой. Ищите самый большой и блестящий — он наиболее ценен.
m.cwt_mintut_4=Добравшись до лифта, минерал, который вы несёте, помещается в ваш арсенал для дальнейшего использования. Все члены вашего отряда получают минералы друг друга, так что нет нужды спорить, кому достанется лучший\!
m.cwt_mintut_5=Минералы используются для создания пищи спрайтов в Лаборатории. Пища спрайтов крайне важна для развития вашего спрайта, так что хватайте минералы, когда видите их\!
m.cwt_mintut_6=Наши геологические исследования продолжаются, так что, возможно, эти странные и могущественные минералы найдут ещё и другое, не менее увлекательное применение.
m.darkest_depths=Мрачнейшие глубины
m.darkest_depths_1a={0}, вы одолели Близнецов Рормулус и спасли Хейвен\! От имени Странников и всех Спиральных Рыцарей в Хейвене — благодарю вас\! Понимаю, почему вас повысили до Защитника, вы истинно заслуживаете такой чести.
m.darkest_depths_2a=Да, он стал для нас чем-то вроде второго дома, не правда ли? Почти как будто мы здесь на своём месте — странное чувство.
m.darkest_depths_3a=Это, скорее, ощущение. Я слышу подобное и от других рыцарей\: чувство, будто мы... принадлежим этому месту, будто крушение произошло не случайно. \n\nНо ведь такого быть не может, верно? В любом случае, я отвлёкся. Вернёмся к миссии\!
m.darkest_depths_4a=Как Защитник, вы теперь можете приступать к миссиям в Слое 3 Часового Механизма. Это глубочайшие и опаснейшие недра Часового Механизма — если спуститься ещё глубже, вы достигнете самого Ядра. \n\nБыть может, если вам удастся зайти так далеко, вы сможете отыскать Альфа-Отряд — я просто не знаю.
m.darkest_depths_5a=Тогда приступим. Теперь, когда вы устранили непосредственную угрозу Хейвену, Спиральная штаб-квартира надеется выйти на след Артефакта. Это будет нелегко. К счастью, я подготовил для вас ряд миссий, которые окажутся неоценимыми для вашего выживания в тёмных глубинах, куда вам предстоит спуститься. Удачи, {0}.
m.darkest_forces=Темнейшие силы
m.darkest_forces_1a={0}, вижу, вы всё ещё держитесь, и более того — получили звание Элитного Защитника. Браво. \n\nЯ проанализировал ваши боевые данные с последней миссии, и результаты весьма интересны. Мехарыцари, в частности, по-видимому, действительно реагируют на ваши атаки, словно импровизируя. Но я пока не могу утверждать наверняка. \n\nВпрочем, это не относится к сегодняшним данным, которые я собираюсь представить.
m.darkest_forces_2a=Странное у вас представление о развлечениях, если это так. Бесы и нежить Слоя 3 — это вам не шутки, по сути, они среди худших тварей, что можно встретить так близко к Ядру. \n\nРуководство дьяволят на этих глубинах, похоже, совершенно из рук вон, что порождает весьма агрессивных дьяволят.
m.darkest_forces_3a=Именно, и теперь они ещё хуже. То же касается и нежити. Вы обнаружите, что воющие гаубицы становятся особенно назойливыми благодаря улучшенной стрельбе и самонаведению. \n\nНаконец, приготовьтесь к тому, что бесовские и нежить-монстры способны наносить чистый теневой урон. Как всегда, подбирайте правильное снаряжение для задания, если хотите прожить достаточно долго, чтобы вновь услышать мой голос.
m.darkest_forces_4a=Да, не могу представить большей трагедии. Удачи, {0}.
m.delved_too_deep=Зарылись слишком глубоко
m.delved_too_deep_1a=Приём, {0}\! Не могу поверить\! Я полностью потеряла ваш сигнал, когда вы вошли в Терминал Ядра. Что там произошло?
m.delved_too_deep_2a=Охотно верю. Похоже, на этот раз вам придётся ввести в курс дела меня\!
m.delved_too_deep_3a=Поразительно, что всё это время мы не знали правды. В смысле, мы давно подозревали, что эта планета — своего рода тюрьма, но кто мог предположить, что этот «Рой» просто ждал, когда кто-нибудь наткнётся на Ядро и освободит его?
m.delved_too_deep_4a=Если то, что сказала Парма, правда, то мы — последний рубеж обороны против Роя. {0}, не стану лукавить — это может изменить всё. Нам необходимо немедленно передать это в Спиральную штаб-квартиру. Я соберу всех и отправлю вам миссию, когда будете готовы.
m.dreams_and_nightmares=Сны и кошмары
m.dreams_and_nightmares_10a=Времени почти нет. Я не могу до вас добраться отсюда, и вам нужно выбраться. Предупредите штаб-квартиру. Предупредите Хейвен\! Если Ядро не удержать запечатанным, Рой вырвется и продолжит пожирать всё и всех.
m.dreams_and_nightmares_11a=Но как же вы и остальные?
m.dreams_and_nightmares_12a=Рой становится всё сильнее, пока Спящий слабеет. Без нас, без всех нас, Рой победит. Когда-то гремлины отвечали за поддержание защитных систем Крейдла. Но у них были свои планы. Теперь мы должны стать защитниками Крейдла. \n\nЭто наша жертва.
m.dreams_and_nightmares_13a=Продолжайте сражаться за правое дело, {0}. Помните то, чему вы научились. Прощайте\!
m.dreams_and_nightmares_1a=Наконец-то подкрепление\! {0}, смотрите\! Ядро открывается\!
m.dreams_and_nightmares_2a=Какая мощь\! Я и представить не мог...\!
m.dreams_and_nightmares_3a=...и она будет выпущена на волю. Вы\! Я сделаю вас её первыми жертвами.
m.dreams_and_nightmares_4a={0}, это почти наверняка ловушка, и я не вправе просить вас идти со мной, но я войду туда. Если есть хоть малейший шанс, что Рулен и другие члены Альфа-Отряда живы, я должна попытаться их найти.
m.dreams_and_nightmares_5a=Что ж, пора снова быть героем. Начнём?
m.dreams_and_nightmares_5b=Герекс ускользнул\! Я потеряла его из виду, когда всё погрузилось во тьму. Это ощущалось так, будто тысячи рук тянули нас прочь. Словно нечто не хотело, чтобы мы следовали за ним.
m.dreams_and_nightmares_5c=Что бы это ни было, мы теперь здесь. Где бы это «здесь» ни находилось. Похоже, наш единственный вариант — посмотреть, куда это ведёт.
m.dreams_and_nightmares_6a=Поразительно... я и не думала, что когда-нибудь увижу ещё одного из нас\! Рада, что вы добрались сюда в целости.
m.dreams_and_nightmares_7a=Парма\! Твой разведчик\! Ты жива\! Где ты\!? Нам нужно вернуть тебя в Хейвен.
m.dreams_and_nightmares_8=Прошу прощения, что не могу появиться лично. Я прячусь в безопасном месте. Я знала, что не успею добраться вовремя, когда заметила ваш сигнал. К счастью, мне удалось раздобыть для вас выход.
m.dreams_and_nightmares_8a=Гранц он... он пал, защищая нас от Роя. Он стоял твёрдо, даже когда остальные были вынуждены бежать. Я никогда не забуду, как он был храбр.
m.dreams_and_nightmares_9a=Остальные из нас думали, что нам не выжить. Но потом... потом свет окутал нас, и мы оказались в безопасности. Мы стали называть его Спящим. Мы не уверены, что он такое, но ему нужна наша помощь. Этот мир был создан для его защиты, но каким-то образом Рой прорвался сквозь Ядро и с тех пор питается его энергией, разрастаясь подобно пиявке.
m.dreams_and_nightmares_9b=Евклид добровольно вызвался помочь Спящему. Я уверена, он где-то здесь, сражается с Роем даже пока мы говорим. Что касается Рулена... Вэлин, мне жаль. Он исчез вскоре после решения Евклида. С тех пор мне не удалось его найти.
m.elemental_my_dear=Элементарно, мой дорогой
m.elemental_my_dear_1a=Снова здравствуйте, {0}. Спиральная штаб-квартира сообщила мне, что вы готовы узнать о монстрах, наносящих стихийный урон, верно?
m.elemental_my_dear_2a=Отлично, тогда «понеслась», как говорится. Стихийный урон, как правило, вызывается энергетическими атаками, включающими всё — от фотонного лазерного огня до манипуляций оккультной энергией.
m.elemental_my_dear_3a=Магия? Что? Нет, я говорю о психоэнергетических манипуляциях, постарайтесь не отставать. В любом случае, стихийный урон наносят монстры семейств конструктов и гремлинов. Кроме того, конструкты сами уязвимы к стихийному урону, а гремлины — к теневому. Запомните это. \n\nИтак, вам нужно что-нибудь ещё?
m.elemental_my_dear_4a=Рад помочь. Всего доброго.
m.elig_not=Вы не допущены к этой миссии.
m.elig_ok=Вы допущены к этой миссии.
m.elig_ok_replay=Вы допущены к повторному прохождению этой миссии.
m.elig_unlock=Вы должны разблокировать эту Миссию-Дополнение.
m.empty=Загрузка актуальных избранных предметов
m.ending_in_fire=Конец в пламени
m.ending_in_fire_1a=Здравствуйте, {0}, и поздравляю с получением звания Чемпиона. Позвольте мне сказать, что за мой опыт работы с вами вы истинно заслуживаете такого титула. Именно благодаря вам столь многие рыцари благополучно вернулись на поверхность, и мы узнали так много о Часовом Механизме.
m.ending_in_fire_2a=С такими темпами, вполне возможно, {0}\! Хотя, судя по новым разведданным, это будет нелегко.
m.ending_in_fire_3a=Мы думали, что ситуация становится довольно предсказуемой, даже на тех глубинах, которые вы исследовали. Ядро было на виду. Но теперь некая массивная аномалия негативной энергии появилась над Ядром, блокируя к нему доступ. Рыцари-Разведчики сообщают, что вблизи неё видны только пламя, бесконечное пламя. \n\nМы пока не знаем, что это, но отряды, находившиеся на той глубине, уже пропали без вести. Это дурные вести.
m.ending_in_fire_4a=Нам нужно, чтобы вы исследовали окружающие уровни и собрали любые разведданные. Можете начать с какого-то совитского замка, недавно всплывшего вблизи этой аномалии.
m.exp_mission=Миссия-Дополнение
m.exp_mission_2=Миссия-Дополнение 2
m.exp_mission_3=Миссия-Дополнение 3
m.expansion_available=Доступно в Энергетическом Складе
m.expansion_cost=СТОИМОСТЬ\: {0} Энергии
m.expansion_purchase_info=Приобретя Дополнение, вы разблокируете входящие в него миссии для неограниченного прохождения. \n\nРазблокировка Дополнения действует для всех рыцарей на аккаунте. \n\nТолько игроки, разблокировавшие Миссию-Дополнение, могут присоединиться к ней. \n\nНаграды за Миссии-Дополнения нельзя продать, выбросить или обменять.
m.explosive_plot=Взрывной заговор
m.explosive_plot_1a=Поздравляю, {0}\! Элитный Рыцарь, а\? Ого, вы, должно быть, гордитесь\!
m.explosive_plot_2a=Ох, {0}, я просто делаю свою работу. И кстати о работе — у меня есть задание для вас\!
m.explosive_plot_3a=Наши последние разведданные от Рыцарей-Разведчиков свидетельствуют о том, что гремлины замышляют нечто грандиозное. Мы полагаем, что они разрабатывают некое оружие под кодовым названием «Проект R», нацеленное на сам Хейвен. Спиральная штаб-квартира и сами Странники просят вас расследовать это дело, учитывая вашу отличную работу во Дворце Королевского Желе.
m.explosive_plot_4a=Да, я чувствую то же самое. Мы обязаны им положить конец этой гремлинской угрозе как можно скорее. \n\nЯ подготовила для вас несколько миссий, которые приведут вас в места, где гремлины, похоже, собирают ресурсы для Проекта R. Ваш инструктаж должен всё объяснить.
m.explosive_plot_5a=Тем временем мы проведём анализ того странного устройства, что вы нашли во Дворце Королевского Желе. Если оно связано с Артефактом, мы это скоро выясним\! \n\nУдачи, {0}.
m.eye_of_needle=Игольное ушко
m.eye_of_needle_1a={0}, рада, что вы вышли на связь — у меня для вас кое-что важное.
m.eye_of_needle_2a=Та масса негативной энергии, которую мы исследовали, является частью древнего королевства под названием Альмир — того самого, что описано в найденном вами совитском фолианте\!
m.eye_of_needle_3a=Именно\! Так какого же чёрта оно делает в Часовом Механизме? Это просто не укладывается в голове. \n\nИтак, если мы принимаем на веру, что потерянное королевство из прошлого каким-то образом оказалось в массивном механическом мире в наши дни, остаётся вопрос — почему?
m.eye_of_needle_4a=Всё это слишком уж удобно складывается. Но действительно ли гремлины обладают подобной силой? Я подозреваю нечто большее, чем то, что способна сотворить даже их инженерия. \n\nКак бы то ни было, этот Альмир — он уже давно не королевство. Всё, что осталось — великая цитадель, по-видимому, объятая нескончаемым пламенем, которую Спиральная штаб-квартира стала называть «Огнештормовая Цитадель». Насколько мы можем судить, всё это место кишит нежитью и укреплено как крепость.
m.eye_of_needle_5a=Похоже на то. И это место — оно просто источает зло, это почти неописуемо. Оно даже начинает влиять на окружающие уровни — повсюду вспыхивают пожары. \n\nВы один из лучших наших бойцов, {0}, и если кто и способен провести отряд через цитадель, так это вы. Но даже добраться до неё будет нелегко. Нам нужно потушить несколько пожаров и собрать ещё немного разведданных, прежде чем штурмовать ворота.
m.eye_of_needle_6a=Без сомнения. Давайте начнём с тушения пожаров, а затем посмотрим, как подступиться к цитадели. Учитывая противодействие, шанс — один на миллион. \n\nУдачи, {0}.
m.faith_armor=Вера в доспехи
m.first_contact=Первый контакт
m.first_contact_1a=Приветствую, {0}, это Агент Разведки Кора, подтверждаю ваш контакт со Спиральной штаб-квартирой. Я буду вашим основным связующим звеном со Спиральной штаб-квартирой на протяжении всего вашего пребывания здесь, на Крейдле, и буду снабжать вас разведданными для многочисленных опасных миссий, что ждут вас впереди. \n\nМои данные о ваших тренировочных результатах на Скайларке свидетельствуют, что вы хорошо подготовлены к тому, что грядёт. С нетерпением жду нашего сотрудничества.
m.first_contact_2a=Вы рвётесь в бой — это хорошо. Ваша текущая миссия — добраться до города Хейвен, где Спиральная штаб-квартира организовала базу. Уделите нужное время в Спасательном Лагере для подготовки к предстоящему путешествию. \n\nВоспользуйтесь услугами странствующих торговцев, а также знаниями других рыцарей в лагере, чтобы научиться выживать в этом новом мире. Я свяжусь с вами снова, когда вы доберётесь до Хейвена. \n\nУдачи.
m.first_contact_b=Первый контакт
m.first_contact_b_1a=Это Агент Разведки Кора из Спиральной штаб-квартиры\! Мы приняли сигнал бедствия с ваших координат, вы меня слышите?
m.first_contact_b_2a=Приятно познакомиться, {0}. Какова ваша ситуация?
m.first_contact_b_3a=Ого, похоже, у вас уже было нешуточное приключение, {0}\! Спиральная штаб-квартира определённо заинтересуется тем артефактом, что вы добыли. Удивительно, что вам удалось сразиться с гремлином в Часовом Механизме и выжить.
m.first_contact_b_4a=Похоже, мне нужно ввести вас в курс дела. Мы потерпели крушение на планете, известной как «Крейдл». Крейдл — удивительный мир, вся внутренность которого под поверхностью представляет собой непрестанно меняющийся механический комплекс, известный как «Часовой Механизм». \n\nЧасовой Механизм, по-видимому, построен «гремлинами» — пушистой расой злонамеренных монстров, которые не слишком обрадовались нашему присутствию.
m.first_contact_b_5a=Мы обнаружили поселение под названием «Хейвен» и организовали там базу операций. Местные жители обеспечили нас пищей, кровом и энергией. Это не Исора, но сойдёт за дом пока что. \n\nЯ определила ваше местоположение. К сожалению, чтобы достичь Хейвена, вам потребуется пересечь массивную пропасть. Возможно, теперь, когда в вашем лагере есть энергия, где-то найдётся лифт, ведущий в Часовой Механизм. Так вы сможете добраться до нас.
m.first_contact_b_6a=Из того, что я слышала, если кто и справится, так это вы, {0}\! Удачи\!
m.first_mission=Образец первой миссии
m.from_below=Оно поднялось из глубин
m.frostifur_fandango=Фандангу морозошкуров
m.ghost_machine_1a=Слушайте, Рейнджеры\! Спиральная штаб-квартира получила весьма загадочный сигнал бедствия из некоего совершенно неизвестного объекта глубоко в Часовом Механизме. \n\nКак я вижу ситуацию, мы собираемся нырнуть головой вперёд либо в опасную спасательную миссию, либо в ловушку. В любом случае, средства для разрешения ситуации находятся прямо сейчас в вашем арсенале. Так что вооружайтесь и будьте готовы к бою. \n\nВперёд, Рейнджеры\!
m.ghost_machine_2a=Что здесь произошло? Эти останки выглядят столетней давности...
m.ghost_machine_2b=Не понимаю, сигнал бедствия исходил отсюда... но не может же это быть, так ведь?
m.ghost_machine_mon_1a=помогите нам
m.ghost_machine_mon_1b=СИТУАЦИЯ РАЗРЕШЕНА. ПОЖАЛУЙСТА, ПОКИНЬТЕ ОБЪЕКТ.
m.ghost_machine_mon_2a=они убьют нас они убьют вас
m.ghost_machine_mon_2b=ОНИ УБЬЮТ НАС ОНИ УБЬЮТ ВАС.
m.ghost_machine_mon_3a=впереди они ждут вас в засаде
m.ghost_machine_mon_3b=МЕДИКАМЕНТЫ ДОСТУПНЫ ЗДЕСЬ.
m.ghost_machine_mon_4a=не сдерживайтесь
m.ghost_machine_mon_4b=МЫ НЕ БУДЕМ СДЕРЖИВАТЬСЯ.
m.go_shopping=Идём за покупками\!
m.go_shopping_1a=Добро пожаловать на Базар Хейвена\! Рада познакомиться, {0}, меня зовут Бешамель. Поскольку я работаю здесь, на Базаре, Спиральная штаб-квартира поручила мне проводить экскурсии для новоприбывших по этому великолепному центру торговли и рассказать обо всём, что он предлагает. \n\nТак что давайте совершим небольшую экскурсию, хорошо? Старайтесь не отставать, я хожу быстро.
m.go_shopping_2a=Странники, вроде Квиллиона здесь, продают вам оружие и доспехи. Каждый из них специализируется на определённом виде предметов, так что поговорите с ними и узнайте, что у них в ассортименте. Они не слишком разговорчивы, зато каждый день у них свежий товар\! \n\nТолько убедитесь, что вы достигли нужного звания, чтобы экипировать предмет\!
m.go_shopping_3a=Рада, что спросили — конечно, есть\! Пойдёмте к Вателю.
m.go_shopping_4a=Ватель здесь предложит вам выбор рецептов, а также персональные красители и другие товары.
m.go_shopping_5a=Совершенно верно, вы можете приобретать рецепты и материалы, чтобы создавать оружие и снаряжение на алхимических станциях. Пойдёмте, я покажу вам одну.
m.go_shopping_6a=Перед нами — алхимическая станция, с которой вы, несомненно, близко познакомитесь, улучшая свой арсенал. Но на этом пока не стоит слишком заострять внимание, поскольку Спиральная штаб-квартира, вероятно, даст вам миссию позже, где всё подробно объяснят. \n\nЧто ж, на этом первая экскурсия завершена. Хотите, чтобы я повторила всё ещё раз, или вы уже разобрались?
m.go_shopping_7a=Без проблем, время у меня есть. Начнём сначала.
m.go_shopping_7b=Замечательно\! Рада, что помогла вам освоиться. Удачи вам, {0}\!
m.go_shopping_b=Неприятности на Базаре
m.go_shopping_b_1a=Ух, как хорошо, что вы подоспели. Эти противные гремлины собирались всё тут разгромить\! Базару бы пришёл конец\!\n\nАх да, где мои манеры? Меня зовут Тайлен, приятно познакомиться, {0}.
m.go_shopping_b_2a=Теперь да. Я как раз шёл на базар доставить припасы, когда меня подстерегли эти гремлины. Я думал, они из Эмберлайта, колонии изгнанных гремлинов, но, похоже, я ошибся. \n\nНа всякий случай, не поможете ли доставить эти товары на базар?
m.go_shopping_b_3a=Уф, с вашей помощью это было куда быстрее, {0}. Послушайте, если вам когда-нибудь понадобится экскурсия по базару, просто загляните ко мне. Я могу рассказать всё, что вам нужно знать о магазинах и услугах здесь. \n\nОсмотритесь\! Уверен, вы найдёте много интересного. Ещё раз спасибо\!
m.great_escape=Великий побег
m.great_escape_1a=Сюрприз\! Похоже, вы клюнули на наживку. Это хорошо, ведь мне нужны подопытные для моего последнего изобретения.
m.great_escape_2a=Узрите\! Искрострел 9000 Делюкс\! Триумф гремлинской инженерии\!
m.great_escape_3a=Одного в прошлый раз было явно недостаточно... так что теперь их два\! ДВА\! Гениально\!
m.great_escape_4a=Ха\! Вам ни за что до меня не добраться в моей «Комнате Неуязвимости»\! Вы навечно останетесь в той диспетчерской\! ...Хм, подождите. Кажется, я кое-что упустил...
m.guardians_of_cradle=Хранители Крейдла
m.guardians_of_cradle_10a=(Впервые за всё время вашего знакомства Ган молчит. Он, по-видимому, очень тщательно обдумывает ваши находки.)
m.guardians_of_cradle_11a=То немногое, что мы извлекли из Терминала Ядра, поставило в тупик всех до единого Гео-Рыцарей, Биотехников и Техно-Рыцарей. Мы будем анализировать эти данные ещё очень долго.
m.guardians_of_cradle_1a=Приветствую, Авангард {0}. Кора сказала, что у вас есть новости об Альфа-Отряде. Прошу, доложите.
m.guardians_of_cradle_2a=Выходит, мы чудом избежали ужасной катастрофы. Если бы мы вскрыли Ядро и выпустили Рой, весь Крейдл мог быть уничтожен. Возможно, даже вся вселенная\!
m.guardians_of_cradle_3a=Жертва Альфа-Отряда не будет напрасной. Я немедленно прикажу нашим силам приступить к специальным Оперативным Миссиям по всему Крейдлу. Если есть силы, пытающиеся освободить Рой, мы должны их остановить.
m.guardians_of_cradle_4a={0}, вы уже сделали так много для всех нас, но теперь я должен попросить вас принести ещё одну жертву. Возможно, нам никогда не удастся вернуться домой, на Исору, но прямо сейчас Крейдл нуждается в нас. Я хотел бы, чтобы вы возглавили наши Операции на Крейдле.
m.guardians_of_cradle_5a=Очень хорошо, {0}. Вы найдёте новый набор миссий в разделе Операций. Эти новые миссии будут сгруппированы по их общей задаче, и их можно выполнять параллельно. Это обеспечит вам максимальную гибкость для реагирования на каждую новую угрозу по мере её возникновения. Прощайте, {0}, «Хранитель Крейдла».
m.guardians_of_cradle_6a=Приветствую, Авангард. Впереди нелёгкий путь, но я уверен, что мы справимся.
m.guardians_of_cradle_7a=Не знаю, стало ли мне легче или тяжелей после того, как мы узнали, что случилось со всеми в Ядре. Бедный Гранц... Парма... Евклид... Рулен...
m.guardians_of_cradle_8a=Что ж, я не стану бесчестить их, сдавшись сейчас. В конце концов, мы прошли такой долгий путь. «Пора снова быть героем\!» Верно, {0}?
m.guardians_of_cradle_9a=Ну и осиное гнездо мы разворошили на этот раз, а, {0}? Напоминает мне, как мы схлестнулись с осадными флотилиями Морай над Исорой. Тоже была ставка ва-банк. Нисколько не удивлён, что мы снова единственное, что стоит между нами и полным уничтожением.
m.hall_of_heroes_0=Зал Героев
m.hall_of_heroes_0_1a=Рад встрече, {0}. Это Зал Героев, где опытные рыцари предлагают свои услуги членам нашего ордена, достигшим звания Солдата или выше. \n\nВыполняя новые миссии, я уверен, что однажды вы встанете в наши ряды.
m.hall_of_heroes_1=Зал Героев
m.hall_of_heroes_1_1a=Рад встрече, {0}. Я Лейтенант Баррус, Хранитель Зала Героев. \n\nВы здесь потому, что Спиральная штаб-квартира отметила вас как потенциального Авангарда Спиральных Рыцарей. Зал Героев теперь в вашем распоряжении. По мере продвижения в звании вы будете получать новые миссии и доступ к рецептам от рыцарей-ветеранов в этом зале.
m.hall_of_heroes_1_2a=Да, для доступа к более глубоким стратам Часового Механизма вам необходимо сначала получить Звёздную Сертификацию. Для этого явитесь ко мне, имея экипированные доспехи, шлем, щит и хотя бы одно оружие определённого звёздного уровня или выше.
m.hall_of_heroes_1_3a=Поздравляю, {0}, вы соответствуете необходимым требованиям и получаете 2-Звёздочную Сертификацию. Воспользуйтесь лифтом за моей спиной, чтобы завершить миссию.
m.hall_of_heroes_1_3b=Простите, {0}, но вы пока не соответствуете необходимым требованиям. Явитесь ко мне снова, когда на вас будут экипированы броня, шлем, щит и оружие 2-звёздочного уровня или выше.
m.hall_of_heroes_1_3c=Пожалуйста, воспользуйтесь лифтом за моей спиной, чтобы завершить миссию.
m.hall_of_heroes_1_4=С возвращением в Зал Героев, {0}. Пожалуйста, поговорите с героическими рыцарями, которых вы видите перед собой, чтобы получить доступ к их оружию и снаряжению.
m.hall_of_heroes_2=Зал Героев
m.hall_of_heroes_2_2a=Рад встрече, {0}. Рад видеть вас вновь. \n\nИтак, {0}, для 3-Звёздочной Сертификации на вас должны быть экипированы броня, шлем, щит и оружие 3-звёздочного уровня или выше.
m.hall_of_heroes_2_3a=Поздравляю, {0}, вы соответствуете необходимым требованиям и получаете 3-Звёздочную Сертификацию. Воспользуйтесь лифтом за моей спиной, чтобы завершить миссию.
