b.p_halloween_r9=Каждый год «Странники Хейвена» воздают дань уважения своеобразному духу, известному как «Тыквенный король», чтобы обеспечить богатый осенний урожай. Этот озорной призрак с удовольствием разыгрывает свою публику, но тут же вознаграждает её вкусными конфетами за пережитые приключения. \n\nОтпразднуйте Праздник темного урожая и помогите «Странникам», найдя Тыквенного короля и воздав ему дань уважения.  По пути вы наверняка соберете конфеты, так что загляните на городскую площадь Хейвена и обменяйте их на призы!
b.p_heart_of_ice_r4=Предупреждение\: Это опасная миссия\! \n\nДесна и ее разведчики — элитная команда, которой поручено добыть разведданные с самых опасных уровней Часового механизма.  Присоединение к ним может принести большие награды, но это гарантированно будет опасным путешествием\! \n\nШтаб-квартира «Спирали» зафиксировала внезапное изменение климата, исходящее из глубин Часового механизма. Необычные снежные бури и метели начали проноситься по глубинам, по-видимому, исходя из негостеприимного, зловещего города, известного как «Аму-Сол».  Разведчики были отправлены, чтобы проникнуть в Аму-Сол и обнаружить источник этих ледяных бурь.
b.p_heart_of_ice_r6=Предупреждение\: это опасная миссия! \n\nДесна и её разведывательные рейнджеры — элитный отряд, которому поручено добыть разведданные на самых опасных уровнях «Часового механизма». Присоединение к ним может принести огромные награды, но это, без сомнения, будет смертельно опасным путешествием! \n\nШтаб-квартира «Спирали» зафиксировала резкое изменение климата, исходящее из самых недр «Часового механизма». Необычные снежные бури и метели начали проноситься по глубинам, по-видимому, исходя из негостеприимного, зловещего города, известного как «Аму-Сол».  Разведчики были отправлены, чтобы проникнуть в Аму-Сол и обнаружить источник этих ледяных бурь.
