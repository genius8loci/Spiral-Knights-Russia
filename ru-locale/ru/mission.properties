b.remove=Удалить расширение
b.reporting_duty=Лейтенант Ферон отвечает за надзор за добычей «Часовых механизмов» в «Хейвен Аркаде».  Отчитайтесь перед ним и узнайте о ситуации в Хейвене и о миссии штаб-квартиры Spiral по достижению Ядра Колыбели.
b.rescues_and_recycling=«Зона демонтажа» — это строительная площадка гремлинов, где они, по-видимому, разбирают существующие уровни и используют их компоненты для создания новых. Их способность быстро конструировать уровни и механизмы просто поразительна, уступая лишь их враждебности по отношению к любому, кто попадается им на пути. \n\nРазведчики-рыцари обнаружили, что один отряд, возможно, присмотрелся к их инженерным чудесам слишком пристально, поскольку сейчас его удерживают в плену на одной из площадок разборки около 10-й глубины.  Неясно, что гремлины приготовили для этих рыцарей или просто планируют оставить их погибать вместе с остальной частью уровня, который они демонтируют.
b.return_of_ur=Разведывательный отряд сообщил, что в глубинах дьявольского города девилиты пытаются вызвать легион могущественных троянских воинов.  Судя по информации из внутренней записки девилитов, троянцы известны как «Легион Ура» и, как говорят, когда-то насчитывали тысячи.  Странно, но в записке указывалось, что Легион Ура был запечатан в Подземном мире и что для его возвращения потребуется альтернативный подход. \n\nКакими бы средствами ни намеревались использовать девилиты, чтобы привести несколько тысяч троянцев в Часовой механизм, их необходимо остановить.  Проникните в их город и остановите армию демонов, пока она не стала непобедимой!
b.rise_or_fall=Проникнуть в Дворец Королевского Мёда и сразиться с полчищами слизней, служащих великому Королевскому Мёду, будет нелегкой задачей.  Настоятельно рекомендуется найти одну из «Боевых арен» в Часовых механизмах и проверить, готова ли ваша экипировка к сражению с таким количеством диких слизней. \n\nШтаб-квартира Spiral обнаружила одну из этих загадочных арен, которая, похоже, заполнена всевозможными липкими гладиаторами, жаждущими сражения.  Устройте им достойный бой!
b.rotting_metropolis=Похоже, что эти генераторы слизи существуют гораздо дольше, чем мы думали, просачивая свои отвратительные токсины на все уровни, которые находятся рядом с ними. \n\nСовременный город, очень похожий на те, где обитают дьяволиты, кажется, заражен этими токсинами и, вероятно, был заброшен как дьяволитами, так и гремлинами в результате.  Теперь это место преследует легион слизи и нежити, гниющих в ядах, витающих в воздухе.  Отряд, пытавшийся пройти через город, пропал без вести.  Учитывая, что сам воздух токсичен, необходимо, чтобы опытная команда проникла в этот город и спасла отряд.  В противном случае у них почти не останется надежды.
b.scarlet_fortress=В отличие от Островов Авроры, рыцари-разведчики обнаружили ещё один геоглобус, в котором находятся руины, по-видимому, древнего замка. Этот разрушающийся замок, получивший название «Алая крепость», также является пристанищем для полчища беспокойных духов. Будьте осторожны, исследуя его извилистые ходы.
b.search=Поиск
b.search_continues=Лейтенант Ваэлин хотела бы поблагодарить вас за то, что вы открыли путь к Ядру и позволили ей организовать исследовательскую базу на месте.
b.securing_camp=Прежде чем вы начнете исследовать кишащие монстрами глубины под Спасательным лагерем, Рендон хотел бы ввести вас в курс дела о выполнении миссий для штаба Спирали.
b.securing_camp_b=Прежде чем вы отправитесь исследовать кишащие монстрами глубины под Спасательным лагерем, Рендон хочет, чтобы вы помогли ему уничтожить некоторых из монстров, напавших на Спасательный лагерь прошлой ночью.
b.sewer_stash=Похоже, что фабрика боеприпасов «Железный коготь» — не единственное место, где гремлины хранят мощное оружие.  Разведданные указывают на то, что после изготовления оружие вывозится с завода «Железный коготь» и хранится в секретных тайниках по всему Часовому механизму. \n\nОдин из таких тайников был обнаружен в системе канализации Часового механизма.  Добираться до него, скорее всего, будет нелегко, но уничтожение оружия, хранящегося в этой канализации, может привести к значительному сокращению числа жертв в будущем.
b.shadow_beast=Штаб-квартира «Спираль» обнаружила разведывательный модуль, оставленный отрядом «Альфа» где-то в Лесах Сумерек.  Ваша задача — найти и вернуть этот модуль. \n\nЛеса Сумерек — пристанище стай диких зверей, которые в прошлом не раз становились смертельной угрозой для отрядов. Именно поэтому Технические рыцари разместили по всей территории «Звериные колокола». Удар по ним должен оглушить всех зверей, попавших в зону действия создаваемой ими звуковой волны. \n\nИмейте в виду, что разведывательные рыцари сообщили о присутствии в этом лесу ужасного зверя, подобного которому мы еще не видели.  Известный как «Снарболакс», он выглядит как теневая масса клыков и когтей и, похоже, полностью неуязвим для нашего оружия.  Если вы столкнетесь с ним, постарайтесь как можно быстрее найти способ спастись.
b.shadow_knows=Биотехник Хан предположил, что, учитывая ваше недавнее повышение, вы готовы узнать о злобных монстрах в Часовых механизмах, наносящих урон тенью. Свяжитесь с ним через комлинк и посмотрите, что он скажет.
b.shadowplay=Даже после того, как лорд Ванадук потерпел поражение от ваших рук, Цитадель Огненного Шторма продолжает гореть проклятыми пламенами. Хотя эльфы природы неуклонно добиваются успехов в борьбе с огнем, недавно что-то или кто-то вызвал резкое усиление его разрушительной силы. Штаб-квартира «Спирали» просит вас собрать отряд лучших рыцарей и вернуться к рушащимся руинам Цитадели Огненного Шторма, чтобы обнаружить источник беспорядков.
b.shocking_sentient_sentries=Разведчики-рыцари обнаружили секретный оружейный склад, который, судя по имеющейся у нас информации, может принадлежать высокопоставленному гремлину из «Алого Ордена». Он надежно укреплён небольшой армией электрифицированных конструктов, которые, без сомнения, запрограммированы на защиту объекта любой ценой. \n\nХотя пока неясно, действительно ли этот склад оружия принадлежит гремлину из «Багрового Ордена», проникнуть туда и обезвредить его все равно стоит. \n\nПеред выходом на задание рекомендуется экипироваться снаряжением, защищающим от элементального урона и ударов током.
b.shopping_again=Бешамель уже провел для вас экскурсию по базару Хейвена, в ходе которой показал, где можно приобрести новое оружие, доспехи и рецепты.  Теперь пришло время снова навестить его и узнать о некоторых более продвинутых услугах, которые предлагает базар. \n\nВы посетите «Панч и Вайс», «Бринкс» и даже заглянете в собственный магазин Бешамеля\!
b.shopping_again_b=Теперь пришло время узнать о некоторых более продвинутых услугах, которые предлагает Базар.  Следуйте за рыцарем Бешамелем и посетите Панча и Вайза, Бринкса и даже собственный магазин Бешамеля\!
b.silent_legion=Рыцарь-хранитель Аркус был одним из лучших воинов, служивших «Спиральным рыцарям», вплоть до периода, наступившего вскоре после катастрофы. Будучи одним из первых, кто отправился на поиски отряда «Альфа», Аркус потерял свой собственный отряд в жестокой битве с ордой пылевых зомби.  С тех пор Аркус винит себя в их гибели, говоря, что он предал Клятву Стража, обещавшую защитить его отряд. \n\nТеперь Аркус путешествует по Часовым Механизмам в одиночку, не рискуя потерять еще один отряд, и, как мы полагаем, пытаясь каким-то образом найти тот отряд, который он когда-то потерял.  Поскольку эти экспедиции начали казаться самоубийственными, штаб-квартира Спирали отдала ему прямой приказ прекратить их. \n\nАркус проигнорировал эти приказы, углубился в Часовые механизмы и не вернулся.  Не желая потерять последнего члена своего отряда, штаб-квартира Спирали просит вас отправиться за ним к его последнему известному местонахождению — какой-то загадочной статуе на глубине 26.
b.skies_under_cradle=Часовой механизм — это увлекательный подземный комплекс, в котором целые миры заключены в колоссальных железных геоглобусах.  Один из них, обнаруженный разведчиками-рыцарями, известен как «Острова Авроры» — серия загадочных парящих островов под искусственным небом. \n\nКак новоиспеченный ученик, вы теперь имеете допуск к исследованию руин на этих островах и сбору любых полезных материалов, которые сможете обнаружить.
b.sovereign_slime=Считается, что источник странного энергетического сигнала находится где-то в Королевском дворце Слизи, резиденции одного из представителей слизистой аристократии — Королевской Слизи. \n\nНе стоит недооценивать могущество этих суверенных слизей.  Если вам предстоит столкнуться с этим вспыльчивым аристократом, вам будет разумно вооружиться соответствующим снаряжением и заручиться поддержкой полного отряда опытных рыцарей. \n\nНастоятельно рекомендуется экипироваться снаряжением, устойчивым к проникающему урону, и оружием, наносящим урон тенью, прежде чем отправляться в Королевский дворец Слизи!
b.spark_roar=Обнаружена исключительно высокая концентрация конструктов, охраняющих участок Часового механизма, который, по подозрениям штаба Спирали, может быть укрытием Багрового Ордена. В отличие от других монстров, конструкты, похоже, не способны к самовоспроизводству, а это значит, что каждый уничтоженный конструкт — это необратимое сокращение их численности. Это будет полезной задачей независимо от того, имеет ли к ней отношение Багровый Орден или нет. \n\nШтаб-квартира Спирали просит вас проникнуть на эти уровни, исследовать возможное укрытие и устранить угрозу со стороны конструктов. \n\nНастоятельно рекомендуется экипироваться снаряжением с сопротивлением стихиям и оружием, наносящим урон стихиями и тенью!
b.strength_unity=Что-то взбудоражило стаю чудовищ на Островах Авроры, и они напали на исследовательскую группу Гео-рыцарей. Оказавшись в безвыходном положении, команда послала сигнал бедствия, и штаб-квартира «Спирали» поручила спасти их именно вам. \n\nБлагодаря сплоченности Гео-рыцари продержались до сих пор, но их время на исходе. Соберите команду и сразитесь с чудовищами, которые хотят пожрать ваших товарищей-рыцарей!
b.target_acquired=Проанализировав чертежи, которые вы добыли из испытательной лаборатории гремлинов, штаб-квартира «Спирали» теперь знает, что представляет собой «Проект R», а также его местонахождение на складе боеприпасов гремлинов.  Штаб-квартира «Спирали» просит вас проникнуть на этот объект и уничтожить «Проект R», пока его не применили против Хейвена.  Обратитесь к агенту разведки Коре за полной информацией.
b.terminal_meltdown=Привлеченные к Цитадели Огненного Шторма, орды огненных слизи и чудовищных монстров наводнили близлежащий топливный склад, подвергая опасности как сам склад, так и наш доступ к цитадели. Если эти монстры разнесут огонь на бочки с топливом, все это место пойдет с огнем. \n\nШтаб-квартира Спирали нуждается в том, чтобы вы проникли на склад и потушили пожар, пока не истекло время и не произошла взрывная катастрофа\!
b.the_collector=Поступают разрозненные сообщения о огромном механическом существе, которое мы назвали «Коллекционером». Оно перехватывает наших рыцарей и захватывает в плен как их самих, так и эльфов, за которыми они охотились, а затем заключает их в хорошо охраняемый комплекс, расположенный глубоко в недрах Часового механизма. Вооружившись своим новым эльфом, вы должны найти этого «Коллекционера» и спасти рыцарей и эльфов, которых он взял в плен.
b.the_flickering_flame=После вашей победы в Цитадели Огненного Шторма эльфы-природы Великой Матери Духов наконец-то начали добиваться успехов в борьбе с проклятыми пламенами, охватившими обугленные остатки Альмира. Недавнее вспыхнувшее пламя затормозило этот прогресс, намекая на какую-то затаившуюся злую силу, которая продолжает подпитывать огонь. Свяжитесь с агентом разведки Корой для получения подробностей.
b.the_gauntlet=На вашем пути к Цитадели Огненного Шторма стоит последняя битва. Считается, что этот безжалостный испытательный путь был придуман самим лордом Ванадуком. Он кишит всевозможными темными существами и заканчивается кошмарной боевой ареной, которую необходимо покорить, чтобы получить доступ к воротам Цитадели Огненного Шторма. \n\nЭта миссия потребует от вас всего, на что вы способны, а также полного арсенала мощного оружия и снаряжения.  Если лорд Ванадук испытывает вас, дайте ему тот бой, которого он просит, и покажите ему, на что способен настоящий чемпион!
b.time_enough_at_last=Рыцарь по имени Эджер пропал без вести во время исследования Алой крепости.  Учитывая, что этот разрушающийся замок кишит привидениями и желеобразными кубиками, его товарищи по отряду опасаются за его безопасность и попросили более опытного рыцаря, такого как ты, провести расследование. \n\nНайди Эджера в крепости и верни его в Хейвен!
b.time_to_crafty=Боско хочет, чтобы ты создал для него «Горячий край» и «Морозный пистолет», чтобы он мог их осмотреть. Если все будет в порядке, он сообщит в штаб-квартиру Спирали, что ты овладел важнейшим искусством алхимии, и даже добавит пару мощных уникальных вариантов к твоим новым оружиям.  Какой щедрый парень!
b.toggle_arsenal=ПЕРЕКЛЮЧИТЬ АРСЕНАЛ
b.toy_soldiers=Разведчики-рыцари сообщают о значительном увеличении числа механических рыцарей в первом слое Часового механизма и обнаружили завод по производству механических рыцарей недалеко от Хейвена. \n\nСчитается, что механические рыцари — это созданные гремлинами стражи из семейства конструктов, обладающие многими способностями рыцарей Спирали.  Действуйте осторожно при поиске производственного центра, а затем уничтожьте его навсегда!
b.true_champion=Выжив в Цитадели Огненного Шторма, агент разведки Кора с нетерпением ждет от вас вестей.
b.uncomplete_mission=Незавершенная миссия
b.unequip_items=Снять предметы
b.unlock=Разблокировать
b.vicious_viscous=Штаб-квартира «Спираль» поручает вам исследовать уровни «Часового механизма», где обитают самые могущественные слизистые и звериные монстры. Исследуя эти уровни и передавая данные о сражениях в штаб-квартиру «Спираль», вы поможете всем рыцарям воспользоваться вашим опасным опытом. \n\nНастоятельно рекомендуется экипироваться защитой от проникающего урона и вооружиться оружием, наносящим проникающий и теневой урон!
b.vile_engine=Где-то ниже уровня, на котором обитают лишайники, находится странное сооружение неизвестного происхождения, которое, по-видимому, используется для производства токсичных слизистых монстров. «Генераторы слизи» способны быстро производить слизистых монстров, которые затем быстро заселяют близлежащие уровни. \n\nОтряды на соседних уровнях уже сообщили о подавляющем количестве токсичных слизи, что делает невозможным проведение экспедиций глубже 23-го уровня.  Пришло время, чтобы рыцарь вашего уровня сформировал отряд для проникновения в это странное сооружение и прекращения производства этих отвратительных существ. \n\nЛюбые данные, которые вы сможете собрать об их происхождении, будут чрезвычайно ценны для штаб-квартиры Спирали.
b.weight_of_darkness=Существует предположение, что все демоны в Часовых механизмах пересекли границу из измерения, известного как Подземный мир. Хотя остается неясным, как именно они пересекли границу и каковы их мотивы на Крэдле, данные, собранные в демонических городах, указывают на то, что они теперь оказались застрявшими на Крэдле, точно так же, как и мы. \n\nНежить, с другой стороны, остается загадкой.  Почему духи возвращаются в материальный мир, неизвестно, хотя ясно, что многие из духов в Часовом механизме пришли из других миров.  Учитывая, насколько враждебными могут быть эти существа, единственный способ получить полезные данные — это прямое взаимодействие, например, в бою. \n\nШтаб-квартира «Спирали» просит вас собрать боевые данные о могущественных демонических и нежить-монстрах на 3-м уровне «Часового механизма», чтобы лучше понять природу этих существ. \n\nНастоятельно рекомендуется экипироваться снаряжением, устойчивым к теневой магии, а также оружием, наносящим элементальный и проникающий урон!
b.welcome_to_haven=Пережив путешествие в Хейвен, вы должны связаться с агентом разведки Корой через комлинк и передать ей свой отчет.  У нее есть информация о том, что делать дальше, а также специальные инструкции по использованию энергии.
b.welcome_to_haven_b=Пережив путешествие в Хейвен, вы должны связаться с агентом разведки Корой через комлинк и передать ей свой отчет.  У нее есть информация о том, что делать дальше.
b.whipping_mishandling=После того как разведчики-рыцари обнаружили город демонов под названием Сол' Форк, штаб-квартира «Спирали» направила туда исследовательскую группу, которая разместилась в самом центре города и занялась изучением обитающих там девилитов.  Их открытия легли в основу нашего понимания культуры девилитов и мотивов их сотрудничества с гремлинами. \n\nЭта исследовательская группа остро нуждается в припасах, чтобы продолжить работу на месте.  Для продолжения исследований штаб-квартиры «Спирали» было бы очень полезно, если бы отряд проник в город и доставил необходимые припасы.
b.work_idle_hands=Девилиты — это разновидность демонов, которые, судя по всему, имеют очень жесткую корпоративную структуру, регулирующую каждое их действие.  Разведчики обнаружили серию «офисов» девилитов по всему Часовому механизму, обычно расположенных в руинах инопланетного города. \n\nАнализ данных, собранных в этих офисах, указывает на то, что корпорации девилитов наняты гремлинами для разработки и управления различными проектами, включая оружие, специально созданное для уничтожения отрядов Рыцарей Спирали. \n\nПора уволить этих девилитов и отменить их дьявольские проекты.
c.rank=Ранг {0}-{1}
d.supply_depot_explanation=Склад снабжения полон предметов, выставленных на продажу. По мере выполнения миссий будет появляться все больше предметов.
e.expansion_example=Набор миссий расширения
e.expansion_example_2=Набор миссий расширения 2
e.good_unavailable=Извините, этот предмет больше не доступен.
e.operation_crimson_hammer=Операция «Кровавый молот»
f.p_tip=Значки престижа отображаются рядом с именем вашего рыцаря.  Они автоматически присваиваются при наборе достаточного количества престижа.
g.featured_energy=Рекомендуемая энергия
g.featured_items=Рекомендуемые предметы
h.cost=СТОИМОСТЬ
h.item=ПРЕДМЕТ
h.new_missions=Доступны новые миссии!  Нажмите здесь!
h.rank=РАНГ
m.a_call_to_arms=Призыв к оружию
m.a_call_to_arms1=Это Ваелин с терминала ядра. Команда уничтожена. Вокруг тьма. Пришлите помощь. Оно открывается.
m.abandoned_depot=Заброшенный склад
m.advanced_alchemy=Продвинутая алхимия
m.advanced_alchemy_1a=Мы снова встретились, {0}.  Штаб «Спирали» попросил меня познакомить тебя с некоторыми аспектами продвинутой алхимии.  Не волнуйся, это не займет много времени.  У меня все равно есть старый механический рыцарь, над которым нужно поработать.
m.advanced_alchemy_2a=По сути, все сводится к «разветвлению».  Видишь ли, большая часть алхимии, с которой ты, вероятно, сталкивался до сих пор, следует линейному пути развития.  Она просто улучшается со временем, и каждое обновление лучше предыдущего. \n\nНо не все предметы такие.  Многие из них могут превратиться в несколько совершенно разных типов предметов по сравнению с исходным!
m.advanced_alchemy_3a=Ты всё поймёшь по ходу дела, поверь мне.  Возьми, к примеру, этот «Брандиш».  В нем заложен потенциал превратиться в три разных типа элементальных клинков, накладывающих мощные статусные эффекты, или даже в теневой меч тьмы! \n\nТебе просто нужно найти рецепты, в которых требуется «Брандиш», и приступить к созданию, чтобы это выяснить. Вот, можешь даже оставить себе этот «Брандиш», который у меня есть.  Преврати его во что-нибудь потрясающее.
m.aggressive_assembly=Агрессивная сборка
m.alchemy_beginners=Алхимия для начинающих
m.alchemy_beginners_10a=Без проблем, тогда начнем с самого начала...
m.alchemy_beginners_10b=Ты будешь создавать потрясающие предметы в мгновение ока!  Вот, кстати, несколько рецептов, чтобы тебе было с чего начать.
m.alchemy_beginners_1a=Привет, {0}\!  Меня зовут Боско, и я здесь, чтобы рассказать тебе об основах алхимии. \n\nНа самом деле это довольно просто, благодаря этим алхимическим станциям.  Они сделают всю тяжелую работу за тебя\!
m.alchemy_beginners_2a=Итак, суть в следующем: собирайте материалы и рецепты и превращайте их в оружие и снаряжение.  Просто, правда?
m.alchemy_beginners_3a=Когда вы получаете рецепт и используете его, он расходуется, но навсегда сохраняется в списке ваших «известных» рецептов\!  Как только рецепт станет известным, вы сможете создавать столько предметов по этому рецепту, сколько захотите, при условии, что у вас есть нужные материалы.
m.alchemy_beginners_4a=При взаимодействии со станцией алхимии откроется интерфейс алхимии, где вы сможете увидеть свои известные рецепты...
m.alchemy_beginners_5a=...а также необходимые материалы, алхимические сферы и короны, требуемые для трансмутации предмета.
m.alchemy_beginners_6a=Во многих рецептах требуется предмет, который можно надеть и который имеет определенный уровень. В рецепте такие предметы называются «специальными предметами», и вы можете выбрать любой из них, главное, чтобы это был нужный предмет. \n\nЭто полезно, если в рецепте требуется предмет, которого у вас есть два экземпляра, но один из них лучше.
m.alchemy_beginners_7a=Когда вы будете готовы к трансмутации предмета, нажмите «Трансмутировать» и задержите дыхание!
m.alchemy_beginners_8a=Да, действительно!  Это потому, что каждый раз, когда вы трансмутируете предмет с помощью алхимии, есть шанс получить один из нескольких уникальных вариантов, который сделает ваш предмет гораздо мощнее!
m.alchemy_beginners_9a=На этом мы закончили с основами алхимии.  Я могу повторить все еще раз, если хочешь, или отметить, что ты выполнил эту миссию, и отправить тебя дальше.
m.alchemy_mastery=Мастерство алхимии
m.alchemy_mastery_1a=Привет снова, {0}.  Я понимаю, что ты уже на пути к Ядру и тебе нужен арсенал, который сохранит тебе жизнь.
m.alchemy_mastery_2a=Хороший меч — это, конечно, хорошо, но как насчет великого меча? Если тебе нужны оружия, которые потрясут небеса, то тебе нужно мастерство в алхимии. \n\nКак только ты создашь предмет в его 4- и 5-звездочном воплощении, ты раскроешь истинный скрытый потенциал этого предмета.
m.alchemy_mastery_3a=На 4- и 5-звездочном уровне экипировка обеспечивает наилучшую защиту, а оружие — максимальную мощь.  Если вы хотите выжить там, куда направляетесь, вам нужно начать формировать арсенал из 4- и 5-звездочной экипировки. \n\nИ помните: по мере того как предметы достигают 5-звездочного уровня, их варианты развития, как правило, становятся еще более разнообразными.  Ваши боевые возможности вот-вот значительно расширятся.  Тщательно планируйте свой арсенал.
m.alchemy_mastery_4a=Прежде чем вы отправитесь в путь, вот несколько материалов, которые помогут вам начать.  Удачи.
m.alien_ooze=Инопланетная слизь
m.alien_ooze_1a=Пока мне нечего сказать, но это связано с Колоколами Зверей. (ТОЛЬКО ДЛЯ РАЗРАБОТЧИКОВ)
m.alone_in_dark=Один в темноте
m.alone_in_dark_1a=(Вы видите стоящую перед вами заблудшую душу Альмира.  На его лице вы видите глубокую печаль.  Глядя мимо вас, он начинает говорить без вступления.) \n\nЛорд Ванадук принес огонь с гор в наше королевство.  Все сгорело.  Его враги.  Даже его семья. \n\nМоя семья тоже погибла.  Я бежал с поля битвы, как только увидел вдали волну пламени.  Я успел добраться до своего дома как раз вовремя, чтобы увидеть, как он горит.  Я даже не помню, чем это закончилось.  У меня нет воспоминаний о своей смерти.
m.alone_in_dark_2a=Лорд Ванадук теперь правит цитаделью.  Его душа прикована к какой-то ужасающей бронированной тюрьме. \n\nОн держит цитадель в постоянной боевой готовности, полагая, что его королевство все еще находится в осаде.  Он даже не осознает, что то, что он пытается защитить, было утрачено тысячу лет назад.
m.alone_in_dark_3a=Если ты решишь войти в цитадель и сможешь добраться до тронного зала, пожалуйста, избавь его от страданий.  Дай душам, которых он удерживает в этом мире, шанс вернуться к своим близким. \n\nИ ещё одно — я слышал, что некогда какая-то стихийная сила пыталась исправить его злодеяния, но лорд Ванадук заточил её где-то в своей крепости.  Найти и освободить её может оказаться полезным.
m.alone_in_dark_4a=(Потерянная душа продолжает смотреть мимо вас, ничего не говоря.)
m.ancient_generator=Древний генератор
m.ancient_generator_1a=Что у нас тут, ещё маленькие существа, прилетевшие с неба?  Прилетели, чтобы отнять мою силу и помешать моим исследованиям? \n\nНикто не помешает работе великого интригана Развога!  Я позабочусь о том, чтобы вы никогда не вышли из этой комнаты живыми!
m.ancient_generator_2a=Вы, мерзкие мелкие тварьки! Не смейте трогать артефакт! \n\nАаа! Я вернусь за вами!
m.anniversary_end_1={0}\! Ты сделал это!  Я вернул свою кухню! \n\nПомни, что полученные кусочки торта можно обменять на классные шлемы из торта у Масквелла на городской площади Хейвена. Это как в старой поговорке пекарей: «Носи шкуру павших врагов, чтобы доказать свою силу как воина!» \n\nЛадно, может, это только я так говорю.
m.anniversary_gremlin_1a=Щепотка лунного камня, щепотка... Ч... Как ты... Кто ты такой\!? Тебе здесь не место\!
m.anniversary_gremlin_1b=Вон, вон, вооон\! Слишком много поваров на кухне\! Слишком много поваров на кухне\!
m.anniversary_gremlin_2=Что ты делаешь\!? Мои торты\! Мои прекрасные торты\! Это недопустимо\!
m.anniversary_gremlin_3=Грррр\! Какая сила\! Ты будешь поглощён, и твоя сила присоединится к моей\!
m.anniversary_gremlin_4a=Ты... Я... Что это было? Ты что-то сказал?
m.anniversary_gremlin_4b=О нет! Скажи ей, что пирожные будут готовы. Э-э, я просто немного отстал.  Давай договоримся\: я дам тебе дополнительный кусок пирожного, если мы оставим это между нами. Я не хочу, чтобы меня выгнали с вечеринки.
m.anniversary_start_1={0}\! Как я рад тебя видеть\!  Здесь дела обстоят довольно плохо.
m.anniversary_start_2=Дело вот в чем... Мне поручили испечь торты для большого празднования годовщины Spiral Knights, и я, возможно, немного переоценил свои силы, когда сказал, что смогу испечь пару миллионов штук всего за неделю. \n\nЧтобы ускорить процесс, я, возможно, использовала совсем-совесем чуть-чуть чистой, нерафинированной темной материи вместо разрыхлителя...
m.anniversary_start_3=В любом случае, похоже, что этот новый «рецепт» превратил торты в ужасных монстров, которые захватили мою кухню и заполонили Часовой механизм.  Я хочу вернуть свою кухню, так что не могли бы вы помочь мне уничтожить этих ужасных Креп-кейков?
m.anniversary_start_4=Отлично!  Я встречу вас у выхода, как только вы с ними разберетесь.  Но будьте осторожны, похоже, они научились использовать свечи для торта в качестве оружия...
m.another_trace=Еще один след
m.another_trace_1a=Привет, {0}! Рад сообщить, что мое оборудование снова в строю! У меня для тебя есть хорошая и плохая новости. Хорошая новость\: заключается в том, что мне удалось отследить источник этой энергетической сигнатуры. А вот плохая новость\: источник энергии был локализован в крайне опасной зоне Часового механизма, которую разведывательные рыцари прозвали «Дворцом королевского желе».
m.another_trace_2a=Это место настолько же странно, насколько и звучит.  Судя по всему, среди монстров семейства слизи существует правящая аристократия из элитных слизи.  Эти «Королевские слизи» — огромные, эгоистичные и злобные слизи, обитающие в роскошных дворцах, которые, как мы можем только догадываться, были захвачены ими, поскольку мы не верим, что слизи способны строить сооружения.
m.another_trace_3a=Сигнатура энергии исходит откуда-то из Королевского дворца слизи, и нам нужно, чтобы ты это расследовал.  Королевские слизи очень территориальны, так что тебе, возможно, придется пройти мимо их логова, чтобы достичь своей цели. Но будь осторожен: королевская слизь окружает себя множеством защитных механизмов.  Во время исследования дворца тебе, скорее всего, придется столкнуться с серьезным сопротивлением.
m.another_trace_4a=Удачи, {0}.  Обязательно тщательно подготовься, прежде чем приступать к этой миссии.
m.apocrea_1_1a=Что это? Еще одна несчастная душа, готовая к сбору Апокреей?
m.apocrea_1_2a=Ты, любопытный путешественник, стоишь в Обсидиановом Нексусе, царстве Апокреи. Скорее всего, ты больше никогда не увидишь солнца.
m.apocrea_1_3a=Апокреа — это воплощение кошмаров\: ужасная легион потусторонних призраков, единственной целью которых, по-видимому, является поимка и поглощение душ всех живых существ. \n\nХотя вы и можете отважиться выйти за пределы этого узла, по пути вы несомненно попадете в одну из их ловушек.
m.apocrea_1_4a=Апокрея извращают реальность, превращая окружающую среду, в которую они вторгаются, в ловушку. В этих ловушках они выслеживают любую живую существа, собирая их души для каких-то невообразимых целей.
m.apocrea_1_5a=Ты не понимаешь, да? У тебя просто нет выбора.
m.apocrea_2_1a=Что это? У тебя еще есть тело. Возможно, ты сможешь нам помочь.
m.apocrea_2_2a=Я всего лишь еще одна душа, скрывающаяся от взора Апокреи. Но я отказываюсь сдаваться. Пока они не найдут меня, я сделаю все, что в моих силах, чтобы спасти еще одну душу от моей судьбы.
m.apocrea_2_3a=Скоро ты окажешься в одной из ловушек, расставленных Апокреей. Если ты достаточно силен, чтобы сбежать, то, возможно, сможешь спасти по пути и других заблудших душ.
m.apocrea_2_4a=Заблудшие души, пойманные в ловушку Апокреи, привязаны к реальностям, которые они сами создали. Найди заблудших душ и освободи их от оков Апокреи.
m.apocrea_2_5a=После освобождения ты получишь печать Апокреи в качестве доказательства своего подвига. Принеси их мне, и мой друг вознаградит тебя особыми сокровищами, которые я собрал за время своего пребывания в этом мире. Ты сможешь использовать эти предметы для создания редких и мощных предметов с помощью того обелиска созидания, что стоит вон там.
m.apocrea_2_6a=Удачи тебе. Пусть путь будет быстрым, и избегай их лап.
m.arc_mintut_1=Здравствуй. Я — Вегнер, главный гео-рыцарь «Скайларка» и руководитель геологических исследований в «Часовых механизмах».
m.arc_mintut_2=Во время путешествий по Часовому механизму вы встретите пять особых минералов\: кримзонит, лунный камень, валестоун, люминит и темную материю.
m.arc_mintut_3=Вы найдете месторождения руды на всех уровнях Часового механизма, и вам нужно атаковать их, чтобы разбить на куски, которые можно унести. Вы можете подбирать только по одному за раз, но можете поменять их местами, подбирая другой. Ищите самые большие и блестящие из тех, что сможете найти. Они самые ценные.
m.arc_mintut_4=Как только вы благополучно дойдете до лифта, минерал, который вы несете, попадает в ваш арсенал для использования позже. Все члены вашей группы получают минералы друг друга, так что не нужно спорить, кому достанется лучший!
m.arc_mintut_5=Минералы используются для создания пищи для спрайтов в Лаборатории. Пища для спрайтов очень важна для развития вашего спрайта, так что собирайте эти минералы, когда увидите их!
m.arc_mintut_6=Наши геологические исследования продолжаются, так что, возможно, у этих странных и мощных минералов найдутся и другие увлекательные применения.
m.arsenal_knight_1a=Вы можете использовать станцию «Арсенал» позади меня, чтобы сменить снаряжение. Как только вы спуститесь в Часовой механизм, вы сможете менять свое снаряжение только на станциях «Арсенал», подобных этой, так что лучше быть готовым!
m.axes_of_evil=Топоры зла
m.becoming_champion=Стать чемпионом
m.becoming_champion_1a=Рад встрече, {0}. Прошло немало времени с тех пор, как я впервые встретил тебя, только что прибывшего из Спасательного лагеря. С тех пор ты прошел долгий путь, дослужившись, не меньше, чем до звания «Элитный защитник». \n\nТы талантливый солдат, {0}.  Я не сомневаюсь, что вскоре ты станешь Чемпионом среди Рыцарей Спирали и сыграешь ключевую роль в раскрытии великой тайны Ядра, восстановлении «Скайларка» и возвращении домой.  Ты доказал, что у тебя есть все необходимое, чтобы противостоять легионам темных сил, скрывающихся под поверхностью.
m.becoming_champion_2a=Я слышал, что штаб-квартира Спирали подготовила для тебя несколько миссий, достойных настоящего Чемпиона.  Но чтобы им стать, тебе понадобится подходящее снаряжение. \n\nЯ вверяю тебе инструменты, необходимые для того, чтобы стать таким Чемпионом.  С помощью этих рецептов ты сможешь изготовить снаряжение самого высокого уровня Ордена Спирали.  С ним ты наконец сможешь надеть доспехи Лазурного Стража, владеть мощью Клинка Левиафана и противостоять чему угодно под защитой Эгиды.
m.becoming_champion_3a=Тогда используй их с честью и позволь им защитить тебя от ярости бесчисленных врагов, с которыми тебе скоро предстоит столкнуться.  В Ядре, которое мы ищем, есть что-то поистине ужасное.  Я знаю, что оно вполне может стать тем, что вернет нас домой, но я не могу избавиться от ощущения, что мы все это время думали об этом не так.
m.becoming_champion_4a=Я имею в виду, что Ядро — это не огромная батарея, питающая этот мир, а скорее то, что оно само и весь этот мир представляют собой гигантскую тюрьму, созданную для того, чтобы ничто никогда не смогло отсюда вырваться. \n\nВспомните наши геосканирования «Колыбели» непосредственно перед крушением — они показывают, что она состоит из сотен огромных глыб других миров, словно доспехов.  А еще есть Часовой механизм — самая неестественная вещь, которую я когда-либо видел.  Целый мир, единственная цель которого, кажется, состоит в том, чтобы никому не дать добраться до его Ядра.
m.becoming_champion_5a=Я уже некоторое время обсуждаю это с штаб-квартирой Спирали, и они готовы провести более тщательное расследование.  Хотя я не думаю, что мне удастся в ближайшее время переубедить их в том, чтобы не пытаться открыть Ядро.  Пока что это остается приоритетом номер один. \n\nВсе, что я могу сказать, — будь осторожен, {0}.  Думаю, этот мир приготовил для нас больше сюрпризов, чем мы думаем.
m.best_of_beast=Лучшее из Зверя
m.best_of_beast_1a=Привет, {0}, рад видеть, что ты еще на ногах.  Хотя обычно это не входит в обязанности Главного биотехника, я специально попросил возможность проинформировать тебя об опасностях, которые ждут тебя на 3-м уровне Часового механизма.  Нельзя допустить, чтобы ты погиб из-за дезинформации какого-нибудь младшего биотехника.
m.best_of_beast_2a=Ну что ж, тогда давайте приступим. \n\n3-й уровень находится ближе всего к Ядру, и, подобно тому, как предметы высокого уровня реагируют на его силу, так же реагируют и монстры.  Многие из них принимают новые формы и считаются наиболее опасными.  Вы должны подготовиться перед тем, как приступить к каждому заданию.
m.best_of_beast_3a=Если вам придется столкнуться с чудовищами и слизистыми монстрами 3-го уровня, имейте в виду, что они наносят чистый проникающий урон.  Только лучшее снаряжение с защитой от проникающего урона сохранит вам жизнь перед лицом этих могущественных хищников. \n\nКак только вы выполните предстоящие миссии, мы поговорим снова.  Удачи, {0}.
m.beyond_axes_of_evil=За пределами Осей Зла
m.blades_fallen=Клинки Падших
m.breaking_in_recruits=Обучение новобранцев
m.breaking_in_recruits_1a=Привет, малыш. Не наступай на снайпов.
m.breaking_in_recruits_2a=Привет. Достаньте блестяшки. Достаньте блестяшки.
m.breaking_in_recruits_3a=Снайперы. Покупать? Продавать?
m.breaking_in_recruits_k1a=Гремлины\!? Я правильно читаю эти данные? Засада\!? Как им удалось обмануть наши датчики?
m.breaking_in_recruits_k2a=Это уже не рутинные учения\! Отведи новобранцев к лифту. Мы эвакуируем их обратно в Хейвен. А тебе, с другой стороны, нужно спуститься вниз и выяснить, кто за этим стоит.
m.built_to_destroy=Создан, чтобы уничтожать!
m.built_to_destroy_1a=«Девять видят всё, слышат всё. Подчиняйся Железному Закону.»
m.built_to_destroy_2a=Директивы «Алого Ордена»\: \n\n- Обязанность каждого Гремлина — отразить металлических захватчиков! \n\n- Каждый Гремлин должен стремиться уничтожить Хейвен. Колыбель принадлежит нам! \n\n- Каждый Гремлин должен оставаться верным королю Тинкинзару и «Алому Ордену». Железный закон должен соблюдаться!
m.built_to_destroy_2b=Передача\: \n\n«Они продолжают наступать и срывать наши планы!  Как они могли обнаружить Проект R?  Почему не было предварительного предупреждения о нападении?» \n\n«Херекс и его приспешники должны были шпионить за ними, но все они исчезли, как трусы.» \n\n«Нарушить Железный закон — значит бросить вызов Ордену!  Найдите предателя.  Херекс ответит за эту неудачу.»
m.chasm_b_rhendon_1a=Похоже, у нас нет выбора, {0}.  Эта штуковина не стоит того, чтобы за нее умирать.
m.chasm_b_rhendon_2a=Этот дьявол! \n\nВсе здесь рушится! Нам нужно срочно найти способ потушить этот пожар!
m.chilled_to_bone=Холод до костей
m.choose_your_sprite=Вечная связь
m.choose_your_sprite_10a=Итак, ты выбрал теневого маскерайта, боевого спрайта тех, кто желает скрываться в тени и наносить врагу удары из засады? \n\nКак только ты сделаешь выбор, пути назад не будет!
m.choose_your_sprite_11a=Поздравляю, {0}\! Ты заключил союз со своим боевым спрайтом\! Он, без сомнения, станет для тебя бесценным спутником в предстоящих миссиях. \n\nЕсли у тебя есть дополнительные вопросы о воспитании твоего нового боевого спрайта, обязательно поговори со мной или с Бискотти здесь, в Лаборатории.
m.choose_your_sprite_12a=Ничего страшного, просто поговори со мной снова, когда будешь готов сделать выбор.
m.choose_your_sprite_1a=Приветствую, {0}\! Теперь, когда у меня было достаточно времени для изучения боевых спрайтов, которых ты спас, я могу дать тебе надлежащую оценку каждого из них. \n\nНесмотря на их, ну, странный внешний вид, мы пришли к выводу, что эти «новые» боевые спрайты не только пригодны для боя, но и, возможно, обладают еще более расширенными способностями в результате своей трансформации.
m.choose_your_sprite_2a=Я предоставлю тебе краткую информацию о каждом боевом спрайте. В знак признания твоей доблести при спасении этих спрайтов штаб-квартира Spiral разрешила тебе связать себя с одним из них. Эта связь будет длиться вечно и является серьезной ответственностью. \n\nПожалуйста, хорошо подумай, прежде чем принимать решение; как только ты решишь, пути назад не будет.
m.choose_your_sprite_3a=Доступно три различных боевых спрайта. Каждый из них по-своему отреагировал на силу, исходящую от этого мира, и каждый предлагает уникальный боевой опыт. \n\nК этим спрайтам относятся огненный дракон, сияющий серафинкс и теневой маскерайт.
m.choose_your_sprite_4a=Дракон — это боевой спрайт, олицетворяющий огненное разрушение. Его навыки сосредоточены на прямом нападении\: «Огненный заряд» создает взрывной снаряд, «Огненный барьер» окружает рыцаря защитными огненными шарами, а «Огненная буря» вызывает огромную волну пламени. \n\nДракон лучше всего подходит для бесстрашных рыцарей, предпочитающих разрушительный бой на передовой.
m.choose_your_sprite_5a=Серафинкс — боевой спрайт, олицетворяющий защиту и исцеление. Его навыки направлены на поддержку рыцарей в бою\: «Луч света» создает непрерывный луч святого света, «Сердечный удар» увеличивает шанс выпадения сердец из монстров, а «Ангельская аура» создает световой щит, защищающий рыцаря и членов его отряда, находящихся внутри. \n\nСерафинкс лучше всего подходит для рыцарей, желающих защищать свою группу и оказывать ей помощь.
m.choose_your_sprite_6a=Маскерайт — боевой спрайт, олицетворяющий обман и ослабление. Его навыки сосредоточены на уловках\: «Едкие иголки» выпускают ядовитые иголки, взрывающиеся при последующей атаке, «Плащ теней» позволяет рыцарю стать невидимым для монстров, а «Проклятый туман» наносит монстрам урон, нарастающий с течением времени. \n\nМаскерайт лучше всего подходит для рыцарей, желающих скрываться в тени и наносить врагу удары сзади.
m.choose_your_sprite_7a=Отлично! Какого боевого духа вы выберете в качестве спутника?
m.choose_your_sprite_8a=Итак, вы выбрали огненного дракона, боевого духа тех, кто предпочитает разрушительный бой на передовой? \n\nСделав выбор, пути назад нет!
m.choose_your_sprite_9a=Итак, ты выбрал сияющего серафинкса, боевого спрайта тех, кто желает защищать свою группу и оказывать ей помощь? \n\nКак только ты сделаешь выбор, пути назад не будет!
m.collector_prisoner_1a=Уф, я едва вижу... штаб Спирали послал тебя спасти нас?
m.collector_prisoner_2a=Нашу спасательную команду застала в засаде какая-то гигантская механическая тварь. У нас не было ни единого шанса. Я рад, что вы успели прибыть вовремя, иначе не знаю, выжили бы мы.
m.collector_prisoner_3a=Думаю, да... Попробуем ускользнуть, когда представится возможность.\n\nО, но будь осторожен! То, что поймало нас, все еще здесь и охраняет большой тайник с нашими захваченными боевыми спрайтами. Если ты планируешь сражаться с ним, остерегайся его смертоносной атаки. Удачной охоты!
m.cost=СТОИМОСТЬ\:
m.creators_and_created=Создатели и Созданные
m.creators_and_created_1a=Привет, {0}, похоже, у тебя было мало проблем с ползучими ордами и им подобными, что, без сомнения, можно отнести на счет хорошего изучения их поведения перед миссией.
m.creators_and_created_2a=Огневая мощь принесет тебе пользу лишь до определенного предела, {0}.  Например, гремлины, несомненно, сильны сами по себе, учитывая их огромное количество и все такое, но эти маленькие, пушистые гении постарались еще больше укрепить свою силу, создав армию конструктов.
m.creators_and_created_3a=Не все, но, как полагают, большинство из них были созданы непосредственно по проекту гремлинов, да.  Мы полагаем, что большинство из них были изначально сконструированы во время строительства Часового механизма.  Некоторые остаются под контролем гремлинов, другие стали мятежниками, а остальные превратились в нечто совершенно иное.
m.creators_and_created_4a=У нас было несколько случаев, когда рыцари сталкивались с невраждебными конструктами, которые, как они клянутся, вели себя как настоящие разумные существа.  Но в это очень трудно поверить. Гремлины гениальны, но гениальны в том виде прямолинейной инженерии, который просто позволяет выполнить задачу и мало что больше.  Грубая сила. \n\nИскусственная жизнь?  Ну, это совсем другое дело.
m.creators_and_created_5a=Верно.  Штаб-квартира «Спирали» сообщила мне, что в следующем раунде вам, скорее всего, придется столкнуться с ордами гремлинов и конструктов.  Имейте в виду, что на 3-м уровне эти монстры могут наносить чистый элементальный урон.  Обязательно экипируйтесь соответствующим образом.
m.crimson_chaos=Багровый хаос
m.crossing_chasm=Переход через пропасть
m.crossing_chasm_b=Переход через пропасть
m.crossing_chasm_b_1a=Думали, что сможете просто уйти с артефактом, да?  Отдайте его сейчас же, или я зажгу этот фитиль и превращу вас в миллион крошечных тлеющих осколков!
m.crossing_chasm_b_2a=Прекрасно!  Я оставлю артефакт себе и все равно сожгу тебя дотла! \n\nХа-ха-ха!
m.crossing_chasm_b_3a=Что?! Ты всё ещё здесь?\! \n\nЭтот артефакт мой\!  Вы, жалкие рыцари, никогда не обретете его силу\! \n\nПридётся уничтожить вас самому\!
m.crossing_chasm_b_4a=Спасибо, {0}.  Я думал, нам там конец. \n\nДавай вернём артефакт в штаб-квартиру Спирали, пока кто-нибудь другой не попытался его стащить.
m.crossing_chasm_b_5a=Эй, {0}\! Вижу, ты получил «Прото-бомбу»! Она очень пригодится, когда нужно справиться с группой врагов.
m.crossing_chasm_b_6a=Бомбы особенны тем, что у них нет стандартной атаки.  Бомбу можно использовать ТОЛЬКО в качестве ЗАРЯДНОЙ АТАКИ, так что не забудь уклоняться от монстров во время заряда\! \n\nНе стесняйся попробовать.  Только не забудь экипировать её на станции арсенала, которая находится впереди.
m.crossing_chasm_b_7a=Я отнесу артефакт в лабораторию.  Когда будешь готов, отправляйся в Хейвен и встреться с остальной командой.  У меня предчувствие, что мы можем застрять на этой планете на довольно долгое время, так что давай посмотрим, чем мы можем помочь.
m.cryptic_coder=Интриган Развог\: Работай в стороне от остальных. Орден ни в коем случае не должен узнать, что артефакт у нас. Найди способ его активировать. Принеси его мне. Не предай меня.  Я узнаю. \n\n-H
m.cryptic_coder_crimson_chaos=Проникни в Комплекс. \nЗабери все схемы. \nДевять молчат, но мы заставим их замолчать. \nРыцари преследуют нас, но мы остановим их. \n\nТолько Херекс постигает Истину. Только Херекс сойдет вниз. \nДругого не может быть.
m.cryptic_coder_spark_roar=Железный Закон нарушен! \nАлый Орден — ложь! \nДевять слепы, они не видят Истины, лежащей внизу. \nДевять глухи, они не слышат Резонанса, бьющегося в этом мире. \n\nХерекс больше не служит одним из Девяти. \nТолько Херекс видит и слышит Истину. Только Херекс восторжествует. \nСледуйте за Херексом, и вы будете спасены.
m.cwt_mintut_1=Это Вегнер, главный гео-рыцарь «Скайларка». Я фиксирую высокую концентрацию месторождений полезных ископаемых в вашем районе.
m.cwt_mintut_2=Да, именно так! Во время путешествий по Часовым механизмам вы встретите пять особых минералов\: кримзонит, лунный камень, валестоун, люминит и темную материю.
m.cwt_mintut_3=Атакуйте столб минералов, чтобы разбить его на куски, которые можно унести. Вы можете подбирать только по одному за раз, но можете поменять их местами, подбирая другой. Ищите самый большой и блестящий из тех, что найдете. Они самые ценные.
m.cwt_mintut_4=Как только вы дойдете до лифта, минерал, который вы несете, будет помещен в ваш арсенал для использования позже. Все члены вашей группы получают минералы друг друга, так что не нужно спорить о том, кому достанется лучший!
m.cwt_mintut_5=Минералы используются для создания пищи для спрайтов в лаборатории. Пища для спрайтов очень важна для развития вашего спрайта, так что собирайте эти минералы, когда увидите их!
m.cwt_mintut_6=Наши геологические исследования продолжаются, так что, возможно, у этих странных и мощных минералов найдутся и другие увлекательные применения.
m.darkest_depths=Темнейшие глубины
m.darkest_depths_1a={0}, ты победил близнецов Роармулус и спас Хейвен! От имени Странников и всех Рыцарей Спирали в Хейвене — спасибо тебе!  Я понимаю, почему тебя повысили до Защитника, ты действительно заслуживаешь такой чести.
m.darkest_depths_2a=Да, это стало для нас чем-то вроде второго дома, не так ли?  Почти как будто мы принадлежим этому месту, это странно.
m.darkest_depths_3a=На самом деле это просто ощущение. Я слышал, что другие рыцари тоже так говорят\: ощущение, будто мы... принадлежим этому месту, будто крушение произошло не просто так. \n\nНо это же невозможно, правда? В любом случае, я отвлекся. Вернёмся к заданию!
m.darkest_depths_4a=Как Защитник, ты теперь можешь выполнять миссии на 3-м уровне Часового механизма.  Это самые глубокие и опасные глубины Часового механизма; проникни еще дальше, и ты достигнешь самого Ядра. \n\nВозможно, если ты доберёшься так далеко, тебе удастся найти отряд «Альфа», я просто не знаю.
m.darkest_depths_5a=Тогда давайте начнем.  Теперь, когда вы устранили непосредственную угрозу для Хейвена, штаб-квартира Спирали надеется выйти на след Артефакта. Это будет нелегко. К счастью, у меня для вас есть несколько миссий, которые будут неоценимы для вашего выживания в темных глубинах, с которыми вам предстоит столкнуться. Удачи вам, {0}.
m.darkest_forces=Темные силы
m.darkest_forces_1a={0}, вижу, ты по-прежнему держишься и даже заслужил звание «Элитный защитник».  Браво. \n\nУ меня была возможность проанализировать твои боевые данные с последней миссии, и они оказались весьма интересными.  В частности, рыцари-мехи, похоже, действительно реагируют на твои атаки, как будто импровизируют.  Но пока я не могу сказать наверняка. \n\nВ любом случае, это не имеет отношения к данным, которые я представляю сегодня.
m.darkest_forces_2a=Если дело обстоит так, то у тебя довольно странное представление о отдыхе. Демоны и нежить 3-го уровня — это не шутки, на самом деле они входят в число самых опасных существ, которых можно встретить так близко к Ядру. \n\nНа этих глубинах, похоже, хуже всего обстоят дела с управлением девилитами, что приводит к появлению очень агрессивных особей.
m.darkest_forces_3a=Именно, и сейчас они стали еще хуже.  То же самое касается нежити.  Ты обнаружишь, что хоулитцеры становятся особенно неприятными благодаря улучшенным огневым и самонаводящимся способностям. \n\nНаконец, будь готов к тому, что демоны и нежить могут наносить чистый урон тенью.  Как всегда, выбирай подходящее снаряжение для задачи, если хочешь прожить достаточно долго, чтобы снова услышать от меня.
m.darkest_forces_4a=Да, я не могу представить себе большей трагедии.  Тогда удачи, {0}.
m.delved_too_deep=Забрался слишком глубоко
m.delved_too_deep_1a=Ответь, {0}\! Не могу поверить\! Я полностью потерял твой сигнал, когда ты вошел в Терминал Ядра. Что там произошло?
m.delved_too_deep_2a=Не сомневаюсь. Полагаю, на этот раз тебе придется меня проинформировать\!
m.delved_too_deep_3a=Удивительно, что за все это время мы не знали правды. Я имею в виду, мы уже давно подозревали, что эта планета — своего рода тюрьма, но кто мог догадаться, что этот «Рой» просто ждал, когда кто-нибудь наткнется на Ядро и освободит его?
m.delved_too_deep_4a=Если то, что сказала Парма, правда, то мы — последний рубеж обороны против Роя. {0}, не буду скрывать, но это может изменить всё. Нам нужно немедленно передать эту информацию в штаб-квартиру «Спирали». Я соберу всех и отправлю тебе задание, которое ты сможешь принять, когда будешь готов.
m.dreams_and_nightmares=Сны и кошмары
m.dreams_and_nightmares_10a=Времени мало. Я не смогу связаться с тобой отсюда, а тебе нужно выбраться. Предупреди штаб. Предупреди Хэйвен! Если Ядро не будет оставаться запечатанным, Рой сбежит и продолжит поглощать всё и всех.
m.dreams_and_nightmares_11a=Но как же ты и остальные?
m.dreams_and_nightmares_12a=Рой становится всё сильнее, а Спящий — всё слабее. Без нас, всех нас, Рой победит. Когда-то гремлины отвечали за оборону Колыбели. Но у них были свои планы. Теперь мы должны стать защитниками Колыбели. \n\nЭто наша жертва.
m.dreams_and_nightmares_13a=Продолжай вести праведную борьбу, {0}. Помни то, чему ты научился. Прощай!
m.dreams_and_nightmares_1a=Наконец-то подкрепление! {0}, смотри! Ядро открывается!
m.dreams_and_nightmares_2a=Какая сила! Я и представить не мог...!
m.dreams_and_nightmares_3a=...и она будет высвобождена. Вы! Я сделаю вас ее первыми жертвами.
m.dreams_and_nightmares_4a={0}, это почти наверняка ловушка, и я не могу попросить тебя пойти со мной, но я пойду туда. Если есть хоть малейший шанс, что Рулен и остальные члены отряда «Альфа» живы, я должен попытаться их найти.
m.dreams_and_nightmares_5a=Ну, пожалуй, пора снова стать героем. Пойдем?
m.dreams_and_nightmares_5b=Херекс ускользнул! Я потерял его из виду, когда все потемнело. Мне показалось, будто тысячи рук тянут нас прочь. Как будто что-то не хотело, чтобы мы шли за ним.
m.dreams_and_nightmares_5c=Что бы это ни было, мы сейчас здесь. Где бы это ни было. Похоже, у нас нет другого выбора, кроме как посмотреть, куда это нас приведет.
m.dreams_and_nightmares_6a=Невероятно... Я и не думал, что когда-нибудь еще увижу кого-то из нас! Рад, что ты добрался сюда целым и невредимым.
m.dreams_and_nightmares_7a=Парма! Твой Разведчик! Ты жива! Где ты? Нам нужно вернуть тебя в Хэйвен.
m.dreams_and_nightmares_8=Прости, что не появился лично. Я спрятался в безопасном месте. Я понял, что не успею к тебе, как только заметил твой сигнал. К счастью, мне удалось потянуть за ниточки и найти тебе выход.
m.dreams_and_nightmares_8a=Гранц... он... он упал, защищая нас от Роя. Он остался на месте, даже когда остальные были вынуждены бежать. Я никогда не забуду, каким храбрым он был.
m.dreams_and_nightmares_9a=Мы все думали, что не выживем. Но потом... потом нас окружил свет, и мы оказались в безопасности. Мы стали называть его «Спящим». Мы не знаем точно, что это такое, но ему нужна наша помощь. Этот мир был создан, чтобы защитить его, но каким-то образом Рой прорвался в Ядро и с тех пор питается энергией и растет, как пиявка.
m.dreams_and_nightmares_9b=Эвклид вызвался помочь Спящему. Я уверен, что прямо сейчас он где-то здесь сражается с Роем. Что касается Рулена... Ваелин, прости. Он исчез вскоре после того, как Эвклид принял решение. С тех пор я так и не смог его найти.
m.elemental_my_dear=Элементал, мой дорогой
m.elemental_my_dear_1a=Привет снова, {0}.  Штаб-квартира Спирали сообщила мне, что ты готов узнать о монстрах, наносящих элементальный урон, верно?
m.elemental_my_dear_2a=Отлично, тогда, как говорится, «вперед, к гонке».  Элементальный урон обычно наносится атаками на основе энергии, которые могут быть чем угодно — от лазерного огня на основе фотонов до манипуляции тайной энергией.
m.elemental_my_dear_3a=Магия?  Что?  Нет, я говорю о манипуляции психической энергией, постарайся не отвлекаться.  В любом случае,  урон от стихий наносят монстры семейств конструктов и гремлинов.  Кроме того, монстры-конструкты, как правило, сами уязвимы к урону от стихий, а гремлины — к урону от теней. Имейте это в виду. \n\nИтак, вам еще что-нибудь нужно?
m.elemental_my_dear_4a=С удовольствием. Всего хорошего.
m.elig_not=Вы не имеете права на выполнение этой миссии.
m.elig_ok=Вы имеете право на выполнение этой миссии.
m.elig_ok_replay=Вы можете повторить эту миссию.
m.elig_unlock=Вам необходимо разблокировать эту миссию из дополнения.
m.empty=Загрузка текущих рекомендуемых предметов
m.ending_in_fire=Завершение в огне
m.ending_in_fire_1a=Здравствуйте, {0}, и поздравляю с повышением до звания Чемпиона.  Позвольте мне сказать, что, судя по моему опыту работы с вами, вы действительно заслуживаете такого звания.  Именно благодаря вам так много рыцарей благополучно вернулись на поверхность, и мы знаем гораздо больше о Часовых механизмах.
m.ending_in_fire_2a=Судя по тому, как у тебя идут дела, ты вполне можешь это сделать, {0}\!  Хотя, судя по новой разведданным, это будет нелегко.
m.ending_in_fire_3a=Мы думали, что ситуация становится довольно предсказуемой, даже на тех глубинах, которые ты исследуешь.  Ядро было уже на виду.  Но теперь над Ядром появилась какая-то огромная аномалия отрицательной энергии, блокирующая доступ к нему.  Разведчики-рыцари сообщают, что все, что они видят рядом с ней, — это огонь, бесконечный огонь. \n\nМы пока не знаем, что это такое, но отряды, находившиеся на той глубине, уже пропали без вести.  Это плохая новость.
m.ending_in_fire_4a=Нам нужно, чтобы вы исследовали окружающие уровни и собрали всю возможную информацию.  Вы можете начать с какого-то замка Оулайтов, который недавно появился рядом с этой аномалией.
m.exp_mission=Миссия расширения
m.exp_mission_2=Миссия расширения 2
m.exp_mission_3=Миссия расширения 3
m.expansion_available=Доступно в Энергетическом складе
m.expansion_cost=Стоимость\: {0} единиц энергии
m.expansion_purchase_info=Купив расширение, вы разблокируете миссии, входящие в него, и сможете проходить их столько раз, сколько захотите. \n\nРазблокировка расширения действует для всех рыцарей на аккаунте. \n\nТолько игроки, разблокировавшие миссию расширения, могут присоединиться к ней. \n\nНаграды за миссии расширения нельзя продавать, сбрасывать или обменивать.
m.explosive_plot=Взрывной заговор
m.explosive_plot_1a=Поздравляю, {0}\!  Рыцарь-элита, да?  Вау, ты, наверное, гордишься собой\!
m.explosive_plot_2a=Ой, {0}, я просто делаю свою работу.  Кстати говоря, у меня есть для тебя задание\!
m.explosive_plot_3a=По последним данным от разведывательных рыцарей, гремлины замышляют что-то крупное.  Мы полагаем, что они разрабатывают некое оружие под названием «Проект R», которое будет направлено против самого Хейвена.  Штаб-квартира «Спирали» и сами «Странники» просят тебя расследовать это дело, учитывая твои заслуги в Королевском дворце.
m.explosive_plot_4a=Да, я думаю точно так же.  Мы обязаны им как можно скорее положить конец этой угрозе со стороны гремлинов. \n\nЯ подготовил для тебя несколько миссий, которые приведут тебя в места, где гремлины, похоже, собирают ресурсы для «Проекта R».  В твоем брифинге должно быть всё объяснено.
m.explosive_plot_5a=А пока мы проведем анализ того странного устройства, которое ты нашел в Дворце Королевского Мёда. Если оно имеет отношение к Артефакту, мы это скоро выясним! \n\nУдачи, {0}.
m.eye_of_needle=Глаз Иглы
m.eye_of_needle_1a={0}, рад, что ты позвонил, у меня для тебя кое-что важное.
m.eye_of_needle_2a=Эта масса отрицательной энергии, которую мы исследовали, — часть древнего королевства под названием Альмире, того самого, которое описано в том фолианте Оулайта, который ты обнаружил!
m.eye_of_needle_3a=Именно!  Так что же, черт возьми, оно теперь делает в Часовом механизме?  Это просто не имеет никакого смысла. \n\nИтак, если мы должны поверить, что действительно затерянное королевство из прошлого каким-то образом оказалось в огромном механическом мире в наши дни, остается вопрос: почему?
m.eye_of_needle_4a=Все это немного слишком удобно.  Но действительно ли у гремлинов есть такая сила?  Я подозреваю, что здесь задействовано нечто большее, чем даже то, на что они способны. \n\nВ любом случае, этот Альмир — это уже не королевство.  Все, что осталось, — это величественная цитадель, которая, кажется, поглощена бесконечным пламенем и которую штаб-квартира Спирали называет «Цитаделью Огненного Шторма».  Насколько мы можем судить, все это место кишит нежитью и построено как крепость.
m.eye_of_needle_5a=Похоже на то.  А это место просто излучает зло, это почти невозможно описать.  Оно даже начинает влиять на окружающие уровни — повсюду вспыхивают пожары. \n\nТы один из лучших у нас, {0}, и если кто-то и способен провести отряд через цитадель, то это ты.  Но даже добраться до нее будет нелегко.  Нам нужно потушить несколько пожаров и собрать еще немного разведданных, прежде чем штурмовать ворота.
m.eye_of_needle_6a=Действительно.  Давай начнем с тушения пожаров, а потом посмотрим, как пробраться к цитадели.  Учитывая сопротивление, шансы на успех — один к миллиону. \n\nУдачи, {0}.
m.faith_armor=Вера в броню
m.first_contact=Первый контакт
m.first_contact_1a=Приветствую, {0}, это агент разведки Кора, подтверждаю твой контакт со штаб-квартирой «Спирали». Я буду вашим основным связующим звеном со штаб-квартирой «Спирали» во время вашего пребывания здесь, на «Колыбели», и буду снабжать вас разведданными для множества опасных миссий, которые вас ждут. \n\nМой анализ данных о ваших результатах обучения на «Скайларке» показывает, что вы отлично подходите для предстоящих задач.  С нетерпением жду нашей совместной работы.
m.first_contact_2a=Ты полон энтузиазма, и это хорошо.  Твоя текущая миссия — добраться до города Хейвен, где штаб-квартира «Спирали» развернула свою базу.  Проведи столько времени, сколько тебе нужно, в лагере спасателей, чтобы подготовиться к предстоящему путешествию. \n\nВоспользуйся услугами странствующих торговцев, а также знаниями других рыцарей в лагере, чтобы научиться выживать в этом новом мире.  Я свяжусь с тобой снова, как только ты доберешься до Хейвена. \n\nУдачи тебе.
m.first_contact_b=Первый контакт
m.first_contact_b_1a=Это агент разведки Кора из штаб-квартиры «Спирали»! Мы получили сигнал бедствия с твоих координат, ты меня слышишь?
m.first_contact_b_2a=Приятно познакомиться, {0}.  Какова твоя ситуация?
m.first_contact_b_3a=Вау, похоже, у вас уже было настоящее приключение, {0}\!  Штаб-квартира «Спирали» наверняка заинтересуется тем артефактом, который вы нашли.  Удивительно, что вам удалось сразиться с гремлином в «Часовом механизме» и выжить.
m.first_contact_b_4a=Похоже, мне нужно вас ввести в курс дела.  Мы потерпели крушение на планете под названием «Колыбель».  Колыбель — удивительный мир, поскольку все внутреннее пространство планеты под ее поверхностью представляет собой постоянно меняющийся механический комплекс, известный как «Часовой механизм». \n\nЧасовой механизм, по-видимому, был построен «гремлинами» — пушистой расой злобных монстров, которые не слишком рады нашему присутствию.
m.first_contact_b_5a=Мы обнаружили город под названием «Хейвен» и развернули там оперативную базу. Местные жители обеспечили нас едой, жильем и электроэнергией.  Это не Исора, но пока что это наш дом. \n\nЯ определил ваше местонахождение.  К сожалению, чтобы добраться до Хейвена, вам придется пересечь огромную пропасть.  Возможно, теперь, когда в вашем лагере есть электроэнергия, где-то есть лифт, ведущий в Часовой механизм.  Возможно, вы сможете добраться до нас именно таким образом.
m.first_contact_b_6a=Насколько я слышал, если кто-то и сможет это сделать, то это ты, {0}\!  Удачи\!
m.first_mission=Пример первой миссии
m.from_below=Оно пришло из-под земли
m.frostifur_fandango=Фростифур Фанданго
m.ghost_machine_1a=Слушайте, Рейнджеры! Штаб-квартира «Спирали» получила очень загадочный сигнал бедствия от какого-то совершенно неизвестного объекта, расположенного глубоко внутри Часового механизма. \n\nКак я понимаю, нам предстоит с головой окунуться либо в опасную спасательную миссию, либо в смертельную ловушку. В любом случае, средства для разрешения ситуации уже есть в вашем арсенале. Так что экипируйтесь и готовьтесь к бою. \n\nВперед, Рейнджеры!
m.ghost_machine_2a=Что здесь произошло? Эти останки выглядят так, будто им сотни лет...
m.ghost_machine_2b=Я не понимаю, сигнал бедствия поступил отсюда... но это же не может быть, правда?
m.ghost_machine_mon_1a=помогите нам
m.ghost_machine_mon_1b=СИТУАЦИЯ УРЕГУЛИРОВАНА. ПОЖАЛУЙСТА, ПОКИНЬТЕ ОБЪЕКТ.
m.ghost_machine_mon_2a=они убьют нас, они убьют тебя
m.ghost_machine_mon_2b=ОНИ УБЬЮТ НАС, ОНИ УБЬЮТ ТЕБЯ.
m.ghost_machine_mon_3a=Впереди вас поджидают враги, готовые устроить засаду
m.ghost_machine_mon_3b=ЗДЕСЬ ЕСТЬ МЕДИЦИНСКИЕ ПРЕПАРАТЫ.
m.ghost_machine_mon_4a=Не сдерживайтесь
m.ghost_machine_mon_4b=МЫ НЕ БУДЕМ СДЕРЖИВАТЬСЯ.
m.go_shopping=Пойдем за покупками!
m.go_shopping_1a=Добро пожаловать на базар Хейвена!  Приятно познакомиться, {0}, меня зовут Бешамель. Поскольку я работаю здесь, на базаре, штаб-квартира Спирали попросила меня показать новичкам этот потрясающий центр торговли и рассказать им обо всем, что он может предложить. \n\nТак что давайте пройдемся по нему, хорошо?  Старайтесь не отставать, я хожу быстро.
m.go_shopping_2a=Такие незнакомцы, как Квиллион, продают вам оружие и доспехи.  Каждый из них специализируется на определенном виде товаров, так что поговорите с ними и узнайте, что у них есть в наличии. Они не очень разговорчивы, но у них каждый день появляется свежий товар! \n\nПросто убедитесь, что вы достигли соответствующего ранга, чтобы экипировать предмет!
m.go_shopping_3a=Рад, что ты спросил, конечно же, есть!  Пойдем к Вателю.
m.go_shopping_4a=Ватель продаст тебе различные рецепты, а также средства для изменения цвета экипировки и другие предметы.
m.go_shopping_5a=Верно, вы можете приобрести рецепты и материалы, чтобы создавать оружие и снаряжение на алхимических станциях.  Пойдем, я вам одну покажу.
m.go_shopping_6a=Здесь у нас есть алхимическая станция, с которой вы, несомненно, хорошо познакомитесь по мере того, как будете модернизировать свой арсенал.  Но не стоит слишком об этом беспокоиться, так как штаб-квартира «Спирали» скорее всего позже даст вам задание, в котором всё будет объяснено. \n\nЧто ж, на этом ваш первый обзор можно считать завершённым.  Хотите, чтобы я всё ещё раз повторил, или вы считаете, что всё поняли?
m.go_shopping_7a=Без проблем, у меня есть время.  Давайте начнем с самого начала.
m.go_shopping_7b=Замечательно!  Я рад, что смог помочь вам сориентироваться. Удачи вам, {0}!
m.go_shopping_b=Проблемы на базаре
m.go_shopping_b_1a=Уф, как хорошо, что ты появился как раз вовремя. Эти надоедливые гремлины собирались все испортить! Базар был бы разрушен!\n\nАх да, где же мои манеры? Меня зовут Тайлен, рад познакомиться, {0}.
m.go_shopping_b_2a=Теперь уже да. Я как раз направлялся на базар, чтобы сдать кое-какие припасы, когда на меня напали эти гремлины. Я думал, что они из Эмберлайта, колонии изгнанных гремлинов, но, похоже, я ошибся. \n\nНа всякий случай, не мог бы ты помочь мне доставить эти предметы на базар?
m.go_shopping_b_3a=Уф, с твоей помощью все прошло гораздо быстрее, {0}. Слушай, если тебе когда-нибудь понадобится экскурсия по базару, просто подойди ко мне. Я могу рассказать тебе все, что нужно знать о местных магазинах и услугах. \n\nОглянись вокруг! Уверен, ты найдешь много интересных вещей. Еще раз спасибо!
m.great_escape=Великий побег
m.great_escape_1a=Сюрприз! Похоже, ты клюнул на приманку. Это хорошо, потому что мне нужны были подопытные для моего последнего изобретения.
m.great_escape_2a=Смотри! «Спарккастер 9000 Делюкс»! Триумф гремлинской инженерии!
m.great_escape_3a=Один явно не хватило в прошлый раз... так что теперь их два! ДВА! Гениально!
m.great_escape_4a=Ха! Ты никогда не доберёшься до меня в мою «Комнату Непобедимости»! Ты застрянешь в этой диспетчерской навсегда! ...Э-э, постой. Похоже, я что-то упустил...
m.guardians_of_cradle=Стражи Колыбели
m.guardians_of_cradle_10a=(Впервые с тех пор, как ты его знаешь, Хан молчит. Похоже, он очень внимательно обдумывает твои находки.)
m.guardians_of_cradle_11a=То немногое, что мы извлекли из Центрального терминала, поставило в тупик всех Гео-рыцарей, биотехников и Тех-рыцарей. Нам придется анализировать эти находки еще довольно долго.
m.guardians_of_cradle_1a=Приветствую, Авангард {0}. Кора сказала, что у тебя есть новости об отряде Альфа. Пожалуйста, доложи нам.
m.guardians_of_cradle_2a=Похоже, мы едва избежали ужасной катастрофы. Если бы мы открыли Ядро и выпустили Рой, весь Крэдл мог бы быть уничтожен. Возможно, даже вселенная!
m.guardians_of_cradle_3a=Жертва отряда Альфа не будет напрасной. Я немедленно отдам приказ нашим силам провести специальные оперативные миссии по всему Крэдлу. Если есть силы, пытающиеся освободить Рой, мы должны их остановить.
m.guardians_of_cradle_4a={0}, ты уже так много сделал для всех нас, но теперь я должен попросить тебя пойти на последнюю жертву. Возможно, у нас больше не будет шанса вернуться домой, в Исору, но сейчас «Колыбель» нуждается в нас. Я хотел бы, чтобы ты возглавил наши операции на «Колыбели».
m.guardians_of_cradle_5a=Отлично, {0}. В разделе «Операции» ты найдешь новый набор миссий. Эти новые миссии сгруппированы по общим целям и могут выполняться параллельно друг с другом. Это даст тебе максимальную гибкость, чтобы реагировать на каждую новую угрозу по мере ее появления. Прощай, {0}, «Страж Колыбели».
m.guardians_of_cradle_6a=Слава тебе, Авангард. Впереди нас ждет нелегкий путь, но я уверен, что мы справимся с этой задачей.
m.guardians_of_cradle_7a=Не знаю, стало мне легче или тяжелее после того, как я узнал, что случилось со всеми в Ядре. Бедный Гранц... Парма... Эвклид... Рулен...
m.guardians_of_cradle_8a=Ну, я не опозорю их, сдавшись сейчас. В конце концов, мы прошли такой долгий путь. «Пора снова стать героем!» Правда, {0}?
m.guardians_of_cradle_9a=На этот раз мы разворошили целое гнездо скарабеев, да, {0}? Напоминает мне время, когда мы вступили в бой с осаждающим флотом Мораи над Исорой. Тогда это была настоящая авантюра — все или ничего. Меня ничуть не удивляет, что мы снова — единственное, что стоит между нами и полным уничтожением.
m.hall_of_heroes_0=Зал героев
m.hall_of_heroes_0_1a=Рад встрече, {0}. Это Зал Героев, куда опытные рыцари приходят, чтобы предложить свои услуги членам нашего ордена, достигшим звания Солдата или выше. \n\nЯ уверен, что, выполняя все больше миссий, ты однажды займешь место среди нас.
m.hall_of_heroes_1=Зал героев
m.hall_of_heroes_1_1a=Рад встрече, {0}. Я лейтенант Баррус, страж Зала героев. \n\nТы здесь, потому что штаб-квартира «Спирали» отметила в тебе потенциал стать авангардом рыцарей «Спирали».  Зал героев теперь в твоем распоряжении.  По мере повышения в звании ты будешь получать новые задания и доступ к дополнительным рецептам от опытных рыцарей в этом зале.
m.hall_of_heroes_1_2a=Да, чтобы получить доступ к более глубоким уровням Часового механизма, тебе сначала необходимо получить Сертификат звезды.  Для этого тебе нужно поговорить со мной, когда ты будешь экипирован доспехами, шлемом, щитом и как минимум одним оружием определенного звездного уровня или выше.
m.hall_of_heroes_1_3a=Поздравляю, {0}, ты соответствуешь необходимым требованиям и получил 2-звездочный сертификат. Воспользуйся лифтом позади меня, чтобы завершить свою миссию.
m.hall_of_heroes_1_3b=Извини, {0}, но в данный момент ты не соответствуешь необходимым требованиям. Пожалуйста, поговори со мной снова, когда будешь экипирован доспехами, шлемом, щитом и оружием 2-звездочного уровня или выше.
m.hall_of_heroes_1_3c=Пожалуйста, воспользуйся лифтом позади меня, чтобы завершить свою миссию.
m.hall_of_heroes_1_4=Добро пожаловать обратно в Зал героев, {0}.  Пожалуйста, поговори с героическими рыцарями, которых ты видишь перед собой, чтобы получить доступ к их оружию и снаряжению.
m.hall_of_heroes_2=Зал героев
m.hall_of_heroes_2_2a=Рад встрече, {0}. Приятно видеть тебя снова. \n\nИтак, {0}, для получения 3-звездочного сертификата вы должны быть экипированы доспехами, шлемом, щитом и оружием 3-звездочного уровня или выше.
m.hall_of_heroes_2_3a=Поздравляю, {0}, вы соответствуете необходимым требованиям и получили 3-звездочный сертификат.  Воспользуйтесь лифтом позади меня, чтобы завершить миссию.
m.hall_of_heroes_2_3b=Извини, {0}, но в данный момент ты не соответствуешь необходимым требованиям. Пожалуйста, поговори со мной снова, когда у тебя будет доспех, шлем, щит и оружие 3-звездочного уровня или выше.
m.hall_of_heroes_3=Зал героев
m.hall_of_heroes_3_2a=Рад встрече, {0}. Рад снова тебя видеть. \n\nИтак, {0}, для получения 4-звездочного сертификата ты должен быть экипирован доспехами, шлемом, щитом и оружием 4-звездочного уровня или выше.
m.hall_of_heroes_3_3a=Поздравляю, {0}, ты соответствуешь необходимым требованиям и получил 4-звездочный сертификат.  Воспользуйся лифтом позади меня, чтобы завершить миссию.
m.hall_of_heroes_3_3b=Извини, {0}, но ты пока не соответствуешь необходимым требованиям. Пожалуйста, поговори со мной снова, когда у тебя будет доспех, шлем, щит и оружие 4-звездочного уровня или выше.
m.hall_of_heroes_4=Зал героев
m.hall_of_heroes_4_2a=Рад встрече, {0}. Приятно видеть тебя снова.  Немногие рыцари добираются так далеко и могут собрать арсенал такой огромной мощи. \n\nИтак, {0}, для получения 5-звездочного сертификата ты должен быть в данный момент экипирован доспехами, шлемом, щитом и оружием 5-звездочного уровня или выше.
m.hall_of_heroes_4_3a=Поздравляю, {0}, ты соответствуешь необходимым требованиям и получил 5-звездочный сертификат.  Воспользуйся лифтом позади меня, чтобы завершить свою миссию.
m.hall_of_heroes_4_3b=Извини, {0}, но в данный момент ты не соответствуешь необходимым требованиям. Пожалуйста, поговори со мной снова, когда у тебя будет доспех, шлем, щит и оружие 5-звездочного уровня или выше.
m.hall_of_heroes_5=Зал героев
m.hall_of_heroes_5_10a=Поздравляю, {0}.  Гео-рыцари многим обязаны твоим усилиям.
m.hall_of_heroes_5_11a=(Похоже, он очень пристально смотрит в угол.)
m.hall_of_heroes_5_12a=Авангард, да?  Рейнджеры всегда ищут таких опытных рыцарей, как ты, {0}.  Когда вся эта помпезность закончится, приходи ко мне, если хочешь еще раз посмеяться в лицо смерти и опасности!
m.hall_of_heroes_5_1a=Рад встрече, {0}. Приятно видеть тебя снова, да еще и при таких благоприятных обстоятельствах.
m.hall_of_heroes_5_2a=Вы находитесь в Зале героев, где лучшие из «Спиральных рыцарей» делятся своим опытом с начинающими рыцарями.  С такими же рыцарями, каким когда-то были и вы, когда впервые вышли из десантного модуля и добрались до Хейвена. \n\nИ после стольких успешных миссий, смелых спасательных операций и образцового поведения в бою вы теперь достойны присоединиться к этим героям.
m.hall_of_heroes_5_3a={0}, для меня большая честь в присутствии всех тех, кто поддерживает тебя и кому ты служишь, присвоить тебе высокое звание Авангарда Рыцарей Спирали.
m.hall_of_heroes_5_4a=А теперь пойди поздоровайся с теми, кто помог тебе стать тем, кем ты являешься сегодня. Когда закончите, поднимитесь на лифте обратно, чтобы получить свою награду.
m.hall_of_heroes_5_5a=Рад наконец-то встретиться с вами лично, {0}\!  Поздравляю\!
m.hall_of_heroes_5_6a=Служите с честью, Авангард.
m.hall_of_heroes_5_7a={0}, я думал, ты будешь выше.
m.hall_of_heroes_5_8a=Вау, ты действительно это сделал\!
m.hall_of_heroes_5_9a=Привет, {0}\!  Посмотри на себя, вау\!  Эй, Авангард ты или нет, ты знаешь, куда идти, если хочешь действительно выделиться, да?
m.hall_of_heroes_bomber_1a=Привет, {0}! Я Реми, рыцарь, специализирующийся на бомбах и взрывчатых веществах.  Рецепты, которые я для тебя приготовил, довольно просты — это создание оружия и снаряжения, предназначенного для того, чтобы разнести твоих врагов на куски! \n\nОднако использование бомб — это не просто дело типа «запустил и забыл».  Чтобы получить максимальную отдачу от вложений, нужно понимать, как правильно выбрать момент — как до, так и после броска.  Снаряжение, на котором я специализируюсь, сделает тебя рыцарем, которого отряд посылает уничтожать сразу много врагов.  Бомбы отлично подходят для того, чтобы расчистить толпу чудищ одним быстрым «БАХ»!
m.hall_of_heroes_cobalt_1a=Рад встрече, {0}.  Я — Йорин, рыцарь, в совершенстве владеющий стандартным снаряжением спирального рыцаря.  Рецепты, которые я предлагаю, позволяют создавать очень надежное оружие и снаряжение. \n\nТо, что ваше оружие не наносит каких-то необычных видов урона, а броня не защищает от статусных эффектов, не значит, что вы не сможете показать себя в Часовых механизмах.  Снаряжение, на котором я специализируюсь, подходит практически для любой ситуации.  Оно сохранит вам жизнь и нанесет сокрушительный удар почти любому монстру, который встанет на вашем пути.
m.hall_of_heroes_elemental_1a=Привет, {0}, я Архилус, рыцарь, использующий снаряжение с высокой защитой от элементального урона.  Рецепты, которые я предлагаю тебе, позволяют изготовить доспехи и щиты, защищающие от элементальных атак конструктов и гремлинов. \n\nДоспехи и щиты с защитой от элементального урона созданы на основе технологий Оулайтов.  Хотя сами Оулайты больше не существуют, их удивительное мастерство в области стихий продолжает жить в этом снаряжении.
m.hall_of_heroes_gunner_1a=Привет, {0}, меня зовут Даксен. Я рыцарь, специализирующийся на стрельбе из пистолетов.  Рецепты, которые у меня есть для тебя, позволяют создавать оружие и снаряжение, ориентированные на бой на расстоянии... ну, знаешь, стрельбу. \n\nПистолеты позволяют поражать врагов с безопасного расстояния, но не дают много вариантов, когда они приближаются к тебе.  Чтобы стать хорошим стрелком, нужно быстро думать и стрелять.  Снаряжение, на котором я специализируюсь, сделает тебя метким стрелком, а не мертвым рыцарем.
m.hall_of_heroes_heavy_1a=Привет, {0}, я Изола, рыцарь, использующий снаряжение, подходящее для стража отряда.  Рецепты, которые у меня есть для тебя, позволяют создавать броню с высокой защитой и оружие, наносящее мощные удары. \n\nТяжелое оружие требует точного выбора момента для эффективного использования, а снаряжение, как правило, немного замедляет тебя.  Но то, чем вы жертвуете в удобстве использования, компенсируется чистой мощью.  Снаряжение, на котором я специализируюсь, сделает вас рыцарем, на которого ваш отряд сможет положиться, чтобы выжить и противостоять даже самым свирепым монстрам.
m.hall_of_heroes_piercing_1a=Привет, {0}! Я — Уолкон, рыцарь, использующий снаряжение с высокой защитой от проникающего урона.  Рецепты, которые я предлагаю тебе, позволяют изготовить доспехи и щиты, защищающие от проникающих атак слизней и чудовищ. \n\nОдно из главных преимуществ защиты от проникающего урона заключается в том, что доспехи часто изготавливаются из мягких, эластичных желеобразных материалов.  В ней можно почти заснуть!
m.hall_of_heroes_shadow_1a=Привет, {0}, я Сильвин, рыцарь, использующий снаряжение с высокой защитой от урона от теней.  Рецепты, которые я предлагаю тебе, позволяют изготовить доспехи и щиты, защищающие от атак теней, наносимых демонами и нежитью. \n\nЗащиту от теней можно получить из самих теней.  Броня и щиты, на которых я специализируюсь, созданы на основе тех самых демонических существ и нежити, которые стремятся использовать силу теней против вас.  К тому же, это выглядит невероятно страшно и круто.
m.hall_of_heroes_specialist_1a=Привет, {0}, я Зебулон, рыцарь, использующий специальное снаряжение, подходящее для конкретных ситуаций.  Рецепты, которые я предлагаю вам, позволяют создавать оружие, нацеленное на определенные семейства монстров, и снаряжение, сочетающее в себе различные типы защиты. \n\nИногда вам действительно нужен меч, который поражает нежить, или доспехи, повышающие вашу эффективность в борьбе со слизнями.  Снаряжение, на котором я специализируюсь, часто создается для выполнения конкретной задачи, но также отлично подходит для комбинирования с другими наборами.  Экспериментируйте!
m.hall_of_heroes_striker_1a=Привет, {0}! Я — Эхо, рыцарь, использующий снаряжение, подходящее для нападающего отряда.  Рецепты, которые я предлагаю тебе, позволяют создавать оружие и снаряжение, ориентированные на быстрый ближний бой. \n\nАрсенал нападающего делает ставку на скорость.  Тебе нужно приблизиться к врагу, нанести ему сильный удар и уйти.  Снаряжение, на котором я специализируюсь, сделает тебя рыцарем, который бросается в бой впереди своего отряда, нанося удар первым, прежде чем они успеют выстрелить.
m.heart_of_ice_1a=Слушайте, Рейнджеры!  Возьмите свои шарфы и заточенные мечи, потому что там, куда мы направляемся, нас не ждет теплый прием!  Наши разведчики сообщают, что Аму-Сол — это замерзшая пустошь, кишащая демонами и голодными зверями.  Этот демонический город, похоже, распространяет свой ледяной холод по всему Часовому механизму, и если мы не проникнем туда и не выясним причину, нас ждет долгая зима здесь, на Колыбели. \n\nВ путь, Рейнджеры!
m.heart_of_ice_2a=Re\: Запрос на выделение ресурсов, Аму-Сол \n\nВы получаете это письмо из-за неверной/неясной записи в вашем недавнем запросе на выделение ресурсов.  Пожалуйста, предоставьте подробное описание предполагаемого использования следующих запрашиваемых ресурсов\: \n- 999 «непредвзятых» дьяволитов \n- 50 бочек «того, чем питаются морозошерсти» \n- «высоченный столб» вечного мороза и «все замерзшие души, которые он порождает» \n
m.heart_of_ice_2b=Кроме того, отдел кадров запросил обновленную организационную структуру в кратчайшие сроки. Насколько мы понимаем, все обязанности «Пит-босса», как административные, так и прочие, были переданы «Маулосу Вечного Мороза», верно? \n\nС уважением, \nМорграл'м \nПомощник руководителя отдела распределения ресурсов, Undercorp
m.heart_of_ice_3a=Re\: Re\: Запрос на распределение ресурсов, Аму-Сол \n\nБлагодарим вас за оперативный ответ.  К сожалению, ваш запрос на распределение ресурсов был отклонен. \n\nПричина\: \nПредоставленное обоснование необходимости запрашиваемых ресурсов\: «Слава великому и ужасающему Маулосу, истинному повелителю Ослепляющей Бездны». \n
m.heart_of_ice_3b=Кроме того, отдел кадров все еще ожидает запрошенную обновленную организационную структуру. Обратите внимание, что фраза «Все подчиняются ледяной коррупции великого Маулоса» не является приемлемым описанием текущей исполнительной иерархии. \n\nС уважением, \nМорграл'м \nПомощник руководителя отдела распределения ресурсов, Undercorp
m.heart_of_ice_4a=Re\: Re\: Re\: Запрос на распределение ресурсов, Аму-Сол \n\nЯ связался с отделом внутренних дел по поводу недавней кражи столба вечного ледяного мороза и «исчезновения» почти 1000 сотрудников по вводу данных из Девилайта, поскольку считаю, что это напрямую связано с вашим недавно отклоненным запросом на распределение ресурсов. \n\nБудут приняты дисциплинарные меры.  Кроме того, пожалуйста, заполните приложенный План личного совершенствования и верните его как можно скорее. \n
m.heart_of_ice_4b=Напоследок прошу вас дать указание вашему подразделению прекратить использовать нашу почтовую систему для информирования других подразделений Undercorp о том, что «ледяной коррупции лорда Маулоса не избежать».  Ненадлежащее использование почтовой системы снижает производительность. \n\nПоскольку дисциплинарные меры в отношении вашего подразделения, несомненно, приведут к его переводу в Подразделение «Вечных мучений», это, вероятно, будет нашей последней перепиской.  Желаю вам удачи в вашей дальнейшей карьере здесь, в Undercorp. \n\nС уважением, \nМорграл'м \nПомощник руководителя отдела распределения ресурсов, Undercorp \n\nВ приложении\: Amu-Sol.pip
m.heart_of_ice_5a=Вложение повреждено и не может быть открыто.
m.heart_of_ice_6a=Вау, эта штука — огромная башня из вечного льда.  Я видел всего лишь несколько кусочков этого материала, ничего похожего на то, что мы видим здесь. \n\nИнформация, которую мы собрали до сих пор, указывает на то, что демоны используют большие залежи этого материала, чтобы запереть в них души погибших, словно в какой-то ледяной тюрьме. \n\nПохоже, что Маулос, тот ужасный арх-демон, которого ты только что уничтожил, имел в виду другое применение и на самом деле разрушал этот вечный лед, чтобы выпустить рои разъяренных, замерзших душ в Часовой механизм.  Если бы он довел дело до конца, ну, я даже не хочу думать о том, сколько свитеров нам всем понадобилось бы сейчас...
m.heart_of_matter=Суть дела
m.heart_of_matter_1a=Привет, {0}, я уже давно хотел поговорить с тобой, но, похоже, штаб-квартира Спирали держит тебя в постоянной занятости.
m.heart_of_matter_2a=Как вы знаете, я пытаюсь собрать исследовательскую команду для работы на месте, в терминале Ядра.  Чтобы успешно использовать его для восстановления «Скайларка», нам крайне необходимо добраться туда и развернуть эту исследовательскую станцию. \n\nВсе факты указывают на то, что именно у вас есть потенциал, чтобы наконец добраться до Ядра.  Прорвав оборону Цитадели Огненной Бури и установив связь с Ядром, моя команда сможет наладить необходимые линии снабжения и немедленно приступить к работе.  Но мы не сможем этого сделать, пока эта адская цитадель и её ужасный правитель стоят на нашем пути.
m.heart_of_matter_3a=Спасибо, {0}.  Надеюсь, у вас все получится.  Как вы знаете, мы полагаем, что отряд «Альфа» дошел до этого места, но неизвестно, что с ними стало... Эвклид, Парма, Гранц... Рулен. \n\n(Лейтенант Ваэлин словно отвлеклась)
m.heart_of_matter_4a=Простите, да, конечно.  Удачи вам, {0}.  Соберите лучший отряд, какой сможете, и хорошо им командуйте.  Мы все на вас рассчитываем.
m.high_temperature_hostages=Заложники в «Высокой температуре»
m.honor_duty=Честь и долг
m.honor_duty_1a=Рад встрече, {0}, чемпион Спиральных рыцарей.  Твоя служба нашему делу была на высшем уровне.  Без тебя достижение Ядра осталось бы лишь мечтой.  Теперь у нас есть шанс действительно восстановить «Скайларк» и вернуться домой.
m.honor_duty_2a=Я прочитал твой отчет о Ядре — это просто потрясающе. Какая невероятная конструкция! И подумать только, что отряд «Альфа» может быть еще жив, но… то, что находится внутри этой штуки, просто невероятно. \n\nЯ понимаю, что лейтенант Ваэлин уже возглавила команду, которая добралась до терминала Ядра и создает оперативную базу для исследований.  Это имеет огромную ценность для всех Рыцарей Спирали, и мы обязаны поблагодарить тебя за это\!
m.honor_duty_3a=Да, как и все мы. \n\nИтак, {0}, тебе нужно подготовиться к тому, что нас ждет.  Достижение Ядра — это только начало для нас.  Подозреваю, что в будущем штаб-квартира Спирали будет поручать тебе еще много миссий, которые сможет выполнить только человек с твоими способностями. \n\nИ, наконец, я с удовольствием сообщаю тебе, что вскоре ты получишь одну из величайших наград Рыцарей Спирали — звание Авангарда.  Увидимся в Зале Героев.
m.in_cold_blood=Хладнокровно
m.intro_arcade=Миссии «Аркада» позволяют вам исследовать постоянно меняющийся мир Часового механизма без конкретных целей. Посетите Аркаду Убежища, чтобы узнать, как вы можете преобразовать Часовой механизм в соответствии со своими потребностями!
m.intro_arcade_locked=Выполняйте миссии ранга, чтобы получить доступ к миссиям «Аркада»!
m.intro_expansion=Миссии расширения — это специальные миссии, доступ к которым необходимо разблокировать. За выполнение миссий расширения вы получаете эксклюзивные награды!
m.intro_expansion_locked=Выполните миссии ранга, чтобы получить доступ к миссиям расширения!
m.intro_pref=Показать введение в миссию
m.intro_prestige=Миссии престижа — это бонусные задания, которые предлагаются вам ежедневно. За выполнение миссий престижа вы получаете очки престижа.
m.intro_prestige_locked=Выполняйте миссии ранга, чтобы получить доступ к миссиям престижа!
m.intro_rank=Миссии ранга — это основная кампания Spiral Knights. За выполнение миссий ранга вы получаете награды и можете повышать свой ранг в Spiral Knights.
m.intro_reward_arcade=Выберите ворота, чтобы просмотреть карту ворот и включить параметры для начала экспедиции\!
m.intro_reward_expansion=Выберите карту миссии, чтобы получить брифинг по миссии, увидеть доступные награды и включить параметры для начала миссии\! Для доступа к миссиям расширения их необходимо разблокировать путем покупки.
m.intro_reward_prestige=Выберите карту миссии, чтобы получить брифинг по миссии, увидеть доступные награды и включить опции для начала миссии!
m.intro_reward_rank=Выберите карту миссии, чтобы получить брифинг по миссии, увидеть доступные награды и включить опции для начала миссии!
m.intro_type=Выберите тип миссии\:
m.itemlisting_sale=РАСПРОДАЖА
