b.a_call_to_arms=По всем каналам транслируется тревожное сообщение по коммуникатору.
b.abandoned_depot=Рыцари, дислоцированные в Спасательном лагере, превратили заброшенный объект под поверхностью Колыбели в учебный центр, чтобы обучать новобранцев основам выживания в Часовых механизмах.  Будьте осторожны! Поскольку это часть Часовых механизмов, здесь, скорее всего, обитают всевозможные монстры.  Будьте начеку!
b.accept=Принять
b.add=Добавить расширение
b.advanced_alchemy=Теперь, когда вы достигли звания Солдата, Боско в Базаре Убежища имеет для вас новую информацию о продвинутых формах алхимии.  Навестите его и узнайте о скрытом потенциале некоторых видов оружия и снаряжения!
b.aggressive_assembly=Брифинг по агрессивной сборке
b.alchemy_beginners=Алхимия — это ремесло, которым владеют Рыцари Спирали. Оно позволяет пробудить присущие различным материалам силы и объединить их друг с другом, чтобы создать мощные новые предметы!  Орден Спирали полагался на алхимию как на основное средство создания того самого арсенала, на который рыцари полагались на протяжении веков. \n\nУзнайте, как она станет важной частью вашего выживания в этом чуждом мире.
b.alchemy_mastery=У Боско на базаре «Хейвен» есть для вас дополнительная информация о высшем доступном вам уровне алхимии.  Алхимия уровня «Мастерство» сыграет ключевую роль в вашем выживании, когда вы будете пытаться добраться до Сердца Часового Механизма.
b.alien_ooze=Одна из наших полевых исследовательских групп находится в осаде со стороны большой колонии лишайников. Лишайники — это инопланетный вид из семейства слизи, который, как полагают, попал в Часовой механизм с метеоритом, упавшим на поверхность Колыбели.  Этот конкретный вид слизи состоит из бесчисленных мелких слизистых организмов, образующих подвижные, разумные «колонии». \n\nКолонии лишайников могут далее объединяться, образуя все более крупные версии самих себя, быстро развивая целый набор смертоносных когтей и шипов.  Не дайте им объединиться любой ценой и спасите исследовательскую команду!
b.alone_in_dark=Призраки поместья Муркрофт имеют для нас еще одну ценную информацию, которую стоит проверить.  Они говорят, что потерянная душа бывшего Королевства Альмире обитает на кладбище солдат возле Цитадели Огненного Шторма.  Эта душа готова предоставить нам информацию о природе цитадели, а также о том, как мы можем пройти через нее и добраться до Ядра. \n\nДобраться до него будет нелегко, учитывая его местонахождение.  Кладбища — ужасные места, особенно на такой глубине.  Настоятельно рекомендуется проходить через кладбище как можно быстрее в поисках этой заблудшей души.
b.ancient_generator=В спасательном лагере нет электричества, а значит, нет возможности защититься от натиска монстров, нападающих на него ночью.  Солнце быстро садится, и только вам под силу спуститься в темные глубины под лагерем и найти древний генератор. \n\nЕсли вам удастся восстановить электроснабжение лагеря, рыцари Спирали смогут включить свои турели и создать оборонительный периметр. Как только безопасность будет обеспечена, возможно, удастся восстановить связь со штаб-квартирой Спирали.
b.another_trace=Техники из лаборатории «Хейвен» сообщают, что их система слежения наконец-то отремонтирована и снова запущена. Агент разведки Кора хотела бы проинформировать вас о предстоящих задачах. Свяжитесь с ней через коммуникатор, чтобы узнать подробности.
b.arcade=АРКАДА
b.axes_of_evil=В уровнях, известных как «Долина Джигсоу», обнаружена лесозаготовительная операция гремлинов.  Эти странно вырезанные острова являются домом для еще более странного вида извивающихся деревьев, которые гремлины, похоже, намерены полностью уничтожить. \n\nШтаб-квартира Spiral полагает, что гремлины используют древесину, добытую в ходе этой операции, в качестве ресурсов для развития Проекта R, и просит вас проникнуть в Долину головоломок и остановить их.
b.becoming_champion=Узнав о ваших многочисленных достижениях и успешно выполненных миссиях для штаб-квартиры Spiral, лейтенант Ферон хочет поговорить с вами.
b.best_of_beast=После недавнего повышения Биотех Хан получил звание «Главного биотехника». Он узнал о ваших последних достижениях и хотел бы кратко рассказать вам о том, чего следует ожидать от семейства монстров «Звери» и «Слизи», когда вы приблизитесь к Ядру.
b.beyond_axes_of_evil=Несмотря на ваши предыдущие усилия, гремлины возобновили лесозаготовки в Долине Джигсоу, чтобы снабжать ресурсами свои заводы по производству боеприпасов. Учитывая результаты их последнего проекта, Близнецов Роармулус, штаб-квартира Спирали хотела бы, чтобы вы положили конец их эко-разрушению, пока оно не переросло в нечто более серьезное!
b.blades_fallen=Не каждый рыцарь, вступающий в Часовой механизм, возвращается, чтобы снова почувствовать солнце на лице.  В опасных глубинах Часового механизма те, кто смело бросает вызов его опасностям, всегда сталкиваются с реальностью: каждая экспедиция может стать для них последней.  Иногда их тела удается найти, а иногда остаются лишь обломки их снаряжения. \n\nНедалеко от Хейвена штаб-квартира Спирали построила кладбище солдат, где могут упокоиться павшие рыцари.  Как рыцарь Спирали, вы должны принять реальность смерти, чтобы понять всю ее тяжесть. \n\nДоставьте останки неизвестного рыцаря — его меч — к мемориалу на кладбище.  Но будьте начеку — от кладбища исходит резонанс темных энергий, притягиваемых бесчисленными душами, которые оно хранит.
b.breaking_in_recruits=После того как вы прошли испытание в глубинах Цитадели Огненного шторма, штаб «Спирали» считает, что вы заслужили заслуженный отдых. Как новоиспечённый Авангард Рыцарей Спирали, лейтенант Ферон полагает, что вы — идеальный кандидат для обучения группы неопытных новобранцев тому, как выжить в опасностях этого мира. Ваша миссия — встретиться с новобранцами на поверхности Колыбели и помочь им пережить их первую службу.
b.built_to_destroy=Когда-то известные штабу Спирали как «Проект R», Близнецы Роармулус были идентифицированы как оружие огромной мощности, созданное гремлинами с единственной целью — уничтожить Хейвен.  Хранящееся глубоко в сердце завода по производству боеприпасов «Железный Коготь», это оружие не только защищено полчищами конструктов, питающихся шоком, и гремлинами, но и сам завод представляет собой крайне опасную взрывоопасную зону! \n\nПомимо уничтожения «Близнецов Роармулус», штаб «Спирали» просит вас найти разведывательный модуль отряда «Альфа», который, как полагают, находится где-то на территории завода. \n\nНастоятельно рекомендуется сформировать полный отряд перед выходом на задание.
b.chilled_to_bone=К этому моменту вы, несомненно, уже сталкивались со странными нежитью, известной как «спукаты».  Разведчики-рыцари наконец обнаружили то, что, по всей видимости, является источником появления этих призрачных кошачьих существ. \n\nБольшие скопления спукатов были замечены в том месте, которое, как полагают, является заброшенными руинами замка оулайтов.  Это мрачное царство, получившее название «Крепость Свечника», освещается лишь несколькими овлитовыми свечами.    \n\nДействуйте с осторожностью, исследуя территории за пределами света свечей.  В темноте скрываются огромные спукаты, известные как «грималкины».  Грималкины, похоже, невосприимчивы ко всем видам оружия, и их следует избегать.  Ваша единственная защита — оставаться в свете! \n\nШтаб-квартира «Спираль» поручила вам эту миссию, чтобы собрать больше данных о происхождении спукатов и тайне падения оулитов.  Исследуйте Крепость Свечника и доложите о своих находках\!
b.choose_your_sprite=Морлин подготовил трех боевых спрайтов, которых вы спасли, для вашей оценки. Вам разрешено выбрать одного из этих боевых спрайтов и связать себя с ним. Этот боевой спрайт будет всегда помогать вам в будущих приключениях, так что выбирайте с умом. \n\nЭто задание нельзя повторить.
b.complete_mission=Завершить задание
b.craft_items=Создать предметы
b.creators_and_created=Чтобы быть полностью готовым к предстоящим испытаниям, шеф-биотехник Хан просит вас связаться с ним, прежде чем приступать к выполнению новых заданий, доступных вам.
b.crimson_chaos=Штаб «Спирали» вел наблюдение за несколькими известными базами «Алого ордена» в надежде перехватить одного из их неуловимых высокопоставленных членов. Рыцари-разведчики, которым было поручено следить за одной из этих баз, сообщают, что она внезапно замолчала, и запросили подкрепление, прежде чем продолжить расследование. Отправляйтесь к месту их нахождения и осмотрите базу в поисках каких-либо следов произошедшего.
b.crossing_chasm=Чтобы добраться до оперативной базы штаба «Спирали» в Хейвене, вам нужно спуститься в Часовые механизмы и пересечь огромную пропасть.  Путь будет опасным, и рекомендуется запастись всем необходимым перед отправлением. \n\nЗавершив эту миссию, вы оставите лагерь спасения позади.
b.crossing_chasm_b=Восстановив электроснабжение Спасательного лагеря и установив связь со штаб-квартирой «Спирали», пришло время попытаться пересечь пропасть к северу от Спасательного лагеря и добраться до Хейвена, где укрылись остальные рыцари «Спирали». \n\nЧтобы пересечь пропасть, вам нужно спуститься на лифте в Часовые механизмы и найти другой лифт, который поднимет вас на другую сторону.  Неизвестно, какие опасности таятся в темных глубинах внизу, поэтому Рендон будет сопровождать вас в путешествии.
b.darkest_depths=Победив близнецов Роармулус и вернув разведывательный модуль отряда Альфа, пора связаться с агентом разведки Корой, чтобы получить отчет об анализе модуля и информацию о вашем новом доступе к некоторым из самых глубоких глубин Часового механизма.
b.darkest_forces=Узнав, что в ходе ваших следующих миссий вам предстоит сразиться с демоническими и нежитью в глубинах 3-го уровня, начальник отдела биотехнологий Хан попросил вас связаться с ним перед отправкой на новые задания.
b.delved_too_deep=Правда раскрыта. Пришло время проинформировать агента разведки Кору и штаб-квартиру «Спирали» о том, что вы и лейтенант Ваэлин узнали.
b.dreams_and_nightmares=Ответьте на сигнал бедствия с терминала «Ядра». У нас нет информации о том, чего ожидать. \nЭто опасная миссия. Будьте готовы ко всему.
b.elemental_my_dear=Биотехник Хан согласился рассказать вам о монстрах в Часовых механизмах, наносящих элементальный урон.  Свяжитесь с ним по коммуникатору и выслушайте, что он скажет.
b.ending_in_fire=Странная энергетическая аномалия была обнаружена на уровнях чуть выше Ядра.  Свяжитесь с агентом разведки Корой для получения подробностей.
b.exp_mission=Брифинг
b.exp_mission_2=Брифинг 2
b.exp_mission_3=Брифинг 3
b.expansion=РАСШИРЕНИЕ
b.explosive_plot=Разведчики-рыцари обнаружили то, что, по их мнению, является заговором гремлинов, направленным на уничтожение Хейвена!  Как элитный рыцарь, вы были выбраны штаб-квартирой Спирали для расследования этого дела.  Свяжитесь с агентом разведки Корой для получения подробной информации.
b.eye_of_needle=После обобщения данных, собранных вами в крепости Оулайт, и дополнительной информации от разведывательных рыцарей агент разведки Кора подготовила для вас доклад о скоплении негативной энергии, блокирующем доступ к Ядру.
b.faith_armor=Ученик по имени Уилкс, только что прибывший из Спасательного лагеря, оказался в месте, которое в штаб-квартире «Спирали» называют «Камерой ловушек». Эти уровни, скорее всего созданные гремлинами, похоже, специально построены для того, чтобы заманить в ловушку и в конечном итоге уничтожить тех, кто пытается исследовать Часовой механизм. \n\nУилкс, вероятно, не понимал, во что он вляпался, пока не стало слишком поздно.  Теперь он застрял где-то в этой камере и нуждается в вашей помощи. \n\nНекоторых ловушек можно избежать, а иногда вам придется просто принять удар на себя. Спасая Уилкса, вы, без сомнения, поймете истинную ценность прочной брони.
b.first_contact=Вы выбрались из своего спасательного модуля и добрались до спасательного лагеря как раз в тот момент, когда солнце садилось над инопланетным ландшафтом.  С помощью своего коммуникатора пришло время установить связь со штаб-квартирой Spiral.
b.first_contact_b=Теперь, когда в спасательном лагере восстановлено электроснабжение, вы можете использовать свой коммуникатор, чтобы связаться со штаб-квартирой Spiral и узнать, где они находятся после крушения «Скайларка».  Как только вы свяжетесь со штаб-квартирой Spiral, вы, надеюсь, узнаете, что стало причиной крушения, и какова природа этого инопланетного мира, в котором вы теперь обитаете.
b.first_mission=Вы разработчик? Вам нравится наслаждаться жизнью? Вы умеете читать? Пусть эта миссия станет для вас примером.
b.from_below=Отряд разведчиков-рейнджеров Десны оказался в ловушке где-то в глубинах Часового механизма из-за таинственной силы. Судя по серьезности отчетов и паническим сообщениям от отряда, штаб «Спирали» считает, что только человек с вашим опытом способен справиться с той смертоносной силой, которая их заманила в ловушку.
b.frostifur_fandango=Штаб «Спирали» получает многочисленные сообщения о том, что отряды уничтожаются стаей волверов, известной как «Стая Снежных Когтей», около 10-й глубины. Эти свирепые фростифуры обладают ледяным укусом и очень территориальны. Из-за их безжалостных атак штаб-квартира Spiral просит опытный отряд проникнуть в их логово и уничтожить их, чтобы предотвратить дальнейшие жертвы. \n\nРекомендуется подготовиться к заданию, вооружившись снаряжением, наносящим проникающий урон и защищающим от замораживания, перед выходом на задание.
b.full_depot=Показать полный склад снабжения
b.get_recipes=Получить рецепты
b.go_shopping=Базар Хейвена — это место, где можно найти всевозможные товары и услуги, связанные с предметами.  Независимо от того, ищете ли вы более мощный меч или просто хотите, чтобы ваша броня выделялась в толпе, здесь есть все, что вам нужно!
b.go_shopping_b=Базар Хейвена — это место, где можно найти всевозможные товары и услуги, связанные с предметами. Однако прямо за пределами обычно оживленного рынка, похоже, царит некоторая суматоха. Похоже, терять время нельзя: назревают неприятности!
b.great_escape=Разведчики «Рыцари-разведчики» собрали разведданные, из которых стало известно, что гремлин «Кровавый орден» начал отдавать приказы гремлинам о сооружении импровизированных тюрем в Часовых механизмах, куда доставляют и заключают «Рыцарей Спирали».  Предполагается, что эти приказы являются прямой реакцией на уничтожение вами близнецов Роармулус. \n\nДополнительные данные указывают на то, что эти импровизированные тюрьмы являются временным решением до тех пор, пока не будет построено более крупное сооружение.  Однако штаб-квартира Спирали не намерена позволять этим заключенным рыцарям оставаться там достаточно долго, чтобы это выяснить.
b.guardians_of_cradle=Вас пригласили на встречу с несколькими членами штаб-квартиры Спирали, чтобы обсудить дальнейшие действия в отношении Ядра и угрозы Роя. Присоединяйтесь к ним в Зале Героев, чтобы узнать о оперативных миссиях.
b.hall_of_heroes_1=Зал Героев — это место, куда рыцари отправляются, чтобы получить Сертификат Звезды, позволяющий им проникнуть в более глубокие уровни Часового Механизма.  Каждый сертификат гарантирует, что рыцарь соответствует уровню звезд, необходимому для преодоления испытаний в предстоящих миссиях. \n\nЗал героев также дает рыцарям возможность поговорить с опытными рыцарями и узнать об их снаряжении, а также предлагает возможность приобрести рецепты для этого снаряжения. \n\nПосетите Зал героев и получите свой 2-звездочный сертификат, чтобы получить доступ к миссиям на более глубоких уровнях Часового механизма.
b.hall_of_heroes_2=Чтобы проникнуть ещё глубже в Часовой механизм, вам необходимо вновь посетить Зал героев и поговорить с лейтенантом Баррусом, чтобы получить сертификат 3-й звезды.
b.hall_of_heroes_3=Чтобы проникнуть еще глубже в Часовой механизм, вам необходимо посетить Зал героев и поговорить с лейтенантом Баррусом, чтобы получить сертификат 4-й звезды.
b.hall_of_heroes_4=Чтобы проникнуть достаточно глубоко и добраться до Ядра, вам необходимо посетить Зал героев и поговорить с лейтенантом Баррусом, чтобы получить сертификат 5-й звезды.
b.hall_of_heroes_5=Пришло время снова войти в Зал Героев.  Получив полную звездную сертификацию и успешно выполнив множество миссий, обеспечивших выживание Рыцарей Спирали на Колыбели, штаб-квартира Спирали готовит вас к высокому званию Авангарда.
b.heart_of_matter=Лейтенант Ваэлин возглавила первый отряд, проникший в Часовой Механизм в попытке найти отряд Альфа.  Она — талантливый командир отряда, которого считают равным самому Евклиду.  Ваэлин никогда не прекращала поиски и сейчас пытается собрать исследовательскую группу для работы на месте в Ядре, чтобы лучше понять то самое место, где, как полагают, заканчиваются следы отряда Альфа.
b.high_temperature_hostages=По данным разведки, бригада «Гремлинов» по демонтажу разбирает часть «Часового механизма», чтобы добыть металлолом для использования в своем «Проекте R». Используя мощные сварочные горелки, они буквально сжигают это место дотла. \n\nОдин из отрядов, проводивших разведку на этом объекте, пропал без вести и, по всей видимости, сейчас удерживается в плену на территории объекта. \n\nПроникните в зону разрушений и спасите плененных рыцарей.  Но будьте осторожны: говорят, что у бригады по демонтажу где-то на территории спрятан мощный охранный конструкт.
b.honor_duty=Лейтенант Ферон хотел бы поговорить с вами о вашем прорыве в Цитадель Огненного Шторма.
b.in_cold_blood=Что-то сильно взбесило хромалисков на уровнях под городом Эмберлайт.  Штаб «Спирали» отправил отряд на разведку, и они быстро исчезли с радаров. Теперь они послали сигнал бедствия, в котором сообщают, что на глубине 21 их загнали в угол хромалиски всех видов. \n\nБиотехники предполагают, что эти хромалиски возбуждены из-за близости к Ядру. Другие считают, что, возможно, наступил брачный сезон.  Независимо от причины, отряд нужно спасти, пока они не погибли от рук этих ящериц!
b.king_of_ashes=В вечно пылающих недрах Цитадели Огненного Шторма лорд Ванадук выжидает, когда какое-нибудь живое существо проникнет в его проклятое королевство. Любой отряд, когда-либо пытавшийся проникнуть в цитадель, погиб или просто исчез, подобно бесчисленным заблудшим душам, прикованным к этому ужасному царству. \n\nЛорд Ванадук готов к войне, веря в своем извращенном уме, что любой, кто осмелится войти в цитадель, является вторгшейся силой, нацеленной на захват его королевства.  Он стоит последним препятствием на пути к Ядру, и у Рыцарей Спирали есть лишь один шанс восстановить «Скайларк» и вернуться домой. \n\nКак Чемпион Рыцарей Спирали, только ты обладаешь тем, что нужно, чтобы возглавить отряд в самое сердце этого ада и противостоять титанической мощи лорда Ванадука.
b.laboratory_visit=Биотех Морлин руководит лабораторией, расположенной в гарнизоне Хейвена. Он ищет способного рыцаря, готового бросить вызов Часовым механизмам, чтобы вернуть тайник с «боевыми духами», утраченный во время крушения «Скайларка».
b.learn_recipes=Изучить рецепты
b.lfg=ПОИСК ГРУППЫ
b.minerals_rock=Главный гео-рыцарь Вегнер занимается исследованием странных минералов, которые рыцари начали добывать в недрах Часового механизма. Он полагает, что именно в них может скрываться ключ к проникновению в Ядро и получению энергии, необходимой для восстановления «Скайларка». \n\nВстретьтесь с ним в «Хейвен Аркаде» и узнайте, как вы можете помочь его исследованиям, а также раскрыть истинную силу «Хейвен Аркады»!
b.mission=Вернуться к миссиям
b.mission_sprite_1=Рендон ждет вас в районе Часового механизма, известном как Закатные степи, где разведка обнаружила тайник с пропавшими боевыми спрайтами.  Заберите спрайты и очистите территорию от врагов.  Вы имеете право использовать любые найденные спрайты для выполнения миссии.
b.mission_sprite_2=Рендон ждет вас в районе Часового механизма, известном как «Беспокойная железная дорога», где разведка обнаружила тайник с пропавшими боевыми спрайтами. Заберите спрайты и очистите территорию от врагов. Вы имеете право использовать любые найденные спрайты для выполнения миссии.
b.mission_sprite_3=Рендон ждет вас на заброшенном химическом заводе гремлинов, где разведка обнаружила тайник с пропавшими боевыми спрайтами. Заберите спрайты и очистите территорию от врагов. Вы имеете право использовать любые найденные спрайты для выполнения миссии.
b.monstrous_research=К настоящему моменту вы, вероятно, собрали несколько образцов материалов во время своих первых экспедиций в Часовой механизм. Штаб-квартира «Спираль» запрашивает некоторые из этих материалов для своих текущих исследований существ, обитающих в Часовом механизме.
b.monstrous_research_2=К настоящему моменту вы, вероятно, собрали в первом слое Часового механизма несколько интересных материалов, которые могут пригодиться штаб-квартире «Спираль».  Помогите продвинуть их исследования тайн Колыбели, пожертвовав материалами.
b.monstrous_research_3=Биотехник Хан пытается углубить свои исследования слизи и монстров семейства зверей и просит предоставить образцы из ваших недавних миссий.  Он специально попросил напомнить вам о его «очень познавательной лекции», которую он прочитал вам «бесплатно», когда вы будете принимать решение, соглашаться ли вам или нет.
b.monstrous_research_4=Биотехник Хан пытается продолжить свои исследования монстров семейства конструктов и гремлинов и просит предоставить образцы из ваших недавних миссий.  Он вновь специально попросил напомнить вам о его «еще одной очень познавательной лекции», которую он прочитал вам «бесплатно во второй раз», когда вы будете принимать решение, соглашаться ли на его просьбу.
b.monstrous_research_5=Биотех Хан стремится продолжить свои исследования монстров из семейства демонов и нежити и просит вас предоставить образцы, добытые в ходе ваших недавних миссий. Он вновь специально попросил, чтобы вы вспомнили о его «лучшей бесплатной лекции на сегодняшний день», когда будете решать, соглашаться ли на его просьбу.
b.monstrous_research_6=Столкнувшись с пастью самых свирепых волверов, уклонившись от шипов полностью развившихся желеобразных кубов и даже от отвратительных извержений вирулисков, вы, без сомнения, собрали образцы из этих столкновений, которые будут очень полезны исследовательским группам штаб-квартиры Спирали.
b.monstrous_research_7=Сражаясь с элитными гремлинами клана Темных Клыков, уклоняясь от сокрушительных ударов ломберов и выдерживая оптические взрывы ретродов, вы, несомненно, собрали образцы, которые будут чрезвычайно полезны исследовательским группам штаб-квартиры Spiral.
b.monstrous_research_8=Разгромив самых ужасающих зомби, ускользнув из холодных пастей грималкинов и одержав победу в сражении с армией троянцев, вы, несомненно, собрали образцы, которые пригодятся исследовательским группам штаб-квартиры «Спирали».
b.new_chapter=Победив Снарболакса и вернув разведывательный модуль отряда «Альфа», пора связаться с агентом разведки Корой, чтобы получить отчет об анализе модуля и информацию о занесении в Зал героев.
b.new_threat=Смертоносные силы замышляют заговор против Хейвена. Свяжитесь с агентом разведки Корой и узнайте, как вы можете помочь.
b.occurance_at_owlite_keep=Неожиданный источник информации появился среди обитателей поместья Муркрофт. Несколько кошачьих призраков, обитающих там, связались с одним из наших рыцарей-разведчиков и рассказали о скоплении негативной энергии, появившемся над Ядром. \n\nНазывая это «местом жгучей ненависти» и «тюрьмой для темных душ», они говорят, что вы можете прочитать об этом в «одной из тех странных книг об Оулайте» в крепости Оулайт, которую они указали. \n\nЕсли то, что они утверждают, правда, штаб-квартира Спирали могла бы получить ценную разведданную, исследуя крепость Оулайт.  Просто помните, что все эти сооружения Оулайта, как оказалось, кишат потерянными душами бесчисленных нежити.  Подготовьтесь соответствующим образом.
b.oilers_in_boilers=Котельная под поместьем Муркрофт была захвачена легионом маслянистых слизней, известных как «ойлеры», которые, похоже, наслаждаются огненными условиями.  Это может обернуться катастрофой для любых уровней, находящихся в непосредственной близости, если слизни проникнут в котлы и вызовут взрыв. \n\nУсадьба Муркрофт служит бесценным пунктом связи с Уровнем 2, а ее ушедшие жители были самыми любезными хозяевами.  В интересах штаб-квартиры Спирали отправить отряд, чтобы разобраться с тлеющими слизнями, прежде чем они вызовут огненную бурю, которая перекроет нам доступ к Уровню 2. \n\nВам предстоит найти ойлеров и удалить их из котлов!
b.operation_crimson_hammer_1=Военный магистр Сирус — злобный повелитель боеприпасов в составе всемогущего «Алого Ордена» гремлинов. Считается, что он является истинным вдохновителем «Близнецов Роармулус» и бесчисленного множества других видов оружия гремлинов; он — создатель «Алого Ордена» и поставщик его дьявольских военных машин. \n\nРазведывательные рыцари под командованием лейтенанта Ферона недавно обнаружили «Великий Арсенал» Сируса — его центр разработки и хранилище всего его оружия.  Теперь сам Ферон ведет несколько отрядов рыцарей прямо в Великий Арсенал с намерением уничтожить Сируса и его военные машины. \n\nСтолкнувшись с сильным сопротивлением, отряды Ферона нуждаются в подкреплении, и штаб «Спирали» отправляет вас на помощь.
b.operation_crimson_hammer_2=Военный мастер Сирус — мастер боеприпасов в «Кровавом Ордене» гремлинов.  Считается, что он — истинный вдохновитель создания «Близнецов Роармулус» и бесчисленного множества других видов оружия гремлинов; он является создателем «Алого Ордена» и поставщиком их дьявольских военных машин. \n\nРазведывательные рыцари под командованием лейтенанта Ферона недавно обнаружили «Великий Арсенал» Сируса — его центр разработок и хранилище всего его оружия.  Теперь сам Ферон ведет несколько отрядов рыцарей прямо в Великий Арсенал, намереваясь уничтожить Сируса и его военные машины. \n\nСтолкнувшись с сильным сопротивлением, отряды Ферона нуждаются в подкреплении, и штаб-квартира Спирали отправляет вас на помощь.
b.operation_crimson_hammer_3=Военный мастер Сирус — главный оружейник «Алого ордена» гремлинов.  Считается, что именно он является истинным вдохновителем создания «Близнецов Роармулус» и бесчисленного множества других видов оружия гремлинов; он — создатель «Алого ордена» и поставщик его дьявольских военных машин. \n\nРазведывательные рыцари под командованием лейтенанта Ферона недавно обнаружили «Великий арсенал» Сируса — его центр разработки и хранилище всего его оружия.  Сейчас сам Ферон ведет несколько отрядов рыцарей прямо в Великий арсенал с намерением уничтожить Сируса и его военные машины. \n\nСтолкнувшись с сильным сопротивлением, отряды Ферона нуждаются в подкреплении, и штаб-квартира Spiral отправляет вас на помощь.
b.p_anniversary_r3=Шеф-повар «Скайларка», Бискотти, получила задание испечь торты в честь годовщины Spiral Knights.  Похоже, в ее кухне что-то пошло не так, и она просит подкрепления для «помощи в выпечке».
b.p_anniversary_r4=Шеф-повар «Скайларка» Бискотти получила задание испечь торты в честь годовщины Spiral Knights.  Похоже, в ее кухне что-то пошло не так, и она просит подкрепления для «помощи в выпечке».
b.p_anniversary_r6=Шеф-повар ресторана «Skylark» Бискотти получила задание испечь торты в честь годовщины Spiral Knights.  Похоже, в её кухне что-то пошло не так, и она просит подкрепления для «помощи в выпечке».
b.p_anniversary_r7=Шеф-повар ресторана «Skylark» Бискотти получила задание испечь торты в честь годовщины Spiral Knights.  Похоже, в ее кухне что-то пошло не так, и она просит подкрепления для «помощи в выпечке».
b.p_anniversary_r9=Шеф-повар «Skylark» Бискотти получила задание испечь торты в честь годовщины Spiral Knights.  Похоже, в ее кухне что-то пошло не так, и она просит подкрепления для «помощи в выпечке».
b.p_anniversary_shock_r3=К нам поступают сообщения, что Гроут, местный повар из Эмберлайта, ведет себя... странно. Похоже, Бискотти поручила ему испечь что-то от ее имени, но, возможно, ответственность вскружила ему голову.  Он исчез в Часовом механизме вскоре после того, как Бискотти доставила последнюю коробку с тестом. Поскольку празднование годовщины снова под угрозой, Бискотти нужны кулинарные мастера, которые помогут ей разобраться в этой путанице!
b.p_apocrea_r4=Несколько способных рыцарей пропали в, казалось бы, обычной части туннелей Часового механизма. Штаб-квартира Спирали подозревает нечестную игру и поручила вам исследовать этот уровень.
b.p_apocrea_r6=Несколько опытных рыцарей пропали без вести в, казалось бы, обычной части Механических туннелей. Штаб-квартира «Спирали» подозревает неладное и поручила вам провести расследование на этом уровне.
b.p_apocrea_r7=Несколько опытных рыцарей пропали без вести в, казалось бы, обычной части Механических туннелей. Штаб-квартира «Спирали» подозревает неладное и поручила вам провести расследование на этом уровне.
b.p_apocrea_r9=Несколько опытных рыцарей пропали в, казалось бы, обычной части Часовых туннелей. Штаб-квартира «Спирали» подозревает нечестную игру и поручила вам исследовать этот уровень.
b.p_demo_starlight=Начните миссию.
b.p_fast_advancement=Используйте эту эксклюзивную миссию тестового сервера, чтобы быстро усилить свое оружие и снаряжение.  Каждый уровень этой миссии абсолютно одинаков, что позволяет вам менять экипировку на каждом уровне. \n\nЧтобы максимально улучшить любой предмет, потребуется всего несколько углей! Вернитесь в «Убежище» до того, как дойдете до конца, чтобы иметь возможность вернуться к этой миссии.
b.p_fiend_test_t1=При тестировании этого контента, пожалуйста, следуйте опубликованным инструкциям.
b.p_ghost_machine_r4=Предупреждение\: это опасная миссия! \n\n\nДесна и её разведывательный отряд — элитная команда, которой поручено добыть разведданные на самых опасных уровнях Часового механизма.  Присоединение к ним может принести большие награды, но это гарантированно будет опасным путешествием! \n\nШтаб-квартира Spiral получила сигнал бедствия из заброшенного объекта, расположенного глубоко в «Часовых механизмах». Сигнал бедствия поступил в виде цифрового сообщения, в котором было написано только «спасите нас». Полагая, что это может быть ловушка, штаб-квартира Spiral направила разведчиков Десны для исследования объекта и оказания помощи тому, кто, возможно, отправил это сообщение.
