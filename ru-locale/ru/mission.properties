b.p_testmission_1=Начните миссию и обратитесь к тестовым заметкам по глубине каждого этажа.
b.p_tortodrone_r3=В Часовом Механизме стали появляться обломки павших тортодронов и скопления тёмной материи, что побудило Спиральную штаб-квартиру предположить связь бесов с исчезновением этих некогда мифических существ. Чтобы узнать, что затевают бесы, вам потребуется найти способ отпереть одни из их Мрачных Врат и пройти через них. Спиральная штаб-квартира подозревает, что глифы, которые бесы носят с собой, могут служить ключами к открытию врат.
b.p_tortodrone_r4=В Часовом Механизме стали появляться обломки павших тортодронов и скопления тёмной материи, что побудило Спиральную штаб-квартиру предположить связь бесов с исчезновением этих некогда мифических существ. Чтобы узнать, что затевают бесы, вам потребуется найти способ отпереть одни из их Мрачных Врат и пройти через них. Спиральная штаб-квартира подозревает, что глифы, которые бесы носят с собой, могут служить ключами к открытию врат.
