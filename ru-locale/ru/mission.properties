m.pierce_of_cake=Колющая Лёгкость
m.pierce_of_cake_1a=Здравствуйте, {0}. Спиральная штаб-квартира уведомила меня, что вам необходим краткий ликбез по видам монстров Часового Механизма, наносящих колющий урон, верно?
m.pierce_of_cake_2a=Отлично, {0}, приступим сразу к делу. Похоже, чем ближе монстры к Ядру, тем отчётливее проявляются их уникальные свойства. В большинстве случаев это выражается в способности наносить особые типы урона, для защиты от которых требуется специальная экипировка. \n\nНа Слое 2 монстр, наносящий особый тип урона, всегда производит смешанный обычный/особый урон. Таким образом, обычная защита всё ещё является в какой-то мере приемлемым выбором.
m.pierce_of_cake_3a=Да, на этом этапе вам необходимо начать формировать арсенал, защищающий от особых типов урона. \n\nВаши текущие миссии столкнут вас с монстрами, наносящими колющие атаки. Поэтому вам следует начать приобретать шлемы, броню и щиты, защищающие от колющего урона.
m.pierce_of_cake_4a=Колющий урон наносят монстры семейств слизней и зверей. Кроме того, слизни, как правило, уязвимы к теневому урону, а звери — к колющему. Имейте это в виду. \n\nИтак, вам нужно что-нибудь ещё?
m.pierce_of_cake_5a=Рад помочь. Доброго дня.
m.pioneers=Первопроходцы
m.pioneers_10a=Рулен был очень... рационален. Думаю, он прекрасно осознавал наши шансы на достижение Ядра и возможность использовать его для восстановления Скайларка. Думаю, Рулен точно знал, на какую миссию он подписывается, когда они совершили первое погружение во тьму Часового Механизма.
m.pioneers_11a=Итак, к делу. Мы обнаружили Модуль Разведки Альфа-Отряда в области Часового Механизма, известной как «Сумрачные Дебри». Однако эта зона является обиталищем ужасного существа, известного как «Снарболакс». \n\nСнарболакс быстро расправлялся с Оруженосцами вроде вас, но я знаю, что вы справитесь, {0}. Однако вам нужно подготовиться. Я назначил вам серию миссий, которые позволят собрать экипировку, подходящую для сражения с этим ужасным зверем и возвращения того модуля разведки\!
m.pioneers_12a=Мы рассчитываем на вас, {0}.
m.pioneers_1a=Здравствуйте, {0}, надеюсь, у вас всё хорошо. Возникло дело, которое потребует от вас встретиться с величайшим испытанием на данный момент. \n\nУ меня приказ от Спиральной штаб-квартиры, от самого Капитана Озло. Вы были отобраны в число рыцарей для активного поиска следов Альфа-Отряда.
m.pioneers_2a=Так и должно быть — среди новобранцев о них болтают без умолку. Для некоторых рыцарей они настоящие герои. \n\nАльфа-Отряд — элитное подразделение рыцарей, которое Озло лично отобрал для первого вхождения в Часовой Механизм в попытке обнаружить источник мощнейшего энергетического сигнала, идущего снизу. Поскольку все системы Скайларка были отключены в течение нескольких недель, радиосвязь была невозможна. Вместо этого они оставляли серию модулей разведки на своём пути, словно хлебные крошки.
m.pioneers_3a=Когда наши техники наконец восстановили системы связи Скайларка, мы не смогли установить контакт с Альфа-Отрядом, и с тех пор о них не было никаких вестей. Их канал полностью мёртв. \n\nИменно молчание их канала не даёт нам покоя. Наши комлинки сконструированы так, чтобы выдерживать любые экстремальные условия, даже взрывы. Да они, чёрт возьми, пережили крушение Скайларка\! Я не могу придумать ничего, что могло бы полностью оборвать связь.
m.pioneers_4a=Нам нужно, чтобы вы выяснили, что с ними случилось. Начнёте с поиска известных местоположений их модулей разведки и сбора этих модулей для анализа. Я буду отвечать за определение их примерного местонахождения и направлять вас к ним. Ваша задача — отправляться в поле и извлекать модули. \n\nКроме того, я предоставлю вам краткую справку о каждом из четырёх членов Альфа-Отряда\: командире отряда Евклиде, стражнике отряда Гранце, разведчице отряда Парме и технике отряда Рулене.
m.pioneers_5a=Евклид не был типичным рыцарем. К тому времени, когда большинство в его дивизии только получали знак Оруженосца, он уже достиг звания Авангарда. Как командир отряда, он провёл серию успешных штурмов против Мораи во время освобождения Исоры. Блестящий тактик, он славился тем, что справлялся с задачами вдвое меньшим числом рыцарей, чем в других отрядах.
m.pioneers_6a=Именно за это Озло избрал его для ведения малой группы в неведомые глубины Часового Механизма. В конце концов, если ты прошёл боевое крещение под тайфунным огнём Мораи, ты, наверно, справишься с чем угодно, верно? \n\nНо, возможно, Часовой Механизм оказался не по зубам даже его таланту. Мы просто не знаем.
m.pioneers_7a=Гранц был настоящим ветераном в группе. Бывалый Стражник, он специализировался на защите своего отряда — а именно, сокрушая всё, что намеревалось причинить им вред. \n\nГранц относился к своей Клятве Стражника предельно серьёзно, часто бросаясь прямо под удар ради защиты товарищей. Он был бескорыстен до мозга костей. Полагаю, если Альфа-Отряд действительно постигла беда, Гранц не позволил ей свершиться без жестокого боя.
m.pioneers_8a=Парма была самой молодой в группе — очень талантливая Разведчица, но с небольшим боевым опытом. Мы с ней вместе учились в академии, и я помню тот день, когда техники симулятора решили, что их программа сломалась из-за результатов Пармы. Она даже извинилась\! \n\nНо всё же я за неё переживаю. Судя по отчётам, Часовой Механизм не похож ни на что из того, с чем мы прежде сталкивались. Я лишь надеюсь, что пока она информирует их о том, что впереди, они будут прикрывать ей спину.
m.pioneers_9a=Рулен был завербован как технический гений, который, по мнению Капитана Озло, будет необходим для навигации по обширному механизированному миру Часового Механизма. В его обязанности входило всё — от обезвреживания замков до ремонта брони и разрушения разумных конструктов. Кроме того, ему было поручено руководить анализом Ядра по прибытии отряда.
m.plan_of_attack=План Атаки
m.prestige_header=Престиж\: {0}
m.prestige_reward=Престиж\: {0}
m.prestigious_opportunity=Престижная Возможность
m.prestigious_opportunity_1a=Приветствую, {0}, и поздравляю с получением звания Оруженосца\! Ваши успехи привлекли внимание Спиральной штаб-квартиры, и вам предоставлено право принимать Престижные Миссии. \n\nПрестижные Миссии — избранные миссии, предлагаемые вам ежедневно и приносящие престиж за их выполнение. Иногда эти миссии предполагают снабжение Спиральной штаб-квартиры или других рыцарей предметами, а иногда отправят вас на исследование Часового Механизма.
m.prestigious_opportunity_2a=Престижные Миссии совершенно необязательны и не могут быть пройдены повторно в течение одного дня. И не забывайте присматривать за особыми миссиями, приносящими крупные награды в виде престижа\!
m.prestigious_opportunity_3a=Я верю в вас, {0}. Я просто уверен, что вы будете среди тех избранных рыцарей, которым хватит мастерства достичь Ядра и, если повезёт, вернуть нас с этой планеты.
m.price=Цена
m.price_changed=Цена изменилась
m.promo_basic=Специальная Акция
m.promo_countdown=Предмет Ограниченного Времени
