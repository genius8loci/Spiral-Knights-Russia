m.gloaming_wildwoods_desc=Новобранцам Рыцарей Спирали рекомендуется избегать этого мрачного и туманного леса, пока они не освоятся с опасностями Часового механизма. В Лесу Сумерек обитают стаи свирепых зверей, и самым страшным из них является мифический Снарболакс. Снарболакс, которого называют «живой тенью», предпочитает добычу, которая перед смертью испытывала ужас, и часто безжалостно мучает своих жертв, прежде чем нанести им последний удар.
