m.royal_jelly_desc=Дворец Королевского Молочка — это древний замок, захваченный легионом слизистых монстров. Неясно, для чего служит этот замок, хотя ходят слухи, что в нем хранится Королевское Молочко, которое, как говорят, является символом знати в королевствах слизи. Если это правда, то, скорее всего, цель замка — служить Королевскому Молочку, и ничему больше.
