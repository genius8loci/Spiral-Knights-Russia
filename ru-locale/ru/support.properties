m.option_1_0=1. Помните, вы можете нажать на игрока и выбрать «Игнорировать», чтобы заблокировать чат и почту от него. Нажмите здесь, чтобы игнорировать {0} и отменить жалобу.
m.option_1_1=2. Если {0} вёл себя оскорбительно или агрессивно и не прекратил по просьбе, нажмите здесь, чтобы подать жалобу.
m.option_1_2=3. Если вы хотели отправить сообщение {0}, нажмите здесь.
m.option_200_0=У нас есть фильтры чата для удаления нецензурных слов. Если вы отключили фильтр, не следует подавать жалобы за использование таких слов. Чтобы включить фильтр, нажмите здесь.
m.option_200_1=Помните, что то, что вы считаете оскорбительным, может не считаться таковым для всех. Подумайте, действительно ли каждый счёл бы этот чат оскорбительным. Если вы всё обдумали и хотите отправить жалобу, нажмите здесь.
m.option_201_0=Вместо этого вы можете просто нажать здесь, чтобы игнорировать {0} и больше не видеть его сообщения.
m.option_201_1=Если вы уверены, что это квалифицируется как спам, нажмите OK для отправки жалобы.
m.option_202_0=Мы понимаем, что этот игрок может портить вам удовольствие от игры, но лучший способ справиться с такими игроками — игнорировать их. Нажмите здесь, чтобы игнорировать {0} вместо подачи жалобы.
m.option_203_0=Для игры необходимо быть не младше 13 лет. Если кто-то признаётся в чате, что ему менее 13, нажмите здесь, чтобы подать жалобу.\n\nНЕ используйте эту опцию, если вы просто считаете игрока несовершеннолетним — нужны доказательства в последних минутах чата. Если доказательств нет, отзовите жалобу.\n\nРуководствуйтесь здравым смыслом: если кто-то утверждает, что ему 4 года, при этом печатая безупречно, то это очевидная неправда.
m.option_204_0=Оскорбительные имена неприемлемы. Помните, что то, что вы считаете оскорбительным, может не считаться таковым для всех. Нажмите здесь, только если имя действительно оскорбительно для всех.
m.option_206_0=Если это несомненно личная информация, нажмите здесь для подачи жалобы.
m.option_207_0=Если вы считаете, что кто-то пытается вас обмануть, нажмите здесь для отправки жалобы. Можете также сообщить этому игроку о жалобе, чтобы другие игроки были предупреждены.
m.option_208_0=Если игрок пытается узнать ваш логин или пароль, или уже получил их и признаётся в этом в чате, нажмите здесь для подачи жалобы.
m.option_208_1=Если игрок уже захватил ваш аккаунт, вам необходимо обратиться к нам через форму поддержки для восстановления.\n\nДля подтверждения владения аккаунтом нам нужны данные об оплате.\n\nНажмите здесь, чтобы начать восстановление аккаунта.
m.option_210_0=Используйте эту опцию, только если ни одна другая не подходит. Нажмите здесь, чтобы вернуться и проверить другие варианты.
m.option_210_1=Если вы уверены, что другие варианты не подходят, и игрок нарушил Условия Использования, кратко опишите суть жалобы.
m.option_210_2=Отправить жалобу.
