m.subheader_step2=Мы уже сохранили журнал чата, который ждет добавления к жалобе, поэтому отсюда спешить не нужно. Пожалуйста, внимательно выберите правильный вариант, соответствующий действиям игрока\:
m.subheader_step200=Оскорбительный чат — это, как правило, нецензурная лексика, сексуальные выражения, язык насилия или расистские высказывания. Мы допускаем некоторое использование оскорбительного чата, когда это просто безобидные перепалки, но когда это направлено на игроков и становится личным, то это уже недопустимо.
m.subheader_step201=Спам — это когда кто-то повторяет один и тот же текст или отправляет длинные строки случайных символов с единственной целью — раздражать других, поскольку это заполняет экран чата, мешая нормальному общению.\n\nВажно подавать жалобу на спам только в том случае, если он был настолько сильным, что вам не удалось общаться с другими. Например, несколько строк из нескольких символов, хотя и не являются необходимыми, не являются достаточно серьезным нарушением, чтобы подавать жалобу. Кроме того, если повторяющиеся строки появляются с большим интервалом (например, каждые 10 секунд), это также не мешает людям общаться, даже если может раздражать то, что они просто пишут бессмыслицу.
m.subheader_step202=Если игрок, на которого вы жалуетесь, просто раздражает вас, это не является основанием для жалобы. \n\nРаздражающими являются такие вещи, как обзывательство или дразнилки.
m.subheader_step205=Не следует подавать жалобу на кого-то только потому, что он подал жалобу на вас.\n\nГейм-мастера прочитают все жалобы, и если вы не нарушили никаких правил в жалобе, поданной на вас, то вам не о чем беспокоиться.
m.subheader_step206=Раскрытие личной информации недопустимо, будь то ваша собственная или другого игрока. Запрашивать личную информацию также недопустимо.\n\nВопросы о возрасте, классе, занятиях спортом и т. п. не считаются личными.\n\nОднако такие данные, как номер телефона, адрес или настоящее имя, относятся к личной информации и ни в коем случае не должны раскрываться.
m.subheader_step207=Мошенничество — это когда игрок пытается обманом заставить вас сделать то, чего делать не следует. Примеры:\:\n- Это может быть попытка выведать ваше имя пользователя или пароль.\n- Предложение обменяться аккаунтами.\n- Выдача себя за игрового мастера или вашего друга и попытка воспользоваться этим.\nСуществует много других способов мошенничества.
m.subheader_step208=Взлом — это когда кто-то пытается заполучить ваше имя аккаунта или пароль, или уже сделал это.\n\nПодавляющее большинство проблем со взломом на самом деле не связано со взломом, а с неосторожным разглашением аккаунтов или паролей. Вы ни в коем случае не должны никому сообщать свой пароль. Гейм-мастера тоже никогда не будут его у вас спрашивать.
m.subheader_step209=Иногда мы допускаем ошибки при обмене предметами с другими игроками. Это случается со всеми нами.\n\nНо игровые мастера не могут знать, о чём именно договорились участники обмена. Один игрок может утверждать, что это не то, о чем договорились, а другой — что это именно то, о чем договорились. И мы не можем просто слепо выбирать одну из сторон. Поэтому мы вынуждены полагаться на то, что игроки дважды проверяют, что они обменивают, прежде чем нажать кнопку подтверждения.\n\nПоэтому, если вы только что совершили обмен, которого на самом деле не хотели, то, боюсь, игровые мастера не смогут вам помочь. Вместо этого вам следует поговорить с другим игроком и посмотреть, будет ли он достаточно любезен, чтобы отменить сделку.\n\nТакже помните, что никогда не следует обменивать что-либо "в долг", если вы не готовы к тому, что этот игрок не вернет предмет. Гейм-мастера не смогут вернуть его для вас.
m.subheader_step2_email=Мы уже сохранили проблемное письмо, которое готово к добавлению в жалобу, поэтому спешить дальше не нужно. Пожалуйста, внимательно выберите правильный вариант, соответствующий действиям игрока\:
m.subheader_step2_giftbox=Мы уже сохранили сообщение из проблемной подарочной коробки, которое готово к добавлению в жалобу, поэтому спешить дальше не нужно. Пожалуйста, внимательно выберите правильный вариант, соответствующий действиям игрока\:
m.subheader_step4=Ваша жалоба отправлена. Спасибо, что помогаете нам поддерживать в игре приятную атмосферу.\n\nМы просматриваем все поступившие жалобы, но не сообщаем вам о том, как решается каждая из них. Возможно, мы не сможем рассмотреть вашу жалобу сразу, но будьте уверены: все жалобы читаются и обрабатываются в соответствии с нашими правилами.
m.subheader_step5=Ваша жалоба не прошла\: {0}.
