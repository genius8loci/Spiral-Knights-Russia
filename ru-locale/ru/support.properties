m.subheader_step2=Мы уже сохранили журнал чата для жалобы, так что спешить некуда. Пожалуйста, внимательно выберите вариант, соответствующий действиям игрока\:
m.subheader_step200=Оскорбительный чат — это обычно ругань, язык сексуального характера, призывы к насилию или расизм. Мы допускаем некоторую грубость в рамках безобидных перепалок, но когда это направлено лично на игрока — это уже неприемлемо.
m.subheader_step201=Спам — это когда кто-то повторяет текст или отправляет длинные строки случайных символов с единственной целью помешать остальным общаться.\n\nПодавайте жалобу на спам, только если он был настолько сильным, что мешал нормальному общению. Пара строк с несколькими символами, хоть и излишняя, не является основанием для жалобы. Также если повторения редки (раз в 10 секунд), это не мешает чату, даже если раздражает.
m.subheader_step202=Если игрок вас раздражает, это не является основанием для жалобы.\n\nРаздражающее поведение — это обзывательства или дразнилки.
m.subheader_step205=Не следует подавать жалобу на кого-то только потому, что он подал жалобу на вас.\n\nГейм-мастера просматривают все жалобы, и если вы не нарушали правил, вам не о чем беспокоиться.
m.subheader_step206=Раскрытие личной информации неприемлемо, будь то своей или чужой. Запрашивать личную информацию тоже недопустимо.\n\nВопросы о возрасте, классе или увлечениях не считаются личными.\n\nНо номера телефонов, адрес или настоящее имя — это личная информация, которую никогда нельзя раскрывать.
m.subheader_step207=Мошенничество — когда игрок пытается обманом заставить вас сделать что-то нежелательное. Примеры\:\n- Попытки узнать ваш логин или пароль.\n- Предложения обменяться аккаунтами.\n- Выдавание себя за гейм-мастера или вашего друга.\nСпособов мошенничества множество.
m.subheader_step208=Взлом — это когда кто-то пытается завладеть вашим логином или паролем, или уже сделал это.\n\nВ подавляющем большинстве случаев «взлом» оказывается неосторожным обменом аккаунтами или паролями. Никогда никому не сообщайте свой пароль. Гейм-мастера тоже никогда его не просят.
m.subheader_step209=Иногда при обмене с игроками мы совершаем ошибки. Это случается со всеми.\n\nНо гейм-мастера не могут знать, какая была договорённость. Один игрок может заявить одно, а другой — другое. Мы не можем просто встать на чью-то сторону. Поэтому мы полагаемся на то, что игроки проверяют обмен перед подтверждением.\n\nЕсли вы совершили нежелательный обмен, гейм-мастера не смогут помочь. Попробуйте договориться с другим игроком об обратном обмене.\n\nТакже помните: никогда не отдавайте предметы «в долг», если не готовы их потерять. Гейм-мастера не смогут их вернуть.
m.subheader_step2_email=Мы уже сохранили оскорбительное письмо для жалобы, так что спешить некуда. Пожалуйста, внимательно выберите вариант, соответствующий действиям игрока\:
m.subheader_step2_giftbox=Мы уже сохранили оскорбительное сообщение подарка для жалобы, так что спешить некуда. Пожалуйста, внимательно выберите вариант, соответствующий действиям игрока\:
m.subheader_step4=Ваша жалоба отправлена, спасибо, что помогаете нам поддерживать приятную атмосферу в игре.\n\nМы читаем все жалобы, но не сообщаем вам о результатах каждой. Мы можем не рассмотреть жалобу сразу, но все они будут прочитаны и обработаны в соответствии с нашими правилами.
m.subheader_step5=Не удалось отправить жалобу\: {0}.
