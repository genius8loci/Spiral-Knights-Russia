m.option_4_0=Если ваша жалоба касалась оскорбительных высказываний в чате, домогательств со стороны игрока и т. п., то сейчас самое время заблокировать {0}, чтобы он больше не беспокоил вас. Играть в игру — значит получать удовольствие, не позволяйте другим игрокам это испортить.
