m.option_1_0=1. Помните, что вы можете нажать на игрока и выбрать "Игнорировать", чтобы заблокировать любые сообщения в чате и письма от него. Нажмите здесь, чтобы игнорировать {0} и пропустить жалобу.
m.option_1_1=2. Если {0} вел себя оскорбительно или домогался вас и не прекратил это после предупреждения, нажмите здесь, чтобы подать жалобу.
m.option_1_2=3. Если вы хотели отправить сообщение {0}, нажмите здесь.
m.option_200_0=У нас есть фильтры чата, которые удаляют оскорбительные слова. Если вы отключили фильтр чата, вам не следует подавать жалобы на игроков за использование этих оскорбительных слов. Чтобы включить фильтры чата, нажмите здесь.
m.option_200_1=Имейте в виду, что то, что вы считаете оскорбительным и личным, может не восприниматься так всеми. Поэтому, пожалуйста, тщательно обдумайте, сочтут ли все этот чат оскорбительным. Если вы прочитали и поняли все это, но все же хотите отправить жалобу, нажмите здесь.
m.option_201_0=Вместо этого вы можете просто нажать здесь, чтобы игнорировать {0}, и вам не придется больше его слушать.
m.option_201_1=Если вы уверены, что это является спамом, нажмите "ОК", чтобы подать жалобу.
m.option_202_0=Мы понимаем, что этот игрок может портить вам удовольствие от игры, но лучший способ справиться с такими надоедливыми игроками — это игнорировать их, чтобы больше не беспокоиться о них. Нажмите здесь, чтобы игнорировать {0}.
m.option_203_0=Чтобы играть в эту игру, вам должно быть не менее 13 лет. Если кто-то в чате признается, что ему меньше 13 лет, пожалуйста, нажмите здесь, чтобы подать жалобу на него.\n\nНЕ используйте эту опцию, если вы просто подозреваете, что игрок несовершеннолетний, так как в чате за последние несколько минут должно быть доказательство. Если доказательств нет, вам следует отказаться от подачи жалобы. \n\nПожалуйста, руководствуйтесь здравым смыслом: если, например, человек утверждает, что ему 4 года, но при этом отлично печатает, то это явно неправда, и вам не следует подавать жалобу.
m.option_204_0=Оскорбительные имена недопустимы. Имейте в виду, что то, что вы считаете оскорбительным, может не восприниматься так всеми. Поэтому, пожалуйста, нажимайте здесь, чтобы подать жалобу, только если вы уверены, что все сочтут это имя оскорбительным.
m.option_206_0=Если нет сомнений, что это была личная информация, пожалуйста, нажмите здесь, чтобы подать жалобу.
m.option_207_0=Если вы считаете, что кто-то злонамеренно пытается вас обмануть, пожалуйста, нажмите здесь, чтобы отправить жалобу. Возможно, вы захотите сообщить этому игроку, что на него поступила жалоба, чтобы другие игроки вокруг вас тоже могли это услышать и принять меры предосторожности.
m.option_208_0=Если какой-либо игрок пытается выудить у вас имя пользователя или пароль прямо сейчас, либо уже сделал это и признается в этом в чате, вам следует нажать здесь, чтобы подать жалобу.
m.option_208_1=Если игрок уже завладел вашей учетной записью, вам необходимо связаться с нами через форму поддержки, чтобы восстановить доступ к учетной записи.\n\nОбратите внимание, что нам потребуется подтверждение владельца аккаунта, и мы можем получить его только путем проверки способа оплаты аккаунта.\n\nНажмите здесь, чтобы начать процесс восстановления вашего оплаченного аккаунта, который был взломан.
m.option_210_0=Вы должны использовать этот вариант только в том случае, если ни один из других вариантов не подходит для вашей жалобы. Нажмите здесь, чтобы вернуться и проверить, не подойдут ли другие варианты.
m.option_210_1=Если вы уверены, что другие варианты не подходят для вашей жалобы, и вы уверены, что игрок нарушил наши Условия предоставления услуг, пожалуйста, введите здесь краткое объяснение сути вашей жалобы.
