m.tf2_end=Кого это касается\: \n\nЯ подтверждаю ваше прибытие на Терминал Часового Механизма и получил необходимые данные о каталоге конкурента. Mann Co. благодарит вас за содействие в этом деле. \n\nВ качестве вознаграждения за вашу помощь мы перечисляем вам одну (1) реплику головного убора Mann Co. марки «Spiral Sallet». Возврат и обмен данной награды не предусмотрены, и Mann Co. не несёт ответственности за травмы, полученные при попытке использования указанной награды. \n\nС уважением, \n\nМистер Редди \nMann Co. \n«Мы продаём товары и ввязываемся в драки». \n\nИнформация в данном письме конфиденциальна и предназначена исключительно для адресата. Доступ к данному письму иным лицам не санкционирован. Если вы не являетесь предполагаемым получателем, вы не имеете права читать, использовать, обдумывать, поедать или обольщать информацию, содержащуюся в данном письме. Несоблюдение данного требования повлечёт за собой растерзание получателя медведями в полной мере, предусмотренной законом.
m.tf2_start=Здорово, верный покупатель\! \n\nВы, возможно, слышали, что я стал четвёртым по богатству человеком в Америке, превзойдя пятого по состоянию и убив ранее четвёртого в дуэли на гарпунах. Хотя всё это, разумеется, чистая правда (особенно часть про дуэль на гарпунах, которая была долгой и кровавой), этого далеко не достаточно. Четвёртое место, может, и подходит для ХИППИ, которые не узнали бы победу, даже если она подойдёт и предложит заплести им косички, но для Сакстона Хейла это точно недостаточно\! \n\nМистер Редди, мой бухгалтер, объяснил мне, что лучший способ подстегнуть доходы Mann Co. — это «выход на новые рынки». Я бы передал вам, как именно мы планируем это сделать, но пока он говорил, я немедленно занялся жимом от плеч, чтобы не умереть от скуки, и упустил тонкости. \n\nВсё, что вам нужно знать, дорогой покупатель, — мне нужен хороший человек, который доберётся до города под названием «Хейвен», храбро войдёт через одни из многочисленных врат и прорубится вниз до первого «Терминала Часового Механизма». Поскольку хорошего человека мы не нашли, вам придётся сделать это самостоятельно. Вы, разумеется, будете щедро вознаграждены\: я НЕ ПОЖАЛЕЮ ничего для сотрудника, который рисковал жизнью ради тривиальной задачи, порождённой моими эгоистичными прихотями. \n\nНе трудитесь связываться со мной напрямую по завершении, поскольку я буду слишком занят кикбоксингом с жирафами. Один из моих сотрудников разберётся с остальным. Удачи\: она вам понадобится\! \n\nИскренне ваш, \n\nСАКСТОН ХЕЙЛ \nАвстралиец \nГенеральный директор Mann Co.
m.title=СПИРАЛЬНЫЙ АПЛИНК
