m.firestorm_start=Здесь агент разведки Кора, на вашей текущей глубине установить связь сложно — надеюсь, вы получите это сообщение.  Вы сейчас находитесь в Цитадели Огненного шторма, какой-то древней крепости, которые, судя по всему, любят собирать на этой планете.  Это невероятно враждебный регион Часового механизма, без надлежащего снаряжения и талантливого отряда вы здесь долго не продержитесь. \n\nМы обнаружили слабый сигнал, указывающий на то, что какой-то артефакт экспедиции отряда «Альфа» находится в тронном зале этой цитадели.  Нам нужно, чтобы вы добыли этот артефакт — он может стать ценной зацепкой для выяснения их нынешнего местонахождения. \n\nНе буду вам лгать: ни одна команда, взявшаяся за эту миссию, не смогла вернуться из цитадели.  Как вы, несомненно, заметили, это место охвачено неестественным огнем, а по всем залам бродят легионы столь же неестественных ужасов.  Возможно, сейчас самое время повернуть назад и изготовить огнеупорное снаряжение.  Испытание огнем приведет лишь к тому, что вы сгорите. \n\nУдачи!
