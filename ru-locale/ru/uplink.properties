m.royal_start=Здесь агент «Кора» из разведки. Мы обнаружили в этом дворце ещё один разведывательный модуль отряда «Альфа».  Ваша задача — найти и изъять этот модуль. \n\nДворец «Роял Джелли» — странное место.  Похоже, это некий замок, который слизи переоборудовали под резиденцию для представителей своей «слизистой аристократии».  Эти благородные слизи, известные как «Роял Джелли», по слухам, правят своими бесчисленными верными подданными с помощью железного кулака. \n\nПо нашим данным, модуль находится где-то рядом с огромным скоплением слизи, так что вполне вероятно, что это «тронный зал» одного из Роял Джелли.  Если это так, будьте готовы к страшной битве — Королевские Слизи быстро впадают в ярость и любят использовать свой огромный вес.  Лучший вариант — найти способ подавить их естественные регенеративные способности. \n\nУдачи!
