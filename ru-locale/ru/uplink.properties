m.ignite_reward=Приветствуем, {0}\! В рамках специальной акции с Ignite вы имеете право получить бонусный набор предметов, которые помогут вам с легкостью начать предстоящее великое приключение! В приложении вы найдете специальный комплект доспехов и набор огненного оружия. \n\nУвидимся в Clockworks\!
m.instructions=Ниже перечислены подарки, которые вы можете отправить другим рыцарям.  Выберите подарок и введите имя рыцаря, которому вы хотите его подарить.  Подарить подарок очень просто!
