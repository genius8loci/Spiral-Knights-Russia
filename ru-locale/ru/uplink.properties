m.firestorm_start=Агент Разведки Кора на связи. На вашей текущей глубине связь работает с перебоями — надеюсь, вы получите это сообщение. Вы находитесь в Огнештормовой Цитадели — древней крепости, которую эта планета, похоже, коллекционирует. Это невероятно враждебный район Часового Механизма, и без подходящего снаряжения и талантливого отряда вы долго не продержитесь. \n\nМы засекли слабый сигнал, указывающий на присутствие некоего артефакта экспедиции Альфа-Отряда в тронном зале цитадели. Нам нужно, чтобы вы извлекли этот артефакт — он может стать ценной зацепкой для определения их нынешнего местонахождения. \n\nНе буду вам лгать — ни один отряд, принявший эту миссию, не вернулся из цитадели. Как вы наверняка заметили, она пылает неестественным пламенем, а легион столь же неестественных ужасов снуёт по каждому коридору. Самое время вернуться и выковать огнеупорное снаряжение. Испытание огнём лишь обожжёт вас. \n\nУдачи\!
