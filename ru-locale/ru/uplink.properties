m.ignite_reward=Приветствуем, {0}\! В рамках специальной акции с Ignite вы имеете право на бонусный набор предметов, разработанный для успешного старта в предстоящем великом приключении\! В приложении — особый комплект брони и набор огненного оружия. \n\nУвидимся в Часовом Механизме\!
m.instructions=Ниже перечислены подарки, которые вы можете отправить другим рыцарям. Выберите подарок и введите имя рыцаря-получателя. Дарить — это просто\!
