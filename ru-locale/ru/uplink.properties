m.tx_failed=Произошла ужасная ошибка, но нам удалось восстановить следующие предметы.\n\nПожалуйста, обратитесь в службу поддержки, если что-то по-прежнему не так.
m.unclaimed=Подтвердите получение этих предметов на данного рыцаря. Обратите внимание: после получения вы не сможете обменять эти предметы через Steam Trade в будущем.
m.wildwoods_start=Агент Разведки Кора на связи. Мы обнаружили модуль разведки, оставленный Альфа-Отрядом, где-то в этом лесу. Ваша миссия — найти и извлечь модуль. \n\nЭтот лес населён стаями диких зверей, которые оказались смертельно опасными для прошлых отрядов. По этой причине рыцари-техники расставили по территории Звериные Колокола. Удар по ним должен оглушить любых зверей, попавших в звуковую волну. \n\nУчтите также: рыцари-разведчики сообщают о присутствии ужасного существа невиданной мощи, что рыщет по этому лесу. Известный как «Снарболакс», он предстаёт тёмной массой клыков и когтей и кажется полностью невосприимчивым к нашему оружию. Если встретите его — постарайтесь найти путь к спасению как можно скорее. \n\nУдачи\!
