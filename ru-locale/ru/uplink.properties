m.metal_sonic=Спасибо за покупку Sonic CD в Steam!  В приложении вы найдете костюм и маску Металлического Соника.  Эти предметы — это костюмы, которые можно надевать поверх любой брони, что позволит вам выглядеть как Металлический Соник, когда захотите! \n\nОбратите внимание: экипировку можно надевать только в городах или на станциях «Арсенал».  Если вы — новый рекрут и только что выбрались из спасательной капсулы, отправляйтесь в лагерь спасателей.  Как только вы доберетесь до спасательного лагеря, вы сможете надеть костюм и маску Металлического Соника.
