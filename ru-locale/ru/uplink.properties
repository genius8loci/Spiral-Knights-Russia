m.tx_failed=Произошла серьезная ошибка, но нам удалось восстановить следующие предметы.\n\nЕсли проблема не устранена, обратитесь в службу поддержки.
m.unclaimed=Нажмите «Принять», чтобы забрать эти предметы на этого рыцаря. Обратите внимание: после получения этих предметов вы не сможете обменивать их через Steam.
m.wildwoods_start=Здесь агент разведки Кора, мы обнаружили разведывательный модуль, оставленный отрядом «Альфа» где-то в этом лесу.  Ваша миссия — найти и вернуть модуль. \n\nВ этом лесу обитают стаи диких зверей, которые в прошлом уже становились смертельной угрозой для отрядов. Из-за этого Технические рыцари разместили по всей территории «Звериные колокола».  Удар по ним должен оглушить всех зверей, попавших в зону действия создаваемой ими звуковой волны. \n\nИмейте в виду, что разведывательные рыцари сообщили о присутствии в этом лесу ужасного зверя, подобного которому мы еще не видели.  Известный как «Снарболакс», он выглядит как теневая масса клыков и когтей и, похоже, полностью неуязвим для нашего оружия.  Если вы столкнетесь с ним, постарайтесь как можно быстрее найти способ спастись. \n\nУдачи!
