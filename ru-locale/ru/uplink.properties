m.shard_bomb_reward=Внимание {0}\!  Недавно в следующие бомбы были внесены существенные изменения\: «Хрустальная бомба», «Осколки солнца», «Бомба с каменной солью», «Осколки сияющего солнца» и «Бомба с ионизированной солью».  \n\nМы уверены, что вам понравится новый принцип действия этих бомб, но при этом хотим, чтобы вы знали: мы очень серьезно относимся к подобным изменениям.  В приложении вы найдете подарок в знак благодарности за то, что вы приобрели одну или несколько из этих бомб до введения изменений.  Для получения более подробной информации посетите официальный форум Spiral Knights. \n\nПримите эти награды и удачных вам бомбардировок\!
