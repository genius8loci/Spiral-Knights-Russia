m.shard_bomb_reward=Внимание, {0}\! Недавно были внесены значительные изменения в следующие бомбы\: Crystal Bomb, Sun Shards, Rock Salt Bomb, Radiant Sun Shards и Ionized Salt Bomb. \n\nМы уверены, что вам понравится новый принцип работы этих бомб, но хотим, чтобы вы знали — мы относимся к подобным изменениям серьёзно. В приложении — благодарственный подарок за то, что вы вложились в одну или несколько из этих бомб до изменений. Подробнее — на официальном форуме Spiral Knights. \n\nПримите эти награды и приятных взрывов\!
