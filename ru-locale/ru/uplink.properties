m.metal_sonic=Благодарим за покупку Sonic CD в Steam\! В приложении — ваш Костюм и Маска Метал Соника. Эти предметы являются костюмами, которые можно надеть поверх любой брони, позволяя вам выглядеть как Метал Соник в любое время\! \n\nОбратите внимание: снаряжение можно экипировать только в городах или на Станции Арсенала. Если вы новобранец и только что выбрались из спасательной капсулы, доберитесь до Спасательного Лагеря. Там вы сможете надеть Костюм и Маску Метал Соника.
