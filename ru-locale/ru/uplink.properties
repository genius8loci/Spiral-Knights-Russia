m.ironclaw_start=Агент Разведки Кора на связи. Мы перехватили передачи гремлинов с этого объекта, свидетельствующие о строительстве некоего оружия для уничтожения Хейвена\! Ваша миссия — проникнуть на объект, уничтожить это оружие и спасти Хейвен\! \n\nИзвестное лишь как «Проект Рормулус», это оружие, как утверждают, неуязвимо для обычных атак. Вам придётся найти способ пробить его защиту. По данным разведки, оружие находится в глубине объекта. \n\nНо добраться до него будет непросто. Вы обнаружите, что гремлины мало заботятся о безопасности на рабочем месте — боевые ракеты летают во все стороны без остановки. Однако вы можете использовать «поляризационные стены» в испытательных зонах для блокировки летящих ракет. Ищите фиолетово-золотой переключатель для их активации. \n\nМы также обнаружили ещё один Модуль Разведки Альфа-Отряда где-то на этой фабрике. Извлеките его, если сможете\! \n\nУдачи\!
