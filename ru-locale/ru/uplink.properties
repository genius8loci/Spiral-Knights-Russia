m.ironclaw_start=Здесь агент разведки Кора. Мы перехватили сообщения гремлинов с этого объекта, из которых следует, что они создают какое-то оружие для уничтожения Хэйвена!  Ваша задача — проникнуть на объект, уничтожить это оружие и спасти Хэйвен от разрушения! \n\nИзвестный лишь как «Проект Роармулус», он, по слухам, неуязвим для обычных атак.  Вам придется найти способ пробить любую броню, которую оно использует.  По данным разведки, это оружие находится глубоко внутри объекта. \n\nНо добраться до него будет нелегко.  Вы обнаружите, что гремлины мало заботятся о безопасности рабочей среды, так как ракеты, похоже, летят во всех направлениях постоянно.  Однако вы сможете использовать «полярные стены», которые найдете в тестовых зонах, чтобы блокировать летящие ракеты.  Ищите фиолетово-золотой переключатель, чтобы активировать их. \n\nМы также обнаружили еще один разведывательный модуль отряда «Альфа» где-то на этом заводе.  Заберите его, если сможете\! \n\nУдачи\!
