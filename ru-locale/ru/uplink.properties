m.royal_start=Агент Разведки Кора на связи. Мы обнаружили ещё один Модуль Разведки Альфа-Отряда в этом дворце. Ваша миссия — найти и извлечь модуль. \n\nДворец Королевского Желе — странное место. Похоже, это некая крепость, которую слизни переоборудовали под резиденцию представителей своей слизистой аристократии. Известные как «Королевские Желе», эти благородные слизни, говорят, правят бесчисленными верными подданными железным кулакообразным отростком. \n\nПо данным разведки, модуль находится где-то вблизи огромного скопления слизней, так что вполне возможно, это «тронный зал» Королевского Желе. Если так — готовьтесь к яростному бою. Королевские Желе вспыльчивы и обожают швырять свою огромную тушу. Лучший способ — найти средство подавить их природную способность к регенерации. \n\nУдачи\!
