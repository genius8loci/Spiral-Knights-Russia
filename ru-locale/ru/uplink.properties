m.tf2_end=Уважаемые!\: \n\nЯ подтвердил ваше прибытие в терминал «Часовой механизм» и получил необходимые данные о каталоге нашего конкурента. Компания Mann Co. благодарит вас за содействие в выполнении этой задачи. \n\nВ благодарность за вашу помощь мы перечислили вам одну (1) копию головного убора «Спиральный шлем» бренда Mann Co. Возврат или обмен данного вознаграждения не производится, и Mann Co. не несет ответственности за любые травмы, полученные при попытке использования указанного вознаграждения. \n\nС уважением, \n\nМистер Редди \nMann Co. \n«Мы продаем товары и ввязываемся в драки». \n\nИнформация в этом письме является конфиденциальной и предназначена исключительно для адресата. Доступ к этому письму для кого-либо еще не разрешен. Если вы не являетесь адресатом, вам запрещается читать, использовать, обдумывать, съедать или соблазнять информацию, содержащуюся в этом письме. Невыполнение данного требования приведет к тому, что получатель будет растерзан медведями в полной мере, предусмотренной законом.
m.tf2_start=Привет, уважаемый клиент! \n\nВозможно, вы недавно слышали, что я стал четвертым самым богатым человеком в Америке, обогнав по состоянию пятого в рейтинге и убив прежнего четвертого в дуэли на гарпунах. Хотя это, конечно, чистая правда (особенно часть про дуэль на гарпунах, которая была долгой и кровавой), этого явно недостаточно. Четвертое место может и подойдет ХИППИ, которые не узнали бы победу, даже если бы она подошла к ним и предложила заплести им косички, но для Сакстона Хейла этого чертовски мало! \n\nМистер Редди, мой бухгалтер, объяснил мне, что лучший способ подстегнуть рост доходов Mann Co. — это «открыть новые рынки». Я бы рассказал вам, как именно мы планируем это сделать, но пока он говорил, я сразу же начал делать жим лежа, чтобы не умереть от скуки, и пропустил все сложные детали. \n\nВсе, что вам нужно знать, уважаемый клиент, — это то, что мне нужен хороший человек, который найдет дорогу в город под названием «Хейвен», смело войдет в одни из многочисленных ворот там, а затем пробьется к первому «Терминалу Часового механизма». Поскольку мы не смогли найти подходящего человека, вам придётся заняться этим самостоятельно. Конечно, вы получите щедрую награду\: нет НИЧЕГО, чего бы я не сделал для сотрудника, рискнувшего жизнью ради пустякового задания, вызванного моими эгоистичными прихотями. \n\nНе беспокойтесь, связываясь со мной напрямую, когда закончите, — я буду слишком занят кикбоксингом с жирафами, чтобы обратить на это внимание. Дальше этим займется один из моих других сотрудников. Удачи\: она тебе понадобится! \n\nС уважением, \n\nСЭКСТОН ХЕЙЛ \nАвстралиец \nГенеральный директор, Mann Co.
