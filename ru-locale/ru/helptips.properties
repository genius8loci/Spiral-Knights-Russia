m.activate_grim_gate=«Мрачные врата» активируются, когда все живые члены отряда стоят на них.
m.alpha_recon=Этот разведывательный модуль оставил один из членов отряда «Альфа». Содержащаяся в нём запись скопирована в ваш «Арсенал».
m.atg_astation=Станции Арсенала позволяют вам менять снаряжение и получать доступ к комплектам снаряжения за пределами безопасных зон, таких как Терминалы и Подгорода!
m.atg_blocks=Ударьте по разрушаемому блоку, чтобы уничтожить его!
m.atg_blocks2=Блоки могут даже влиять друг на друга!
m.atg_button=Стоя на КНОПКЕ, можно открыть запертые двери.
m.atg_cblocks=Ударьте по КРИСТАЛЛИЧЕСКОМУ БЛОКУ, чтобы уничтожить другие кристаллические блоки того же цвета.
m.atg_crowns=КОРОНЫ используются для покупки предметов и оплаты других услуг.
m.atg_eblocks=ВЗРЫВЧАТЫЕ БЛОКИ нанесут урон всему, что находится вокруг них, при попадании.
m.atg_gblocks=Удар по БЛОКУ-ПРИЗРАКУ может удалить целое поле блоков — включая неразрушимые блоки!
m.atg_healpad=Встаньте на ГЕНЕРАТОР СЕРДЕЦ, чтобы восстановить здоровье!
m.atg_healthcap=Используйте КАПСУЛЫ ЗДОРОВЬЯ из панели быстрого доступа, чтобы лечиться.
m.atg_heat=Подбирайте ТЕПЛО, чтобы повышать уровень ваших предметов и улучшать их со временем!
m.atg_pots=Некоторые предметы, такие как горшки, можно бросать в переключатели И врагов!
m.atg_pplate=Поднимите и поместите СТАТУЮ на ДАТЧИК ДАВЛЕНИЯ, чтобы держать двери открытыми.
m.atg_retraps=Некоторые переключатели могут изменить направление волны ловушки. Теперь вы можете пересекать ловушки в обоих направлениях!
m.atg_shield=Окружены? Используйте ЩИТ, чтобы оттолкнуть атакующих врагов.
m.atg_statustraps=Будьте осторожны! Некоторые ловушки могут наносить урон И вызывать вредные статусные эффекты.
m.atg_switch=Переключатель вне досягаемости?  Бросьте в него горшок или выстрелите из пистолета\!
m.atg_teblocks=ВРЕМЕННЫЕ ВЗРЫВНЫЕ БЛОКИ будут отсчитывать время до 0, прежде чем взорваться и нанести урон.
m.atg_togswitch=Переключатели могут открывать И закрывать двери.
m.atg_togtraps=Некоторые ловушки всегда активны.  Найдите выключатель, чтобы их отключить!
m.atg_torto=Тортодроны патрулируют Часовые механизмы.  Они не будут атаковать, пока их не атакуют первыми — но будьте осторожны, разгневанные они становятся страшными и смертоносными противниками.
m.atg_traps=Смотрите под ноги!  Подождите, пока ЛОВУШКИ опустятся, прежде чем переходить через них.
m.atg_treasure=ЗЕЛЕНЫЕ сундуки содержат короны и другие полезные предметы! КРАСНЫЕ сундуки встречаются реже, чем зеленые, и содержат более ценные предметы! Сундуки в форме СЕРДЕЦ содержат сердца, которые восстанавливают ваше здоровье.
m.atg_ublocks=Некоторые блоки нельзя разрушить обычными атаками.
m.atg_vials=Накладывайте на врагов различные статусные эффекты, бросая в них ФЛАКОНЫ!
m.atg_vitapods=Подбирайте VITAPODS, чтобы временно увеличить свой максимальный запас здоровья до возвращения в Хейвен.
m.back_to_haven=Этот путь приведет вас обратно в Хейвен, если вам не удастся пройти через Мрачные врата Демона.
m.battle_arena=Каждый уровень боевой арены сложнее предыдущего, но победа всегда дает вам шанс сократить потери и двигаться дальше.  Единственное правило: каждый должен сразиться хотя бы один раз!
m.battle_arena_1=Добро пожаловать на арену сражений! Единственное правило: вы должны сразиться хотя бы один раз, чтобы пройти дальше. Если вы одержите победу, вам решать, сражаться ли за еще большую славу!
m.battle_arena_2=Победа за вами! Но покинут ли эти воины этот священный зал славных сражений и будут ли они забыты, или же продолжат сражаться с еще более ужасающими врагами в надежде получить награды Короля Арены?
m.battle_arena_3=Поистине, вы в числе величайших воинов, когда-либо живших на свете! Награды Короля Арены ждут вас!
m.bramble=Некоторые участки заросли колючими кустами, которые поранят тебя, если ты пробежишь через них!
m.branch_battle_warning=Перед тобой лежат два пути. Какой из них ты выберешь?
m.branch_path_warning=Пока что ты в безопасности. Перед тобой лежат два пути. Прислушайся к отчетам разведывательных модулей и выбери свой путь.
m.can_resurrect=Один из членов отряда даровал тебе «Искру жизни». Нажми «АТАКА» [[ACTION]], чтобы воскреснуть.
m.candlestick_keep=Остерегайся ужасных Грималкинов, скрывающихся в темноте!  Этих проклятых призраков невозможно уничтожить, и единственное, чего они по-настоящему боятся, — это свет зачарованных свечей.  Зажгите их углями и найдите убежище в их сияющих объятиях.
m.choice=Сделайте свой выбор.
m.clockwork_tunnels=Из Часовых механизмов исходят странные звуки и энергия. Проникните вглубь и разгадайте их тайны, но будьте осторожны, чтобы не попасть в механизмы.
m.confirm_energy=Нажмите АТАКА [[ACTION]], чтобы подтвердить расходование энергии.
m.connecting=Подключение...{0}%
m.controls=Нажмите [[TOGGLE_HELP]] в любое время, чтобы просмотреть управление.
m.converse=Используйте клавиши со стрелками и пробел для навигации по диалогу.
m.danger_module=Внимание! Путь за этой точкой гораздо опаснее, чем можно было бы ожидать на этом уровне. Войдя сюда, вы не сможете вернуться назад, пока не выполните все задания внутри.\n\nОднако, если вам удастся выйти победителем, вы будете вознаграждены за свою храбрость. Входите на свой страх и риск!
m.dead=Нажмите ATTACK [[ACTION]] для перехода в режим зрителя.
m.design=Нажмите АТАКА [[ACTION]], чтобы разместить.\nНажмите ЗАЩИТА [[DEFEND]], чтобы убрать.\nНажмите ПРЕД. ОРУЖИЕ [[PREV_WEAPON]], чтобы повернуть по часовой стрелке.\nНажмите СЛЕД. ОРУЖИЕ [[NEXT_WEAPON]], чтобы повернуть против часовой стрелки.
m.devilish_drudgery=Офисные приспешники Подземного мира — это недовольная толпа, нападающая на любого постороннего при встрече.  Хотя сами по себе они не представляют большой угрозы, ситуация может резко ухудшиться, если их заметит один из их начальников.  Будьте осторожны!
m.elevator=Лифт активируется, когда все живые члены группы стоят на нем.
m.energy=Нажмите ATTACK [[ACTION]], чтобы потратить энергию на это устройство.
m.event_locked_module=Внимание! За этими воротами находится неизвестное место. Войдя туда, вы не сможете вернуться назад, пока не выполните все задания внутри.\n\nОднако, если вам удастся выйти победителем, вы будете вознаграждены за свою храбрость. Входите на свой страх и риск! \n\nВ этой комнате у вас будет дополнительный шанс получить сокровища, спрятанные внутри.
m.event_module=Предупреждение! За этими воротами находится неизвестное интересное место. Войдя туда, вы не сможете вернуться назад, пока не выполните все задания внутри.\n\nОднако, если вам удастся выйти победителем, вы будете вознаграждены за свою храбрость. Входите на свой страх и риск!
m.final_test=Ты дошел до этого места, рыцарь, но твой финальный экзамен потребует быстрого мышления и еще более быстрых ног.
m.graveyard=Кладбища — это неестественные места, мир между мирами, где собираются темные духи, жаждущие жизни любой живой души, которая должна пройти мимо.  Ты должен поспешить и найти выход как можно быстрее, пока эти призраки не пробудились и не начали преследовать тебя!
m.interact=Нажмите АТАКА [[ACTION]], чтобы активировать.
m.lichenous_lair=Лихи — это странные, инопланетные разновидности слизи, которые, как полагают, прибыли в этот мир на большом метеорите. Хотя одноклеточная колония в основном безвредна, они могут быстро объединиться в самого ужасного врага. Не дайте им смешаться!
m.lift=Нажмите ATTACK [[ACTION]] для поднятия объекта.
m.loading=Загрузка...{0}%
m.loading0=Основные элементы управления игрой можно просмотреть в любое время, нажав [[TOGGLE_HELP]].
m.loading1=Механизмы под поверхностью циклически меняют уровни в режиме реального времени. За одно путешествие вы никогда не увидите всех уровней, которые может предложить мир. Только настоящий искатель приключений сможет раскрыть все секреты!
m.loading10=Если вы получите удар током, ваше тело будет периодически сотрясаться от проходящего через него электричества. Это прервет любое ваше действие.
m.loading11=Если на вас будет наложено проклятие, часть вашего оружия будет помечена проклятием. Попытка использовать оружие, помеченное проклятием, нанесет вам урон.
m.loading12=Если у вас возникнут какие-либо проблемы, нажмите F2, чтобы отправить отчет об ошибке.
m.loading13=Если вы являетесь лидером группы, вы можете удалить любого игрока из своей группы. Щелкните значок статуса игрока, которого хотите удалить, и выберите «Удалить из группы».
m.loading14=Не разглашайте данные своей учетной записи. Администраторы игры никогда не будут спрашивать у вас пароль.
m.loading15=Чтобы добавить друга в список друзей, просто щелкните по нему и выберите «Добавить в друзья». Чтобы увидеть список друзей и узнать, чем они занимаются, нажмите кнопку «Социальные сети».
m.loading16=Использование щита поможет вам полностью избежать урона, так что обязательно используйте его! Нажмите «[[DEFEND]]», чтобы защититься. По мере получения урона щит станет красным и в конце концов сломается. Щит должен восстановиться, прежде чем его можно будет использовать снова.
m.loading17=Загляните на forums.spiralknights.com. Присоединяйтесь к обсуждению!
m.loading18=Загляните на wiki.spiralknights.com, где отважные искатели приключений делятся своими открытиями из глубин Часового механизма!
m.loading2=Доспехи и шлемы не только обеспечивают физическую защиту, но и могут защитить вас от статусных эффектов. Правильное сочетание значительно повысит ваши шансы на выживание.
m.loading3=Вы можете воскресить другого игрока, щелкнув по его портрету и подарив ему «Искру жизни»
m.loading4=По Часовым механизмам бродят редкие монстры, дающие уникальные предметы. Вы уже нашли каких-нибудь?
m.loading5=Вы можете посмотреть, чем занимаются ваши друзья, нажав на кнопку «Социальные сети» в левом нижнем углу экрана. Вы даже можете мгновенно присоединиться к ним, если в их группе есть место.
m.loading6=Если вы отравлены, вы не сможете лечить себя. Старайтесь не получать слишком много урона, пока эффект не пройдет.
m.loading7=Если вы загорелись, вы будете регулярно получать урон, пока огонь не погаснет. Однако это не помешает вам передать его монстрам. Подойдите поближе и поделитесь любовью!
m.loading8=Если вы замерзли, вы не сможете двигаться или поворачиваться, но сможете атаковать. Если вы путешествуете с другими, попросите их разбить лед своими лучшими атаками.
m.loading9=Если вас оглушат, вы будете двигаться и атаковать медленнее, чем обычно. Это может сделать вас легкой мишенью для крупных монстров, от которых вы обычно можете убежать, так что будьте осторожны!
m.lock_guard=Защищайте и лечите себя и союзников от урона с помощью Щита Стража! \n\nДержите врагов на расстоянии благодаря повышенной сопротивляемости урону и атакуйте с помощью более быстрых мечей и бомб!
m.lock_howto=* По карте разбросано несколько контрольных точек \n* Захват и удержание контрольной точки со временем увеличивает счет вашей команды \n* Чтобы захватить контрольную точку, стойте на ней, пока она не изменит цвет на цвет вашей команды \n* Команда с наибольшим счётом в конце матча ПОБЕЖДАЕТ! \n
m.lock_recon=Станьте невидимыми и помечайте врагов для нанесения увеличенного урона с помощью Поля сбоя! \n\nДержите врагов в напряжении благодаря сокращенному времени перезарядки оружия и более быстрым пушкам и бомбам!
m.lock_striker=Обогните любого с помощью рывка Striker, нанесите сильный удар, а затем оставьте их в пыли! \n\nСтаньте лучшим наносителем урона благодаря увеличенному общему урону от атак и самому быстрому мечу!
m.lost_knights=Вы обнаружили пропавших рыцарей...
m.mineral_tut=Атакуйте, чтобы разрушить минералы и поднять их! Можно нести по одному за раз.
m.mission_trap_chamber=Все дроны могут двигаться несколькими разными способами.
m.mission_trap_chamber_2=Их можно убить, но часто можно просто обойти.
m.mission_trap_chamber_3=Все дроны в золотых доспехах неуязвимы.
m.mission_trap_chamber_4=Дроны также могут наносить урон по статусам.
m.need_key_grim_gate=Для активации «Мрачных ворот» требуется идентификационная карта демона.
m.new_sprite=У вас появился боевой спрайт! Нажмите [[SPRITE_ACTION_1]], чтобы использовать боевую способность вашего спрайта!
m.p_dz_schematic_heist=Обнаружен несанкционированный доступ к нашей библиотеке схем. Отправлена команда безопасности. Начата изоляция.
m.party_button=Кнопка группы активируется, когда все живые члены группы стоят на ней.
m.party_locked_warning=ПРЕДУПРЕЖДЕНИЕ! При использовании этого лифта ваша группа будет заблокирована до конца миссии.
m.party_nosplit_warning=ПРЕДУПРЕЖДЕНИЕ! Вы не можете разделить группу во время этой миссии.
m.plan_o_attack=На мониторе отображаются показания, поступающие с прототипа огромной боевой машины под названием «Проект R».
m.poi=Нажмите АТАКА [[ACTION]], чтобы осмотреть.
m.pressure_pads=Эти специальные кнопки срабатывают только тогда, когда на них что-то давит. Попробуйте использовать эту статую, чтобы удерживать одну из них.
m.recon=Нажмите ATTACK [[ACTION]], чтобы активировать модуль разведки.
m.rescue_door_sk=Я почти открыл эту дверь. Пока я этим занимаюсь, спасите пленных рыцарей в этом районе!
m.scenario_compound_gremlin=Остальные не должны узнать.  Заставьте их замолчать. -H
m.scenario_experiment=Похоже, что определенные виды монстров привлекают различные комбинации минералов, найденных здесь, в Часовых механизмах.
m.scenario_failedparty=Свеча гаснет!  Они идут! Прокляну Калема за то, что он пошел за этим сокровищем...
m.scenario_fiendbook_1=Как рисовать адские символы
m.scenario_fiendbook_2=5 способов умилостивить своего начальника
m.scenario_fiendbook_3=Апокалипсис и ты
m.scenario_fiendbook_4=Четыре способа вызвать конец света
m.scenario_fiendbook_5=Что делать, если вы призывали не того адского повелителя
m.scenario_fiendnotice_1=В связи с постоянной низкой производительностью оплачиваемых отпусков и бесплатного кофе в комнате отдыха не будет.
m.scenario_giantsword=На боковой стороне клинка выгравирована какая-то карта звезд.
m.scenario_roarmulus_a=На мониторе отображаются показания, поступающие с прототипа огромной боевой машины под названием «Проект R».
m.scenario_roarmulus_b=«Проект R» почти завершен. Нам нужно собрать больше металлолома!
m.scenario_torin=На блекнущей надписи написано\: «Здесь покоится Торин, рыцарь Альмира».
m.shop=Нажмите АТАКА [[ACTION]], чтобы просмотреть товары продавца.
m.sl_elevator_active=Для открытия требуется Ключ Тени.\nКлючи Тени можно получить случайным образом из ящиков с секретами или купить в Складе снабжения.
m.sl_elevator_closed=В данный момент недоступно.
m.sprite_cooldown=После использования любого навыка спрайта необходимо выждать время восстановления всех навыков, прежде чем использовать их снова.
m.statue_secret=Тяжелые статуи можно поднимать и ставить на датчики давления, чтобы открыть секреты и сокровища!
m.talk=Нажмите ATTACK [[ACTION]], чтобы начать разговор.
m.terminal_1=Добро пожаловать, путешественник, это Терминал Часового Механизма. Отдохни и смени снаряжение. \n\nВоспользуйся лифтом, чтобы вернуться в Хейвен или спуститься на более опасный уровень Часового Механизма.
m.test_lobby=Добро пожаловать, тестеры! Прежде чем отправиться в Часовой Механизм, не стесняйтесь забрать себе что-нибудь из замечательных вещей у торговца слева. \nУгли в дальнем правом углу позволят повысить уровень оружия, как только вы соберете их достаточное количество и перейдете на следующий этаж. \nУдачи, отважные рыцари!
m.tg1_barrier=Если вы начнете чувствовать себя подавленным, воспользуйтесь силовыми барьерами, подобными тому, что находится справа от вас, чтобы передохнуть. Монстры и снаряды не могут проходить через них.
m.tg1_button=Если дверь не открывается, поищите под блоками скрытую кнопку на полу, чтобы открыть ее.
m.tg1_crowns=Короны — это валюта Часового механизма. Вы можете использовать их для покупки всевозможных вещей, таких как новое оружие и доспехи. Во время совместной игры каждый член группы получает короны, когда кто-либо их подбирает.
m.tg1_end=Эй, ты справился! Это просто здорово, честно. Ты только что избавил меня от кучи бумажной волокиты, так что спасибо. Надеюсь, эти росомахи не стали для тебя слишком неожиданными. Иди к лифту, и мы считаем эту экспедицию завершённой.
m.tg1_heat=Ты, наверное, заметил, что монстры оставляют после себя такие маленькие угли. Угли дают тебе тепло. По мере наполнения индикатора тепла пламя рядом с твоим здоровьем будет расти. Если ты доберёшься до выхода, не погибнув, тепло будет передано твоим оружиям и доспехам. Со временем это повысит их уровень и сделает их сильнее. Во время игры с другими игроками каждый член группы получает тепло, когда кто-нибудь подбирает уголь.
m.tg1_overgrown_1=Следующие несколько зон я оставляю на ваше усмотрение. Они довольно заросшие, так что будьте начеку и ищите монстров в высокой траве. Некоторые из них очень искусно прячутся в тени. Мне становится не по себе, когда я об этом думаю.
m.tg1_overgrown_2=Похоже, вы знаете, как себя вести. Это хорошо, потому что последняя зона уже совсем близко.
m.tg1_partypad_1=Иди в комнату впереди, где находится «парти-пад». Ты почти закончил.
m.tg1_partypad_2=Это «парти-пад». Это большая кнопка на полу, которая активируется только тогда, когда все члены группы стоят на ней. Часто они открывают двери, но иногда это не всё...
m.tg1_shield_1=Давайте сразу же разберемся с одним из важнейших инструментов выживания — вашим щитом. Удерживайте кнопку [[DEFEND]], чтобы защищаться щитом. Во время защиты вы полностью выдержите большинство атак со всех сторон. Стреляющие роботы в следующем коридоре не должны стать для вас проблемой, если вы будете защищаться, пробегая мимо них.
m.tg1_shield_2=По мере поглощения урона ваш щит из зеленого станет красным и в конце концов сломается. Как только он сломается, вы не сможете защищаться, пока он не восстановится, так что будьте осторожны!
m.tg1_welcome=Добро пожаловать на тренировочную площадку, новобранец. В этом заброшенном участке Часового механизма вы найдете зоны, которые мы построили, чтобы обучить вас тонкому искусству не погибать ужасной смертью. Так что прислушайся к этим полезным советам, приготовь оружие и вперед!
m.tg2_crystal=Кристаллические блоки похожи на разрушаемые блоки, за исключением того, что при разрушении они также уничтожают соединенные с ними кристаллические блоки того же цвета.
m.tg2_end=Отлично! После еще одного успешного прохождения Тренировочной площадки ты уже должен был освоить азы. Скоро вы сможете самостоятельно исследовать глубины Часового механизма.
m.tg2_pickups=Предметы — это предметы, которые помещаются в ваш пояс, видимый в верхней части экрана. Они не могут покинуть Часовой механизм и превратятся в прах, как только вы вернетесь в город. Считайте их бонусами и предметами, которые можно использовать по своему усмотрению.
m.tg2_shield=Впереди вас ждёт ещё одна отличная возможность использовать щит. Помните, что защищаться щитом можно, удерживая нажатой клавишу X.
m.tg2_vials_1=Флаконы — это один из видов предметов, которые можно подбирать. При броске они высвобождают содержащиеся в них алхимические вещества, вызывая стихийный взрыв. Вы можете попробовать их в следующей комнате.
m.tg2_vials_2=В следующей комнате у вас будет возможность попробовать использовать флаконы. Просто нажмите цифровую клавишу (от 1 до 5), соответствующую предмету в вашем поясе в верхней части экрана. При этом флакон будет заряжен. Нажмите кнопку атаки, чтобы бросить его.
m.tg2_vials_3=Теперь, когда вы освоили использование предметов, давайте применим полученные знания в боевой обстановке.
m.tg2_welcome=Добро пожаловать обратно на тренировочную площадку. Эта площадка предназначена для того, чтобы познакомить вас со специальными предметами, которые можно найти в Clockworks и которые называются «предметами».
m.tg3_charge_1=Рыцари Спирали способны высвобождать скрытые силы, заключенные в оружии, которое они используют, — это так называемые «заряженные атаки». Заряженные атаки мощнее стандартных атак и часто могут вызывать специальные эффекты.
m.tg3_charge_2=Чтобы выполнить заряженную атаку мечом или пистолетом, нажмите и удерживайте кнопку АТАКА. После атаки начнется зарядка оружия. Как только заряд достигнет максимума, отпустите кнопку АТАКА, чтобы нанести заряженную атаку.
m.tg3_charge_3=Теперь, когда вы знаете, как выполнять заряженную атаку, давайте применим это в более сложной схватке. Зарядите оружие и нанесите удар в нужный момент, когда враг будет уязвим. Удачи!
m.tg3_end=Похоже, вы хорошо освоили основы. Думаю, вы готовы присоединиться к остальным новобранцам в Воротах Воробья. Там вы научитесь действовать в составе отряда. Там много новобранцев, которые теперь зависят от вас. Отличная работа!
m.tg3_final=Между тобой и лифтом, ведущим отсюда, осталась всего одна комната. Вспомни все, чему ты научился до сих пор, и у тебя все получится... по крайней мере, так гласит теория. Постарайся не погибнуть, ладно?
m.tg3_ghost=Блоки-призраки уничтожают любые блоки, соединенные с ними, даже неразрушимые!
m.tg3_goldkey=Золотые ключи — это еще один тип подъемных предметов. Подбирайте их и используйте на золотых дверях. Для каждой золотой двери, которую вы найдете на уровне, где-то всегда есть золотой ключ.
m.tg3_lift_1=Пора проявить силу! Некоторые предметы, с которыми вы сталкиваетесь, можно поднимать, переносить или бросать. Подойдите к этим глиняным горшкам и нажмите «АТАКА», когда увидите значок действия.
m.tg3_lift_2=Дверь впереди заперта, но вы можете открыть её с помощью переключателя слева от вас. Попробуйте бросить в переключатель глиняный горшок. Они очень пригодятся в таких случаях, если у вас под рукой нет оружия.
m.tg3_welcome=Добро пожаловать обратно на Учебную площадку. На этом последнем уровне вы узнаете последние важные вещи, которые вам понадобятся как исследователю Механических часов. Поднимитесь по рампе и начнем!
m.tg_doors=Двери можно открывать разными способами.
m.tg_end=Эй, ты справился! Это просто здорово, правда. Ты только что избавил меня от кучи бумажной работы, так что спасибо. Надеюсь, эти ретроде не стали для тебя слишком большим сюрпризом. Иди к лифту, и мы считаем эту экспедицию завершенной.
m.tg_heat=Сбор углей тепла повысит уровень твоего снаряжения, когда ты дойдешь до лифта.
m.tg_heat_short=Собери тепло, чтобы повысить уровень своего снаряжения!
m.tg_pots=Некоторые предметы можно поднять и использовать или даже бросить через комнату. Попробуй бросить горшок в тот выключатель.
m.tg_shield=Нажми [[DEFEND]], чтобы поднять щит и блокировать атаки.
m.tg_welcome=Добро пожаловать на тренировочную площадку, новобранец. В этом заброшенном уголке Часового механизма ты найдёшь зоны, созданные специально для того, чтобы научить тебя искусству избегать ужасной гибели. Так что прислушайся к этим полезным советам, приготовь оружие и вперед!
m.tglobby_equip=В Часовом механизме используй станции «Арсенал», чтобы сменить снаряжение.
m.tglobby_vitapod=Витаподы временно увеличивают твой максимальный запас здоровья до тех пор, пока ты не вернешься в город.
m.token_trader_info=Штаб-квартира Спирали предлагает избранным рыцарям специальные предметы в обмен на особые жетоны, найденные в Часовых механизмах. Эти жетоны часто получают за победу над свирепыми боссами и являются доказательством храбрости их владельца.
m.treasure_vault_sky_islands_day=Расслабьтесь! Вдохните аромат цветов. Наслаждайтесь днем под солнцем. Вы это заслужили!
m.tut_attack=Используйте [[ACTION]] для атаки.
m.tut_bash=Когда ваш щит заряжен, нажмите [[SHIELD_BASH]], чтобы ударить и оглушить монстров!
m.tut_breakable=Некоторые блоки, подобные этим, можно разбить. Атакуйте их, чтобы расчистить путь.
m.tut_buttons=Не все кнопки находятся на виду. Оглянитесь вокруг! Иногда они спрятаны под блоками.
m.tut_charge=Удерживайте [[?ACTION]] до полного заряда, а затем отпустите, чтобы атаковать!
m.tut_chromalisks=Те хроматические детеныши впереди могут хлестать вас своими языками издалека. Старайтесь не стоять лицом к ним, когда они готовятся к удару.
m.tut_clearing=Атакуйте с помощью [[ACTION]].
m.tut_dash=Уклоняйтесь от атак монстров, нажимая [[DODGE]].
m.tut_explosive=Взрывные блоки наносят урон всему, что находится рядом с ними, когда взрываются. В том числе и вам! Уничтожайте их с безопасного расстояния из пистолета.
m.tut_explosive2=Переключитесь на пистолет с помощью [[NEXT_WEAPON]].
m.tut_fighting=Наведите курсор мыши на врагов и атакуйте с помощью [[ACTION]].
m.tut_ghost=Блоки-призраки уничтожат все блоки, соединенные с ними, даже неразрушимые\!
m.tut_golddoor=Найдите Золотой ключ, чтобы открыть эту дверь!
m.tut_goldkey=Поднимите и используйте на Золотых дверях!
m.tut_hearts=Разрушьте эти блоки, чтобы получить сердца. Сердца восстанавливают ваше здоровье. Вы не можете подбирать их, пока они вам не понадобятся.
m.tut_hearts_short=Если вы ранены, используйте Сердца, чтобы исцелиться!
m.tut_important_object=Поднимите, чтобы продолжить!
m.tut_jelly_cubes=Осторожно! Впереди стая диких желеобразных кубов. Когда вы подойдете достаточно близко, вы автоматически нацелитесь на ближайшего монстра. Они будут подсвечены столбом света.
m.tut_lever=Двери часто можно открыть, найдя нужный переключатель. Попробуйте ударить по этому переключателю из пистолета!
m.tut_lever_alt=Переключатели могут открывать двери. Попробуй бросить горшок или выстрелить в этот из пистолета\!
m.tut_miniboss=Ты почти добрался до спасательного лагеря, пробеги через силовой барьер впереди\!
m.tut_move=Используй [[?MOVEMENT]] для перемещения.
m.tut_move_short=Используйте [[?MOVEMENT]] для перемещения.
m.tut_pot_short=Поднимите и бросьте!
m.tut_shield=Нажмите и удерживайте [[DEFEND]], чтобы блокировать атаки.
m.tut_shrubs=Попробуйте расчистить эти кусты. Растения и другие разрушаемые объекты часто скрывают сокровища.
m.tut_switches=Двери часто можно открыть, найдя рядом нужный переключатель. Оглянитесь вокруг. Иногда они спрятаны под блоками.
m.tut_target=Ударьте, чтобы продвинуться\!
m.tut_treasure=Блоки с сокровищами — это всегда удачная находка\! В них есть монеты и полезные предметы.
m.tut_victory=Ты справился\! Иди вперед, чтобы войти в лагерь спасателей.
m.tut_weapons=Ты можешь переключаться между экипированным оружием с помощью [[NEXT_WEAPON]]. Попробуй экипировать пистолет.
m.tut_weapons_short=Используй [[NEXT_WEAPON]], чтобы переключаться между экипированным оружием.
m.tut_welcome=Мы приняли твой сигнал бедствия, новобранец. Твоя первая цель — добраться до Хейвена, где мы создали аванпост. Ты, вероятно, немного ошеломлен после крушения, поэтому я расскажу тебе об основах. Дорога может быть опасной, так что приготовь свой меч и будь начеку. Удачи!
m.unlock=Нажми ATTACK [[ACTION]], чтобы использовать Серебряный ключ.
m.unlock_gold=Нажмите кнопку «АТАКА» [[ACTION]], чтобы использовать Золотой ключ.
m.unlock_grim_gate=Нажмите кнопку «АТАКА» [[ACTION]], чтобы использовать Проклятую идентификационную карту \n\nПРЕДУПРЕЖДЕНИЕ\: Если эти Мрачные врата будут открыты, группа окажется заблокированной и останется в таком состоянии на протяжении всей миссии. Тщательно выбирайте членов своей группы\!
m.unlock_shadow=Нажмите ATTACK [[ACTION]], чтобы использовать Теневой ключ \n\nПРЕДУПРЕЖДЕНИЕ\: Если этот лифт будет разблокирован, группа окажется запертой и останется в таком состоянии на протяжении всего прохождения Логова Теней. Выбирайте членов группы с умом\!
m.wolver_den=Волверы — это очень приспособленные стайные звери, чьи хищнические инстинкты сопоставимы только с их быстрыми рефлексами.  Они играют со своей добычей, танцуя вокруг нее, и в конце концов нападают сзади.  Держите клинок под рукой.
m.zone=Нажмите АТАКА [[ACTION]], чтобы выйти из текущей зоны.
