m.activate_grim_gate=Мрачные Врата активируются, когда все живые члены отряда встанут на них.
m.alpha_recon=Этот модуль разведки был оставлен одним из членов Альфа-Отряда. Запись, содержащаяся в нём, была скопирована в ваш Арсенал.
m.atg_astation=Станции Арсенала позволяют менять снаряжение и загружать раскладки за пределами безопасных убежищ вроде Терминалов и Подгородов\!
m.atg_blocks=Ударьте по разрушаемому блоку, чтобы уничтожить его\!
m.atg_blocks2=Блоки могут даже воздействовать друг на друга\!
m.atg_button=Встав на КНОПКУ, можно открыть запертые двери.
m.atg_cblocks=Ударьте по КРИСТАЛЬНОМУ БЛОКУ, чтобы уничтожить все кристальные блоки того же цвета.
m.atg_crowns=КРОНЫ используются для покупки предметов и оплаты различных услуг.
m.atg_eblocks=ВЗРЫВНЫЕ БЛОКИ при ударе нанесут урон всему вокруг.
m.atg_gblocks=Удар по ПРИЗРАЧНОМУ БЛОКУ может уничтожить целое поле блоков — включая неразрушимые\!
m.atg_healpad=Встаньте на ГЕНЕРАТОР СЕРДЕЦ, чтобы восстановить здоровье\!
m.atg_healthcap=Используйте КАПСУЛЫ ЗДОРОВЬЯ из панели быстрого доступа для исцеления.
m.atg_heat=Собирайте ТЕПЛО, чтобы повышать уровень предметов и делать их сильнее со временем\!
m.atg_pots=Некоторые предметы вроде горшков можно бросать в переключатели И во врагов\!
m.atg_pplate=Поднимите и поставьте СТАТУЮ на НАЖИМНУЮ ПЛИТУ, чтобы держать двери открытыми.
m.atg_retraps=Некоторые переключатели могут изменить направление волны ловушки. Теперь можно пересекать ловушки в обоих направлениях\!
m.atg_shield=В окружении? Используйте ЩИТ, чтобы оттолкнуть атакующих врагов.
m.atg_statustraps=Осторожно\! Некоторые ловушки наносят урон И накладывают вредоносные статус-эффекты.
m.atg_switch=Переключатель недоступен? Бросьте горшок или выстрелите в него\!
m.atg_teblocks=ВЗРЫВНЫЕ БЛОКИ С ТАЙМЕРОМ отсчитают до 0 перед взрывом и нанесением урона.
m.atg_togswitch=Переключатели могут как открывать, так и закрывать двери.
m.atg_togtraps=Некоторые ловушки всегда активны. Найдите переключатель, чтобы отключить их\!
m.atg_torto=Тортодроны встречаются на патрулях в Часовом Механизме. Они не атакуют, пока их не тронут первыми — но будьте осторожны: разъярившись, они становятся грозными и смертельно опасными противниками.
m.atg_traps=Смотрите под ноги\! Подождите, пока ЛОВУШКИ деактивируются, прежде чем наступать на них.
m.atg_treasure=ЗЕЛЁНЫЕ сундуки содержат кроны и полезные предметы\! КРАСНЫЕ сундуки встречаются реже зелёных и содержат предметы получше\! СУНДУКИ С СЕРДЦАМИ содержат сердца, восстанавливающие здоровье.
m.atg_ublocks=Некоторые блоки невозможно разрушить обычными атаками.
m.atg_vials=Накладывайте разнообразные статус-эффекты на врагов, бросая в них КОЛБЫ\!
m.atg_vitapods=Подберите ВИТАПОДЫ, чтобы временно увеличить максимальное здоровье до возвращения в Хейвен.
m.back_to_haven=Этот путь вернёт вас в Хейвен, если вы не можете войти в Мрачные Врата Беса.
m.battle_arena=Каждый этап боевой арены сложнее предыдущего, но победа всегда даёт шанс забрать нажитое и двигаться дальше. Единственное правило — каждый должен сразиться хотя бы раз\!
m.battle_arena_1=Добро пожаловать на боевую арену\! Единственное правило — вы должны сразиться хотя бы раз, чтобы пройти дальше. Одержав победу, вам предстоит решить — сражаться ли за ещё большую славу\!
m.battle_arena_2=Победа за вами\! Но покинут ли эти воины священный зал славной битвы и будут забыты, или продолжат сражаться с ещё более ужасающими противниками в надежде стяжать награды Короля Арены?
m.battle_arena_3=Воистину, вы — одни из величайших воинов, что когда-либо жили\! Богатства Короля Арены — ваши по праву\!
m.bramble=В некоторых областях заросли колючих кустов причинят вам боль, если вы побежите сквозь них\!
m.branch_battle_warning=Перед вами два пути. Какой вы выберете?
m.branch_path_warning=Вы в безопасности — пока что. Перед вами два пути. Прослушайте модули разведки и выберите свой путь.
m.can_resurrect=Член отряда даровал вам Искру Жизни. Нажмите АТАКА [[ACTION]], чтобы возродиться.
m.candlestick_keep=Берегитесь ужасных Грималкинов, что таятся во тьме\! Этих проклятых призраков невозможно уничтожить, и единственное, чего они по-настоящему боятся — свет зачарованных свечей. Зажигайте их углями и укрывайтесь в их сияющих объятиях.
m.choice=Сделайте свой выбор.
m.clockwork_tunnels=Из Часового Механизма доносятся странные звуки и энергии. Спускайтесь глубже и разгадывайте его тайны, но берегитесь — не попадите в шестерёнки.
m.confirm_energy=Нажмите АТАКА [[ACTION]], чтобы подтвердить трату энергии.
m.connecting=Подключение...{0}%
m.controls=Нажмите [[TOGGLE_HELP]] в любой момент, чтобы просмотреть управление.
m.converse=Используйте клавиши-стрелки и пробел для навигации в разговоре.
m.danger_module=Внимание\! Путь за этой чертой куда опаснее, чем можно ожидать на этом уровне. Войдя, вы не сможете повернуть назад, пока не пройдёте все испытания.\n\nОднако, если вам удастся выйти победителем, вы будете вознаграждены за свою отвагу. Входите на свой страх и риск\!
m.dead=Нажмите АТАКА [[ACTION]] для переключения в режим наблюдателя.
m.design=Нажмите АТАКА [[ACTION]], чтобы разместить.\nНажмите ЗАЩИТА [[DEFEND]], чтобы убрать.\nНажмите ПРЕД. ОРУЖИЕ [[PREV_WEAPON]] для вращения по часовой.\nНажмите СЛЕД. ОРУЖИЕ [[NEXT_WEAPON]] для вращения против часовой.
m.devilish_drudgery=Офисные прислужники Подземного Мира — угрюмая компания, атакующая любого неуполномоченного посетителя при первой возможности. Сами по себе они не представляют серьёзной угрозы, но могут стать куда опаснее, если один из их Начальников Бездны доберётся до них. Будьте начеку\!
m.elevator=Лифт активируется, когда все живые члены отряда встанут на него.
m.energy=Нажмите АТАКА [[ACTION]], чтобы потратить энергию на это устройство.
m.event_locked_module=Внимание\! За этими вратами лежит неопознанное место. Войдя, вы не сможете повернуть назад, пока не пройдёте все испытания.\n\nОднако, если вам удастся выйти победителем, вы будете вознаграждены за свою отвагу. Входите на свой страх и риск\! \n\nЭта комната предоставляет бонусный шанс на сокровища внутри.
m.event_module=Внимание\! За этими вратами лежит неопознанное место. Войдя, вы не сможете повернуть назад, пока не пройдёте все испытания.\n\nОднако, если вам удастся выйти победителем, вы будете вознаграждены за свою отвагу. Входите на свой страх и риск\!
m.final_test=Ты зашёл далеко, рыцарь — но для финального экзамена потребуется быстрый ум и ещё более быстрые ноги.
m.graveyard=Кладбища — противоестественное место, мир между мирами, где тёмные духи собираются, жаждая жизни любой живой души, что осмелится пройти здесь. Вы должны поспешить и найти выход как можно быстрее, прежде чем эти фантомы пробудятся и начнут преследовать вас\!
m.interact=Нажмите АТАКА [[ACTION]] для активации.
m.lichenous_lair=Лишайники — странные, чужеродные разновидности слизней, предположительно прибывшие на эту планету с крупным метеоритом. Пока одноклеточная колония в основном безвредна, они могут быстро объединиться в весьма грозного противника. Не позволяйте им сливаться\!
m.lift=Нажмите АТАКА [[ACTION]], чтобы поднять предмет.
m.loading=Загрузка...{0}%
m.loading0=Основные элементы управления можно просмотреть в любой момент, нажав [[TOGGLE_HELP]].
m.loading1=Часовой Механизм под поверхностью циклически сменяет уровни в реальном времени. За одну вылазку вы никогда не увидите все уровни, которые может предложить мир. Лишь истинный искатель приключений раскроет все секреты\!
m.loading10=Под действием электричества ваше тело будет регулярно сотрясаться от электрических разрядов. Это прервёт всё, что вы делаете.
m.loading11=Под действием проклятия часть вашего оружия будет отмечена проклятием. Попытка использовать отмеченное проклятием оружие нанесёт вам урон.
m.loading12=Если вы столкнулись с какой-либо проблемой, нажмите F2, чтобы отправить отчёт об ошибке.
m.loading13=Если вы лидер отряда, вы можете удалить любого игрока из группы. Нажмите на значок статуса игрока, которого хотите удалить, и выберите «Удалить из группы».
m.loading14=Не сообщайте данные своей учётной записи посторонним. Мастера Игры никогда не запрашивают ваш пароль.
m.loading15=Чтобы добавить друга в список друзей, просто нажмите на него и выберите «Добавить в друзья». Чтобы посмотреть список друзей и чем они заняты, нажмите кнопку «Общение».
m.loading16=Использование щита поможет вам полностью избежать урона, так что обязательно пользуйтесь им\! Нажмите «[[DEFEND]]» для защиты. По мере поглощения урона щит покраснеет и в итоге сломается. Щит должен восстановиться, прежде чем его можно будет использовать снова.
m.loading17=Посетите forums.spiralknights.com. Станьте частью сообщества\!
m.loading18=Посетите wiki.spiralknights.com — храбрые искатели приключений документируют свои находки в глубинах Часового Механизма\!
m.loading2=Броня и шлемы обеспечивают не только физическую защиту, но и могут защитить от статус-эффектов. Правильная комбинация значительно повысит ваши шансы на выживание.
m.loading3=Вы можете воскресить другого игрока, нажав на его портрет и даровав ему Искру Жизни.
m.loading4=В Часовом Механизме бродят редкие монстры с уникальными предметами. Вы уже встречали таких?
m.loading5=Вы можете увидеть, чем заняты ваши друзья, нажав кнопку «Общение» в левом нижнем углу экрана. Вы даже можете мгновенно присоединиться к ним, если в группе есть место.
m.loading6=Под действием яда вы не сможете исцеляться. Старайтесь не получать слишком много урона, пока он не пройдёт.
m.loading7=Если вы горите, вы будете регулярно получать урон, пока огонь не потухнет. Но это не мешает вам распространять его на монстров. Подойдите поближе и поделитесь теплом\!
m.loading8=Под действием заморозки вы не сможете двигаться и поворачиваться, но по-прежнему сможете атаковать. Если путешествуете с товарищами, попросите их сбить лёд сильнейшими атаками.
m.loading9=Под действием оглушения вы будете двигаться и атаковать медленнее обычного. Из-за этого вы станете лёгкой добычей для крупных монстров, от которых обычно можно убежать — будьте начеку\!
m.lock_guard=Защищайте и исцеляйте себя и союзников от урона с помощью Щита Защитника\! \n\nДержите врагов на расстоянии благодаря повышенной сопротивляемости урону, а также атакуйте ускоренными мечами и бомбами\!
m.lock_howto=* На карте разбросано несколько Контрольных Точек \n* Захват и удержание Контрольной Точки увеличивает счёт вашей команды со временем \n* Чтобы захватить Контрольную Точку, встаньте на неё, пока она не сменит цвет на цвет вашей команды \n* Команда с наибольшим счётом в конце матча ПОБЕЖДАЕТ\! \n
m.lock_recon=Становитесь невидимым и отмечайте врагов для увеличенного урона с помощью Поля Подавления\! \n\nДержите врагов в напряжении благодаря уменьшенному времени зарядки оружия и ускоренным пушкам и бомбам\!
m.lock_striker=Обгоните любого с помощью Рывка Ударника, бейте сильнее и оставляйте врагов в пыли\! \n\nСтаньте непревзойдённым бойцом с повышенным общим уроном атак и самым быстрым мечом\!
m.lost_knights=Вы обнаружили пропавших рыцарей...
m.mineral_tut=Атакуйте, чтобы разбить минералы и подобрать их\! Носите по одному за раз.
m.mission_trap_chamber=Все дроны умеют передвигаться несколькими способами.
m.mission_trap_chamber_2=Их можно убить, но часто проще просто их обойти.
m.mission_trap_chamber_3=Все дроны в золотой броне неуязвимы.
m.mission_trap_chamber_4=Дроны также могут наносить статус-урон.
m.need_key_grim_gate=Для активации Мрачных Врат требуется Бесовское Удостоверение.
m.new_sprite=У вас появился боевой спрайт\! Нажмите [[SPRITE_ACTION_1]], чтобы использовать его боевое умение\!
m.p_dz_schematic_heist=Обнаружен несанкционированный доступ к библиотеке чертежей. Группа безопасности направлена. Начата блокировка.
m.party_button=Кнопка группы активируется, когда все живые члены отряда встанут на неё.
m.party_locked_warning=ВНИМАНИЕ\! Воспользовавшись этим лифтом, ваш отряд будет закреплён на всю оставшуюся часть миссии.
m.party_nosplit_warning=ВНИМАНИЕ\! Во время этой миссии вы не можете разделять отряд.
m.plan_o_attack=Монитор показывает данные прототипа массивной боевой машины под кодовым названием «Проект R».
m.poi=Нажмите АТАКА [[ACTION]], чтобы осмотреть.
m.pressure_pads=Эти особые кнопки сработают, только если что-то удерживает их нажатыми. Попробуйте использовать статую, чтобы зафиксировать одну из них.
m.recon=Нажмите АТАКА [[ACTION]], чтобы активировать Модуль Разведки.
m.rescue_door_sk=Я почти открыл эту дверь. Пока я работаю, спасите пленных рыцарей в этом районе\!
m.scenario_compound_gremlin=Остальные не должны узнать. Заставьте их замолчать. -Г
m.scenario_experiment=Определённые виды монстров, похоже, реагируют на различные комбинации минералов, найденных здесь, в глубинах Часового Механизма.
m.scenario_failedparty=Свеча гаснет\! Они идут\! Будь проклят Калем за то, что погнался за этим сокровищем...
m.scenario_fiendbook_1=Как рисовать инфернальные символы
m.scenario_fiendbook_2=5 способов задобрить вашего Начальника Бездны
m.scenario_fiendbook_3=Апокалипсис и ты
m.scenario_fiendbook_4=Четыре способа устроить конец света
m.scenario_fiendbook_5=Что делать, если вы призвали не того Инфернального Владыку
m.scenario_fiendnotice_1=По причине хронической неэффективности оплачиваемые выходные и бесплатный кофе в комнате отдыха отменяются.
m.scenario_giantsword=На боковой стороне клинка выгравировано нечто, похожее на звёздную карту.
m.scenario_roarmulus_a=Монитор показывает данные прототипа массивной боевой машины под кодовым названием «Проект R».
m.scenario_roarmulus_b=«Проект R» почти завершён. Мы должны собрать больше лома\!
m.scenario_torin=Выцветшая надпись гласит\: Здесь покоится Торин, рыцарь Альмира.
m.shop=Нажмите АТАКА [[ACTION]], чтобы просмотреть товары продавца.
m.sl_elevator_active=Для открытия требуется Теневой Ключ.\nТеневые Ключи можно случайно найти в сундуках или приобрести на Складе Снабжения.
m.sl_elevator_closed=В данный момент недоступно.
m.sprite_cooldown=После использования любого умения спрайта все умения требуют перезарядки, прежде чем их можно будет использовать снова.
m.statue_secret=Тяжёлые статуи можно поднимать и ставить на нажимные плиты, чтобы открыть секреты и сокровища\!
m.talk=Нажмите АТАКА [[ACTION]], чтобы начать разговор.
m.terminal_1=Добро пожаловать, путник — это Терминал Часового Механизма. Отдохните и смените снаряжение. \n\nВоспользуйтесь лифтом, чтобы вернуться в Хейвен или спуститься в более опасную ступень Часового Механизма.
m.test_lobby=Добро пожаловать, тестеры\! Прежде чем отправиться в Часовой Механизм, загляните к торговцу слева — у него полно чудесного снаряжения. \nУгольки справа повысят уровень оружия, когда вы соберёте достаточно и перейдёте на следующий этаж. \nУдачи, храбрые рыцари\!
m.tg1_barrier=Если вас начинают теснить, используйте силовые барьеры — вроде того, что справа от вас — чтобы перевести дух. Монстры и снаряды не могут пройти сквозь них.
m.tg1_button=Если дверь не открывается, поищите скрытую кнопку на полу под блоками.
m.tg1_crowns=Кроны — это валюта Часового Механизма. На них можно приобрести всевозможные вещи, например, новое оружие и броню. В групповой игре каждый член отряда получает кроны всякий раз, когда кто-то их подбирает.
m.tg1_end=Эй, ты справился\! Просто отлично, правда. Ты только что избавил меня от кучи бумажной работы, так что спасибо. Надеюсь, те вольверы не слишком тебя напугали. Отправляйся к лифту — будем считать эту вылазку завершённой.
m.tg1_heat=Возможно, вы заметили, что монстры оставляют после себя маленькие угольки. Угольки дают вам тепло. По мере заполнения шкалы тепла пламя рядом со здоровьем разгорается. Если вы доберётесь до выхода живым, тепло будет применено к вашему оружию и броне. Со временем это повысит их уровень и сделает сильнее. В групповой игре каждый член отряда получает тепло всякий раз, когда кто-то подбирает уголёк.
m.tg1_overgrown_1=Следующие несколько зон я оставлю на вас. Там довольно заросло, так что смотрите в оба — монстры прячутся в высокой траве. Некоторые из них весьма искусны в маскировке в тенях. Жуть от одной мысли, честно говоря.
m.tg1_overgrown_2=Похоже, вы знаете, что делаете. Это хорошо, потому что финальная зона уже впереди.
m.tg1_partypad_1=Пройдите в комнату впереди к кнопке группы. Вы почти закончили.
m.tg1_partypad_2=Это кнопка группы. Большая напольная кнопка, которая активируется, только когда все члены отряда стоят на ней. Обычно они открывают двери, но иногда всё оказывается чуть сложнее...
m.tg1_shield_1=Давайте сразу разберёмся с одним важнейшим инструментом выживания — вашим щитом. Удерживайте [[DEFEND]], чтобы защищаться щитом. Пока вы защищаетесь, вы полностью выдержите большую часть урона со всех сторон. Стреляющие щенки в следующем коридоре не будут проблемой, пока вы защищаетесь на бегу.
m.tg1_shield_2=По мере поглощения урона щит краснеет и в итоге ломается. Когда он сломан, защищаться до его восстановления невозможно — будьте осторожны\!
m.tg1_welcome=Добро пожаловать на Тренировочную Площадку, рекрут. В этой заброшенной секции Часового Механизма мы обустроили зоны для обучения вас тонкому искусству — не погибать ужасной смертью. Так что обращайте внимание на эти полезные подсказки, приготовьте оружие и вперёд\!
m.tg2_crystal=Кристальные блоки похожи на разрушаемые, за исключением того, что при уничтожении они уничтожают и кристальные блоки того же цвета, связанные с ними.
m.tg2_end=Отличная работа\! После ещё одного успешного прохождения Тренировочной Площадки вы должны уже освоиться. Скоро вы будете исследовать глубины Часового Механизма самостоятельно.
m.tg2_pickups=Находки — это предметы, которые занимают ячейки пояса в верхней части экрана. Они не могут покинуть Часовой Механизм и обратятся в прах, как только вы вернётесь в город. Считайте их бонусными усилителями для свободного использования.
m.tg2_shield=Впереди ещё одна отличная возможность воспользоваться щитом. Помните, защищаться щитом можно, нажав и удерживая клавишу X.
m.tg2_vials_1=Колбы — один из типов находок. При броске они высвобождают содержащиеся внутри алхимические вещества, создавая стихийный взрыв. Вы можете опробовать их в следующей комнате.
m.tg2_vials_2=В комнате впереди вы сможете попрактиковаться с колбами. Просто нажмите цифровую клавишу (от 1 до 5), соответствующую нужной находке на поясе в верхней части экрана. Это зарядит колбу. Нажмите атаку, чтобы бросить её.
m.tg2_vials_3=Теперь, когда вы освоили использование находок, давайте применим полученные знания в боевых условиях.
m.tg2_welcome=С возвращением на Тренировочную Площадку. Она создана для обучения особым предметам, которые можно найти в Часовом Механизме — «находкам».
m.tg3_charge_1=Спиральные Рыцари способны высвобождать скрытые силы, заключённые в их оружии — «заряженные атаки». Заряженные атаки мощнее обычных и часто производят особые эффекты.
m.tg3_charge_2=Чтобы выполнить заряженную атаку мечом или из стрелкового оружия, нажмите и удерживайте АТАКА. После обычной атаки начнётся зарядка оружия. Когда заряд достигнет максимума, отпустите АТАКУ, чтобы высвободить заряженную атаку.
m.tg3_charge_3=Теперь, когда вы знаете, как выполнять заряженную атаку, давайте применим это в более серьёзном бою. Зарядите оружие и нанесите удар в нужный момент, когда враг уязвим. Удачи\!
m.tg3_end=Похоже, вы неплохо освоили основы. Думаю, вы готовы присоединиться к остальным рекрутам у Врат Воробья. Там вы научитесь работать в отряде. Там множество рекрутов, которые рассчитывают на вас. Отличная работа\!
m.tg3_final=Между вами и лифтом осталась лишь одна комната. Помните всё, чему научились, и у вас всё получится... по крайней мере, в теории. Постарайтесь не погибнуть, ладно?
m.tg3_ghost=Призрачные блоки уничтожат все связанные с ними блоки, включая неразрушимые\!
m.tg3_goldkey=Золотые ключи — ещё один подбираемый предмет. Поднимите их и используйте на золотых дверях. Для каждой золотой двери на уровне всегда найдётся золотой ключ.
m.tg3_lift_1=Время размять мышцы\! Некоторые предметы можно поднимать и нести или бросать. Подойдите к глиняным горшкам и нажмите АТАКА, когда увидите значок действия.
m.tg3_lift_2=Дверь впереди заперта, но её можно открыть переключателем слева. Попробуйте бросить глиняный горшок в переключатель. Горшки весьма полезны для этого, если под рукой нет стрелкового оружия.
m.tg3_welcome=С возвращением на Тренировочную Площадку. На этом последнем уровне вы узнаете несколько важных вещей, необходимых каждому исследователю Часового Механизма. Поднимайтесь по рампе — и начнём\!
m.tg_doors=Двери можно открывать множеством различных способов.
m.tg_end=Эй, ты справился\! Просто отлично, правда. Ты только что избавил меня от кучи бумажной работы, так что спасибо. Надеюсь, ретроды не слишком тебя удивили. Отправляйся к лифту — будем считать эту вылазку завершённой.
m.tg_heat=Собирая Угольки Тепла, вы повышаете уровень снаряжения при достижении лифта.
m.tg_heat_short=Собирайте тепло, чтобы прокачивать снаряжение\!
m.tg_pots=Некоторые предметы можно поднимать и использовать или даже швырять через всю комнату. Попробуйте бросить горшок в тот переключатель.
m.tg_shield=Нажмите [[DEFEND]], чтобы поднять щит и блокировать атаки.
m.tg_welcome=Добро пожаловать на Тренировочную Площадку, рекрут. В этой заброшенной секции Часового Механизма мы обустроили зоны для обучения вас тонкому искусству — не погибать ужасной смертью. Так что обращайте внимание на эти полезные подсказки, приготовьте оружие и вперёд\!
m.tglobby_equip=В Часовом Механизме используйте Станции Арсенала, чтобы сменить снаряжение.
m.tglobby_vitapod=Витаподы временно увеличивают максимальное здоровье до возвращения в город.
m.token_trader_info=Спиральная Штаб-квартира предлагает особые предметы избранным рыцарям в обмен на специальные жетоны, добытые в глубинах Часового Механизма. Эти жетоны обычно выпадают за победу над грозными боссами и служат доказательством храбрости их обладателя.
m.treasure_vault_sky_islands_day=Расслабьтесь\! Понюхайте цветы. Наслаждайтесь солнечным днём. Вы это заслужили\!
m.tut_attack=Нажмите [[ACTION]], чтобы атаковать.
m.tut_bash=Когда щит полон, нажмите [[SHIELD_BASH]], чтобы оглушить монстров ударом щита\!
m.tut_breakable=Некоторые блоки вроде этих можно разрушить. Атакуйте их, чтобы расчистить путь.
m.tut_buttons=Не все кнопки на виду. Осмотритесь\! Иногда они спрятаны под блоками.
m.tut_charge=Удерживайте [[?ACTION]] до полной зарядки, затем отпустите для атаки\!
m.tut_chromalisks=Берегитесь хромалисков впереди — они могут хлестнуть языком издалека. Не стойте к ним лицом, когда они готовятся к удару.
m.tut_clearing=Атакуйте клавишей [[ACTION]].
m.tut_dash=Уклоняйтесь от атак монстров, нажав [[DODGE]].
m.tut_explosive=Взрывные блоки нанесут урон всему вокруг при детонации. Включая вас\! Уничтожайте их с безопасного расстояния из стрелкового оружия.
m.tut_explosive2=Переключитесь на стрелковое оружие клавишей [[NEXT_WEAPON]].
m.tut_fighting=Целься во врагов мышью и атакуй клавишей [[ACTION]].
m.tut_ghost=Призрачные блоки уничтожат все связанные с ними блоки, включая неразрушимые\!
m.tut_golddoor=Найдите Золотой Ключ, чтобы открыть эту дверь\!
m.tut_goldkey=Подберите и используйте на золотых дверях\!
m.tut_hearts=Разбейте эти блоки, чтобы получить сердца. Сердца восстанавливают здоровье. Вы не сможете подобрать их, если здоровье полно.
m.tut_hearts_short=Если вы ранены, используйте сердца для исцеления\!
m.tut_important_object=Подберите, чтобы продолжить\!
m.tut_jelly_cubes=Внимание\! Впереди стая диких желекубов. Когда вы подойдёте достаточно близко, ближайший монстр будет автоматически выбран целью. Он будет подсвечен световым столбом.
m.tut_lever=Двери часто можно открыть, найдя нужный переключатель. Попробуйте выстрелить в этот переключатель из стрелкового оружия\!
m.tut_lever_alt=Переключатели могут открывать двери. Попробуйте бросить горшок или выстрелить в этот из стрелкового оружия\!
m.tut_miniboss=Вы почти добрались до Спасательного Лагеря — пробегите через силовой барьер впереди\!
m.tut_move=Используйте [[?MOVEMENT]] для перемещения.
m.tut_move_short=Используйте [[?MOVEMENT]] для перемещения.
m.tut_pot_short=Подберите и бросьте\!
m.tut_shield=Нажмите и удерживайте [[DEFEND]], чтобы блокировать атаки.
m.tut_shrubs=Попробуйте расчистить эти кусты. Растения и другие разрушаемые объекты часто скрывают сокровища.
m.tut_switches=Двери часто можно открыть, найдя нужный переключатель поблизости. Осмотритесь. Иногда они спрятаны под блоками.
m.tut_target=Ударьте для продвижения\!
m.tut_treasure=Сундуки с сокровищами — всегда удачная находка\! В них монеты и полезные предметы.
m.tut_victory=Вы справились\! Идите вперёд, чтобы попасть в Спасательный Лагерь.
m.tut_weapons=Переключайтесь между экипированным оружием клавишей [[NEXT_WEAPON]]. Попробуйте вооружиться стрелковым оружием.
m.tut_weapons_short=Нажмите [[NEXT_WEAPON]] для смены оружия.
m.tut_welcome=Мы засекли ваш сигнал бедствия, рекрут. Ваша первая задача — добраться до Хейвена, где мы организовали аванпост. Вас наверняка ещё шатает после крушения, так что я проведу вас через основы. Путь может быть опасен, так что приготовьте меч и будьте начеку. Удачи\!
m.unlock=Нажмите АТАКА [[ACTION]], чтобы использовать Серебряный Ключ.
m.unlock_gold=Нажмите АТАКА [[ACTION]], чтобы использовать Золотой Ключ.
m.unlock_grim_gate=Нажмите АТАКА [[ACTION]], чтобы использовать Бесовское Удостоверение \n\nВНИМАНИЕ\: Если эти Мрачные Врата будут отперты, отряд будет закреплён на всю продолжительность миссии. Выбирайте членов отряда с умом\!
m.unlock_shadow=Нажмите АТАКА [[ACTION]], чтобы использовать Теневой Ключ \n\nВНИМАНИЕ\: Если этот лифт будет отперт, отряд будет закреплён на всю продолжительность Теневого Подземелья. Выбирайте членов отряда с умом\!
m.wolver_den=Вольверы — чрезвычайно выносливые стайные хищники, чей хищнический инстинкт уступает лишь молниеносным рефлексам. Они играют с добычей, кружа вокруг, и наносят удар со спины. Держите клинок наготове.
m.zone=Нажмите АТАКА [[ACTION]], чтобы покинуть текущую зону.
