m.clockworks_1=Часовой механизм — это ваш проход к ядру планеты! Он наполнен огромным разнообразием миров и населен монстрами и сокровищами, превосходящими ваше воображение. Однако будьте осторожны\: чем глубже вы погружаетесь под поверхность, тем сильнее и умнее становятся ваши противники!
m.clockworks_2=Глубины под Хейвеном можно разделить на три уровня сложности, каждый из которых сложнее предыдущего. Перед тем как отправляться в путь, обязательно экипируйтесь снаряжением, соответствующим уровню, и помните\: величайшие сокровища, которые могут предложить Часовые механизмы, находятся глубоко под землей, рядом с ядром планеты, так что спускайтесь вглубь!
m.controls_attack=[[ACTION]]. Удерживайте, чтобы выполнить атаку с разбега. [[ACTION]] также позволяет поднимать крупные предметы, разговаривать с NPC и активировать станции.
m.controls_chat=Нажмите [[CHAT_START]], чтобы войти в чат или ввести команды. Введите /help в окне чата, чтобы увидеть список команд.
m.controls_defend=Нажмите и удерживайте [[DEFEND]].
m.controls_inventory=[[TOGGLE_PANELS]]
m.controls_move=Удерживайте [[MOVE_FORWARD]] или используйте [[MOVE_NORTH]][[MOVE_WEST]][[MOVE_SOUTH]][[MOVE_EAST]].
m.controls_options=Вы можете изменить текущую схему управления в меню «Настройки».
m.controls_weapon=[[?NEXT_WEAPON]]
m.energy_1=Энергия используется для покупки предметов в складе снабжения, таких как оружие, снаряжение, алхимические сферы, искры жизни и огненные кристаллы. \n\nЧтобы приобрести или обменять энергию, просто откройте склад снабжения и нажмите кнопку «Получить энергию».
m.energy_depot=Вы можете покупать или продавать энергию в Депо энергии.
m.forums=Форумы
m.help=ПОМОЩЬ
m.monster_1=Монстры в Часовых механизмах делятся на шесть отдельных семейств, каждое из которых имеет свои сильные и слабые стороны. Обязательно экипируйтесь соответствующим образом, прежде чем отправляться под землю!
m.monster_beast=Наносит ПРОКЛЮЧИВАЮЩИЙ урон — Уязвим к ПРОКЛЮЧИВАЮЩЕМУ урону — Силен против ЭЛЕМЕНТАЛЬНОГО урона
m.monster_construct=Наносит ЭЛЕМЕНТАЛЬНЫЙ урон — Уязвим к ЭЛЕМЕНТАЛЬНОМУ урону — Силен против ПРОКЛЮЧИВАЮЩЕГО урона
m.monster_fiend=Наносит ТЕНЕВОЙ урон — Уязвим к ПРОКЛЮЧИВАЮЩЕМУ урону — Силен против ТЕНЕВОГО урона
m.monster_gremlin=Наносит ЭЛЕМЕНТАЛЬНЫЙ урон — Уязвим к ТЕНЕВОМУ урону — Силен против ЭЛЕМЕНТАЛЬНОГО урона
m.monster_slime=Наносит ПРОНИЗАЮЩИЙ урон — Уязвим к ТЕНЕВОМУ урону — Силен против ПРОНИЗАЮЩЕГО урона
m.monster_undead=Наносит ТЕНЕВОЙ урон — Уязвим к ЭЛЕМЕНТАЛЬНОМУ урону — Силен против ТЕНЕВОГО урона
m.support_1=На нашем официальном сайте вы можете просмотреть информацию о своей учетной записи, изменить пароль и обновить адрес электронной почты.
m.support_2=Если вы заблудились или столкнулись с трудностями, вам помогут наши игровые мастера! С ними можно связаться, отправив запрос в службу поддержки.
m.support_3=Если у вас возникли проблемы с другим игроком, нажмите на него и выберите опцию «Пожаловаться», чтобы получить помощь.
m.support_4=Чтобы сообщить об ошибке в игре, нажмите F2. Имейте в виду, что на сообщения об ошибках не отвечают, но они содержат неличную отладочную информацию, которая помогает выявить причину проблемы. Если вам нужна помощь от GM, пожалуйста, отправьте запрос в службу поддержки в игре.
m.support_5=Для получения дополнительных вариантов помощи, пожалуйста, перейдите на нашу официальную страницу поддержки.
m.tier_1_equip=Рекомендуемое снаряжение\: 0–1 звезда
m.tier_1_monster=Монстры наносят НОРМАЛЬНЫЙ урон.
m.tier_2_equip=Рекомендуемое снаряжение\: 2–3 звезды
m.tier_2_monster=Монстры наносят урон как НОРМАЛЬНЫЙ, так и один из других видов специального урона (ПРОБИВАЮЩИЙ, СТИХИЙНЫЙ или ТЕНЕВОЙ).\nМонстры чаще используют СТАТУСНЫЕ ЭФФЕКТЫ. Оденьте доспехи с сопротивлением ОГНЮ, ЗАМОРАЖИВАНИЮ, УДАРУ ТОКОМ или ЯДУ\!
m.tier_3_equip=Рекомендуемое снаряжение\: 4-5 звезд
m.tier_3_monster=Монстры могут использовать атаки, наносящие чистый специальный урон (ПРОБИВАЮЩИЙ, ЭЛЕМЕНТАЛЬНЫЙ или ТЕНЕВОЙ). Оденьтесь соответствующим образом!
