m.clockworks_1=Часовой Механизм — ваши врата к Ядру планеты\! Он полон разнообразных миров, населённых монстрами, а сокровища в нём превосходят всякое воображение. Однако берегитесь\: чем глубже вы спускаетесь, тем сильнее и хитрее становятся ваши противники\!
m.clockworks_2=Глубины под Хейвеном разделены на три всё более опасных уровня. Обязательно экипируйтесь снаряжением, подходящим для текущего уровня, и помните\: величайшие сокровища Часового Механизма таятся далеко под землёй, у самого Ядра планеты — так что погружайтесь глубже\!
m.controls_attack=[[ACTION]]. Удерживайте для заряженной атаки. [[ACTION]] также поднимает тяжёлые предметы, говорит с NPC и активирует станции.
m.controls_chat=Нажмите [[CHAT_START]] для чата или ввода команд. Введите /help в окне чата для списка команд.
m.controls_defend=Нажмите и удерживайте [[DEFEND]].
m.controls_inventory=[[TOGGLE_PANELS]]
m.controls_move=Удерживайте [[MOVE_FORWARD]] или используйте [[MOVE_NORTH]][[MOVE_WEST]][[MOVE_SOUTH]][[MOVE_EAST]].
m.controls_options=Вы можете изменить текущую раскладку управления в меню настроек.
m.controls_weapon=[[?NEXT_WEAPON]]
m.energy_1=Энергия используется для покупки предметов на складе снабжения: оружия, снаряжения, сфер алхимии, искр жизни и огненных кристаллов.\n\nЧтобы купить или обменять энергию, откройте склад снабжения и нажмите кнопку «Получить энергию».
m.energy_depot=Вы можете купить или продать энергию в Депо Энергии.
m.forums=Форумы
m.help=ПОМОЩЬ
m.monster_1=Монстры в Часовом Механизме делятся на шесть различных семейств, каждое со своими сильными и слабыми сторонами. Экипируйтесь соответственно, прежде чем спускаться под землю\!
m.monster_beast=Наносят КОЛЮЩИЙ урон — Уязвимы к КОЛЮЩЕМУ — Устойчивы к СТИХИЙНОМУ
m.monster_construct=Наносят СТИХИЙНЫЙ урон — Уязвимы к СТИХИЙНОМУ — Устойчивы к КОЛЮЩЕМУ
m.monster_fiend=Наносят ТЕНЕВОЙ урон — Уязвимы к КОЛЮЩЕМУ — Устойчивы к ТЕНЕВОМУ
m.monster_gremlin=Наносят СТИХИЙНЫЙ урон — Уязвимы к ТЕНЕВОМУ — Устойчивы к СТИХИЙНОМУ
m.monster_slime=Наносят КОЛЮЩИЙ урон — Уязвимы к ТЕНЕВОМУ — Устойчивы к КОЛЮЩЕМУ
m.monster_undead=Наносят ТЕНЕВОЙ урон — Уязвимы к СТИХИЙНОМУ — Устойчивы к ТЕНЕВОМУ
m.support_1=Вы можете управлять данными аккаунта, изменить пароль и обновить адрес электронной почты на нашем официальном сайте.
m.support_2=Если вы заблудились или столкнулись с трудностями, наши гейм-мастера помогут\! Свяжитесь с ними, подав запрос в поддержку.
m.support_3=Если у вас проблемы с другим игроком, нажмите на него и выберите «Пожаловаться».
m.support_4=Для сообщения об ошибке в игре нажмите F2. Имейте в виду, что на отчёты об ошибках ответы не приходят, но они содержат неперсональную отладочную информацию, помогающую найти причину проблемы. Если вам нужна помощь ГМ, подайте запрос в поддержку из игры.
m.support_5=Для получения дополнительной помощи перейдите на нашу официальную страницу поддержки.
m.tier_1_equip=Рекомендуемое снаряжение\: 0-1 звезда
m.tier_1_monster=Монстры наносят ОБЫЧНЫЙ урон.
m.tier_2_equip=Рекомендуемое снаряжение\: 2-3 звезды
m.tier_2_monster=Монстры наносят урон, разделённый между ОБЫЧНЫМ и одним из специальных типов (КОЛЮЩИЙ, СТИХИЙНЫЙ или ТЕНЕВОЙ).\nМонстры чаще применяют СТАТУСНЫЕ ЭФФЕКТЫ. Экипируйте доспехи с сопротивлением ОГНЮ, ЗАМОРОЗКЕ, ШОКУ или ЯДУ\!
m.tier_3_equip=Рекомендуемое снаряжение\: 4-5 звёзд
m.tier_3_monster=Монстры могут использовать атаки с чистым специальным уроном (КОЛЮЩИЙ, СТИХИЙНЫЙ или ТЕНЕВОЙ). Экипируйтесь соответственно\!
