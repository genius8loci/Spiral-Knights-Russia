#Tue Mar 10 20:00:02 PDT 2026
d.angelic_aura=Создает вокруг вас защитную ауру, которая также защищает всех членов группы, находящихся в ней.
d.backfire_barrier=Получаете кратковременное увеличение скорости передвижения при использовании «Пламенного барьера».
d.bristle=Увеличивает количество выпущенных иголок и продолжительность их прилипания.
d.caustic_quills=Выпускает серию иголок, которые прилипают к целям и наносят яд. За каждый удар, полученный целью с прилипшими иглами, она теряет одну иглу и получает дополнительный урон.
d.chaotic_haze=Цели, получившие урон от «Проклятого тумана», имеют шанс получить случайное состояние.
d.concussive_firebolt=Добавляет к «Огненному стрелу» шанс на мощное оглушение.
d.cover=Увеличивает размер и продолжительность «Ангельской ауры».
d.crystal_harness=Настраивает навыки вашего боевого спрайта на нанесение элементального урона. \nМожет использоваться\: Драконом, Серафинксом
d.crystal_harness_adv=Настраивает навыки вашего боевого спрайта на нанесение элементального урона. \nУменьшает время восстановления всех навыков на 5% \nМожет использоваться\: Драконом, Серафинксом
d.crystal_harness_eli=Настраивает навыки вашего боевого спрайта на нанесение элементального урона. \nУменьшает время перезарядки всех навыков на 10% \nМожет использоваться\: Драконом, Серафинксом
d.dark_harness=Настраивает навыки вашего боевого спрайта на нанесение урона тени. \nМожет использоваться\: Дракон, Маскерайт
d.dark_harness_adv=Настраивает навыки вашего боевого спрайта на нанесение урона тенью. \nУменьшает время восстановления всех навыков на 5% \nМожет использоваться\: Дракон, Маскерайт
d.dark_harness_eli=Настраивает навыки вашего боевого спрайта на нанесение урона тенью. \nУменьшает время восстановления всех умений на 10% \nМожет использоваться\: Дракон, Маскерайт
d.dark_veil=Увеличивает защитную силу плаща тени.
d.dazzling_light_ray=Луч света наносит дополнительный урон нежити и монстрам семейства демонов.
d.deadly_shadow_cloak=Получите бонус к силе атаки и скорости атаки при активации плаща тени. Бонус действует в течение короткого времени после истечения действия плаща тени.
d.disintegration_ray=Луч света также снижает защиту своих целей.
d.drakon=Дракон — боевой дух, олицетворяющий огненное разрушение. Его навыки сосредоточены на грубой, наступательной силе.
d.enduring_light=Увеличивает продолжительность луча света.
d.enduring_night=Увеличивает продолжительность плаща тени.
d.explosive_firestorm=Создает серию взрывов при развязывании огненной бури.
d.extra_crispy=Увеличивает силу огня и шанс поджечь цели.
d.extra_hearty=Увеличивает шанс выпадения сердец и продолжительность зачарования.
d.firebolt=Запускает раскаленный огненный шар, который взрывается при ударе.
d.firestorm=Призывает силу настоящего драконьего огня, чтобы сжечь все на своем пути.
d.five_alarm=Увеличивает продолжительность и размер огненного шторма.
d.flame_barrier=Окружает вас барьером из пламени, который усиливает вашу защиту и сжигает ближайшие цели.
d.focus=Сокращает время восстановления умений.
d.frenzied_firestorm=За каждого монстра, попавшего в огонь, у вас и вашей группы появляется шанс получить бонус к силе атаки и скорости.
d.golden_harness=Настраивает навыки вашего боевого спрайта на нанесение проникающего урона. \nМожет использоваться\: Серафинкс, Маскерайт
d.golden_harness_adv=Настраивает навыки вашего боевого спрайта на нанесение проникающего урона. \nУменьшает время восстановления всех навыков на 5% \nМожет использоваться\: Серафинкс, Маскерайт
d.golden_harness_eli=Настраивает навыки вашего боевого спрайта на нанесение проникающего урона. \nУменьшает время восстановления всех навыков на 10% \nМожет использоваться\: Серафинкс, Маскерайт
d.haunted_haze=Любая цель, погибшая в результате урона, нанесенного проклятым туманом, породит мстительного призрака, который ищет другие цели и взрывается при столкновении.
d.heart_attack=Зачаровывает группу целей. Если зачарованная цель уничтожена, у нее есть шанс выпасть дополнительные восстанавливающие сердца.
d.heavy_smoke=Увеличивает защитную силу и продолжительность огненного барьера.
d.hexing_haze=Создает вокруг вас миазму, которая накладывает проклятие на любую цель внутри нее. Каждое проклятие имеет таймер, который наносит урон цели по истечении времени. За каждую цель, захваченную «Проклятым туманом», продолжительность миазмы увеличивается.
d.high_heat=Увеличивает атакующую силу огненного барьера.
d.impact=Увеличивает урон «Огненной стрелы».
d.iron_harness=Настраивает навыки вашего боевого спрайта на нанесение обычного урона. \nМожет использоваться\: всеми боевыми спрайтами
d.iron_harness_adv=Настраивает навыки вашего боевого спрайта на нанесение обычного урона. \nУменьшает время восстановления всех навыков на 5% \nМожет использоваться\: всеми боевыми спрайтами
d.iron_harness_eli=Настраивает навыки вашего боевого спрайта на нанесение обычного урона. \nУменьшает время перезарядки всех навыков на 10% \nМожет использоваться\: всеми боевыми спрайтами
d.iron_heart_attack=Цели, уничтоженные под действием зачарования, могут также выпадать шары защиты.
d.magnify=Увеличивает дальность и силу луча света.
d.maskeraith=Маскерайт — боевой спрайт, воплощающий тени. Его навыки сосредоточены на уловках и смертоносных ядах.
d.meteoric_firebol=Увеличивает размер взрыва огненного заряда.
d.no_mercy=Увеличивает урон, наносимый проклятым туманом.
d.plentiful_pain=Увеличивает продолжительность действия эффекта «Проклятое облако» по мере появления новых целей.
d.protection=Усиливает защитные свойства ангельской ауры.
d.ray_of_light=Выпускает сконцентрированный луч света, наносящий урон всему, что проходит через него.
d.scorching_barrier=Увеличивает количество вращающихся вокруг огненных шаров и их размер.
d.seraphic_aura=Члены группы, находящиеся в защитной ауре, получают увеличенную регенерацию щита.
d.seraphynx=Серафинкс — боевой дух, воплощающий божественный свет. Его навыки сосредоточены на поддержке рыцарей в бою с помощью защиты и восстановления.
d.shadow_cloak=На время предоставляет вам частичную невидимость и усиление защиты. «Плащ тени» снимается, если вы получаете урон, наносите удар или выполняете любое другое действие.
d.valkyrian_aura=Члены группы, находящиеся в защитной ауре, получают бонус к скорости заряда.
d.vengeful_quills=Каждый раз, когда поражается цель, пораженная иголками, из нее выстреливается еще одна иголка в следующую доступную цель.
d.vengeful_shadow_cloak=Создает вокруг вас взрывное поле разрушения, когда «Теневой плащ» прерывается, которое имеет шанс оглушить цели.
d.venom=Увеличивает силу наносимого яда.
d.violent_heart_attack=Цели, уничтоженные под действием заклинания, вызывают взрыв.
d.virulent_quills=Каждый раз, когда поражена цель, пораженная иголками, есть шанс вызвать ядовитый взрыв.
d.wide_embrace=Увеличивает зону действия «Сердечного удара».
