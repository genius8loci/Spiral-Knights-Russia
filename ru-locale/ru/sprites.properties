#Fri Mar 27 12:58:23 PDT 2026
d.angelic_aura=Создаёт защитную ауру вокруг вас, которая также защищает членов группы в зоне действия.
d.backfire_barrier=Получите кратковременный прирост скорости при активации огненного барьера.
d.bristle=Увеличивает количество выпущенных игл и длительность их действия.
d.caustic_quills=Выпускает серию игл, которые втыкаются в цели и отравляют их. Каждый удар по утыканной цели снимает одну иглу и наносит дополнительный урон.
d.chaotic_haze=Цели, повреждённые проклятой дымкой, могут получить случайный статусный эффект.
d.concussive_firebolt=Добавляет шанс мощного оглушения к огненному снаряду.
d.cover=Увеличивает размер и длительность ангельской ауры.
d.crystal_harness=Настраивает навыки боевого спрайта на стихийный урон.\nМогут использовать\: Дракон, Серафинкс
d.crystal_harness_adv=Настраивает навыки боевого спрайта на стихийный урон.\nСнижает перезарядку всех навыков на 5%\nМогут использовать\: Дракон, Серафинкс
d.crystal_harness_eli=Настраивает навыки боевого спрайта на стихийный урон.\nСнижает перезарядку всех навыков на 10%\nМогут использовать\: Дракон, Серафинкс
d.dark_harness=Настраивает навыки боевого спрайта на теневой урон.\nМогут использовать\: Дракон, Маскерайт
d.dark_harness_adv=Настраивает навыки боевого спрайта на теневой урон.\nСнижает перезарядку всех навыков на 5%\nМогут использовать\: Дракон, Маскерайт
d.dark_harness_eli=Настраивает навыки боевого спрайта на теневой урон.\nСнижает перезарядку всех навыков на 10%\nМогут использовать\: Дракон, Маскерайт
d.dark_veil=Увеличивает защитную мощь теневого плаща.
d.dazzling_light_ray=Луч света наносит дополнительный урон нежити и демонам.
d.deadly_shadow_cloak=При активации теневого плаща вы получаете бонус к атаке и скорости атаки на короткое время.
d.disintegration_ray=Луч света также снижает защиту целей.
d.drakon=Дракон — это боевой спрайт, воплощающий огненное разрушение. Его навыки сосредоточены на чистой наступательной мощи.
d.enduring_light=Увеличивает длительность луча света.
d.enduring_night=Увеличивает длительность теневого плаща.
d.explosive_firestorm=Создаёт серию взрывов при развязывании огненной бури.
d.extra_crispy=Увеличивает силу огня и шанс поджечь цель.
d.extra_hearty=Увеличивает шанс выпадения сердечек и длительность чар.
d.firebolt=Запускает пылающий шар огня, взрывающийся при попадании.
d.firestorm=Призовите силу истинного драконьего пламени, чтобы испепелить всё на пути.
d.five_alarm=Увеличивает длительность и размер огненной бури.
d.flame_barrier=Окружите себя барьером из пламени, усиливающим защиту и обжигающим ближайших врагов.
d.focus=Снижает время перезарядки навыков.
d.frenzied_firestorm=За каждого монстра в огне вы и ваша группа получаете шанс на бонус к атаке и скорости.
d.golden_harness=Настраивает навыки боевого спрайта на колющий урон.\nМогут использовать\: Серафинкс, Маскерайт
d.golden_harness_adv=Настраивает навыки боевого спрайта на колющий урон.\nСнижает перезарядку всех навыков на 5%\nМогут использовать\: Серафинкс, Маскерайт
d.golden_harness_eli=Настраивает навыки боевого спрайта на колющий урон.\nСнижает перезарядку всех навыков на 10%\nМогут использовать\: Серафинкс, Маскерайт
d.haunted_haze=Любая цель, погибшая от урона проклятой дымки, порождает призрака мщения, ищущего новые цели и взрывающегося при столкновении.
d.heart_attack=Накладывает чары на группу целей. Если зачарованная цель уничтожена, есть шанс выпадения целительных сердечек.
d.heavy_smoke=Увеличивает защитную мощь и длительность огненного барьера.
d.hexing_haze=Создаёт миазмы вокруг вас, проклинающие всех в зоне действия. Каждое проклятие имеет таймер, по истечении которого наносится урон. За каждую новую цель длительность миазмов увеличивается.
d.high_heat=Увеличивает наступательную мощь огненного барьера.
d.impact=Увеличивает урон огненного снаряда.
d.iron_harness=Настраивает навыки боевого спрайта на обычный урон.\nМогут использовать\: Все боевые спрайты
d.iron_harness_adv=Настраивает навыки боевого спрайта на обычный урон.\nСнижает перезарядку всех навыков на 5%\nМогут использовать\: Все боевые спрайты
d.iron_harness_eli=Настраивает навыки боевого спрайта на обычный урон.\nСнижает перезарядку всех навыков на 10%\nМогут использовать\: Все боевые спрайты
d.iron_heart_attack=Уничтоженные зачарованные цели могут также ронять сферы защиты.
d.magnify=Увеличивает дальность и мощь луча света.
d.maskeraith=Маскерайт — это боевой спрайт, воплощающий тени. Его навыки сосредоточены на хитрости и смертельных ядах.
d.meteoric_firebol=Увеличивает размер взрыва огненного снаряда.
d.no_mercy=Увеличивает урон от проклятой дымки.
d.plentiful_pain=Увеличивает бонусную длительность дымки с каждой новой целью.
d.protection=Увеличивает защитную мощь ангельской ауры.
d.ray_of_light=Выпускает концентрированный луч света, повреждающий всё на своём пути.
d.scorching_barrier=Увеличивает количество и размер вращающихся огненных шаров.
d.seraphic_aura=Члены группы в зоне ауры получают ускоренную регенерацию щита.
d.seraphynx=Серафинкс — это боевой спрайт, воплощающий божественный свет. Его навыки сосредоточены на поддержке рыцарей в бою — защите и восстановлении.
d.shadow_cloak=Делает вас частично невидимым и усиливает защиту на ограниченное время. Теневой плащ отменяется при получении урона, атаке или любом другом действии.
d.valkyrian_aura=Члены группы в зоне ауры получают бонус к скорости зарядки.
d.vengeful_quills=При каждом ударе по утыканной цели выпускается дополнительная игла в ближайшую цель.
d.vengeful_shadow_cloak=При прерывании теневого плаща создаёт взрывное поле вокруг вас с шансом оглушить цели.
d.venom=Увеличивает силу наносимого яда.
d.violent_heart_attack=Уничтоженные зачарованные цели порождают взрыв.
d.virulent_quills=При каждом ударе по утыканной цели есть шанс вызвать ядовитый взрыв.
d.wide_embrace=Увеличивает зону действия «Сердечного удара».
