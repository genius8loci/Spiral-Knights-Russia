m.vip_tos=<html><font color\='white'><font size\=3>This <b>C.U.B.E. Club Membership Agreement</b> constitutes a binding legal document between the undersigned (the "knight"), Golden Casino Holdings LLC (the "Casino"), and the entire slime community ("slimes").<br><br> </font> <font size\=5><b>I. General Terms and Conditions</b></font><br> <font size\=4> &nbsp;&nbsp;1. Membership in the C.U.B.E. Club is for personal use only and can not be transferred to other knights, Devilites, or other Clockwork creatures.<br> &nbsp;&nbsp;2. Selling access to your ability to spin is prohibited.<br> &nbsp;&nbsp;3. Keep your arms and legs inside the Casino at all times.<br> &nbsp;&nbsp;4. Please do not drop items into the core.<br> </font> <font size\=5><b>II. Description of Benefits</b></font><br> <font size\=4> &nbsp;&nbsp;1. Benefits are varied and may be changed at any time.<br> &nbsp;&nbsp;2. Lounge access is not guaranteed and limited by availability.<br> &nbsp;&nbsp;3. Buffalo Wings are not included.<br> &nbsp;&nbsp;4. All disputes will be arbitrated by the Casino floor manager and all decisions are final.<br> </font> <font size\=4><b>III. Winnings, Payments, and Fees</b></font><br> <font size\=3> &nbsp;&nbsp;1. Winnings may be paid in Golden Slime Coins at the discretion of the Casino floor manager.<br> &nbsp;&nbsp;2. No additional fees are collected at this time.<br> </font> <font size\=4><b>IV. Promotional Awards</b></font><br> <font size\=3> &nbsp;&nbsp;1. Sale promotions\: Reduced prices for members, if any, will be displayed plainly in the shop interface.<br> &nbsp;&nbsp;2. The Gift Shop reserves the right to modify, alter, discontinue or terminate these promotions at any time for any reason whatsoever without notice to the end users. No whiners.<br> </font> <font size\=3><b>V. Restrictions and Conditions of Use</b></font><br> <font size\=2> &nbsp;&nbsp;1. As a condition of your use of the club services, you agree not to use club facilities or interfaces for any purpose that is unlawful or prohibited by the terms, conditions, and notices included in this Membership Agreement or any relevant Licence Agreement, or anything generally regarded as uncouth by the slimes.<br> &nbsp;&nbsp;2. The Spiral Knights Terms of Service supersedes these terms where applicable.<br> &nbsp;&nbsp;3. The knight agrees to all terms and conditions enumerated here, and those not enumerated here. The slimes may add new conditions at any time that require complete retroactive compliance.<br> </font> <font size\=3><b>VI. Termination of Account</b></font><br> <font size\=2> &nbsp;&nbsp;1. The Casino has the right to terminate your membership for violating any terms or conditions, precise or vague, enumerated herein or generated at the time of infraction. You've been warned.<br> </font> <font size\=3><b>VII. Disclaimer of Warranty; Limitation of Liability</b></font><br> <font size\=2> &nbsp;&nbsp;1. Your use of the Casino is at your sole risk. You click it, you bought it.<br> &nbsp;&nbsp;2. The Casino nor the general slime community shall not be liable in contract, tort, negligence or otherwise for any loss or damage whatsoever arising from or in any way connected with your use of the Casino.<br> </font> <font size\=3><b>VIII. General</b></font><br> <font size\=2> &nbsp;&nbsp;1. This Membership Agreement is governed by the laws of Haven and the laws of Cradle. You hereby irrevocably consent to submit to the jurisdictions of the Courts of Cradle and Haven.<br> &nbsp;&nbsp;2. This agreement was written by a few slimes with little grasp of legal language beyond what they saw when watching A Few Good Men. Thus, any parts that don't make sense are usually blamed on the other guy. Any good parts left over are still good. They don't go bad just because we screwed up on the other badder parts. There's a word for that concept and the fact that we don't know it is one of the bad parts.<br> </font> </font> </html>
