m.ignite_reward=Hail, {0}\! As part of a special promotion with Ignite, you're entitled to receive a bonus pack of items designed to give you a head start on the great adventure before you\! Attached is a special suit of armor and an array of fiery weapons. \n\nSee you in the Clockworks\!
