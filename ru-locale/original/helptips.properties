m.activate_grim_gate=The Grim Gate will activate when all living party members are standing on it.
m.alpha_recon=This recon module was left by a member of the Alpha Squad.  The recording it contains has been copied to your Arsenal.
m.atg_astation=Arsenal Stations allow you to swap your gear and access loadouts outside of safe havens like Terminals and Subtowns\!
m.atg_blocks=Hit a breakable block to destroy it\!
m.atg_blocks2=Blocks can even affect each other\!
m.atg_button=Standing on a BUTTON can open locked doors.
m.atg_cblocks=Hit a CRYSTAL BLOCK to destroy other crystal blocks of the same color.
m.atg_crowns=CROWNS are used to buy items and pay for other services.
m.atg_eblocks=EXPLOSIVE BLOCKS will cause damage to anything around them if hit.
m.atg_gblocks=Hitting a GHOST BLOCK can remove a whole field of blocks - including unbreakable blocks\!
m.atg_healpad=Stand on a HEART GENERATOR to restore your health\!
m.atg_healthcap=Use HEALTH CAPSULES from your quickslot bar to heal.
m.atg_heat=Pick up HEAT to level up your items and make them better over time\!
m.atg_pots=Some objects like pots can be thrown at switches AND enemies\!
m.atg_pplate=Pick up and place a STATUE on a PRESSURE PLATE to keep doors open.
m.atg_retraps=Some switches can reverse the direction of a trap wave. Now you can cross traps in both directions\!
m.atg_shield=Surrounded? Use your SHIELD to push back attacking enemies.
m.atg_statustraps=Beware\!  Some traps can cause damage AND inflict harmful status effects.
m.atg_switch=Switch out of reach?  Throw a pot or shoot it with a gun\!
m.atg_teblocks=TIMED EXPLOSIVE BLOCKS will count down to 0 before exploding and causing damage.
m.atg_togswitch=Switches can open AND close doors.
m.atg_togtraps=Some traps are always active.  Find a switch to turn them off\!
m.atg_torto=Tortodrones can be found patrolling the Clockworks.  They will not attack unless attacked first - but be warned, once they are enraged, they are fearsome and deadly opponents.
m.atg_traps=Watch your step\!  Wait until TRAPS are down before walking over them.
m.atg_treasure=GREEN Treasure boxes contain crowns and other useful items\! RED Treasure boxes are rarer than green blocks and contain better items\! HEART boxes contain hearts that will restore your health.
m.atg_ublocks=Some blocks cannot be destroyed by normal attacks.
m.atg_vials=Inflict a variety of status effects on enemies by throwing VIALS at them\!
m.atg_vitapods=Pick up VITAPODS to temporarily increase your maximum health until you return to Haven.
m.back_to_haven=This path will take you back to Haven if you are not able to enter the Fiend's Grim Gate.
m.battle_arena=Each stage of a battle arena is more challenging than the last, but a victory always earns you a chance to cut your losses and move on.  The only rule is, everyone must fight at least once\!
m.battle_arena_1=Welcome to the battle arena\! The only rule is that you must fight at least once to move on. Should you claim victory, it will be up to you to decide to fight for even more glory\!
m.battle_arena_2=Victory is yours\! But will these warriors leave this hallowed hall of glorious combat and be forgotten, or continue on against even more terrifying foes in hopes of reaping the rewards of the Arena King?
m.battle_arena_3=Truly you are among the greatest of all warriors who have ever lived\! The bounties of the Arena King are yours for the taking\!
m.bramble=Some areas are overgrown with bramble that will hurt you if you run through it\!
m.branch_battle_warning=Two paths lie before you. Which one will you take?
m.branch_path_warning=You are safe, for now. Two paths lie before you. Listen to the recon modules here and choose your path.
m.can_resurrect=You have been granted a Spark of Life by a party member. Press ATTACK [[ACTION]] to revive.
m.candlestick_keep=Beware the horrible Grimalkins that lurk in the dark\!  These cursed wraiths cannot be destroyed and the only thing they truly fear is the light of the enchanted candles.  Light them with embers and take refuge in their shining embrace.
m.choice=Make your choice.
m.clockwork_tunnels=There are strange sounds and energies emanating from the Clockworks. Delve deep and unravel its mysteries but be careful not to get caught in the mechanisms.
m.confirm_energy=Press ATTACK [[ACTION]] to confirm spending energy.
m.connecting=Connecting...{0}%
m.controls=Press [[TOGGLE_HELP]] at any time to view the controls.
m.converse=Use the arrow keys and spacebar to navigate the conversation.
m.danger_module=Warning\! The path beyond this point is far more dangerous than what you would expect on this level. By entering you will not be able to turn back until you complete the challenges within.\n\nHowever, should you manage to come out victorious you will be rewarded for your bravery. Enter at your own risk\!
m.dead=Press ATTACK [[ACTION]] to cycle to Spectator View.
m.design=Press ATTACK [[ACTION]] to place.\nPress DEFEND [[DEFEND]] to put away.\nPress PREV_WEAPON [[PREV_WEAPON]] to rotate clockwise.\nPress NEXT_WEAPON [[NEXT_WEAPON]] to rotate counter-clockwise.
m.devilish_drudgery=The office minions of the Underworld are a disgruntled lot, attacking any unauthorized personnel on sight.  While not terrible threats on their own, they can become far worse if one of their Pit Bosses gets a hold of them.  Watch out\!
m.elevator=The elevator will activate when all living party members are standing on it.
m.energy=Press ATTACK [[ACTION]] to spend energy on this device.
m.event_locked_module=Warning\! An unidentified place of interest lies beyond this gate. By entering you will not be able to turn back until you complete the challenges within.\n\nHowever, should you manage to come out victorious you will be rewarded for your bravery. Enter at your own risk\! \n\nThis room offers a bonus chance at the treasures within.
m.event_module=Warning\! An unidentified place of interest lies beyond this gate. By entering you will not be able to turn back until you complete the challenges within.\n\nHowever, should you manage to come out victorious you will be rewarded for your bravery. Enter at your own risk\!
m.final_test=You've made it this far knight - but your final exam will require quick thinking and even faster feet.
m.graveyard=Graveyards are an unnatural place, a world between worlds where dark spirits gather, hungry for the life of any live soul that must pass through.  You must hurry and find the exit as fast as possible before these phantoms awaken and stalk you\!
m.interact=Press ATTACK [[ACTION]] to activate.
m.lichenous_lair=Lichens are strange, alien varieties of slimes thought to have arrived on this world in a large meteor.  While a single-cell colony is mostly harmless, they can quickly combine into a most terrible foe.  Keep them from mingling\!
m.lift=Press ATTACK [[ACTION]] to lift object.
m.loading=Loading...{0}%
m.loading0=The basic play controls can be viewed at any time by pressing [[TOGGLE_HELP]].
m.loading1=The Clockworks below the surface cycle levels in real time. You will never see all the levels a world has to offer in a single trip. Only a true adventurer will discover all the secrets\!
m.loading10=If you become shocked you will regularly spasm from the electricity coursing through your body. This will interrupt anything you are doing.
m.loading11=If you become cursed some of your weapons will be marked by the curse. Trying to use a curse marked weapon will cause you damage.
m.loading12=If you experience a problem of any kind, press F2 to send a bug report.
m.loading13=If you are the party leader, you can remove any player from your party. Click the status icon of the player you wish to remove and select "Remove from Party."
m.loading14=Do not share your account information. Game Masters will never ask you for your password.
m.loading15=To add a friend to your friends list, simply click on that friend and choose "Add as Friend." To see the list of friends and what they are up to, click on the Social button.
m.loading16=Using a shield can help you completely avoid damage, so make sure to use it\! Press "[[DEFEND]]" to defend. As the shield takes damage it will turn red and eventually break. The shield must regenerate before it can be used again.
m.loading17=Check out forums.spiralknights.com. Be a part of the conversation\!
m.loading18=Check out wiki.spiralknights.com, where brave adventurers document what they discover in the depths of the Clockworks\!
m.loading2=Armor and helms not only offer physical defense, but can also protect you from status conditions. The right combination will greatly increase your chance of survival.
m.loading3=You can revive another player by clicking on their portrait and granting them a Spark of Life
m.loading4=Rare monsters offering unique items roam the Clockworks. Have you discovered any yet?
m.loading5=You can see what your friends are up to by clicking on the social button in the bottom left corner of your screen. You can even instantly join them if there is room in their party.
m.loading6=If you become poisoned you will not be able to heal yourself. Avoid taking too much damage until it wears off.
m.loading7=If you are on fire you will take damage regularly until the fire wears off. That can't stop you from spreading it to monsters though. Get close and share the love\!
m.loading8=If you become frozen you will not be able to move or turn, but you can still attack. If adventuring with others, ask them to chip away at the ice with their best attacks.
m.loading9=If you become stunned you will move and attack slower than usual. This can leave you as a prime target for larger monsters that you can normally outrun, so watch out\!
m.lock_guard=Protect and heal yourself and teammates from damage with the Guardian Shield\! \n\nKeep enemies at bay with increased resistances to damage and attack with faster swords and bombs\!
m.lock_howto=* There are multiple Control Points scattered around the map \n* Capturing and holding a Control Point increases your team's score over time \n* To capture a Control Point, stand on it until it changes to your team's color \n* The team with the highest score at the end of the match WINS\! \n
m.lock_recon=Turn invisible and mark enemies for increased damage using the Disruption Field\! \n\nKeep enemies on their toes with a decreased weapon charge time and faster guns and bombs\!
m.lock_striker=Out-run anyone with the Striker Dash, hit'em hard and then leave them in the dust\! \n\nBe the ultimate damage-dealer with an increased overall attack damage and the fastest sword\!
m.lost_knights=You have discovered the missing knights...
m.mineral_tut=Attack to break down minerals and pick them up\! Carry one at a time.
m.mission_trap_chamber=All drones can move in a few different ways.
m.mission_trap_chamber_2=They can be killed but often you can just avoid them.
m.mission_trap_chamber_3=All drones clad in gold armor are invincible.
m.mission_trap_chamber_4=Drones can also deal status damage.
m.need_key_grim_gate=The Grim Gate requires a Fiendish ID Card to activate.
m.new_sprite=You've got a battle sprite\! Press [[SPRITE_ACTION_1]] to use your sprite's battle skill\!
m.p_dz_schematic_heist=Unauthorized access of our schematics library detected. Security team dispatched. Lockdown commenced.
m.party_button=The party button will activate when all living party members are standing on it.
m.party_locked_warning=WARNING\! Upon using this elevator your party will be locked for the remainder of the mission.
m.party_nosplit_warning=WARNING\! You may not split your party during this mission.
m.plan_o_attack=The monitor shows readouts coming from a prototype of a massive war machine labeled "Project R".
m.poi=Press ATTACK [[ACTION]] to inspect.
m.pressure_pads=These special buttons will only trigger if something is holding them down. Try using that statue to hold one down.
m.recon=Press ATTACK [[ACTION]] to activate Recon Module.
m.rescue_door_sk=I've almost got this door open. While I'm working at it, rescue the captive knights in the area\!
m.scenario_compound_gremlin=The others must never know.  Silence them. -H
m.scenario_experiment=Certain types of monsters seem to be attracted to different combinations of minerals found down here in the Clockworks.
m.scenario_failedparty=The candle's going out\!  They're coming\! Curse Kalem for going after that treasure...
m.scenario_fiendbook_1=How to Draw Infernal Symbols
m.scenario_fiendbook_2=5 Ways to Appease Your Pit Boss
m.scenario_fiendbook_3=The Apocalypse and You
m.scenario_fiendbook_4=Four Ways to Bring About the End of the World
m.scenario_fiendbook_5=What to Do if You Summon the Wrong Infernal Overlord
m.scenario_fiendnotice_1=Due to continual under-performance, there will be no paid holidays or free coffee in the break room.
m.scenario_giantsword=Etched within the side of the blade appears to be some kind of map of the stars.
m.scenario_roarmulus_a=The monitor shows readouts coming from a prototype of a massive war machine labeled "Project R".
m.scenario_roarmulus_b='Project R' is nearly complete. We must gather more scrap\!
m.scenario_torin=A fading inscription reads\: Here lies Torin, knight of Almire.
m.shop=Press ATTACK [[ACTION]] to browse vendor goods.
m.sl_elevator_active=Shadow Key required to open.\nShadow Keys can be acquired randomly in lockboxes or purchased from the Supply Depot.
m.sl_elevator_closed=Not available at this time.
m.sprite_cooldown=After using any sprite skill, a cooldown is required on all skills before using them again.
m.statue_secret=Heavy statues can be lifted and placed on pressure pads to reveal secrets and treasures\!
m.talk=Press ATTACK [[ACTION]] to initiate conversation.
m.terminal_1=Welcome traveler, this is a Clockwork Terminal. Take a moment to rest and change your gear. \n\nUse the elevator either to return to Haven or delve into a more dangerous stratum of the Clockworks.
m.test_lobby=Welcome testers\! Before you head off into the Clockworks, feel free to help yourself to some wonderful stuff from the merchant to the left. \nThe embers to the far right will level up weapons once your collect enough of them and proceed to the next floor. \nGood luck, brave knights\!
m.tg1_barrier=If you start feeling overwhelmed, use the force barriers like the one to your right to take a breather. Monsters and projectiles cannot pass through them.
m.tg1_button=If a door won't open, search under blocks for a hidden floor button to open it.
m.tg1_crowns=Crowns are the currency of the Clockworks. You can use them to purchase all kinds of things like new weapons and armor. While playing with others, every party member gets crowns whenever anyone picks some up.
m.tg1_end=Hey, you made it\! That's just great, really. You just saved me a whole lot of paperwork, so thanks. Hope those wolvers weren't too much of a surprise. Head on over to the elevator and we'll call this expedition complete.
m.tg1_heat=You may have noticed monsters leaving little embers like these behind. Embers grant you heat. As your heat meter fills, the flame next to your health will grow. If you make it to the exit without dying, the heat will be applied to your weapons and armor. Over time, this will level them up and make them stronger. While playing with others, every party member gets heat whenever anyone picks up an ember.
m.tg1_overgrown_1=I'll leave the next few areas to you. They are pretty overgrown, so keep your eyes peeled for monsters in the tall grass. Some of them are pretty adept at hiding in the shadows. Gives me the creeps just thinking about it really.
m.tg1_overgrown_2=Looks like you know how to handle yourself. That's good, because the final area is just ahead.
m.tg1_partypad_1=Head into the room ahead with the party pad. You're almost done.
m.tg1_partypad_2=This is a party pad. It's a big floor button that only activates when all members of the party are standing on it. They often open doors, but sometimes there is a little more to it than that...
m.tg1_shield_1=Let's get one essential survival tool out of the way right now- your shield. Hold [[DEFEND]] to defend with your shield. While defending you will completely withstand most damage from all sides. The gun puppies in the next hallway shouldn't be a problem to get past so long as you defend as you run through.
m.tg1_shield_2=As your shield absorbs damage it will turn from green to red and eventually break. Once it's broken you cannot defend until it regenerates, so be careful\!
m.tg1_welcome=Welcome to the Training Grounds, recruit. In this derelict section of the Clockworks you'll find areas we have built in order to train you in the fine art of not dying a horrible death. So pay attention to these helpful tips, ready your weapon, and get moving\!
m.tg2_crystal=Crystal blocks are like breakable blocks except that if destroyed, they also destroy the crystal blocks of the same color connected to them.
m.tg2_end=Great job\! With another successful run through the Training Grounds you should be getting the hang of things by now. It won't be long before you are exploring the depths of the Clockworks on your own.
m.tg2_pickups=Pickups are items that are slotted into your belt seen at the top of the screen. They cannot leave the Clockworks and will turn to dust as soon as you return to town. Think of them as powerups and bonus items to use as you please.
m.tg2_shield=Up ahead is another great opportunity to use your shield. Remember, you can defend with your shield by pressing and holding the X key.
m.tg2_vials_1=Vials are one type of pickup. When thrown they release the alchemical agents within creating an elemental explosion. You can give them a try in the next room.
m.tg2_vials_2=The room ahead will give you a chance to try out using vials. Simply press the number key (1 through 5) to the corresponding pickup in your belt at the top of the screen. Doing so will load a vial. Press attack to throw it.
m.tg2_vials_3=Now that you have a grasp of using pickups, let's apply what you've learned in a combat environment.
m.tg2_welcome=Welcome back to the Training Grounds. This one is designed to teach you about special items that are found within the Clockworks called "pickups."
m.tg3_charge_1=Spiral Knights are capable of unleashing the hidden powers locked from within the weapons they use called "charge attacks." Charge attacks are more powerful than a standard attack and can often produce special effects.
m.tg3_charge_2=To perform a charge attack with a sword or handgun, press and hold ATTACK. After attacking you will begin to charge your weapon. Once it reaches maximum charge release ATTACK to unleash your charge attack.
m.tg3_charge_3=Now that you know how to perform a charge attack, let's apply that to a more advanced battle. Charge your weapon and unleash at the right moment when the enemy is exposed. Good luck\!
m.tg3_end=Seems like you have a good grasp on the basics. I think you're ready to join the rest of the recruits in the Sparrow Gate. There you will learn how to work as a party. There's a lot of recruits out there depending on you now. Great job\!
m.tg3_final=Just one more room lies between you and the elevator out of here. Remember what you have learned so far and you'll do just fine... at least that's the theory. Try not to die, ok?
m.tg3_ghost=Ghost blocks will destroy any blocks connected to them, even unbreakable blocks\!
m.tg3_goldkey=Gold keys are another type of lift object. Pick them up and use them on gold doors. For every gold door you find in a level, there is always a gold key somewhere.
m.tg3_lift_1=It's time to flex those muscles\! Some objects you encounter can be lifted and carried or thrown. Walk up to these clay pots and press ATTACK when you see the action icon.
m.tg3_lift_2=The door ahead is locked, but you can open it with the hit switch to your left. Try throwing a clay pot at the switch. They're quite useful in this way if you don't have a gun handy.
m.tg3_welcome=Welcome back to the Training Grounds. This last level will teach you the last few important things you will need to know as an explorer of the Clockworks. Head up the ramp and let's begin\!
m.tg_doors=Doors can be opened in many different ways.
m.tg_end=Hey, you made it\! That's just great, really. You just saved me a whole lot of paperwork, so thanks. Hope those retrodes weren't too much of a surprise. Head on over to the elevator and we'll call this expedition complete.
m.tg_heat=Collecting Heat Embers will level up your gear when you reach an elevator.
m.tg_heat_short=Collect heat to level up your gear\!
m.tg_pots=Some objects can be picked up and used or even thrown across the room. Try throwing a pot at that switch.
m.tg_shield=Press [[DEFEND]] to raise your shield and block attacks.
m.tg_welcome=Welcome to the Training Ground, recruit. In this derelict section of the Clockworks you'll find areas we have built in order to train you in the fine art of not dying a horrible death. So pay attention to these helpful tips, ready your weapon, and get moving\!
m.tglobby_equip=Inside the Clockworks, use Arsenal Stations to change your equipment.
m.tglobby_vitapod=Vitapods temporarily increase your maximum health until you return to town.
m.token_trader_info=Spiral HQ offers special items to select knights through the exchange of special tokens found within the Clockworks. These tokens are often earned from defeating fierce boss monsters and are proof of the owner's bravery.
m.treasure_vault_sky_islands_day=Relax\! Smell the flowers. Enjoy your day in the sun. You've earned it\!
m.tut_attack=Use [[ACTION]] to attack.
m.tut_bash=When your shield is full, press [[SHIELD_BASH]] to bash and stun monsters\!
m.tut_breakable=Some blocks like these can be broken. Attack them to clear the path.
m.tut_buttons=Not all buttons are in plain sight. Have a look around\! They are sometimes hidden under blocks.
m.tut_charge=Hold [[?ACTION]] until fully charged and then release to attack\!
m.tut_chromalisks=Those chroma whelps up ahead can lash you with their tongues from afar. Avoid facing them when they get ready to strike.
m.tut_clearing=Attack using [[ACTION]].
m.tut_dash=Evade damage from monster attacks by pressing [[DODGE]].
m.tut_explosive=Explosive blocks will harm anything around them when they are set off. This includes you\! Take them out from a safe distance with your handgun.
m.tut_explosive2=Switch to your Handgun using [[NEXT_WEAPON]].
m.tut_fighting=Aim at enemies with your mouse and attack with [[ACTION]].
m.tut_ghost=Ghost blocks will destroy any blocks connected to them, even unbreakable blocks\!
m.tut_golddoor=Find the Gold Key to open this door\!
m.tut_goldkey=Pick up and use on Gold Doors\!
m.tut_hearts=Break these blocks to receive hearts. Hearts restore your health. You cannot pick them up unless you need them.
m.tut_hearts_short=If you are hurt, use Hearts to heal yourself\!
m.tut_important_object=Pick up to continue\!
m.tut_jelly_cubes=Look out\! Up ahead is a pack of wild jellycubes. When you are close enough, you will automatically target the nearest monster. They will be illuminated with a light column.
m.tut_lever=Doors can often be opened by finding the right switch. Try hitting this switch with your handgun\!
m.tut_lever_alt=Switches can open doors. Try throwing a pot or shooting this one with your handgun\!
m.tut_miniboss=You've almost made it to the Rescue Camp, run through the force barrier ahead\!
m.tut_move=Use [[?MOVEMENT]] to move.
m.tut_move_short=Use [[?MOVEMENT]] to move.
m.tut_pot_short=Pick up and throw\!
m.tut_shield=Press and hold [[DEFEND]] to block attacks.
m.tut_shrubs=Try clearing out these shrubs. Plants and other destructible objects often hide treasures.
m.tut_switches=Doors can often be opened by finding the right switch nearby. Have a look around. They are sometimes hidden under blocks.
m.tut_target=Hit to progress\!
m.tut_treasure=Treasure blocks are always a lucky find\! They contain coins and useful items.
m.tut_victory=You've made it\! Walk on ahead to enter the Rescue Camp.
m.tut_weapons=You can cycle between equipped weapons with [[NEXT_WEAPON]]. Try equipping your handgun.
m.tut_weapons_short=Use [[NEXT_WEAPON]] to cycle your equipped weapon.
m.tut_welcome=We have picked up your distress signal, recruit. Your first objective is to reach Haven, where we have created an outpost. You're likely a little woozy from the crash, so I'll guide you through the basics. The road may be dangerous, so ready your sword and keep your wits about you. Good luck\!
m.unlock=Press ATTACK [[ACTION]] to use a Silver Key.
m.unlock_gold=Press ATTACK [[ACTION]] to use the Gold Key.
m.unlock_grim_gate=Press ATTACK [[ACTION]] to use a Fiendish ID Card \n\nWARNING\: If this Grim Gate is unlocked the party will become locked and stay locked for the duration of the mission. Choose your party members wisely\!
m.unlock_shadow=Press ATTACK [[ACTION]] to use a Shadow Key \n\nWARNING\: If this elevator is unlocked the party will become locked and stay locked for the duration of the Shadow Lair. Choose your party members wisely\!
m.wolver_den=Wolvers are a highly adaptable pack beast whose predatory instincts are only matched by their quick reflexes.  They play with their prey by dancing about and finally striking from behind.  Keep a blade handy.
m.zone=Press ATTACK [[ACTION]] to exit current zone.
